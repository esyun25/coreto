<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORETO — 研修・オンボーディング</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--card:#0f1119;--card2:#141720;--border:#1e2235;--border2:#252a3d;
  --gold:#c9a84c;--gold-dim:#7a5f22;
  --blue:#4f9cf9;--green:#34d399;--red:#f87171;--orange:#fb923c;--purple:#a78bfa;
  --muted:#4a5270;--sub:#7a849e;--text:#e2e6f3;
}
html,body{height:100%;font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text)}
.hdr{height:54px;display:flex;align-items:center;justify-content:space-between;
  padding:0 26px;border-bottom:1px solid var(--border);background:rgba(7,9,15,.95);position:sticky;top:0;z-index:100}
.logo{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--gold);letter-spacing:3px}
.layout{display:flex;height:calc(100vh - 54px)}
.sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--border);background:var(--card);overflow-y:auto;padding:12px 0}
.sb-sec{font-size:8px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;padding:12px 16px 5px}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 16px;font-size:12px;cursor:pointer;
  color:var(--sub);transition:.15s;border-left:2px solid transparent}
.sb-item:hover{color:var(--text);background:rgba(255,255,255,.025)}
.sb-item.on{color:var(--blue);background:rgba(79,156,249,.07);border-left-color:var(--blue)}
.main{flex:1;overflow-y:auto;padding:26px 30px 80px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:14px}
.ch{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ch-t{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.ch-t::before{content:'';width:3px;height:11px;border-radius:2px;background:var(--gold)}
.cb{padding:18px 20px}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font-size:9px;font-weight:700}
.pg{background:rgba(52,211,153,.13);color:var(--green);border:1px solid rgba(52,211,153,.3)}
.pb{background:rgba(79,156,249,.12);color:var(--blue);border:1px solid rgba(79,156,249,.25)}
.po{background:rgba(251,146,60,.12);color:var(--orange);border:1px solid rgba(251,146,60,.3)}
.pm{background:rgba(74,82,112,.15);color:var(--sub);border:1px solid var(--border2)}
.btn{padding:8px 16px;border-radius:9px;font-size:11px;font-weight:700;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;transition:.15s;border:none;display:inline-flex;align-items:center;gap:6px}
.btn-blue{background:linear-gradient(135deg,var(--blue),#3070c0);color:#fff}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--sub)}
.btn-ghost:hover{color:var(--text)}
.btn-ok{background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.3);color:var(--green)}
.btn-sm{padding:4px 10px;font-size:10px;border-radius:6px}
/* Progress ring */
.ring-wrap{position:relative;width:90px;height:90px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
/* Task item */
.task{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.task:last-child{border:none;padding-bottom:0}
.task-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border2);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;margin-top:1px}
.task-check.done{background:var(--green);border-color:var(--green);color:#0a0c10;font-size:12px}
.task-check.done::after{content:'✓'}
.task-check:not(.done):hover{border-color:var(--blue)}
.task-body{flex:1}
.task-title{font-size:13px;font-weight:600;margin-bottom:3px}
.task-title.done{text-decoration:line-through;color:var(--muted)}
.task-sub{font-size:11px;color:var(--sub);line-height:1.6}
.task-tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.task-tag{font-size:9px;padding:2px 8px;border-radius:5px;font-weight:700;
  background:rgba(74,82,112,.15);color:var(--muted);border:1px solid var(--border2)}
.tag-req{background:rgba(248,113,113,.1);color:var(--red);border-color:rgba(248,113,113,.3)}
.tag-ms{background:rgba(201,168,76,.1);color:var(--gold);border-color:rgba(201,168,76,.3)}
/* Phase headers */
.phase-hdr{display:flex;align-items:center;gap:10px;padding:10px 0;margin-bottom:4px}
.phase-line{flex:1;height:1px;background:var(--border)}
.phase-label{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;white-space:nowrap}
/* HQ Table */
.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:8px 14px;font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--card2);text-align:left}
.tbl td{padding:10px 14px;border-bottom:1px solid rgba(30,34,53,.5);font-size:12px;vertical-align:middle}
.tbl tr:last-child td{border:none}
/* Progress bar */
.pbar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;width:100%}
.pfill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--blue),var(--green));transition:.5s}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── 紹介リンクモーダル ── */
#ref-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9000;align-items:center;justify-content:center}
#ref-modal-overlay.open{display:flex}
#ref-modal{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:0;width:min(460px,92vw);overflow:hidden}
.ref-mhdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ref-mhdr-t{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--gold)}
.ref-mbody{padding:20px}
.ref-url{background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;font-family:'DM Mono',monospace;font-size:11px;color:var(--sub);word-break:break-all;margin:10px 0;min-height:36px}
.ref-copy-btn{width:100%;padding:10px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;background:var(--gold);color:#0a0c10;margin-top:4px}

/* ── 研修コンテンツ ── */
.lesson-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden;cursor:pointer;transition:.18s}
.lesson-card:hover{border-color:var(--border2);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.lesson-card.done-lesson{border-color:rgba(52,211,153,.25)}
.lc-hdr{display:flex;align-items:center;gap:14px;padding:16px 20px}
.lc-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.lc-meta{flex:1}
.lc-title{font-size:13px;font-weight:700;margin-bottom:3px}
.lc-sub{font-size:10px;color:var(--sub)}
.lc-badge{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
/* Article view */
.article-hdr{margin-bottom:24px}
.article-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:6px}
.article-meta{font-size:10px;color:var(--sub);display:flex;gap:12px;flex-wrap:wrap}
.article-body{font-size:13px;line-height:1.95;color:var(--text)}
.article-body h3{font-size:14px;font-weight:700;margin:24px 0 10px;color:var(--blue);padding-left:10px;border-left:3px solid var(--blue)}
.article-body h4{font-size:12px;font-weight:700;margin:18px 0 8px;color:var(--gold)}
.article-body p{margin-bottom:12px}
.article-body ul,.article-body ol{padding-left:18px;margin-bottom:12px}
.article-body li{margin-bottom:5px}
.article-body .info-box{background:rgba(79,156,249,.07);border:1px solid rgba(79,156,249,.2);border-radius:10px;padding:12px 16px;margin:14px 0;font-size:12px}
.article-body .warn-box{background:rgba(251,146,60,.07);border:1px solid rgba(251,146,60,.2);border-radius:10px;padding:12px 16px;margin:14px 0;font-size:12px}
.article-body .tip-box{background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.2);border-radius:10px;padding:12px 16px;margin:14px 0;font-size:12px}
.article-body table{width:100%;border-collapse:collapse;margin:14px 0;font-size:11px}
.article-body th{background:var(--card2);padding:8px 12px;border:1px solid var(--border);font-weight:700;text-align:left}
.article-body td{padding:8px 12px;border:1px solid var(--border)}
/* Quiz */
.quiz-section{background:var(--card2);border:1px solid var(--border2);border-radius:14px;padding:20px 24px;margin-top:28px}
.quiz-title{font-size:11px;color:var(--gold);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.q-item{margin-bottom:20px}
.q-text{font-size:13px;font-weight:600;margin-bottom:10px;line-height:1.6}
.q-opts{display:flex;flex-direction:column;gap:7px}
.q-opt{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:9px;border:1px solid var(--border);cursor:pointer;transition:.15s;font-size:12px;line-height:1.5}
.q-opt:hover{border-color:var(--blue);background:rgba(79,156,249,.05)}
.q-opt.selected{border-color:var(--blue);background:rgba(79,156,249,.1)}
.q-opt.correct{border-color:var(--green);background:rgba(52,211,153,.1);color:var(--green)}
.q-opt.wrong{border-color:var(--red);background:rgba(248,113,113,.08);color:var(--red)}
.q-radio{width:16px;height:16px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;margin-top:1px;transition:.15s}
.quiz-result{display:none;padding:16px;border-radius:10px;text-align:center;margin-top:16px}
.quiz-result.pass{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3)}
.quiz-result.fail{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25)}

@media(max-width:768px){
  .hdr{padding:0 12px;height:48px}
  .layout{flex-direction:column;height:auto;min-height:calc(100vh - 48px)}
  .sidebar{
    width:100%;height:auto;border-right:none;
    border-bottom:1px solid var(--border);
    display:flex;flex-direction:row;overflow-x:auto;
    padding:0;flex-shrink:0;-webkit-overflow-scrolling:touch;
  }
  .sb-sec{display:none}
  .sb-item{
    white-space:nowrap;flex-shrink:0;padding:10px 14px;
    border-left:none;border-bottom:2px solid transparent;
  }
  .sb-item.on{border-bottom-color:var(--gold);border-left:none;background:transparent;color:var(--gold)}
  .main{padding:14px 12px 60px;overflow-y:visible}
  .tbl{min-width:480px}
  .card-body{overflow-x:auto}
  /* repeat(3,1fr) → 1fr 1fr */
  .g3,.step-grid,.kpi-row{grid-template-columns:1fr 1fr !important}
}
@media(max-width:480px){
  .g3,.step-grid,.kpi-row{grid-template-columns:1fr !important}
}
.ref-copy-btn:hover{opacity:.9}
</style>
</head>
<body>
<div class="hdr">
  <div style="display:flex;align-items:center;gap:12px">
    <div class="logo">CORETO</div>
    <div style="width:1px;height:18px;background:var(--border2)"></div>
    <span style="font-size:10px;color:var(--muted);letter-spacing:1px">研修・オンボーディング</span>
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-ghost btn-sm" onclick="window.location.href='coreto-hub.html'">🏠 ホーム</button>
  </div>
</div>
<div class="layout">
  <div class="sidebar">
    <div class="sb-sec">メニュー</div>
    <div class="sb-item on" id="sb-my"    onclick="showPage('my')"><span>📋</span>自分の進捗</div>
    <div class="sb-item"    id="sb-train" onclick="showPage('train')"><span>📚</span>研修コンテンツ</div>
    <div class="sb-item"    id="sb-hq"    onclick="showPage('hq')" style="display:none"><span>🏢</span>HQ管理</div>

    <div class="sb-sec" style="margin-top:8px">紹介</div>
    <div class="sb-item" onclick="openRefModal()" style="color:var(--gold)"><span>🔗</span>紹介リンク発行</div>  </div>
  <div class="main" id="main"></div>
</div>
<script src="db.js"></script>
<script>
// ══ AUTH GUARD (要ログイン) ════════════════════════════════════
(function() {
  var s = null;
  try { s = JSON.parse(sessionStorage.getItem('coreto_session') || 'null'); } catch(e) {}
  if (!s || !s.userId || !s.type) {
    sessionStorage.setItem('coreto_redirect', window.location.href);
    location.replace('coreto-login.html');
    return;
  }
  if (!s.sessionToken || s.sessionToken.length !== 64) {
    sessionStorage.removeItem('coreto_session');
    location.replace('coreto-login.html');
    return;
  }
  var _la = new Date(s.loginAt).getTime();
  if (isNaN(_la) || (Date.now() - _la) > 28800000) {
    sessionStorage.removeItem('coreto_session');
    alert('セッションの有効期限が切れました。再度ログインしてください。');
    location.replace('coreto-login.html');
    return;
  }
  window._SESSION = s;
})();

const SESSION_KEY = 'coreto_session';
const s = (() => { try { return JSON.parse(sessionStorage.getItem(SESSION_KEY)||'{}'); } catch(e){return {};} })();
const ME = { id: s.id||'10012', name: s.name||'山田 誠', type: s.type||'re' };

// ══════════════════════════════════════════════════════════════════
//  タスク定義（ロール別）
// ══════════════════════════════════════════════════════════════════

// ── 不動産エージェント（RE）──────────────────────────────────────
const TASKS_RE = [
  // Phase 1：入会手続き
  {id:1, phase:'フェーズ1：入会手続き（1週目）',
   title:'業務委託契約書に電子署名',
   sub:'最新バージョンの契約書を読み、電子署名で締結してください。署名後はマイページから確認できます。',
   detail:'契約書は毎年改定される場合があります。変更点はHQよりSlack通知されます。\n\n【確認ポイント】\n・報酬率（ランク別）\n・守秘義務の範囲\n・競業避止条件（退会後6ヶ月）\n・返金・違約金条項',
   tags:['必須'], link:'coreto-contract.html', done:false},
  {id:2, phase:'フェーズ1：入会手続き（1週目）',
   title:'月会費・カード登録（一般エージェントのみ）',
   sub:'Stripeでクレジットカードを登録してください。専任宅建士は月会費¥0のためスキップ可能です。',
   detail:'【月会費】\n・一般エージェント（Bronze）：¥980/月\n・Silver以上：ランクに応じて割引\n・専任宅建士：¥0（無料）\n\n【名刺費】\n・一般エージェント：¥2,000（初回のみ）\n・専任宅建士：¥0（無料）',
   tags:['必須（一般AG）'], link:'coreto-account-settings.html', done:false},
  {id:3, phase:'フェーズ1：入会手続き（1週目）',
   title:'Kyash IDを登録',
   sub:'アカウント設定の「Kyash ID登録」からIDを登録してください。登録後、HQに自動通知されます。',
   detail:'【Kyashとは】\n・スマホ決済アプリ（無料）\n・報酬はKyash IDで受け取り（口座番号不要）\n\n【注意】\n・100万円超の案件が発生した場合のみ別途銀行口座をHQに連絡',
   tags:['必須'], link:'coreto-account-settings.html', done:false},

  // Phase 2：システム習得
  {id:5, phase:'フェーズ2：システム習得（2週目）',
   title:'マイページと支払明細の確認',
   sub:'ダッシュボード・ツール一覧・支払明細の確認方法を把握してください。',
   detail:'【マイページでできること】\n・今月の成約件数・報酬額の確認\n・支払明細書の閲覧・印刷\n・口座情報の変更\n・名刺発注\n・紹介リンクの発行',
   tags:['推奨'], link:'coreto-agent-mypage.html', done:false},
  {id:6, phase:'フェーズ2：システム習得（2週目）',
   title:'案件パイプラインの操作習得',
   sub:'案件の登録・ステータス変更・メモ追加・成約報告の流れを理解してください。',
   detail:'【パイプラインのステータス】\n問い合わせ → 内見調整 → 内見済み → 審査中 → 申込 → 重説 → 契約 → 成約\n\n【重要ルール】\n・成約報告は成約日から5営業日以内に必須\n・物件情報は正確に入力（後で支払明細に反映）\n・三為取引は必ずチェックボックスをON',
   tags:['推奨'], link:'coreto-pipeline.html', done:false},
  {id:7, phase:'フェーズ2：システム習得（2週目）',

   detail:'【クライアントIDについて】\n・CL-XXXXXX形式のユニークIDで管理\n・同一クライアントの重複登録を防止\n・HQ全員でクライアント情報を共有\n\n【入力必須項目】\n・氏名・電話番号・メールアドレス\n・希望エリア・予算\n・在留資格（外国籍の場合）',
   tags:['推奨'], link:'coreto-client-id.html', done:false},
  {id:8, phase:'フェーズ2：システム習得（2週目）',
   title:'報酬規程・ランク制度を理解',
   sub:'成約報酬率・ランクアップ条件・ポイント計算・メンター制度を理解してください。',
   detail:'【報酬率（不動産）】\n・Bronze：65%　Silver：67.5%\n・Gold：70%　Platinum：75%\n・創業メンバー：90%（固定）\n\n【ランクアップ条件】\n月次ポイント（手数料10万/件1件/メンター報酬5千=各1pt）で判定\nSilver：10pt／Gold：20pt／Platinum：30pt\n\n【メンターフィー】\n自分の紹介で入会したエージェントの成約から最大10%を受け取れます',
   tags:['必須'], link:'coreto-faq.html', done:false},

  // Phase 3：業務習得
  {id:9, phase:'フェーズ3：業務習得（3〜4週目）',
   title:'内見依頼書・現地案内の流れ',
   sub:'内見依頼書の作成から当日の案内、写真撮影、フィードバック記録までの流れを練習してください。',
   detail:'【内見前の準備】\n・クライアントへ前日リマインド連絡\n・物件の鍵・アクセス方法の確認\n・内見依頼書の事前作成\n\n【内見当日】\n・5〜10分前に現地着\n・クライアントの要望を都度メモ\n・写真撮影（管理会社許可済みの場合）\n\n【内見後】\n・感触をパイプラインにメモ\n・次アクションを明確に設定',

// ── ロール別タスク選択 ──────────────────────────────────────────
function getMyTasks() {
  if (ME.type === 'hr') return TASKS_HR;
  if (ME.type === 'pt') return TASKS_PT;
  return TASKS_RE; // デフォルト：RE
}

function showPage(p) {
  ['my','train','hq'].forEach(id=>{
    const el = document.getElementById('sb-'+id);
    if (el) el.classList.toggle('on', id===p);
  });
  if (p==='my')         pageMyProgress();
  else if (p==='train') pageTrain();
  else                  pageHQ();
}

function pageMyProgress() {
  loadUserProgress(); // ユーザーごとの進捗をDBから読み込む
  const TASKS = getMyTasks();
  const done = TASKS.filter(t=>t.done).length;
  const total = TASKS.length;
  const pct = Math.round(done/total*100);
  const radius = 36, circ = 2*Math.PI*radius;
  const typeLabel = ME.type==='hr' ? '人材エージェント' : ME.type==='pt' ? 'パートナー' : '不動産エージェント';
  const typeColor = ME.type==='hr' ? 'var(--green)' : ME.type==='pt' ? 'var(--gold)' : 'var(--blue)';

  document.getElementById('main').innerHTML = `
    <div style="font-family:'Syne',sans-serif;font-size:17px;font-weight:800;margin-bottom:4px">研修・オンボーディング</div>
    <div style="font-size:11px;color:var(--sub);margin-bottom:20px">入会〜初案件までのステップ</div>

    <!-- Progress overview -->
    <div class="card" style="margin-bottom:16px">
      <div class="ch"><div class="ch-t">全体進捗</div></div>
      <div class="cb" style="display:flex;align-items:center;gap:24px">
        <div class="ring-wrap">
          <svg width="90" height="90" viewBox="0 0 90 90">
            <circle cx="45" cy="45" r="${radius}" fill="none" stroke="var(--border2)" stroke-width="8"/>
            <circle cx="45" cy="45" r="${radius}" fill="none" stroke="url(#rg)" stroke-width="8"
              stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pct/100)}" stroke-linecap="round"/>
            <defs><linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="${typeColor}"/><stop offset="100%" stop-color="var(--green)"/>
            </linearGradient></defs>
          </svg>
          <div class="ring-label">
            <div style="font-family:'DM Mono';font-size:20px;font-weight:700;color:var(--green)">${pct}%</div>
            <div style="font-size:9px;color:var(--muted)">完了</div>
          </div>
        </div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:700;margin-bottom:2px">${done}/${total} タスク完了</div>
          <div style="font-size:10px;color:${typeColor};margin-bottom:8px">${typeLabel}</div>
          <div style="display:flex;flex-direction:column;gap:6px">
            ${['フェーズ1','フェーズ2','フェーズ3','フェーズ4'].map((ph,i)=>{
              const phTasks = TASKS.filter(t=>t.phase.startsWith(ph));
              if (!phTasks.length) return '';
              const phDone  = phTasks.filter(t=>t.done).length;
              const phPct   = phTasks.length ? Math.round(phDone/phTasks.length*100) : 0;
              return `<div>
                <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--sub);margin-bottom:3px">
                  <span>${ph}</span><span>${phDone}/${phTasks.length}</span>
                </div>
                <div class="pbar"><div class="pfill" style="width:${phPct}%;background:${typeColor}"></div></div>
              </div>`;
            }).join('')}
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-size:11px;color:var(--muted)">ID</div>
          <div style="font-family:'DM Mono';font-size:12px;margin-bottom:8px">${ME.id}</div>
          <div style="font-size:11px;color:var(--muted)">達成率</div>
          <div style="font-family:'DM Mono';font-size:18px;color:${typeColor};font-weight:700">${pct}%</div>
        </div>
      </div>
    </div>

    <!-- Task list -->
    <div class="card">
      <div class="ch">
        <div class="ch-t">タスク一覧</div>
        <span class="pill pg">${done} / ${total} 完了</span>
      </div>
      <div class="cb" id="task-list">${renderTasks()}</div>
    </div>
  `;
}

function renderTasks() {
  const TASKS = getMyTasks();
  let phases = [...new Set(TASKS.map(t=>t.phase))];
  return phases.map(ph=>{
    const tasks = TASKS.filter(t=>t.phase===ph);
    const allDone = tasks.every(t=>t.done);
    return `
      <div class="phase-hdr">
        <div class="phase-label">${ph}</div>
        <div class="phase-line"></div>
        ${allDone ? '<span class="pill pg" style="flex-shrink:0">✓ 完了</span>' : ''}
      </div>
      ${tasks.map(t=>`
        <div class="task" id="task-${t.id}">
          <div class="task-check ${t.done?'done':''}" onclick="toggleTask(${t.id})"></div>
          <div class="task-body">
            <div class="task-title ${t.done?'done':''}">${t.title}</div>
            <div class="task-sub">${t.sub}</div>
            <div class="task-tags">
              ${t.tags.map(tag=>`<span class="task-tag ${tag==='必須'?'tag-req':tag==='マイルストーン'?'tag-ms':''}">${tag}</span>`).join('')}

              ${t.detail ? `<span class="task-detail-btn" onclick="openDetail(${t.id})" style="font-size:9px;color:var(--sub);margin-left:6px;cursor:pointer">📖 詳細</span>` : ''}
            </div>
          </div>
        </div>`).join('')}
    `;
  }).join('');
}

function toggleTask(id) {
  const TASKS = getMyTasks();
  const t = TASKS.find(t=>t.id===id);
  if (!t) return;
  t.done = !t.done;

  // ── ユーザーごとの進捗を保存 ─────────────────────────────────
  const session = JSON.parse(sessionStorage.getItem('coreto_session') || 'null');
  if (session && session.userId) {
    const progress = {};
    TASKS.forEach(task => { progress[task.id] = task.done; });
    if (typeof DB !== 'undefined') {
      DB.saveOnboardingProgress(session.userId, progress);
    } else {
      const storageKey = 'coreto_onboarding_' + (ME.type||'re');
      const all = JSON.parse(localStorage.getItem(storageKey) || '{}');
      all[session.userId] = progress;
      localStorage.setItem(storageKey, JSON.stringify(all));
    }
  }
  // ─────────────────────────────────────────────────────────────

  pageMyProgress(); // re-render
}

// ── タスク詳細モーダル ────────────────────────────────────────────
function openDetail(id) {
  const TASKS = getMyTasks();
  const t = TASKS.find(t=>t.id===id);
  if (!t || !t.detail) return;
  const existing = document.getElementById('task-detail-modal');
  if (existing) existing.remove();
  const modal = document.createElement('div');
  modal.id = 'task-detail-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px';
  modal.innerHTML = `
    <div style="background:var(--card);border:1px solid var(--border2);border-radius:16px;max-width:520px;width:100%;max-height:80vh;overflow-y:auto">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)">
        <div style="font-weight:700;font-size:13px">${t.title}</div>
        <button onclick="document.getElementById('task-detail-modal').remove()"
          style="background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1">×</button>
      </div>
      <div style="padding:20px">
        <div style="font-size:12px;color:var(--sub);line-height:1.8;margin-bottom:16px">${t.sub}</div>
        <div style="font-size:11px;color:var(--text);line-height:1.9;white-space:pre-line;background:var(--card2);padding:14px 16px;border-radius:10px;border:1px solid var(--border)">${t.detail}</div>
        <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end">
          ${t.link ? `<a href="${t.link}" style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:rgba(79,156,249,.12);border:1px solid rgba(79,156,249,.3);border-radius:8px;color:var(--blue);font-size:11px;font-weight:700;text-decoration:none">→ 開く</a>` : ''}
          <button onclick="document.getElementById('task-detail-modal').remove()"
            class="btn btn-ghost btn-sm">閉じる</button>
        </div>
      </div>
    </div>`;
  modal.addEventListener('click', e=>{ if(e.target===modal) modal.remove(); });
  document.body.appendChild(modal);
}

let currentLesson = null;
let quizAnswers = {};

function openLesson(id) {
  const l = LESSONS.find(x=>x.id===id);
  if (!l) return;
  currentLesson = l;
  quizAnswers = {};
  const progress = getTrainProgress();
  const isDone = !!progress[l.id];

  document.getElementById('main').innerHTML = `
    <button class="btn btn-ghost btn-sm" style="margin-bottom:18px" onclick="pageTrain()">← 一覧に戻る</button>
    <div class="article-hdr card" style="padding:20px 24px">

        <div>

          <div class="article-meta">
            ${l.tags.map(t=>`<span>${t}</span>`).join('')}
            <span>📖 約${l.readMin}分</span>
            ${isDone ? '<span style="color:var(--green)">✓ 修了済み</span>' : ''}
          </div>
        </div>
      </div>
    </div>

    <div class="card" style="padding:24px">
      <div class="article-body">${l.body}</div>

      <!-- Quiz section -->
      <div class="quiz-section" id="quiz-area">
        <div class="quiz-title">🧪 確認テスト（${l.quiz.length}問）</div>
        ${l.quiz.map((q,i)=>`
          <div class="q-item" id="q-${i}">
            <div class="q-text">Q${i+1}. ${q.q}</div>
            <div class="q-opts">
              ${q.opts.map((opt,j)=>`
                <div class="q-opt" id="opt-${i}-${j}" onclick="selectOpt(${i},${j})">
                  <div class="q-radio" id="radio-${i}-${j}"></div>
                  <span>${opt}</span>
                </div>
              `).join('')}
            </div>
          </div>
        `).join('')}
        <div style="display:flex;justify-content:flex-end;margin-top:16px">
          <button class="btn btn-blue" onclick="submitQuiz('${l.id}')">採点する →</button>
        </div>
        <div class="quiz-result" id="quiz-result"></div>
      </div>
    </div>
  `;
}

function selectOpt(qi, oi) {
  // 既に採点済みなら無効
  if (document.getElementById('quiz-result').style.display === 'block') return;
  quizAnswers[qi] = oi;
  const l = currentLesson;
  l.quiz[qi].opts.forEach((_,j)=>{
    const opt = document.getElementById(`opt-${qi}-${j}`);
    const radio = document.getElementById(`radio-${qi}-${j}`);
    if (j === oi) {
      opt.classList.add('selected');
      radio.style.background = 'var(--blue)';
      radio.style.borderColor = 'var(--blue)';
    } else {
      opt.classList.remove('selected');
      radio.style.background = '';
      radio.style.borderColor = '';
    }
  });
}

function submitQuiz(lessonId) {
  const l = currentLesson;
  const unanswered = l.quiz.filter((_,i)=>quizAnswers[i]===undefined);
  if (unanswered.length > 0) {
    alert(`まだ${unanswered.length}問が未回答です。全問回答してから採点してください。`);
    return;
  }

  let correct = 0;
  l.quiz.forEach((q,i)=>{
    const isRight = quizAnswers[i] === q.ans;
    if (isRight) correct++;
    q.opts.forEach((_,j)=>{
      const opt = document.getElementById(`opt-${i}-${j}`);
      if (j === q.ans) opt.classList.add('correct');
      else if (j === quizAnswers[i] && !isRight) opt.classList.add('wrong');
    });
  });

  const pass = correct === l.quiz.length;
  const result = document.getElementById('quiz-result');
  result.style.display = 'block';
  result.className = 'quiz-result ' + (pass ? 'pass' : 'fail');

  if (pass) {
    saveTrainProgress(lessonId, true);
    result.innerHTML = `
      <div style="font-size:28px;margin-bottom:8px">🎉</div>
      <div style="font-size:16px;font-weight:800;color:var(--green);margin-bottom:4px">全問正解！コース修了</div>
      <div style="font-size:12px;color:var(--sub);margin-bottom:14px">${correct}/${l.quiz.length}問正解</div>
      <button class="btn btn-ok" onclick="pageTrain()">← 研修一覧に戻る</button>
    `;
  } else {
    result.innerHTML = `
      <div style="font-size:28px;margin-bottom:8px">📝</div>
      <div style="font-size:15px;font-weight:700;color:var(--orange);margin-bottom:4px">もう一息！</div>
      <div style="font-size:12px;color:var(--sub);margin-bottom:14px">${correct}/${l.quiz.length}問正解。全問正解でコース修了になります。</div>
      <button class="btn btn-ghost" onclick="openLesson('${lessonId}')">もう一度挑戦する</button>
    `;
  }
  // スクロール
  result.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function loadUserProgress() {
  const session = JSON.parse(sessionStorage.getItem('coreto_session') || 'null');
  if (!session || !session.userId) return;
  const TASKS = getMyTasks();
  let progress = {};
  if (typeof DB !== 'undefined') {
    progress = DB.getOnboardingProgress(session.userId);
  } else {
    const storageKey = 'coreto_onboarding_' + (ME.type||'re');
    const all = JSON.parse(localStorage.getItem(storageKey) || '{}');
    progress = all[session.userId] || {};
  }
  if (Object.keys(progress).length > 0) {
    TASKS.forEach(task => {
      if (task.id in progress) task.done = progress[task.id];
    });
  }
}
