<!DOCTYPE html>
<html lang="ja">
<head>
  <!-- ── Content Security Policy (XSS軽減) ──────────────────────────────────
       変更時: 使用する外部サービスのオリジンを追加してください
       Kintone追加時: connect-src に *.cybozu.com を追加
  ─────────────────────────────────────────────────────────────────────── -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline'
      https://cdnjs.cloudflare.com
      https://js.stripe.com
      https://cdn-cgi/scripts;
    style-src 'self' 'unsafe-inline'
      https://fonts.googleapis.com;
    font-src 'self'
      https://fonts.gstatic.com;
    img-src 'self' data: blob:;
    connect-src 'self'
      https://hooks.slack.com
      https://hooks.zapier.com
      https://api.stripe.com
      https://js.stripe.com
      https://www.houjin-bangou.nta.go.jp
      https://www.retio.or.jp;
    frame-src 'none';
    object-src 'none';
    base-uri 'self';
  ">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CORETO — Business Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@400;700&family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   RESET & VARS
═══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:       #0b0d12;
  --bg2:      #0f1219;
  --bg3:      #141820;
  --card:     #141820;
  --card2:    #191e28;
  --border:   #1e2435;
  --border2:  #252c3d;
  --text:     #e4e7f0;
  --sub:      #7a82a0;
  --muted:    #3e4565;
  --gold:     #c9a840;
  --gold2:    #e0bc5a;
  --gold-dim: rgba(201,168,64,.35);
  --gold-bg:  rgba(201,168,64,.07);
  --blue:     #4f9cf9;
  --green:    #34d399;
  --red:      #f87171;
  --orange:   #fb923c;
  --purple:   #a78bfa;
  --teal:     #2dd4bf;
  --sidebar-w:220px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;line-height:1.5}

/* ═══════════════════════════════════════════
   LOGIN SCREEN
═══════════════════════════════════════════ */
#login-screen{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  background-image:radial-gradient(ellipse at 50% 0%, rgba(201,168,64,.06) 0%, transparent 70%);
}
.lf-card{
  width:380px;
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:18px;
  padding:36px 32px 28px;
  box-shadow:0 32px 80px rgba(0,0,0,.6);
  position:relative;
  overflow:hidden;
}
.lf-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.lf-logo{
  font-family:'Kaisei Tokumin',serif;
  font-size:26px;letter-spacing:5px;color:var(--gold);
  text-align:center;margin-bottom:4px;
}
.lf-sub{font-size:10px;color:var(--muted);letter-spacing:2px;text-align:center;margin-bottom:28px;text-transform:uppercase}
.lf-label{display:block;font-size:10px;color:var(--sub);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.lf-input{
  width:100%;padding:10px 13px;background:var(--bg3);
  border:1px solid var(--border2);border-radius:9px;
  color:var(--text);font-size:13px;font-family:'Noto Sans JP',sans-serif;
  outline:none;transition:border-color .15s;margin-bottom:14px;
}
.lf-input:focus{border-color:var(--gold)}
.lf-btn{
  width:100%;padding:12px;background:var(--gold);color:#000;
  border:none;border-radius:9px;font-size:13px;font-weight:700;
  cursor:pointer;font-family:'Noto Sans JP',sans-serif;
  transition:all .15s;letter-spacing:.5px;margin-top:4px;
}
.lf-btn:hover{background:var(--gold2);transform:translateY(-1px);box-shadow:0 4px 20px rgba(201,168,64,.3)}
.lf-err{color:var(--red);font-size:11px;text-align:center;min-height:18px;margin-bottom:6px}
.lf-loading{
  position:absolute;inset:0;background:var(--bg2);border-radius:18px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  display:none;
}
.lf-spinner{
  width:32px;height:32px;border:2px solid var(--border2);
  border-top-color:var(--gold);border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.lf-demo{margin-top:20px;border-top:1px solid var(--border);padding-top:16px}
.lf-demo-toggle{
  font-size:10px;color:var(--muted);cursor:pointer;
  letter-spacing:1px;text-transform:uppercase;display:block;text-align:center;margin-bottom:10px;
  transition:.15s;
}
.lf-demo-toggle:hover{color:var(--sub)}
.lf-demo-panel{display:none}
.da-row{
  display:flex;align-items:center;gap:10px;padding:8px 10px;
  border-radius:8px;cursor:pointer;transition:background .1s;margin-bottom:4px;
}
.da-row:hover{background:var(--bg3)}
.da-avatar{
  width:30px;height:30px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;
}
.da-name{font-size:12px;font-weight:700;flex:1}
.da-id{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.da-badge{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:700;white-space:nowrap}

/* ═══════════════════════════════════════════
   SHELL
═══════════════════════════════════════════ */
#shell{display:none;height:100vh;flex-direction:column}
#shell.on{display:flex}

/* ── ハンバーガー / トグルボタン ── */
.sb-toggle{
  width:36px;height:36px;border-radius:8px;border:1px solid var(--border2);
  background:transparent;color:var(--sub);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;transition:all .15s;margin-right:4px;
}
.sb-toggle:hover{background:var(--bg3);color:var(--text)}

/* Topbar */
.topbar{
  height:48px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px 0 12px;
  flex-shrink:0;position:relative;z-index:100;
}
.tb-logo{
  font-family:'Kaisei Tokumin',serif;font-size:16px;letter-spacing:3px;color:var(--gold);
  padding:0 16px 0 4px;display:flex;align-items:center;gap:8px;
  height:100%;flex-shrink:0;
}
.tb-logo-dot{width:6px;height:6px;background:var(--gold);border-radius:50%}
.tb-context{font-size:11px;color:var(--muted);padding:0 12px;flex:1;letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tb-avatar{
  width:32px;height:32px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;cursor:pointer;
  border:1px solid var(--border2);transition:.15s;
}
.tb-avatar:hover{border-color:var(--gold-dim)}
.tb-name{font-size:12px;font-weight:600}
.tb-role{font-size:10px;color:var(--muted)}
.tb-logout{
  padding:5px 12px;border-radius:6px;border:1px solid var(--border2);
  background:transparent;color:var(--muted);font-size:10px;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;transition:.15s;white-space:nowrap;
}
.tb-logout:hover{border-color:var(--red);color:var(--red)}

/* Body */
.shell-body{display:flex;flex:1;overflow:hidden;position:relative}

/* ── Sidebar オーバーレイ（SP用） ── */
.sb-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:80;
  opacity:0;transition:opacity .25s;
}
.sb-overlay.visible{opacity:1}

/* Sidebar */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--bg2);border-right:1px solid var(--border);
  overflow-y:auto;display:flex;flex-direction:column;padding:12px 0 0;
  transition:width .22s cubic-bezier(.4,0,.2,1), transform .25s cubic-bezier(.4,0,.2,1);
  z-index:90;
}

/* ── 折り畳み状態（PC） ── */
.sidebar.collapsed{width:52px}
.sidebar.collapsed .sb-section{opacity:0;pointer-events:none;height:0;padding:0;overflow:hidden}
.sidebar.collapsed .nav-item span:not(.ni-icon){display:none}
.sidebar.collapsed .ni-badge,.sidebar.collapsed .ni-ext{display:none}
.sidebar.collapsed .nav-item{padding:10px;justify-content:center}
.sidebar.collapsed .ni-icon{width:auto;font-size:18px}
.sidebar.collapsed .sb-foot{opacity:0;height:0;padding:0;overflow:hidden;border:none}

.sb-section{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;
  padding:14px 16px 5px;font-family:'DM Mono',monospace;transition:opacity .15s}
.sb-section:first-child{padding-top:6px}
.nav-item{
  display:flex;align-items:center;gap:9px;padding:9px 14px 9px 16px;
  cursor:pointer;transition:all .12s;color:var(--sub);font-size:12px;border-radius:0;
  position:relative;white-space:nowrap;overflow:hidden;
}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.on{background:var(--gold-bg);color:var(--gold)}
.nav-item.on::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:2px;background:var(--gold);border-radius:0 2px 2px 0}
.ni-icon{font-size:15px;width:22px;text-align:center;flex-shrink:0;transition:font-size .15s}
.ni-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;padding:1px 6px;border-radius:10px;font-weight:700}
.ni-ext{margin-left:auto;font-size:10px;color:var(--muted);opacity:.6}
.sb-foot{margin-top:auto;padding:12px 16px;border-top:1px solid var(--border);font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);transition:opacity .15s}

/* Content */
.content{flex:1;overflow-y:auto;background:var(--bg)}
.page{display:none;padding:24px 28px;max-width:1300px}
.page.on{display:block;animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ═══════════════════════════════════════════
   RESPONSIVE — TABLET (≤900px)
═══════════════════════════════════════════ */
@media(max-width:900px){
  .tb-name,.tb-role{display:none}
  .page{padding:16px 14px}
  .sg-4{grid-template-columns:repeat(2,1fr)}
  .sg-5{grid-template-columns:repeat(2,1fr)}
  .grid-2r{grid-template-columns:1fr}
  .grid-2{grid-template-columns:1fr}
  .qt-grid{grid-template-columns:repeat(3,1fr)}
  .exec-banner{grid-template-columns:repeat(2,1fr)}
}

/* ═══════════════════════════════════════════
   RESPONSIVE — MOBILE (≤768px)
═══════════════════════════════════════════ */
@media(max-width:768px){
  :root{--sidebar-w:260px}

  /* サイドバーをオーバーレイドロワーに変更 */
  .sidebar{
    position:fixed;top:48px;left:0;bottom:0;
    transform:translateX(-100%);
    border-right:none;
    box-shadow:4px 0 24px rgba(0,0,0,.5);
    width:var(--sidebar-w) !important; /* collapsed無効化 */
  }
  .sidebar.sp-open{transform:translateX(0)}

  /* collapsed状態をSPでは無視（ドロワーなので常にフル表示） */
  .sidebar.collapsed.sp-open .sb-section{opacity:1;pointer-events:auto;height:auto;padding:14px 16px 5px;overflow:visible}
  .sidebar.collapsed.sp-open .nav-item span:not(.ni-icon){display:inline}
  .sidebar.collapsed.sp-open .ni-badge,.sidebar.collapsed.sp-open .ni-ext{display:inline-flex}
  .sidebar.collapsed.sp-open .nav-item{padding:9px 14px 9px 16px;justify-content:flex-start}
  .sidebar.collapsed.sp-open .ni-icon{width:22px;font-size:15px}
  .sidebar.collapsed.sp-open .sb-foot{opacity:1;height:auto;padding:12px 16px;overflow:visible;border-top:1px solid var(--border)}

  .sb-overlay{display:block}

  .tb-logo{font-size:14px;letter-spacing:2px;padding:0 10px 0 0}
  .tb-context{display:none}
  .tb-logout{padding:5px 8px;font-size:9px}
  .tb-right{gap:6px}

  .page{padding:12px 10px}
  .sg-4,.sg-5,.sg-3{grid-template-columns:repeat(2,1fr)}
  .grid-2r,.grid-2,.grid-3{grid-template-columns:1fr}
  .qt-grid{grid-template-columns:repeat(3,1fr)}
  .exec-banner{grid-template-columns:1fr 1fr}

  /* テーブルは横スクロール */
  .card-body{overflow-x:auto}
  .tbl{min-width:500px}

  /* ランク・ポイントページ */
  .rank-table-wrap{overflow-x:auto}
  .rank-table-wrap table{min-width:420px}

  /* メッセージレイアウト */
  .msg-layout{grid-template-columns:1fr;height:auto}
  .msg-list{max-height:200px}
  .row2{grid-template-columns:1fr}
}

/* ═══════════════════════════════════════════
   COMMON COMPONENTS
═══════════════════════════════════════════ */
.page-hdr{margin-bottom:20px}
.page-title{font-size:20px;font-weight:700;letter-spacing:-.3px}
.page-sub{font-size:11px;color:var(--sub);margin-top:3px}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:16px}
.card-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px 0;
}
.ch-title{font-size:12px;font-weight:700;letter-spacing:.3px}
.card-body{padding:14px 18px}

/* Stats */
.stats-grid{display:grid;gap:12px;margin-bottom:20px}
.sg-4{grid-template-columns:repeat(4,1fr)}
.sg-5{grid-template-columns:repeat(5,1fr)}
.sg-3{grid-template-columns:repeat(3,1fr)}
@media(max-width:1100px){.sg-5{grid-template-columns:repeat(3,1fr)}.sg-4{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:default}
.stat-ico{font-size:18px;margin-bottom:8px}
.stat-val{font-size:24px;font-weight:800;line-height:1;margin-bottom:4px}
.stat-label{font-size:11px;color:var(--sub)}
.stat-sub{font-size:10px;color:var(--muted);margin-top:3px}

/* Grid layouts */
.grid-2r{display:grid;grid-template-columns:1fr 340px;gap:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:1050px){.grid-2r{grid-template-columns:1fr}.grid-2{grid-template-columns:1fr}}

/* Tables */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:9px 12px;text-align:left;font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-family:'DM Mono',monospace;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border)}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:var(--bg3)}
.mono{font-family:'DM Mono',monospace}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;transition:all .15s;text-decoration:none;white-space:nowrap}
.btn-primary{background:var(--gold);color:#000}
.btn-primary:hover{background:var(--gold2)}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--sub)}
.btn-ghost:hover{border-color:var(--gold-dim);color:var(--gold);background:var(--gold-bg)}
.btn-sm{padding:5px 11px;font-size:11px}
.btn-red{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);color:var(--red)}
.btn-red:hover{background:rgba(248,113,113,.2)}
.btn-green{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);color:var(--green)}
.btn-green:hover{background:rgba(52,211,153,.18)}
.btn-ext::after{content:'↗';font-size:10px;margin-left:2px;opacity:.6}

/* Pills */
.pill{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.pill-green{background:rgba(52,211,153,.12);color:var(--green)}
.pill-blue{background:rgba(79,156,249,.12);color:var(--blue)}
.pill-orange{background:rgba(251,146,60,.12);color:var(--orange)}
.pill-red{background:rgba(248,113,113,.12);color:var(--red)}
.pill-purple{background:rgba(167,139,250,.12);color:var(--purple)}
.pill-gold{background:rgba(201,168,76,.12);color:var(--gold)}
.pill-muted{background:rgba(74,82,112,.15);color:var(--muted)}

/* Alert bars */
.alert-bar{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  border-radius:9px;font-size:12px;margin-bottom:10px;
}
.ab-red{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);color:var(--red)}
.ab-orange{background:rgba(251,146,60,.08);border:1px solid rgba(251,146,60,.25);color:var(--orange)}
.ab-blue{background:rgba(79,156,249,.08);border:1px solid rgba(79,156,249,.25);color:var(--blue)}
.ab-gold{background:var(--gold-bg);border:1px solid var(--gold-dim);color:var(--gold)}

/* Progress */
.prog-wrap{height:4px;background:var(--border2);border-radius:2px;margin-top:6px;width:100%}
.prog-fill{height:100%;border-radius:2px;transition:width .4s}

/* Feed */
.feed-item{display:flex;align-items:flex-start;gap:11px;padding:10px 0;border-bottom:1px solid var(--border)}
.feed-item:last-child{border-bottom:none}
.fi-dot{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.fi-msg{font-size:12px}
.fi-time{font-size:10px;color:var(--muted);margin-top:2px}

/* Rank display */
.rank-display{display:flex;align-items:center;gap:14px}
.rank-ring-wrap{position:relative;width:60px;height:60px;flex-shrink:0}
.rank-ring-wrap svg{width:60px;height:60px;transform:rotate(-90deg)}
.rank-ring-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:20px}

/* Form elements */
.fg{margin-bottom:14px}
.fg label{display:block;font-size:10px;color:var(--sub);letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px}
.fg input,.fg select,.fg textarea{
  width:100%;padding:9px 12px;background:var(--bg3);
  border:1px solid var(--border2);border-radius:8px;
  color:var(--text);font-size:12px;font-family:'Noto Sans JP',sans-serif;
  outline:none;transition:border-color .15s;
}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gold)}
.fg textarea{resize:vertical;min-height:80px;line-height:1.7}
.fg input::placeholder,.fg textarea::placeholder{color:var(--muted)}
.fg select{cursor:pointer}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* Exec banner */
.exec-banner{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;
}
.exec-btn{
  display:flex;align-items:center;gap:10px;padding:13px 16px;
  background:linear-gradient(135deg,rgba(201,168,64,.1),rgba(201,168,64,.04));
  border:1px solid rgba(201,168,64,.25);border-radius:10px;
  cursor:pointer;transition:all .15s;
}
.exec-btn:hover{border-color:var(--gold-dim);background:linear-gradient(135deg,rgba(201,168,64,.16),rgba(201,168,64,.07));transform:translateY(-1px)}
.exec-btn-icon{font-size:18px}
.exec-btn-label{font-size:11px;font-weight:700;color:var(--gold)}

/* Quick tools grid (agent) */
.qt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.qt-card{
  background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:13px;text-align:center;cursor:pointer;transition:all .15s;
}
.qt-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.qt-icon{font-size:21px;margin-bottom:6px}
.qt-label{font-size:11px;font-weight:700}

/* ═══════════════════════════════════════════
   PARTNER SPECIFIC
═══════════════════════════════════════════ */
.pt-stat{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:16px;cursor:pointer;transition:all .15s;text-align:center;
}
.pt-stat:hover{border-color:var(--border2);transform:translateY(-2px)}

/* Messages */
.msg-layout{display:grid;grid-template-columns:260px 1fr;gap:0;border:1px solid var(--border);border-radius:12px;overflow:hidden;height:500px}
.msg-list{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto}
.msg-contact{
  display:flex;align-items:center;gap:10px;padding:12px 14px;
  border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;
}
.msg-contact:hover{background:var(--bg3)}
.msg-contact.on{background:var(--gold-bg)}
.mc-avatar{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.mc-name{font-size:12px;font-weight:700}
.mc-last{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
.mc-time{font-size:10px;color:var(--muted);white-space:nowrap}
.mc-unread{background:var(--gold);color:#000;font-size:9px;padding:1px 5px;border-radius:8px;font-weight:700}
.msg-main{display:flex;flex-direction:column;background:var(--card)}
.msg-hdr{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.msg-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg-bubble{max-width:72%;padding:9px 13px;border-radius:12px;font-size:12px;line-height:1.6;word-break:break-word}
.msg-me{background:var(--gold);color:#000;margin-left:auto;border-radius:12px 12px 3px 12px}
.msg-them{background:var(--bg3);border:1px solid var(--border);border-radius:12px 12px 12px 3px}
.msg-time{font-size:10px;color:var(--muted);margin-top:2px;text-align:right}
.msg-them + .msg-time{text-align:left}
.msg-footer{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--border);flex-shrink:0}
.msg-input{
  flex:1;padding:8px 12px;background:var(--bg3);border:1px solid var(--border2);
  border-radius:8px;color:var(--text);font-size:12px;font-family:'Noto Sans JP',sans-serif;
  outline:none;resize:none;
}
.msg-input:focus{border-color:var(--gold)}

/* Stepper */
.stepper{display:flex;align-items:center;gap:0}
.step{display:flex;align-items:center}
.step-dot{
  width:18px;height:18px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;
}
.step-dot.done{background:var(--green);color:#000}
.step-dot.active{background:var(--blue);color:#fff}
.step-dot.wait{background:var(--border2);color:var(--muted)}
.step-line{width:16px;height:2px;background:var(--border2)}
.step-line.done{background:var(--green)}

/* Code display */
.code-box{
  background:var(--bg3);border:1px solid var(--gold-dim);border-radius:12px;
  padding:18px;margin-bottom:12px;
}
.code-big{font-family:'DM Mono',monospace;font-size:26px;font-weight:700;color:var(--gold);letter-spacing:3px;margin:8px 0}
.code-share-btns{display:flex;gap:8px;flex-wrap:wrap}

/* HQ Role badge */
.hq-role-badge{
  display:inline-block;font-size:10px;padding:2px 9px;border-radius:5px;margin-left:10px;vertical-align:middle;font-weight:700;
}
.hrb-exec{background:rgba(201,168,64,.15);color:var(--gold)}
.hrb-manager{background:rgba(79,156,249,.12);color:var(--blue)}
.hrb-staff{background:rgba(52,211,153,.1);color:var(--green)}

/* Matching page */
.match-card{
  background:var(--card);border:1px solid var(--border);border-radius:11px;
  padding:14px;cursor:pointer;transition:all .15s;margin-bottom:10px;
}
.match-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.match-card.selected{border-color:var(--gold)}
.mc-status-bar{height:3px;border-radius:2px;margin:-14px -14px 12px;background:var(--border)}
.mc-status-open{background:var(--blue)}
.mc-status-done{background:var(--green)}
.mc-status-pending{background:var(--orange)}

/* ═══════════════════════════════════════════
   SCROLLBAR & UTILITIES
═══════════════════════════════════════════ */
.text-gold{color:var(--gold)}
.text-blue{color:var(--blue)}

.text-orange{color:var(--orange)}

// ── XSSエスケープ関数 ──────────────────────────────────────────────────────
function escHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#x27;');
}
// ─────────────────────────────────────────────────────────────────────────
</script>
<script>
// ════════════════════════════════════════════════════════════
//  USERS & AUTH  ← USERS定義は db.js に一本化（重複定義を排除）
// ════════════════════════════════════════════════════════════

// HQ role hierarchy
const HQ_LEVEL = { exec:3, manager:2, staff:1 };

let session = null;
let currentPage = 'dashboard';

// ─ Restore session ─
(function(){
  const s = JSON.parse(sessionStorage.getItem('coreto_session') || 'null');
  if (s && (!s.sessionToken || s.sessionToken.length !== 64)) {
    // 古いセッション（整合性トークンなし）を無効化
    sessionStorage.removeItem('coreto_session');
  }
  // セッション有効期限チェック（8時間）
  if (s && s.loginAt) {
    var _la = new Date(s.loginAt).getTime();
    if (isNaN(_la) || (Date.now() - _la) > 28800000) {
      sessionStorage.removeItem('coreto_session');
    }
  }
  if(s && USERS[s.userId] && USERS[s.userId].type === s.type) {
    // Merge sennin overrides from localStorage (HQが変更した場合)
    const senninOverrides = JSON.parse(localStorage.getItem('coreto_sennin_overrides') || '{}');
    const baseSennin = USERS[s.userId]?.sennin || false;
    const senninVal  = (s.userId in senninOverrides) ? senninOverrides[s.userId] : baseSennin;
    session = {...USERS[s.userId], userId: s.userId, hqRole: s.hqRole || USERS[s.userId]?.hqRole || null, sennin: senninVal};
    window._SESSION = s;  // 他ページのauth guardと共有
    document.getElementById('login-screen').style.display = 'none';
    initShell();
  }
})();

function doLogin() {
  const id = document.getElementById('lf-id').value.trim().padStart(5,'0');
  const pw = document.getElementById('lf-pw').value;
  const errEl = document.getElementById('lf-err');
  errEl.textContent = '';
  const u = USERS[id] || USERS[document.getElementById('lf-id').value.trim()];
  if (!u) { errEl.textContent = 'IDまたはパスワードが正しくありません'; return; }

  document.getElementById('lf-loading').style.display = 'flex';
  const actualId = Object.keys(USERS).find(k => USERS[k] === u) || id;

  // SHA-256(salt:pw) でpwHash検証 → SHA-256(uid:loginAt:pwHash) でsessionToken生成
  async function sha256hex(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }

  (async () => {
    const computed = await sha256hex((u.pwSalt||'') + ':' + pw);
    if (computed !== u.pwHash) {
      document.getElementById('lf-loading').style.display = 'none';
      errEl.textContent = 'IDまたはパスワードが正しくありません';
      return;
    }
    const loginAt = new Date().toISOString();
    const token   = await sha256hex(actualId + ':' + loginAt + ':' + u.pwHash);
    session = {...u, userId: actualId};
    const sess = {
      agId: actualId, userId: actualId, name: u.name,
      rank: u.rank || 'HQ', rankKey: u.rankKey || 'hq',
      type: u.type, hqRole: u.hqRole || null,
      sennin: u.sennin || false,
      lineLinked: false,
      loginAt: loginAt,
      sessionToken: token,
    };
    sessionStorage.setItem('coreto_session', JSON.stringify(sess));
    window._SESSION = sess;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('lf-loading').style.display = 'none';
    initShell();
  })();
}

function doLogout() {
  if(!confirm('ログアウトしますか？')) return;
  sessionStorage.removeItem('coreto_session');
  session = null;
  document.getElementById('shell').className = '';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('lf-id').value = '';
  document.getElementById('lf-pw').value = '';
  document.getElementById('lf-err').textContent = '';
  document.getElementById('content').innerHTML = '';
  document.getElementById('sidebar').innerHTML = '';
}

function fillDemo(id) {
  document.getElementById('lf-id').value = id;
  document.getElementById('lf-pw').value = 'coreto2026';
  document.getElementById('lf-err').textContent = '';
}
function toggleDemo(el) {
  const panel = document.getElementById('lf-demo-panel');
  panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
  el.textContent = panel.style.display === 'block' ? '▲ デモアカウント一覧' : '▼ デモアカウント一覧';
}

// ════════════════════════════════════════════════════════════
//  SHELL INIT
// ════════════════════════════════════════════════════════════
function initShell() {
  const u = session;
  const shell = document.getElementById('shell');
  shell.classList.add('on');

  // Topbar
  document.getElementById('tb-avatar').textContent = u.avatar;
  document.getElementById('tb-avatar').style.cssText = `background:${u.color}18;color:${u.color};border:1px solid ${u.color}30`;
  document.getElementById('tb-name').textContent = u.name;
  document.getElementById('tb-role').textContent =
    u.type==='hq' ? `HQ ${u.hqRole==='exec'?'統括':u.hqRole==='manager'?'管理職':'スタッフ'}` :
    u.type==='re' ? `不動産AG — ${u.rank}` :
    u.type==='hr' ? `人材紹介AG — ${u.rank}` : 'パートナー';
  const ctxMap = {hq:'管理ダッシュボード', re:'エージェントポータル', hr:'HRエージェントポータル', pt:'パートナーダッシュボード'};
  document.getElementById('tb-context').textContent = ctxMap[u.type] || '';

  buildSidebar();
  buildContent();
}

// ════════════════════════════════════════════════════════════
//  NAVIGATION
// ════════════════════════════════════════════════════════════
function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  const nav = getSidebarNav();

  nav.forEach(section => {
    const label = document.createElement('div');
    label.className = 'sb-section';
    label.textContent = section.section;
    sb.appendChild(label);

    section.items.forEach(item => {
      if (item.hqOnly && window._SESSION && window._SESSION.type !== 'hq') return;
      const el = document.createElement('div');
      el.className = 'nav-item' + (item.id === currentPage ? ' on' : '');
      el.id = 'nav-' + item.id;
      let inner = `<div class="ni-icon">${item.icon}</div><span>${item.label}</span>`;
      if(item.badge) inner += `<span class="ni-badge">${item.badge}</span>`;
      if(item.ext)   inner += `<span class="ni-ext">↗</span>`;
      el.innerHTML = inner;

      if(item.ext) {
        // External pages: use same-tab to preserve sessionStorage
        el.onclick = () => { if(isMobile()) closeSidebarMobile(); location.href = item.url; };
      } else if(item.onclick) {
        // eval() を安全な関数ディスパッチテーブルに置き換え（V-10 XSS修正）
        const ONCLICK_FNS = {
          'openSenninMgmt()': () => typeof openSenninMgmt === 'function' && openSenninMgmt(),
        };
        const fn = ONCLICK_FNS[item.onclick];
        if (fn) {
          el.onclick = fn;
        } else {
          console.warn('[Hub] 未知のonclick:', item.onclick);
        }
      } else if(item.id === 'ref-link') {
        el.onclick = () => openRefModal();
      } else {
        el.onclick = () => { goPage(item.id); if(isMobile()) closeSidebarMobile(); };
      }
      sb.appendChild(el);
    });
  });

  const foot = document.createElement('div');
  foot.className = 'sb-foot';
  foot.innerHTML = `ID: ${session.userId}<br><span style="opacity:.5">v3.0 / 2026.02</span>`;
  sb.appendChild(foot);
}

function getSidebarNav() {
  const t = session.type;
  const role = session.hqRole || '';

  if(t === 'hq') {
    const nav = [];
    nav.push({ section:'メイン', items:[
      { id:'dashboard', icon:'📊', label:'ダッシュボード' },
    ]});

    if(HQ_LEVEL[role] >= 3) { // exec only
      nav.push({ section:'経営陣', items:[
        { id:'exec-dashboard', icon:'📈', label:'収益ダッシュボード', url:'coreto-exec-dashboard.html', ext:true },
        { id:'agent-mgmt',     icon:'👥', label:'全エージェント管理', url:'coreto-agent-mgmt.html', ext:true },
        { id:'network-tree',   icon:'🌐', label:'紹介ネットワーク図', url:'coreto-network-tree.html', ext:true },
      ]});
    }

    nav.push({ section:'業務', items:[
      { id:'matching',  icon:'🎯', label:'マッチング' },
      { id:'screening', icon:'📋', label:'書類審査・スクリーニング', url:'coreto-screening.html', ext:true },
      { id:'itsetsu-hq',  icon:'📝', label:'IT重説 管理・介入', url:'coreto-itsetsu-hq.html', ext:true },
      { id:'case-mgmt',   icon:'🗂', label:'案件管理・介入', url:'coreto-case-mgmt.html', ext:true },
      { id:'sale-report', icon:'📄', label:'売買報告書（受付・承認）', url:'coreto-sale-report.html', ext:true },
      { id:'early-quit',icon:'⚠️', label:'早期退職アラート', badge:'2', url:'coreto-early-quit.html', ext:true },
      { id:'kyc',       icon:'🪪', label:'KYC審査', badge:'4', url:'coreto-hq-kyc.html', ext:true },
    ]});

    if(HQ_LEVEL[role] >= 2) { // manager+
      nav.push({ section:'報酬・支払い', items:[
        { id:'payroll',  icon:'💰', label:'月次報酬確定', url:'coreto-payroll.html', ext:true },
        { id:'payment',  icon:'💴', label:'支払明細', url:'coreto-payment.html', ext:true },
        { id:'instant-pay', icon:'⚡', label:'即時払い申請', badge:'3', url:'coreto-instant-pay.html', ext:true },
      ]});
      nav.push({ section:'エージェント管理', items:[
        { id:'id-manager',  icon:'🔢', label:'ID採番・招待URL発行', url:'coreto-id-manager.html', ext:true },
        { id:'hq-receipt', icon:'🧾', label:'発行管理・一括出力', url:'coreto-hq-receipt.html', ext:true },
        { id:'codes',      icon:'🔖', label:'紹介コード管理', url:'coreto-codes.html', ext:true },
        { id:'pt-mgmt',    icon:'🤝', label:'パートナー管理', url:'coreto-partner-feed.html', ext:true },
        { id:'rbac',       icon:'🛡', label:'権限管理', url:'coreto-admin-rbac.html', ext:true },
        { id:'sennin-mgmt', icon:'🔖', label:'専任宅建士 管理', onclick:'openSenninMgmt()' },
      ]});
    }

    nav.push({ section:'ツール', items:[
      { id:'label',   icon:'📮', label:'ラベル印刷',   url:'coreto-thermal-label.html', ext:true },
      { id:'receive', icon:'📬', label:'書類受取',     url:'coreto-barcode-scan.html#receive', ext:true },
      { id:'barcode', icon:'📡', label:'スキャン・追跡', url:'coreto-barcode-scan.html', ext:true },
    ]});
    nav.push({ section:'紹介', items:[
      { id:'ref-link', icon:'🔗', label:'紹介リンク発行' },
    ]});
    return nav;
  }

  if(t === 're') {
    return [

//  SIDEBAR TOGGLE
// ════════════════════════════════════════════════════════════
const isMobile = () => window.innerWidth <= 768;

function toggleSidebar() {
  if (isMobile()) {
    // SP: ドロワー開閉
    const sb = document.getElementById('sidebar');
    const ov = document.getElementById('sb-overlay');
    const isOpen = sb.classList.contains('sp-open');
    if (isOpen) {
      sb.classList.remove('sp-open');
      ov.classList.remove('visible');
      setTimeout(() => { ov.style.pointerEvents = 'none'; }, 250);
    } else {
      ov.style.pointerEvents = 'auto';
      sb.classList.add('sp-open');
      ov.classList.add('visible');
    }
  } else {
    // PC: 折り畳み
    const sb = document.getElementById('sidebar');
    sb.classList.toggle('collapsed');
    localStorage.setItem('coreto_sb_collapsed', sb.classList.contains('collapsed') ? '1' : '0');
  }
}

function closeSidebarMobile() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sb-overlay');
  sb.classList.remove('sp-open');
  ov.classList.remove('visible');
  setTimeout(() => { ov.style.pointerEvents = 'none'; }, 250);
}

// 起動時にPC折り畳み状態を復元
(function restoreSidebarState() {
  if (!isMobile() && localStorage.getItem('coreto_sb_collapsed') === '1') {
    const sb = document.getElementById('sidebar');
    if (sb) sb.classList.add('collapsed');
  }
})();

function goPage(pageId) {
  currentPage = pageId;
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('on', n.id === 'nav-' + pageId);
  });
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  const pg = document.getElementById('page-' + pageId);
  if(pg) {
    pg.classList.add('on');
  } else {
    buildPageContent(pageId);
  }
}

function openSenninMgmt() {
  const overrides = JSON.parse(localStorage.getItem('coreto_sennin_overrides') || '{}');
  const agents = Object.entries(USERS)
    .filter(([id, u]) => u.type === 're' || u.type === 'hr')
    .map(([id, u]) => {
      const base = u.sennin || false;
      const cur  = (id in overrides) ? overrides[id] : base;
      return { id, name: u.name, type: u.type.toUpperCase(), rank: u.rank || '', cur };
    });

  const rows = agents.map(a => {
    const checked = a.cur ? 'checked' : '';
    const badge   = a.cur
      ? '<span style="font-size:9px;padding:1px 7px;border-radius:10px;background:rgba(167,139,250,.15);color:#a78bfa">専任</span>'
      : '<span style="font-size:9px;padding:1px 7px;border-radius:10px;background:rgba(62,69,101,.3);color:#5a6280">一般</span>';
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid #1e2435">

      <label style="position:relative;display:inline-block;width:36px;height:20px;flex-shrink:0">
        <input type="checkbox" ${checked} data-uid="${a.id}"
          style="opacity:0;width:0;height:0;position:absolute"
          onchange="toggleSennin('${a.id}',this.checked)">
        <span style="position:absolute;inset:0;background:${a.cur?'rgba(167,139,250,.7)':'#1e2435'};border-radius:20px;transition:.2s;cursor:pointer"
          id="sw-${a.id}">
          <span style="position:absolute;left:${a.cur?'18':'2'}px;top:2px;width:16px;height:16px;background:white;border-radius:50%;transition:.2s" id="sw-knob-${a.id}"></span>
        </span>
      </label>
    </div>`;
  }).join('');

  const overlay = document.createElement('div');
  overlay.id = 'sennin-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:9999;padding:16px';
  overlay.innerHTML = `
    <div style="background:#11141f;border:1px solid #2a3050;border-radius:16px;width:min(480px,100%);max-height:80vh;display:flex;flex-direction:column;font-family:'Noto Sans JP',sans-serif">
      <div style="padding:16px 20px;border-bottom:1px solid #1e2435;display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:#c9a840">🔖 専任宅建士 管理</div>
          <div style="font-size:10px;color:#5a6280;margin-top:2px">有効にすると IT重説・スケジュール管理 タブが表示されます</div>
        </div>
        <button onclick="document.getElementById('sennin-overlay').remove()"
          style="background:transparent;border:none;color:#5a6280;font-size:20px;cursor:pointer;padding:4px 8px">✕</button>
      </div>
      <div style="overflow-y:auto;flex:1">${rows}</div>
      <div style="padding:12px 16px;border-top:1px solid #1e2435;font-size:10px;color:#5a6280">

      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function toggleSennin(uid, val) {
  const overrides = JSON.parse(localStorage.getItem('coreto_sennin_overrides') || '{}');
  overrides[uid] = val;
  localStorage.setItem('coreto_sennin_overrides', JSON.stringify(overrides));
  // Update toggle visual immediately
  const sw = document.getElementById('sw-' + uid);
  const knob = document.getElementById('sw-knob-' + uid);
  if (sw) sw.style.background = val ? 'rgba(167,139,250,.7)' : '#1e2435';
  if (knob) knob.style.left = val ? '18px' : '2px';
}

function buildContent() {
  const cnt = document.getElementById('content');
  cnt.innerHTML = '';
  const t = session.type;

  if(t === 'hq') {
    cnt.innerHTML = hqDashPage() + hqMatchingPage();
  } else if(t === 're') {
    cnt.innerHTML = reDashPage() + reMyPage() + rankPage() + paymentPage();
  } else if(t === 'hr') {
    cnt.innerHTML = hrDashPage() + hrCasesPage() + rankPage() + paymentPage();
  } else if(t === 'pt') {
    cnt.innerHTML = ptDashPage() + ptCasesPage() + ptCodePage() + ptRewardsPage() + ptRankPage() + ptRegisterPage();
  }

  goPage('dashboard');
}

function buildPageContent(pageId) {
  // Pages not pre-built — show placeholder
  const cnt = document.getElementById('content');
  const div = document.createElement('div');
  div.className = 'page on';
  div.id = 'page-' + pageId;
  div.innerHTML = `<div class="page-hdr"><div class="page-title">${pageId}</div></div><p style="color:var(--muted)">このページは準備中です。</p>`;
  cnt.appendChild(div);
}

function rankPage() {

    { icon:'🥈', label:'Silver',   col:'var(--green)',  fee:'¥490',          rate_re:'67.5%', rate_hr:'47.5%', pts:'10〜19pt' },
    { icon:'🥉', label:'Bronze',   col:'var(--orange)', fee:'¥980',          rate_re:'65%',  rate_hr:'45%',  pts:'0〜9pt'  },
  ];

  const feeMap  = {platinum:'¥0（永久無料）', gold:'¥0', silver:'¥490', bronze:'¥980'};
  const rateMap = {platinum:'75%', gold:'70%', silver:'67.5%', bronze:'65%'};

  // ── Progress bar HTML (built without nested template literals) ──
  const curPtsMap = {platinum:33, gold:22, silver:12, bronze:5};
  const curPts = curPtsMap[u.rankKey] || 5;
  const thresholds = [
    {pts:0,  label:'Bronze',   icon:'🥉', col:'var(--orange)'},
    {pts:10, label:'Silver',   icon:'🥈', col:'var(--green)'},
    {pts:20, label:'Gold',     icon:'🥇', col:'var(--gold)'},
    {pts:30, label:'Platinum', icon:'💎', col:'var(--purple)'},
  ];
  const MAX = 34;
  const pct = v => Math.min(97, Math.round(v / MAX * 100));
  const next = thresholds.find(t => t.pts > curPts);
  const needed = next ? next.pts - curPts : 0;

  const nextLabel = next
    ? '<div style="font-size:12px;color:var(--muted)">次のランク <strong style="color:' + next.col + '">' + next.icon + ' ' + next.label + '</strong> まで <strong style="color:var(--text)">' + needed + ' pt</strong></div>'
    : '<div style="font-size:12px;color:var(--purple)">💎 最高ランク到達済み</div>';

  const markers = thresholds.map(t => {
    const active = curPts >= t.pts;
    return '<div style="position:absolute;top:0;bottom:0;left:' + pct(t.pts) + '%;transform:translateX(-50%);z-index:2">'
      + '<div style="width:2px;height:100%;background:' + (active ? 'rgba(255,255,255,.5)' : 'var(--border2)') + ';border-radius:1px"></div>'
      + '</div>';
  }).join('');

  const labels = thresholds.map(t => {
    const active = curPts >= t.pts;
    return '<div style="position:absolute;left:' + pct(t.pts) + '%;transform:translateX(-50%);text-align:center">'
      + '<div style="font-size:16px">' + t.icon + '</div>'
      + '<div style="font-size:9px;font-weight:700;color:' + (active ? t.col : 'var(--muted)') + ';' + (active ? '' : 'opacity:.5') + '">' + t.pts + 'pt</div>'
      + '</div>';
  }).join('');

  const progressHTML =
    '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px">'
    + '<div><span style="font-size:32px;font-weight:800;color:' + rankCol + '">' + curPts + '</span><span style="font-size:13px;color:var(--sub);margin-left:5px">pt</span></div>'

    + '<div style="position:relative;height:20px;margin-bottom:10px">'
    +   '<div style="position:absolute;inset:0;background:#0a0c14;border-radius:10px;overflow:hidden">'
    +     '<div style="height:100%;width:' + pct(curPts) + '%;background:linear-gradient(90deg,var(--orange),' + rankCol + ');border-radius:10px">'
    +       '<div style="position:absolute;right:0;top:0;bottom:0;width:3px;background:rgba(255,255,255,.35);border-radius:0 2px 2px 0"></div>'
    +     '</div>'
    +   '</div>'
    +   markers
    + '</div>'
    + '<div style="position:relative;height:42px">' + labels + '</div>';

  const rankTableRows = RANKS.map(r => {
    const isCur = r.label === u.rank;
    return '<tr style="' + (isCur ? 'background:var(--card2)' : '') + '">'
      + '<td><span style="font-weight:800;color:' + r.col + '">' + r.icon + ' ' + r.label + '</span>'
      + (isCur ? ' <span style="font-size:9px;color:var(--sub)">← 現在</span>' : '') + '</td>'
      + '<td class="mono fw-700" style="color:' + r.col + '">' + r.pts + '</td>'
      + '<td class="mono" style="white-space:nowrap">' + r.fee + '</td>'
      + '<td class="mono" style="color:' + r.col + ';font-weight:700">' + r.rate_re + '</td>'
      + '<td class="mono" style="color:' + r.col + ';font-weight:700">' + r.rate_hr + '</td>'
      + '</tr>';
  }).join('');

  return `<div class="page" id="page-rank">
  <div class="page-hdr"><div class="page-title">ランク・ポイント</div><div class="page-sub">ランク昇格条件（毎月1日 自動判定）</div></div>

      <div style="overflow-x:auto">
        <table class="tbl">
          <thead><tr><th>条件</th><th style="text-align:right">付与</th></tr></thead>

            <tr><td>パートナー紹介案件：手数料 100,000円ごと<br><span style="font-size:10px;color:var(--muted)">AG・パートナーそれぞれに付与</span></td><td class="mono fw-700" style="text-align:right;color:var(--blue)">0.5 pt</td></tr>

        + '<div style="font-size:10px;color:var(--gold);margin-top:2px">→ ' + fmt(Math.round(c.fee*rate)) + '</div>'
        + '</div></div>';
    });
    caseRows += '<div style="display:flex;justify-content:space-between;padding:10px 16px;font-size:12px;font-weight:700;background:rgba(201,168,76,.05)">'
      + '<span>合計</span><span style="color:var(--gold)">' + fmt(gross) + '</span></div>';
  } else {
    caseRows = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">今月の成約案件はまだありません</div>';
  }

  // Build history rows
  var histRows = '';
  if (history.length) {
    history.forEach(function(h) {
      histRows += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;padding:10px 14px;border-bottom:1px solid var(--border);font-size:11px;align-items:center">'
        + '<div style="color:var(--muted)">' + h.month + '</div>'
        + '<div style="text-align:right;color:var(--sub)">税引前 ' + fmt(h.gross) + '</div>'
        + '<div style="text-align:right;font-weight:700;color:var(--gold)">' + fmt(h.net) + '</div>'
        + '</div>';
    });
  } else {
    histRows = '<div style="padding:16px;text-align:center;color:var(--muted);font-size:11px">履歴なし</div>';
  }

  var html = '<div class="page" id="page-payment">';
  html += '<div class="page-hdr"><div class="page-title">&#x1F4B0; 報酬・振込明細</div><div class="page-sub">2月分（確定）</div></div>';

  // KPI
  html += '<div class="stats-grid sg-4" style="margin-bottom:20px">'
    + '<div class="stat"><div class="stat-ico">&#x1F4CB;</div><div class="stat-val text-gold">' + cases.length + '</div><div class="stat-label">今月成約件数</div></div>'
    + '<div class="stat"><div class="stat-ico">&#x1F4B4;</div><div class="stat-val text-sub" style="font-size:16px">' + fmt(totalFee) + '</div><div class="stat-label">手数料合計</div><div class="stat-sub">報酬率 ' + (rate*100).toFixed(1) + '%</div></div>'
    + '<div class="stat"><div class="stat-ico">&#x1F4B0;</div><div class="stat-val text-gold" style="font-size:18px">' + fmt(net) + '</div><div class="stat-label">手取り振込額</div><div class="stat-sub text-sub">源泉 ' + fmt(tax) + '</div></div>'
    + '<div class="stat"><div class="stat-ico">&#x1F4C5;</div><div class="stat-val text-green" style="font-size:15px">' + payStr + '</div><div class="stat-label">振込予定日</div></div>'
    + '</div>';

  html += '<div class="grid-2">';

  // Left col
  html += '<div>'
    + '<div class="card" style="margin-bottom:14px">'
    + '<div class="card-hdr"><div class="ch-title">今月の成約案件</div></div>'
    + '<div class="card-body" style="padding:0">' + caseRows + '</div>'
    + '</div>'
    + '<div class="card">'
    + '<div class="card-hdr"><div class="ch-title">報酬内訳</div></div>'
    + '<div class="card-body">'
    + payRow('手数料合計（税込）', fmt(totalFee), 'var(--sub)')
    + payRow('報酬率', (rate*100).toFixed(1)+'%（'+u.rank+'）', 'var(--sub)')
    + payRow('報酬（税引前）', fmt(gross), 'var(--text)')
    + payRow('源泉徴収（10.21%）', '− '+fmt(tax), 'var(--red)')
    + payRow('手取り振込額', fmt(net), 'var(--gold)')
    + '</div></div>'
    + '</div>';

  // Right col
  html += '<div>'
    + '<div style="background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(201,168,76,.08));border:1px solid rgba(201,168,76,.4);border-radius:12px;padding:16px;margin-bottom:14px">'
    + '<div style="font-size:13px;font-weight:700;color:var(--gold);margin-bottom:2px">&#x26A1; 即時払い</div>'
    + '<div style="font-size:10px;color:var(--muted);margin-bottom:12px">振込日（25日）を待たずに即日受け取れます</div>'
    + '<div style="background:rgba(0,0,0,.25);border-radius:8px;padding:12px 14px;margin-bottom:12px">'
    + '<div style="font-size:10px;color:var(--muted);margin-bottom:4px">現在の出金可能額</div>'
    + '<div style="font-size:22px;font-weight:900;color:var(--gold);font-family:\'DM Mono\',monospace;margin-bottom:4px">' + fmt(Math.round(net * 0.85)) + '</div>'
    + '<div style="font-size:11px;color:var(--sub)">' + fmt(Math.round(net * 0.85)) + ' がすぐに出金可能です</div>'
    + '</div>'
    + '<button onclick="openInstantPay()" style="width:100%;padding:10px;background:var(--gold);color:#0d0f14;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit">&#x26A1; 即時払い申請ページへ ↗</button>'
    + '</div>'
    + '<div class="card">'
    + '<div class="card-hdr"><div class="ch-title">過去の振込履歴</div></div>'
    + '<div class="card-body" style="padding:0">' + histRows + '</div>'
    + '</div>'
    + '</div>';

  html += '</div></div>';
  return html;
}

function ptRenderCases(filter) {
  const rows = PT_CASES.filter(c => filter === 'all' ? true : filter === 'active' ? c.status === 'active' : c.status === 'done');
  return `<div style="overflow-x:auto"><table class="tbl">
    <thead><tr><th>クライアント</th><th>物件</th><th>担当AG</th><th>日付</th><th>進捗</th><th>報酬</th></tr></thead>
    <tbody>
      ${rows.map(c => `
      <tr style="cursor:pointer" onclick="ptShowCaseDetail(${c.id})"
          onmouseover="this.style.background='rgba(255,255,255,.03)'" onmouseout="this.style.background=''">
        <td class="fw-700">${escHtml(c.client)}</td>
        <td style="font-size:11px;color:var(--sub)">${escHtml(c.prop)}</td>
        <td style="font-size:11px">${c.ag}</td>
        <td style="font-size:11px;color:var(--muted)">${c.date}</td>
        <td>${ptStepperHtml(c.step)}</td>
        <td class="mono" style="color:${c.reward?'var(--gold)':'var(--muted)'};font-weight:${c.reward?700:400}">${c.reward?PT_YEN(c.reward):'—'}</td>
      </tr>`).join('')}
    </tbody>
  </table></div>`;
}

function ptFilter(f) {
  ['all','active','done'].forEach(x => {
    const btn = document.getElementById('pt-filter-'+x);
    if(!btn) return;
    if(x === f) { btn.style.borderColor='var(--gold-dim)'; btn.style.color='var(--gold)'; btn.style.background='var(--gold-bg)'; }
    else { btn.style.borderColor=''; btn.style.color=''; btn.style.background=''; }
  });
  const list = document.getElementById('pt-cases-list');
  if(list) list.innerHTML = ptRenderCases(f);
}

function ptStepperHtml(step) {
  return '<div class="stepper">' +
    PT_STEPS.map((s,i) => `<div class="step"><div class="step-dot ${i<step?'done':i===step?'active':'wait'}">${i<step?'✓':i+1}</div>${i<PT_STEPS.length-1?`<div class="step-line ${i<step?'done':''}"></div>`:''}</div>`).join('') +
    `</div><div style="font-size:9px;color:var(--sub);margin-top:3px">${PT_STEPS[Math.min(step,PT_STEPS.length-1)]}</div>`;
}

function ptCalcSim() {
  const fee = parseFloat(document.getElementById('pt-sim-fee')?.value) || 0;
  const gross = Math.round(fee * 0.25);
  const tax   = gross <= 1000000 ? Math.floor(gross*0.1021) : Math.floor(1000000*0.1021+(gross-1000000)*0.2042);
  const net   = gross - tax;
  const g = document.getElementById('pt-sg');
  const t = document.getElementById('pt-st');
  const n = document.getElementById('pt-sn');
  if(g) g.textContent = fee ? PT_YEN(gross) : '—';
  if(t) t.textContent = fee ? '-'+PT_YEN(tax) : '—';
  if(n) n.textContent = fee ? PT_YEN(net) : '—';
}

function ptRankPage() {
  const u = session;
  const rankColors = {platinum:'var(--purple)',gold:'var(--gold)',silver:'var(--green)',bronze:'var(--orange)'};
  const rankCol = rankColors[u.rankKey] || 'var(--orange)';

  // PTランク一覧（月会費なし・紹介報酬25%固定・ランクでメンターフィー率が変動）
  const RANKS_PT = [
    { icon:'💎', label:'Platinum', col:'var(--purple)', mentor:'8%',  pts:'30pt 以上' },
    { icon:'🥇', label:'Gold',     col:'var(--gold)',   mentor:'7%',  pts:'20〜29pt' },
    { icon:'🥈', label:'Silver',   col:'var(--green)',  mentor:'6%',  pts:'10〜19pt' },
    { icon:'🥉', label:'Bronze',   col:'var(--orange)', mentor:'5%',  pts:'0〜9pt'   },
  ];

  // ── 進捗バー ──
  const curPtsMap = {platinum:33, gold:22, silver:12, bronze:5};
  const curPts = curPtsMap[u.rankKey] || 5;
  const thresholds = [
    {pts:0,  label:'Bronze',   icon:'🥉', col:'var(--orange)'},
    {pts:10, label:'Silver',   icon:'🥈', col:'var(--green)'},
    {pts:20, label:'Gold',     icon:'🥇', col:'var(--gold)'},
    {pts:30, label:'Platinum', icon:'💎', col:'var(--purple)'},
  ];
  const MAX = 34;
  const pct = v => Math.min(97, Math.round(v / MAX * 100));
  const next = thresholds.find(t => t.pts > curPts);
  const needed = next ? next.pts - curPts : 0;

  const nextLabel = next
    ? '<div style="font-size:12px;color:var(--muted)">次のランク <strong style="color:' + next.col + '">' + next.icon + ' ' + next.label + '</strong> まで <strong style="color:var(--text)">' + needed + ' pt</strong></div>'
    : '<div style="font-size:12px;color:var(--purple)">💎 最高ランク到達済み</div>';

  const markers = thresholds.map(t => {
    const active = curPts >= t.pts;
    return '<div style="position:absolute;top:0;bottom:0;left:' + pct(t.pts) + '%;transform:translateX(-50%);z-index:2">'
      + '<div style="width:2px;height:100%;background:' + (active ? 'rgba(255,255,255,.5)' : 'var(--border2)') + ';border-radius:1px"></div>'
      + '</div>';
  }).join('');

  const labels = thresholds.map(t => {
    const active = curPts >= t.pts;
    return '<div style="position:absolute;left:' + pct(t.pts) + '%;transform:translateX(-50%);text-align:center">'
      + '<div style="font-size:16px">' + t.icon + '</div>'
      + '<div style="font-size:9px;font-weight:700;color:' + (active ? t.col : 'var(--muted)') + ';' + (active ? '' : 'opacity:.5') + '">' + t.pts + 'pt</div>'
      + '</div>';
  }).join('');

  const progressHTML =
    '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px">'
    + '<div><span style="font-size:32px;font-weight:800;color:' + rankCol + '">' + curPts + '</span><span style="font-size:13px;color:var(--sub);margin-left:5px">pt</span></div>'
    + nextLabel
    + '</div>'
    + '<div style="position:relative;height:20px;margin-bottom:10px">'
    +   '<div style="position:absolute;inset:0;background:#0a0c14;border-radius:10px;overflow:hidden">'
    +     '<div style="height:100%;width:' + pct(curPts) + '%;background:linear-gradient(90deg,var(--orange),' + rankCol + ');border-radius:10px">'
    +       '<div style="position:absolute;right:0;top:0;bottom:0;width:3px;background:rgba(255,255,255,.35);border-radius:0 2px 2px 0"></div>'
    +     '</div>'
    +   '</div>'
    +   markers
    + '</div>'
    + '<div style="position:relative;height:42px">' + labels + '</div>';

  const rankTableRows = RANKS_PT.map(r => {
    const isCur = r.label === u.rank;
    return '<tr style="' + (isCur ? 'background:var(--card2)' : '') + '">'
      + '<td><span style="font-weight:800;color:' + r.col + '">' + r.icon + ' ' + r.label + '</span>'
      + (isCur ? ' <span style="font-size:9px;color:var(--sub)">← 現在</span>' : '') + '</td>'
      + '<td class="mono fw-700" style="color:' + r.col + '">' + r.pts + '</td>'
      + '<td class="mono" style="color:' + r.col + ';font-weight:700">' + r.mentor + '</td>'
      + '</tr>';
  }).join('');

  return `<div class="page" id="page-pt-rank">
  <div class="page-hdr"><div class="page-title">ランク・ポイント</div><div class="page-sub">ランク昇格条件（毎月1日 自動判定）</div></div>

  <div class="grid-2" style="margin-bottom:16px">
    <div class="card">
      <div class="card-hdr"><div class="ch-title">現在のランク</div></div>
      <div class="card-body" style="text-align:center;padding:20px 0">
        <div style="font-size:52px;margin-bottom:10px">${u.rank==='Platinum'?'💎':u.rank==='Gold'?'🥇':u.rank==='Silver'?'🥈':'🥉'}</div>
        <div style="font-size:24px;font-weight:800;color:${rankCol}">${u.rank}</div>
        <div style="font-size:12px;color:var(--sub);margin-top:8px">月会費：なし</div>
        <div style="font-size:12px;color:var(--sub);margin-top:2px">紹介報酬率：25%（固定）</div>
        <div style="font-size:12px;color:var(--sub);margin-top:2px">メンターフィー率：${{platinum:'8%',gold:'7%',silver:'6%',bronze:'5%'}[u.rankKey]||'5%'}</div>
      </div>
    </div>
    <div class="card">
      <div class="card-hdr"><div class="ch-title">ポイント付与ルール</div></div>
      <div style="overflow-x:auto">
        <table class="tbl">
          <thead><tr><th>条件</th><th style="text-align:right">付与</th></tr></thead>
          <tbody>
            <tr>
              <td>紹介案件：手数料 100,000円ごと<br><span style="font-size:10px;color:var(--muted)">担当AGにも同じく 0.5pt 付与</span></td>
              <td class="mono fw-700" style="text-align:right;color:var(--blue)">0.5 pt</td>
            </tr>
            <tr>
              <td>紹介案件：完了ボーナス（成約1件ごと）<br><span style="font-size:10px;color:var(--muted)">担当AGにも同じく 0.5pt 付与</span></td>
              <td class="mono fw-700" style="text-align:right;color:var(--blue)">0.5 pt</td>
            </tr>
            <tr>
              <td>メンターコミッション 5,000円ごと<br><span style="font-size:10px;color:var(--muted)">あなたの紹介で入会したAG・PTが成約するたびに発生</span></td>
              <td class="mono fw-700" style="text-align:right;color:var(--purple)">0.2 pt</td>
            </tr>
          </tbody>
        </table>
      </div>
      <div style="padding:10px 14px;font-size:11px;color:var(--muted);border-top:1px solid var(--border)">
        ランクは <strong style="color:var(--gold)">毎月1日</strong> に Kintone で自動集計・判定。昇降格は Slack 通知。
      </div>
    </div>
  </div>

  <!-- ランク進捗バー -->
  <div class="card" style="margin-bottom:16px">
    <div class="card-hdr"><div class="ch-title">ランク進捗バー</div></div>
    <div class="card-body" style="padding-bottom:4px">
      ${progressHTML}
    </div>

  <!-- ランク昇格条件一覧 -->
  <div class="card" style="margin-bottom:16px">
    <div class="card-hdr"><div class="ch-title">ランク昇格条件一覧</div></div>
    <div style="overflow-x:auto">
      <table class="tbl">
        <thead>
          <tr><th>ランク</th><th>累計ポイント</th><th>メンターフィー率</th></tr>
        </thead>
        <tbody>${rankTableRows}</tbody>
      </table>
    </div>
    <div style="padding:10px 14px;font-size:11px;color:var(--muted);border-top:1px solid var(--border)">
      ※ 紹介報酬率（25%）と月会費（なし）はランクにかかわらず一定です。メンターフィー率のみランクにより変動します。
    </div>
  </div>

  <!-- PT専用ポイント計算例 -->
  <div class="card">
    <div class="card-hdr"><div class="ch-title">ポイント計算例</div></div>

}

function ptUpdateRegType() {

  const hr = document.getElementById('pt-hr-section');
  if(re) re.style.display = v === 'hr' ? 'none' : 'block';

}

function ptSubmitReferral() {
  const name = document.getElementById('pt-reg-name')?.value?.trim();
  if(!name) { alert('クライアント氏名を入力してください'); return; }
  alert(`✅ 紹介を登録しました\n\nクライアント：${name}\n\nCORETO本部がSlackで通知を受け取り、担当エージェントがご連絡します。\n進捗は「紹介案件」タブで確認できます。`);
  goPage('pt-cases');
}

  // 既存モーダル削除
  const existing = document.getElementById('pt-case-modal');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'pt-case-modal';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px';
  overlay.onclick = function(e){ if(e.target===overlay) overlay.remove(); };

  <div style="background:var(--card);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:500px;padding:24px;position:relative">
    <button onclick="document.getElementById('pt-case-modal').remove()"
            style="position:absolute;top:14px;right:14px;background:transparent;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1">✕</button>

    <div style="font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:6px">案件詳細</div>
    <div style="font-size:18px;font-weight:800;margin-bottom:4px">${escHtml(c.client)}</div>
    <div style="font-size:12px;color:var(--sub);margin-bottom:18px">${escHtml(c.prop)}</div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px">
      <div style="background:var(--card2);border-radius:9px;padding:12px">
        <div style="font-size:10px;color:var(--muted);margin-bottom:4px">ステータス</div>
        <div>${statusPill}</div>
        <div style="font-size:10px;color:var(--sub);margin-top:4px">${stepLabel}</div>
      </div>
      <div style="background:var(--card2);border-radius:9px;padding:12px">
        <div style="font-size:10px;color:var(--muted);margin-bottom:4px">紹介報酬</div>
        <div style="font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:${c.reward?'var(--gold)':'var(--muted)'}">
          ${c.reward ? PT_YEN(c.reward) : '—'}
        </div>
      </div>
    </div>

    <div style="border-top:1px solid var(--border);padding-top:16px;margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;margin-bottom:10px">担当エージェント</div>
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:38px;height:38px;border-radius:10px;background:rgba(79,156,249,.12);color:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px">
          ${escHtml(c.ag).charAt(0)}
        </div>
        <div>
          <div style="font-size:13px;font-weight:700">${escHtml(c.ag)}</div>
          <div style="font-size:10px;color:var(--muted);font-family:'DM Mono',monospace">ID: ${c.agId||'—'}</div>
          ${c.agPhone ? `<div style="font-size:11px;color:var(--blue);margin-top:2px">📞 ${c.agPhone}</div>` : ''}
        </div>
      </div>
    </div>

    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--sub);border-top:1px solid var(--border);padding-top:12px">
      <span>紹介日: <span style="color:var(--text)">${c.date}</span></span>
      <span>案件ID: <span style="font-family:'DM Mono',monospace;color:var(--text)">R${String(c.id).padStart(4,'0')}</span></span>
    </div>
    ${c.memo ? `<div style="margin-top:12px;font-size:11px;color:var(--sub);background:var(--card2);border-radius:8px;padding:10px">📝 ${escHtml(c.memo)}</div>` : ''}

  document.body.appendChild(overlay);

// ── Partner messages ──
function ptRenderMessages() {
  const list = document.getElementById('pt-contact-list');
  if(!list) return;
  const total = PT_CONTACTS.reduce((s,c)=>s+c.unread,0);
  list.innerHTML = PT_CONTACTS.map(c => `
    <div class="msg-contact ${ptCurrentContact===c.id?'on':''}" onclick="ptOpenChat(${c.id})">
      <div class="mc-avatar" style="background:${c.id===2?'rgba(201,168,64,.15)':'rgba(79,156,249,.12)'}">${c.icon}</div>
      <div style="flex:1;overflow:hidden">
        <div style="display:flex;align-items:center;gap:6px">
          <div class="mc-name">${escHtml(c.name)}</div>
          ${c.unread?`<span class="mc-unread">${c.unread}</span>`:''}
        </div>
        <div class="mc-last">${c.msgs[c.msgs.length-1].text}</div>
      </div>
      <div class="mc-time" style="font-size:10px;color:var(--muted);white-space:nowrap;margin-left:6px">${c.msgs[c.msgs.length-1].time.replace('2月','2/')}</div>
    </div>`).join('');
}

function ptOpenChat(id) {
  ptCurrentContact = id;
  const c = PT_CONTACTS.find(x => x.id === id);
  c.unread = 0;
  ptRenderMessages();

  const main = document.getElementById('pt-msg-main');
  if(!main) return;
  main.innerHTML = `
    <div class="msg-hdr">
      <div class="mc-avatar" style="background:${id===2?'rgba(201,168,64,.15)':'rgba(79,156,249,.12)'}">${c.icon}</div>
      <div>
        <div style="font-size:13px;font-weight:700">${escHtml(c.name)}</div>
        <div style="font-size:10px;color:var(--sub)">${c.role}</div>
      </div>
    </div>
    <div class="msg-body" id="pt-chat-body">
      ${c.msgs.map(m => `
      <div>
        <div class="msg-bubble ${m.me?'msg-me':'msg-them'}">${m.text}</div>
        <div class="msg-time">${m.time}</div>
      </div>`).join('')}
    </div>
    <div class="msg-footer">
      <textarea class="msg-input" id="pt-msg-inp" placeholder="メッセージを入力…" rows="1"
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();ptSendMsg(${id})}"></textarea>
      <button class="btn btn-primary btn-sm" onclick="ptSendMsg(${id})">送信</button>
    </div>`;

  const body = document.getElementById('pt-chat-body');
  if(body) body.scrollTop = body.scrollHeight;
}

function ptSendMsg(id) {
  const inp = document.getElementById('pt-msg-inp');
  if(!inp) return;
  const text = inp.value.trim();
  if(!text) return;
  const c = PT_CONTACTS.find(x => x.id === id);
  const now = new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  c.msgs.push({me:true, text, time:'今日 '+now});
  inp.value = '';
  const body = document.getElementById('pt-chat-body');
  if(body) {
    const div = document.createElement('div');
    div.innerHTML = `<div class="msg-bubble msg-me">${text}</div><div class="msg-time">今日 ${now}</div>`;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
  }
}

// ── Show messages when navigating to that page ──
const _origGoPage = goPage;
function goPage(pageId) {
  currentPage = pageId;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('on', n.id === 'nav-' + pageId));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  const pg = document.getElementById('page-' + pageId);
  if(pg) {
    pg.classList.add('on');
    if(pageId === 'pt-msgs') ptRenderMessages();
  } else {
    buildPageContent(pageId);
  }
}

// ── 紹介リンクモーダル ──────────────────────────────────────
var _refCurrentCode = '';
function openRefModal() {
  var overlay = document.getElementById('ref-modal-overlay');
  var selector = document.getElementById('ref-code-selector');
  var isExec = (typeof session !== 'undefined' && session && session.hqRole === 'exec')
            || (typeof CURRENT_USER !== 'undefined' && CURRENT_USER && CURRENT_USER.hqRole === 'exec');
  var agentId = (typeof session !== 'undefined' && session && session.userId) ? session.userId
              : (typeof ME !== 'undefined' && ME && ME.id) ? ME.id
              : (typeof AGENT !== 'undefined' && AGENT && AGENT.id) ? AGENT.id : '10012';
  if (isExec) {
    var SPECIAL = ['FOUNDER2026','WELCOME2026','GOLD_START','HR_PRO75'];
    var opts = SPECIAL.map(function(c){ return '<option value="'+c+'">⭐ '+c+'</option>'; }).join('');
    selector.innerHTML =
      '<div style="margin-bottom:12px"><div style="font-size:10px;color:var(--sub);font-weight:600;margin-bottom:5px">コード種別</div>'
      +'<select id="ref-code-select" onchange="updateRefLink()" style="width:100%;padding:8px 10px;background:var(--card2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:12px;font-family:inherit">'
      +'<option value="'+agentId+'">自分のID（'+agentId+'）</option>'
      +'<optgroup label="── 特別コード ──">'+opts+'</optgroup>'
      +'</select></div>';
    _refCurrentCode = agentId;
  } else {
    selector.innerHTML =
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:8px 12px;background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.2);border-radius:8px">'
      +'<span style="font-size:11px;color:var(--muted)">紹介コード：</span>'
      +'<span style="font-family:\'DM Mono\',monospace;font-size:13px;font-weight:700;color:var(--gold)">'+agentId+'</span>'
      +'</div>';
    _refCurrentCode = agentId;
  }
  updateRefLink();
  overlay.classList.add('open');
}
function updateRefLink() {
  var sel = document.getElementById('ref-code-select');
  if (sel) _refCurrentCode = sel.value;
  var base = location.origin + location.pathname.replace(/[^/]*$/, '') + 'coreto-agent-signup.html';
  var url = base + '?ref=' + encodeURIComponent(_refCurrentCode);
  document.getElementById('ref-url-display').textContent = url;
}
function closeRefModal() {
  document.getElementById('ref-modal-overlay').classList.remove('open');
}
function copyRefLink() {
  var url = document.getElementById('ref-url-display').textContent;
  navigator.clipboard.writeText(url).then(function() {
    var btn = document.querySelector('.ref-copy-btn');
    btn.textContent = '✅ コピーしました';
    setTimeout(function(){ btn.textContent = '📋 コピー'; }, 2000);
  }).catch(function() {
    var ta = document.createElement('textarea');
    ta.value = url; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  });
}
</script>

<script>
// ══════════════════════════════════════════════════════════════
//  指名承認システム
// ══════════════════════════════════════════════════════════════

// デモ用指名データ（本番はKintone/Zapier経由で取得）
const NOMINATIONS = [
  {
    id: 'NOM-001',
    caseId: '0238',
    caseTitle: '新宿区西新宿 賃貸 2LDK',
    ptName: '鈴木 誠司',
    ptId: 'PT-30004',
    msg: '以前お世話になりました。ぜひお願いしたいです。',
    postedAt: '2026-03-02 09:15',
    deadline: '2026-03-04 09:15', // 48時間有効
    status: 'pending', // pending / accepted / declined
  },
];

function renderNominations() {
  const banner = document.getElementById('nomination-banner');
  const list   = document.getElementById('nomination-list');
  if (!banner || !list) return;

  const pending = NOMINATIONS.filter(n => n.status === 'pending');
  banner.style.display = pending.length ? '' : 'none';

  list.innerHTML = pending.map(n => `
    <div style="background:#141820;border:1px solid #252c3d;border-radius:8px;padding:12px 14px;margin-bottom:8px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700;color:#e4e7f0;margin-bottom:4px">${n.caseTitle}</div>
          <div style="font-size:11px;color:var(--muted)">
            紹介パートナー：<span style="color:var(--sub);font-weight:600">${n.ptName}（${n.ptId}）</span>
            &nbsp;·&nbsp; 指名日時：${n.postedAt}
          </div>
          ${n.msg ? `<div style="font-size:11px;color:var(--sub);margin-top:6px;padding:6px 10px;background:rgba(255,255,255,.03);border-radius:6px;border-left:2px solid rgba(201,168,76,.4)">「${n.msg}」</div>` : ''}
          <div style="font-size:10px;color:var(--orange);margin-top:6px">⏰ 有効期限：${n.deadline} まで</div>
        </div>
        <div style="display:flex;gap:8px;flex-shrink:0;align-items:center">
          <button onclick="declineNomination('${n.id}')"
            style="padding:7px 14px;border-radius:7px;border:1px solid rgba(248,113,113,.35);background:rgba(248,113,113,.08);color:#f87171;font-size:11px;font-weight:600;cursor:pointer">
            辞退
          </button>
          <button onclick="acceptNomination('${n.id}')"
            style="padding:7px 16px;border-radius:7px;border:1px solid rgba(201,168,76,.5);background:rgba(201,168,76,.12);color:#c9a840;font-size:11px;font-weight:700;cursor:pointer">
            ✅ 承認する
          </button>
        </div>
      </div>
    </div>
  `).join('');
}

function acceptNomination(nomId) {
  const n = NOMINATIONS.find(x => x.id === nomId);
  if (!n) return;
  if (!confirm(`「${n.caseTitle}」の担当を承認しますか？\n\nパートナー ${n.ptName}さんに通知され、マッチングが確定します。`)) return;
  n.status = 'accepted';
  // 本番: Zapier webhook → Kintone更新 → パートナーLINE通知 → HQ Slack通知
  alert(`✅ マッチングが確定しました。\n\nHQがLINE WORKSトークルームを作成します。\n案件の詳細は案件管理からご確認ください。`);
  renderNominations();
}

function declineNomination(nomId) {
  const n = NOMINATIONS.find(x => x.id === nomId);
  if (!n) return;
  if (!confirm(`「${n.caseTitle}」の指名を辞退しますか？\n\nパートナー ${n.ptName}さんに辞退が通知されます。`)) return;
  n.status = 'declined';
  // 本番: Zapier webhook → パートナーLINE通知 → ボード掲載切替を提案
  alert(`辞退しました。\nパートナーに通知されます。`);
  renderNominations();
}

// ページロード時に指名バナーを描画
document.addEventListener('DOMContentLoaded', function() {
  setTimeout(renderNominations, 300);
});
</script>
