<title>CORETO — FAQナレッジベース</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--card:#0f1119;--card2:#141720;--border:#1e2235;--border2:#252a3d;
  --gold:#c9a84c;--gold-dim:#7a5f22;
  --blue:#4f9cf9;--green:#34d399;--red:#f87171;--orange:#fb923c;--purple:#a78bfa;
  --muted:#4a5270;--sub:#7a849e;--text:#e2e6f3;
}
html,body{height:100%;font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text)}
.hdr{height:54px;display:flex;align-items:center;justify-content:space-between;
  padding:0 26px;border-bottom:1px solid var(--border);background:rgba(7,9,15,.95);position:sticky;top:0;z-index:100}
.logo{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--gold);letter-spacing:3px}
.layout{display:flex;height:calc(100vh - 54px)}
.sidebar{width:230px;flex-shrink:0;border-right:1px solid var(--border);background:var(--card);overflow-y:auto;padding:12px 0}
.sb-sec{font-size:8px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;padding:12px 16px 5px}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 16px;font-size:12px;cursor:pointer;
  color:var(--sub);transition:.15s;border-left:2px solid transparent}
.sb-item:hover{color:var(--text);background:rgba(255,255,255,.025)}
.sb-item.on{color:var(--blue);background:rgba(79,156,249,.07);border-left-color:var(--blue)}
.sb-count{margin-left:auto;font-size:9px;padding:1px 7px;border-radius:8px;
  background:rgba(74,82,112,.2);color:var(--muted)}
.main{flex:1;overflow-y:auto;padding:26px 30px 80px;max-width:860px}
/* Search */
.search-wrap{position:relative;margin-bottom:24px}
.search-input{width:100%;background:var(--card);border:1px solid var(--border2);border-radius:12px;
  padding:13px 18px 13px 44px;color:var(--text);font-size:14px;font-family:'Noto Sans JP',sans-serif;outline:none;transition:.2s}
.search-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,156,249,.12)}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:18px}
/* FAQ item */
.faq-item{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;transition:.15s}
.faq-item:hover{border-color:var(--border2)}
.faq-q{padding:14px 18px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:12px}
.faq-q-text{font-size:13px;font-weight:600;line-height:1.5}
.faq-chevron{color:var(--muted);font-size:14px;transition:.2s;flex-shrink:0}
.faq-item.open .faq-chevron{transform:rotate(180deg);color:var(--blue)}
.faq-a{display:none;padding:0 18px 16px;font-size:12px;color:var(--sub);line-height:2;border-top:1px solid var(--border)}
.faq-item.open .faq-a{display:block}
.faq-a strong{color:var(--text)}
.faq-a .code{font-family:'DM Mono',monospace;background:var(--card2);padding:2px 8px;border-radius:5px;font-size:11px;color:var(--orange)}
.faq-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-top:12px}
.tag{font-size:9px;padding:2px 8px;border-radius:5px;font-weight:700}
/* Category badge */
.cat{display:inline-flex;align-items:center;gap:5px;font-size:9px;padding:2px 9px;border-radius:5px;font-weight:700;flex-shrink:0}
.cat-pay{background:rgba(201,168,76,.13);color:var(--gold);border:1px solid var(--gold-dim)}
.cat-op{background:rgba(79,156,249,.12);color:var(--blue);border:1px solid rgba(79,156,249,.25)}
.cat-re{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.25)}
.cat-hr{background:rgba(167,139,250,.12);color:var(--purple);border:1px solid rgba(167,139,250,.25)}
.cat-sys{background:rgba(74,82,112,.15);color:var(--sub);border:1px solid var(--border2)} .cat-pt{background:rgba(45,212,191,.12);color:var(--teal);border-radius:4px}
/* HQ editor */
.btn{padding:7px 14px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;transition:.15s;border:none;display:inline-flex;align-items:center;gap:6px}
.btn-blue{background:linear-gradient(135deg,var(--blue),#3070c0);color:#fff}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--sub)}
.btn-ghost:hover{color:var(--text)}
.btn-sm{padding:4px 10px;font-size:10px;border-radius:6px}
.helpful{display:flex;align-items:center;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.helpful-btn{padding:4px 12px;border-radius:6px;font-size:10px;cursor:pointer;border:1px solid var(--border2);
  background:transparent;color:var(--muted);font-family:'Noto Sans JP',sans-serif;transition:.15s}
.helpful-btn:hover{color:var(--text)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ═══ RESPONSIVE ═══════════════════════════════════════════════ */
@media(max-width:768px){
  .hdr{padding:0 12px;height:48px}
  .layout{flex-direction:column;height:auto;min-height:calc(100vh - 48px)}
  .sidebar{
    width:100%;height:auto;border-right:none;
    border-bottom:1px solid var(--border);
    display:flex;flex-direction:row;overflow-x:auto;
    padding:0;flex-shrink:0;-webkit-overflow-scrolling:touch;
  }
  .sb-sec{display:none}
  .sb-item{
    white-space:nowrap;flex-shrink:0;padding:10px 14px;
    border-left:none;border-bottom:2px solid transparent;
  }
  .sb-item.on{border-bottom-color:var(--blue);border-left:none;background:transparent;color:var(--blue)}
  .main{padding:14px 12px 60px;max-width:100%;overflow-y:visible}
  .search-input{font-size:14px}
}
</style>
</head>

<script>

  // ═══════════════════════════════════════════════════════════════
  //  CORETO 認証ガード v2 — セッション整合性チェック付き
  // ═══════════════════════════════════════════════════════════════
  (function() {
    var s;
    try { s = JSON.parse(sessionStorage.getItem('coreto_session') || 'null'); } catch(e) { s = null; }

    // 1. セッションなし → ログインへ
    if (!s || !s.userId || !s.type) {
      sessionStorage.setItem('coreto_redirect', window.location.href);
      window.location.replace('coreto-login.html');
      return;
    }

    // 2. セッション整合性検証（改ざん・偽造検知）
    //    DB.verifySessionSync: USERSとのtype/hqRole照合 + tokenLength確認
    if (typeof DB === 'undefined' || !DB.verifySessionSync(s)) {
      console.warn('[CORETO Auth] セッション整合性エラー（偽造または改ざん）— ログアウト');
      sessionStorage.removeItem('coreto_session');
      window.location.replace('coreto-login.html');
      return;
    }

    // 3. セッション有効期限チェック（8時間）
    var loginAt = new Date(s.loginAt).getTime();
    var SESSION_TTL = 8 * 60 * 60 * 1000; // 8時間
    if (isNaN(loginAt) || (Date.now() - loginAt) > SESSION_TTL) {
      sessionStorage.removeItem('coreto_session');
      alert('セッションの有効期限が切れました。再度ログインしてください。');
      window.location.replace('coreto-login.html');
      return;
    }

    window._SESSION = s;
  })();
  // ═══════════════════════════════════════════════════════════════

   a:'残念ながら不成約の場合、紹介報酬は発生しません。ただし、案件の進捗はポータルで随時確認でき、担当AGへメッセージで状況確認もできます。'},
  {id:26,cat:'pt',q:'確定申告は必要ですか？',
   a:'年間の紹介報酬合計が<strong>20万円を超える場合</strong>、確定申告が必要です。<br>個人パートナーの場合、CORETOが源泉徴収を行い支払調書を発行します。詳細は税理士にご相談ください。法人パートナーの場合は源泉徴収なし・支払調書なしで報酬が支払われます。'},
];

let activeCat = 'all';
let searchTerm = '';

function renderFaqs() {
  const list = document.getElementById('faq-list');
  let items = FAQS;
  if (activeCat !== 'all' && activeCat !== 'rank') items = items.filter(f=>f.cat===activeCat);
  if (searchTerm) {
    const t = searchTerm.toLowerCase();
    items = items.filter(f=>f.q.toLowerCase().includes(t)||f.a.toLowerCase().includes(t));
  }
  // update counts
  ['pay','op','re','hr','sys','pt'].forEach(c=>{
    const el = document.getElementById('cnt-'+c);
    if (el) el.textContent = FAQS.filter(f=>f.cat===c).length;
  });
  document.getElementById('cnt-all').textContent = FAQS.length;

  if (!items.length) {
    list.innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted);font-size:13px">
      「${searchTerm}」に一致するFAQが見つかりません<br>
      <span style="font-size:11px;margin-top:8px;display:block">HQにSlackでお問い合わせください</span></div>`;
    return;
  }

  const catMap = {pay:'cat-pay',op:'cat-op',re:'cat-re',hr:'cat-hr',sys:'cat-sys',pt:'cat-pt'};
  const catLabel = {pay:'報酬・支払い',op:'業務運営',re:'不動産',hr:'HR人材',sys:'システム',pt:'パートナー'};
  list.innerHTML = items.map(f=>`
    <div class="faq-item" id="faq-${f.id}">
      <div class="faq-q" onclick="toggleFaq(${f.id})">
        <div style="display:flex;align-items:flex-start;gap:10px;flex:1">
          <span class="cat ${catMap[f.cat]}" style="margin-top:1px">${catLabel[f.cat]}</span>
          <span class="faq-q-text">Q. ${f.q}</span>
        </div>
        <span class="faq-chevron">▼</span>
      </div>
      <div class="faq-a">
        <div class="faq-meta"></div>
        <div>${f.a}</div>
        <div class="helpful">
          <span style="font-size:10px;color:var(--muted)">この回答は役に立ちましたか？</span>
          <button class="helpful-btn" onclick="rate(${f.id},true)">👍 はい</button>
          <button class="helpful-btn" onclick="rate(${f.id},false)">👎 いいえ</button>
          <a href="#" style="font-size:10px;color:var(--blue);margin-left:auto"
             onclick="askSlack('${f.q}')">Slackで質問する →</a>
        </div>
      </div>
    </div>`).join('');

  // highlight search terms
  if (searchTerm) {
    list.querySelectorAll('.faq-q-text,.faq-a').forEach(el=>{
      el.innerHTML = el.innerHTML.replace(new RegExp(searchTerm,'gi'),m=>`<mark style="background:rgba(201,168,76,.3);color:var(--gold);border-radius:2px">${m}</mark>`);
    });
  }
}

function toggleFaq(id) {
  const el = document.getElementById('faq-'+id);
  if (el) el.classList.toggle('open');
}

function filterCat(cat, btn) {
  activeCat = cat;
  document.querySelectorAll('.sb-item').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderFaqs();
}

function search(val) {
  searchTerm = val;
  renderFaqs();
}

function rate(id, helpful) {
  alert(helpful ? '👍 フィードバックをありがとうございます！' : '👎 ご意見をHQに送信しました。FAQを改善します。');
}

function askSlack(q) {
  alert(`Slackの #faq-質問 チャンネルに「${q}」を送信しました。HQより1営業日以内に回答します。`);
}

function toggleEdit() { alert('HQ編集モード（本番ではFAQの追加・編集・削除が可能）'); }

renderFaqs();
</script>
</body>
</html>
