function today() { return new Date().toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'}); }
function todayISO() { return new Date().toISOString().slice(0,10); }

function advance(id, nextStep, dateKey, dateVal, memo) {
  try {
    const c = CASES.find(x=>x.id===id);
    if(!c) { console.error('advance: case not found', id); return; }
    if(!c.dates) c.dates = {};
    if(!c.hist)  c.hist  = [];
    c.step = nextStep;
    c.age  = 0;
    if (dateKey) c.dates[dateKey] = dateVal || todayISO();
    if (memo) c.hist.unshift(today()+' '+memo);
    open_case(id);
    toast(memo||'更新しました');
  } catch(e) {
    console.error('advance error:', e);
    toast('エラーが発生しました: '+e.message);
  }
}

function naikenDone(id) {
  const c = CASES.find(x=>x.id===id);
  const d = document.getElementById('s-naiken-date')?.value || todayISO();
  const p = document.getElementById('s-naiken-prop')?.value.trim() || '';
  c.dates.naiken = d;
  if(p) c.dates.naikenProp = p;
  slackSend(SLACK_CH.内見, [
    ...slackHeader('🏠','内見完了（賃貸）'),
    ...slackCase(c),
    '🏠 *物件*：'+(p||'—'),
    '📅 *内見日*：'+d,
    ...slackFooter(),
  ]);
  advance(id, 'apply', null, null, '内見完了');
}
function naikenSkip(id) {
  if(!confirm('見送りにしますか？')) return;
  advance(id, 'cancel', null, null, '見送り（内見後）');
}

function checkItBooking(cid) {
  const c = CASES.find(x=>x.id===cid);
  if (!c) return;
  // localStorageからスロットを確認
  // ③ 正しいキー: coreto_itsetsu_bookings（booking.htmlと共有）
  let bookings = [];
  try { bookings = JSON.parse(localStorage.getItem('coreto_itsetsu_bookings')||'[]'); } catch(e) {}
  const booked = bookings.find(function(b){ return b.caseId === cid && b.status === 'active'; });
  if (!booked) { toast('まだ予約が入っていません'); return; }

  // 予約データを案件にセット（booking.htmlのフィールド名に合わせる）
  c.itBooking = {
    slotId:    booked.slotId,
    agentId:   booked.itAgentId,
    agentName: booked.itAgentName,
    agentMobile: '',
    date:      booked.date,
    time:      booked.start,
    dur:       booked.dur || 60,
    meetUrl:   booked.meetUrl,
    clientName:booked.clientName,
    bookedAt:  booked.bookedAt,
  };
  if (!c.hist) c.hist = [];
  c.hist.unshift(today() + ' IT重説日程確定 ' + booked.date + ' ' + booked.time);

  // Slack通知（エージェントと重説担当へ）
  const u = window._SESSION || {};
  const WD=['日','月','火','水','木','金','土'];
  const d = new Date(booked.date+'T00:00:00');
  const fmtd = (d.getMonth()+1)+'/'+ d.getDate()+'（'+WD[d.getDay()]+'）';
  slackSend(SLACK_CH.重説日程, [

function submitApply(id) {
  const prop = document.getElementById('s-prop')?.value.trim();
  const mgmt = document.getElementById('s-mgmt')?.value.trim();
  const date = document.getElementById('s-apply-date')?.value || todayISO();
  if(!prop||!mgmt){alert('物件名と管理会社を入力してください');return;}
  const c = CASES.find(x=>x.id===id);
  c.apps.push({id:'A'+Date.now().toString().slice(-5), prop, mgmt, date, status:'reviewing'});
  c.dates.applied = date;
  slackSend(SLACK_CH.審査, [
    ...slackHeader('📋','申込提出'),
    ...slackCase(c),
    '🏠 *物件*：'+prop,
    '🏢 *管理会社*：'+mgmt,
    '📅 *申込日*：'+date,
    ...slackFooter(),
  ]);
  advance(id, 'screening', null, null, prop+' 申込');
}

function addApp(id) {

function doAddApp(id) {
  const prop = document.getElementById('m-prop')?.value.trim();
  const mgmt = document.getElementById('m-mgmt')?.value.trim();
  const sim  = document.getElementById('m-sim')?.checked || false;
  if(!prop||!mgmt){alert('入力してください');return;}
  const c = CASES.find(x=>x.id===id);
  c.apps.push({id:'A'+Date.now().toString().slice(-5), prop, mgmt, date:todayISO(), status:'reviewing', sim});
  c.hist.unshift(today()+' '+prop+' 申込追加'+(sim?' (同時)':''));
  closeModal();
  open_case(id);
  toast('申込追加しました');
}

function appPassed(id, appId) {
  const c = CASES.find(x=>x.id===id);
  const a = c.apps.find(a=>a.id===appId);
  if(!a) return;
  a.status = 'approved';
  // cancel other reviewing apps
  c.apps.filter(x=>x.id!==appId&&(x.status==='reviewing'||x.status==='submitted')).forEach(x=>{x.status='cancelled';});
  if(!c.taskDone) c.taskDone={paid:false,itsetsu:false};

  // 審査通過 Slack
  slackSend(SLACK_CH.審査, [
    ...slackHeader('✅','審査通過'),
    ...slackCase(c),
    '🏠 *物件*：'+a.prop,
    '🏢 *管理会社*：'+(a.mgmt||'—'),
    ...slackFooter(),
  ]);

  advance(id, 'invoice', 'approved', todayISO(), a.prop+' 審査通過 → 請求書発行へ');
}

function buildBookingUrl(c) {
  const u = window._SESSION || {};
  const app = (c.apps || []).find(function(a){ return a.status === 'approved'; })
    || (c.apps || [])[c.apps.length - 1] || {};
  const dedicatedId = c.agent || u.userId || '';
  const params = new URLSearchParams({
    caseId:      c.id,
    client:      encodeURIComponent(c.name || ''),
    prop:        encodeURIComponent(app.prop || c.sub || ''),
    agent:       encodeURIComponent(u.name || u.userId || ''),
    agentId:     u.userId || '',
    dedicatedId: dedicatedId,
  });
  if (c.trackingNo) params.set('tracking', c.trackingNo);
  if (c.tel)        params.set('tel', c.tel);
  return location.origin + location.pathname.replace(/[^/]+$/, '')
    + 'coreto-itsetsu-booking.html?' + params.toString();
}

            📋 リンクを発行する</button>

}

function checkWarnReady() {
  const c1 = document.getElementById('warn-chk-1');
  const c2 = document.getElementById('warn-chk-2');
  const btn = document.getElementById('warn-issue-btn');
  if (!btn) return;
  const ok = c1 && c2 && c1.checked && c2.checked;
  btn.disabled = !ok;
  btn.style.color = ok ? '#c9a840' : '#666';
  btn.style.borderColor = ok ? 'rgba(201,168,64,.35)' : 'rgba(201,168,64,.2)';
  btn.style.cursor = ok ? 'pointer' : 'not-allowed';
  btn.style.background = ok ? 'rgba(201,168,64,.12)' : 'rgba(201,168,64,.08)';
}

function issueBookingLink(cid) {
  const c = CASES.find(function(x){ return x.id === cid; });
  if (!c) return;
  const trackingInput = document.getElementById('warn-tracking');
  if (trackingInput && trackingInput.value.trim()) {
    c.trackingNo = trackingInput.value.trim();
  }
  const url = buildBookingUrl(c);
  c.bookingUrl = url;
  // Close warning overlay
  const overlay = document.querySelector('div[style*="fixed"][style*="9999"]');
  if (overlay) overlay.remove();
  // Slack notify
  const u = window._SESSION || {};
  const app = (c.apps || []).find(function(a){ return a.status === 'approved'; }) || {};
  slackSend(SLACK_CH.重説日程, [
    ...slackHeader('📅','IT重説 日程調整リンク発行'),
    '🆔 *案件ID*：' + c.id,
    '👤 *クライアント*：' + c.name,
    '🏠 *物件*：' + (app.prop || c.sub || '—'),
    '👨‍💼 *担当エージェント*：' + (u.name || u.userId || '—'),

  ]);

  showBookingLinkModal(cid, url);
  open_case(cid);
}

function appRejected(id, appId) {
  const c = CASES.find(x=>x.id===id);
  const a = c.apps.find(a=>a.id===appId);
  if(!a) return;
  a.status = 'rejected';
  c.hist.unshift(today()+' '+a.prop+' 審査落ち');
  const remaining = c.apps.filter(x=>x.status==='reviewing'||x.status==='submitted');
  if(remaining.length===0) c.hist.unshift(today()+' 全物件落ち → 別物件追加してください');
  slackSend(SLACK_CH.審査, [
    ...slackHeader('❌','審査落ち'),
    ...slackCase(c),
    '🏠 *物件*：'+a.prop,
    '🏢 *管理会社*：'+(a.mgmt||'—'),
    remaining.length===0 ? '⚠ *全物件落ち* — 別物件追加が必要です' : '📋 残審査中: '+remaining.length+'件',
    ...slackFooter(),
  ]);
  open_case(id);
}

function stepInvoiceSannai(c) {
  const now = new Date();
  const due = new Date(now.getTime()+30*864e5).toISOString().slice(0,10);
  const ym  = now.getFullYear()+String(now.getMonth()+1).padStart(2,'0');
  const inv = c.invoice || {};
  const sn  = c.sannai  || {};
  const id  = c.id;

  // ── 買付から引用した取引価格・支払手数料 ──
  const buyPrice   = sn.buyPrice   || 0;
  const sellPrice  = sn.sellPrice  || c.salePrice || 0;
  const commBuyAmt = sn.commBuyAmt || 0;
  const commSellAmt= sn.commSellAmt|| 0;
  const delegTotal = (sn.delegPay||[]).reduce((s,r)=>s+(r.amt||0),0);
  const totalOut   = commBuyAmt + commSellAmt + delegTotal;

  // ── 既存の請求書データ（編集時引き継ぎ）──
  const prevBuyerComm  = inv.buyerComm  !== undefined ? inv.buyerComm  : (sellPrice ? Math.min(saleCommLimit(sellPrice), Math.round((sellPrice*0.03+60000)*1.1)) : '');
  const prevSellerComm = inv.sellerComm !== undefined ? inv.sellerComm : (buyPrice  ? '' : '');
  const prevBuyerDeleg = inv.buyerDeleg || [];
  const prevSellerDeleg= inv.sellerDeleg|| [];
  const prevProp = inv.prop || c.dates?.naikenProp || '';
  const prevDate = inv.date || now.toISOString().slice(0,10);
  const prevDue  = inv.due  || due;

  // 請求書番号
  const invNumBuyer  = 'INV-'+ym+'-'+c.agent+'-BUY';
  const invNumSeller = 'INV-'+ym+'-'+c.agent+'-SEL';

  // 上限
  const buyLimit  = saleCommLimit(sellPrice);
  const sellLimit = saleCommLimit(buyPrice);

  // ── 取引概要サマリー（読み取り専用）──
  const summaryHtml = (buyPrice || sellPrice) ? (
    '<div style="margin-bottom:12px;padding:12px;background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.2);border-radius:10px;font-size:11px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
    +'<span style="font-size:10px;color:var(--gold);font-weight:700;letter-spacing:.8px">📊 買付情報（引用）</span>'
    +'<a href="#" onclick="editSannaiOffer(\''+id+'\')" style="font-size:10px;color:var(--muted);text-decoration:none">✏ 修正</a>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:auto 1fr auto 1fr;gap:3px 10px;line-height:1.8">'
    +(buyPrice  ? '<span style="color:var(--muted)">仕入れ</span><span class="mono">¥'+buyPrice.toLocaleString()+'</span>' : '')
    +(sellPrice ? '<span style="color:var(--muted)">販売</span><span class="mono">¥'+sellPrice.toLocaleString()+'</span>' : '')
    +(buyPrice&&sellPrice ? '<span style="color:var(--muted)">スプレッド</span><span class="mono" style="color:'+(sellPrice-buyPrice>=0?'var(--green)':'var(--red)')+'">'+((sellPrice-buyPrice>=0)?'+':'')+'¥'+(sellPrice-buyPrice).toLocaleString()+'</span>' : '')
    +(totalOut  ? '<span style="color:var(--muted)">支払手数料計</span><span class="mono" style="color:var(--orange)">-¥'+totalOut.toLocaleString()+'</span>' : '')
    +'</div>'
    +(sn.commPayMode && sn.commPayMode!=='none' ? (
      '<div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border);font-size:10px;color:var(--muted)">'
      +(commBuyAmt  ? '買い側仲介: '+(sn.commBuyCo||'—')+' ¥'+commBuyAmt.toLocaleString()+'　' : '')
      +(commSellAmt ? '売り側仲介: '+(sn.commSellCo||'—')+' ¥'+commSellAmt.toLocaleString() : '')
      +'</div>'
    ) : '')
    +((sn.delegPay||[]).length ? (
      '<div style="margin-top:4px;font-size:10px;color:var(--muted)">'
      +(sn.delegPay||[]).map(r=>'業務委託: '+(r.co||'—')+' ¥'+(r.amt||0).toLocaleString()).join('　')
      +'</div>'
    ) : '')
    +'</div>'
  ) : '';

  // ── 受取仲介手数料: 買主側 ──
  const buyerCommRows = (prevBuyerDeleg.length ? prevBuyerDeleg : []).map((r,i)=>invItemRowB(i,r.desc,r.amt)).join('');
  const buyerCommLimit = buyLimit > 0 ? '<span style="font-size:10px;color:var(--muted);margin-left:6px">上限 ¥'+buyLimit.toLocaleString()+'</span>' : '';

  // ── 受取仲介手数料: 売主側 ──
  const showSellerSection = inv.hasSellerComm !== undefined ? inv.hasSellerComm : false;
  const sellerCommRows = (prevSellerDeleg.length ? prevSellerDeleg : []).map((r,i)=>sannaiInvItemRowSeller(i,r.desc,r.amt)).join('');

  return '<div class="step-title">🧾 請求書発行（三為）</div>'
    + summaryHtml

    // 基本情報
    +'<div class="fi"><label>物件名</label><input type="text" id="inv-prop" value="'+prevProp+'" oninput="sannaiInvCalc()"></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">'
    +'<div class="fi"><label>発行日</label><input type="date" id="inv-date" class="mono" value="'+prevDate+'"></div>'
    +'<div class="fi"><label>支払期限</label><input type="date" id="inv-due" class="mono" value="'+prevDue+'"></div>'
    +'</div>'

    // ── 買主向け請求書（必須）──
    +'<div style="margin-bottom:10px;padding:12px;background:rgba(79,156,249,.06);border:1px solid rgba(79,156,249,.25);border-radius:10px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
    +'<div style="font-size:11px;color:var(--blue);font-weight:700">📄 買主向け請求書 '+invNumBuyer+'</div>'
    +'<span style="font-size:9px;color:var(--blue);background:rgba(79,156,249,.15);padding:2px 7px;border-radius:4px;font-weight:600">必須</span>'
    +'</div>'
    +(sellPrice ? '<div style="font-size:10px;color:var(--muted);margin-bottom:8px">販売価格（上限）: ¥'+sellPrice.toLocaleString()+'</div>' : '')
    +'<div style="margin-bottom:6px;font-size:10px;color:var(--sub);font-weight:600">請求項目（仲介手数料等）</div>'
    +'<div id="sn-inv-buyer-items">'
    +(prevBuyerDeleg.length
      ? buyerCommRows

function sannaiInvItemRowSeller(idx, desc, amt) {

function sannaiToggleSellerInv(cb, id) {
  const c = CASES.find(x=>x.id===id); if(!c) return;
  if(!c.invoice) c.invoice={};
  c.invoice.hasSellerComm = cb.checked;
  // 現在の入力値を保持してから再描画
  sannaiInvSave(c);
  open_case(id);
}

function sannaiInvGetBuyerItems() {
  const rows = document.querySelectorAll('#sn-inv-buyer-items .inv-row-b');
  const items = [];
  rows.forEach(r => {
    const inputs = r.querySelectorAll('input');
    const desc = inputs[0]?.value.trim()||'';
    const amt  = parseInt(inputs[1]?.value)||0;
    if(desc||amt) items.push({desc, amt});
  });
  return items;
}

function sannaiInvGetSellerItems() {
  const rows = document.querySelectorAll('#sn-inv-seller-items .sn-inv-row-sel');
  const items = [];
  rows.forEach(r => {
    const inputs = r.querySelectorAll('input');
    const desc = inputs[0]?.value.trim()||'';
    const amt  = parseInt(inputs[1]?.value)||0;
    if(desc||amt) items.push({desc, amt});
  });
  return items;
}

function sannaiInvCalc() {
  const sn = (CASES.find(x=>x.id===cur)||{}).sannai||{};
  const sellPrice = sn.sellPrice || 0;
  const buyPrice  = sn.buyPrice  || 0;
  const buyLimit  = sellPrice;  // 買主向け上限 = 販売価格
  const sellLimit = saleCommLimit(buyPrice);

  // 買主チェック
  const buyerItems = sannaiInvGetBuyerItems();
  const buyerTotal = buyerItems.reduce((s,r)=>s+r.amt,0);
  const buyerComm  = buyerItems[0]?.amt||0;
  const buyEl = document.getElementById('sn-inv-buyer-check');
  if(buyEl && sellPrice>0 && buyerTotal>0) {
    const over = buyerComm - buyLimit;
    buyEl.innerHTML = over > 0
      ? '<div style="padding:6px 10px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.4);border-radius:6px;color:var(--red);font-size:11px">⛔ 上限超過 ¥'+over.toLocaleString()+' — 上限 ¥'+buyLimit.toLocaleString()+'</div>'
      : '<div style="padding:5px 10px;background:rgba(79,156,249,.08);border:1px solid rgba(79,156,249,.3);border-radius:6px;color:var(--blue);font-size:11px">✅ 買主合計 ¥'+buyerTotal.toLocaleString()+' — 上限内（¥'+buyLimit.toLocaleString()+'）</div>';
  }

  // 売主チェック
  const sellerItems = sannaiInvGetSellerItems();
  const sellerTotal = sellerItems.reduce((s,r)=>s+r.amt,0);
  const sellerComm  = sellerItems[0]?.amt||0;
  const selEl = document.getElementById('sn-inv-seller-check');
  if(selEl && buyPrice>0 && sellerTotal>0) {
    const over = sellerComm - sellLimit;
    selEl.innerHTML = over > 0
      ? '<div style="padding:6px 10px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.4);border-radius:6px;color:var(--red);font-size:11px">⛔ 上限超過 ¥'+over.toLocaleString()+' — 上限 ¥'+sellLimit.toLocaleString()+'</div>'
      : '<div style="padding:5px 10px;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.3);border-radius:6px;color:var(--green);font-size:11px">✅ 売主合計 ¥'+sellerTotal.toLocaleString()+' — 上限内（¥'+sellLimit.toLocaleString()+'）</div>';
  }
}

function sannaiInvSave(c) {
  if(!c.invoice) c.invoice={};
  const inv = c.invoice;
  inv.prop = document.getElementById('inv-prop')?.value.trim()||inv.prop||'';
  inv.date = document.getElementById('inv-date')?.value||inv.date||'';
  inv.due  = document.getElementById('inv-due')?.value||inv.due||'';
  const bi = sannaiInvGetBuyerItems();
  if(bi.length) inv.buyerDeleg = bi;
  const si = sannaiInvGetSellerItems();
  if(si.length) inv.sellerDeleg = si;
  inv.buyerComm  = bi[0]?.amt||0;
  inv.sellerComm = si[0]?.amt||0;
}

function issueInvoiceSannai(id) {
  const c = CASES.find(x=>x.id===id); if(!c) return;
  if(!c.invoice) c.invoice={};
  const inv = c.invoice;
  const sn  = c.sannai||{};

  const prop = document.getElementById('inv-prop')?.value.trim()||'';
  const date = document.getElementById('inv-date')?.value||todayISO();
  const due  = document.getElementById('inv-due')?.value||todayISO();
  if(!prop){alert('物件名を入力してください');return;}

  const buyerItems  = sannaiInvGetBuyerItems();
  const sellerItems = sannaiInvGetSellerItems();
  const buyerTotal  = buyerItems.reduce((s,r)=>s+r.amt,0);
  const sellerTotal = sellerItems.reduce((s,r)=>s+r.amt,0);

  if(buyerItems.length===0||buyerTotal===0){alert('買主向け請求項目を入力してください');return;}

  const sellPrice = sn.sellPrice||c.salePrice||0;
  const buyPrice  = sn.buyPrice||0;
  const buyLimit  = sellPrice;  // 買主向け上限 = 販売価格
  const sellLimit = saleCommLimit(buyPrice);
  const buyerComm = buyerItems[0]?.amt||0;
  const sellerComm= sellerItems[0]?.amt||0;

  if(buyLimit>0 && buyerComm>buyLimit) {
    if(!confirm('買主向け仲介手数料（¥'+buyerComm.toLocaleString()+'）が上限（¥'+buyLimit.toLocaleString()+'）を超過しています。このまま発行しますか？')) return;
  }
  if(inv.hasSellerComm && sellLimit>0 && sellerComm>sellLimit) {
    if(!confirm('売主向け仲介手数料（¥'+sellerComm.toLocaleString()+'）が上限（¥'+sellLimit.toLocaleString()+'）を超過しています。このまま発行しますか？')) return;
  }

  const grandTotal = buyerTotal + sellerTotal;
  Object.assign(inv, {
    type:'sannai', prop, date, due,
    buyerDeleg:buyerItems, sellerDeleg:sellerItems,
    buyerComm, sellerComm, buyerTotal, sellerTotal, grandTotal,
    sellPrice, buyPrice,
    hasSellerComm: inv.hasSellerComm||false,
    issued:true,
  });

  const ym = date.slice(0,7).replace('-','');
  const invNumBuyer  = 'INV-'+ym+'-'+c.agent+'-BUY';
  const invNumSeller = 'INV-'+ym+'-'+c.agent+'-SEL';

  slackSend(SLACK_CH.請求書, [
    ...slackHeader('🧾','三為 請求書発行'),
    ...slackCase(c),
    '🏠 *物件*：'+prop,
    '💴 *仕入れ*：¥'+(buyPrice?buyPrice.toLocaleString():'—'),
    '💴 *販売*：¥'+(sellPrice?sellPrice.toLocaleString():'—'),
    '──────────────────',
    '📄 '+invNumBuyer+' 買主向け合計：¥'+buyerTotal.toLocaleString(),
    ...(inv.hasSellerComm?['📄 '+invNumSeller+' 売主向け合計：¥'+sellerTotal.toLocaleString()]:[]),
    '💰 *請求総計*：¥'+grandTotal.toLocaleString(),
    ...slackFooter(),
  ]);

  c.hist.unshift(today()+' 三為請求書発行 買主¥'+buyerTotal.toLocaleString()+(inv.hasSellerComm?' 売主¥'+sellerTotal.toLocaleString():''));
  advance(id,'contract','invoiced',date,'請求書発行完了 → 契約へ');
}

// ── 売買・三為専用請求書 ──
function saleCommLimit(price) {
  // 宅建業法: 8,000,000以下は一律330,000円（税込）, 超えると (price×3%+60,000)×1.1
  if(!price||price<=0) return 0;
  if(price<=8000000) return 330000;
  return Math.round((price*0.03+60000)*1.1);
}

function invSetSaleFrom(btn) {
  const id = btn.dataset.cid;
  const from = btn.dataset.from;
  const c = CASES.find(x=>x.id===id); if(!c) return;
  if(!c.invoice) c.invoice={};
  c.invoice.saleFrom = from;
  open_case(id);
}

    +'<input type="number" id="inv-deleg-amt" class="mono" placeholder="金額" value="'+delegAmt+'" oninput="invCalcSale()" style="width:120px;font-size:13px">'

  return '<div class="step-title">🧾 請求書発行（売買）</div>'
    +'<div style="display:flex;gap:6px;margin-bottom:12px;background:var(--card2);padding:4px;border-radius:8px">'+fromTabHtml+'</div>'
    +dualMsg
    +'<div class="fi"><label>請求書番号</label><input type="text" class="mono" value="'+invNum+'" readonly style="color:var(--muted);font-size:11px;background:rgba(255,255,255,.02);cursor:not-allowed"></div>'
    +'<div class="fi"><label>物件名</label><input type="text" id="inv-prop" value="'+(c.dates.naikenProp||'')+'" oninput="invCalcSale()"></div>'

    // 売主向け項目
    +(saleFrom==='both'

    +'</div>';

    const amt=parseInt(inputs[1]?.value)||0;
    if(desc||amt) items.push({desc,amt});
  });

}

function invCalcSale() {
  const price  = parseInt((document.getElementById('inv-sale-price')?.value||'').replace(/,/g,''))||0;
  const itemsA = invGetItems();
  const itemsB = invGetItemsB();
  const totalA = itemsA.reduce((s,it)=>s+it.amt,0);
  const totalB = itemsB.reduce((s,it)=>s+it.amt,0);
  const commA  = itemsA.length>0 ? itemsA[0].amt : 0;
  const commB  = itemsB.length>0 ? itemsB[0].amt : 0;
  const deleg  = parseInt(document.getElementById('inv-deleg-amt')?.value)||0;
  const limit  = saleCommLimit(price);
  const isBoth = !!document.getElementById('inv-items-b');

  let html='';
  if(price>0) {
    const limitLabel = price<=8000000
      ? '8,000,000円以下 特例: ¥330,000'
      : '¥'+limit.toLocaleString()+'（売買価格×3%+60,000）×1.1';

    html += '<div style="background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:12px">';
    html += '<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:var(--sub)">法定上限（1社あたり）</span><span class="mono" style="color:var(--muted)">¥'+limit.toLocaleString()+'</span></div>';

    // 売主チェック
    if(totalA>0) {
      html += '<div style="border-top:1px solid var(--border);margin:5px 0;padding-top:5px">';

      if(commA>limit) {

          +'⛔ 仲介手数料が上限を ¥'+over.toLocaleString()+' 超過（'+limitLabel+'）<br>'
          +'<span style="font-size:10px;opacity:.85">超過分 ¥'+over.toLocaleString()+' は「業務委託手数料」として下欄に入力してください</span>'
          +'</div>';
      } else if(commA>0) {
        html += '<div style="padding:5px 10px;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.3);border-radius:6px;color:var(--green);font-size:11px;margin-top:4px">✅ 仲介手数料 ¥'+commA.toLocaleString()+' — 適正（上限: '+limitLabel+'）</div>';
      }
      html += '</div>';
    }

    // 買主チェック（両手）
    if(isBoth&&totalB>0) {
      html += '<div style="border-top:1px solid var(--border);margin:5px 0;padding-top:5px">';
      html += '<div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="color:var(--blue)">B 買主向け合計</span><span class="mono">¥'+totalB.toLocaleString()+'</span></div>';
      if(commB>limit) {
        const overB = commB-limit;
        html += '<div style="padding:7px 10px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.4);border-radius:6px;color:var(--red);font-size:11px;margin-top:4px">'
          +'⛔ 買主向け仲介手数料が上限を ¥'+overB.toLocaleString()+' 超過<br>'
          +'<span style="font-size:10px;opacity:.85">超過分は別名目ではなく「業務委託手数料」として計上してください</span>'
          +'</div>';
      } else if(commB>0) {
        html += '<div style="padding:5px 10px;background:rgba(79,156,249,.08);border:1px solid rgba(79,156,249,.3);border-radius:6px;color:var(--blue);font-size:11px;margin-top:4px">✅ 買主向け ¥'+commB.toLocaleString()+' — 適正</div>';
      }
      html += '</div>';
    }

    // 業務委託
    if(deleg>0) {
      html += '<div style="border-top:1px solid var(--border);margin:5px 0;padding-top:5px;display:flex;justify-content:space-between"><span style="color:var(--sub)">業務委託手数料</span><span class="mono">¥'+deleg.toLocaleString()+'</span></div>';
    }

    // グランドトータル
    const grand = totalA+(isBoth?totalB:0)+deleg;
    if(grand>0) {
      html += '<div style="border-top:1px solid var(--border);margin:5px 0;padding-top:5px;display:flex;justify-content:space-between"><span style="color:var(--sub);font-weight:700">合計</span><span class="mono" style="color:var(--gold);font-size:13px">¥'+grand.toLocaleString()+'</span></div>';
    }

    html += '</div>';
  }
  const vp=document.getElementById('inv-validation');
  if(vp) vp.innerHTML=html;
}

function issueInvoiceSale(id) {
  const c = CASES.find(x=>x.id===id); if(!c) return;
  const inv = c.invoice||{};
  const saleFrom = inv.saleFrom||'seller';
  const prop  = document.getElementById('inv-prop')?.value.trim()||'';
  const date  = document.getElementById('inv-date')?.value||todayISO();
  const due   = document.getElementById('inv-due')?.value||todayISO();
  const price = parseInt((document.getElementById('inv-sale-price')?.value||'').replace(/,/g,''))||0;
  if(!prop) {alert('物件名を入力してください');return;}
  if(!price){alert('売買価格を入力してください');return;}

  const itemsA    = invGetItems();
  const itemsB    = saleFrom==='both' ? invGetItemsB() : [];
  const totalA    = itemsA.reduce((s,it)=>s+it.amt,0);
  const totalB    = itemsB.reduce((s,it)=>s+it.amt,0);
  const commA     = itemsA.length>0 ? itemsA[0].amt : 0;
  const commB     = itemsB.length>0 ? itemsB[0].amt : 0;
  const delegAmt  = parseInt(document.getElementById('inv-deleg-amt')?.value)||0;
  const delegDesc = document.getElementById('inv-deleg-desc')?.value.trim()||'業務委託手数料';
  const limit     = saleCommLimit(price);
  const grandTotal= totalA+totalB+delegAmt;

  if(totalA===0){alert('請求項目を入力してください');return;}
  if(commA>limit){
    if(!confirm('仲介手数料（¥'+commA.toLocaleString()+'）が法定上限（¥'+limit.toLocaleString()+'）を超過しています。このまま発行しますか？\n\n超過分は業務委託手数料として別途請求することを検討してください。')) return;
  }
  if(saleFrom==='both'&&commB>limit){
    if(!confirm('買主向け仲介手数料（¥'+commB.toLocaleString()+'）が法定上限（¥'+limit.toLocaleString()+'）を超過しています。このまま発行しますか？')) return;
  }

  c.salePrice = price;
  c.invoice = Object.assign(inv, {
    saleFrom, salePrice:price, items:itemsA, itemsB, commA, commB, totalA, totalB,
    delegAmt, delegDesc, grandTotal, prop, date, due, issued:true,
    dualInvoice: saleFrom==='both',
  });

  const fromLabel = saleFrom==='seller'?'売主から':saleFrom==='both'?'両手':' 買主から';
  c.hist.unshift(today()+' 請求書発行（売買・'+fromLabel+'） 合計¥'+grandTotal.toLocaleString());
  invSendSlack(c, grandTotal, delegAmt, delegDesc, saleFrom==='both');
  const destStep = 'contract';
  advance(id, destStep, 'invoiced', date, '請求書発行完了');
}

function invVirtualAcct(caseId) {
  let h=0;
  for(let i=0;i<caseId.length;i++) h=((h<<5)-h)+caseId.charCodeAt(i);
  return String(Math.abs(h)%9000000+1000000);
}

function invSetType(btn) {
  const id = btn.dataset.cid;

function invGetItems() {
  const rows=document.querySelectorAll('#inv-items .inv-row');
  const items=[];
  rows.forEach(r=>{
    const inputs=r.querySelectorAll('input');
    const desc=inputs[0]?.value.trim()||'';
    const amt=parseInt(inputs[1]?.value)||0;
    if(desc||amt) items.push({desc,amt});
  });
  return items;
}
function invCalc() {
  const rent=parseInt(document.getElementById('inv-rent')?.value)||0;
  const items=invGetItems();
  const commAmt=items.length>0?items[0].amt:0;
  const totalItems=items.reduce((s,it)=>s+it.amt,0);
  const adAmt=parseInt(document.getElementById('inv-ad-amt')?.value)||0;
  const grandTotal=totalItems+adAmt;
  // 売買: 宅建業法上限 = (価格×3%+60,000)×1.1
  const isSaleCalc = !document.getElementById('inv-rent') || (rent > 500000); // heuristic: large = 売買価格
  const saleLimit = rent<=0 ? 0 : Math.round((rent*0.03+60000)*1.1);
  const limit11 = rent<=0 ? 0 : (rent > 500000 ? saleLimit : Math.round(rent*1.1));
  const limit10 = rent;
  let html='';
  if(rent>0&&(totalItems>0||adAmt>0)){
    html+='<div style="background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:12px">';
    if(totalItems>0) html+='<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:var(--sub)">請求項目合計</span><span class="mono">¥'+totalItems.toLocaleString()+'</span></div>';
    const adDescDisp=document.getElementById('inv-ad-desc')?.value||'業務委託手数料';
    if(adAmt>0) html+='<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:var(--sub)">'+adDescDisp+'（AD）</span><span class="mono">¥'+adAmt.toLocaleString()+'</span></div>';
    if(adAmt>0&&totalItems>0) html+='<div style="border-top:1px solid var(--border);margin:5px 0;padding-top:5px;display:flex;justify-content:space-between"><span style="color:var(--sub);font-weight:600">合計</span><span class="mono" style="color:var(--gold);font-size:13px">¥'+grandTotal.toLocaleString()+'</span></div>';
    if(commAmt>0){
      if(commAmt>limit11) html+='<div style="margin-top:6px;padding:6px 10px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.4);border-radius:6px;color:var(--red);font-size:11px">⛔ 仲介手数料（¥'+commAmt.toLocaleString()+'）が上限（¥'+limit11.toLocaleString()+'）を超過 — 宅建業法違反</div>';
      else html+='<div style="margin-top:6px;padding:5px 10px;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.3);border-radius:6px;color:var(--green);font-size:11px">✅ 仲介手数料 ¥'+commAmt.toLocaleString()+' ／ 上限 ¥'+limit11.toLocaleString()+(rent>500000?'（売買価格×3%+60,000）×1.1':'（家賃×1.1)')+' — 適正</div>';
    }
    const checkAmt=grandTotal>0?grandTotal:totalItems;
    if(checkAmt>0 && rent<=500000){
      if(checkAmt>=limit10) html+='<div style="margin-top:5px;padding:5px 10px;background:rgba(79,156,249,.08);border:1px solid rgba(79,156,249,.3);border-radius:6px;color:var(--blue);font-size:11px">💰 合計 ¥'+checkAmt.toLocaleString()+' ≥ 家賃1ヶ月（¥'+limit10.toLocaleString()+'） — 適正</div>';
      else html+='<div style="margin-top:5px;padding:5px 10px;background:rgba(251,146,60,.1);border:1px solid rgba(251,146,60,.4);border-radius:6px;color:var(--orange);font-size:11px">⚠ 合計 ¥'+checkAmt.toLocaleString()+' が家賃1ヶ月（¥'+limit10.toLocaleString()+'）未満</div>';
      const rw=document.getElementById('inv-reason-wrap');
      if(rw) rw.style.display=(checkAmt<limit10)?'block':'none';
    }
    html+='</div>';
  }
  const vp=document.getElementById('inv-validation');
  if(vp) vp.innerHTML=html;
}


function issueInvoice(id) {
  const c=CASES.find(x=>x.id===id); if(!c) return;
  const inv=c.invoice||{};
  const type=inv.type||'commission';
  const adFmt=inv.adFmt||null;
  const prop=document.getElementById('inv-prop')?.value.trim();
  const date=document.getElementById('inv-date')?.value;
  const due=document.getElementById('inv-due')?.value;
  const rent=parseInt(document.getElementById('inv-rent')?.value)||0;
  const reason=document.getElementById('inv-reason')?.value.trim()||'';
  const adAmt=parseInt(document.getElementById('inv-ad-amt')?.value)||0;
  const adDesc=document.getElementById('inv-ad-desc')?.value.trim()||'業務委託手数料';
  if(!prop){alert('物件名を入力してください');return;}

  // AD絡む＋指定フォーマットあり
  if((type==='ad_only'||type==='ad_plus')&&adFmt==='custom'){
    if(!adAmt){alert('業務委託手数料を入力してください');return;}
    c.adOnly=true;
    c.invoice=Object.assign(inv,{type,adFmt,adAmt,adDesc,prop,date,due,issued:true,grandTotal:adAmt});
    c.hist.unshift(today()+' AD請求（指定フォーマット）¥'+adAmt.toLocaleString()+' 口座情報提示');
    const destStep2 = (c.type==='reSale'||c.type==='sannai') ? 'contract' : 'prekey';
  advance(id,destStep2,'invoiced',date,'AD請求書（指定フォーマット）発行');
    return;
  }

  const items=invGetItems();
  const commAmt=items.length>0?items[0].amt:0;
  const totalItems=items.reduce((s,it)=>s+it.amt,0);
  const grandTotal=totalItems+adAmt;
  if(items.length===0||totalItems===0){alert('請求項目と金額を入力してください');return;}
  if(rent>0&&commAmt>Math.round(rent*1.1)){alert('仲介手数料（¥'+commAmt.toLocaleString()+'）が上限（¥'+Math.round(rent*1.1).toLocaleString()+'）を超過しています。');return;}
  if(rent>0&&grandTotal<rent&&!reason){alert('合計が家賃1ヶ月分未満のため理由の記入が必要です。');return;}
  c.adOnly=(type==='ad_only'||type==='ad_plus');
  const dualInv=(type==='ad_plus'&&adFmt==='standard');
  c.invoice=Object.assign(inv,{type,adFmt,items,commAmt,totalItems,adAmt,adDesc,grandTotal,rent,prop,date,due,underReason:reason,issued:true,dualInvoice:dualInv});
  const adLabel=adAmt>0?' 業務委託¥'+adAmt.toLocaleString():'';
  c.hist.unshift(today()+' 請求書発行 合計¥'+grandTotal.toLocaleString()+adLabel+(dualInv?' [2枚]':''));
  invSendSlack(c, grandTotal, adAmt, adDesc, dualInv);
  const destStep = (c.type==='reSale'||c.type==='sannai') ? 'contract' : 'prekey';
  advance(id,destStep,'invoiced',date,'請求書発行完了');
}


function invSendSlack(c, grandTotal, adAmt, adDesc, dualInv) {
  const inv = c.invoice || {};
  const isSaleType = c.type==='reSale' || c.type==='sannai';
  const saleFromLabel = inv.saleFrom==='both' ? '両手（売主＋買主）' : inv.saleFrom==='buyer' ? '買主から' : '売主から';
  const typeLabel = isSaleType
    ? ('売買仲介 / '+saleFromLabel)
    : (inv.type==='commission' ? '仲介手数料のみ' : inv.type==='ad_plus' ? 'AD＋仲介手数料' : 'ADのみ');
  const fmtLabel = inv.adFmt==='custom' ? '指定フォーマット' : inv.adFmt==='standard' ? 'CORETO標準' : '—';
  const lines = [
    '━━━━━━━━━━━━━━━━━━━━━━',
    '🧾 *請求書発行通知*',
    '━━━━━━━━━━━━━━━━━━━━━━',
    `📁 *案件ID*：${c.id}`,
    `👤 *クライアント*：${escHtml(c.name)}`,
    `🏠 *物件*：${inv.prop||c.sub||'—'}`,
    `📋 *種別*：${typeLabel}`,
    isSaleType && inv.salePrice ? `💴 *売買価格*：¥${parseInt(inv.salePrice).toLocaleString()}` : null,
    !isSaleType && inv.rent ? `🏷 *家賃*：¥${parseInt(inv.rent).toLocaleString()}` : null,
    inv.commAmt ? `💴 *仲介手数料（売主）*：¥${parseInt(inv.commAmt).toLocaleString()}` : null,
    inv.commB  ? `💴 *仲介手数料（買主）*：¥${parseInt(inv.commB).toLocaleString()}` : null,
    adAmt ? `💼 *${adDesc||'業務委託手数料'}*：¥${parseInt(adAmt).toLocaleString()}` : null,
    `💰 *合計*：¥${parseInt(grandTotal).toLocaleString()}`,
    isSaleType && dualInv ? '📄 請求書2枚発行（両手）' : null,
    !isSaleType && dualInv ? '📄 請求書2枚発行（仲介＋業務委託）' : null,
    !isSaleType && inv.adFmt ? `📋 管理会社フォーマット：${fmtLabel}` : null,
    inv.underReason ? `⚠ 減額・理由：${inv.underReason}` : null,
    '━━━━━━━━━━━━━━━━━━━━━━',
    `🕐 ${new Date().toLocaleString('ja-JP')}`,
  ].filter(Boolean).join('\n');

  // 本番: SLACK_WEBHOOK_URL に fetch POST
  notifySlack('[Slack #請求書] ', lines);

  // クリップボードにコピー
  try {
    const ta = document.createElement('textarea');
    ta.value = lines; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  } catch(e) {}

  toast('Slack #請求書 に送信しました ✅');
}

function editInvoice(id) {

function paymentCheck(id) {
  // HQ権限チェック
  if (!window._SESSION || window._SESSION.type !== 'hq') {
    toast('⚠️ 入金確認は本部のみ実行できます'); return;
  }
  const c = CASES.find(x=>x.id===id); if(!c) return;
  // 実際の振込日を取得（モーダルの入力値 or 今日）
  const dateInput = document.getElementById('pay-date-input');
  const memoInput = document.getElementById('pay-memo-input');
  const paidDate = dateInput ? dateInput.value : todayISO();
  const memo     = memoInput ? memoInput.value.trim() : '';
  if (!paidDate) { toast('振込日を入力してください'); return; }

  if(!c.taskDone) c.taskDone={};
  c.taskDone.paid = true;
  c.dates.paid = paidDate;
  const histLine = paidDate + ' 入金確認済' + (memo ? '（'+memo+'）' : '') + '【本部確認: '+(window._SESSION.name||window._SESSION.userId)+'】';
  c.hist.unshift(histLine);

  // モーダルを閉じる
  const ov = document.getElementById('pay-confirm-overlay');
  if (ov) ov.remove();

  const prop = (c.apps&&c.apps.find(a=>a.status==='approved')||{}).prop || c.sub || '—';
  const inv = c.invoice;
  const totalAmt = inv ? (inv.grandTotal || (inv.commAmt||0)+(inv.adAmt||0) || 0) : 0;
  slackSend(SLACK_CH.入金, [
    ...slackHeader('💰','入金確認（本部処理）'),
    ...slackCase(c),
    '🏠 *物件*：' + prop,
    '📅 *振込日*：' + paidDate,
    ...(totalAmt ? ['💴 *金額*：¥' + totalAmt.toLocaleString()] : []),
    ...(memo ? ['📝 *備考*：' + memo] : []),
    '👤 *確認者*：' + (window._SESSION.name || window._SESSION.userId),
    ...slackFooter(),
  ]);
  open_case(id); toast('✅ 入金確認しました（振込日: ' + paidDate + '）');
}

function stepSannaiOffer(c) {
  const today = new Date().toISOString().slice(0,10);
  const skipLabel = c.dates.naiken ? '' : '<span style="font-size:10px;color:var(--orange);margin-left:8px">内見なし</span>';
  const sn = c.sannai || {};
  const commPayMode = sn.commPayMode || 'none'; // none / buy / sell / both

  const id = c.id;

  // 仲介手数料支払いモードボタン
  const commModes = [
    {v:'none', label:'なし'},
    {v:'buy',  label:'買い側'},
    {v:'sell', label:'売り側'},
    {v:'both', label:'両側'},
  ];
  const commModeBtns = commModes.map(m => {
    const active = commPayMode === m.v;
    const bg = active ? 'background:var(--orange);color:#000' : 'background:var(--card2);color:var(--sub)';
    return '<button onclick="sannaiSetCommMode(this)" data-cid="'+id+'" data-mode="'+m.v+'" style="flex:1;padding:6px 2px;border:none;cursor:pointer;font-size:11px;font-weight:600;border-radius:6px;'+bg+'">'+m.label+'</button>';
  }).join('');

  // 仲介手数料入力欄（モードに応じて表示）
  let commPayFields = '';
  if (commPayMode === 'buy' || commPayMode === 'both') {
    commPayFields += '<div style="display:grid;grid-template-columns:1fr auto;gap:6px;align-items:end;margin-top:8px">'
      +'<div class="fi" style="margin-bottom:0"><label style="color:var(--blue)">買い側 仲介会社名</label>'
      +'<input type="text" id="sn-comm-buy-co" placeholder="例: 株式会社〇〇不動産" value="'+(sn.commBuyCo||'')+'" style="font-size:12px"></div>'
      +'<div class="fi" style="margin-bottom:0"><label style="color:var(--blue)">金額（税込）</label>'
      +'<input type="text" id="sn-comm-buy-amt" class="mono" placeholder="0" value="'+(sn.commBuyAmt?fmtYen(sn.commBuyAmt):'')+'" oninput="invSalePriceInput(this)" style="width:110px;font-size:13px"></div>'
      +'</div>';
  }
  if (commPayMode === 'sell' || commPayMode === 'both') {
    commPayFields += '<div style="display:grid;grid-template-columns:1fr auto;gap:6px;align-items:end;margin-top:8px">'
      +'<div class="fi" style="margin-bottom:0"><label style="color:var(--green)">売り側 仲介会社名</label>'
      +'<input type="text" id="sn-comm-sell-co" placeholder="例: 株式会社〇〇不動産" value="'+(sn.commSellCo||'')+'" style="font-size:12px"></div>'
      +'<div class="fi" style="margin-bottom:0"><label style="color:var(--green)">金額（税込）</label>'
      +'<input type="text" id="sn-comm-sell-amt" class="mono" placeholder="0" value="'+(sn.commSellAmt?fmtYen(sn.commSellAmt):'')+'" oninput="invSalePriceInput(this)" style="width:110px;font-size:13px"></div>'
      +'</div>';
  }

  // 業務委託手数料行
  const delegHtml = delegRows.map((r,i) => sannaiDelegRow(i, r)).join('');

  // 粗利プレビュー
  const profitHtml = sannaiProfitPreview(sn, c.salePrice || sn.sellPrice || 0);

  return '<div class="step-title">📄 買付（三為）'+skipLabel+'</div>'
    +'<div class="fi"><label>物件名</label><input type="text" id="s-sale-prop" value="'+(c.dates.naikenProp||'')+'" placeholder="〇〇マンション 101号"></div>'
    +'<div class="fi"><label>買付日</label><input type="date" id="s-offer-date" class="mono" value="'+today+'"></div>'

    // ── 取引価格 ──
    +'<div style="margin:12px 0 8px;padding:12px;background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.2);border-radius:10px">'
    +'<div style="font-size:10px;color:var(--gold);font-weight:700;letter-spacing:.8px;margin-bottom:10px">💴 取引価格</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'
    +'<div class="fi" style="margin-bottom:0"><label>仕入れ価格（円）<br><span style="font-size:9px;color:var(--muted);font-weight:400">売主への支払い</span></label>'
    +'<input type="text" id="sn-buy-price" class="mono" placeholder="例: 40,000,000" value="'+(sn.buyPrice?fmtYen(sn.buyPrice):'')+'" oninput="sannaiCalcProfit()" style="font-size:13px"></div>'
    +'<div class="fi" style="margin-bottom:0"><label>販売価格（円）<br><span style="font-size:9px;color:var(--muted);font-weight:400">買主からの受取</span></label>'
    +'<input type="text" id="sn-sell-price" class="mono" placeholder="例: 45,000,000" value="'+(sn.sellPrice||c.salePrice?fmtYen(sn.sellPrice||c.salePrice):'')+'" oninput="sannaiCalcProfit()" style="font-size:13px"></div>'
    +'</div>'
    +'<div id="sn-spread" style="margin-top:8px"></div>'
    +'</div>'

    // ── 支払い仲介手数料 ──
    +'<div style="margin:10px 0 8px;padding:12px;background:rgba(251,146,60,.04);border:1px solid rgba(251,146,60,.15);border-radius:10px">'
    +'<div style="font-size:10px;color:var(--orange);font-weight:700;letter-spacing:.8px;margin-bottom:8px">💸 支払い仲介手数料</div>'

    +'<div style="margin:10px 0 8px;padding:12px;background:rgba(167,139,250,.04);border:1px solid rgba(167,139,250,.15);border-radius:10px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
    +'<div style="font-size:10px;color:var(--purple);font-weight:700;letter-spacing:.8px">📋 支払い業務委託手数料</div>'
    +'<button data-cid="'+id+'" onclick="sannaiAddDeleg(this.dataset.cid)" style="background:rgba(167,139,250,.15);border:1px solid rgba(167,139,250,.3);color:var(--purple);border-radius:6px;padding:3px 10px;cursor:pointer;font-size:10px;font-weight:600">＋ 追加</button>'
    +'</div>'
    +(delegRows.length === 0
      ? '<div style="font-size:11px;color:var(--muted);text-align:center;padding:8px">なし（＋ 追加で入力）</div>'
      : '<div id="sn-deleg-rows">'+delegHtml+'</div>')
    +'</div>'

    +profitHtml
    +'<button class="btn btn-green" style="width:100%;justify-content:center;margin-top:14px" data-cid="'+id+'" onclick="sannaiOfferDone(this.dataset.cid)">買付受領 → 請求書へ</button>';
}

// ── 三為: 業務委託手数料行HTML ──
function sannaiDelegRow(idx, r) {
  r = r || {};
  const typeOpts = [
    {v:'broker', label:'仲介会社'},
    {v:'other',  label:'その他'},
  ];
  const typeHtml = typeOpts.map(o =>
    '<option value="'+o.v+'"'+(r.type===o.v?' selected':'')+'>'+o.label+'</option>'
  ).join('');
  return '<div class="sn-deleg-row" data-idx="'+idx+'" style="display:grid;grid-template-columns:1fr 90px 100px auto;gap:5px;margin-bottom:6px;align-items:center">'
    +'<input type="text" placeholder="会社名 / 内容" value="'+(r.co||'')+'" style="font-size:11px">'
    +'<select style="background:#090b13;border:1px solid var(--border2);border-radius:7px;padding:5px 6px;color:var(--sub);font-size:10px;font-family:inherit">'+typeHtml+'</select>'
    +'<input type="text" placeholder="金額（税込）" value="'+(r.amt?fmtYen(r.amt):'')+'" class="mono" style="font-size:12px" oninput="invSalePriceInput(this)">'
    +'<button onclick="sannaiRemoveDeleg(this)" style="background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--red);border-radius:6px;width:26px;height:26px;cursor:pointer;font-size:13px;padding:0">×</button>'
    +'</div>';
}

function sannaiRemoveDeleg(btn) {
  btn.closest('.sn-deleg-row')?.remove();
  sannaiCalcProfit();
}

function sannaiAddDeleg(id) {
  const c = CASES.find(x=>x.id===id); if(!c) return;
  sannaiReadOfferForm(id); // 入力中のデータを保存してから再描画
  if(!c.sannai) c.sannai = {};
  if(!c.sannai.delegPay) c.sannai.delegPay = [];
  c.sannai.delegPay.push({co:'', type:'broker', amt:0});
  open_case(id);
}

function sannaiSetCommMode(btn) {
  const id = btn.dataset.cid, mode = btn.dataset.mode;
  const c = CASES.find(x=>x.id===id); if(!c) return;
  sannaiReadOfferForm(id); // 入力中のデータを保存してから再描画
  if(!c.sannai) c.sannai = {};
  c.sannai.commPayMode = mode;
  open_case(id);
}

function sannaiCalcProfit() {
  const buyPrice  = parseInt((document.getElementById('sn-buy-price')?.value||'').replace(/,/g,''))||0;
  const sellPrice = parseInt((document.getElementById('sn-sell-price')?.value||'').replace(/,/g,''))||0;
  const spread = sellPrice - buyPrice;

  // collect comm costs
  const commBuy  = parseInt((document.getElementById('sn-comm-buy-amt')?.value||'').replace(/,/g,''))||0;
  const commSell = parseInt((document.getElementById('sn-comm-sell-amt')?.value||'').replace(/,/g,''))||0;

  // collect deleg costs
  let delegTotal = 0;
  document.querySelectorAll('.sn-deleg-row').forEach(row => {
    const inputs = row.querySelectorAll('input');
    delegTotal += parseInt((inputs[1]?.value||'').replace(/,/g,''))||0;
  });

  const totalCost = commBuy + commSell + delegTotal;
  const profit = spread - totalCost;

  const el = document.getElementById('sn-spread');
  if (!el) return;
  if (!buyPrice && !sellPrice) { el.innerHTML = ''; return; }

  let html = '<div style="display:grid;grid-template-columns:auto 1fr;gap:3px 10px;font-size:11px;margin-top:4px">';
  if(buyPrice>0) html += '<span style="color:var(--muted)">仕入れ</span><span class="mono" style="color:var(--sub)">¥'+buyPrice.toLocaleString()+'</span>';
  if(sellPrice>0) html += '<span style="color:var(--muted)">販売</span><span class="mono" style="color:var(--sub)">¥'+sellPrice.toLocaleString()+'</span>';
  if(buyPrice>0 && sellPrice>0) {
    const spreadColor = spread >= 0 ? 'var(--green)' : 'var(--red)';
    html += '<span style="color:var(--muted)">スプレッド</span><span class="mono" style="color:'+spreadColor+';font-weight:700">'+(spread>=0?'+':'')+'¥'+spread.toLocaleString()+'</span>';
  }
  if(totalCost > 0) {
    html += '<span style="color:var(--muted)">支払手数料計</span><span class="mono" style="color:var(--orange)">-¥'+totalCost.toLocaleString()+'</span>';
    const profitColor = profit >= 0 ? 'var(--green)' : 'var(--red)';
    html += '<span style="color:var(--muted);font-weight:700">概算粗利</span><span class="mono" style="color:'+profitColor+';font-weight:700;font-size:13px">'+(profit>=0?'+':'')+'¥'+profit.toLocaleString()+'</span>';
  }
  html += '</div>';
  el.innerHTML = html;
}

function sannaiProfitPreview(sn, fallbackSell) {
  const bp = sn.buyPrice || 0;
  const sp = sn.sellPrice || fallbackSell || 0;
  if (!bp && !sp) return '';
  const spread = sp - bp;
  const commBuy = sn.commBuyAmt || 0;
  const commSell = sn.commSellAmt || 0;
  const delegTotal = (sn.delegPay || []).reduce((s, r) => s + (r.amt || 0), 0);
  const totalCost = commBuy + commSell + delegTotal;
  const profit = spread - totalCost;
  const profitColor = profit >= 0 ? 'var(--green)' : 'var(--red)';
  if (!totalCost) return '';
  return '<div style="padding:8px 12px;background:rgba(52,211,153,.04);border:1px solid rgba(52,211,153,.15);border-radius:8px;margin-bottom:8px;font-size:11px">'
    +'<div style="display:flex;justify-content:space-between">'
    +'<span style="color:var(--muted)">概算粗利</span>'
    +'<span class="mono" style="color:'+profitColor+';font-weight:700">'+(profit>=0?'+':'')+'¥'+profit.toLocaleString()+'</span>'
    +'</div></div>';
}

function sannaiReadOfferForm(id) {
  const c = CASES.find(x=>x.id===id); if(!c) return;
  if(!c.sannai) c.sannai = {};
  const sn = c.sannai;

  const buyPrice  = parseInt((document.getElementById('sn-buy-price')?.value||'').replace(/,/g,''))||0;
  const sellPrice = parseInt((document.getElementById('sn-sell-price')?.value||'').replace(/,/g,''))||0;

  if(buyPrice)  sn.buyPrice  = buyPrice;
  if(sellPrice) { sn.sellPrice = sellPrice; c.salePrice = sellPrice; }

  // comm pay
  const commBuyCo  = document.getElementById('sn-comm-buy-co')?.value.trim()||'';
  const commBuyAmt = parseInt((document.getElementById('sn-comm-buy-amt')?.value||'').replace(/,/g,''))||0;
  const commSellCo  = document.getElementById('sn-comm-sell-co')?.value.trim()||'';
  const commSellAmt = parseInt((document.getElementById('sn-comm-sell-amt')?.value||'').replace(/,/g,''))||0;
  if(commBuyCo)  sn.commBuyCo  = commBuyCo;
  if(commBuyAmt) sn.commBuyAmt = commBuyAmt;
  if(commSellCo)  sn.commSellCo  = commSellCo;
  if(commSellAmt) sn.commSellAmt = commSellAmt;

  // deleg rows
  const rows = [];
  document.querySelectorAll('.sn-deleg-row').forEach(row => {
    const inputs = row.querySelectorAll('input');
    const selects = row.querySelectorAll('select');
    const co  = inputs[0]?.value.trim()||'';
    const type = selects[0]?.value||'broker';
    const amt  = parseInt((inputs[1]?.value||'').replace(/,/g,''))||0;
    if(co || amt) rows.push({co, type, amt});
  });
  sn.delegPay = rows;
}

function sannaiOfferDone(id) {
  try {
    const prop  = document.getElementById('s-sale-prop')?.value.trim()||'';
    const d     = document.getElementById('s-offer-date')?.value||todayISO();
    const c = CASES.find(x=>x.id===id); if(!c) return;
    if(!c.dates) c.dates = {};
    if(!c.hist)  c.hist  = [];

    sannaiReadOfferForm(id);

    const sn = c.sannai || {};
    if(prop) c.dates.naikenProp = prop;
    if(!c.invoice) c.invoice = {type:'commission'};

    // Build hist memo
    const bp = sn.buyPrice ? ' 仕入¥'+sn.buyPrice.toLocaleString() : '';
    const sp = sn.sellPrice ? ' 販売¥'+sn.sellPrice.toLocaleString() : '';
    advance(id,'invoice','offer',d,'買付受領'+bp+sp+' → 請求書へ');
  } catch(e) { console.error('sannaiOfferDone:', e); }
}

function stepSannaiVerify(c) {
  const b   = c.buyer || {};
  const id  = c.id;
  const state = b.verifyState || 'input'; // 'input' | 'pending' | 'verified'

  // ── 認証済み → 買付へ進む ──
  if (state === 'verified') {
    const isSpecial = b.isSpecial || false;
    const statusTxt = isSpecial
      ? '✅ 特例承認済 — 本部承認コード確認済'
      : '✅ 宅建業者確認済 — ' + (b.takkenNum||'');

// 本部にSlack通知 → ページ内では pending 状態にする
function sannaiRequestVerify(id) {
  const name   = document.getElementById('sn-buyer-name')?.value.trim()||'';
  const takken = document.getElementById('sn-takken')?.value.trim()||'';
  const c = CASES.find(x=>x.id===id); if(!c) return;
  if(!name) { alert('買主の会社名を入力してください'); return; }
  if(!c.buyer) c.buyer = {};

  // 6桁英数字コード自動生成
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for(let i=0;i<6;i++) code += chars[Math.floor(Math.random()*chars.length)];

  c.buyer.name        = name;
  c.buyer.takkenNum   = takken;
  c.buyer.pendingCode = code;
  c.buyer.verifyState = 'pending';
  c.buyer.isSpecial   = !takken; // 宅建番号なし = 一般法人扱い

  const isSpecial = !takken;
  const lines = [
    '━━━━━━━━━━━━━━━━━━━━━━',
    isSpecial ? '⚠ *三為 業者確認依頼（一般法人特例）*' : '🔍 *三為 業者確認依頼*',
    '━━━━━━━━━━━━━━━━━━━━━━',
    `📁 *案件ID*：${id}`,
    `🏠 *物件*：${c.dates?.naikenProp||c.sub||'—'}`,
    `🏢 *買主*：${name}`,
    takken ? `📋 *宅建番号*：${takken}` : '📋 *宅建番号*：（未入力 / 一般法人）',
    `🔑 *承認コード*：\`${code}\``,
    '━━━━━━━━━━━━━━━━━━━━━━',
    '✅ 確認後、上記コードをエージェントに伝達してください',
    `🕐 ${new Date().toLocaleString('ja-JP')}`,
  ].join('\n');

  notifySlack('[Slack #三為確認]\n', lines);
  // Slack webhook 送信（モック: クリップボードにコピー）
  try {
    const ta=document.createElement('textarea');
    ta.value=lines; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  } catch(e){}

  c.hist.unshift(today()+' 業者確認依頼送信 / 買主: '+name+(takken?' ('+takken+')':'（一般法人）'));
  open_case(id);
  toast('確認依頼を送信しました — 本部からコードを受け取ってください');
}


function editSannaiOffer(id) {
  const c = CASES.find(x=>x.id===id); if(!c) return;
  c.step = 'offer';
  open_case(id);
}


function sannaiVerifyPass(id) {
  // 認証済み確認後、買付ステップへ進む
  try {
    const c = CASES.find(x=>x.id===id); if(!c) return;
    if(!c.dates) c.dates = {};
    if(!c.hist)  c.hist  = [];
    if(!c.invoice) c.invoice = {type:'commission'};
    advance(id,'offer',null,null,'業者確認済 → 買付へ');
  } catch(e) { console.error('sannaiVerifyPass:', e); }
}

function sannaiVerifyReset(id) {
  const c = CASES.find(x=>x.id===id); if(!c) return;
  if(!c.buyer) c.buyer = {};
  c.buyer.verifyState = 'input';
  c.buyer.pendingCode = null;
  c.buyer.verified    = false;
  open_case(id);
}

function sannaiEnterCode(id) {
  const code = (document.getElementById('sn-verify-code')?.value||'').trim().toUpperCase();
  const c = CASES.find(x=>x.id===id); if(!c) return;
  if(!code) { alert('承認コードを入力してください'); return; }
  if(!c.buyer) { alert('先に確認依頼を送信してください'); return; }

  const expectedCode = c.buyer.pendingCode;
  if(!expectedCode) {
    alert('確認依頼がまだ送信されていません。先に「本部に確認依頼を送る」を押してください。');
    return;
  }
  if(code !== expectedCode) {
    alert('承認コードが正しくありません。本部から受け取ったコードを正確に入力してください。\n\n入力: ' + code);
    return;
  }

  // 認証成功
  c.buyer.verified    = true;
  c.buyer.verifyState = 'verified';
  c.hist.unshift(today()+' 業者確認完了 / '+c.buyer.name+(c.buyer.takkenNum?' ('+c.buyer.takkenNum+')':'（一般法人承認）'));
  slackSend(SLACK_CH.三為確認, [
    ...slackHeader('✅','三為 業者確認コード認証完了'),
    ...slackCase(c),
    '🏠 *物件*：'+(c.dates?.naikenProp||c.sub||'—'),
    '🏢 *買主*：'+c.buyer.name,
    c.buyer.takkenNum ? '📋 *宅建番号*：'+c.buyer.takkenNum : '📋 *宅建番号*：（一般法人）',
    '🔑 *認証*：完了',
    ...slackFooter(),
  ]);
  open_case(id);
  toast('✅ 業者確認完了 — 買付入力へ進んでください');
}

function settlementDone(id) {

  const d = document.getElementById('s-settlement')?.value||todayISO();
  const inv = c.invoice||{};
  const sn  = c.sannai||{}; 

  // ③ AI通知文生成（非同期・バックグラウンドで実行）
  aiGenerateSlackMsg(c, d, inv, sn);

  advance(id,'done','settlement',d,'決済完了 (決済日: '+d+') → 成約');
}

async function aiGenerateSlackMsg(c, settlementDate, inv, sn) {
  const typeLabel = c.type==='sannai'?'三為':c.type==='reSale'?'売買':'賃貸';
  const prop = inv.prop||c.dates?.naikenProp||c.sub||'—';
  const price = sn.sellPrice ? '¥'+sn.sellPrice.toLocaleString()
    : inv.salePrice ? '¥'+parseInt(inv.salePrice).toLocaleString() : '—';
  const fee = inv.grandTotal ? '¥'+parseInt(inv.grandTotal).toLocaleString() : '—';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:400,
        system:'不動産仲介会社のSlack通知文を作成します。絵文字を適度に使い、簡潔で読みやすい日本語の通知文を生成してください。JSONのみで回答。前置き不要。',
        messages:[{role:'user', content:
          '以下の成約情報からSlack通知文を生成してください。\n' +
          JSON.stringify({
            案件種別: typeLabel,
            物件名: prop,
            クライアント名: c.name,
            担当AG: c.agent,
            決済日: settlementDate,
            売買価格: price,
            手数料: fee,
            案件ID: c.id
          }) +
          '\n\n{"text":"Slack投稿テキスト（200字以内）","summary":"1行サマリー（50字以内）"}'
        }]
      })
    });
    const data = await res.json();
    const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const parsed = JSON.parse(text.replace(/```json|```/g,'').trim());

    // トーストでAI生成文を表示 + クリップボードコピー
    showAiSlackToast(parsed.text, parsed.summary);
  } catch(e) {
    console.log('AI通知文生成スキップ:', e.message);
    // 失敗しても通常フローは継続
  }
}

function showAiSlackToast(slackText, summary) {
  var existing = document.getElementById('ai-slack-toast');
  if (existing) existing.remove();
  var t = document.createElement('div');
  t.id = 'ai-slack-toast';
  t.style.cssText = 'position:fixed;bottom:80px;right:20px;width:340px;background:#111520;' +
    'border:1px solid rgba(201,168,76,.4);border-radius:12px;padding:16px;z-index:99999;' +
    'box-shadow:0 8px 32px rgba(0,0,0,.5);font-family:\'Noto Sans JP\',sans-serif';
  t.innerHTML =
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">' +
      '<div style="font-size:11px;font-weight:700;color:var(--gold)">✨ AI Slack通知文</div>' +
      '<button onclick="this.closest(\'#ai-slack-toast\').remove()" ' +
        'style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px">✕</button>' +
    '</div>' +
    '<div style="font-size:11px;color:var(--sub);line-height:1.7;white-space:pre-wrap;' +
      'background:rgba(255,255,255,.03);border-radius:7px;padding:10px;margin-bottom:10px">' +
      escHtml(slackText) +
    '</div>' +
    '<button onclick="copyAiSlackText(this)" data-text="' + slackText.replace(/"/g,'&quot;') + '" ' +
      'style="width:100%;padding:8px;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);' +
      'color:var(--gold);border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;' +
      'font-family:\'Noto Sans JP\',sans-serif">📋 コピーして貼り付け</button>';
  document.body.appendChild(t);
  setTimeout(function(){ if(t.parentNode) t.remove(); }, 30000);
}

function copyAiSlackText(btn) {
  var text = btn.getAttribute('data-text');
  var ta = document.createElement('textarea');
  ta.value = text; document.body.appendChild(ta); ta.select();
  document.execCommand('copy'); document.body.removeChild(ta);
  btn.textContent = '✅ コピーしました';
  setTimeout(function(){ btn.textContent = '📋 コピーして貼り付け'; }, 2000);
}

function offerDone(id) {
  try {
    const prop  = document.getElementById('s-sale-prop')?.value.trim()||'';
    const price = parseInt((document.getElementById('s-sale-price')?.value||'').replace(/,/g,''))||0;
    const d     = document.getElementById('s-offer-date')?.value||todayISO();
    const c = CASES.find(x=>x.id===id);
    if(!c) { console.error('offerDone: case not found', id); return; }
    if(!c.dates) c.dates = {};
    if(!c.hist)  c.hist  = [];
    if(prop)  c.dates.naikenProp = prop;
    if(price) c.salePrice = price;
    if(!c.invoice) c.invoice = {type:'commission'};
    advance(id,'invoice','offer',d,'買付受領 → 請求書へ');
  } catch(e) {
    console.error('offerDone error:', e);
    toast('エラー: '+e.message);
  }
}

  advance(id,'cancel',null,null,'キャンセル');
}
function reactivate(id) {
  const c = CASES.find(x=>x.id===id);
  c.step='naiken'; c.hist.unshift(today()+' 案件再開');
  open_case(id);
}

function jumpStep(id, stepId) {
  const c = CASES.find(x=>x.id===id);
  if(!c) return;
  const steps = c.type==='reLet'?STEPS_RELET:c.type==='sannai'?STEPS_SANNAI:STEPS_RESALE;
  const valid = steps.map(s=>s.id);
  if(!valid.includes(stepId)) return;
  c.step = stepId;
  open_case(id);
}

function addMemo(id) {
  const inp = document.getElementById('memo-inp');

  const c = CASES.find(x=>x.id===id);
  c.hist.unshift(today()+' '+txt);
  inp.value='';
  buildStepContent(c);
}

    ext.style.display='block'; lbl.textContent='法人名'; inp.placeholder='株式会社〇〇';
  } else {
    ind.style.borderColor='var(--gold)'; ind.style.color='var(--gold)';
    corp.style.borderColor=''; corp.style.color='';
    ext.style.display='none'; lbl.textContent='氏名'; inp.placeholder='田中 太郎';
  }
}

function createCase() {
  const name = document.getElementById('nc-name')?.value.trim();
  if(!name){alert('名前を入力してください');return;}
  const contact = document.getElementById('nc-contact')?.value.trim()||'';
  if(_corpMode&&!contact){alert('担当者名を入力してください');return;}
  const type = document.getElementById('nc-type')?.value;
  const sub  = document.getElementById('nc-sub')?.value.trim()||'—';
  const prefix = type==='reLet'?'R':type==='reSale'?'S':type==='sannai'?'N':'H';
  const id = prefix+String(Math.floor(Math.random()*90000+10000));
  const initStep = (type==='reLet'||type==='reSale'||type==='sannai')?'naiken':'new';
  const adOnly = document.getElementById('nc-ad')?.checked && type==='reLet';
  const _agentId = (window._SESSION && window._SESSION.userId) ? window._SESSION.userId : '10012';
  const obj = {id, name, type, corp:_corpMode, agent:_agentId, sub, step:initStep, age:0, stale:false, adOnly, taskDone:{paid:false,itsetsu:false}, apps:[], dates:{}, hist:[today()+' 案件登録'+(adOnly?' [AD案件]':'')]};
  if(_corpMode&&contact) obj.contactName = contact;
  if(type==='sannai') obj.buyer = {name:'', takkenNum:'', verified:false, bypass:false};
  if(type==='hr') {
    const firstCo = document.getElementById('nc-company')?.value.trim();
    const firstPos = document.getElementById('nc-position')?.value.trim()||'—';
    const firstSal = parseInt(document.getElementById('nc-salary')?.value)||0;
    obj.industry  = firstPos;
    obj.position  = firstPos;
    obj.salary    = document.getElementById('nc-salary')?.value||'';
    obj.companies = firstCo ? [{
      id: 'CO'+String(Date.now()).slice(-6),
      name: firstCo, industry:'', position: firstPos,
      salary: firstSal, status:'screening',
      interviewCount:0, nextInterview:'', fee:0, startDate:'', notes:''
    }] : [];
    obj.step = 'naiken';
  }
  CASES.unshift(obj);
  closeModal();
  render();
  open_case(id);
  // Slack #新規案件
  const typeLabel2 = type==='sannai'?'三為':type==='reSale'?'売買':type==='reLet'?'賃貸':'その他';
  const consentOk  = document.getElementById('nc-consent')?.checked;
  const juminhyoOk = document.getElementById('nc-juminhyo')?.checked;
  const nameRuleOk = document.getElementById('nc-name-rule')?.checked;
  slackSend(SLACK_CH.新規案件, [
    ...slackHeader('🆕','新規案件登録'),
    '📁 *案件ID*：'+id,
    '👤 *クライアント*：'+name+(_corpMode&&contact?' （担当: '+contact+'）':''),
    '🏷 *種別*：'+typeLabel2+(_corpMode?' / 法人':''),
    type==='hr' ? '🏢 *企業*：'+(document.getElementById('nc-company')?.value||'—') : null,
    type==='hr' ? '💼 *ポジション*：'+(document.getElementById('nc-position')?.value||'—') : null,
    adOnly ? '💡 AD案件' : null,
    '👨‍💼 *担当エージェント*：'+obj.agent,
    type==='reLet' ? `📋 *確認事項*：個人情報同意${consentOk?'✅':'⬜'}　住民票依頼${juminhyoOk?'✅':'⬜'}　担当者名入力${nameRuleOk?'✅':'⬜'}` : null,
    sub&&sub!=='—' ? '📝 *備考*：'+sub : null,
    ...slackFooter(),
  ]);
  toast('案件を登録しました');
}

// 売買価格カンマ区切りフォーマット
function fmtYen(v) {
  if (!v && v !== 0) return '';
  const n = parseInt(String(v).replace(/,/g,''));
  return isNaN(n) ? '' : n.toLocaleString('ja-JP');
}

function invSalePriceInput(el) {
  const raw = el.value.replace(/[^0-9]/g,'');
  const num = parseInt(raw);
  const formatted = isNaN(num) ? '' : num.toLocaleString('ja-JP');
  const pos = el.selectionStart;
  const oldLen = el.value.length;
  el.value = formatted;
  const newLen = formatted.length;
  const delta = newLen - oldLen;
  el.setSelectionRange(Math.max(0, pos + delta), Math.max(0, pos + delta));
  if (document.getElementById('inv-sale-price')) invCalcSale();
  if (document.getElementById('sn-spread')) sannaiCalcProfit();
}

function openModal(inner) {
  document.getElementById('modal-box').innerHTML = inner;
  document.getElementById('overlay').classList.add('on');
}

function closeModal() { document.getElementById('overlay').classList.remove('on'); }
document.getElementById('overlay').addEventListener('click', e=>{if(e.target.id==='overlay')closeModal();});

function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent='✓ '+msg; t.style.display='block';
  clearTimeout(t._t); t._t=setTimeout(()=>t.style.display='none',2200);
}

// ── 紹介リンクモーダル ──────────────────────────────────────
var _refCurrentCode = '';
function openRefModal() {
  var overlay = document.getElementById('ref-modal-overlay');
  var selector = document.getElementById('ref-code-selector');
  var isExec = (typeof session !== 'undefined' && session && session.hqRole === 'exec')
            || (typeof CURRENT_USER !== 'undefined' && CURRENT_USER && CURRENT_USER.hqRole === 'exec');
  var agentId = (typeof session !== 'undefined' && session && session.userId) ? session.userId
              : (typeof ME !== 'undefined' && ME && ME.id) ? ME.id
              : (typeof AGENT !== 'undefined' && AGENT && AGENT.id) ? AGENT.id : '10012';
  if (isExec) {
    var SPECIAL = ['FOUNDER2026','WELCOME2026','GOLD_START','HR_PRO75'];
    var opts = SPECIAL.map(function(c){ return '<option value="'+c+'">⭐ '+c+'</option>'; }).join('');
    selector.innerHTML =
      '<div style="margin-bottom:12px"><div style="font-size:10px;color:var(--sub);font-weight:600;margin-bottom:5px">コード種別</div>'
      +'<select id="ref-code-select" onchange="updateRefLink()" style="width:100%;padding:8px 10px;background:var(--card2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:12px;font-family:inherit">'
      +'<option value="'+agentId+'">自分のID（'+agentId+'）</option>'
      +'<optgroup label="── 特別コード ──">'+opts+'</optgroup>'
      +'</select></div>';
    _refCurrentCode = agentId;
  } else {
    selector.innerHTML =
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:8px 12px;background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.2);border-radius:8px">'
      +'<span style="font-size:11px;color:var(--muted)">紹介コード：</span>'
      +'<span style="font-family:\'DM Mono\',monospace;font-size:13px;font-weight:700;color:var(--gold)">'+agentId+'</span>'
      +'</div>';
    _refCurrentCode = agentId;
  }
  updateRefLink();
  overlay.classList.add('open');
}
function updateRefLink() {
  var sel = document.getElementById('ref-code-select');
  if (sel) _refCurrentCode = sel.value;
  var base = location.origin + location.pathname.replace(/[^/]*$/, '') + 'coreto-agent-signup.html';
  var url = base + '?ref=' + encodeURIComponent(_refCurrentCode);
  document.getElementById('ref-url-display').textContent = url;
}
function closeRefModal() {
  document.getElementById('ref-modal-overlay').classList.remove('open');
}
function copyRefLink() {
  var url = document.getElementById('ref-url-display').textContent;
  navigator.clipboard.writeText(url).then(function() {
    var btn = document.querySelector('.ref-copy-btn');
    btn.textContent = '✅ コピーしました';
    setTimeout(function(){ btn.textContent = '📋 コピー'; }, 2000);
  }).catch(function() {
    var ta = document.createElement('textarea');
    ta.value = url; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  });
}
