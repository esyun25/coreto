<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ID管理・招待トークン — COREBLDG</title>

<link rel="stylesheet" href="design-system.css">
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:#FFFFFF}
.shell{display:flex;height:100vh}










.nsl{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.18);padding:10px 8px 4px;font-family:'DM Mono',monospace}
.ni{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;cursor:pointer;transition:.13s;margin-bottom:1px}
.ni:hover{background:rgba(255,255,255,.06)}
.ni.active{background:rgba(200,169,81,.1)}
.ni-ic{width:22px;text-align:center;font-size:14px}
.ni-lb{font-size:11px;font-weight:500;color:rgba(255,255,255,.55)}
.ni.active .ni-lb{color:var(--gold)}
.sf{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.3);transition:.13s}
.sf:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.6)}

.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;box-shadow:var(--sh)}
.tb-title{font-size:16px;font-weight:600;color:var(--ink);letter-spacing:.5px}
.tb-crumb{font-size:11px;color:var(--faint)}
.tb-crumb a{color:var(--muted);text-decoration:none}
.tb-act{margin-left:auto;display:flex;gap:9px;align-items:center}
.btn{padding:7px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;transition:.15s;font-family:'Outfit',sans-serif;border:none}
.btn-p{background:var(--navy);color:var(--gold)}.btn-p:hover{background:var(--navy-l)}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--bd)}.btn-g:hover{background:var(--cream);color:var(--ink)}
.btn-rd{background:var(--rd-bg);color:var(--rd);border:1px solid rgba(220,38,38,.2)}.btn-rd:hover{background:var(--rd);color:#fff}
.btn-sm{padding:5px 12px;font-size:11px}
.tab-bar{padding:0 24px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;gap:0}
.tab{padding:12px 18px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.tab:hover{color:var(--ink)}.tab.active{color:var(--navy);border-bottom-color:var(--gold)}
.page{flex:1;overflow-y:auto;padding:24px}
.page::-webkit-scrollbar{width:5px}.page::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;font-family:'Outfit',sans-serif}
.b-em{background:var(--em-bg);color:var(--em)}.b-am{background:var(--am-bg);color:var(--am)}.b-rd{background:var(--rd-bg);color:var(--rd)}.b-sk{background:var(--sk-bg);color:var(--sk)}.b-vt{background:var(--vt-bg);color:var(--vt)}.b-nt{background:var(--cream2);color:var(--muted)}.b-gd{background:var(--gold-dim);color:var(--am)}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.gd::before{background:var(--gold)}.kpi.em::before{background:var(--em)}.kpi.sk::before{background:var(--sk)}.kpi.am::before{background:var(--am)}
.kpi-lb{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.kpi-vl{font-size:24px;font-weight:700;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums lining-nums;color:var(--ink);margin-top:4px}
.card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:18px}
.card-head{padding:14px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--cream)}
.card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink)}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--faint);padding:9px 14px;border-bottom:2px solid var(--bd);text-align:left;background:var(--cream)}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--bd);color:var(--ink);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(200,169,81,.03)}
/* Settings */
.set-section{margin-bottom:22px}
.set-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--white);border:1px solid var(--bd);border-radius:var(--r-sm);margin-bottom:6px}
.set-info{flex:1}
.set-label{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:2px}
.set-desc{font-size:11px;color:var(--muted)}
.toggle{width:42px;height:24px;background:var(--bd2);border-radius:12px;position:relative;cursor:pointer;transition:.2s;flex-shrink:0}
.toggle.on{background:var(--em)}
.toggle::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:3px;left:3px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{left:21px}
.set-input{padding:7px 12px;background:var(--cream);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:13px;color:var(--ink);font-family:'Outfit',sans-serif;min-width:160px;outline:none}
.set-input:focus{border-color:var(--gold)}
/* modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--white);border-radius:12px;width:520px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:14px;font-weight:700;color:var(--ink)}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted)}
.modal-body{padding:20px 22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field select{width:100%;padding:9px 12px;background:var(--cream);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:13px;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;outline:none;transition:.15s}
.field input:focus,.field select:focus{border-color:var(--gold)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-foot{padding:14px 22px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:8px}
/* permission matrix */
.perm-table{width:100%;border-collapse:collapse;font-size:11px}
.perm-table th{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--faint);padding:8px 10px;border-bottom:2px solid var(--bd);text-align:center;background:var(--cream)}
.perm-table th:first-child{text-align:left}
.perm-table td{padding:10px;border-bottom:1px solid var(--bd);text-align:center;vertical-align:middle}
.perm-table td:first-child{text-align:left;font-size:12px;font-weight:600;color:var(--ink)}
.perm-table tr:last-child td{border-bottom:none}
.perm-check{width:18px;height:18px;border-radius:4px;border:none;cursor:default}
.perm-check.allow{background:var(--em-bg);color:var(--em);display:inline-flex;align-items:center;justify-content:center;font-size:11px}
.perm-check.deny{background:var(--rd-bg);color:var(--rd);display:inline-flex;align-items:center;justify-content:center;font-size:11px}
.perm-check.partial{background:var(--am-bg);color:var(--am);display:inline-flex;align-items:center;justify-content:center;font-size:11px}
/* MOBILE */
.mob-ham{display:none;flex-direction:column;align-items:center;justify-content:center;width:36px;height:36px;background:transparent;border:none;cursor:pointer;border-radius:7px;flex-shrink:0}
.mob-ham span{display:block;width:18px;height:2px;background:rgba(255,255,255,.72);margin:3px 0;border-radius:1px}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199}
@media(max-width:768px){
  .mob-ham{display:flex}
  .mob-overlay.show{display:block}
  
  .sb.open{left:0}
  .shell{overflow:hidden}.content{width:100vw;min-width:0}
  .topbar{padding:0 12px;gap:8px}.tb-crumb{display:none}
  .page{padding:12px}
}  .kpi-row{grid-template-columns:1fr 1fr!important}
  .field-row{grid-template-columns:1fr}
  table,tbl{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}

  .tb-title,
.brand-logo,
.sb-logo,
.login-title,
.mod-title,
.page-title        {  font-weight:600; letter-spacing:.3px; }

/* Section headings inside content */
.section-title     {  font-size:12px;
                     font-weight:700; text-transform:uppercase; letter-spacing:1px;
                     color:var(--label); }

/* KPI numbers — large display (24px+): Outfit tabular */
.kpi-value, .kpi-vl, .stat-val { 
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-weight:300;
  font-variant-numeric:tabular-nums lining-nums;
  letter-spacing:-.5px;   /* tight for large numbers */
  color:var(--ink);        /* always maximum contrast */
}

/* Inline amounts in tables/lists */
.amt { font-family:'Outfit','Noto Sans JP',sans-serif;
       font-weight:600; font-variant-numeric:tabular-nums;
       color:var(--ink); }

/* Positive delta only */
.delta-up { color:var(--em); font-weight:600; font-size:.9em; }
.delta-dn { color:var(--rd); font-weight:600; font-size:.9em; }

/* IDs and codes */
.mono, [class*="-id"], [class*="-code"] { font-family:'DM Mono',monospace; font-size:.92em; }

/* Badge system — 4 states only */
.badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:20px;
         font-size:10px; font-weight:600; letter-spacing:.3px;
         font-family:'Outfit',sans-serif; white-space:nowrap; }
.b-em, .badge.emerald, .badge.em { background:var(--em-bg); color:var(--em); }
.b-am, .badge.amber,   .badge.am { background:var(--am-bg); color:var(--am); }
.b-rd, .badge.red,     .badge.rd { background:var(--rd-bg); color:var(--rd); }
.b-nt, .badge.muted,   .badge.nt { background:var(--cream2); color:var(--label); }
/* Legacy aliases → neutral */
.b-sk, .badge.sky    { background:#F0F9FF; color:#0369A1; }
.b-vt, .badge.violet { background:var(--cream2); color:var(--label); }
.b-gd, .badge.gold   { background:var(--gold-dim); color:#92740A; }




/* Brand — Cormorant only here */
.sb-logo, .brand-logo {
  font-family:'Cormorant Garamond',serif !important;
  letter-spacing:5px;
}
/* Everything else: Outfit */
body, input, select, textarea, button {
  font-family:'Outfit','Noto Sans JP',sans-serif;
}

/* ── Page structure ── */
.tb-title {
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-size:18px; font-weight:600; color:var(--ink);

}
.login-title {
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-size:24px; font-weight:600; color:var(--ink);
  letter-spacing:-.3px;
}
.section-title {
  
  font-size:11px; font-weight:700;
  text-transform:uppercase; letter-spacing:1.2px;
  color:var(--label);
}

/* ── Numbers & Amounts — always --ink, always Outfit ── */
.kpi-value, .kpi-vl {
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-weight:300 !important;
  font-variant-numeric:tabular-nums lining-nums !important;
  color:var(--ink);

}
.stat-val {
  font-family:'Outfit','Noto Sans JP',sans-serif !important;

  color:var(--ink) !important;
}
.kpi-label, .stat-label, .kpi-sub {
  color:var(--label) !important;

}

/* ── Delta (the ONE exception: direction of change) ── */
.delta-up { color:var(--em) !important; }

/* ── IDs / codes ── */
.id-mono, .ag-id, .case-id {
  font-family:'DM Mono',monospace;

}

}
.badge.emerald, .badge.em { background:#ECFDF5; color:#059669; }
.badge.amber,   .badge.am { background:#FFFBEB; color:#D97706; }
.badge.red,     .badge.rd { background:#FEF2F2; color:#DC2626; }
.badge.muted,   .badge.nt,
.badge.sky,     .badge.violet,
.badge.gold               { background:var(--cream2); color:var(--label); }


/* ═══════════════════════════════════════════════════════════════
   COREBLDG — Google-style Typography System
   ─────────────────────────────────────────────────────────────
   大きな数値は weight:300 でサイズで存在感を出す
   Bold はラベル・ボタン・UIに使い、数値には使わない
   背景は白。装飾は最小限。余白で呼吸する。
   ═══════════════════════════════════════════════════════════════ */

/* Page background */
html, body { background:#FFFFFF !important; }

/* ── Brand (Cormorant only here) ── */
.sb-logo, .brand-logo {
  font-family: 'Cormorant Garamond', serif !important;
  letter-spacing: 5px;
}

/* ── Base ── */
body, input, select, textarea, button {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif;
}

/* ── KPI / メトリクス数値
   Google Analytics の大型数値と同じアプローチ:
   weight 300、大きなサイズ、tight letter-spacing ── */
.kpi-value, .kpi-vl {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif !important;
  font-weight: 300 !important;
  font-variant-numeric: tabular-nums lining-nums !important;
  letter-spacing: -1px !important;
  color: var(--ink) !important;
  line-height: 1 !important;
}
/* KPIカードのサイズを少し大きく（軽いweightを補う） */
.kpi-value { font-size: 32px !important;font-variant-numeric:tabular-nums}
.kpi-vl   { font-size: 28px !important; }

/* ── 中型数値（stat-val, テーブル内金額） ── */
.stat-val {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif !important;
  font-weight: 400 !important;
  font-variant-numeric: tabular-nums !important;
  color: var(--ink) !important;
}

/* ── ラベル系 ── */
.kpi-label, .kpi-sub, .stat-label {
  font-size: 11px !important;
  font-weight: 500 !important;
  letter-spacing: .5px !important;
  color: var(--label) !important;
  text-transform: none;
}

/* ── Page title ── */
.tb-title {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif;
  font-size: 16px; font-weight: 400; color: var(--ink);
  letter-spacing: 0;
}

/* ── Section title — Google style: small, spaced, gray ── */
.section-title {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif;
  font-size: 11px; font-weight: 500;
  letter-spacing: .8px;
  color: var(--label);
  text-transform: uppercase;
}

/* ── Card: white bg, very light border, minimal shadow ── */
.card {
  background: #FFFFFF;
  border: 1px solid var(--bd);
  border-radius: 8px;
  box-shadow: var(--sh);
}

/* ── KPI Card ── */
.kpi-card {
  background: #FFFFFF !important;
  border: 1px solid var(--bd) !important;
  border-radius: 8px !important;
  box-shadow: none !important;
  padding: 20px 24px !important;
}
.kpi-card.gold   { border-top: 3px solid var(--gold) !important; }
.kpi-card.emerald{ border-top: 3px solid var(--em)   !important; }
.kpi-card.amber  { border-top: 3px solid var(--am)   !important; }
.kpi-card.red    { border-top: 3px solid var(--rd)   !important; }
.kpi-card.sky    { border-top: 3px solid #1A73E8     !important; }

/* ── 入金監視・大型パネル ── */
.kpi { border-radius: 8px; border: 1px solid var(--bd); }

/* ── Badge — flat style ── */
.badge {
  border-radius: 4px !important;
  font-size: 11px !important;
  font-weight: 500 !important;
  padding: 2px 7px !important;
  letter-spacing: 0 !important;
}

/* ── Buttons ── */
.btn-primary {
  background: var(--navy) !important;
  border-radius: 6px !important;
  font-weight: 500 !important;
  letter-spacing: .2px !important;
}
.btn-ghost {
  border-radius: 6px !important;
  font-weight: 500 !important;
}

/* ── Delta (増減のみ色付き) ── */
.delta-up, .kpi-delta.up { color: var(--em) !important; font-weight: 500; font-size: .82em; }
.delta-dn, .kpi-delta.dn { color: var(--rd) !important; font-weight: 500; font-size: .82em; }

/* ── IDs ── */
[class*="-id"], [class*="-code"], .pipe-ag, .task-meta [class*="ag-"],
.id-mono { font-family: 'DM Mono', monospace; font-size: .88em; color: var(--label); }

/* ── Form inputs — Google style ── */
.form-input, .form-select {
  border: 1px solid var(--bd) !important;
  border-radius: 4px !important;
  background: #FFFFFF !important;
  font-family: 'Outfit', 'Noto Sans JP', sans-serif !important;
  font-size: 14px !important;
  color: var(--ink) !important;
  padding: 8px 12px !important;
}
.form-input:focus, .form-select:focus {
  border-color: #1A73E8 !important;
  outline: none !important;
}

/* ── Section separator ── */

.section-title::before { display: none; }
/* ── Google-style 数値原則 (DS v2.3) ── */
.kpi-value, .kpi-vl, .kpi-val,
.stat-val, .qs-val, .count-val,
.td-amt, .bc-vl, .bc-total-vl,
.rr-amount, .amount-val, .srv,
.visit-reward, .lb-val,
.mf-kpi-vl, .mf-reward {
  font-family:'Outfit','Noto Sans JP',sans-serif !important;
  font-weight:300 !important;
  font-variant-numeric:tabular-nums !important;
}
.kpi-value { font-size:32px !important; }
.kpi-vl    { font-size:28px !important; }


/* ── ページ固有 ─────────────────────────────────── */
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--bd);margin-bottom:24px}
.tab-btn{padding:10px 20px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;
  border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s}
.tab-btn.active{color:var(--navy);border-bottom-color:var(--navy)}

/* 申請カード */
.app-card{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:16px;
  margin-bottom:12px;transition:.15s}
.app-card:hover{box-shadow:var(--sh2)}
.app-card-head{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.app-av{width:40px;height:40px;border-radius:10px;background:var(--navy);
  color:var(--gold);display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;flex-shrink:0}
.app-name{font-size:14px;font-weight:700;color:var(--ink)}
.app-meta{font-size:10px;color:var(--muted);margin-top:2px}
.app-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;
  border-radius:20px;font-size:9px;font-weight:700;letter-spacing:.5px}
.badge-re{background:#EFF6FF;color:#1D4ED8}
.badge-hr{background:#F0FDF4;color:#15803D}
.badge-pt{background:var(--gold-dim);color:#92400E}
.badge-pending{background:var(--am-bg);color:var(--am)}
.badge-approved{background:var(--em-bg);color:var(--em)}
.badge-rejected{background:var(--rd-bg);color:var(--rd)}
.badge-hold{background:#F3F4F6;color:#6B7280}

.app-fields{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;
  margin-bottom:12px;font-size:11px}
.app-field-lbl{color:var(--muted);margin-bottom:2px;font-size:9px;font-weight:700;letter-spacing:.5px}
.app-field-val{color:var(--ink);font-weight:600}

.app-actions{display:flex;gap:8px;flex-wrap:wrap}
.act-btn{padding:7px 14px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;
  border:none;display:flex;align-items:center;gap:5px;transition:.15s}
.act-approve{background:var(--em);color:#fff}
.act-approve:hover{opacity:.85}
.act-hold{background:var(--am-bg);color:var(--am);border:1px solid rgba(217,119,6,.3)}
.act-reject{background:var(--rd-bg);color:var(--rd);border:1px solid rgba(220,38,38,.2)}
.act-token{background:var(--navy);color:var(--gold)}
.act-token:hover{background:var(--navy-l)}
.act-ghost{background:transparent;border:1px solid var(--bd);color:var(--muted)}

/* 発行済みテーブル */
.id-table{width:100%;border-collapse:collapse;font-size:11px}
.id-table th{background:var(--navy);color:rgba(255,255,255,.7);padding:8px 10px;
  text-align:left;font-size:9px;font-weight:700;letter-spacing:.8px;white-space:nowrap}
.id-table td{padding:10px 10px;border-bottom:1px solid var(--bd);vertical-align:top}
.id-table tr:hover td{background:rgba(13,26,45,.02)}
.mono{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.id-chip{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;
  padding:3px 8px;border-radius:20px;background:var(--navy);color:var(--gold)}

/* トークン発行モーダル */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;
  display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:14px;padding:28px;max-width:440px;width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:4px}
.modal-desc{font-size:11px;color:var(--muted);margin-bottom:20px;line-height:1.7}
.token-display{background:var(--navy);border-radius:10px;padding:16px;text-align:center;
  margin-bottom:16px}
.token-val{font-family:'DM Mono',monospace;font-size:18px;font-weight:700;
  color:var(--gold);letter-spacing:3px}
.token-url{font-size:9px;color:rgba(255,255,255,.5);margin-top:6px;word-break:break-all}

/* eKYC詳細パネル */
.kyc-panel{background:#F8F9FA;border:1px solid var(--bd);border-radius:10px;
  padding:14px;margin-bottom:12px}
.kyc-panel-title{font-size:10px;font-weight:700;color:var(--muted);
  letter-spacing:.8px;margin-bottom:10px}
.kyc-items{display:flex;flex-direction:column;gap:6px}
.kyc-item{display:flex;align-items:center;gap:10px;font-size:11px}
.kyc-icon{width:18px;text-align:center;flex-shrink:0}
.kyc-status{margin-left:auto;font-size:9px;font-weight:700;padding:2px 7px;
  border-radius:20px}

/* ID採番プレビュー */
.id-preview{display:inline-flex;align-items:center;gap:8px;
  background:rgba(13,26,45,.05);border-radius:8px;padding:8px 12px;margin-bottom:12px}
.id-preview-lbl{font-size:9px;font-weight:700;color:var(--muted)}
.id-preview-val{font-family:'DM Mono',monospace;font-size:16px;font-weight:700;color:var(--navy)}

/* カウンターカード */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
@media(max-width:700px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:#fff;border:1px solid var(--bd);border-radius:10px;
  padding:14px 16px;text-align:center}
.stat-val{font-size:26px;font-weight:700;color:var(--navy)}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:3px}

.empty-state{text-align:center;padding:48px 20px;color:var(--faint)}
.empty-icon{font-size:40px;margin-bottom:10px}
.empty-msg{font-size:13px;color:var(--muted)}
</style>
</head>

        ✅ 承認してID・メール発行
      </button>

<div class="toast" id="toast"></div>

<script src="coreto-kv-client.js"></script>
<script src="icons.js"></script>
<script src="coreto-nav-v2.js"></script>
<script>
(function(){
  var _role = sessionStorage.getItem('coreto_role') || '';
  var _allowed = ["hq"];
  if (_allowed.length && !_allowed.includes(_role)) {
    location.replace('coreto-hub-v2.html?unauthorized=1');
  }
})();


// ════════════════════════════════════════════════════
// デモデータ
// ════════════════════════════════════════════════════
const DEMO_APPS = [];

const ISSUED = [];

// 次の発行ID（デモ）
const NEXT_ID = {re:10003, hr:20002, pt:30002};
let _pendingApprovalApp = null;
let _pendingTokenApp    = null;

// ════════════════════════════════════════════════════
// ユーティリティ
// ════════════════════════════════════════════════════
function toggleSb(){document.querySelector('.sb').classList.toggle('open');document.querySelector('.mob-overlay').classList.toggle('show')}

function showToast(msg, type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=type==='warn'?'var(--am)':'var(--navy)';
  t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(10px)';},3000);
}

function typeLabel(type){return {re:'🏠 RE',hr:'👤 HR',pt:'🤝 PT'}[type]||type}
function typeBadge(type){return {re:'badge-re',hr:'badge-hr',pt:'badge-pt'}[type]||''}

function statusBadge(s){
  return {
    pending:         '<span class="app-badge badge-pending">⏳ eKYC待ち</span>',
    interview_passed:'<span class="app-badge" style="background:#EDE9FE;color:#6D28D9">🎯 面接合格</span>',
    approved:        '<span class="app-badge badge-approved">✅ 承認済み</span>',
    hold:            '<span class="app-badge badge-hold">🔶 保留</span>',
    rejected:        '<span class="app-badge badge-rejected">❌ 不合格</span>',
  }[s]||s;
}

// メールアドレス生成（ヘボン式・重複フォールバック）
function genEmail(romaFirst, romaLast, idStr){
  const last = romaLast.toLowerCase().replace(/[^a-z]/g,'');
  const num  = (idStr||'').replace(/[^0-9]/g,'');
  return `${last}${num}@coreto.co.jp`;
}

function nextIdStr(type){
  return String(NEXT_ID[type] || 10001);
}

function genToken(type){
  const prefix = type === 'pt' ? 'CORETO-PT' : 'CORETO';
  const seg = ()=>Math.random().toString(36).substr(2,4).toUpperCase();
  return `${prefix}-${seg()}-${seg()}`;
}

// ════════════════════════════════════════════════════
// 統計カード
// ════════════════════════════════════════════════════
function renderStats(){
  const pending  = DEMO_APPS.filter(a=>a.status==='pending').length;
  const intPass  = DEMO_APPS.filter(a=>a.status==='interview_passed').length;
  const issuedRE = ISSUED.filter(i=>i.type==='re').length;
  const issuedHR = ISSUED.filter(i=>i.type==='hr').length;
  const issuedPT = ISSUED.filter(i=>i.type==='pt').length;

  document.getElementById('stat-grid').innerHTML = [
    {val:pending, lbl:'eKYC審査待ち', color:'var(--am)'},
    {val:intPass, lbl:'トークン発行待ち', color:'#6D28D9'},
    {val:issuedRE+issuedHR, lbl:'発行済みAG', color:'var(--em)'},
    {val:issuedPT, lbl:'発行済みPT', color:'#C8A951'},
  ].map(s=>`
    <div class="stat-card">
      <div class="stat-val" style="color:${s.color}">${s.val}</div>
      <div class="stat-lbl">${s.lbl}</div>
    </div>`).join('');

  // pendingカウントバッジ
  const el = document.getElementById('pending-count');
  if (el) el.textContent = pending || '';
}

// ════════════════════════════════════════════════════
// タブ切替
// ════════════════════════════════════════════════════
function switchTab(tab){
  ['pending','token','issued'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
  const TAB_MAP = {pending:renderPending, token:renderToken, issued:renderIssued};
  TAB_MAP[tab]?.();
}

// ════════════════════════════════════════════════════
// TAB 1: 申請待ち（eKYC審査）
// ════════════════════════════════════════════════════
function renderPending(){
  const apps = DEMO_APPS.filter(a=>['pending','hold'].includes(a.status));
  const content = document.getElementById('tab-content');

  if (!apps.length){
    content.innerHTML=`<div class="empty-state"><div class="empty-icon">🎉</div><div class="empty-msg">審査待ちの申請はありません</div></div>`;
    return;
  }

  content.innerHTML = apps.map(app=>{
    const kyc = app.kyc;
    const kycItems = [
      {key:'id',    label:'身分証確認',   ok:kyc.id},
      {key:'face',  label:'顔写真照合',   ok:kyc.face},
      {key:'addr',  label:'住所確認',     ok:kyc.addr},
      ...(app.type==='re' ? [{key:'takken',label:'宅建士証DB照合', ok:kyc.takken}] : []),
    ];
    const allKyc = kycItems.every(k=>k.ok);

    return `
    <div class="app-card">
      <div class="app-card-head">
        <div class="app-av">${app.name.slice(0,1)}</div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <div class="app-name">${app.name}</div>
            <span class="app-badge ${typeBadge(app.type)}">${typeLabel(app.type)}</span>
            ${statusBadge(app.status)}
          </div>
          <div class="app-meta">${app.kana} ／ 申請: ${app.applied}</div>
        </div>
      </div>

      <div class="app-fields">
        <div><div class="app-field-lbl">種別</div><div class="app-field-val">${app.subtype}</div></div>
        <div><div class="app-field-lbl">電話番号</div><div class="app-field-val mono">${app.phone}</div></div>
        <div><div class="app-field-lbl">メール</div><div class="app-field-val mono" style="font-size:10px">${app.email}</div></div>
        <div><div class="app-field-lbl">経験</div><div class="app-field-val">${app.experience}</div></div>
        <div><div class="app-field-lbl">得意エリア</div><div class="app-field-val">${app.area}</div></div>
        ${app.referral?`<div><div class="app-field-lbl">紹介コード</div><div class="app-field-val mono">${app.referral}</div></div>`:''}</div>

      <!-- eKYCチェック -->
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
        ${kycItems.map(k=>`
          <div style="display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;
            font-size:10px;font-weight:600;
            background:${k.ok===null?'#F3F4F6':k.ok?'var(--em-bg)':'var(--rd-bg)'};
            color:${k.ok===null?'var(--faint)':k.ok?'var(--em)':'var(--rd)'}">
            ${k.ok===null?'—':k.ok?'✅':'❌'} ${k.label}
          </div>`).join('')}
      </div>

      <div class="app-actions">
        <button class="act-btn act-approve" onclick="openKycModal('${app.id}')" ${!allKyc?'disabled style="opacity:.45"':''}>
          ✅ eKYC承認・ID発行
        </button>
        <button class="act-btn act-hold" onclick="setStatus('${app.id}','hold')">🔶 保留</button>
        <button class="act-btn act-reject" onclick="setStatus('${app.id}','rejected')">❌ 不合格</button>
        <button class="act-btn act-ghost" onclick="toggleKycDetail('kyc-${app.id}')">📋 詳細</button>
      </div>
      ${!allKyc?`<div style="font-size:10px;color:var(--rd);margin-top:8px">⚠️ 未完了のeKYCチェック項目があります。全チェック完了後に承認できます。</div>`:''}</div>`;
  }).join('');
}

function setStatus(appId, status){
  const app = DEMO_APPS.find(a=>a.id===appId);
  if (!app) return;
  app.status = status;
  const msgs = {hold:'🔶 保留にしました', rejected:'❌ 不合格に設定しました'};
  showToast(msgs[status]||'更新しました', status==='rejected'?'warn':'');
  renderStats();
  renderPending();
}

// ════════════════════════════════════════════════════
// KYC承認モーダル
// ════════════════════════════════════════════════════
function openKycModal(appId){
  const app = DEMO_APPS.find(a=>a.id===appId);
  if (!app) return;
  _pendingApprovalApp = app;

  document.getElementById('kyc-modal-desc').innerHTML =
    `<strong>${app.name}</strong> 様（${app.subtype}）のeKYCを承認してIDとCORETOメールアドレスを発行します。`;

  // チェックリスト
  const kycItems = [
    {label:'身分証確認',   ok:app.kyc.id},
    {label:'顔写真照合',   ok:app.kyc.face},
    {label:'住所確認',     ok:app.kyc.addr},
    ...(app.type==='re'?[{label:'宅建士証DB照合', ok:app.kyc.takken}]:[]),
  ];
  if (!kycItems.length) {
    document.getElementById('kyc-checklist').innerHTML = '<div style="text-align:center;padding:32px 16px;color:var(--muted);font-size:13px">チェック項目がありません</div>';
  } else {
  document.getElementById('kyc-checklist').innerHTML = kycItems.map(k=>`
    <div class="kyc-item">
      <span class="kyc-icon">${k.ok?'✅':'❌'}</span>
      <span>${k.label}</span>
      <span class="kyc-status" style="background:${k.ok?'var(--em-bg)':'var(--rd-bg)'};color:${k.ok?'var(--em)':'var(--rd)'}">
        ${k.ok?'確認済み':'未確認'}
      </span>
    </div>`).join('');
  }

  // ID採番プレビュー
  const newId = nextIdStr(app.type);
  document.getElementById('id-issue-preview').innerHTML = `
    <div class="id-preview">
      <div>
        <div class="id-preview-lbl">発行予定ID</div>
        <div class="id-preview-val">${newId}</div>
      </div>
      <div style="font-size:10px;color:var(--muted)">
        ${{re:'不動産AG: 10001〜19999',hr:'人材AG: 20001〜29999',pt:'PT: 30001〜39999'}[app.type]}
      </div>
    </div>`;

  // メールアドレスプレビュー
  const newEmail = app.romaFirst
    ? genEmail(app.romaFirst, app.romaLast, newId)
    : '（ローマ字未登録のため手動設定が必要）';
  document.getElementById('email-issue-preview').innerHTML = `
    <div style="background:#F8F9FA;border:1px solid var(--bd);border-radius:8px;padding:12px 14px">
      <div style="font-size:9px;font-weight:700;color:var(--muted);margin-bottom:6px">発行予定メールアドレス</div>
      <div style="font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:var(--navy)">${newEmail}</div>
      <div style="font-size:10px;color:var(--faint);margin-top:4px">
        命名規則: ファーストネーム頭文字-ファミリーネーム@coreto.co.jp（ヘボン式）
      </div>
    </div>`;

  document.getElementById('kyc-modal').style.display = 'flex';
}

function finalApprove(){
  const app = _pendingApprovalApp;
  if (!app) return;

  const newId    = nextIdStr(app.type);
  const newEmail = app.romaFirst
    ? genEmail(app.romaFirst, app.romaLast, newId)
    : `contact-${app.id}@coreto.co.jp`;

  // 発行済みリストに追加
  ISSUED.push({
    id: newId, name: app.name, type: app.type,
    email: newEmail, issuedAt: new Date().toLocaleDateString('ja-JP'), status: 'active',
  });
  NEXT_ID[app.type] = (NEXT_ID[app.type]||10001) + 1;
  app.status = 'approved';

  closeKycModal();
  showToast(`✅ ID ${newId} を発行しました。メール案内を送信します`);
  renderStats();
  renderPending();
}

function closeKycModal(e){
  if (e && e.target !== document.getElementById('kyc-modal')) return;
  document.getElementById('kyc-modal').style.display='none';
  _pendingApprovalApp = null;
}

// ════════════════════════════════════════════════════
// TAB 2: トークン発行（面接合格者）
// ════════════════════════════════════════════════════
function renderToken(){
  const apps = DEMO_APPS.filter(a=>a.status==='interview_passed');
  const content = document.getElementById('tab-content');

  content.innerHTML = `
    <div style="background:#EDE9FE;border:1px solid #C4B5FD;border-radius:10px;
      padding:14px 16px;margin-bottom:20px;font-size:11px;color:#5B21B6;line-height:1.8">
      🎯 <strong>招待トークンは面接合格後にのみ発行してください。</strong><br>
      書類審査合格の時点では発行しないこと（宅建業法・内部規則）。<br>
      トークンの有効期限は発行から<strong>7日間</strong>です。
    </div>
    ${apps.length ? apps.map(app=>`
    <div class="app-card">
      <div class="app-card-head">
        <div class="app-av" style="background:#6D28D9;color:#fff">${app.name.slice(0,1)}</div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <div class="app-name">${app.name}</div>
            <span class="app-badge ${typeBadge(app.type)}">${typeLabel(app.type)}</span>
            ${statusBadge(app.status)}
          </div>
          <div class="app-meta">${app.kana} ／ ${app.phone}</div>
        </div>
      </div>
      <div class="app-fields">
        <div><div class="app-field-lbl">種別</div><div class="app-field-val">${app.subtype}</div></div>
        <div><div class="app-field-lbl">メール</div><div class="app-field-val mono" style="font-size:10px">${app.email}</div></div>
        <div><div class="app-field-lbl">申請日</div><div class="app-field-val">${app.applied.split(' ')[0]}</div></div>
      </div>
      <div class="app-actions">
        <button class="act-btn act-token" onclick="openTokenModal('${app.id}')">
          🔑 招待トークンを発行・送付
        </button>
      </div>
    </div>`).join('')
    : '<div class="empty-state"><div class="empty-icon">🎯</div><div class="empty-msg">面接合格待ちの申請者はいません</div></div>'}
  `;
}

function openTokenModal(appId){
  const app = DEMO_APPS.find(a=>a.id===appId);
  if (!app) return;
  _pendingTokenApp = app;

  const token = genToken(app.type);
  const signupPage = app.type === 'pt'
    ? 'coreto-partner-signup-v2.html'
    : 'coreto-agent-signup-v2.html';
  const url = `https://esyun25.github.io/coreto/v2/${signupPage}?token=${token}`;

  document.getElementById('modal-title').textContent = `招待トークン発行 — ${app.name} 様`;
  document.getElementById('modal-desc').innerHTML =
    `種別: <strong>${app.subtype}</strong> ／ 申請日: ${app.applied.split(' ')[0]}`;
  document.getElementById('modal-token').textContent = token;
  document.getElementById('modal-url').textContent  = url;
  document.getElementById('modal-phone').textContent = app.phone;
  document.getElementById('token-modal').style.display = 'flex';
  document.getElementById('token-modal').dataset.token = token;
  document.getElementById('token-modal').dataset.appId = appId;
}

function sendToken(){
  const appId = document.getElementById('token-modal').dataset.appId;
  const app   = DEMO_APPS.find(a=>a.id===appId);
  if (app) {
    showToast(`📱 ${app.phone} にSMSを送信しました（デモ）`);
  }
  document.getElementById('token-modal').style.display='none';
  _pendingTokenApp = null;
}

function closeModal(e){
  if (e && e.target !== document.getElementById('token-modal')) return;
  document.getElementById('token-modal').style.display='none';
}

function renderIssuedRows(items){
  document.getElementById('issued-tbody').innerHTML = items.map(item=>{
    const typeCls = {re:'badge-re',hr:'badge-hr',pt:'badge-pt'}[item.type]||'';
    return `<tr>
      <td><span class="id-chip">${item.id}</span></td>
      <td style="font-weight:600;font-size:12px">${item.name}</td>
      <td><span class="app-badge ${typeCls}">${typeLabel(item.type)}</span></td>
      <td class="mono">${item.email}</td>
      <td style="font-size:11px;color:var(--muted)">${item.issuedAt}</td>
      <td><span class="app-badge badge-approved">✅ 有効</span></td>
      <td>
        <button class="act-btn act-ghost" style="font-size:10px;padding:5px 10px"
          onclick="showToast('📋 ${item.name} の詳細を表示（デモ）')">詳細</button>
      </td>
    </tr>`;
  }).join('');
}

function filterIssued(q){
  if (!q) { renderIssuedRows(ISSUED); return; }
  const lq = q.toLowerCase();
  const hits = ISSUED.filter(i=>
    i.name.includes(q) || i.id.toLowerCase().includes(lq) || i.email.toLowerCase().includes(lq)
  );
  renderIssuedRows(hits);
}

// 会員ID範囲定義（V1準拠）
const ID_RANGES = {
  hq_exec:    { min:1,     max:199,   label:'HQ 経営者',   prefix:'HQ-', color:'var(--gold)',   manual:true  },
  hq_manager: { min:200,   max:999,   label:'HQ マネージャー', prefix:'HQ-', color:'var(--gold)', manual:false },
  hq_staff:   { min:1000,  max:4999,  label:'HQ 社員',     prefix:'HQ-', color:'var(--gold)',   manual:false },
  hq_part:    { min:5000,  max:9899,  label:'HQ パート',   prefix:'HQ-', color:'var(--gold)',   manual:false },
  re_ag:      { min:10001, max:19999, label:'不動産AG',    prefix:'AG-', color:'var(--sky)',    manual:false },
  hr_ag:      { min:20001, max:29999, label:'人材AG',      prefix:'AG-', color:'var(--em)',     manual:false },
  pt:         { min:30001, max:39999, label:'パートナー',  prefix:'PT-', color:'var(--vt)',     manual:false },
  hikari_ag:  { min:40001, max:49999, label:'光通信AG',    prefix:'AG-', color:'var(--am)',     manual:false },
  intern:     { min:50001, max:59999, label:'インターン',  prefix:'INT-',color:'var(--muted)',  manual:false },
};

// 発行済みID管理（本番ではKintoneから取得）
const issuedMemberNums = new Set([1, 100, 500, 5000, 10042, 10088, 10055, 20103, 20112, 30015, 30022, 40071, 50007]);

// IDの数値からhqRoleを判定（HQのみ）
function getHQRoleFromId(userId) {
  var m = String(userId).match(/^HQ-0*(\d+)$/);
  if (!m) return 'staff';
  var n = parseInt(m[1], 10);
  if (n >= 1    && n <= 199)  return 'exec';
  if (n >= 200  && n <= 999)  return 'manager';
  if (n >= 1000 && n <= 4999) return 'staff';
  if (n >= 5000 && n <= 9899) return 'part';
  return 'reserved';
}

// 会員ID採番（ランダム・衝突検知付き）
function generateMemberId(rangeKey) {
  const range = ID_RANGES[rangeKey];
  if (!range) return null;
  let num, attempts = 0;
  do {
    num = Math.floor(Math.random() * (range.max - range.min + 1)) + range.min;
    attempts++;
  } while (issuedMemberNums.has(num) && attempts < 200);
  issuedMemberNums.add(num);
  const formatted = num.toString().padStart(5, '0');
  return { id: range.prefix + formatted, num, formatted, label: range.label, color: range.color };
}

// 案件ID採番（英数字6文字ランダム・V1準拠）
const CASE_CHARS = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // I/O/0/1除く
const issuedCaseNums = new Map();   // prefix → Set<数字suffix>
const issuedCaseAlpha = new Map();  // prefix → Set<英数字suffix>

const CASE_PREFIXES = {
  rent:  { prefix:'R', label:'賃貸仲介',  color:'var(--sky)'   },
  sale:  { prefix:'S', label:'売買・三為', color:'var(--gold)'  },
  hr:    { prefix:'H', label:'人材紹介',  color:'var(--em)'    },
  util:  { prefix:'U', label:'光通信',    color:'var(--am)'    },
  kyc:   { prefix:'K', label:'KYC',       color:'var(--vt)'    },
};

function generateCaseId(typeKey) {
  const def = CASE_PREFIXES[typeKey];
  if (!def) return null;
  const prefix = def.prefix;
  const nums = issuedCaseNums.get(prefix) || new Set();
  let suffix, attempts = 0;
  const numExhausted = nums.size >= 1000000;
  if (!numExhausted) {
    do {
      suffix = String(Math.floor(Math.random() * 1000000)).padStart(6, '0');
      attempts++;
    } while (nums.has(suffix) && attempts < 2000);
    if (!nums.has(suffix)) {
      nums.add(suffix);
      issuedCaseNums.set(prefix, nums);
      return { id: prefix + suffix, mode:'数字6桁', label: def.label, color: def.color };
    }
  }
  // 段階2: 英数字（I/O/0/1除く）
  const alphas = issuedCaseAlpha.get(prefix) || new Set();
  do {
    suffix = Array.from({length:6}, () => CASE_CHARS[Math.floor(Math.random() * CASE_CHARS.length)]).join('');
    attempts++;
  } while (alphas.has(suffix) && attempts < 5000);
  alphas.add(suffix);
  issuedCaseAlpha.set(prefix, alphas);
  return { id: prefix + suffix, mode:'英数字6桁（数字枯渇後）', label: def.label, color: def.color };
}
