<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>士業連携管理 — COREBLDG</title>
<link rel="stylesheet" href="coreto-design-system.css">
<style>
:root{--navy:#0D1A2D;--navy-l:#1E3252;--gold:#C8A951;--gold-dim:rgba(200,169,81,.15);--cream:#FFFFFF;--cream2:#F8F9FA;--white:#FFFFFF;--ink:#202124;--muted:#5F6368;--faint:#80868B;--em:#059669;--em-bg:#ECFDF5;--am:#D97706;--am-bg:#FFFBEB;--rd:#DC2626;--rd-bg:#FEF2F2;--sk:#0284C7;--sk-bg:#F0F9FF;--vt:#7C3AED;--vt-bg:#F5F3FF;--bd:#E8EAED;--bd2:#DADCE0;--sw:240px;--r:10px;--r-sm:7px;--sh:0 1px 2px rgba(60,64,67,.1),0 1px 3px rgba(60,64,67,.06)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:#FFFFFF}
.shell{display:flex;height:100vh}










.nsl{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.18);padding:10px 8px 4px;font-family:'DM Mono',monospace}
.ni{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;cursor:pointer;transition:.13s;margin-bottom:1px}
.ni:hover{background:rgba(255,255,255,.06)}
.ni.active{background:rgba(200,169,81,.1)}
.ni-ic{width:22px;text-align:center;font-size:14px}
.ni-lb{font-size:11px;font-weight:500;color:rgba(255,255,255,.55)}
.ni.active .ni-lb{color:var(--gold)}
.sf{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.3);transition:.13s}
.sf:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.6)}

.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;box-shadow:var(--sh)}
.tb-title{font-size:16px;font-weight:600;color:var(--ink);letter-spacing:.5px}
.tb-crumb{font-size:11px;color:var(--faint)}
.tb-crumb a{color:var(--muted);text-decoration:none}
.tb-act{margin-left:auto;display:flex;gap:9px;align-items:center}
.btn{padding:7px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;transition:.15s;font-family:'Outfit',sans-serif;border:none}
.btn-p{background:var(--navy);color:var(--gold)}.btn-p:hover{background:var(--navy-l)}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--bd)}.btn-g:hover{background:var(--cream);color:var(--ink)}
.btn-sm{padding:5px 12px;font-size:11px}
.btn-rd{background:var(--rd-bg);color:var(--rd);border:1px solid rgba(220,38,38,.2)}.btn-rd:hover{background:var(--rd);color:#fff}
.tab-bar{padding:0 24px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;gap:0}
.tab{padding:12px 18px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.tab:hover{color:var(--ink)}.tab.active{color:var(--navy);border-bottom-color:var(--gold)}
.page{flex:1;overflow-y:auto;padding:24px}
.page::-webkit-scrollbar{width:5px}.page::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;font-family:'Outfit',sans-serif;font-feature-settings:'tnum'}
.b-em{background:var(--em-bg);color:var(--em)}.b-am{background:var(--am-bg);color:var(--am)}.b-rd{background:var(--rd-bg);color:var(--rd)}.b-sk{background:var(--sk-bg);color:var(--sk)}.b-nt{background:var(--cream2);color:var(--muted)}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.gd::before{background:var(--gold)}.kpi.em::before{background:var(--em)}.kpi.am::before{background:var(--am)}.kpi.rd::before{background:var(--rd)}
.kpi-lb{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.kpi-vl{font-size:24px;font-weight:700;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums lining-nums;color:var(--ink);margin-top:4px}
.card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:18px}
.card-head{padding:14px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--cream)}
.card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink)}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--faint);padding:9px 14px;border-bottom:2px solid var(--bd);text-align:left;background:var(--cream)}
.tbl td{padding:12px 14px;border-bottom:1px solid var(--bd);color:var(--ink);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(200,169,81,.03)}
/* Judicial card */
.jd-card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh);margin-bottom:14px;display:flex;align-items:flex-start;gap:16px}
.jd-av{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;border:2px solid var(--bd)}
.jd-av.takken{background:rgba(200,169,81,.12);border-color:rgba(200,169,81,.3)}
.jd-av.shiho{background:var(--sk-bg);border-color:rgba(2,132,199,.2)}
.jd-info{flex:1}
.jd-name{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:2px}
.jd-meta{font-size:11px;color:var(--muted);line-height:1.8}
.jd-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
/* assign table */
.assign-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid var(--bd);transition:.13s}
.assign-row:last-child{border-bottom:none}
.assign-row:hover{background:rgba(200,169,81,.03)}
.assign-case{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);width:90px;flex-shrink:0}
.assign-client{flex:1;font-size:12px;color:var(--ink)}
.assign-type{width:60px;text-align:center}
/* modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--white);border-radius:12px;width:480px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:14px;font-weight:700;color:var(--ink)}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);line-height:1}
.modal-body{padding:20px 22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;background:var(--cream);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:13px;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;outline:none;transition:.15s}
.field input:focus,.field select:focus{border-color:var(--gold)}
.modal-foot{padding:14px 22px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:8px}
.al{padding:10px 14px;border-radius:var(--r-sm);font-size:12px;line-height:1.6;margin-bottom:14px}
.al-warn{background:var(--am-bg);border:1px solid rgba(217,119,6,.2);color:var(--am)}
/* MOBILE */
.mob-ham{display:none;flex-direction:column;align-items:center;justify-content:center;width:36px;height:36px;background:transparent;border:none;cursor:pointer;border-radius:7px;flex-shrink:0}
.mob-ham span{display:block;width:18px;height:2px;background:rgba(255,255,255,.72);margin:3px 0;border-radius:1px}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199}
@media(max-width:768px){
  .mob-ham{display:flex}
  .mob-overlay.show{display:block}
  
  .sb.open{left:0}
  .shell{overflow:hidden}.content{width:100vw;min-width:0}
  .topbar{padding:0 12px;gap:8px}.tb-crumb{display:none}
  .page{padding:12px}
}  .kpi-row{grid-template-columns:1fr 1fr!important}
  .jd-card{flex-wrap:wrap}
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}

  .tb-title,
.brand-logo,
.sb-logo,
.login-title,
.mod-title,
.page-title        {  font-weight:600; letter-spacing:.3px; }

/* Section headings inside content */
.section-title     {  font-size:12px;
                     font-weight:700; text-transform:uppercase; letter-spacing:1px;
                     color:var(--label); }

/* KPI numbers — large display (24px+): Outfit tabular */
.kpi-value, .kpi-vl, .stat-val { 
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-weight:300;
  font-variant-numeric:tabular-nums lining-nums;
  letter-spacing:-.5px;   /* tight for large numbers */
  color:var(--ink);        /* always maximum contrast */
}

/* Inline amounts in tables/lists */
.amt { font-family:'Outfit','Noto Sans JP',sans-serif;
       font-weight:600; font-variant-numeric:tabular-nums;
       color:var(--ink); }

/* Positive delta only */
.delta-up { color:var(--em); font-weight:600; font-size:.9em; }
.delta-dn { color:var(--rd); font-weight:600; font-size:.9em; }

/* IDs and codes */
.mono, [class*="-id"], [class*="-code"] { font-family:'DM Mono',monospace; font-size:.92em; }

/* Badge system — 4 states only */
.badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:20px;
         font-size:10px; font-weight:600; letter-spacing:.3px;
         font-family:'Outfit',sans-serif; white-space:nowrap; }
.b-em, .badge.emerald, .badge.em { background:var(--em-bg); color:var(--em); }
.b-am, .badge.amber,   .badge.am { background:var(--am-bg); color:var(--am); }
.b-rd, .badge.red,     .badge.rd { background:var(--rd-bg); color:var(--rd); }
.b-nt, .badge.muted,   .badge.nt { background:var(--cream2); color:var(--label); }
/* Legacy aliases → neutral */
.b-sk, .badge.sky    { background:#F0F9FF; color:#0369A1; }
.b-vt, .badge.violet { background:var(--cream2); color:var(--label); }
.b-gd, .badge.gold   { background:var(--gold-dim); color:#92740A; }




/* Brand — Cormorant only here */
.sb-logo, .brand-logo {
  font-family:'Cormorant Garamond',serif !important;
  letter-spacing:5px;
}
/* Everything else: Outfit */
body, input, select, textarea, button {
  font-family:'Outfit','Noto Sans JP',sans-serif;
}

/* ── Page structure ── */
.tb-title {
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-size:18px; font-weight:600; color:var(--ink);
  letter-spacing:-.2px;
}
.login-title {
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-size:24px; font-weight:600; color:var(--ink);
  letter-spacing:-.3px;
}
.section-title {
  
  font-size:11px; font-weight:700;
  text-transform:uppercase; letter-spacing:1.2px;
  color:var(--label);
}

/* ── Numbers & Amounts — always --ink, always Outfit ── */
.kpi-value, .kpi-vl {
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-weight:300 !important;
  font-variant-numeric:tabular-nums lining-nums !important;
  color:var(--ink);
  letter-spacing:-.5px;
}
.stat-val {
  font-family:'Outfit','Noto Sans JP',sans-serif !important;
  font-weight:300 !important;
  font-variant-numeric:tabular-nums !important;
  color:var(--ink) !important;
}
.kpi-label, .stat-label, .kpi-sub {
  color:var(--label) !important;
  font-weight:500;
}

/* ── Delta (the ONE exception: direction of change) ── */
.delta-up { color:var(--em) !important; }
.delta-dn { color:var(--rd) !important; }

/* ── IDs / codes ── */
.id-mono, .ag-id, .case-id {
  font-family:'DM Mono',monospace;
  font-size:.88em; color:var(--label);
}

/* ── Badge system: 4 states only ── */
.badge {
  display:inline-flex; align-items:center;
  padding:2px 8px; border-radius:20px;
  font-size:10px; font-weight:600; letter-spacing:.3px;
  font-family:'Outfit',sans-serif; white-space:nowrap;
  font-variant-numeric:tabular-nums;
}
.badge.emerald, .badge.em { background:#ECFDF5; color:#059669; }
.badge.amber,   .badge.am { background:#FFFBEB; color:#D97706; }
.badge.red,     .badge.rd { background:#FEF2F2; color:#DC2626; }
.badge.muted,   .badge.nt,
.badge.sky,     .badge.violet,
.badge.gold               { background:var(--cream2); color:var(--label); }


/* ═══════════════════════════════════════════════════════════════
   COREBLDG — Google-style Typography System
   ─────────────────────────────────────────────────────────────
   大きな数値は weight:300 でサイズで存在感を出す
   Bold はラベル・ボタン・UIに使い、数値には使わない
   背景は白。装飾は最小限。余白で呼吸する。
   ═══════════════════════════════════════════════════════════════ */

/* Page background */
html, body { background:#FFFFFF !important; }

/* ── Brand (Cormorant only here) ── */
.sb-logo, .brand-logo {
  font-family: 'Cormorant Garamond', serif !important;
  letter-spacing: 5px;
}

/* ── Base ── */
body, input, select, textarea, button {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif;
}

/* ── KPI / メトリクス数値
   Google Analytics の大型数値と同じアプローチ:
   weight 300、大きなサイズ、tight letter-spacing ── */
.kpi-value, .kpi-vl {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif !important;
  font-weight: 300 !important;
  font-variant-numeric: tabular-nums lining-nums !important;
  letter-spacing: -1px !important;
  color: var(--ink) !important;
  line-height: 1 !important;
}
/* KPIカードのサイズを少し大きく（軽いweightを補う） */
.kpi-value { font-size: 32px !important;font-variant-numeric:tabular-nums}
.kpi-vl   { font-size: 28px !important; }

/* ── 中型数値（stat-val, テーブル内金額） ── */
.stat-val {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif !important;
  font-weight: 400 !important;
  font-variant-numeric: tabular-nums !important;
  color: var(--ink) !important;
}

/* ── ラベル系 ── */
.kpi-label, .kpi-sub, .stat-label {
  font-size: 11px !important;
  font-weight: 500 !important;
  letter-spacing: .5px !important;
  color: var(--label) !important;
  text-transform: none;
}

/* ── Page title ── */
.tb-title {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif;
  font-size: 16px; font-weight: 400; color: var(--ink);
  letter-spacing: 0;
}

/* ── Section title — Google style: small, spaced, gray ── */
.section-title {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif;
  font-size: 11px; font-weight: 500;
  letter-spacing: .8px;
  color: var(--label);
  text-transform: uppercase;
}

/* ── Card: white bg, very light border, minimal shadow ── */
.card {
  background: #FFFFFF;
  border: 1px solid var(--bd);
  border-radius: 8px;
  box-shadow: var(--sh);
}

/* ── KPI Card ── */
.kpi-card {
  background: #FFFFFF !important;
  border: 1px solid var(--bd) !important;
  border-radius: 8px !important;
  box-shadow: none !important;
  padding: 20px 24px !important;
}
.kpi-card.gold   { border-top: 3px solid var(--gold) !important; }
.kpi-card.emerald{ border-top: 3px solid var(--em)   !important; }
.kpi-card.amber  { border-top: 3px solid var(--am)   !important; }
.kpi-card.red    { border-top: 3px solid var(--rd)   !important; }
.kpi-card.sky    { border-top: 3px solid #1A73E8     !important; }

/* ── 入金監視・大型パネル ── */
.kpi { border-radius: 8px; border: 1px solid var(--bd); }

/* ── Badge — flat style ── */
.badge {
  border-radius: 4px !important;
  font-size: 11px !important;
  font-weight: 500 !important;
  padding: 2px 7px !important;
  letter-spacing: 0 !important;
}

/* ── Buttons ── */
.btn-primary {
  background: var(--navy) !important;
  border-radius: 6px !important;
  font-weight: 500 !important;
  letter-spacing: .2px !important;
}
.btn-ghost {
  border-radius: 6px !important;
  font-weight: 500 !important;
}

/* ── Delta (増減のみ色付き) ── */
.delta-up, .kpi-delta.up { color: var(--em) !important; font-weight: 500; font-size: .82em; }
.delta-dn, .kpi-delta.dn { color: var(--rd) !important; font-weight: 500; font-size: .82em; }

/* ── IDs ── */
[class*="-id"], [class*="-code"], .pipe-ag, .task-meta [class*="ag-"],
.id-mono { font-family: 'DM Mono', monospace; font-size: .88em; color: var(--label); }

/* ── Form inputs — Google style ── */
.form-input, .form-select {
  border: 1px solid var(--bd) !important;
  border-radius: 4px !important;
  background: #FFFFFF !important;
  font-family: 'Outfit', 'Noto Sans JP', sans-serif !important;
  font-size: 14px !important;
  color: var(--ink) !important;
  padding: 8px 12px !important;
}
.form-input:focus, .form-select:focus {
  border-color: #1A73E8 !important;
  outline: none !important;
}

/* ── Section separator ── */

.section-title::before { display: none; }
/* ── Google-style 数値原則 (DS v2.3) ── */
.kpi-value, .kpi-vl, .kpi-val,
.stat-val, .qs-val, .count-val,
.td-amt, .bc-vl, .bc-total-vl,
.rr-amount, .amount-val, .srv,
.visit-reward, .lb-val,
.mf-kpi-vl, .mf-reward {
  font-family:'Outfit','Noto Sans JP',sans-serif !important;
  font-weight:300 !important;
  font-variant-numeric:tabular-nums !important;
}
.kpi-value { font-size:32px !important; }
.kpi-vl    { font-size:28px !important; }
</style>
</head>
<body>
<div class="shell">
<nav class="sb">
  <div class="sb-head">
    <div class="sb-logo">CORE<br>BLDG</div>
    <div class="sb-ver">v2.0 — CORETO</div>
  </div>
  <div class="sb-user">
    <div class="sb-av" id="sb-av">—</div>
    <div style="overflow:hidden">
      <div class="sb-uname" id="sb-name">—</div>
      <div class="sb-ur" id="sb-role">—</div>
    </div>
  </div>
  <div class="sb-nav" id="sb-nav"></div>
</nav>

<div class="content">
  <div class="topbar">
    <button class="mob-ham" onclick="toggleSb()"><span></span><span></span><span></span></button>
    <div>
      <div class="tb-title">士業連携管理</div>
      <div class="tb-crumb"><a href="coreto-hub-v2.html">COREBLDG</a> › <span>士業連携管理</span></div>
    </div>
    <div class="tb-act">
      <button class="btn btn-g btn-sm" onclick="openAddModal()">＋ 士業者を追加</button>
    </div>
  </div>
  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('list',this)">士業者一覧</div>
    <div class="tab" onclick="switchTab('assign',this)">案件割当</div>
    <div class="tab" onclick="switchTab('license',this)">免許・資格管理</div>
  </div>
  <div class="page" id="pg"></div>
</div>
</div>

<!-- 追加モーダル -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">士業者を追加</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field"><label>氏名</label><input placeholder="山田 太郎"></div>
      <div class="field"><label>種別</label>
        <select>
          <option>宅地建物取引士</option>
          <option>司法書士</option>
          <option>行政書士</option>
        </select>
      </div>
      <div class="field"><label>資格登録番号</label><input placeholder="東京都知事(X)第XXXXXX号"></div>
      <div class="field"><label>電話番号</label><input placeholder="03-0000-0000" type="tel"></div>
      <div class="field"><label>メールアドレス</label><input placeholder="name@example.com" type="email"></div>
      <div class="field"><label>対応エリア</label><input placeholder="港区・渋谷区・新宿区"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-g btn-sm" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-p btn-sm" onclick="closeModal();showToast('✅ 士業者を追加しました', 'em')">追加する</button>
    </div>
  </div>
</div>

<div class="mob-overlay" onclick="toggleSb()"></div>
<script src="coreto-kv-client.js"></script>
<script src="coreto-nav-v2.js"></script>
<script>
(function(){
  var _role = sessionStorage.getItem('coreto_role') || '';
  var _allowed = ["hq"];
  if (_allowed.length && !_allowed.includes(_role)) {
    location.replace('coreto-hub-v2.html?unauthorized=1');
  }
})();

function toggleSb(){document.querySelector('.sb').classList.toggle('open');document.querySelector('.mob-overlay').classList.toggle('show');}
function openAddModal(){document.getElementById('modal').classList.add('show');}
function closeModal(){document.getElementById('modal').classList.remove('show');}

const CASES = []; /* 動的生成 */

const ASSIGN_CASES = [];

let currentTab='list';
function switchTab(t,el){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  if(el)el.classList.add('active');
  currentTab=t; renderTab(t);
}
function renderTab(t){
  const pg=document.getElementById('pg');
  if(t==='list')    pg.innerHTML=renderList();
  if(t==='assign')  pg.innerHTML=renderAssign();
  if(t==='license') pg.innerHTML=renderLicense();
}

function renderList(){
  const takken = JUDICIAL.filter(j=>j.type==='宅建士');
  const shiho  = JUDICIAL.filter(j=>j.type==='司法書士');
  function cards(arr){
    return arr.map(j=>`
    <div class="jd-card">
      <div class="jd-av ${j.type==='宅建士'?'takken':'shiho'}">${j.type==='宅建士'?'🏠':'⚖️'}</div>
      <div class="jd-info">
        <div class="jd-name">${j.name} <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--faint);margin-left:6px">${j.id}</span></div>
        <div class="jd-meta">
          ${j.license}<br>
          対応エリア：${j.area}<br>
          担当案件数：<strong>${j.cases}件</strong>　電話：${j.phone}
        </div>
      </div>
      <div class="jd-actions">
        <span class="badge ${j.available?'b-em':'b-am'}">${j.available?'対応可':'対応中'}</span>
        <button class="btn btn-g btn-sm" style="margin-top:4px" onclick="showToast('案件割当画面に移動します', 'em')">案件割当</button>
      </div>
    </div>`).join('');
  }
  const pending = ASSIGN_CASES.filter(c=>!c.assignee).length;
  return `
  <div class="kpi-row">
    <div class="kpi gd"><div class="kpi-lb">宅建士（登録）</div><div class="kpi-vl">${takken.length}名</div><div class="kpi-sb">対応可 ${takken.filter(j=>j.available).length}名</div></div>
    <div class="kpi sk"><div class="kpi-lb">司法書士（登録）</div><div class="kpi-vl">${shiho.length}名</div><div class="kpi-sb">対応可 ${shiho.filter(j=>j.available).length}名</div></div>
    <div class="kpi em"><div class="kpi-lb">今月対応案件</div><div class="kpi-vl">8件</div></div>
    <div class="kpi ${pending>0?'am':'em'}"><div class="kpi-lb">割当待ち</div><div class="kpi-vl">${pending}件</div><div class="kpi-sb">${pending>0?'要対応':'問題なし'}</div></div>
  </div>
  <div class="card"><div class="card-head"><div class="card-title">🏠 宅地建物取引士</div><span style="font-size:11px;color:var(--muted)">${takken.length}名登録</span></div><div style="padding:14px 6px">${cards(takken)}</div></div>
  <div class="card"><div class="card-head"><div class="card-title">⚖️ 司法書士</div><span style="font-size:11px;color:var(--muted)">${shiho.length}名登録</span></div><div style="padding:14px 6px">${cards(shiho)}</div></div>`;
}

function renderAssign(){
  const rows = ASSIGN_CASES.map(c=>`
    <tr>
      <td style="font-family:'DM Mono',monospace;font-size:11px">${c.id}</td>
      <td style="font-size:12px">${c.client}</td>
      <td><span class="badge ${c.type==='IT重説'?'b-sk':'b-vt'}">${c.type}</span></td>
      <td>${c.assignee ? `<span style="font-size:12px;font-weight:600">${c.assignee}</span>` : `<button class="btn btn-p btn-sm" onclick="assignCase('${c.id}')">割当する</button>`}</td>
      <td style="font-size:12px">${c.deadline}</td>
      <td><span class="badge ${c.assignee?'b-em':'b-am'}">${c.status}</span></td>
    </tr>`).join('');
  const pending = ASSIGN_CASES.filter(c=>!c.assignee);
  return `
  ${pending.length>0?`<div class="al al-warn">⚠️ 割当待ちの案件が<strong>${pending.length}件</strong>あります。期限前に宅建士を割り当ててください。</div>`:''}
  <div class="card">
    <div class="card-head"><div class="card-title">案件割当状況</div></div>
    <table class="tbl">
      <thead><tr><th>案件ID</th><th>クライアント</th><th>種別</th><th>担当士業者</th><th>期限</th><th>状態</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function assignCase(id){
  const avail = JUDICIAL.filter(j=>j.available).map(j=>j.name).join(' / ');
  showToast('📋 担当士業に割当通知を送信しました（対応可能: '+avail+'）', 'em');
}

function renderLicense(){
  const rows = JUDICIAL.map(j=>{
    const expDate = j.type==='宅建士'?'2027/08/31':'2028/03/31';
    const daysLeft = Math.floor((new Date(expDate)-new Date())/86400000);
    const status = daysLeft<90?'b-am':'b-em';
    return `<tr>
      <td style="font-family:'DM Mono',monospace;font-size:11px">${j.id}</td>
      <td style="font-size:12px;font-weight:600">${j.name}</td>
      <td><span class="badge b-nt" style="font-size:10px">${j.type}</span></td>
      <td style="font-size:11px;color:var(--muted)">${j.license}</td>
      <td style="font-size:12px">${expDate}</td>
      <td><span class="badge ${status}">${daysLeft}日後</span></td>
      <td><button class="btn btn-g btn-sm">更新登録</button></td>
    </tr>`;
  }).join('');
  return `
  <div class="card">
    <div class="card-head"><div class="card-title">資格・免許 有効期限管理</div></div>
    <table class="tbl">
      <thead><tr><th>ID</th><th>氏名</th><th>種別</th><th>登録番号</th><th>有効期限</th><th>残日数</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

window.addEventListener('DOMContentLoaded', ()=>{
  CNAV.init('judicial');
  renderTab('list');
});
function showToast(msg, type) {
  var colors = {
    em: ['#ECFDF5','#059669','rgba(5,150,105,.2)'],
    am: ['#FFFBEB','#D97706','rgba(217,119,6,.2)'],
    rd: ['#FEF2F2','#DC2626','rgba(220,38,38,.2)'],
    sk: ['#F0F9FF','#0284C7','rgba(2,132,199,.2)'],
    ok: ['#ECFDF5','#059669','rgba(5,150,105,.2)'],
    warn:['#FFFBEB','#D97706','rgba(217,119,6,.2)'],
    error:['#FEF2F2','#DC2626','rgba(220,38,38,.2)'],
  };
  var c = colors[type] || colors.em;
  var t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:9999;padding:11px 18px;border-radius:9px;font-size:13px;font-weight:600;font-family:Outfit,sans-serif;box-shadow:0 6px 20px rgba(0,0,0,.12);transition:opacity .4s;background:'+c[0]+';color:'+c[1]+';border:1px solid '+c[2];
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.style.opacity='0'; setTimeout(function(){ if(t.parentNode) t.remove(); },400); }, 3200);
}

</script>
