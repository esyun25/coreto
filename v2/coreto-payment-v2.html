<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>報酬・支払い — COREBLDG</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#0D1A2D;--navy-l:#1E3252;--gold:#C8A951;--gold-l:#DFC06A;--gold-dim:rgba(200,169,81,.15);--cream:#FFFFFF;--cream2:#F8F9FA;--white:#FFFFFF;--ink:#202124;--ink2:#2D3748;--muted:#5F6368;--faint:#80868B;--em:#059669;--em-bg:#ECFDF5;--am:#D97706;--am-bg:#FFFBEB;--rd:#DC2626;--rd-bg:#FEF2F2;--sk:#0284C7;--sk-bg:#F0F9FF;--vt:#7C3AED;--vt-bg:#F5F3FF;--bd:#E8EAED;--bd2:#DADCE0;--sw:240px;--r:10px;--r-sm:7px;--sh:0 1px 2px rgba(60,64,67,.1),0 1px 3px rgba(60,64,67,.06)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:#FFFFFF}
.shell{display:flex;height:100vh}
.sb{width:var(--sw);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;position:relative}
.sb::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,rgba(200,169,81,.25) 0%,rgba(200,169,81,.06) 50%,transparent 100%)}
.sb-head{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-logo{font-family: 'Cormorant Garamond', serif;font-size:20px;font-weight:600;letter-spacing:5px;color:var(--gold)}
.sb-ver{font-size:9px;letter-spacing:2px;color:rgba(200,169,81,.3);font-family:'DM Mono',monospace;margin-top:2px}
.sb-user{margin:14px 14px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:9px 11px;display:flex;align-items:center;gap:9px}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--gold-dim);border:1px solid rgba(200,169,81,.25);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gold);flex-shrink:0}
.sb-un{font-size:11px;font-weight:600;color:rgba(255,255,255,.8)}
.sb-ur{font-size:9px;color:rgba(255,255,255,.3);font-family:'DM Mono',monospace}
.sb-nav{flex:1;overflow-y:auto;padding:6px 10px}
.nsl{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.18);padding:10px 8px 4px;font-family:'DM Mono',monospace}
.ni{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;cursor:pointer;transition:all .13s;text-decoration:none;position:relative;margin-bottom:1px}
.ni:hover{background:rgba(255,255,255,.06)}
.ni.active{background:rgba(200,169,81,.1)}
.ni.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:16px;background:var(--gold);border-radius:0 2px 2px 0}
.ni-ic{width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;border-radius:6px;background:rgba(255,255,255,.04);flex-shrink:0}
.ni.active .ni-ic{background:rgba(200,169,81,.12)}
.ni-lb{font-size:11px;font-weight:500;color:rgba(255,255,255,.55);flex:1}
.ni.active .ni-lb,.ni:hover .ni-lb{color:var(--gold)}
.nb{font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;background:var(--rd);color:#fff;font-family:'DM Mono',monospace}
.nb.am{background:var(--am)}
.sf{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.3);transition:.13s}
.sf:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.6)}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;box-shadow:var(--sh)}
.tb-title{font-size:16px;font-weight:600;color:var(--ink);letter-spacing:.5px}
.tb-crumb{font-size:11px;color:var(--faint);margin-top:1px}
.tb-crumb a{color:var(--muted);text-decoration:none}
.tb-act{margin-left:auto;display:flex;gap:9px;align-items:center}
.btn{padding:7px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Outfit',sans-serif;border:none}
.btn-p{background:var(--navy);color:var(--gold)}.btn-p:hover{background:var(--navy-l)}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--bd)}.btn-g:hover{background:var(--cream);color:var(--ink)}
.btn-sm{padding:5px 12px;font-size:11px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;font-family:'Outfit',sans-serif;font-feature-settings:'tnum'}
.b-em{background:var(--em-bg);color:var(--em)}.b-am{background:var(--am-bg);color:var(--am)}.b-rd{background:var(--rd-bg);color:var(--rd)}.b-sk{background:var(--sk-bg);color:var(--sk)}.b-vt{background:var(--vt-bg);color:var(--vt)}.b-gd{background:var(--gold-dim);color:var(--am)}.b-nt{background:var(--cream2);color:var(--muted)}
.tab-bar{padding:0 24px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center}
.tab{padding:12px 18px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.tab:hover{color:var(--ink)}.tab.active{color:var(--navy);border-bottom-color:var(--gold)}
.page{flex:1;overflow-y:auto;padding:24px}
.page::-webkit-scrollbar{width:5px}.page::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.gd::before{background:var(--gold)}.kpi.em::before{background:var(--em)}.kpi.sk::before{background:var(--sk)}.kpi.vt::before{background:var(--vt)}
.kpi-lb{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.kpi-vl{font-size:24px;font-weight:700;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums lining-nums;color:var(--ink);margin-top:4px}
.card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:18px}
.card-head{padding:14px 20px;border-bottom:1px solid var(--bd);background:var(--cream);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:12px;font-weight:700;color:var(--ink);text-transform:uppercase;letter-spacing:.5px}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 14px;text-align:left;font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);background:var(--cream);border-bottom:1px solid var(--bd);white-space:nowrap;font-family:'DM Mono',monospace}
thead th:first-child{padding-left:18px}
tbody tr{border-bottom:1px solid var(--bd);transition:background .1s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(200,169,81,.03)}
tbody td{padding:13px 14px;font-size:12px;color:var(--ink2);vertical-align:middle}
tbody td:first-child{padding-left:18px}
.td-name{font-size:13px;font-weight:600;color:var(--ink)}
.td-sub{font-size:10px;color:var(--faint);font-family:'DM Mono',monospace;margin-top:1px}
.td-amt{font-size:14px;font-weight:700;font-family:'Outfit','Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums}
.td-amt.em{color:var(--em)}.td-amt.am{color:var(--am)}.td-amt.nt{color:var(--faint);font-weight:400;font-size:12px}
.bg2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}
.bc{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:20px;box-shadow:var(--sh)}
.bc-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:14px}
.bc-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd)}
.bc-row:last-child{border-bottom:none}
.bc-lb{font-size:12px;color:var(--muted)}
.bc-vl{font-size:13px;font-weight:700;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums}
.bc-vl.em{color:var(--em)}.bc-vl.am{color:var(--am)}
.bc-total{display:flex;justify-content:space-between;align-items:center;padding:12px 0 0;margin-top:8px;border-top:2px solid var(--bd)}
.bc-total-lb{font-size:13px;font-weight:700;color:var(--ink)}
.bc-total-vl{font-size:20px;font-weight:700;color:var(--navy);font-family:'Outfit','Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums}
.slip{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:28px;box-shadow:var(--sh);max-width:680px;margin:0 auto}
.slip-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:20px;border-bottom:2px solid var(--navy)}
.slip-logo{font-family:'Outfit','Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums;font-size:22px;font-weight:700;letter-spacing:4px;color:var(--navy)}
.slip-meta{text-align:right;font-size:11px;color:var(--muted);line-height:1.8;font-family:'DM Mono',monospace}
.slip-tbl{width:100%;border-collapse:collapse;margin-bottom:18px}
.slip-tbl th{padding:8px 12px;text-align:left;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);background:var(--cream);border:1px solid var(--bd);font-family:'DM Mono',monospace}
.slip-tbl td{padding:10px 12px;font-size:12px;color:var(--ink);border:1px solid var(--bd)}
.slip-tbl td.num{text-align:right;font-weight:700;font-family:'Outfit','Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums;font-size:14px}
.slip-tbl tr.sub td{background:var(--cream);font-weight:600}
.slip-tbl tr.tot td{background:var(--navy);color:var(--gold);font-weight:700}
.slip-tbl tr.tot td.num{font-size:16px}
.sim-card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:22px;box-shadow:var(--sh);margin-bottom:18px}
.sim-row{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;margin-bottom:16px}
.sim-fld{flex:1;min-width:130px}
.sim-lb{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px}
.sim-inp{width:100%;padding:9px 12px;background:var(--cream);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:13px;color:var(--ink);font-family:'Outfit',sans-serif;outline:none;transition:.15s}
.sim-inp:focus{border-color:var(--gold);background:var(--white)}
.sim-sel{width:100%;padding:9px 12px;background:var(--cream);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:13px;color:var(--ink);font-family:'Outfit',sans-serif;outline:none;cursor:pointer}
.sim-res{background:var(--navy);border-radius:var(--r-sm);padding:16px 20px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.srl{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:1px;text-transform:uppercase;font-family:'Outfit',sans-serif;font-variant-numeric:tabular-nums;margin-bottom:5px}
.srv{font-size:22px;font-weight:700;color:var(--gold);font-family:'Outfit','Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums}
.srs{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px}
@media print{.sb,.topbar,.tab-bar,.tb-act{display:none!important}.content{overflow:visible}.slip{box-shadow:none;border:none}}

.tb-title,
.brand-logo,
.sb-logo,
.login-title,
.mod-title,
.page-title        {  font-weight:600; letter-spacing:.3px; }

/* Section headings inside content */
.section-title     {  font-size:12px;
                     font-weight:700; text-transform:uppercase; letter-spacing:1px;
                     color:var(--label); }

/* KPI numbers — large display (24px+): Outfit tabular */
.kpi-value, .kpi-vl, .stat-val { 
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-weight:700;
  font-variant-numeric:tabular-nums lining-nums;
  letter-spacing:-.5px;   /* tight for large numbers */
  color:var(--ink);        /* always maximum contrast */
}

/* Inline amounts in tables/lists */
.amt { font-family:'Outfit','Noto Sans JP',sans-serif;
       font-weight:600; font-variant-numeric:tabular-nums;
       color:var(--ink); }

/* Positive delta only */
.delta-up { color:var(--em); font-weight:600; font-size:.9em; }
.delta-dn { color:var(--rd); font-weight:600; font-size:.9em; }

/* IDs and codes */
.mono, [class*="-id"], [class*="-code"] { font-family:'DM Mono',monospace; font-size:.92em; }

/* Badge system — 4 states only */
.badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:20px;
         font-size:10px; font-weight:600; letter-spacing:.3px;
         font-family:'Outfit',sans-serif; white-space:nowrap; }
.b-em, .badge.emerald, .badge.em { background:var(--em-bg); color:var(--em); }
.b-am, .badge.amber,   .badge.am { background:var(--am-bg); color:var(--am); }
.b-rd, .badge.red,     .badge.rd { background:var(--rd-bg); color:var(--rd); }
.b-nt, .badge.muted,   .badge.nt { background:var(--cream2); color:var(--label); }
/* Legacy aliases → neutral */
.b-sk, .badge.sky    { background:#F0F9FF; color:#0369A1; }
.b-vt, .badge.violet { background:var(--cream2); color:var(--label); }
.b-gd, .badge.gold   { background:var(--gold-dim); color:#92740A; }




/* Brand — Cormorant only here */
.sb-logo, .brand-logo {
  font-family:'Cormorant Garamond',serif !important;
  letter-spacing:5px;
}
/* Everything else: Outfit */
body, input, select, textarea, button {
  font-family:'Outfit','Noto Sans JP',sans-serif;
}

/* ── Page structure ── */
.tb-title {
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-size:18px; font-weight:600; color:var(--ink);
  letter-spacing:-.2px;
}
.login-title {
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-size:24px; font-weight:600; color:var(--ink);
  letter-spacing:-.3px;
}
.section-title {
  
  font-size:11px; font-weight:700;
  text-transform:uppercase; letter-spacing:1.2px;
  color:var(--label);
}

/* ── Numbers & Amounts — always --ink, always Outfit ── */
.kpi-value, .kpi-vl {
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-weight:700 !important;
  font-variant-numeric:tabular-nums lining-nums !important;
  color:var(--ink);
  letter-spacing:-.5px;
}
.stat-val {
  font-family:'Outfit','Noto Sans JP',sans-serif !important;
  font-weight:700 !important;
  font-variant-numeric:tabular-nums !important;
  color:var(--ink) !important;
}
.kpi-label, .stat-label, .kpi-sub {
  color:var(--label) !important;
  font-weight:500;
}

/* ── Delta (the ONE exception: direction of change) ── */
.delta-up { color:var(--em) !important; }
.delta-dn { color:var(--rd) !important; }

/* ── IDs / codes ── */
.id-mono, .ag-id, .case-id {
  font-family:'DM Mono',monospace;
  font-size:.88em; color:var(--label);
}

/* ── Badge system: 4 states only ── */
.badge {
  display:inline-flex; align-items:center;
  padding:2px 8px; border-radius:20px;
  font-size:10px; font-weight:600; letter-spacing:.3px;
  font-family:'Outfit',sans-serif; white-space:nowrap;
  font-variant-numeric:tabular-nums;
}
.badge.emerald, .badge.em { background:#ECFDF5; color:#059669; }
.badge.amber,   .badge.am { background:#FFFBEB; color:#D97706; }
.badge.red,     .badge.rd { background:#FEF2F2; color:#DC2626; }
.badge.muted,   .badge.nt,
.badge.sky,     .badge.violet,
.badge.gold               { background:var(--cream2); color:var(--label); }


/* ═══════════════════════════════════════════════════════════════
   COREBLDG — Google-style Typography System
   ─────────────────────────────────────────────────────────────
   大きな数値は weight:300 でサイズで存在感を出す
   Bold はラベル・ボタン・UIに使い、数値には使わない
   背景は白。装飾は最小限。余白で呼吸する。
   ═══════════════════════════════════════════════════════════════ */

/* Page background */
html, body { background:#FFFFFF !important; }

/* ── Brand (Cormorant only here) ── */
.sb-logo, .brand-logo {
  font-family: 'Cormorant Garamond', serif !important;
  letter-spacing: 5px;
}

/* ── Base ── */
body, input, select, textarea, button {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif;
}

/* ── KPI / メトリクス数値
   Google Analytics の大型数値と同じアプローチ:
   weight 300、大きなサイズ、tight letter-spacing ── */
.kpi-value, .kpi-vl {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif !important;
  font-weight: 300 !important;
  font-variant-numeric: tabular-nums lining-nums !important;
  letter-spacing: -1px !important;
  color: var(--ink) !important;
  line-height: 1 !important;
}
/* KPIカードのサイズを少し大きく（軽いweightを補う） */
.kpi-value { font-size: 32px !important; }
.kpi-vl   { font-size: 28px !important; }

/* ── 中型数値（stat-val, テーブル内金額） ── */
.stat-val {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif !important;
  font-weight: 400 !important;
  font-variant-numeric: tabular-nums !important;
  color: var(--ink) !important;
}

/* ── ラベル系 ── */
.kpi-label, .kpi-sub, .stat-label {
  font-size: 11px !important;
  font-weight: 500 !important;
  letter-spacing: .5px !important;
  color: var(--label) !important;
  text-transform: none;
}

/* ── Page title ── */
.tb-title {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif;
  font-size: 16px; font-weight: 400; color: var(--ink);
  letter-spacing: 0;
}

/* ── Section title — Google style: small, spaced, gray ── */
.section-title {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif;
  font-size: 11px; font-weight: 500;
  letter-spacing: .8px;
  color: var(--label);
  text-transform: uppercase;
}

/* ── Card: white bg, very light border, minimal shadow ── */
.card {
  background: #FFFFFF;
  border: 1px solid var(--bd);
  border-radius: 8px;
  box-shadow: var(--sh);
}

/* ── KPI Card ── */
.kpi-card {
  background: #FFFFFF !important;
  border: 1px solid var(--bd) !important;
  border-radius: 8px !important;
  box-shadow: none !important;
  padding: 20px 24px !important;
}
.kpi-card.gold   { border-top: 3px solid var(--gold) !important; }
.kpi-card.emerald{ border-top: 3px solid var(--em)   !important; }
.kpi-card.amber  { border-top: 3px solid var(--am)   !important; }
.kpi-card.red    { border-top: 3px solid var(--rd)   !important; }
.kpi-card.sky    { border-top: 3px solid #1A73E8     !important; }

/* ── 入金監視・大型パネル ── */
.kpi { border-radius: 8px; border: 1px solid var(--bd); }

/* ── Badge — flat style ── */
.badge {
  border-radius: 4px !important;
  font-size: 11px !important;
  font-weight: 500 !important;
  padding: 2px 7px !important;
  letter-spacing: 0 !important;
}

/* ── Buttons ── */
.btn-primary {
  background: var(--navy) !important;
  border-radius: 6px !important;
  font-weight: 500 !important;
  letter-spacing: .2px !important;
}
.btn-ghost {
  border-radius: 6px !important;
  font-weight: 500 !important;
}

/* ── Delta (増減のみ色付き) ── */
.delta-up, .kpi-delta.up { color: var(--em) !important; font-weight: 500; font-size: .82em; }
.delta-dn, .kpi-delta.dn { color: var(--rd) !important; font-weight: 500; font-size: .82em; }

/* ── IDs ── */
[class*="-id"], [class*="-code"], .pipe-ag, .task-meta [class*="ag-"],
.id-mono { font-family: 'DM Mono', monospace; font-size: .88em; color: var(--label); }

/* ── Form inputs — Google style ── */
.form-input, .form-select {
  border: 1px solid var(--bd) !important;
  border-radius: 4px !important;
  background: #FFFFFF !important;

function calcSim(){
  const fee=parseInt(document.getElementById('s-fee')?.value||0)||0;
  const rank=parseFloat(document.getElementById('s-rank')?.value||0.8);
  const pt=parseFloat(document.getElementById('s-pt')?.value||0);
  const ag=Math.round(fee*rank*(1-pt));
  const ptAmt=Math.round(fee*pt);
  if(!document.getElementById('sr-fee'))return;
  document.getElementById('sr-fee').textContent='¥'+fee.toLocaleString();
  document.getElementById('sr-ag').textContent='¥'+ag.toLocaleString();
  document.getElementById('sr-rate').textContent=(rank*100)+'%'+(pt>0?' (PT控除後)':'');
  document.getElementById('sr-pt').textContent=ptAmt>0?'¥'+ptAmt.toLocaleString():'—';
  document.getElementById('sr-pt').style.color=ptAmt>0?'var(--gold)':'rgba(255,255,255,.35)';
  document.getElementById('sr-pt-sub').textContent=ptAmt>0?(pt*100)+'%':'';
}

<script>
window.addEventListener('DOMContentLoaded', function() {
  CNAV.init('payment');

  const sRole = sessionStorage.getItem('coreto_role') || 'hq';

  if (sRole === 'hq') {
    // HQ: デフォルトのまま（HQ/AG切替セレクタ・一括出力ボタン表示）
    role = 'hq';
    renderTab('summary');
  } else {
    // AG / PT / インターン: AG視点で固定起動
    role = 'ag';
    // HQ視点切替セレクタを非表示
    const roleSel = document.getElementById('role-sel');
    if (roleSel) roleSel.style.display = 'none';
    // 一括出力ボタン（HQ専用）を非表示
    document.querySelectorAll('.tb-act .btn-p').forEach(b => {
      if (b.textContent.includes('一括出力')) b.style.display = 'none';
    });
    // サイドバーをAG情報に更新
    const name = sRole === 'hr_ag' ? '鈴木 花子' : sRole === 'pt' ? '佐藤 PT' : '山田 誠';
    const id   = sRole === 'hr_ag' ? 'AG-0088 / Gold' : sRole === 'pt' ? 'PT-0010 / —' : 'AG-0042 / Gold';
    const av   = sRole === 'pt' ? 'PT' : 'AG';
    const el = document.getElementById('sb-av'); if(el) el.textContent = av;
    const un = document.getElementById('sb-un'); if(un) un.textContent = name;
    const ur = document.getElementById('sb-ur'); if(ur) ur.textContent = id;
    const pt = document.getElementById('pg-title'); if(pt) pt.textContent = '報酬明細';
    renderTab('summary');
  }
});
</script>
