<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>報酬・支払い — COREBLDG</title>
<link rel="stylesheet" href="coreto-design-system.css">
<style>

:root{--navy:#0D1A2D;--navy-l:#1E3252;--gold:#C8A951;--gold-l:#DFC06A;--gold-dim:rgba(200,169,81,.15);--cream:#FFFFFF;--cream2:#F8F9FA;--white:#FFFFFF;--ink:#202124;--ink2:#2D3748;--muted:#5F6368;--faint:#80868B;--em:#059669;--em-bg:#ECFDF5;--am:#D97706;--am-bg:#FFFBEB;--rd:#DC2626;--rd-bg:#FEF2F2;--sk:#0284C7;--sk-bg:#F0F9FF;--vt:#7C3AED;--vt-bg:#F5F3FF;--bd:#E8EAED;--bd2:#DADCE0;--sw:240px;--r:10px;--r-sm:7px;--sh:0 1px 2px rgba(60,64,67,.1),0 1px 3px rgba(60,64,67,.06)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:var(--cream)}
.shell{display:flex;height:100vh}










.nsl{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.18);padding:10px 8px 4px;font-family:'DM Mono',monospace}
.ni{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;cursor:pointer;transition:all .13s;text-decoration:none;position:relative;margin-bottom:1px}
.ni:hover{background:rgba(255,255,255,.06)}
.ni.active{background:rgba(200,169,81,.1)}
.ni.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:16px;background:var(--gold);border-radius:0 2px 2px 0}
.ni-ic{width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;border-radius:6px;background:rgba(255,255,255,.04);flex-shrink:0}
.ni.active .ni-ic{background:rgba(200,169,81,.12)}
.ni-lb{font-size:11px;font-weight:500;color:rgba(255,255,255,.55);flex:1}
.ni.active .ni-lb,.ni:hover .ni-lb{color:var(--gold)}
.nb{font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;background:var(--rd);color:#fff;font-family:'DM Mono',monospace}
.nb.am{background:var(--am)}
.sf{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.3);transition:.13s}
.sf:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.6)}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;box-shadow:var(--sh)}
.tb-title{font-size:16px;font-weight:600;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;letter-spacing:.2px}
.tb-crumb{font-size:11px;color:var(--faint);margin-top:1px}
.tb-crumb a{color:var(--muted);text-decoration:none}
.tb-act{margin-left:auto;display:flex;gap:9px;align-items:center}
.btn{padding:7px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Outfit',sans-serif;border:none}
.btn-p{background:var(--navy);color:var(--gold)}.btn-p:hover{background:var(--navy-l)}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--bd)}.btn-g:hover{background:var(--cream);color:var(--ink)}
.btn-sm{padding:5px 12px;font-size:11px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;font-family:'Outfit',sans-serif;font-feature-settings:'tnum'}
.b-em{background:var(--em-bg);color:var(--em)}.b-am{background:var(--am-bg);color:var(--am)}.b-rd{background:var(--rd-bg);color:var(--rd)}.b-sk{background:var(--sk-bg);color:var(--sk)}.b-vt{background:var(--vt-bg);color:var(--vt)}.b-gd{background:var(--gold-dim);color:var(--am)}.b-nt{background:var(--cream2);color:var(--muted)}
.tab-bar{padding:0 24px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center}
.tab{padding:12px 18px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.tab:hover{color:var(--ink)}.tab.active{color:var(--navy);border-bottom-color:var(--gold)}
.page{flex:1;overflow-y:auto;padding:24px}
.page::-webkit-scrollbar{width:5px}.page::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.gd::before{background:var(--gold)}.kpi.em::before{background:var(--em)}.kpi.sk::before{background:var(--sk)}.kpi.vt::before{background:var(--vt)}
.kpi-lb{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.kpi-vl{font-size:24px;font-weight:700;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif}
.kpi-sb{font-size:10px;color:var(--faint);margin-top:4px}
.card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:18px}
.card-head{padding:14px 20px;border-bottom:1px solid var(--bd);background:var(--cream);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:12px;font-weight:700;color:var(--ink);text-transform:uppercase;letter-spacing:.5px}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 14px;text-align:left;font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);background:var(--cream);border-bottom:1px solid var(--bd);white-space:nowrap;font-family:'DM Mono',monospace}
thead th:first-child{padding-left:18px}
tbody tr{border-bottom:1px solid var(--bd);transition:background .1s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(200,169,81,.03)}
tbody td{padding:13px 14px;font-size:12px;color:var(--ink2);vertical-align:middle}
tbody td:first-child{padding-left:18px}
.td-name{font-size:13px;font-weight:600;color:var(--ink)}
.td-sub{font-size:10px;color:var(--faint);font-family:'DM Mono',monospace;margin-top:1px}
.td-amt{font-size:14px;font-weight:300;font-family:'Outfit','Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums}
.td-amt.em{color:var(--em);font-variant-numeric:tabular-nums}.td-amt.am{color:var(--am);font-variant-numeric:tabular-nums}.td-amt.nt{color:var(--faint);font-weight:400;font-size:12px;font-variant-numeric:tabular-nums}
.bg2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}
.bc{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:20px;box-shadow:var(--sh)}
.bc-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:14px}
.bc-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd)}
.bc-row:last-child{border-bottom:none}
.bc-lb{font-size:12px;color:var(--muted)}
.bc-vl{font-size:13px;font-weight:300;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums}
.bc-vl.em{color:var(--em);font-variant-numeric:tabular-nums}.bc-vl.am{color:var(--am);font-variant-numeric:tabular-nums}
.bc-total{display:flex;justify-content:space-between;align-items:center;padding:12px 0 0;margin-top:8px;border-top:2px solid var(--bd)}
.bc-total-lb{font-size:13px;font-weight:700;color:var(--ink)}
.bc-total-vl{font-size:20px;font-weight:300;color:var(--navy);font-family:'Outfit','Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums}
.slip{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:28px;box-shadow:var(--sh);max-width:680px;margin:0 auto}
.slip-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:20px;border-bottom:2px solid var(--navy)}
.slip-logo{font-family:'Outfit','Noto Sans JP',sans-serif;font-size:22px;font-weight:700;letter-spacing:4px;color:var(--navy)}
.slip-meta{text-align:right;font-size:11px;color:var(--muted);line-height:1.8;font-family:'DM Mono',monospace}
.slip-tbl{width:100%;border-collapse:collapse;margin-bottom:18px}
.slip-tbl th{padding:8px 12px;text-align:left;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);background:var(--cream);border:1px solid var(--bd);font-family:'DM Mono',monospace}
.slip-tbl td{padding:10px 12px;font-size:12px;color:var(--ink);border:1px solid var(--bd)}
.slip-tbl td.num{text-align:right;font-weight:300;font-family:'Outfit','Noto Sans JP',sans-serif;font-size:14px;font-variant-numeric:tabular-nums}
.slip-tbl tr.sub td{background:var(--cream);font-weight:600}
.slip-tbl tr.tot td{background:var(--navy);color:var(--gold);font-weight:700}
.slip-tbl tr.tot td.num{font-size:16px}
.sim-card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:22px;box-shadow:var(--sh);margin-bottom:18px}
.sim-row{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;margin-bottom:16px}
.sim-fld{flex:1;min-width:130px}
.sim-lb{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px}
.sim-inp{width:100%;padding:9px 12px;background:var(--cream);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:13px;color:var(--ink);font-family:'Outfit',sans-serif;outline:none;transition:.15s}
.sim-inp:focus{border-color:var(--gold);background:var(--white)}
.sim-sel{width:100%;padding:9px 12px;background:var(--cream);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:13px;color:var(--ink);font-family:'Outfit',sans-serif;outline:none;cursor:pointer}
.sim-res{background:var(--navy);border-radius:var(--r-sm);padding:16px 20px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.srl{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:1px;text-transform:uppercase;font-family:'Outfit',sans-serif;font-variant-numeric:tabular-nums;margin-bottom:5px}
.srv{font-size:22px;font-weight:300;color:var(--gold);font-family:'Outfit','Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums}
.srs{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px}
@media print{.sb,.topbar,.tab-bar,.tb-act{display:none!important}.content{overflow:visible}.slip{box-shadow:none;border:none}}

/* ════════════════════════════════════════════
   数値フォント統一 — Outfit + Tabular Nums
   (DM Monoはコード/ID系のみ維持)
   ════════════════════════════════════════════ */

/* バッジ・カウント系 */
.nb, .nav-badge, .cnav-badge,
.tab-count, .kh-count, .kc-count,
.badge, .score-num {
  font-family: 'Outfit', sans-serif !important;
  font-variant-numeric: tabular-nums;
  font-feature-settings: 'tnum';
  letter-spacing: 0 !important;
}

/* KPI大数値 */
.qs-val, .kpi-val, .kpi-value,
.stat-val, .count-val {
  font-variant-numeric: tabular-nums;
  font-feature-settings: 'tnum', 'lnum';
}

/* 日時・タイムスタンプ */
.tl-time, .remit-deadline, .check-meta,
.ic-date, .pipe-date {
  font-family: 'Outfit', sans-serif !important;
  font-variant-numeric: tabular-nums;
  font-feature-settings: 'tnum';
}

/* テーブル金額セル */
td.num, .bc-vl, .slip-meta,
.it-step-num, .pg-btn, .pg-info {
  font-family: 'Outfit', sans-serif !important;
  font-variant-numeric: tabular-nums;
  font-feature-settings: 'tnum';
}

/* 金額入力フィールド（Outfit で統一） */
.amount-input {
  font-family: 'Outfit', sans-serif !important;
  font-variant-numeric: tabular-nums;
}

/* ══ MOBILE RESPONSIVE ══════════════════════════════════════════ */
.mob-ham{display:none;flex-direction:column;align-items:center;justify-content:center;width:36px;height:36px;background:transparent;border:none;cursor:pointer;border-radius:7px;transition:.13s;flex-shrink:0}
.mob-ham:hover{background:rgba(255,255,255,.08)}
.mob-ham span{display:block;width:18px;height:2px;background:rgba(255,255,255,.72);margin:3px 0;border-radius:1px;transition:.2s}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199}
@media(max-width:768px){
  .mob-ham{display:flex}
  .mob-overlay.show{display:block}
  
  .sb.open{left:0}
  .shell{overflow:hidden}
  .content{width:100vw;min-width:0}
  .topbar{padding:0 12px;gap:8px}
  .tb-crumb{display:none}
  .tb-actions{gap:6px}
  .page,.detail-wrap{padding:12px}
  .detail-wrap{flex-direction:column;overflow-y:auto}
  .detail-main{overflow-y:visible;min-height:0}
  .detail-side{width:100%!important;overflow-y:visible}
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;font-size:11px}
  .kpi-row,.qs-row{grid-template-columns:1fr 1fr!important}
  .g2,.form-grid{grid-template-columns:1fr!important}
  .pipeline{padding-bottom:8px}
  .step-label{font-size:9px}
  .tb-title{font-size:14px}
}


/* ── Google-style DS ── */
html, body { background:#FFFFFF !important; }
.sb-logo, .brand-logo { font-family:'Cormorant Garamond',serif !important; letter-spacing:5px; }
.kpi-value, .kpi-vl {
  font-family:'Outfit','Noto Sans JP',sans-serif !important;

.kpi-value, .kpi-vl, .kpi-val,
.stat-val, .qs-val, .count-val,
.td-amt, .bc-vl, .bc-total-vl,
.rr-amount, .amount-val, .srv,
.visit-reward, .lb-val,
.mf-kpi-vl, .mf-reward {
  font-family:'Outfit','Noto Sans JP',sans-serif !important;

}

@media print {

</style>
</head>
<body>
<div class="shell">
<nav class="sb">
  <div class="sb-head">
    <div class="sb-logo">CORE<br>BLDG</div>
    <div class="sb-ver">v2.0 — CORETO</div>
  </div>
  <div class="sb-user">
    <div class="sb-av" id="sb-av">—</div>
    <div style="overflow:hidden">
      <div class="sb-uname" id="sb-name">—</div>
      <div class="sb-ur" id="sb-role">—</div>
    </div>
  </div>
  <div class="sb-nav" id="sb-nav"></div>
</nav>

<div class="content">
  <div class="topbar">
    <button class="mob-ham" onclick="toggleSb()" aria-label="メニュー"><span></span><span></span><span></span></button>
      <div>
      <div class="tb-title" id="page-title">報酬・支払い</div>
      <div class="tb-crumb"><a href="coreto-hub-v2.html">COREBLDG</a> › <span>報酬・支払い</span></div>
    </div>
    <div class="tb-act">
      <button class="btn btn-g btn-sm" onclick="window.location.href='coreto-contract-report-v2.html'">🏆 成約報告</button>
      <select class="btn btn-g" id="role-sel" onchange="switchRole()" style="cursor:pointer">
        <option value="hq">HQ視点</option>
        <option value="ag">AG視点</option>
      </select>
      <button class="btn btn-g btn-sm" onclick="gotoSlip()">📄 明細書発行</button>
      <button class="btn btn-p" onclick="alert('全AG分PDF一括出力')">📤 一括出力</button>
    </div>
  </div>
  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('summary',this)">月次サマリー</div>
    <div class="tab" onclick="switchTab('sim',this)">報酬シミュレーター</div>
    <div class="tab" onclick="switchTab('slip',this)">支払明細書</div>
    <div class="tab" onclick="switchTab('history',this)">支払履歴</div>
    <div class="tab" onclick="switchTab('cp',this)">CPポイント</div>
    <div class="tab" onclick="switchTab('tax',this)">源泉徴収票</div>
  </div>
  <div class="page" id="pg"></div>
</div>
</div>

<script>
(function(){
  var _role = sessionStorage.getItem('coreto_role') || '';
  var _allowed = ["hq", "re_ag", "hr_ag", "hikari_ag", "pt", "intern"];
  if (_allowed.length && !_allowed.includes(_role)) {
    location.replace('coreto-hub-v2.html?unauthorized=1');
  }
})();


// Mobile sidebar toggle
function toggleSb(){
  document.querySelector('.sb').classList.toggle('open');
  document.querySelector('.mob-overlay').classList.toggle('show');
}

let role='hq', tab='summary';

function switchRole(){
  role=document.getElementById('role-sel').value;
  if(role==='ag'){
    document.getElementById('sb-av').textContent='AG';
    document.getElementById('sb-un').textContent=sessionStorage.getItem('coreto_name')||'—';
    document.getElementById('sb-ur').textContent=(sessionStorage.getItem('coreto_user_id')||'')+(sessionStorage.getItem('coreto_rank')?' / '+sessionStorage.getItem('coreto_rank'):'');
    document.getElementById('page-title').textContent='報酬明細';
  } else {
    document.getElementById('sb-av').textContent='HQ';
    document.getElementById('sb-un').textContent=sessionStorage.getItem('coreto_name')||'—';
    document.getElementById('sb-ur').textContent='HQ / exec';
    document.getElementById('page-title').textContent='報酬・支払い';
  }
  renderTab(tab);
}

function switchTab(t,el){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  if(el)el.classList.add('active');
  tab=t; renderTab(t);
  if (t === 'tax') setTimeout(updateTaxCert, 50);
}

function gotoSlip(){
  document.querySelectorAll('.tab')[2].click();
}

function renderTab(t){
  const pg=document.getElementById('pg');
  if(t==='summary') pg.innerHTML=role==='hq'?hqSummary():agSummary();
  if(t==='sim')     pg.innerHTML=simPage();
  if(t==='slip')    pg.innerHTML=slipPage();
  if(t==='history') pg.innerHTML=histPage();
  if(t==='cp')      pg.innerHTML=cpPage();
  if(t==='tax')     pg.innerHTML=taxPage();
  if(t==='sim')     calcSim();
}

// ── HQ SUMMARY ──
function hqSummary(){return`
  <div class="kpi-row">
    <div class="kpi gd"><div class="kpi-lb">AG報酬総額（今月）</div><div class="kpi-vl"><span data-kpi="total-reward">—</span></div><div class="kpi-sb">47名分・支払済み</div></div>
    <div class="kpi em"><div class="kpi-lb">PT紹介報酬（今月）</div><div class="kpi-vl">¥428,000</div><div class="kpi-sb">22件成約</div></div>
    <div class="kpi sk"><div class="kpi-lb">光通信ボーナス計</div><div class="kpi-vl">¥312,000</div><div class="kpi-sb">38件成約</div></div>
    <div class="kpi vt"><div class="kpi-lb">未払い残高</div><div class="kpi-vl" style="color:var(--ink)">¥0</div><div class="kpi-sb">全員支払済み</div></div>
  </div>
  <div class="bg2">
    <div class="bc">
      <div class="bc-title">💴 事業別内訳（今月）</div>
      <div class="bc-row"><div class="bc-lb">不動産仲介（賃貸）</div><div class="bc-vl">¥1,248,000</div></div>
      <div class="bc-row"><div class="bc-lb">不動産仲介（売買）</div><div class="bc-vl">¥586,000</div></div>

// ── 源泉徴収計算 ──────────────────────────────────────
// 課税対象額に対して10.21%（1,000,000超部分は20.42%）
function calcWithholding(taxable, isIndiv) {
  if (!isIndiv) return 0; // 法人は源泉なし
  if (taxable <= 0) return 0;
  if (taxable <= 1000000) {
    return Math.floor(taxable * 0.1021);
  } else {
    return Math.floor(1000000 * 0.1021) + Math.floor((taxable - 1000000) * 0.2042);
  }
}
// システム利用料（賃貸仲介のみ）
function calcSysUsage(fee, caseType) {
  if (!caseType.startsWith('rental')) return 0;
  return fee < 100000 ? 10000 : 20000;
}
function calcSim(){
  const fee=parseInt(document.getElementById('s-fee')?.value||0)||0;
  const rank=parseFloat(document.getElementById('s-rank')?.value||0.8);
  const hasPT=parseFloat(document.getElementById('s-pt')?.value||0)>0;
  const personType=document.getElementById('s-person')?.value||'ag_indiv';
  const caseType=document.getElementById('s-case')?.value||'rental_self';
  const isIndiv = personType !== 'pt_corp';
  const fmt=v=>'¥'+Math.round(v).toLocaleString();
  if(!document.getElementById('sr-fee'))return;

  let agRate, agReward, sysUsage, taxable, wtax, payout, rateNote, ptNote='';

  if (caseType === 'rental_pt') {
    // PT案件：AG 25%・PT 25%
    agRate    = 0.25;
    agReward  = Math.round(fee * agRate);
    sysUsage  = Math.round(calcSysUsage(fee, caseType) / 2); // AGはシステム利用料折半
    taxable   = agReward - sysUsage;
    wtax      = calcWithholding(taxable, true); // AG常に個人
    payout    = taxable - wtax;
    rateNote  = 'AG 25%（PT紹介）';
    const ptReward = Math.round(fee * 0.25);
    const ptSys    = Math.round(calcSysUsage(fee, caseType) / 2);
    const ptTaxable = ptReward - ptSys;
    const ptWtax   = calcWithholding(ptTaxable, isIndiv);
    ptNote = fmt(ptReward) + '（PT) 振込: ' + fmt(ptTaxable - ptWtax);
  } else {
    // 自己持込・売買・人材
    agRate   = rank;
    agReward = Math.round(fee * agRate);
    sysUsage = calcSysUsage(fee, caseType); // AG全額負担
    taxable  = agReward - sysUsage;
    wtax     = calcWithholding(taxable, true);
    payout   = taxable - wtax;
    rateNote = (rank*100) + '%';
  }

  document.getElementById('sr-fee').textContent    = fmt(fee);
  document.getElementById('sr-ag').textContent     = fmt(agReward);
  document.getElementById('sr-rate').textContent   = rateNote;
  document.getElementById('sr-sys').textContent    = sysUsage > 0 ? '−'+fmt(sysUsage) : '—';
  document.getElementById('sr-wtax').textContent   = wtax > 0 ? '−'+fmt(wtax) : '—';
  document.getElementById('sr-wtax-note').textContent = wtax > 0 ? (isIndiv?'10.21%':'法人→なし') : '';
  document.getElementById('sr-payout').textContent = fmt(payout);
  document.getElementById('sr-pt-sub').textContent = ptNote;
}

      <td style="font-size:10px">${(()=>{const v=parseInt(r[6].replace(/[^0-9]/g,''));return v>=1000000?'<span style=\"color:var(--sk)\">🏦 銀行</span>':'<span style=\"color:var(--em)\">🏦 GMO振込</span>'})()}</td>
      <td style="font-family:'Outfit',sans-serif;font-variant-numeric:tabular-nums;font-size:11px">${r[7]}</td>
      <td><span class="badge b-${r[8]}">${r[9]}</span></td>
    </tr>`).join('')}</tbody></table>
  </div>`;}

function cpPage() {
  var agId = sessionStorage.getItem('coreto_user_id') || '';
  var cpKey = 'CORETO_CP_POINTS_' + agId;
  var cp;
  try { cp = JSON.parse(localStorage.getItem(cpKey) || 'null'); } catch(e){}
  if (!cp) cp = { agId: agId, balance: 0, locked: 0, lifetimeEarned: 0, lifetimeRedeemed: 0, history: [] };

  // Expire check
  var now = new Date();
  var expiredAmount = 0;
  for (var i = 0; i < cp.history.length; i++) {
    var h = cp.history[i];
    if (h.type === 'earned' && h.expiresAt && new Date(h.expiresAt) < now) {
      h.type = 'expired';
      expiredAmount += h.amount;
    }
  }
  if (expiredAmount > 0) {
    cp.balance = Math.max(0, cp.balance - expiredAmount);
    localStorage.setItem(cpKey, JSON.stringify(cp));
  }

  // Calculate expiring soon (within 30 days)
  var soon = 0;
  var soonDate = new Date(); soonDate.setDate(soonDate.getDate() + 30);
  for (var j = 0; j < cp.history.length; j++) {
    if (cp.history[j].type === 'earned' && cp.history[j].expiresAt && new Date(cp.history[j].expiresAt) < soonDate) {
      soon += cp.history[j].amount;
    }
  }

  var soonWarn = soon > 0 ? '<div style="background:var(--am-bg);border:1px solid rgba(217,119,6,.15);border-radius:var(--r-sm);padding:10px 14px;font-size:11px;color:var(--am);margin-bottom:16px">\u26a0\ufe0f \u00a5' + soon.toLocaleString() + ' \u304c30\u65e5\u4ee5\u5185\u306b\u5931\u52b9\u3057\u307e\u3059</div>' : '';

  // Redeem methods
  var methods = [];
  try { methods = JSON.parse(localStorage.getItem('CORETO_CP_REDEEM_METHODS') || 'null'); } catch(e){}
  if (!methods) {
    methods = [
      { id: 'bank', label: '\u9280\u884c\u632f\u8fbc', enabled: true },
      { id: 'card', label: 'CORETO\u30ab\u30fc\u30c9', enabled: false },
      { id: 'service', label: '\u4ed6\u4e8b\u696d\u5145\u5f53', enabled: false }
    ];
    localStorage.setItem('CORETO_CP_REDEEM_METHODS', JSON.stringify(methods));
  }

  var methodsHtml = methods.map(function(m) {
    return '<label style="display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--bd);border-radius:var(--r-sm);font-size:12px;' + (m.enabled ? 'cursor:pointer' : 'opacity:.4;cursor:not-allowed') + '">' +
      '<input type="radio" name="cp-method" value="' + m.id + '"' + (m.id === 'bank' ? ' checked' : '') + (m.enabled ? '' : ' disabled') + ' style="accent-color:var(--navy)">' +
      m.label + (m.enabled ? '' : ' <span style="font-size:9px;color:var(--muted)">\uff08\u6e96\u5099\u4e2d\uff09</span>') +
    '</label>';
  }).join('');

  // History
  var histHtml = cp.history.slice(0, 20).map(function(h) {
    var typeLabel = h.type === 'earned' ? '<span style="color:var(--em)">+\u00a5' + h.amount.toLocaleString() + '</span>' :
                    h.type === 'redeemed' ? '<span style="color:var(--rd)">-\u00a5' + h.amount.toLocaleString() + '</span>' :
                    '<span style="color:var(--muted);text-decoration:line-through">\u00a5' + h.amount.toLocaleString() + ' \u5931\u52b9</span>';
    var sourceLabel = h.source === '3month_delay' ? '3\u30f6\u6708\u7e70\u5ef6' : h.source === '6month_delay' ? '6\u30f6\u6708\u7e70\u5ef6' : h.source || '\u2014';
    return '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bd);font-size:11px">' +
      '<div><div style="color:var(--ink)">' + sourceLabel + '</div><div style="color:var(--faint);font-size:10px">' + (h.earnedAt||'').slice(0,10) + '</div></div>' +
      '<div style="text-align:right">' + typeLabel + (h.expiresAt ? '<div style="font-size:9px;color:var(--faint)">\u671f\u9650: ' + h.expiresAt.slice(0,10) + '</div>' : '') + '</div>' +
    '</div>';
  }).join('');

  return '<div style="max-width:600px">' +
    // KPI
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px">' +
      '<div style="background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:16px;text-align:center"><div style="font-size:10px;color:var(--muted)">\u73fe\u5728\u6b8b\u9ad8</div><div style="font-size:24px;font-weight:300;color:var(--em);font-family:Outfit,sans-serif;font-variant-numeric:tabular-nums">\u00a5' + cp.balance.toLocaleString() + '</div></div>' +
      '<div style="background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:16px;text-align:center"><div style="font-size:10px;color:var(--muted)">\u7d2f\u8a08\u7372\u5f97</div><div style="font-size:24px;font-weight:300;color:var(--ink);font-family:Outfit,sans-serif;font-variant-numeric:tabular-nums">\u00a5' + cp.lifetimeEarned.toLocaleString() + '</div></div>' +
      '<div style="background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:16px;text-align:center"><div style="font-size:10px;color:var(--muted)">\u7d2f\u8a08\u51fa\u91d1</div><div style="font-size:24px;font-weight:300;color:var(--ink);font-family:Outfit,sans-serif;font-variant-numeric:tabular-nums">\u00a5' + cp.lifetimeRedeemed.toLocaleString() + '</div></div>' +
    '</div>' +
    soonWarn +
    // Redeem
    '<div style="background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:16px 20px;margin-bottom:16px">' +
      '<div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:12px">\u51fa\u91d1\u7533\u8acb</div>' +
      '<div style="display:flex;gap:8px;margin-bottom:12px">' + methodsHtml + '</div>' +
      '<button onclick="redeemCP()" style="padding:10px 20px;background:var(--navy);color:#fff;border:none;border-radius:var(--r-sm);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit"' + (cp.balance <= 0 ? ' disabled style="padding:10px 20px;background:var(--muted);color:#fff;border:none;border-radius:var(--r-sm);font-size:12px;opacity:.5;cursor:not-allowed;font-family:inherit"' : '') + '>\u51fa\u91d1\u7533\u8acb\u3059\u308b\uff08\u7fcc\u670825\u65e5\u306b\u632f\u8fbc\uff09</button>' +
    '</div>' +
    // History
    '<div style="background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:16px 20px">' +
      '<div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:12px">\u30dd\u30a4\u30f3\u30c8\u5c65\u6b74</div>' +
      (histHtml || '<div style="text-align:center;padding:20px;color:var(--muted);font-size:12px">\u307e\u3060\u30dd\u30a4\u30f3\u30c8\u5c65\u6b74\u304c\u3042\u308a\u307e\u305b\u3093</div>') +
    '</div>' +
  '</div>';
}

function redeemCP() {
  var agId = sessionStorage.getItem('coreto_user_id') || '';
  var cpKey = 'CORETO_CP_POINTS_' + agId;
  try {
    var cp = JSON.parse(localStorage.getItem(cpKey) || 'null');
    if (!cp || cp.balance <= 0) return;
    var amount = cp.balance;
    cp.history.unshift({
      id: 'CP-R-' + Date.now(),
      type: 'redeemed',
      amount: amount,
      source: 'redeem',
      caseId: '',
      earnedAt: new Date().toISOString(),
      expiresAt: null,
      redeemedAt: new Date().toISOString()
    });
    cp.locked += amount;
    cp.balance = 0;
    cp.lifetimeRedeemed += amount;
    localStorage.setItem(cpKey, JSON.stringify(cp));

    // Add to redeem requests
    var reqs = JSON.parse(localStorage.getItem('CORETO_CP_REDEEM_REQUESTS') || '[]');
    reqs.unshift({ id: 'CPR-' + Date.now(), agId: agId, amount: amount, method: 'bank', requestedAt: new Date().toISOString(), status: '\u51e6\u7406\u5f85\u3061' });
    localStorage.setItem('CORETO_CP_REDEEM_REQUESTS', JSON.stringify(reqs));
  } catch(e){}
  document.getElementById('pg').innerHTML = cpPage();
  showToast('\u51fa\u91d1\u7533\u8acb\u3092\u53d7\u3051\u4ed8\u3051\u307e\u3057\u305f\uff08\u7fcc\u670825\u65e5\u306b\u632f\u8fbc\uff09');
}

function showToast(msg) {
  var t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 24px;border-radius:var(--r-sm);font-size:12px;font-family:inherit;z-index:9999;opacity:1;transition:opacity .3s';
  document.body.appendChild(t);
  setTimeout(function(){ t.style.opacity = '0'; }, 2800);
  setTimeout(function(){ t.remove(); }, 3200);
}

      '<select id="tax-year" onchange="updateTaxCert()" style="padding:6px 12px;border:1px solid var(--bd);border-radius:var(--r-sm);font-size:12px;font-family:inherit">' +

function updateTaxCert() {
  var year = parseInt(document.getElementById('tax-year')?.value || new Date().getFullYear());
  var agId = sessionStorage.getItem('coreto_user_id') || '';
  var agName = sessionStorage.getItem('coreto_name') || '\u2014';
  var reports = [];
  try { reports = JSON.parse(localStorage.getItem('CORETO_REPORTS') || '[]'); } catch(e){}
  var myReports = reports.filter(function(r) {
    if (r.agId !== agId) return false;
    var d = r.date || r.closedAt || '';
    return d.startsWith(String(year));
  });

  var totalFee = 0, totalReward = 0;
  for (var i = 0; i < myReports.length; i++) {
    totalFee += (myReports[i].fee || 0) + (myReports[i].adFee || myReports[i].feeAD || 0);
    totalReward += myReports[i].reward || 0;
  }

  // Withholding tax calculation
  var taxAmount = 0;
  if (totalReward <= 1000000) {
    taxAmount = Math.floor(totalReward * 0.1021);
  } else {
    taxAmount = Math.floor((totalReward - 1000000) * 0.2042) + 102100;
  }

  var body = document.getElementById('tax-cert-body');
  if (!body) return;
  body.innerHTML =
    '<div id="tax-print-area" style="background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:32px;font-size:12px">' +
      '<div style="text-align:center;margin-bottom:24px">' +
        '<div style="font-size:16px;font-weight:700;color:var(--navy);letter-spacing:2px">\u5831\u916c\u3001\u6599\u91d1\u3001\u5951\u7d04\u91d1\u53ca\u3073\u8cde\u91d1\u306e\u652f\u6255\u8abf\u66f8</div>' +
        '<div style="font-size:11px;color:var(--muted);margin-top:4px">' + year + '\u5e74\u5206</div>' +
      '</div>' +

      '<table style="width:100%;border-collapse:collapse;margin-bottom:24px">' +
        '<tr style="border:1px solid var(--bd)"><td style="padding:10px 14px;background:var(--cream);font-weight:700;width:40%;border-right:1px solid var(--bd)">\u652f\u6255\u3092\u53d7\u3051\u308b\u8005</td><td style="padding:10px 14px">' + agName + '\uff08' + agId + '\uff09</td></tr>' +
        '<tr style="border:1px solid var(--bd)"><td style="padding:10px 14px;background:var(--cream);font-weight:700;border-right:1px solid var(--bd)">\u533a\u5206</td><td style="padding:10px 14px">\u5831\u916c</td></tr>' +
        '<tr style="border:1px solid var(--bd)"><td style="padding:10px 14px;background:var(--cream);font-weight:700;border-right:1px solid var(--bd)">\u7d30\u76ee</td><td style="padding:10px 14px">\u4e0d\u52d5\u7523\u4ef2\u4ecb\u5831\u916c\u30fb\u4eba\u6750\u7d39\u4ecb\u5831\u916c</td></tr>' +
        '<tr style="border:1px solid var(--bd)"><td style="padding:10px 14px;background:var(--cream);font-weight:700;border-right:1px solid var(--bd)">\u652f\u6255\u91d1\u984d</td><td style="padding:10px 14px;font-size:16px;font-weight:700;font-family:Outfit,sans-serif;font-variant-numeric:tabular-nums">\u00a5' + totalReward.toLocaleString() + '</td></tr>' +
        '<tr style="border:1px solid var(--bd)"><td style="padding:10px 14px;background:var(--cream);font-weight:700;border-right:1px solid var(--bd)">\u6e90\u6cc9\u5fb4\u53ce\u7a0e\u984d</td><td style="padding:10px 14px;font-size:16px;font-weight:700;color:var(--rd);font-family:Outfit,sans-serif;font-variant-numeric:tabular-nums">\u00a5' + taxAmount.toLocaleString() + '</td></tr>' +
        '<tr style="border:1px solid var(--bd)"><td style="padding:10px 14px;background:var(--cream);font-weight:700;border-right:1px solid var(--bd)">\u5dee\u5f15\u652f\u6255\u984d</td><td style="padding:10px 14px;font-size:16px;font-weight:700;color:var(--em);font-family:Outfit,sans-serif;font-variant-numeric:tabular-nums">\u00a5' + (totalReward - taxAmount).toLocaleString() + '</td></tr>' +
        '<tr style="border:1px solid var(--bd)"><td style="padding:10px 14px;background:var(--cream);font-weight:700;border-right:1px solid var(--bd)">\u6210\u7d04\u4ef6\u6570</td><td style="padding:10px 14px">' + myReports.length + '\u4ef6</td></tr>' +
      '</table>' +

      '<div style="border-top:2px solid var(--navy);padding-top:16px">' +
        '<div style="font-size:11px;font-weight:700;color:var(--navy);margin-bottom:8px">\u652f\u6255\u8005</div>' +
        '<div style="font-size:12px;color:var(--ink)">\u682a\u5f0f\u4f1a\u793eCORETO</div>' +
        '<div style="font-size:10px;color:var(--muted)">\u6771\u4eac\u90fd\u6e0b\u8c37\u533a / \u6cd5\u4eba\u756a\u53f7: XXXX-XXXX-XXXX</div>' +
      '</div>' +

      '<div style="margin-top:16px;font-size:10px;color:var(--faint);text-align:center">' +
        '\u203b\u3053\u306e\u66f8\u985e\u306f\u78ba\u5b9a\u7533\u544a\u306e\u53c2\u8003\u8cc7\u6599\u3068\u3057\u3066\u3054\u5229\u7528\u304f\u3060\u3055\u3044\u3002\u6b63\u5f0f\u306a\u6e90\u6cc9\u5fb4\u53ce\u7968\u306f\u5225\u9014\u90f5\u9001\u3055\u308c\u307e\u3059\u3002' +
      '</div>' +
    '</div>';
}

renderTab('summary');
</script>

<script>
window.addEventListener('DOMContentLoaded', function() {
  // #6修正: CORETO_REPORTSから自分の成約報告を取得してKPIを更新
  try {
    const myId = sessionStorage.getItem('coreto_user_id') || '';
    const role = sessionStorage.getItem('coreto_role') || '';
    const reports = JSON.parse(localStorage.getItem('CORETO_REPORTS') || '[]');
    const mine = myId ? reports.filter(r => !r.agId || r.agId === myId) : reports;
    if (mine.length) {
      const totalReward = mine.reduce((s,r)=>s+(r.reward||0), 0);
      const pendingReward = mine.filter(r=>r.status==='承認待ち').reduce((s,r)=>s+(r.reward||0), 0);
      // KPI要素を更新（存在する場合）
      var kpiTotal = document.querySelector('[data-kpi="total-reward"]');
      if (kpiTotal) kpiTotal.textContent = '¥' + totalReward.toLocaleString();
      var kpiPending = document.querySelector('[data-kpi="pending-reward"]');
      if (kpiPending) kpiPending.textContent = '¥' + pendingReward.toLocaleString();
    }
  } catch(e) {}
  
  // CORETO_REPORTSから動的に集計
  setTimeout(function() {
    try {
      var reports = JSON.parse(localStorage.getItem('CORETO_REPORTS') || '[]');
      var myId = sessionStorage.getItem('coreto_user_id') || '';
      var myRole = sessionStorage.getItem('coreto_role') || '';
      var isHQ = myRole === 'hq';

      if (isHQ) {
        // HQ: AG別集計
        var agMap = {};
        reports.forEach(function(r) {
          if (!r.agId) return;
          if (!agMap[r.agId]) agMap[r.agId] = { name: r.ag||r.agId, reward: 0, count: 0 };
          agMap[r.agId].reward += r.reward || 0;
          agMap[r.agId].count++;
        });
        var tbody = document.getElementById('payroll-ag-rows');
        if (tbody) {
          var rows = Object.entries(agMap);
          tbody.innerHTML = rows.length ? rows.map(function(kv) {
            return '<tr><td><div class="td-name">' + kv[1].name + '</div><div class="td-sub">' + kv[0] + '</div></td>' +
              '<td>—</td><td class="td-amt">¥' + kv[1].reward.toLocaleString() + '</td>' +
              '<td colspan="5"><span style="font-size:11px;color:var(--muted)">' + kv[1].count + '件</span></td></tr>';
          }).join('') : '<tr><td colspan="9" style="text-align:center;color:var(--muted);padding:24px">データがありません</td></tr>';
        }
      } else {
        // AG: 自分の明細
        var myReports = reports.filter(function(r) { return !r.agId || r.agId === myId; });
        var total = myReports.reduce(function(s,r){ return s + (r.reward||0); }, 0);
        var tbody2 = document.getElementById('payroll-cases-rows');
        if (tbody2) {
          tbody2.innerHTML = myReports.length ? myReports.map(function(r) {
            return '<tr><td style="font-family:monospace;font-size:11px;color:var(--muted)">' + (r.case||'—') + '</td>' +
              '<td class="td-name">' + (r.client||'—') + ' 様</td>' +
              '<td><span class="badge b-sk">' + (r.type||'—') + '</span></td>' +
              '<td class="td-amt">¥' + ((r.fee||0).toLocaleString()) + '</td>' +
              '<td>—</td>' +
              '<td class="td-amt em">¥' + ((r.reward||0).toLocaleString()) + '</td></tr>';
          }).join('') : '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:24px">データがありません</td></tr>';
        }
      }
    } catch(e) {}
  }, 300);

  CNAV.init('payment');

  const sRole = sessionStorage.getItem('coreto_role') || 'hq';

  if (sRole === 'hq') {
    // HQ: デフォルトのまま（HQ/AG切替セレクタ・一括出力ボタン表示）
    role = 'hq';
    renderTab('summary');
  } else {
    // AG / PT / インターン: AG視点で固定起動
    role = 'ag';
    // HQ視点切替セレクタを非表示
    const roleSel = document.getElementById('role-sel');
    if (roleSel) roleSel.style.display = 'none';
    // 一括出力ボタン（HQ専用）を非表示
    document.querySelectorAll('.tb-act .btn-p').forEach(b => {
      if (b.textContent.includes('一括出力')) b.style.display = 'none';
    });
    // サイドバーをAG情報に更新
    const name = sessionStorage.getItem('coreto_name') || '—';
    const id   = (sessionStorage.getItem('coreto_user_id') || '—') + ' / ' + (sessionStorage.getItem('coreto_rank') || '—');
    const av   = sRole === 'pt' ? 'PT' : 'AG';
    const el = document.getElementById('sb-av'); if(el) el.textContent = av;
    const un = document.getElementById('sb-un'); if(un) un.textContent = name;
    const ur = document.getElementById('sb-ur'); if(ur) ur.textContent = id;
    const pt = document.getElementById('page-title'); if(pt) pt.textContent = '報酬明細';
    renderTab('summary');
  }
});
</script>
