<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>経営ダッシュボード — COREBLDG</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="coreto-design-system.css">
<style>
:root{--navy:#0D1A2D;--navy-l:#1E3252;--gold:#C8A951;--gold-dim:rgba(200,169,81,.15);--cream:#FFFFFF;--cream2:#F8F9FA;--white:#FFFFFF;--ink:#202124;--muted:#5F6368;--faint:#80868B;--em:#059669;--em-bg:#ECFDF5;--am:#D97706;--am-bg:#FFFBEB;--rd:#DC2626;--rd-bg:#FEF2F2;--sk:#0284C7;--sk-bg:#F0F9FF;--vt:#7C3AED;--vt-bg:#F5F3FF;--bd:#E8EAED;--bd2:#DADCE0;--sw:240px;--r:10px;--r-sm:7px;--sh:0 1px 2px rgba(60,64,67,.1),0 1px 3px rgba(60,64,67,.06)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:#FFFFFF}
.shell{display:flex;height:100vh}
.sb{width:var(--sw);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;position:relative}
.sb::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,rgba(200,169,81,.25) 0%,rgba(200,169,81,.06) 50%,transparent 100%)}
.sb-head{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-logo{font-family: 'Cormorant Garamond', serif;font-size:20px;font-weight:600;letter-spacing:5px;color:var(--gold)}
.sb-ver{font-size:9px;letter-spacing:2px;color:rgba(200,169,81,.3);font-family:'DM Mono',monospace;margin-top:2px}
.sb-user{margin:14px 14px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:9px 11px;display:flex;align-items:center;gap:9px}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--gold-dim);border:1px solid rgba(200,169,81,.25);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gold);flex-shrink:0}
.sb-un{font-size:11px;font-weight:600;color:rgba(255,255,255,.8)}
.sb-ur{font-size:9px;color:rgba(255,255,255,.3);font-family:'DM Mono',monospace}
.sb-nav{flex:1;overflow-y:auto;padding:6px 10px}
.ni{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;cursor:pointer;transition:.13s;margin-bottom:1px}
.ni:hover{background:rgba(255,255,255,.06)}.ni.active{background:rgba(200,169,81,.1)}
.ni-ic{width:22px;text-align:center;font-size:14px}
.ni-lb{font-size:11px;font-weight:500;color:rgba(255,255,255,.55)}.ni.active .ni-lb{color:var(--gold)}
.sf{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.3);transition:.13s}
.sf:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.6)}
.sb-foot{padding:10px 14px 18px;border-top:1px solid rgba(255,255,255,.05)}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;box-shadow:var(--sh)}
.tb-title{font-size:16px;font-weight:600;color:var(--ink);letter-spacing:.5px}
.tb-crumb{font-size:11px;color:var(--faint)}
.tb-crumb a{color:var(--muted);text-decoration:none}
.tb-act{margin-left:auto;display:flex;gap:9px;align-items:center}
.btn{padding:7px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;transition:.15s;font-family:'Outfit',sans-serif;border:none}
.btn-p{background:var(--navy);color:var(--gold)}.btn-p:hover{background:var(--navy-l)}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--bd)}.btn-g:hover{background:var(--cream);color:var(--ink)}
.btn-sm{padding:5px 12px;font-size:11px}
.page{flex:1;overflow-y:auto;padding:24px}
.page::-webkit-scrollbar{width:5px}.page::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;font-family:'Outfit',sans-serif}
.b-em{background:var(--em-bg);color:var(--em)}.b-am{background:var(--am-bg);color:var(--am)}.b-rd{background:var(--rd-bg);color:var(--rd)}.b-sk{background:var(--sk-bg);color:var(--sk)}.b-nt{background:var(--cream2);color:var(--muted)}.b-vt{background:var(--vt-bg);color:var(--vt)}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi-row-6{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.gd::before{background:var(--gold)}.kpi.em::before{background:var(--em)}.kpi.sk::before{background:var(--sk)}.kpi.am::before{background:var(--am)}
.kpi-lb{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.kpi-vl{font-size:22px;font-weight:700;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums lining-nums;margin-top:4px;font-weight:600}
.kpi-delta.up{color:var(--em)}.kpi-delta.dn{color:var(--rd)}
.kpi-sub{font-size:10px;color:var(--faint);margin-top:3px}
.chart-wrap{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:18px}
.chart-head{padding:14px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--cream)}
.chart-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink)}
.chart-body{padding:20px}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:140px}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;gap:4px}
.bar{width:100%;border-radius:4px 4px 0 0;cursor:pointer}
.bar:hover{opacity:.8}
.bar-label{font-size:9px;color:var(--faint);font-family:'DM Mono',monospace}
.bar-val{font-size:9px;font-weight:700;color:var(--muted)}
.stacked-bar{height:32px;display:flex;border-radius:6px;overflow:hidden}
.stacked-seg{cursor:pointer}
.stacked-seg:hover{opacity:.8}
.legend-row{display:flex;gap:14px;flex-wrap:wrap;margin-top:8px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:18px}
.card-head{padding:14px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--cream)}
.card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink)}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--faint);padding:9px 14px;border-bottom:2px solid var(--bd);text-align:left;background:var(--cream)}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--bd);color:var(--ink);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(200,169,81,.03)}
.rank-dist{display:flex;gap:8px}
.rank-bar-item{flex:1;text-align:center}
.rank-bar-bg{height:60px;background:var(--cream2);border-radius:4px;position:relative;overflow:hidden}
.rank-bar-fill{position:absolute;bottom:0;left:0;right:0;border-radius:4px 4px 0 0}
.rank-name{font-size:10px;font-weight:700;margin-top:5px;color:var(--muted)}
.rank-cnt{font-size:13px;font-weight:700;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
.period-sel{display:flex;gap:4px}
.period-btn{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--white);color:var(--muted);transition:.13s}
.period-btn.active{background:var(--navy);color:var(--gold);border-color:var(--navy)}
.mob-ham{display:none;flex-direction:column;align-items:center;justify-content:center;width:36px;height:36px;background:transparent;border:none;cursor:pointer;border-radius:7px;flex-shrink:0}
.mob-ham span{display:block;width:18px;height:2px;background:rgba(255,255,255,.72);margin:3px 0;border-radius:1px}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199}
@media(max-width:900px){.kpi-row{grid-template-columns:1fr 1fr}.kpi-row-6{grid-template-columns:repeat(3,1fr)}}
@media(max-width:768px){
  .mob-ham{display:flex}.mob-overlay.show{display:block}
  .sb{position:fixed;left:calc(-1 * var(--sw));top:0;height:100vh;z-index:200;transition:left .25s ease}.sb.open{left:0}
  .shell{overflow:hidden}.content{width:100vw;min-width:0}
  .topbar{padding:0 12px;gap:8px}.tb-crumb{display:none}.page{padding:12px}
}  .kpi-row{grid-template-columns:1fr 1fr}.kpi-row-6{grid-template-columns:repeat(2,1fr)}
  .two-col{grid-template-columns:1fr}.tb-act{flex-wrap:wrap;gap:4px}
  table{display:block;overflow-x:auto}

  .tb-title,
.brand-logo,
.sb-logo,
.login-title,
.mod-title,
.page-title        {  font-weight:600; letter-spacing:.3px; }

/* Section headings inside content */
.section-title     {  font-size:12px;
                     font-weight:700; text-transform:uppercase; letter-spacing:1px;
                     color:var(--label); }

/* KPI numbers — large display (24px+): Outfit tabular */
.kpi-value, .kpi-vl, .stat-val { 
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-weight:300;
  font-variant-numeric:tabular-nums lining-nums;
  letter-spacing:-.5px;   /* tight for large numbers */
  color:var(--ink);        /* always maximum contrast */
}

/* Inline amounts in tables/lists */
.amt { font-family:'Outfit','Noto Sans JP',sans-serif;
       font-weight:600; font-variant-numeric:tabular-nums;
       color:var(--ink); }

/* Positive delta only */
.delta-up { color:var(--em); font-weight:600; font-size:.9em; }
.delta-dn { color:var(--rd); font-weight:600; font-size:.9em; }

/* IDs and codes */
.mono, [class*="-id"], [class*="-code"] { font-family:'DM Mono',monospace; font-size:.92em; }

/* Badge system — 4 states only */
.badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:20px;
         font-size:10px; font-weight:600; letter-spacing:.3px;
         font-family:'Outfit',sans-serif; white-space:nowrap; }
.b-em, .badge.emerald, .badge.em { background:var(--em-bg); color:var(--em); }
.b-am, .badge.amber,   .badge.am { background:var(--am-bg); color:var(--am); }
.b-rd, .badge.red,     .badge.rd { background:var(--rd-bg); color:var(--rd); }
.b-nt, .badge.muted,   .badge.nt { background:var(--cream2); color:var(--label); }
/* Legacy aliases → neutral */
.b-sk, .badge.sky    { background:#F0F9FF; color:#0369A1; }
.b-vt, .badge.violet { background:var(--cream2); color:var(--label); }
.b-gd, .badge.gold   { background:var(--gold-dim); color:#92740A; }




/* Brand — Cormorant only here */
.sb-logo, .brand-logo {
  font-family:'Cormorant Garamond',serif !important;
  letter-spacing:5px;
}
/* Everything else: Outfit */
body, input, select, textarea, button {
  font-family:'Outfit','Noto Sans JP',sans-serif;
}

/* ── Page structure ── */
.tb-title {
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-size:18px; font-weight:600; color:var(--ink);
  letter-spacing:-.2px;
}
.login-title {
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-size:24px; font-weight:600; color:var(--ink);
  letter-spacing:-.3px;
}
.section-title {
  
  font-size:11px; font-weight:700;
  text-transform:uppercase; letter-spacing:1.2px;
  color:var(--label);
}

/* ── Numbers & Amounts — always --ink, always Outfit ── */
.kpi-value, .kpi-vl {
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-weight:300 !important;
  font-variant-numeric:tabular-nums lining-nums !important;
  color:var(--ink);
  letter-spacing:-.5px;
}
.stat-val {
  font-family:'Outfit','Noto Sans JP',sans-serif !important;
  font-weight:300 !important;
  font-variant-numeric:tabular-nums !important;
  color:var(--ink) !important;
}
.kpi-label, .stat-label, .kpi-sub {
  color:var(--label) !important;
  font-weight:500;
}

/* ── Delta (the ONE exception: direction of change) ── */
.delta-up { color:var(--em) !important; }
.delta-dn { color:var(--rd) !important; }

/* ── IDs / codes ── */
.id-mono, .ag-id, .case-id {
  font-family:'DM Mono',monospace;
  font-size:.88em; color:var(--label);
}

/* ── Badge system: 4 states only ── */
.badge {
  display:inline-flex; align-items:center;
  padding:2px 8px; border-radius:20px;
  font-size:10px; font-weight:600; letter-spacing:.3px;
  font-family:'Outfit',sans-serif; white-space:nowrap;
  font-variant-numeric:tabular-nums;
}
.badge.emerald, .badge.em { background:#ECFDF5; color:#059669; }
.badge.amber,   .badge.am { background:#FFFBEB; color:#D97706; }
.badge.red,     .badge.rd { background:#FEF2F2; color:#DC2626; }
.badge.muted,   .badge.nt,
.badge.sky,     .badge.violet,
.badge.gold               { background:var(--cream2); color:var(--label); }


/* ═══════════════════════════════════════════════════════════════
   COREBLDG — Google-style Typography System
   ─────────────────────────────────────────────────────────────
   大きな数値は weight:300 でサイズで存在感を出す
   Bold はラベル・ボタン・UIに使い、数値には使わない
   背景は白。装飾は最小限。余白で呼吸する。
   ═══════════════════════════════════════════════════════════════ */

/* Page background */
html, body { background:#FFFFFF !important; }

/* ── Brand (Cormorant only here) ── */
.sb-logo, .brand-logo {
  font-family: 'Cormorant Garamond', serif !important;
  letter-spacing: 5px;
}

/* ── Base ── */
body, input, select, textarea, button {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif;
}

/* ── KPI / メトリクス数値
   Google Analytics の大型数値と同じアプローチ:
   weight 300、大きなサイズ、tight letter-spacing ── */
.kpi-value, .kpi-vl {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif !important;
  font-weight: 300 !important;
  font-variant-numeric: tabular-nums lining-nums !important;
  letter-spacing: -1px !important;
  color: var(--ink) !important;
  line-height: 1 !important;
}
/* KPIカードのサイズを少し大きく（軽いweightを補う） */
.kpi-value { font-size: 32px !important;font-variant-numeric:tabular-nums}
.kpi-vl   { font-size: 28px !important; }

/* ── 中型数値（stat-val, テーブル内金額） ── */
.stat-val {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif !important;
  font-weight: 400 !important;
  font-variant-numeric: tabular-nums !important;
  color: var(--ink) !important;
}

/* ── ラベル系 ── */
.kpi-label, .kpi-sub, .stat-label {
  font-size: 11px !important;
  font-weight: 500 !important;
  letter-spacing: .5px !important;
  color: var(--label) !important;
  text-transform: none;
}

/* ── Page title ── */
.tb-title {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif;
  font-size: 16px; font-weight: 400; color: var(--ink);
  letter-spacing: 0;
}

/* ── Section title — Google style: small, spaced, gray ── */
.section-title {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif;
  font-size: 11px; font-weight: 500;
  letter-spacing: .8px;
  color: var(--label);
  text-transform: uppercase;
}

/* ── Card: white bg, very light border, minimal shadow ── */
.card {
  background: #FFFFFF;
  border: 1px solid var(--bd);
  border-radius: 8px;
  box-shadow: var(--sh);
}

/* ── KPI Card ── */
.kpi-card {
  background: #FFFFFF !important;
  border: 1px solid var(--bd) !important;
  border-radius: 8px !important;
  box-shadow: none !important;
  padding: 20px 24px !important;
}
.kpi-card.gold   { border-top: 3px solid var(--gold) !important; }
.kpi-card.emerald{ border-top: 3px solid var(--em)   !important; }
.kpi-card.amber  { border-top: 3px solid var(--am)   !important; }
.kpi-card.red    { border-top: 3px solid var(--rd)   !important; }
.kpi-card.sky    { border-top: 3px solid #1A73E8     !important; }

/* ── 入金監視・大型パネル ── */
.kpi { border-radius: 8px; border: 1px solid var(--bd); }

/* ── Badge — flat style ── */
.badge {
  border-radius: 4px !important;
  font-size: 11px !important;
  font-weight: 500 !important;
  padding: 2px 7px !important;
  letter-spacing: 0 !important;
}

/* ── Buttons ── */
.btn-primary {
  background: var(--navy) !important;
  border-radius: 6px !important;
  font-weight: 500 !important;
  letter-spacing: .2px !important;
}
.btn-ghost {
  border-radius: 6px !important;
  font-weight: 500 !important;
}

/* ── Delta (増減のみ色付き) ── */
.delta-up, .kpi-delta.up { color: var(--em) !important; font-weight: 500; font-size: .82em; }
.delta-dn, .kpi-delta.dn { color: var(--rd) !important; font-weight: 500; font-size: .82em; }

/* ── IDs ── */
[class*="-id"], [class*="-code"], .pipe-ag, .task-meta [class*="ag-"],
.id-mono { font-family: 'DM Mono', monospace; font-size: .88em; color: var(--label); }

/* ── Form inputs — Google style ── */
.form-input, .form-select {
  border: 1px solid var(--bd) !important;
  border-radius: 4px !important;
  background: #FFFFFF !important;
  font-family: 'Outfit', 'Noto Sans JP', sans-serif !important;
  font-size: 14px !important;
  color: var(--ink) !important;
  padding: 8px 12px !important;
}
.form-input:focus, .form-select:focus {
  border-color: #1A73E8 !important;
  outline: none !important;
}

/* ── Section separator ── */

.section-title::before { display: none; }
/* ── Google-style 数値原則 (DS v2.3) ── */
.kpi-value, .kpi-vl, .kpi-val,
.stat-val, .qs-val, .count-val,
.td-amt, .bc-vl, .bc-total-vl,
.rr-amount, .amount-val, .srv,
.visit-reward, .lb-val,
.mf-kpi-vl, .mf-reward {
  font-family:'Outfit','Noto Sans JP',sans-serif !important;
  font-weight:300 !important;
  font-variant-numeric:tabular-nums !important;
}
.kpi-value { font-size:32px !important; }
.kpi-vl    { font-size:28px !important; }
</style>
</head>
<body>
<div class="shell">
<nav class="sb" id="sb">
  <div class="sb-head"><div class="sb-logo">CORE<br>BLDG</div><div class="sb-ver">v2.0 — CORETO</div></div>
  <div class="sb-user"><div class="sb-av">HQ</div><div><div class="sb-un">木下 裕太</div><div class="sb-ur">HQ-0001 / Admin</div></div></div>
  <div class="sb-nav" id="sb-nav"></div>
  <div class="sb-foot"><div class="sf" onclick="location.href='coreto-hub-v2.html'">&#x2B05; ダッシュボードへ</div></div>
</nav>
<div class="content">
  <div class="topbar">
    <button class="mob-ham" onclick="toggleSb()"><span></span><span></span><span></span></button>
    <div><div class="tb-title">経営ダッシュボード</div><div class="tb-crumb"><a href="coreto-hub-v2.html">COREBLDG</a> &#x203A; 経営ダッシュボード</div></div>
    <div class="tb-act">
      <div class="period-sel">
        <div class="period-btn active" onclick="setPeriod('month',this)">月次</div>
        <div class="period-btn" onclick="setPeriod('quarter',this)">四半期</div>
        <div class="period-btn" onclick="setPeriod('year',this)">年次</div>
      </div>
      <button class="btn btn-g btn-sm">📥 エクスポート</button>
      <button id="ai-report-btn" onclick="aiGenerateMonthlyReport()"
        style="background:var(--gold);color:var(--navy);border:none;border-radius:7px;
               padding:7px 14px;font-size:11px;font-weight:700;cursor:pointer">

// ══ AI月次レポート生成 (Claude Sonnet) ════════════════════
async function aiGenerateMonthlyReport() {
  const btn = document.getElementById('ai-report-btn');
  btn.innerHTML = '<span style="animation:spin .8s linear infinite;display:inline-block">✨</span> 生成中...';
  btn.disabled = true;

  // KPIデータ収集（ページの数値から）
  const kpiData = {
    month: '2026年2月',
    total_commission: 2140000,
    agent_count: 47,
    new_contracts: 23,
    instant_pay_total: 3200000,
    rank_distribution: { platinum: 10, gold: 12, silver: 18, bronze: 7 },
    utility_contracts: 38,
    hr_contracts: 5,
    pending_kyc: 3,
    top_agent: '中村陽子(Platinum) ¥666,000'
  };

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `あなたは不動産・人材紹介・光通信の複合仲介会社COREBLDGのCFO補佐AIです。
以下の月次KPIデータをもとに、経営者向けの月次レポートを生成してください。
数値の背景にある課題・機会・推奨アクション（3つ）を含めてください。
JSONのみで回答。前置き不要。

KPI: ${JSON.stringify(kpiData)}

形式:
{"summary":"総括（2文）","highlights":["ポジティブ①","ポジティブ②","ポジティブ③"],"concerns":["懸念点①","懸念点②"],"actions":[{"title":"推奨アクション①","detail":"詳細"},{"title":"②","detail":"詳細"},{"title":"③","detail":"詳細"}],"forecast":"来月の見通し（1文）"}`
        }]
      })
    });
    const data = await resp.json();
    const text = data.content?.find(b => b.type === 'text')?.text || '{}';
    const res = JSON.parse(text.replace(/```json|```/g, '').trim());
    showAIReportModal(res, kpiData.month);
  } catch(e) {
    showToast('AI月次レポートの生成に失敗しました: ' + e.message, 'em');
  } finally {
    btn.innerHTML = '✨ AI月次レポート生成';
    btn.disabled = false;
  }
}

function showAIReportModal(res, month) {
  const existing = document.getElementById('ai-report-modal');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'ai-report-modal';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';

  const highlightHtml = (res.highlights||[]).map(h =>
    `<div style="font-size:11px;color:var(--em);padding:4px 0;border-bottom:1px solid var(--bd)">✅ ${h}</div>`).join('');
  const concernHtml = (res.concerns||[]).map(h =>
    `<div style="font-size:11px;color:var(--am);padding:4px 0;border-bottom:1px solid var(--bd)">⚠️ ${h}</div>`).join('');
  const actionHtml = (res.actions||[]).map((a,i) =>
    `<div style="background:var(--cream2);border-radius:8px;padding:10px 12px;margin-bottom:8px">
      <div style="font-size:11px;font-weight:700;color:var(--ink);margin-bottom:3px">${i+1}. ${a.title}</div>
      <div style="font-size:10px;color:var(--muted)">${a.detail}</div>
    </div>`).join('');

  overlay.innerHTML = `
    <div style="background:#fff;border-radius:12px;max-width:640px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)">
      <div style="background:var(--navy);color:#fff;padding:20px 24px;border-radius:12px 12px 0 0;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:9px;color:var(--gold);letter-spacing:2px;font-weight:700;margin-bottom:3px">✨ AI GENERATED — COREBLDG</div>
          <div style="font-size:16px;font-weight:300">${month} 月次経営レポート</div>
        </div>
        <button onclick="document.getElementById('ai-report-modal').remove()"
          style="background:rgba(255,255,255,.1);border:none;color:#fff;border-radius:6px;padding:6px 12px;cursor:pointer">✕ 閉じる</button>
      </div>
      <div style="padding:20px 24px">
        <div style="background:var(--cream2);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:var(--ink);line-height:1.8">${res.summary||''}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
          <div>
            <div style="font-size:10px;font-weight:700;color:var(--muted);margin-bottom:8px">📈 ポジティブ</div>
            ${highlightHtml}
          </div>
          <div>
            <div style="font-size:10px;font-weight:700;color:var(--muted);margin-bottom:8px">⚠️ 懸念事項</div>
            ${concernHtml}
          </div>
        </div>
        <div style="margin-bottom:16px">
          <div style="font-size:10px;font-weight:700;color:var(--muted);margin-bottom:8px">🎯 推奨アクション</div>
          ${actionHtml}
        </div>
        <div style="background:rgba(200,169,81,.08);border:1px solid rgba(200,169,81,.2);border-radius:8px;padding:10px 14px;font-size:11px;color:var(--ink)">
          🔮 来月の見通し：${res.forecast||''}
        </div>
      </div>
    </div>`;

  document.body.appendChild(overlay);
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
}

</script>
<script>
(function(){
  var _role = sessionStorage.getItem('coreto_role') || '';
  var _allowed = ["hq"];
  if (_allowed.length && !_allowed.includes(_role)) {
    location.replace('coreto-hub-v2.html?unauthorized=1');

})();

function toggleSb(){document.querySelector('.sb').classList.toggle('open');document.querySelector('.mob-overlay').classList.toggle('show');}
var period='month';
function setPeriod(p,el){period=p;document.querySelectorAll('.period-btn').forEach(function(x){x.classList.remove('active');});el.classList.add('active');render();}
var BASE={grossRevenue:18640000,agPayout:13990000,netRevenue:4650000,contracts:42,activeAg:31,newClients:18,revDelta:'+12.3%',payDelta:'+11.8%',netDelta:'+14.1%',cntDelta:'+7件',
  monthly:[{m:'10月',r:14.2,n:3.4},{m:'11月',r:15.8,n:3.9},{m:'12月',r:17.1,n:4.2},{m:'1月',r:14.9,n:3.6},{m:'2月',r:16.6,n:4.0},{m:'3月',r:18.6,n:4.6}],
  bizSplit:[{l:'賃貸',v:52,c:'#059669'},{l:'売買',v:18,c:'#0284C7'},{l:'人材',v:16,c:'#7C3AED'},{l:'光通信',v:14,c:'#D97706'}],
  topAg:[{id:'AG-0033',name:'田中 太郎',rank:'Plat',cnt:6,rev:4100000,rate:'22.0%'},{id:'AG-0042',name:'山田 誠',rank:'Gold',cnt:8,rev:3200000,rate:'17.2%'},{id:'AG-0088',name:'鈴木 花子',rank:'Gold',cnt:7,rev:2840000,rate:'15.2%'},{id:'AG-0055',name:'井上 健',rank:'Silver',cnt:5,rev:1750000,rate:'9.4%'},{id:'AG-0071',name:'佐藤 美咲',rank:'Gold',cnt:4,rev:1610000,rate:'8.6%'}],
  rankDist:[{name:'Platinum',cnt:3,pct:10,color:'#C8A951'},{name:'Gold',cnt:12,pct:39,color:'#059669'},{name:'Silver',cnt:9,pct:29,color:'#0284C7'},{name:'Bronze',cnt:7,pct:22,color:'#6B7280'}]
};
var DATA={month:BASE,quarter:Object.assign({},BASE,{grossRevenue:51200000,agPayout:38400000,netRevenue:12800000,contracts:118,revDelta:'+18.5%',netDelta:'+20.2%',cntDelta:'+23件'}),year:Object.assign({},BASE,{grossRevenue:198000000,agPayout:148500000,netRevenue:49500000,contracts:437,revDelta:'+31.2%',netDelta:'+28.9%',cntDelta:'+82件'})};
function fmt(n){return '\xA5'+(n/10000).toFixed(0)+'\u4E07';}
function fmtFull(n){return '\xA5'+n.toLocaleString();}
function kpi(cls,lb,vl,delta,dir,sub){return '<div class="kpi '+cls+'"><div class="kpi-lb">'+lb+'</div><div class="kpi-vl">'+vl+'</div><div class="kpi-delta '+dir+'">'+delta+'</div><div class="kpi-sub">'+sub+'</div></div>';}
function kpiSm(lb,vl,sub){return '<div class="kpi gd" style="padding:12px 14px"><div class="kpi-lb">'+lb+'</div><div class="kpi-vl" style="font-size:18px">'+vl+'</div><div class="kpi-sub">'+sub+'</div></div>';}
function render(){
  var d=DATA[period]||DATA.month;
  var maxR=Math.max.apply(null,d.monthly.map(function(m){return m.r;}));
  var bars=d.monthly.map(function(m){
    var hR=Math.round((m.r/maxR)*110),hN=Math.round((m.n/maxR)*110);
    return '<div class="bar-col"><div class="bar-val">'+fmt(m.r*10000)+'</div>'+
      '<div style="display:flex;align-items:flex-end;gap:2px;height:110px">'+
      '<div class="bar" style="height:'+hR+'px;background:var(--navy-l);flex:1"></div>'+
      '<div class="bar" style="height:'+hN+'px;background:var(--gold);flex:1"></div></div>'+
      '<div class="bar-label">'+m.m+'</div></div>';
  }).join('');
  var bizSegs=d.bizSplit.map(function(b){return '<div class="stacked-seg" style="flex:'+b.v+';background:'+b.c+'" title="'+b.l+' '+b.v+'%"></div>';}).join('');
  var legend=d.bizSplit.map(function(b){return '<div class="legend-item"><div class="legend-dot" style="background:'+b.c+'"></div>'+b.l+' '+b.v+'%</div>';}).join('');
  var rankBars=d.rankDist.map(function(r){return '<div class="rank-bar-item"><div class="rank-bar-bg"><div class="rank-bar-fill" style="height:'+r.pct+'%;background:'+r.color+'"></div></div><div class="rank-name">'+r.name+'</div><div class="rank-cnt">'+r.cnt+'\u540D</div></div>';}).join('');
  var rl=function(r){return r==='Plat'?'b-am':r==='Gold'?'b-em':r==='Silver'?'b-sk':'b-nt';};
  var topRows=d.topAg.map(function(a){return '<tr><td style="font-family:\'DM Mono\',monospace;font-size:11px;color:var(--faint)">'+a.id+'</td><td style="font-weight:600">'+a.name+'</td><td><span class="badge '+rl(a.rank)+'">'+a.rank+'</span></td><td style="text-align:center">'+a.cnt+'\u4EF6</td><td style="text-align:right;font-weight:700;font-variant-numeric:tabular-nums">'+fmtFull(a.rev)+'</td><td style="text-align:right;color:var(--muted)">'+a.rate+'</td></tr>';}).join('');
  var lbl={month:'2026\u5E743\u6708',quarter:'2026\u5E74Q1',year:'2025\u5E74\u5EA6'}[period];
  document.getElementById('pg').innerHTML=
    '<div style="font-size:11px;color:var(--faint);margin-bottom:14px;font-family:\'DM Mono\',monospace">'+lbl+' — CORETO \u5168\u4E8B\u696D\u5408\u8A08</div>'+
    '<div class="kpi-row">'+kpi('gd','\u7DCF\u58F2\u4E0A\uFF08\u4ED8\u4EBA\u6599\u8A08\uFF09',fmt(d.grossRevenue),d.revDelta,'up','AG\u652F\u6255\u3044\u524D')+kpi('am','AG\u652F\u6255\u3044\u5408\u8A08',fmt(d.agPayout),d.payDelta,'up','')+kpi('em','\u4F1A\u793E\u7D14\u5229\u76CA',fmt(d.netRevenue),d.netDelta,'up','\u58F2\u4E0A\u306E'+(d.netRevenue/d.grossRevenue*100).toFixed(0)+'%')+kpi('sk','\u7DCF\u6210\u7D04\u4EF6\u6570',d.contracts+'\u4EF6',d.cntDelta,'up','')+'</div>'+
    '<div class="kpi-row-6">'+kpiSm('\u7A3C\u50CD AG\u6570',d.activeAg+'\u540D','/ \u5168 31 \u540D')+kpiSm('\u65B0\u898F\u30AF\u30E9\u30A4\u30A2\u30F3\u30C8',d.newClients+'\u540D','\u4ECA\u6708')+kpiSm('\u5373\u6642\u6255\u3044\u7533\u8ACB','4\u4EF6','\u627F\u8A8D\u5F85\u30611\u4EF6')+kpiSm('\u66F8\u985E\u5BE9\u67FB\u5F85\u3061','7\u4EF6','HQ\u78BA\u8A8D\u8981')+kpiSm('\u5E73\u5747\u6210\u7D04\u5358\u4FA1',fmt(Math.round(d.grossRevenue/d.contracts)),'/ 1\u4EF6')+kpiSm('AG\u5E73\u5747\u5831\u916C',fmt(Math.round(d.agPayout/d.activeAg)),'/ 1\u540D')+'</div>'+
    '<div class="two-col">'+
    '<div class="chart-wrap" style="margin-bottom:0"><div class="chart-head"><div class="chart-title">\u6708\u6B21\u58F2\u4E0A\u63A8\u79FB</div><div class="legend-row" style="margin:0"><div class="legend-item"><div class="legend-dot" style="background:var(--navy-l)"></div>\u7DCF\u58F2\u4E0A</div><div class="legend-item"><div class="legend-dot" style="background:var(--gold)"></div>\u7D14\u5229\u76CA</div></div></div><div class="chart-body"><div class="bar-chart">'+bars+'</div></div></div>'+
    '<div class="chart-wrap" style="margin-bottom:0"><div class="chart-head"><div class="chart-title">\u4E8B\u696D\u5225\u58F2\u4E0A\u69CB\u6210</div></div><div class="chart-body"><div class="stacked-bar">'+bizSegs+'</div><div class="legend-row">'+legend+'</div><div style="margin-top:18px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:10px">\u30E9\u30F3\u30AF\u5206\u5E03</div><div class="rank-dist">'+rankBars+'</div></div></div></div></div>'+
    '<div class="card"><div class="card-head"><div class="card-title">\u30C8\u30C3\u30D7 AG\uFF08'+lbl+'\uFF09</div><button class="btn btn-g btn-sm">\u5168\u4EF6\u8868\u793A</button></div><table class="tbl"><thead><tr><th>ID</th><th>\u6C0F\u540D</th><th>\u30E9\u30F3\u30AF</th><th style="text-align:center">\u6210\u7D04\u6570</th><th style="text-align:right">\u58F2\u4E0A\uFF08\u4ED8\u4EBA\u6599\uFF09</th><th style="text-align:right">\u30B7\u30A7\u30A2</th></tr></thead><tbody>'+topRows+'</tbody></table></div>';
}
window.addEventListener('DOMContentLoaded',function(){CNAV.init('exec_dashboard');render();});
function showToast(msg, type) {
  var colors = {
    em: ['#ECFDF5','#059669','rgba(5,150,105,.2)'],
    am: ['#FFFBEB','#D97706','rgba(217,119,6,.2)'],
    rd: ['#FEF2F2','#DC2626','rgba(220,38,38,.2)'],
    sk: ['#F0F9FF','#0284C7','rgba(2,132,199,.2)'],
    ok: ['#ECFDF5','#059669','rgba(5,150,105,.2)'],
    warn:['#FFFBEB','#D97706','rgba(217,119,6,.2)'],
    error:['#FEF2F2','#DC2626','rgba(220,38,38,.2)'],
  };
  var c = colors[type] || colors.em;
  var t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:9999;padding:11px 18px;border-radius:9px;font-size:13px;font-weight:600;font-family:Outfit,sans-serif;box-shadow:0 6px 20px rgba(0,0,0,.12);transition:opacity .4s;background:'+c[0]+';color:'+c[1]+';border:1px solid '+c[2];
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.style.opacity='0'; setTimeout(function(){ if(t.parentNode) t.remove(); },400); }, 3200);
}
