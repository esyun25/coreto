<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>経営ダッシュボード — COREBLDG</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#0D1A2D;--navy-l:#1E3252;--gold:#C8A951;--gold-dim:rgba(200,169,81,.15);--cream:#F7F4EE;--cream2:#EFECE4;--white:#FFFFFF;--ink:#1A1A2E;--muted:#6B7280;--faint:#9CA3AF;--em:#059669;--em-bg:#ECFDF5;--am:#D97706;--am-bg:#FFFBEB;--rd:#DC2626;--rd-bg:#FEF2F2;--sk:#0284C7;--sk-bg:#F0F9FF;--vt:#7C3AED;--vt-bg:#F5F3FF;--bd:#E5E0D5;--bd2:#D4CFC4;--sw:240px;--r:10px;--r-sm:7px;--sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:var(--cream)}
.shell{display:flex;height:100vh}
.sb{width:var(--sw);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;position:relative}
.sb::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,rgba(200,169,81,.25) 0%,rgba(200,169,81,.06) 50%,transparent 100%)}
.sb-head{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;letter-spacing:5px;color:var(--gold)}
.sb-ver{font-size:9px;letter-spacing:2px;color:rgba(200,169,81,.3);font-family:'DM Mono',monospace;margin-top:2px}
.sb-user{margin:14px 14px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:9px 11px;display:flex;align-items:center;gap:9px}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--gold-dim);border:1px solid rgba(200,169,81,.25);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gold);flex-shrink:0}
.sb-un{font-size:11px;font-weight:600;color:rgba(255,255,255,.8)}
.sb-ur{font-size:9px;color:rgba(255,255,255,.3);font-family:'DM Mono',monospace}
.sb-nav{flex:1;overflow-y:auto;padding:6px 10px}
.nsl{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.18);padding:10px 8px 4px;font-family:'DM Mono',monospace}
.ni{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;cursor:pointer;transition:.13s;margin-bottom:1px}
.ni:hover{background:rgba(255,255,255,.06)}.ni.active{background:rgba(200,169,81,.1)}
.ni-ic{width:22px;text-align:center;font-size:14px}
.ni-lb{font-size:11px;font-weight:500;color:rgba(255,255,255,.55)}.ni.active .ni-lb{color:var(--gold)}
.sf{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.3);transition:.13s}
.sf:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.6)}
.sb-foot{padding:10px 14px 18px;border-top:1px solid rgba(255,255,255,.05)}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;box-shadow:var(--sh)}
.tb-title{font-size:16px;font-weight:600;color:var(--ink);font-family:'Cormorant Garamond',serif;letter-spacing:.5px}
.tb-crumb{font-size:11px;color:var(--faint)}
.tb-crumb a{color:var(--muted);text-decoration:none}
.tb-act{margin-left:auto;display:flex;gap:9px;align-items:center}
.btn{padding:7px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;transition:.15s;font-family:'Outfit',sans-serif;border:none}
.btn-p{background:var(--navy);color:var(--gold)}.btn-p:hover{background:var(--navy-l)}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--bd)}.btn-g:hover{background:var(--cream);color:var(--ink)}
.btn-sm{padding:5px 12px;font-size:11px}
.tab-bar{padding:0 24px;background:var(--white);border-bottom:1px solid var(--bd);display:flex}
.tab{padding:12px 18px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.tab:hover{color:var(--ink)}.tab.active{color:var(--navy);border-bottom-color:var(--gold)}
.page{flex:1;overflow-y:auto;padding:24px}
.page::-webkit-scrollbar{width:5px}.page::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.4px;font-family:'Outfit',sans-serif}
.b-em{background:var(--em-bg);color:var(--em)}.b-am{background:var(--am-bg);color:var(--am)}.b-rd{background:var(--rd-bg);color:var(--rd)}.b-sk{background:var(--sk-bg);color:var(--sk)}.b-nt{background:var(--cream2);color:var(--muted)}.b-vt{background:var(--vt-bg);color:var(--vt)}
/* KPI */
.kpi-row{display:grid;gap:14px;margin-bottom:20px}
.kpi-row-4{grid-template-columns:repeat(4,1fr)}
.kpi-row-3{grid-template-columns:repeat(3,1fr)}
.kpi{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.gd::before{background:var(--gold)}.kpi.em::before{background:var(--em)}.kpi.sk::before{background:var(--sk)}.kpi.am::before{background:var(--am)}.kpi.vt::before{background:var(--vt)}.kpi.rd::before{background:var(--rd)}
.kpi-lb{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.kpi-vl{font-size:26px;font-weight:700;color:var(--ink);font-family:'Cormorant Garamond',serif;font-variant-numeric:tabular-nums}
.kpi-sb{font-size:10px;color:var(--faint);margin-top:4px}
.kpi-delta{font-size:11px;font-weight:700;margin-top:5px}
.kpi-delta.up{color:var(--em)}.kpi-delta.dn{color:var(--rd)}
/* Card */
.card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:18px}
.card-head{padding:14px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--cream)}
.card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink)}
.card-body{padding:18px 20px}
/* bar chart */
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:120px;padding-bottom:22px;position:relative;border-bottom:1px solid var(--bd)}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;border-radius:4px 4px 0 0;transition:height .4s;min-height:2px;cursor:pointer}
.bar:hover{opacity:.8}
.bar-label{font-size:9px;color:var(--faint);font-family:'DM Mono',monospace;position:absolute;bottom:2px;white-space:nowrap}
/* table */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--faint);padding:9px 14px;border-bottom:2px solid var(--bd);text-align:left;background:var(--cream)}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--bd);color:var(--ink);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(200,169,81,.03)}
/* 2-col layout */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}
/* biz breakdown */
.bk-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd)}
.bk-row:last-child{border-bottom:none}
.bk-label{font-size:12px;color:var(--ink);width:110px;flex-shrink:0}
.bk-bar-wrap{flex:1;height:7px;background:var(--cream2);border-radius:4px;overflow:hidden}
.bk-bar{height:100%;border-radius:4px;transition:width .5s}
.bk-val{font-size:12px;font-weight:700;color:var(--ink);width:100px;text-align:right;font-variant-numeric:tabular-nums}
/* rank donut placeholder */
.rank-list{display:flex;flex-direction:column;gap:6px}
.rank-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bd)}
.rank-row:last-child{border-bottom:none}
.rank-chip{width:64px;text-align:center;padding:3px 6px;border-radius:20px;font-size:10px;font-weight:700;flex-shrink:0}
.rank-pl{background:rgba(124,58,237,.1);color:#7C3AED}
.rank-go{background:rgba(217,119,6,.1);color:#D97706}
.rank-sv{background:rgba(107,114,128,.1);color:#6B7280}
.rank-br{background:rgba(146,64,14,.1);color:#92400E}
/* MOBILE */
.mob-ham{display:none;flex-direction:column;align-items:center;justify-content:center;width:36px;height:36px;background:transparent;border:none;cursor:pointer;border-radius:7px;flex-shrink:0}
.mob-ham span{display:block;width:18px;height:2px;background:rgba(255,255,255,.72);margin:3px 0;border-radius:1px}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199}
@media(max-width:768px){
  .mob-ham{display:flex}.mob-overlay.show{display:block}
  .sb{position:fixed;left:calc(-1 * var(--sw));top:0;height:100vh;z-index:200;transition:left .25s ease}.sb.open{left:0}
  .shell{overflow:hidden}.content{width:100vw;min-width:0}
  .topbar{padding:0 12px;gap:8px}.tb-crumb{display:none}
  .page{padding:12px}
  .kpi-row-4{grid-template-columns:1fr 1fr!important}
  .kpi-row-3{grid-template-columns:1fr 1fr!important}
  .two-col{grid-template-columns:1fr}
  table{display:block;overflow-x:auto}
}
</style>
</head>
<body>
<div class="shell">
<nav class="sb" id="sb">
  <div class="sb-head">
    <div class="sb-logo">CORE<br>BLDG</div>
    <div class="sb-ver">v2.0 — CORETO</div>
  </div>
  <div class="sb-user">
    <div class="sb-av">HQ</div>
    <div><div class="sb-un">田中 誠一</div><div class="sb-ur">HQ / exec</div></div>
  </div>
  <div class="sb-nav" id="sb-nav"></div>
  <div class="sb-foot"><div class="sf" onclick="window.location.href='coreto-hub-v2.html'">⬅ ダッシュボードへ</div></div>
</nav>
<div class="content">
  <div class="topbar">
    <button class="mob-ham" onclick="toggleSb()"><span></span><span></span><span></span></button>
    <div>
      <div class="tb-title">経営ダッシュボード</div>
      <div class="tb-crumb"><a href="coreto-hub-v2.html">COREBLDG</a> › <span>経営ダッシュボード</span></div>
    </div>
    <div class="tb-act">
      <span style="font-size:11px;color:var(--muted)">2026年3月 時点</span>
      <button class="btn btn-g btn-sm" onclick="window.print()">🖨 エクスポート</button>
    </div>
  </div>
  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('overview',this)">概要</div>
    <div class="tab" onclick="switchTab('agent',this)">AG別実績</div>
    <div class="tab" onclick="switchTab('pipeline',this)">パイプライン</div>
  </div>
  <div class="page" id="pg"></div>
</div>
</div>
<div class="mob-overlay" onclick="toggleSb()"></div>
<script src="coreto-nav-v2.js"></script>
<script>
function toggleSb(){document.querySelector('.sb').classList.toggle('open');document.querySelector('.mob-overlay').classList.toggle('show');}

const MONTHS = ['10月','11月','12月','1月','2月','3月'];
const REVENUE = [3820000,4150000,3960000,5240000,4710000,5980000];
const CASES   = [12,14,11,17,15,19];
const max_rev = Math.max(...REVENUE);
const max_cas = Math.max(...CASES);

const AG_DATA = [
  {id:'AG-0042', name:'山田 誠',   rank:'Gold',     re:3, hr:0, util:1, revenue:748000,  rate:80},
  {id:'AG-0088', name:'鈴木 花子', rank:'Silver',   re:0, hr:2, util:1, revenue:420000,  rate:70},
  {id:'AG-0055', name:'井上 健',   rank:'Gold',     re:2, hr:0, util:2, revenue:610000,  rate:80},
  {id:'AG-0033', name:'中島 翔',   rank:'Platinum', re:4, hr:0, util:0, revenue:1240000, rate:90},
  {id:'AG-0021', name:'木村 葵',   rank:'Bronze',   re:1, hr:1, util:0, revenue:290000,  rate:60},
  {id:'AG-0077', name:'松本 健',   rank:'Silver',   re:2, hr:0, util:1, revenue:480000,  rate:70},
];

const RANK_CHIP = {Platinum:'rank-pl',Gold:'rank-go',Silver:'rank-sv',Bronze:'rank-br'};

let currentTab = 'overview';
function switchTab(t, el){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  if(el) el.classList.add('active');
  currentTab = t;
  if(t==='overview')  renderOverview();
  if(t==='agent')     renderAgent();
  if(t==='pipeline')  renderPipeline();
}

function renderOverview(){
  const totalRev = REVENUE[5];
  const prevRev  = REVENUE[4];
  const delta    = Math.round((totalRev-prevRev)/prevRev*100);
  const pg = document.getElementById('pg');
  pg.innerHTML = `
  <!-- TOP KPI -->
  <div class="kpi-row kpi-row-4">
    <div class="kpi gd">
      <div class="kpi-lb">今月 総売上</div>
      <div class="kpi-vl">¥${(totalRev/10000).toFixed(0)}万</div>
      <div class="kpi-delta ${delta>=0?'up':'dn'}">${delta>=0?'▲':'▼'} ${Math.abs(delta)}% 前月比</div>
    </div>
    <div class="kpi em">
      <div class="kpi-lb">今月 成約件数</div>
      <div class="kpi-vl">19件</div>
      <div class="kpi-sb">先月比 +4件</div>
    </div>
    <div class="kpi sk">
      <div class="kpi-lb">稼働AG数</div>
      <div class="kpi-vl">6名</div>
      <div class="kpi-sb">全7名中</div>
    </div>
    <div class="kpi am">
      <div class="kpi-lb">支払い未処理</div>
      <div class="kpi-vl">3件</div>
      <div class="kpi-sb">要対応</div>
    </div>
  </div>

  <!-- 売上推移 + 事業別内訳 -->
  <div class="two-col">
    <div class="card" style="margin-bottom:0">
      <div class="card-head"><div class="card-title">月次売上推移（6ヶ月）</div></div>
      <div class="card-body">
        <div class="bar-chart" id="rev-chart">
          ${REVENUE.map((v,i)=>`
          <div class="bar-wrap" style="position:relative">
            <div class="bar" style="height:${Math.round(v/max_rev*90)}px;background:${i===5?'var(--gold)':'var(--em)'}"></div>
            <div class="bar-label" style="bottom:-20px;font-size:9px;color:var(--faint)">${MONTHS[i]}</div>
          </div>`).join('')}
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:10px;font-size:10px;color:var(--faint)">
          <span>¥${(Math.min(...REVENUE)/10000).toFixed(0)}万</span>
          <span>¥${(Math.max(...REVENUE)/10000).toFixed(0)}万</span>
        </div>
      </div>
    </div>

    <div class="card" style="margin-bottom:0">
      <div class="card-head"><div class="card-title">事業別売上内訳（今月）</div></div>
      <div class="card-body">
        <div class="bk-row">
          <div class="bk-label">不動産（賃貸）</div>
          <div class="bk-bar-wrap"><div class="bk-bar" style="width:58%;background:var(--em)"></div></div>
          <div class="bk-val">¥3,468,000</div>
        </div>
        <div class="bk-row">
          <div class="bk-label">不動産（売買）</div>
          <div class="bk-bar-wrap"><div class="bk-bar" style="width:18%;background:var(--gold)"></div></div>
          <div class="bk-val">¥1,076,000</div>
        </div>
        <div class="bk-row">
          <div class="bk-label">人材紹介</div>
          <div class="bk-bar-wrap"><div class="bk-bar" style="width:10%;background:var(--sk)"></div></div>
          <div class="bk-val">¥598,000</div>
        </div>
        <div class="bk-row">
          <div class="bk-label">光通信</div>
          <div class="bk-bar-wrap"><div class="bk-bar" style="width:14%;background:var(--vt)"></div></div>
          <div class="bk-val">¥838,000</div>
        </div>
        <div style="display:flex;justify-content:flex-end;margin-top:10px;font-size:12px;font-weight:700;color:var(--ink)">合計 ¥5,980,000</div>
      </div>
    </div>
  </div>

  <!-- 成約件数推移 + ランク分布 -->
  <div class="two-col">
    <div class="card" style="margin-bottom:0">
      <div class="card-head"><div class="card-title">月次成約件数推移</div></div>
      <div class="card-body">
        <div class="bar-chart">
          ${CASES.map((v,i)=>`
          <div class="bar-wrap" style="position:relative">
            <div class="bar" style="height:${Math.round(v/max_cas*90)}px;background:${i===5?'var(--sk)':'rgba(2,132,199,.3)'}"></div>
            <div class="bar-label" style="bottom:-20px;font-size:9px;color:var(--faint)">${MONTHS[i]}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>

    <div class="card" style="margin-bottom:0">
      <div class="card-head"><div class="card-title">AGランク分布</div></div>
      <div class="card-body">
        <div class="rank-list">
          ${[['Platinum','rank-pl','1名'],['Gold','rank-go','2名'],['Silver','rank-sv','2名'],['Bronze','rank-br','1名'],['未認定','rank-sv','1名']].map(([r,cls,cnt])=>`
          <div class="rank-row">
            <div class="rank-chip ${cls}">${r}</div>
            <div style="flex:1;height:6px;background:var(--cream2);border-radius:3px;overflow:hidden;margin:0 8px">
              <div style="height:100%;width:${r==='Platinum'?14:r==='Gold'?29:r==='Silver'?29:14}%;background:${r==='Platinum'?'var(--vt)':r==='Gold'?'var(--gold)':r==='Silver'?'var(--muted)':'var(--am)'}"></div>
            </div>
            <div style="font-size:12px;font-weight:600;color:var(--ink);width:30px;text-align:right">${cnt}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>
  </div>

  <!-- アラート -->
  <div class="card">
    <div class="card-head"><div class="card-title">⚠️ 要対応アラート</div></div>
    ${[
      {color:'var(--rd)',   icon:'🔴', text:'入金超過期限：RENT-0201 田中 — 3日を超過'},
      {color:'var(--am)',   icon:'🟠', text:'書類審査未完了：RENT-0215 渡辺 — 申込から5日経過'},
      {color:'var(--am)',   icon:'🟠', text:'IT重説未設定：RENT-0201 — 成約報告から3日経過'},
      {color:'var(--sk)',   icon:'🔵', text:'即時払い申請 審査待ち：IPY-0012 山田 誠 — ¥316,800'},
    ].map(a=>`
    <div style="display:flex;align-items:center;gap:10px;padding:11px 20px;border-bottom:1px solid var(--bd)">
      <span>${a.icon}</span>
      <span style="font-size:12px;color:var(--ink)">${a.text}</span>
    </div>`).join('')}
  </div>`;
}

function renderAgent(){
  const rows = AG_DATA.sort((a,b)=>b.revenue-a.revenue).map((ag,i)=>`
    <tr>
      <td style="font-weight:700;font-size:13px">${i+1}</td>
      <td>
        <div style="font-weight:600;font-size:13px">${ag.name}</div>
        <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--faint)">${ag.id}</div>
      </td>
      <td><div class="rank-chip ${RANK_CHIP[ag.rank]||'rank-sv'}" style="display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700">${ag.rank}</div></td>
      <td style="text-align:center">${ag.re}</td>
      <td style="text-align:center">${ag.hr}</td>
      <td style="text-align:center">${ag.util}</td>
      <td style="text-align:center;font-weight:600">${ag.re+ag.hr+ag.util}</td>
      <td style="text-align:right;font-weight:700;color:var(--em);font-variant-numeric:tabular-nums">¥${ag.revenue.toLocaleString()}</td>
      <td style="text-align:center">${ag.rate}%</td>
    </tr>`).join('');
  document.getElementById('pg').innerHTML = `
  <div class="kpi-row kpi-row-3">
    <div class="kpi gd"><div class="kpi-lb">今月 最高報酬</div><div class="kpi-vl">¥1,240,000</div><div class="kpi-sb">中島 翔（Platinum）</div></div>
    <div class="kpi em"><div class="kpi-lb">稼働AG 平均報酬</div><div class="kpi-vl">¥${Math.round(AG_DATA.reduce((s,a)=>s+a.revenue,0)/AG_DATA.length).toLocaleString()}</div></div>
    <div class="kpi sk"><div class="kpi-lb">今月 総支払報酬</div><div class="kpi-vl">¥${AG_DATA.reduce((s,a)=>s+a.revenue,0).toLocaleString()}</div></div>
  </div>
  <div class="card">
    <div class="card-head"><div class="card-title">AG別 今月実績</div></div>
    <table class="tbl">
      <thead><tr><th>#</th><th>AG</th><th>ランク</th><th style="text-align:center">不動産</th><th style="text-align:center">人材</th><th style="text-align:center">光通信</th><th style="text-align:center">計</th><th style="text-align:right">報酬額</th><th style="text-align:center">報酬率</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function renderPipeline(){
  const stages = [
    {label:'リード',     count:24, color:'var(--faint)',  val:null},
    {label:'初回接触',   count:18, color:'var(--sk)',     val:null},
    {label:'内見',       count:11, color:'var(--vt)',     val:null},
    {label:'申込',       count:7,  color:'var(--am)',     val:null},
    {label:'審査中',     count:5,  color:'var(--gold)',   val:null},
    {label:'成約',       count:19, color:'var(--em)',     val:'¥5,980,000'},
  ];
  document.getElementById('pg').innerHTML = `
  <div class="card">
    <div class="card-head"><div class="card-title">全事業 パイプライン（今月）</div></div>
    <div class="card-body">
      <div style="display:flex;align-items:flex-end;gap:10px;height:160px;padding-bottom:28px;position:relative;border-bottom:1px solid var(--bd);margin-bottom:16px">
        ${stages.map(s=>`
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;position:relative">
          <div style="height:${Math.round(s.count/24*130)}px;width:100%;border-radius:6px 6px 0 0;background:${s.color};transition:.4s;cursor:pointer;min-height:12px"></div>
          <div style="position:absolute;bottom:-22px;font-size:9px;color:var(--faint);font-family:'DM Mono',monospace;white-space:nowrap">${s.label}</div>
          <div style="position:absolute;top:-20px;font-size:12px;font-weight:700;color:var(--ink)">${s.count}</div>
        </div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:20px">
        ${stages.map(s=>`
        <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--cream);border-radius:var(--r-sm)">
          <div style="width:10px;height:10px;border-radius:2px;background:${s.color};flex-shrink:0"></div>
          <div><div style="font-size:12px;font-weight:600;color:var(--ink)">${s.label}</div><div style="font-size:11px;color:var(--muted)">${s.count}件${s.val?' — '+s.val:''}</div></div>
        </div>`).join('')}
      </div>
    </div>
  </div>

  <div class="two-col">
    <div class="card" style="margin-bottom:0">
      <div class="card-head"><div class="card-title">事業別 成約率</div></div>
      <div class="card-body">
        ${[['不動産（賃貸）','var(--em)',72],['不動産（売買）','var(--gold)',45],['人材紹介','var(--sk)',38],['光通信','var(--vt)',61]].map(([l,c,p])=>`
        <div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px">
            <span style="color:var(--ink)">${l}</span><span style="font-weight:700">${p}%</span>
          </div>
          <div style="height:7px;background:var(--cream2);border-radius:4px;overflow:hidden">
            <div style="height:100%;width:${p}%;background:${c};border-radius:4px;transition:.5s"></div>
          </div>
        </div>`).join('')}
      </div>
    </div>
    <div class="card" style="margin-bottom:0">
      <div class="card-head"><div class="card-title">PT紹介 経由案件</div></div>
      <div class="card-body">
        <div style="display:flex;justify-content:space-between;font-size:12px;padding:8px 0;border-bottom:1px solid var(--bd)"><span style="color:var(--muted)">PT紹介経由 今月成約</span><span style="font-weight:700">4件</span></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;padding:8px 0;border-bottom:1px solid var(--bd)"><span style="color:var(--muted)">PT紹介 仲介料</span><span style="font-weight:700;color:var(--em)">¥1,240,000</span></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;padding:8px 0;border-bottom:1px solid var(--bd)"><span style="color:var(--muted)">PT支払いボーナス</span><span style="font-weight:700;color:var(--am)">¥310,000</span></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;padding:8px 0"><span style="color:var(--muted)">稼働PT数</span><span style="font-weight:700">3名</span></div>
      </div>
    </div>
  </div>`;
}

window.addEventListener('DOMContentLoaded', ()=>{
  CNAV.init('exec_dashboard');
  renderOverview();
});
</script>
