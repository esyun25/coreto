<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>即時払い — COREBLDG</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#0D1A2D;--navy-l:#1E3252;--gold:#C8A951;--gold-dim:rgba(200,169,81,.15);--cream:#F7F4EE;--cream2:#EFECE4;--white:#FFFFFF;--ink:#1A1A2E;--muted:#6B7280;--faint:#9CA3AF;--em:#059669;--em-bg:#ECFDF5;--am:#D97706;--am-bg:#FFFBEB;--rd:#DC2626;--rd-bg:#FEF2F2;--sk:#0284C7;--sk-bg:#F0F9FF;--vt:#7C3AED;--vt-bg:#F5F3FF;--bd:#E5E0D5;--bd2:#D4CFC4;--sw:240px;--r:10px;--r-sm:7px;--sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:var(--cream)}
.shell{display:flex;height:100vh}
.sb{width:var(--sw);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;position:relative}
.sb::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,rgba(200,169,81,.25) 0%,rgba(200,169,81,.06) 50%,transparent 100%)}
.sb-head{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-logo{font-family: 'Cormorant Garamond', serif;font-size:20px;font-weight:600;letter-spacing:5px;color:var(--gold)}
.sb-ver{font-size:9px;letter-spacing:2px;color:rgba(200,169,81,.3);font-family:'DM Mono',monospace;margin-top:2px}
.sb-user{margin:14px 14px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:9px 11px;display:flex;align-items:center;gap:9px}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--gold-dim);border:1px solid rgba(200,169,81,.25);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gold);flex-shrink:0}
.sb-un{font-size:11px;font-weight:600;color:rgba(255,255,255,.8)}
.sb-ur{font-size:9px;color:rgba(255,255,255,.3);font-family:'DM Mono',monospace}
.sb-nav{flex:1;overflow-y:auto;padding:6px 10px}
.nsl{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.18);padding:10px 8px 4px;font-family:'DM Mono',monospace}
.ni{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;cursor:pointer;transition:.13s;margin-bottom:1px}
.ni:hover{background:rgba(255,255,255,.06)}
.ni.active{background:rgba(200,169,81,.1)}
.ni-ic{width:22px;text-align:center;font-size:14px}
.ni-lb{font-size:11px;font-weight:500;color:rgba(255,255,255,.55)}
.ni.active .ni-lb{color:var(--gold)}
.sf{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.3);transition:.13s}
.sf:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.6)}
.sb-foot{padding:10px 14px 18px;border-top:1px solid rgba(255,255,255,.05)}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;box-shadow:var(--sh)}
.tb-title{font-size:16px;font-weight:600;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums;letter-spacing:.5px}
.tb-crumb{font-size:11px;color:var(--faint)}
.tb-crumb a{color:var(--muted);text-decoration:none}
.tb-act{margin-left:auto;display:flex;gap:9px;align-items:center}
.btn{padding:7px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;transition:.15s;font-family:'Outfit',sans-serif;border:none}
.btn-p{background:var(--navy);color:var(--gold)}.btn-p:hover{background:var(--navy-l)}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--bd)}.btn-g:hover{background:var(--cream);color:var(--ink)}
.btn-em{background:var(--em);color:#fff}.btn-em:hover{opacity:.9}
.btn-rd{background:var(--rd-bg);color:var(--rd);border:1px solid rgba(220,38,38,.2)}.btn-rd:hover{background:var(--rd);color:#fff}
.btn-sm{padding:5px 12px;font-size:11px}
.tab-bar{padding:0 24px;background:var(--white);border-bottom:1px solid var(--bd);display:flex}
.tab{padding:12px 18px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.tab:hover{color:var(--ink)}.tab.active{color:var(--navy);border-bottom-color:var(--gold)}
.page{flex:1;overflow-y:auto;padding:24px}
.page::-webkit-scrollbar{width:5px}.page::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;font-family:'Outfit',sans-serif}
.b-em{background:var(--em-bg);color:var(--em)}.b-am{background:var(--am-bg);color:var(--am)}.b-rd{background:var(--rd-bg);color:var(--rd)}.b-sk{background:var(--sk-bg);color:var(--sk)}.b-nt{background:var(--cream2);color:var(--muted)}.b-vt{background:var(--vt-bg);color:var(--vt)}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.gd::before{background:var(--gold)}.kpi.em::before{background:var(--em)}.kpi.am::before{background:var(--am)}.kpi.sk::before{background:var(--sk)}
.kpi-lb{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.kpi-vl{font-size:24px;font-weight:700;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums;font-variant-numeric:tabular-nums}
.kpi-sb{font-size:10px;color:var(--faint);margin-top:4px}
.card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:18px}
.card-head{padding:14px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--cream)}
.card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink)}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--faint);padding:9px 14px;border-bottom:2px solid var(--bd);text-align:left;background:var(--cream)}
.tbl td{padding:12px 14px;border-bottom:1px solid var(--bd);color:var(--ink);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(200,169,81,.03)}
/* Apply form */
.form-wrap{max-width:620px}
.form-card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:18px}
.form-head{padding:14px 22px;border-bottom:1px solid var(--bd);background:var(--cream);display:flex;align-items:center;gap:10px}
.form-head-icon{font-size:16px}
.form-head-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink)}
.form-body{padding:20px 22px}
.field{margin-bottom:16px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field select{width:100%;padding:9px 12px;background:var(--cream);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:13px;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;outline:none;transition:.15s;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--gold);background:var(--white)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.required::after{content:' *';color:var(--rd);font-size:11px}
/* fee breakdown */
.fee-box{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-l) 100%);border-radius:var(--r);padding:20px 22px;margin-bottom:18px;color:#fff}
.fee-box-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:6px;font-family:'DM Mono',monospace}
.fee-box-amt{font-size:36px;font-weight:700;font-family:'Outfit','Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums;color:var(--gold);font-variant-numeric:tabular-nums}
.fee-box-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px}
.fee-row{display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.08)}
.fee-row:last-child{border-bottom:none}
.fee-row-label{color:rgba(255,255,255,.5)}
.fee-row-val{color:rgba(255,255,255,.85);font-weight:600}
/* alert */
.al{padding:12px 16px;border-radius:var(--r-sm);font-size:12px;line-height:1.6;margin-bottom:14px}
.al-warn{background:var(--am-bg);border:1px solid rgba(217,119,6,.25);color:var(--am)}
.al-info{background:var(--sk-bg);border:1px solid rgba(2,132,199,.2);color:var(--sk)}
/* MOBILE */
.mob-ham{display:none;flex-direction:column;align-items:center;justify-content:center;width:36px;height:36px;background:transparent;border:none;cursor:pointer;border-radius:7px;flex-shrink:0}
.mob-ham span{display:block;width:18px;height:2px;background:rgba(255,255,255,.72);margin:3px 0;border-radius:1px}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199}
@media(max-width:768px){
  .mob-ham{display:flex}.mob-overlay.show{display:block}
  .sb{position:fixed;left:calc(-1 * var(--sw));top:0;height:100vh;z-index:200;transition:left .25s ease}.sb.open{left:0}
  .shell{overflow:hidden}.content{width:100vw;min-width:0}
  .topbar{padding:0 12px;gap:8px}.tb-crumb{display:none}
  .page{padding:12px}.form-wrap{max-width:100%}
  .field-row{grid-template-columns:1fr}.kpi-row{grid-template-columns:1fr 1fr!important}
  table{display:block;overflow-x:auto}
}
</style>
</head>
<body>
<div class="shell">
<nav class="sb" id="sb">
  <div class="sb-head">
    <div class="sb-logo">CORE<br>BLDG</div>
    <div class="sb-ver">v2.0 — CORETO</div>
  </div>
  <div class="sb-user">
    <div class="sb-av">AG</div>
    <div><div class="sb-un">山田 誠</div><div class="sb-ur">AG-0042 / Gold</div></div>
  </div>
  <div class="sb-nav" id="sb-nav"></div>
  <div class="sb-foot"><div class="sf" onclick="window.location.href='coreto-hub-v2.html'">⬅ ダッシュボードへ</div></div>
</nav>
<div class="content">
  <div class="topbar">
    <button class="mob-ham" onclick="toggleSb()"><span></span><span></span><span></span></button>
    <div>
      <div class="tb-title">即時払い</div>
      <div class="tb-crumb"><a href="coreto-hub-v2.html">COREBLDG</a> › <span>即時払い</span></div>
    </div>
    <div class="tb-act" id="tb-act-area"></div>
  </div>
  <div class="tab-bar">
    <div class="tab active" id="tab-apply" onclick="switchTab('apply',this)">申請</div>
    <div class="tab" id="tab-status" onclick="switchTab('status',this)">申請状況</div>
    <div class="tab" id="tab-review" onclick="switchTab('review',this)">審査（HQ）</div>
  </div>
  <div class="page" id="pg"></div>
</div>
</div>
<div class="mob-overlay" onclick="toggleSb()"></div>
<script src="coreto-nav-v2.js"></script>
<script>
function toggleSb(){document.querySelector('.sb').classList.toggle('open');document.querySelector('.mob-overlay').classList.toggle('show');}

const ROLE = sessionStorage.getItem('coreto_role')||'re_ag';

const REQUESTS = [
  {id:'IPY-0012', ag:'AG-0042 山田 誠',  case:'RENT-0194', reward:396000, requested:316800, fee:7920, date:'2026/03/10', status:'審査中'},
  {id:'IPY-0011', ag:'AG-0088 鈴木 花子', case:'RENT-0188', reward:280000, requested:224000, fee:5600, date:'2026/03/08', status:'承認済み'},
  {id:'IPY-0010', ag:'AG-0042 山田 誠',  case:'UTL-0071',  reward:192000, requested:153600, fee:3840, date:'2026/02/20', status:'承認済み'},
  {id:'IPY-0009', ag:'AG-0055 井上 健',  case:'RENT-0175', reward:360000, requested:288000, fee:7200, date:'2026/02/15', status:'否認'},
];

let currentTab = 'apply';
function switchTab(t, el){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  if(el) el.classList.add('active');
  currentTab = t;
  renderTab(t);
}
function renderTab(t){
  if(t==='apply')  renderApply();
  if(t==='status') renderStatus();
  if(t==='review') renderReview();
}

function calcInstant(){
  const reward = parseInt(document.getElementById('reward-display')?.dataset.val)||396000;
  const pct = parseInt(document.getElementById('pct-select')?.value)||80;
  const requested = Math.round(reward * pct / 100);
  const fee = Math.round(requested * 0.025);
  const net = requested - fee;
  const el = document.getElementById('instant-preview');
  if(el) el.innerHTML = `
    <div class="fee-row"><span class="fee-row-label">報酬確定額</span><span class="fee-row-val">¥${reward.toLocaleString()}</span></div>
    <div class="fee-row"><span class="fee-row-label">即時払い率</span><span class="fee-row-val">${pct}%</span></div>
    <div class="fee-row"><span class="fee-row-label">手数料（2.5%）</span><span class="fee-row-val" style="color:rgba(255,200,100,.7)">− ¥${fee.toLocaleString()}</span></div>
    <div class="fee-row" style="border-top:1px solid rgba(255,255,255,.15);margin-top:4px;padding-top:10px"><span class="fee-row-label" style="color:rgba(255,255,255,.8);font-weight:700">実受取額</span><span class="fee-row-val" style="color:var(--gold);font-size:15px">¥${net.toLocaleString()}</span></div>`;
}

function renderApply(){
  document.getElementById('tb-act-area').innerHTML = '';
  document.getElementById('pg').innerHTML = `
  <div class="form-wrap">
    <div class="al al-info">ℹ️ 即時払いは<strong>成約報告済み・HQ確認中</strong>の案件に対して申請できます。手数料は報酬額の2.5%です。</div>

    <div class="fee-box">
      <div class="fee-box-label">申請対象報酬（RENT-0194）</div>
      <div class="fee-box-amt" id="reward-display" data-val="396000">¥396,000</div>
      <div class="fee-box-sub">Gold報酬率80% / 仲介料¥495,000</div>
      <div style="margin-top:14px" id="instant-preview">
        <div class="fee-row"><span class="fee-row-label">報酬確定額</span><span class="fee-row-val">¥396,000</span></div>
        <div class="fee-row"><span class="fee-row-label">即時払い率</span><span class="fee-row-val">80%</span></div>
        <div class="fee-row"><span class="fee-row-label">手数料（2.5%）</span><span class="fee-row-val" style="color:rgba(255,200,100,.7)">− ¥7,920</span></div>
        <div class="fee-row" style="border-top:1px solid rgba(255,255,255,.15);margin-top:4px;padding-top:10px"><span class="fee-row-label" style="color:rgba(255,255,255,.8);font-weight:700">実受取額</span><span class="fee-row-val" style="color:var(--gold);font-size:15px">¥316,080</span></div>
      </div>
    </div>

    <div class="form-card">
      <div class="form-head"><div class="form-head-icon">📋</div><div class="form-head-title">申請情報</div></div>
      <div class="form-body">
        <div class="field-row">
          <div class="field"><label class="required">対象案件</label>
            <select>
              <option>RENT-0194 — 田中 優子（¥396,000）</option>
            </select>
          </div>
          <div class="field"><label class="required">即時払い率</label>
            <select id="pct-select" onchange="calcInstant()">
              <option value="80">80%（推奨）</option>
              <option value="70">70%</option>
              <option value="60">60%</option>
              <option value="50">50%</option>
            </select>
          </div>
        </div>
        <div class="field-row">
          <div class="field"><label>振込先口座</label>
            <select><option>三菱UFJ 普通 1234567（ヤマダ マコト）</option></select>
          </div>
          <div class="field"><label>希望入金日</label>
            <input type="date" value="2026-03-12">
          </div>
        </div>
        <div class="field">
          <label>備考</label>
          <input placeholder="HQへの連絡事項（任意）">
        </div>
      </div>
    </div>

    <div class="al al-warn">⚠️ 即時払い申請後、残額（差分20%）は通常の支払いサイクルで振り込まれます。</div>

    <div style="display:flex;justify-content:flex-end;gap:10px">
      <button class="btn btn-g" onclick="switchTab('status',document.getElementById('tab-status'))">キャンセル</button>
      <button class="btn btn-p" onclick="submitApply()">即時払いを申請する →</button>
    </div>
  </div>`;
}

function submitApply(){
  document.getElementById('pg').innerHTML = `
  <div class="form-wrap">
    <div style="text-align:center;padding:60px 20px">
      <div style="font-size:48px;margin-bottom:16px">⚡</div>
      <div style="font-family:'Outfit','Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums;font-size:26px;font-weight:700;color:var(--ink);margin-bottom:8px">即時払いを申請しました</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:28px">HQが承認後、指定口座に振り込まれます。通常1営業日以内。</div>
      <div style="background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:20px 28px;display:inline-block;text-align:left;min-width:300px;margin-bottom:28px">
        <div style="display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid var(--bd)"><span style="color:var(--muted)">申請ID</span><span style="font-family:'DM Mono',monospace">IPY-0013</span></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid var(--bd)"><span style="color:var(--muted)">案件</span><span>RENT-0194</span></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid var(--bd)"><span style="color:var(--muted)">即時払い額</span><span>¥316,800</span></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;padding:5px 0"><span style="color:var(--muted)">手数料</span><span style="color:var(--am)">¥7,920</span></div>
        <div style="display:flex;justify-content:space-between;font-size:14px;font-weight:700;padding:8px 0;border-top:1px solid var(--bd);margin-top:4px"><span style="color:var(--muted)">実受取額</span><span style="color:var(--em);font-family:'Outfit','Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums;font-size:20px">¥308,880</span></div>
      </div>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn btn-g" onclick="switchTab('status',document.getElementById('tab-status'))">申請状況を確認</button>
        <button class="btn btn-p" onclick="window.location.href='coreto-hub-v2.html'">ダッシュボードへ</button>
      </div>
    </div>
  </div>`;
}

function renderStatus(){
  document.getElementById('tb-act-area').innerHTML = `<button class="btn btn-p btn-sm" onclick="switchTab('apply',document.getElementById('tab-apply'))">＋ 新規申請</button>`;
  const myRequests = REQUESTS.filter(r=>r.ag.startsWith('AG-0042'));
  const rows = myRequests.map(r=>`
    <tr>
      <td style="font-family:'DM Mono',monospace;font-size:11px">${r.id}</td>
      <td style="font-family:'DM Mono',monospace;font-size:11px">${r.case}</td>
      <td style="font-weight:700;font-variant-numeric:tabular-nums">¥${r.reward.toLocaleString()}</td>
      <td style="font-weight:700;color:var(--em);font-variant-numeric:tabular-nums">¥${r.requested.toLocaleString()}</td>
      <td style="color:var(--am)">¥${r.fee.toLocaleString()}</td>
      <td style="font-size:11px;color:var(--faint)">${r.date}</td>
      <td><span class="badge ${r.status==='承認済み'?'b-em':r.status==='審査中'?'b-am':'b-rd'}">${r.status}</span></td>
    </tr>`).join('');
  document.getElementById('pg').innerHTML = `
  <div class="card">
    <div class="card-head"><div class="card-title">自分の即時払い申請</div></div>
    <table class="tbl"><thead><tr><th>申請ID</th><th>案件</th><th>報酬確定額</th><th>即時払い額</th><th>手数料</th><th>申請日</th><th>状態</th></tr></thead>
    <tbody>${rows}</tbody></table>
  </div>`;
}

function renderReview(){
  document.getElementById('tb-act-area').innerHTML = '';
  const pending = REQUESTS.filter(r=>r.status==='審査中');
  const rows = REQUESTS.map(r=>`
    <tr>
      <td style="font-family:'DM Mono',monospace;font-size:11px">${r.id}</td>
      <td style="font-size:12px">${r.ag}</td>
      <td style="font-family:'DM Mono',monospace;font-size:11px">${r.case}</td>
      <td style="font-weight:700;font-variant-numeric:tabular-nums">¥${r.reward.toLocaleString()}</td>
      <td style="font-weight:700;color:var(--em);font-variant-numeric:tabular-nums">¥${r.requested.toLocaleString()}</td>
      <td style="font-size:11px;color:var(--faint)">${r.date}</td>
      <td><span class="badge ${r.status==='承認済み'?'b-em':r.status==='審査中'?'b-am':'b-rd'}">${r.status}</span></td>
      <td>
        ${r.status==='審査中'
          ? `<div style="display:flex;gap:5px">
               <button class="btn btn-em btn-sm" onclick="approve('${r.id}')">承認</button>
               <button class="btn btn-rd btn-sm" onclick="deny('${r.id}')">否認</button>
             </div>`
          : `<span style="font-size:11px;color:var(--faint)">対応済み</span>`}
      </td>
    </tr>`).join('');
  document.getElementById('pg').innerHTML = `
  ${pending.length>0?`<div class="al al-warn" style="max-width:800px">⚠️ 審査待ちの申請が<strong>${pending.length}件</strong>あります。</div>`:''}
  <div class="card" style="max-width:1000px">
    <div class="card-head">
      <div class="card-title">即時払い審査一覧</div>
      <span style="font-size:11px;color:var(--muted)">HQ専用</span>
    </div>
    <table class="tbl"><thead><tr><th>申請ID</th><th>申請者</th><th>案件</th><th>報酬額</th><th>即時払い額</th><th>申請日</th><th>状態</th><th>操作</th></tr></thead>
    <tbody>${rows}</tbody></table>
  </div>`;
}

function approve(id){ alert(`申請 ${id} を承認しました。AGへLINE通知を送信します。`); }
function deny(id){
  const reason = prompt(`申請 ${id} の否認理由を入力してください：`);
  if(reason) alert(`否認しました。理由：${reason}`);
}

window.addEventListener('DOMContentLoaded', ()=>{
  CNAV.init('instant_pay');
  renderApply();
});
</script>
</body>
</html>
