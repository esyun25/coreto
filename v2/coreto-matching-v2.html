<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PTマッチング — COREBLDG</title>
<link rel="stylesheet" href="coreto-design-system.css">
<style>
:root{
  --navy:#0D1A2D;--navy-m:#152238;--navy-l:#1E3252;
  --gold:#C8A951;--gold-dim:rgba(200,169,81,.15);
  --white:#FFFFFF;--cream2:#F8F9FA;
  --ink:#202124;--muted:#5F6368;--faint:#80868B;
  --em:#059669;--em-bg:#ECFDF5;
  --am:#D97706;--am-bg:#FFFBEB;
  --rd:#DC2626;--rd-bg:#FEF2F2;
  --sk:#0284C7;--sk-bg:#F0F9FF;
  --vt:#7C3AED;--vt-bg:#F5F3FF;
  --bd:#E8EAED;--bd2:#DADCE0;
  --sw:240px;--r:10px;--r-sm:7px;
  --sh:0 1px 2px rgba(60,64,67,.1),0 1px 3px rgba(60,64,67,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:var(--white);color:var(--ink)}
a{color:inherit;text-decoration:none}

/* ─── SHELL ─── */
.shell{display:flex;height:100vh}








.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ─── TOPBAR ─── */
.top-bar{background:var(--white);border-bottom:1px solid var(--bd);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px;box-shadow:var(--sh)}
.top-left{display:flex;align-items:center;gap:12px}
.top-title{font-size:15px;font-weight:700;color:var(--navy)}
.top-sub{font-size:10px;color:var(--muted);margin-top:1px}
.role-switcher{display:flex;gap:4px;padding:3px;background:var(--cream2);border-radius:8px;border:1px solid var(--bd)}
.role-btn{padding:5px 14px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:.15s;font-family:'Outfit',sans-serif}
.role-btn.active{background:var(--white);color:var(--navy);box-shadow:var(--sh)}
.role-badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700}
.role-hq{background:var(--vt-bg);color:var(--vt)}
.role-ag{background:var(--sk-bg);color:var(--sk)}
.role-pt{background:var(--em-bg);color:var(--em)}

/* ─── CONTENT ─── */
.content{flex:1;overflow-y:auto;padding:24px 28px}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}

/* ─── STAT ─── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh)}
.stat-num{font-size:26px;font-weight:300;font-variant-numeric:tabular-nums}
.stat-lbl{font-size:10px;font-weight:600;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}

/* ─── CARD ─── */
.card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:16px;overflow:hidden}
.card-head{padding:14px 20px;border-bottom:1px solid var(--bd);background:var(--cream2);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink)}

/* ─── LEAD CARD ─── */
.lead-card{padding:16px 20px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .12s;display:flex;align-items:flex-start;gap:14px}
.lead-card:last-child{border-bottom:none}
.lead-card:hover{background:rgba(200,169,81,.03)}
.lead-card.selected{background:rgba(13,26,45,.04);border-left:3px solid var(--navy)}
.lc-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.lc-main{flex:1;min-width:0}
.lc-title{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:4px}
.lc-meta{font-size:11px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap;margin-bottom:6px}
.lc-actions{display:flex;gap:7px;margin-top:8px}

/* ─── TAB ─── */
.tab-bar{display:flex;border-bottom:2px solid var(--bd);margin-bottom:18px}
.tab{padding:10px 18px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s;display:flex;align-items:center;gap:6px}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--navy);border-bottom-color:var(--navy)}
.tab-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;background:var(--rd-bg);color:var(--rd)}

/* ─── BADGE ─── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.3px}
.b-em{background:var(--em-bg);color:var(--em)}
.b-am{background:var(--am-bg);color:var(--am)}
.b-rd{background:var(--rd-bg);color:var(--rd)}
.b-sk{background:var(--sk-bg);color:var(--sk)}
.b-vt{background:var(--vt-bg);color:var(--vt)}
.b-nt{background:var(--cream2);color:var(--muted)}
.b-navy{background:rgba(13,26,45,.08);color:var(--navy)}

/* ─── BTN ─── */
.btn{padding:7px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;border:none;transition:all .15s}
.btn-navy{background:var(--navy);color:var(--gold)}.btn-navy:hover{background:var(--navy-l)}
.btn-em{background:var(--em-bg);color:var(--em);border:1px solid rgba(5,150,105,.2)}.btn-em:hover{background:#D1FAE5}
.btn-am{background:var(--am-bg);color:var(--am);border:1px solid rgba(217,119,6,.2)}
.btn-rd{background:var(--rd-bg);color:var(--rd);border:1px solid rgba(220,38,38,.2)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--bd)}.btn-ghost:hover{background:var(--cream2)}
.btn-sm{padding:5px 11px;font-size:11px}

/* ─── FORM ─── */
.form-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.3px;margin-bottom:5px}
.form-input{width:100%;padding:8px 11px;border:1.5px solid var(--bd2);border-radius:7px;font-size:12px;font-family:'Outfit',sans-serif;color:var(--ink)}
.form-input:focus{outline:none;border-color:var(--navy)}
.form-textarea{width:100%;padding:10px 11px;border:1.5px solid var(--bd2);border-radius:7px;font-size:12px;font-family:'Outfit',sans-serif;color:var(--ink);resize:vertical;min-height:90px}
.form-textarea:focus{outline:none;border-color:var(--navy)}
.form-select{width:100%;padding:8px 11px;border:1.5px solid var(--bd2);border-radius:7px;font-size:12px;font-family:'Outfit',sans-serif;color:var(--ink);background:var(--white)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-row{margin-bottom:14px}

/* ─── AI PANEL ─── */
.ai-panel{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-l) 100%);border-radius:10px;padding:16px 18px;margin-bottom:12px}
.ai-panel-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.ai-thinking{display:flex;align-items:center;gap:10px;padding:16px}
.ai-thinking-dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--gold);animation:dot-bounce .8s infinite;margin:0 2px}
.ai-thinking-dots span:nth-child(2){animation-delay:.16s}
.ai-thinking-dots span:nth-child(3){animation-delay:.32s}
@keyframes dot-bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

/* ─── AGENT RANK ─── */
.rank-pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.rank-Platinum{background:var(--vt-bg);color:var(--vt)}
.rank-Gold{background:#FFFBEB;color:#92400E}
.rank-Silver{background:var(--cream2);color:#374151}
.rank-Bronze{background:#FFF7ED;color:#9A3412}

/* ─── MODAL ─── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:var(--white);border-radius:14px;width:580px;max-height:85vh;overflow-y:auto;padding:26px;box-shadow:0 8px 40px rgba(0,0,0,.25)}
.modal-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:4px}
.modal-sub{font-size:11px;color:var(--muted);margin-bottom:18px}

/* ─── PT POST ─── */
.method-card{border:2px solid var(--bd);border-radius:10px;padding:14px 16px;cursor:pointer;transition:.15s}
.method-card.selected{border-color:var(--navy);background:rgba(13,26,45,.03)}
.method-card:hover{border-color:var(--bd2);background:var(--cream2)}

/* ─── AG LEAD ─── */
.ag-lead{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:18px 20px;margin-bottom:12px;box-shadow:var(--sh)}
.ag-lead-title{font-size:13px;font-weight:700;margin-bottom:6px}
.ag-meta{font-size:11px;color:var(--muted);display:flex;gap:12px;margin-bottom:10px}

/* ─── MONITOR ─── */
.monitor-section{background:var(--cream2);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;margin-bottom:14px}
.monitor-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:12px}
.weight-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.weight-label{font-size:11px;color:var(--muted);width:200px;flex-shrink:0}
.weight-track{flex:1;height:8px;background:var(--bd);border-radius:4px;overflow:hidden}
.weight-fill{height:100%;border-radius:4px}
.weight-val{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);width:40px;text-align:right}

/* ─── MOBILE ─── */
.mob-ham{display:none;flex-direction:column;justify-content:center;width:36px;height:36px;cursor:pointer;background:transparent;border:none;flex-shrink:0}
.mob-ham span{display:block;width:18px;height:2px;background:var(--muted);margin:3px 0;border-radius:1px}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:150}
.mob-overlay.show{display:block}
@media(max-width:768px){
  .mob-ham{display:flex}
  
  .sb.open{left:0}
  .stat-grid{grid-template-columns:1fr 1fr}
  .form-grid{grid-template-columns:1fr}
  .content{padding:12px}
}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:24px;right:24px;padding:11px 18px;border-radius:9px;font-size:12px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.2);opacity:0;transition:.3s;z-index:999;pointer-events:none;max-width:360px;line-height:1.5;color:#fff}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="mob-overlay" id="mob-overlay" onclick="closeSb()"></div>
<div class="shell">

<nav class="sb">
  <div class="sb-head">
    <div class="sb-logo">CORE<br>BLDG</div>
    <div class="sb-ver">v2.0 — CORETO</div>
  </div>
  <div class="sb-user">
    <div class="sb-av" id="sb-av">—</div>
    <div style="overflow:hidden">
      <div class="sb-uname" id="sb-name">—</div>
      <div class="sb-ur" id="sb-role">—</div>
    </div>
  </div>
  <div class="sb-nav" id="sb-nav"></div>
</nav>

<div class="main">
  <div class="top-bar">
    <button class="mob-ham" onclick="toggleSb()"><span></span><span></span><span></span></button>
    <div class="top-left">
      <div>
        <div class="top-title">🤖 PTマッチング</div>
        <div class="top-sub">PT投稿 → AI自動マッチング → AG確定</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="role-switcher">
        <button class="role-btn active" id="rbtn-hq" onclick="switchRole('hq')">HQ</button>
        <button class="role-btn" id="rbtn-ag" onclick="switchRole('ag')">AG</button>
        <button class="role-btn" id="rbtn-pt" onclick="switchRole('pt')">PT</button>
      </div>
      <span id="role-badge" class="badge role-badge role-hq">HQ管理者</span>
    </div>
  </div>

  <div class="content" id="main-content">
    <div style="text-align:center;padding:60px;color:var(--faint)">読み込み中...</div>
  </div>
</div>
</div>

<!-- AI判定モーダル -->
<div class="modal-overlay" id="ai-modal">
  <div class="modal-box">
    <div class="modal-title" id="modal-lead-id">AI判定結果</div>
    <div class="modal-sub">Role B — AIマッチングエンジン最終判定</div>
    <div id="ai-modal-body"></div>
    <div style="display:flex;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-ghost" onclick="closeAiModal()">閉じる</button>
    </div>
  </div>
</div>

<!-- 確認モーダル -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal-box" style="width:440px">
    <div class="modal-title" id="cfm-title">マッチング確定</div>
    <div class="modal-sub" id="cfm-sub"></div>
    <div id="cfm-body"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:18px">
      <button class="btn btn-ghost" onclick="closeConfirmModal()">キャンセル</button>
      <button class="btn btn-em" onclick="executeMatch()">✅ 確定する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  var _role = sessionStorage.getItem('coreto_role') || '';
  var _allowed = ["hq", "re_ag", "hr_ag", "hikari_ag"]; // #13修正: AGもPT紹介マッチングを確認可能
  if (_allowed.length && !_allowed.includes(_role)) {
    location.replace('coreto-hub-v2.html?unauthorized=1');
  }
})();

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
var currentRole = 'hq';
var currentTab  = 'board';
var selectedLeadId = null;
var pendingMatch   = null;

// ══════════════════════════════════════════════════════════════
// STORAGE
// ══════════════════════════════════════════════════════════════
var LS_LEADS  = 'CORETO_MATCHING_LEADS';
var LS_AGENTS = 'CORETO_MATCHING_AGENTS';

function lsGet(k){ try{ return JSON.parse(localStorage.getItem(k)||'null'); }catch(e){ return null; } }
function lsSet(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
function getLeads()  { return lsGet(LS_LEADS)  || initDemoLeads();  }
function getAgents() { return lsGet(LS_AGENTS) || initDemoAgents(); }
function saveLeads(v)  { lsSet(LS_LEADS,  v); }
function saveAgents(v) { lsSet(LS_AGENTS, v); }

// ══════════════════════════════════════════════════════════════
// DEMO DATA
// ══════════════════════════════════════════════════════════════
function initDemoAgents(){
const agents = []; /* 動的生成 */
  lsSet(LS_AGENTS, agents);
  return agents;
}

function initDemoLeads(){
const leads = []; /* 動的生成 */
  lsSet(LS_LEADS, leads);
  return leads;
}

// ══════════════════════════════════════════════════════════════
// ROLE SWITCH
// ══════════════════════════════════════════════════════════════
function switchRole(role){
  currentRole = role;
  currentTab  = (role === 'pt') ? 'post' : 'board';
  selectedLeadId = null;

  ['hq','ag','pt'].forEach(function(r){
    document.getElementById('rbtn-'+r).classList.toggle('active', r===role);
  });

  var badge  = document.getElementById('role-badge');
  var labels = {hq:'HQ管理者', ag:'エージェント', pt:'パートナー'};
  var clses  = {hq:'role-hq',  ag:'role-ag',       pt:'role-pt'};
  badge.textContent = labels[role];
  badge.className   = 'badge role-badge '+clses[role];

  renderMain();
}

// ══════════════════════════════════════════════════════════════
// RENDER ROUTER
// ══════════════════════════════════════════════════════════════
function renderMain(){
  var el = document.getElementById('main-content');
  if(!el) return;
  if(currentRole === 'hq')      el.innerHTML = renderHQ();
  else if(currentRole === 'ag') el.innerHTML = renderAG();
  else                          el.innerHTML = renderPT();
}

function switchTab(tab){
  currentTab = tab;
  renderMain();
}

// ══════════════════════════════════════════════════════════════
// HQ VIEW
// ══════════════════════════════════════════════════════════════
function renderHQ(){
  var leads   = getLeads();
  var pending = leads.filter(function(l){ return !['matched','closed'].includes(l.status); });
  var matched = leads.filter(function(l){ return l.status==='matched'; });
  var agents  = getAgents();

  var tabs = [
    {k:'board',   label:'📋 案件ボード',    cnt:pending.length},
    {k:'matched', label:'✅ マッチング済み', cnt:matched.length},
    {k:'monitor', label:'📊 AIモニター',     cnt:0},
  ];

  var statHtml = '<div class="stat-grid">'
    +'<div class="stat-card"><div class="stat-num" style="color:var(--rd)">'+pending.filter(function(l){return l.status==='unmatched';}).length+'</div><div class="stat-lbl">未マッチ / 要対応</div></div>'
    +'<div class="stat-card"><div class="stat-num" style="color:var(--em)">'+matched.length+'</div><div class="stat-lbl">マッチング済み</div></div>'
    +'<div class="stat-card"><div class="stat-num" style="color:var(--sk)">'+agents.filter(function(a){return a.status==='active';}).length+'</div><div class="stat-lbl">稼働中AG</div></div>'
    +'<div class="stat-card"><div class="stat-num" style="color:var(--vt)">'+Math.round(agents.reduce(function(s,a){return s+a.elo;},0)/agents.length)+'</div><div class="stat-lbl">平均ELO</div></div>'
    +'</div>';

  var tabHtml = '<div class="tab-bar">'
    +tabs.map(function(t){
      return '<div class="tab'+(currentTab===t.k?' active':'')+'" onclick="switchTab(\''+t.k+'\')">'
        +t.label+(t.cnt>0?'<span class="tab-badge">'+t.cnt+'</span>':'')
        +'</div>';
    }).join('')
    +'</div>';

  var bodyHtml = '';
  if(currentTab === 'board')   bodyHtml = renderHQBoard(pending);
  if(currentTab === 'matched') bodyHtml = renderHQMatched(matched);
  if(currentTab === 'monitor') bodyHtml = renderMonitor();

  return statHtml + tabHtml + bodyHtml;
}

function renderHQBoard(pending){
  if(!pending.length) return '<div style="text-align:center;padding:48px;color:var(--faint)"><div style="font-size:32px;margin-bottom:8px">🎉</div><div>未対応案件はありません</div></div>';

  return '<div class="card"><div class="card-head"><div class="card-title">案件ボード — '+pending.length+'件</div><button class="btn btn-ghost btn-sm" onclick="renderMain()">🔄 更新</button></div>'
    +pending.map(function(l){ return renderLeadCard(l); }).join('')
    +'</div>';
}

function renderLeadCard(l){
  var statusBadge = {
    pending_ai:  '<span class="badge b-sk">🤖 AI処理中</span>',
    unmatched:   '<span class="badge b-rd">🔴 未マッチ</span>',
    analyzing:   '<span class="badge b-am">🔍 解析中</span>',
    scoring:     '<span class="badge b-am">📊 スコアリング</span>',
    ai_ranking:  '<span class="badge b-vt">✨ AI判定中</span>',
    needs_hq:    '<span class="badge b-rd">⚠️ HQ要対応</span>',
    matched:     '<span class="badge b-em">✅ 確定済み</span>',
  }[l.status] || '<span class="badge b-nt">'+l.status+'</span>';

  var typeIcon = l.type === 'rental' ? '🏠' : '🤝';
  var aiBtn = l._aiRanking
    ? '<button class="btn btn-ghost btn-sm" onclick="openAiModal(\''+l.id+'\')">📊 AI結果</button>'
    : (l.status==='pending_ai'||l.status==='unmatched')
      ? '<button class="btn btn-am btn-sm" onclick="startAutoMatch(\''+l.id+'\')">🤖 AIマッチ実行</button>'
      : '';
  var manualBtn = (l.status==='unmatched'||l.status==='needs_hq')
    ? '<button class="btn btn-navy btn-sm" onclick="openManualMatch(\''+l.id+'\')">👤 手動確定</button>'
    : '';

  return '<div class="lead-card'+(selectedLeadId===l.id?' selected':'')+'" onclick="selectedLeadId=\''+l.id+'\';renderMain()">'
    +'<div class="lc-icon" style="background:var(--sk-bg)">'+typeIcon+'</div>'
    +'<div class="lc-main">'
    +'<div class="lc-title">'+l.title+'</div>'
    +'<div class="lc-meta">'
    +'<span>PT: '+l.ptName+'</span>'
    +'<span>エリア: '+l.area+'</span>'
    +'<span>予算: '+l.budget.toLocaleString()+'円</span>'
    +'<span style="font-family:\'DM Mono\',monospace;font-size:10px;color:var(--faint)">'+l.id+'</span>'
    +'</div>'
    +statusBadge
    +(l._aiAnalysis ? '<div style="font-size:11px;color:var(--muted);margin-top:6px">'+l._aiAnalysis.summary+'</div>' : '')
    +'<div class="lc-actions">'+aiBtn+manualBtn+'</div>'
    +'</div></div>';
}

function renderHQMatched(matched){

// MATCHING ACTIONS
// ══════════════════════════════════════════════════════════════
function agAccept(leadId){
  var leads = getLeads();
  var lead  = leads.find(function(l){ return l.id===leadId; });
  if(!lead) return;
  lead.status         = 'matched';
  lead.assignedAgId = sessionStorage.getItem('coreto_user_id') || '';
  lead.assignedAgName = sessionStorage.getItem('coreto_name') || '';
  lead.matchedAt      = new Date().toLocaleString('ja-JP');
  saveLeads(leads);
  showToast('✅ 対応を承諾しました。クライアント情報が開示されます。');
  renderMain();
}

function agDecline(leadId){
  var leads = getLeads();
  var lead  = leads.find(function(l){ return l.id===leadId; });
  if(lead){ lead.status='unmatched'; lead.method='board'; saveLeads(leads); renderMain(); }
  showToast('辞退しました。HQに通知されます。','info');
}

function openManualMatch(leadId){
  var agents = getAgents();
  var leads  = getLeads();
  var lead   = leads.find(function(l){ return l.id===leadId; });
  if(!lead) return;

  document.getElementById('cfm-title').textContent = '手動マッチング: '+lead.title;
  document.getElementById('cfm-sub').textContent   = '担当AGを選択してください';
  document.getElementById('cfm-body').innerHTML    =
    '<div style="margin-bottom:12px"><select id="manual-ag-select" class="form-select">'
    +agents.map(function(a){ return '<option value="'+a.id+'">'+a.name+' ('+a.rank+' / ELO:'+a.elo+')</option>'; }).join('')
    +'</select></div>';

  pendingMatch = {leadId:leadId, type:'manual'};
  document.getElementById('confirm-modal').classList.add('show');
}

function executeMatch(){
  if(!pendingMatch) return;
  var leads  = getLeads();
  var agents = getAgents();
  var lead   = leads.find(function(l){ return l.id===pendingMatch.leadId; });
  if(!lead){ closeConfirmModal(); return; }

  var agId, agName;
  if(pendingMatch.type === 'manual'){
    var sel = document.getElementById('manual-ag-select');
    agId  = sel ? sel.value : '';
    var ag = agents.find(function(a){ return a.id===agId; });
    agName = ag ? ag.name : agId;
  } else {
    agId   = pendingMatch.agId;
    agName = pendingMatch.agName;
  }

  if(!agId){ showToast('AGを選択してください','warn'); return; }

  lead.status         = 'matched';
  lead.assignedAgId   = agId;
  lead.assignedAgName = agName;
  lead.matchedAt      = new Date().toLocaleString('ja-JP');
  saveLeads(leads);
  closeConfirmModal();
  showToast('🎉 マッチング確定！'+agName+' が担当します。');
  renderMain();
}

function closeConfirmModal(){
  document.getElementById('confirm-modal').classList.remove('show');
  pendingMatch = null;
}

// ══════════════════════════════════════════════════════════════
// AI AUTO MATCH
// ══════════════════════════════════════════════════════════════
async function startAutoMatch(leadId){
  var leads  = getLeads();
  var agents = getAgents();
  var lead   = leads.find(function(l){ return l.id===leadId; });
  if(!lead) return;

  // Step1: 解析
  lead.status = 'analyzing';
  saveLeads(leads);
  renderMain();

  await sleep(600);

  lead._aiAnalysis = {
    estimatedDifficulty: Math.floor(Math.random()*5)+4,
    urgencyLevel:        Math.floor(Math.random()*5)+3,
    summary:             'AI解析完了 — 外国人対応・英語スキル重視の案件'
  };
  lead.status = 'scoring';
  saveLeads(leads);
  renderMain();

  await sleep(800);

  // Step2: スコアリング
  var scored = agents.map(function(ag){
    var score = ag.elo/20 + ag.recentConversionRate*30 + ag.avgRating*5;
    return {ag:ag, score:Math.round(score)};
  }).sort(function(a,b){ return b.score-a.score; });

  lead._algoResult = scored;
  lead.status = 'ai_ranking';
  saveLeads(leads);
  renderMain();

  await sleep(1000);

  // Step3: AI最終判定
  var top = scored[0];
  lead._aiRanking = {
    summary:'AIマッチング完了。'+top.ag.name+'AGを最適候補として選定しました。',
    matchConfidence: 0.88 + Math.random()*0.1,
    selected:[{
      agentId:top.ag.id, agentName:top.ag.name, rank:top.ag.rank,
      score:top.score,
      reason:top.ag.name+'はELO'+top.ag.elo+'・成約率'+Math.round(top.ag.recentConversionRate*100)+'%で最高スコア。',
      expectedOutcome:'成約率'+Math.round(top.ag.recentConversionRate*100)+'% 見込み'
    }],
    hqAlertNeeded:false
  };

  // Step4: 自動確定
  lead.status         = 'matched';
  lead.assignedAgId   = top.ag.id;
  lead.assignedAgName = top.ag.name;
  lead.matchedAt      = new Date().toLocaleString('ja-JP');
  saveLeads(leads);
  renderMain();
  showToast('✅ AI自動マッチング完了！'+top.ag.name+' が担当します。');
}

function sleep(ms){ return new Promise(function(r){ setTimeout(r,ms); }); }

// WEEKLY REVIEW
// ══════════════════════════════════════════════════════════════
async function runWeeklyReview(){
  var el = document.getElementById('monitor-ai-result');
  if(!el) return;
  el.innerHTML = '<div class="ai-panel"><div class="ai-thinking"><div class="ai-thinking-dots"><span></span><span></span><span></span></div><div style="color:rgba(255,255,255,.7);font-size:12px">🤖 AIがアルゴリズムを分析中...</div></div></div>';

  try {
    var agents = getAgents();
    var res  = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:600,
        messages:[{role:'user',content:'COREBLDGマッチングエンジンの週次分析。エージェントデータ: '
          +JSON.stringify(agents.map(function(a){return {id:a.id,rank:a.rank,elo:a.elo,conv:a.recentConversionRate};}))
          +' 重み配分（成約力30/適合25/信頼20/承諾20/相性15/キャパ10）を日本語250字で分析してください。'}]})
    });
    var data = await res.json();
    var text = data.content[0].text;
    el.innerHTML = '<div class="ai-panel"><div class="ai-panel-title">🤖 AI週次分析レポート</div>'
      +'<div style="font-size:11px;color:rgba(255,255,255,.85);line-height:1.8;white-space:pre-wrap">'+text+'</div></div>';
  } catch(e) {
    el.innerHTML = '<div style="color:var(--rd);font-size:11px;padding:12px">分析に失敗しました: '+e.message+'</div>';
  }
}

// TOAST
// ══════════════════════════════════════════════════════════════
function showToast(msg, type){
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = type==='warn'?'#D97706':type==='info'?'#0284C7':'#059669';
  el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 3500);
}
