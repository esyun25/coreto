<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>COREBLDG — AI マッチング</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0D1A2D;--navy-m:#152238;--navy-l:#1E3252;
  --gold:#C8A951;--gold-dim:rgba(200,169,81,.15);
  --ink:#202124;--muted:#5F6368;--faint:#80868B;
  --em:#059669;--em-bg:#ECFDF5;--am:#D97706;--am-bg:#FFFBEB;
  --rd:#DC2626;--rd-bg:#FEF2F2;--sk:#0284C7;--sk-bg:#F0F9FF;
  --vt:#7C3AED;--vt-bg:#F5F3FF;--pk:#DB2777;--pk-bg:#FDF2F8;
  --cream:#FFFFFF;--cream2:#F8F9FA;--bd:#E8EAED;--bd2:#DADCE0;
  --sw:240px;--sh:0 1px 2px rgba(60,64,67,.1),0 1px 3px rgba(60,64,67,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:var(--cream2)}
.shell{display:flex;height:100vh}

/* ── サイドバー ── */
.sb{width:var(--sw);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;position:relative}
.sb::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;
  background:linear-gradient(180deg,rgba(200,169,81,.25) 0%,rgba(200,169,81,.06) 50%,transparent 100%)}
.sb-head{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;letter-spacing:5px;color:var(--gold)}
.sb-ver{font-size:9px;letter-spacing:2px;color:rgba(200,169,81,.3);font-family:'DM Mono',monospace;margin-top:2px}
.sb-nav{flex:1;overflow-y:auto;padding:6px 10px}
.nav-sec{font-size:9px;font-weight:700;letter-spacing:1.5px;color:rgba(255,255,255,.2);padding:14px 11px 5px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:8px;
  font-size:12px;font-weight:500;color:rgba(255,255,255,.55);transition:.15s;text-decoration:none;margin-bottom:2px;cursor:pointer}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.nav-item.active{background:var(--gold-dim);color:var(--gold)}
.sb-foot{padding:14px 12px;border-top:1px solid rgba(255,255,255,.06)}
.sb-user{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  border-radius:9px;padding:9px 11px;display:flex;align-items:center;gap:9px}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--gold-dim);
  border:1px solid rgba(200,169,81,.25);display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:700;color:var(--gold);flex-shrink:0}
.sb-uname{font-size:11px;font-weight:600;color:rgba(255,255,255,.8)}
.sb-urole{font-size:9px;color:rgba(255,255,255,.3);font-family:'DM Mono',monospace}

/* ── メイン ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.top-bar{background:#fff;border-bottom:1px solid var(--bd);padding:0 28px;height:52px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.top-title{font-size:15px;font-weight:700;color:var(--navy)}
.top-sub{font-size:10px;color:var(--muted);margin-top:1px}
.role-badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700}
.role-hq{background:var(--gold-dim);color:var(--gold)}
.role-ag{background:var(--sk-bg);color:var(--sk)}
.role-pt{background:var(--vt-bg);color:var(--vt)}
.content{flex:1;overflow-y:auto;padding:24px 28px}

/* ── タブ ── */
.tab-bar{display:flex;border-bottom:2px solid var(--bd);margin-bottom:20px}
.tab{padding:10px 20px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s;display:flex;align-items:center;gap:6px}
.tab:hover{color:var(--navy)}
.tab.active{color:var(--navy);border-bottom-color:var(--navy)}
.tab-badge{background:var(--rd);color:#fff;font-size:9px;font-weight:700;
  padding:1px 6px;border-radius:10px;font-family:'DM Mono',monospace}

/* ── カード ── */
.card{background:#fff;border:1px solid var(--bd);border-radius:12px;box-shadow:var(--sh);margin-bottom:18px;overflow:hidden}
.card-head{padding:14px 18px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;gap:12px}
.card-title{font-size:13px;font-weight:700;color:var(--navy)}
.card-body{padding:18px}

/* ── ボタン ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;
  font-size:12px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;border:none;transition:.15s}
.btn-navy{background:var(--navy);color:var(--gold)}
.btn-navy:hover{background:var(--navy-m)}
.btn-navy:disabled{opacity:.4;cursor:not-allowed}
.btn-em{background:var(--em-bg);color:var(--em);border:1px solid rgba(5,150,105,.2)}
.btn-em:hover{background:#d1fae5}
.btn-am{background:var(--am-bg);color:var(--am);border:1px solid rgba(217,119,6,.2)}
.btn-rd{background:var(--rd-bg);color:var(--rd);border:1px solid rgba(220,38,38,.15)}
.btn-sk{background:var(--sk-bg);color:var(--sk);border:1px solid rgba(2,132,199,.2)}
.btn-vt{background:var(--vt-bg);color:var(--vt);border:1px solid rgba(124,58,237,.2)}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--bd2)}
.btn-ghost:hover{border-color:var(--navy);color:var(--navy)}
.btn-sm{padding:6px 13px;font-size:11px}

/* ── フォーム ── */
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.form-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.4px}
.form-label .req{color:var(--rd);margin-left:2px}
.form-input,.form-select,.form-textarea{padding:9px 12px;border:1.5px solid var(--bd2);border-radius:8px;
  font-size:13px;font-family:'Outfit',sans-serif;color:var(--ink);background:#fff;transition:.15s;width:100%}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--navy);
  box-shadow:0 0 0 3px rgba(13,26,45,.06)}
.form-textarea{resize:vertical;min-height:80px}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* ── バッジ ── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700}
.b-em{background:var(--em-bg);color:var(--em)}
.b-am{background:var(--am-bg);color:var(--am)}
.b-rd{background:var(--rd-bg);color:var(--rd)}
.b-sk{background:var(--sk-bg);color:var(--sk)}
.b-vt{background:var(--vt-bg);color:var(--vt)}
.b-navy{background:var(--gold-dim);color:var(--gold)}
.b-nt{background:var(--cream2);color:var(--muted);border:1px solid var(--bd)}

/* ── 案件カード ── */
.lead-card{border:1.5px solid var(--bd);border-radius:10px;padding:14px 16px;
  margin-bottom:10px;cursor:pointer;transition:.15s;position:relative}
.lead-card:hover{border-color:var(--navy);background:#F8FAFF}
.lead-card.selected{border-color:var(--sk);background:var(--sk-bg);box-shadow:0 0 0 3px rgba(2,132,199,.08)}
.lead-card.urgent{border-color:var(--rd);border-left:3px solid var(--rd)}
.lead-id{font-family:'DM Mono',monospace;font-size:9px;color:var(--faint)}
.lead-title{font-size:13px;font-weight:700;color:var(--navy);margin:4px 0}
.lead-sub{font-size:11px;color:var(--muted)}
.lead-meta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;align-items:center}
.method-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;
  border-radius:12px;font-size:10px;font-weight:600}
.method-board{background:#EFF6FF;color:#1D4ED8}
.method-direct{background:var(--vt-bg);color:var(--vt)}

/* ── AGカード ── */
.ag-card{border:1.5px solid var(--bd);border-radius:10px;padding:12px 14px;
  margin-bottom:8px;cursor:pointer;transition:.15s}
.ag-card:hover{border-color:var(--navy);background:#F8FAFF}
.ag-card.ai-pick{border-color:var(--gold);background:rgba(200,169,81,.04)}
.ag-card.ai-pick::before{content:'✨ AI選定';position:absolute;top:-1px;right:10px;
  background:var(--gold);color:var(--navy);font-size:9px;font-weight:700;
  padding:2px 8px;border-radius:0 0 6px 6px}
.ag-card{position:relative}
.ag-score-bar{height:4px;border-radius:2px;background:var(--bd);margin-top:8px;overflow:hidden}
.ag-score-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--sk),var(--em));transition:.8s}

/* ── AI解析パネル ── */
.ai-panel{background:linear-gradient(135deg,#0D1A2D 0%,#1E3252 100%);
  border-radius:12px;padding:16px 18px;margin-bottom:16px;color:#fff}
.ai-panel-title{font-size:11px;font-weight:700;letter-spacing:1px;
  color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ai-tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:12px;
  font-size:10px;font-weight:600;margin:2px 3px 2px 0}
.ai-urgency-bar{height:6px;border-radius:3px;background:rgba(255,255,255,.15);margin:6px 0;overflow:hidden}
.ai-urgency-fill{height:100%;border-radius:3px}

/* ── スコア内訳 ── */
.score-breakdown{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.score-item{background:var(--cream2);border-radius:7px;padding:8px 10px}
.score-item-label{font-size:9px;color:var(--muted);font-weight:600;letter-spacing:.3px}
.score-item-val{font-size:16px;font-weight:700;color:var(--navy);font-variant-numeric:tabular-nums}
.score-item-max{font-size:9px;color:var(--faint)}

/* ── AI思考アニメーション ── */
.ai-thinking{display:flex;align-items:center;gap:10px;padding:14px 18px;
  background:linear-gradient(135deg,#0D1A2D,#1E3252);border-radius:10px;margin-bottom:12px}
.ai-thinking-dots{display:flex;gap:4px}
.ai-thinking-dots span{width:6px;height:6px;border-radius:50%;background:var(--gold);
  animation:dot-bounce 1.4s infinite ease-in-out}
.ai-thinking-dots span:nth-child(2){animation-delay:.2s}
.ai-thinking-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot-bounce{0%,80%,100%{transform:scale(0.6);opacity:.4}40%{transform:scale(1);opacity:1}}

/* ── ステータス ── */
.status-flow{display:flex;gap:4px;align-items:center;flex-wrap:wrap;margin-top:8px}
.status-step{padding:4px 10px;border-radius:12px;font-size:10px;font-weight:600;
  background:var(--cream2);color:var(--muted);border:1px solid var(--bd)}
.status-step.done{background:var(--em-bg);color:var(--em);border-color:rgba(5,150,105,.2)}
.status-step.current{background:var(--sk-bg);color:var(--sk);border-color:rgba(2,132,199,.2)}
.status-arrow{color:var(--faint);font-size:10px}

/* ── サマリー ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:14px 16px;box-shadow:var(--sh)}
.stat-num{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:2px}

/* ── モニタータブ ── */
.monitor-card{background:#fff;border:1px solid var(--bd);border-radius:12px;
  padding:16px 18px;margin-bottom:14px;box-shadow:var(--sh)}
.algo-weight-bar{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.algo-weight-label{font-size:11px;font-weight:600;color:var(--ink);width:100px;flex-shrink:0}
.algo-weight-track{flex:1;height:8px;background:var(--bd);border-radius:4px;overflow:hidden}
.algo-weight-fill{height:100%;border-radius:4px}
.algo-weight-val{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);width:40px;text-align:right}

/* ── トースト ── */
.toast{position:fixed;bottom:24px;right:24px;padding:11px 18px;border-radius:9px;
  font-size:12px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.2);
  opacity:0;transition:.3s;z-index:999;pointer-events:none;max-width:360px;line-height:1.5}
.toast.show{opacity:1}

/* ── ロール切替 ── */
.role-switcher{display:flex;gap:6px;padding:4px;background:var(--cream2);border-radius:9px;border:1px solid var(--bd)}
.role-btn{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;
  border:none;background:transparent;color:var(--muted);transition:.15s;font-family:'Outfit',sans-serif}
.role-btn.active{background:#fff;color:var(--navy);box-shadow:var(--sh)}

@media(max-width:768px){.sb{display:none}.stat-grid{grid-template-columns:1fr 1fr}.form-grid-2,.form-grid-3{grid-template-columns:1fr}}
</style>
</head>

// MATCHING ENGINE — Layer 1: Hard Filter
// ══════════════════════════════════════════════════════════════
function hardFilter(agents, lead){
  const rankOrder = {Bronze:1,Silver:2,Gold:3,Platinum:4};
  const caps = {Platinum:99,Gold:12,Silver:8,Bronze:5};
  return agents.filter(ag => {
    if(lead.type==='rental'&&ag.type==='HR') return false;
    if(lead.type==='hr'&&ag.type==='RE') return false;
    if(lead.type==='sale'&&ag.type==='HR') return false;
    if(ag.activeCases >= caps[ag.rank]) return false;
    if(lead.minRank && rankOrder[ag.rank] < rankOrder[lead.minRank]) return false;
    if(ag.status !== 'active') return false;
    return true;
  });
}

// ══════════════════════════════════════════════════════════════
// Layer 2: Multi-dimensional Scoring (120pt)
// ══════════════════════════════════════════════════════════════
function calculateMatchScore(ag, lead){
  // [A] 成約力スコア 30点
  const eloNorm = Math.max(0,Math.min(1,(ag.elo-800)/(2400-800)));
  const convRate = ag.recentConversionRate || 0.5;
  const closingPower = (eloNorm*0.4 + convRate*0.6) * 30;

  // [B] 適合スコア 25点
  const areaScore = calcAreaScore(ag, lead);
  const typeExp = (lead.type==='rental'&&ag.primaryType==='rental')
    || (lead.type==='hr'&&ag.primaryType==='hr')
    || (lead.type==='sale'&&ag.primaryType==='sale') ? 0.85 : 0.35;
  const budgetFit = calcBudgetFitScore(ag, lead);
  const fitScore = (areaScore*0.5 + typeExp*0.35 + budgetFit*0.15) * 25;

  // [C] 信頼性スコア 20点
  const n = ag.reviewCount || 0;
  const CONF_N = 8; const PLAT_AVG = 4.2;
  const bayesRating = (n*(ag.avgRating||4.0) + CONF_N*PLAT_AVG) / (n+CONF_N);
  const complRate = ag.completionRate || 0.9;
  const respScore = Math.max(0,1-(ag.avgResponseMin||30)/120);
  const trustScore = (bayesRating/5*0.5 + complRate*0.35 + respScore*0.15) * 20;

  // [D] 承諾確率スコア 20点
  const acceptProb = predictAcceptProb(ag, lead);
  const acceptanceScore = acceptProb * 20;

  // [E] 相性スコア 15点（簡易協調フィルタリング）
  const affinity = calcAffinityScore(ag, lead);
  const affinityScore = affinity * 15;

  // [F] キャパシティスコア 10点
  const caps = {Platinum:99,Gold:12,Silver:8,Bronze:5};
  const cap = caps[ag.rank];
  const load = ag.activeCases / cap;
  const capacityScore = load < 0.7
    ? 10
    : 10 * Math.pow(Math.max(0,1-load),2) / 0.09;

  const total = closingPower+fitScore+trustScore+acceptanceScore+affinityScore+capacityScore;

  return {
    total: Math.min(120, total),
    breakdown:{
      closingPower:  +closingPower.toFixed(1),
      fitScore:      +fitScore.toFixed(1),
      trustScore:    +trustScore.toFixed(1),
      acceptanceScore:+acceptanceScore.toFixed(1),
      affinityScore: +affinityScore.toFixed(1),
      capacityScore: +capacityScore.toFixed(1),
    }
  };
}

function calcAreaScore(ag, lead){
  if(ag.type==='HR') return 0.8; // HR-AGはエリア不問
  if(ag.areas.includes(lead.area)) return 1.0;
  if(ag.areas.some(a=>AREA_GRAPH.adjacent(a,lead.area))) return 0.7;
  return 0.3;
}

function calcBudgetFitScore(ag, lead){
  // エージェントの過去成約平均予算帯との適合（デモでは簡易計算）
  if(!lead.budget) return 0.7;
  // Platinumは高予算得意、Bronzeは低予算得意（仮定）
  const budgetPerf = {Platinum:300000,Gold:200000,Silver:130000,Bronze:90000};
  const agPref = budgetPerf[ag.rank]||130000;
  const diff = Math.abs(lead.budget - agPref) / Math.max(lead.budget, agPref);
  return Math.max(0.3, 1 - diff);
}

function predictAcceptProb(ag, lead){
  const typeProb = ag.acceptanceByType?.[lead.type] ?? 0.65;
  const loadFactor = Math.max(0.4, 1 - ag.activeCases/10*0.3);
  const areaPref = ag.areas.includes(lead.area) ? 1.1 : 0.85;
  return Math.min(0.98, typeProb * loadFactor * areaPref);
}

function calcAffinityScore(ag, lead){
  // 同PT過去取引があるほど高い（デモ: ptReputationベース）
  const ptRep = (lead.ptReputation||4.0) / 5;
  // 案件タイプ×エリアの実績補正（デモ: ELOとratingの組み合わせ）
  const expMatch = ag.areas.includes(lead.area) && ag.primaryType===lead.type ? 1.0 : 0.6;
  return ptRep * 0.4 + expMatch * 0.6;
}

// ══════════════════════════════════════════════════════════════
// Layer 3: Thompson Sampling + Exploration Bonus
// ══════════════════════════════════════════════════════════════
function sampleBeta(alpha, beta){
  // 簡易βサンプリング（Box-Muller近似）
  const x = gammaSample(alpha);
  const y = gammaSample(beta);
  return x/(x+y);
}
function gammaSample(a){
  if(a<1) return gammaSample(1+a)*Math.pow(Math.random(),1/a);
  const d=a-1/3, c=1/Math.sqrt(9*d);
  while(true){
    let x,v;
    do{ x=(Math.random()*2-1)*3.464; v=1+c*x; }while(v<=0);
    v=v*v*v;
    const u=Math.random();
    if(u<1-0.331*(x*x)*(x*x)) return d*v;
    if(Math.log(u)<0.5*x*x+d*(1-v+Math.log(v))) return d*v;
  }
}

function explorationAdjustedRanking(scoredAgs){
  return scoredAgs.map(item => {
    const ag = item.ag;
    let explorationBonus = 0;

    // 新人ボーナス（登録90日以内 + 成約5件未満）
    const isNewbie = ag.daysRegistered < 90 && ag.totalCases < 5;
    if(isNewbie){
      const prob = Math.max(0, 0.3 - ag.totalCases*0.06);
      if(Math.random() < prob) explorationBonus = 12;
    }

    // Thompson Sampling
    const alpha = (ag.closedCases||0) + 1;
    const beta  = Math.max(1,(ag.totalCases||1)-(ag.closedCases||0)) + 1;
    const thompson = sampleBeta(alpha, beta);

    return {
      ...item,
      finalScore: item.score.total + explorationBonus,
      thompson,
      explorationBonus,
      expectedValue: item.score.total * predictAcceptProb(ag,item.lead||{type:'rental'}),
    };
  }).sort((a,b)=>(b.finalScore*0.75+b.thompson*30*0.25)-(a.finalScore*0.75+a.thompson*30*0.25));
}

      </div>`).join('')}
  </div>
  <div id="tab-content">
    ${currentTab==='board'   ? renderHQBoard(pending)  : ''}
    ${currentTab==='matched' ? renderHQMatched(matched) : ''}
    ${currentTab==='monitor' ? renderMonitor()          : ''}
  </div>`;
}

function renderStatBar(leads){
  const agents = getAgents();
  const pending = leads.filter(l=>l.status==='pending_ai'||l.status==='unmatched').length;
  const matched = leads.filter(l=>l.status==='matched').length;
  const activeAg = agents.filter(a=>a.status==='active').length;
  const avgElo = Math.round(agents.reduce((s,a)=>s+a.elo,0)/agents.length);
  return `
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-num" style="color:var(--rd)">${pending}</div><div class="stat-lbl">未マッチ案件</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--em)">${matched}</div><div class="stat-lbl">マッチング済み</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--sk)">${activeAg}</div><div class="stat-lbl">稼働中AG</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--vt)">${avgElo}</div><div class="stat-lbl">平均ELOレーティング</div></div>
  </div>`;
}

function renderHQBoard(pending){
  if(!pending.length) return `<div style="text-align:center;padding:48px;color:var(--faint)">
    <div style="font-size:32px;margin-bottom:8px">🎉</div>
    <div>未マッチ案件はありません</div></div>`;

  return `<div style="display:grid;grid-template-columns:340px 1fr;gap:16px;align-items:start">
    <div>
      ${pending.map(l=>renderLeadCard(l)).join('')}
    </div>
    <div id="lead-detail-panel">
      ${renderLeadDetailPlaceholder()}
    </div>
  </div>`;
}

function renderLeadCard(l){
  const urgency = l._aiAnalysis?.urgencyLevel||0;
  const isUrgent = urgency>=8;
  const analyzed = !!l._aiAnalysis;
  return `
  <div class="lead-card ${selectedLead?.id===l.id?'selected':''} ${isUrgent?'urgent':''}"
    onclick="selectLead('${l.id}')">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div class="lead-id">${l.id}</div>
      ${isUrgent?'<span class="badge b-rd">🔴 緊急</span>':''}
    </div>
    <div class="lead-title">${l.title}</div>
    <div class="lead-sub">${l.area} / ¥${(l.budget||0).toLocaleString()}</div>
    <div class="lead-meta">
      <span class="method-tag ${l.method==='board'?'method-board':'method-direct'}">
        ${l.method==='board'?'📋 先着':'🎯 指名: '+l.targetAgId}
      </span>
      ${analyzed
        ? `<span class="badge b-navy">✨ AI解析済</span>`
        : `<span class="badge b-nt">未解析</span>`}
      <span style="font-size:10px;color:var(--faint)">${l.daysAgo===0?'今日':l.daysAgo+'日前'}</span>
    </div>
    <div class="status-flow">
      <span class="status-step ${analyzed?'done':'current'}">📝 登録</span>
      <span class="status-arrow">›</span>
      <span class="status-step ${analyzed?'done':''}">🤖 AI解析</span>
      <span class="status-arrow">›</span>
      <span class="status-step ${l._algoResult?'done':analyzed?'current':''}">⚙️ アルゴ</span>
      <span class="status-arrow">›</span>
      <span class="status-step ${l._aiRanking?'done':l._algoResult?'current':''}">✨ AI判定</span>
    </div>
  </div>`;
}

function renderLeadDetailPlaceholder(){
  return `<div style="background:var(--cream2);border:1.5px dashed var(--bd2);border-radius:12px;
    padding:48px;text-align:center;color:var(--faint)">
    <div style="font-size:32px;margin-bottom:10px">🤖</div>
    <div style="font-size:13px;font-weight:600;color:var(--muted)">案件を選択してAIマッチングを開始</div>
    <div style="font-size:11px;margin-top:6px">Role A（案件解析）→ アルゴ120点 → Role B（AI判定）</div>
  </div>`;
}

function renderLeadDetail(lead){
  const ai = lead._aiAnalysis;
  const algo = lead._algoResult;
  const ranking = lead._aiRanking;

  return `
  <div class="card">
    <div class="card-head">
      <div>
        <div class="card-title">${lead.title}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px;font-family:'DM Mono',monospace">${lead.id}</div>
      </div>
      <div style="display:flex;gap:6px">
        ${!ai ? `<button class="btn btn-navy" onclick="runRoleA('${lead.id}')">🤖 AI解析 (Role A)</button>` : ''}
        ${ai && !ranking ? `<button class="btn btn-vt" onclick="runFullMatch('${lead.id}')">✨ AIマッチング実行</button>` : ''}
        ${ranking ? `<button class="btn btn-em" onclick="openAiModal('${lead.id}')">📊 結果を見る</button>` : ''}
      </div>
    </div>
    <div class="card-body">

      <div class="form-grid-2" style="margin-bottom:14px">
        <div><div style="font-size:10px;color:var(--muted);font-weight:600">エリア</div>
          <div style="font-size:13px;font-weight:600;color:var(--ink)">${lead.area}</div></div>
        <div><div style="font-size:10px;color:var(--muted);font-weight:600">予算</div>
          <div style="font-size:13px;font-weight:600;color:var(--ink)">¥${(lead.budget||0).toLocaleString()}</div></div>
        <div><div style="font-size:10px;color:var(--muted);font-weight:600">PT</div>
          <div style="font-size:13px;font-weight:600;color:var(--ink)">${lead.ptName}
            <span style="font-size:10px;color:var(--muted)">（評価 ${lead.ptReputation}）</span></div></div>
        <div><div style="font-size:10px;color:var(--muted);font-weight:600">方式</div>
          <div class="method-tag ${lead.method==='board'?'method-board':'method-direct'}" style="margin-top:3px">
            ${lead.method==='board'?'📋 先着応募':'🎯 指名: '+lead.targetAgId}</div></div>
      </div>

      <div style="font-size:11px;color:var(--muted);background:var(--cream2);padding:10px 12px;
        border-radius:8px;line-height:1.7;margin-bottom:14px">${lead.description}</div>

      ${ai ? renderAIAnalysisPanel(ai) : `
        <div style="border:1.5px dashed var(--bd2);border-radius:10px;padding:20px;text-align:center;color:var(--faint)">
          <div style="font-size:20px;margin-bottom:6px">🤖</div>
          <div style="font-size:12px">「AI解析 (Role A)」ボタンで案件を解析します</div>
        </div>`}

      ${algo ? renderAlgoResult(algo, lead) : ''}
      ${ranking ? renderAIRankingPreview(ranking, lead) : ''}
    </div>
  </div>`;
}

function renderAIAnalysisPanel(ai){
  const urgencyColor = ai.urgencyLevel>=8?'var(--rd)':ai.urgencyLevel>=5?'var(--am)':'var(--em)';
  const diffColor = ai.estimatedDifficulty>=8?'var(--rd)':ai.estimatedDifficulty>=5?'var(--am)':'var(--em)';
  return `
  <div class="ai-panel" style="margin-bottom:14px">
    <div class="ai-panel-title">🤖 Role A — AI案件解析</div>
    <div style="font-size:11px;color:rgba(255,255,255,.75);line-height:1.6;margin-bottom:10px">${ai.summary||''}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      <div style="background:rgba(255,255,255,.06);border-radius:8px;padding:8px 10px">
        <div style="font-size:9px;color:rgba(255,255,255,.4);margin-bottom:4px">緊急度</div>
        <div style="font-size:18px;font-weight:700;color:${urgencyColor}">${ai.urgencyLevel}<span style="font-size:11px;color:rgba(255,255,255,.4)">/10</span></div>
        <div class="ai-urgency-bar"><div class="ai-urgency-fill" style="width:${ai.urgencyLevel*10}%;background:${urgencyColor}"></div></div>
      </div>
      <div style="background:rgba(255,255,255,.06);border-radius:8px;padding:8px 10px">
        <div style="font-size:9px;color:rgba(255,255,255,.4);margin-bottom:4px">案件難易度</div>
        <div style="font-size:18px;font-weight:700;color:${diffColor}">${ai.estimatedDifficulty}<span style="font-size:11px;color:rgba(255,255,255,.4)">/10</span></div>
        <div class="ai-urgency-bar"><div class="ai-urgency-fill" style="width:${ai.estimatedDifficulty*10}%;background:${diffColor}"></div></div>
      </div>
    </div>
    ${ai.specialNeeds?.length ? `
    <div style="margin-bottom:8px">
      <div style="font-size:9px;color:rgba(255,255,255,.4);margin-bottom:4px">特殊要件</div>
      ${ai.specialNeeds.map(n=>`<span class="ai-tag" style="background:rgba(200,169,81,.2);color:var(--gold)">🏷 ${n}</span>`).join('')}
    </div>` : ''}
    ${ai.riskFlags?.length ? `
    <div style="margin-bottom:8px">
      <div style="font-size:9px;color:rgba(255,255,255,.4);margin-bottom:4px">リスクフラグ</div>
      ${ai.riskFlags.map(f=>`<span class="ai-tag" style="background:rgba(220,38,38,.2);color:#fca5a5">⚠️ ${f}</span>`).join('')}
    </div>` : ''}
    <div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.08)">
      <div style="font-size:9px;color:rgba(255,255,255,.4);margin-bottom:3px">最適AGプロファイル</div>
      <div style="font-size:11px;color:rgba(255,255,255,.8)">${ai.optimalAgProfile}</div>
    </div>
    <div style="margin-top:6px;font-size:9px;color:rgba(255,255,255,.3);text-align:right">
      信頼度: ${Math.round((ai.confidenceScore||0)*100)}%
    </div>
  </div>`;
}

function renderAlgoResult(result, lead){
  const top5 = result.slice(0,5);
  const rankColors = {Platinum:'b-vt',Gold:'b-navy',Silver:'b-sk',Bronze:'b-nt'};
  return `
  <div style="margin-bottom:14px">
    <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px;
      letter-spacing:.5px">⚙️ アルゴリズム結果（120点満点 / Top5プレビュー）</div>
    ${top5.map((item,i)=>`
    <div style="display:flex;align-items:center;gap:10px;padding:8px 10px;
      border:1px solid var(--bd);border-radius:8px;margin-bottom:6px;background:${i===0?'#F0FFF8':'#fff'}">
      <div style="font-size:16px;font-weight:800;color:${i===0?'var(--em)':'var(--faint)'};
        width:20px;text-align:center;font-variant-numeric:tabular-nums">${i+1}</div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:12px;font-weight:700;color:var(--navy)">${item.ag.name}</span>
          <span class="badge ${rankColors[item.ag.rank]}">${item.ag.rank}</span>
          ${item.explorationBonus>0?`<span class="badge b-am">🌱 新人+${item.explorationBonus}</span>`:''}
        </div>
        <div style="font-size:10px;color:var(--muted);font-family:'DM Mono',monospace">${item.ag.id}</div>
        <div class="ag-score-bar" style="margin-top:4px">
          <div class="ag-score-fill" style="width:${(item.finalScore/120*100).toFixed(0)}%"></div>
        </div>
      </div>
      <div style="text-align:right">
        <div style="font-size:18px;font-weight:800;color:var(--navy);font-variant-numeric:tabular-nums">
          ${item.finalScore.toFixed(1)}</div>
        <div style="font-size:9px;color:var(--faint)">/ 120</div>
      </div>
    </div>`).join('')}
    ${result.length>5?`<div style="font-size:10px;color:var(--faint);text-align:center">他${result.length-5}名が候補</div>`:''}
  </div>`;
}

function renderAIRankingPreview(ranking, lead){
  const agents = getAgents();
  const conf = Math.round((ranking.matchConfidence||0)*100);
  const confColor = conf>=80?'var(--em)':conf>=60?'var(--am)':'var(--rd)';
  return `
  <div class="ai-panel">
    <div class="ai-panel-title">✨ Role B — AI最終判定</div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <div style="font-size:11px;color:rgba(255,255,255,.7)">${ranking.summary}</div>
      <div style="flex-shrink:0;text-align:center">
        <div style="font-size:20px;font-weight:800;color:${confColor}">${conf}%</div>
        <div style="font-size:9px;color:rgba(255,255,255,.35)">信頼度</div>
      </div>
    </div>
    ${ranking.hqAlertNeeded?`
    <div style="background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3);
      border-radius:8px;padding:8px 10px;margin-bottom:10px;font-size:11px;color:#fca5a5">
      ⚠️ HQアラート: ${ranking.hqAlertReason}</div>`:''} 
    ${ranking.selected.slice(0,3).map((s,i)=>{
      const ag = agents.find(a=>a.id===s.agentId)||{name:s.agentId,rank:'—'};
      const rankColors = {Platinum:'b-vt',Gold:'b-navy',Silver:'b-sk',Bronze:'b-nt'};
      return `
      <div style="background:rgba(255,255,255,.06);border-radius:9px;padding:10px 12px;margin-bottom:7px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
          <div style="font-size:14px;font-weight:800;color:var(--gold)">#${s.rank}</div>
          <div style="font-size:12px;font-weight:700;color:#fff">${ag.name}</div>
          <span class="badge ${rankColors[ag.rank]||'b-nt'}">${ag.rank}</span>
        </div>
        <div style="font-size:10px;color:rgba(255,255,255,.65);line-height:1.6">${s.reason}</div>
        <div style="font-size:10px;color:rgba(200,169,81,.8);margin-top:4px">→ ${s.expectedOutcome}</div>
        ${s.riskNote?`<div style="font-size:10px;color:#fca5a5;margin-top:3px">⚠️ ${s.riskNote}</div>`:''}
      </div>`}).join('')}
    ${ranking.selected.length>3?`<div style="font-size:10px;color:rgba(255,255,255,.3);text-align:center">
      他${ranking.selected.length-3}名 → 詳細を見るで確認</div>`:''}
    <div style="margin-top:12px;display:flex;gap:8px">
      <button class="btn btn-em" onclick="openAiModal('${lead.id}')">📊 全結果を確認・確定</button>
      <button class="btn btn-ghost btn-sm" onclick="runFullMatch('${lead.id}')">🔄 再実行</button>
    </div>
  </div>`;
}

function renderHQMatched(matched){
  if(!matched.length) return `<div style="text-align:center;padding:48px;color:var(--faint)">マッチング済み案件はありません</div>`;
  return matched.map(l=>`
  <div class="card" style="margin-bottom:12px">
    <div class="card-body" style="display:flex;align-items:center;gap:16px">
      <div style="flex:1">
        <div style="font-size:12px;font-weight:700;color:var(--navy)">${l.title}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px;font-family:'DM Mono',monospace">${l.id}</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:10px;color:var(--muted)">担当AG</div>
        <div style="font-size:12px;font-weight:700;color:var(--em)">${l.assignedAgName}</div>
        <div style="font-size:9px;color:var(--faint);font-family:'DM Mono',monospace">${l.assignedAgId}</div>
      </div>
      <span class="badge b-em">✅ マッチング済</span>
    </div>
  </div>`).join('');
}

function renderMonitor(){
  const agents = getAgents();
  const weights = [
    {label:'成約力スコア', val:30,max:30,color:'#059669'},
    {label:'適合スコア',   val:25,max:30,color:'#0284C7'},
    {label:'信頼性スコア', val:20,max:25,color:'#7C3AED'},
    {label:'承諾確率スコア',val:20,max:20,color:'#D97706'},
    {label:'相性スコア',   val:15,max:15,color:'#DB2777'},
    {label:'キャパシティ', val:10,max:10,color:'#6B7280'},
  ];
  const eloTop = [...agents].sort((a,b)=>b.elo-a.elo).slice(0,3);
  return `
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="monitor-card">
      <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:12px">⚙️ アルゴリズム重み（120点満点）</div>
      ${weights.map(w=>`
      <div class="algo-weight-bar">
        <div class="algo-weight-label">${w.label}</div>
        <div class="algo-weight-track">
          <div class="algo-weight-fill" style="width:${w.val/30*100}%;background:${w.color}"></div>
        </div>
        <div class="algo-weight-val">${w.val}pt</div>
      </div>`).join('')}
      <div style="margin-top:14px">
        <button class="btn btn-navy btn-sm" onclick="runWeeklyReview()">🤖 AI重み最適化分析</button>
      </div>
    </div>
    <div class="monitor-card">
      <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:12px">🏆 ELOランキング TOP3</div>
      ${eloTop.map((ag,i)=>`
      <div style="display:flex;align-items:center;gap:10px;padding:8px;
        background:${i===0?'var(--gold-dim)':'var(--cream2)'};border-radius:8px;margin-bottom:6px">
        <div style="font-size:18px;font-weight:800;color:${i===0?'var(--gold)':'var(--faint)'}">
          ${['🥇','🥈','🥉'][i]}</div>
        <div style="flex:1">
          <div style="font-size:12px;font-weight:700;color:var(--navy)">${ag.name}</div>
          <div style="font-size:9px;color:var(--muted);font-family:'DM Mono',monospace">${ag.id} / ${ag.rank}</div>
        </div>
        <div style="font-size:18px;font-weight:800;color:var(--navy);font-variant-numeric:tabular-nums">${ag.elo}</div>
      </div>`).join('')}
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--bd)">
        <div style="font-size:10px;color:var(--muted)">Thompson Sampling（探索 vs 活用）</div>
        <div style="display:flex;gap:6px;margin-top:6px;align-items:center">
          <div style="flex:1;height:8px;background:var(--bd);border-radius:4px;overflow:hidden">
            <div style="width:75%;height:100%;background:linear-gradient(90deg,var(--navy),var(--sk));border-radius:4px"></div>
          </div>
          <div style="font-size:10px;font-family:'DM Mono',monospace;color:var(--muted)">75%活用 / 25%探索</div>
        </div>
      </div>
    </div>
    <div class="monitor-card" style="grid-column:1/-1">
      <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:10px">📈 プラットフォーム健全性</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
        ${[
          {label:'平均成約率',val:'71%',color:'var(--em)'},
          {label:'平均ELO',val:Math.round(agents.reduce((s,a)=>s+a.elo,0)/agents.length),color:'var(--sk)'},
          {label:'新人AG比率',val:Math.round(agents.filter(a=>a.daysRegistered<90).length/agents.length*100)+'%',color:'var(--am)'},
          {label:'平均応答(分)',val:Math.round(agents.reduce((s,a)=>s+a.avgResponseMin,0)/agents.length),color:'var(--vt)'},
        ].map(s=>`<div style="text-align:center;background:var(--cream2);border-radius:8px;padding:10px">
          <div style="font-size:20px;font-weight:800;color:${s.color}">${s.val}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px">${s.label}</div>
        </div>`).join('')}
      </div>
      <div id="monitor-ai-result" style="margin-top:14px"></div>
    </div>
  </div>`;
}
</script>
<script>
// ══════════════════════════════════════════════════════════════
// AG VIEW
// ══════════════════════════════════════════════════════════════
function renderAG(){
  const leads = getLeads();
  const myId = 'AG-0042'; // デモ: 中村陽子
  const board = leads.filter(l=>(l.status==='pending_ai'||l.status==='unmatched')&&l.method==='board');
  const directed = leads.filter(l=>l.targetAgId===myId&&l.status!=='matched');

  const tabs=[
    {k:'board',  label:'📋 案件ボード',cnt:board.length},
    {k:'direct', label:'🎯 指名通知',cnt:directed.length},
  ];
  return `
  <div class="tab-bar">
    ${tabs.map(t=>`
    <div class="tab ${currentTab===t.k?'active':''}" onclick="switchTab('${t.k}')">
      ${t.label}${t.cnt>0?`<span class="tab-badge">${t.cnt}</span>`:''}
    </div>`).join('')}
  </div>
  ${currentTab==='board' ? renderAGBoard(board) : renderAGDirect(directed)}`;
}

function renderAGBoard(board){
  if(!board.length) return `<div style="text-align:center;padding:48px;color:var(--faint)">
    <div style="font-size:32px;margin-bottom:8px">📋</div>
    <div>現在掲載中の案件はありません</div></div>`;

  return `
  <div style="background:var(--am-bg);border:1px solid rgba(217,119,6,.2);border-radius:10px;
    padding:11px 16px;margin-bottom:16px;font-size:11px;color:var(--am)">
    💡 クライアント情報はマッチング確定後に開示されます。先着順に「対応する」をクリックしてください。
  </div>
  ${board.map(l=>renderAGLeadCard(l)).join('')}`;
}

function renderAGLeadCard(l){
  const ai = l._aiAnalysis;
  return `
  <div class="card" style="margin-bottom:12px">
    <div class="card-body">

async function submitPTLead(){
  const type   = document.getElementById('pt-type')?.value;
  const area   = document.getElementById('pt-area')?.value;
  const budget = parseInt(document.getElementById('pt-budget')?.value)||0;
  const desc   = document.getElementById('pt-desc')?.value;
  const targetAg = document.getElementById('pt-target-ag')?.value;

  if(!type||!area||!desc){ showToast('種別・エリア・概要は必須です','error'); return; }

  const btn = document.getElementById('pt-submit-btn');
  btn.disabled = true; btn.textContent = '🤖 AI解析中...';

  const leads = getLeads();
  const newId = 'LD-2026-'+ String(leads.length+1).padStart(3,'0');
  const newLead = {
    id:newId, ptId:'PT-30007', ptName:'佐藤 美咲', ptReputation:4.3,
    type, area, budget, title:`${area} ${type==='rental'?'賃貸':type==='sale'?'売買':'人材'}`,
    description:desc, method:ptMethod,
    targetAgId: ptMethod==='direct'?targetAg:null, minRank:null,
    status:'pending_ai', createdAt:new Date().toLocaleString('ja-JP'), daysAgo:0,
    _aiAnalysis:null, _algoResult:null, _aiRanking:null
  };

  showToast('🤖 AI Role A — 案件を解析しています...','info');
  const ai = await analyzeLeadWithAI(newLead);
  newLead._aiAnalysis = ai;

  if(ai.estimatedDifficulty>=8 && !newLead.minRank) newLead.minRank='Silver';
  if(ai.urgencyLevel>=8) newLead._urgent=true;

  leads.push(newLead);
  saveLeads(leads);

  showToast(`✅ 投稿完了！難易度 ${ai.estimatedDifficulty}/10 / 緊急度 ${ai.urgencyLevel}/10`,'success');
  btn.disabled=false; btn.textContent='🤖 投稿してAIマッチングを開始';
  currentTab='mycase';
  renderMain();
}

async function runFullMatch(leadId){
  const leads = getLeads();
  const lead = leads.find(l=>l.id===leadId);
  if(!lead) return;

  const panel = document.getElementById('lead-detail-panel');

  // Step1: Role A（未済なら）
  if(!lead._aiAnalysis){
    if(panel) panel.innerHTML=`<div class="ai-thinking" style="height:80px">
      <div class="ai-thinking-dots"><span></span><span></span><span></span></div>
      <div style="color:rgba(255,255,255,.7);font-size:12px">🤖 Role A — 案件解析中...</div></div>`;
    showToast('🤖 Role A: 案件解析中...','info');
    lead._aiAnalysis = await analyzeLeadWithAI(lead);
  }

  // Step2: アルゴ
  if(panel) panel.innerHTML=`<div class="ai-thinking" style="height:80px">
    <div class="ai-thinking-dots"><span></span><span></span><span></span></div>
    <div style="color:rgba(255,255,255,.7);font-size:12px">⚙️ アルゴリズム — 120点スコアリング中...</div></div>`;
  showToast('⚙️ 120点スコアリング実行中...','info');
  await new Promise(r=>setTimeout(r,600));

  const agents = getAgents();
  const filtered = hardFilter(agents, lead);
  const scored = filtered.map(ag=>({ag, lead, score:calculateMatchScore(ag,lead)}));
  const ranked = explorationAdjustedRanking(scored);
  lead._algoResult = ranked;

  // Step3: AI Role B
  if(panel) panel.innerHTML=`<div class="ai-thinking" style="height:80px">
    <div class="ai-thinking-dots"><span></span><span></span><span></span></div>
    <div style="color:rgba(255,255,255,.7);font-size:12px">✨ Role B — AI最終判定中...</div></div>`;
  showToast('✨ Role B: AI最終判定中...','info');

  const ranking = await aiFinalRanking(ranked, lead);
  lead._aiRanking = ranking;
  lead.status = 'pending_confirm';

  saveLeads(leads);
  selectedLead = lead;
  showToast('🎉 AIマッチング完了！結果を確認してください','success');
  if(panel) panel.innerHTML = renderLeadDetail(lead);
}

function prepareConfirmMatch(leadId, agId, agName){
  pendingMatch = {leadId, agId, agName};
  document.getElementById('cfm-title').textContent = 'マッチング確定';
  document.getElementById('cfm-sub').textContent = `${agName}（${agId}）をこの案件の担当AGとして確定しますか？`;
  document.getElementById('cfm-body').innerHTML = `
    <div style="background:var(--em-bg);border:1px solid rgba(5,150,105,.2);border-radius:8px;padding:12px 14px;font-size:11px;color:var(--em);line-height:1.7">
      ✅ 確定後: Slackに通知 → クライアント情報を担当AGに開示 → LINEトークルーム作成
    </div>`;
  document.getElementById('confirm-modal').style.display='flex';
}

function closeConfirmModal(){ document.getElementById('confirm-modal').style.display='none'; }

function executeMatch(){
  if(!pendingMatch) return;
  const leads = getLeads();
  const agents = getAgents();
  const lead = leads.find(l=>l.id===pendingMatch.leadId);
  const ag = agents.find(a=>a.id===pendingMatch.agId);
  if(!lead||!ag) return;

  lead.status = 'matched';
  lead.assignedAgId = ag.id;
  lead.assignedAgName = ag.name;
  lead.matchedAt = new Date().toLocaleString('ja-JP');
  ag.activeCases = (ag.activeCases||0)+1;

  saveLeads(leads); saveAgents(agents);
  closeConfirmModal(); closeAiModal();
  selectedLead = null;
  showToast(`🎉 マッチング確定！${ag.name} が担当します。Slack通知を送信しました。`,'success');
  renderMain();
}

function agAccept(leadId){
  const leads = getLeads();
  const lead = leads.find(l=>l.id===leadId);
  if(!lead) return;
  lead.status='matched';
  lead.assignedAgId='AG-0042';
  lead.assignedAgName='中村 陽子';
  lead.matchedAt=new Date().toLocaleString('ja-JP');
  saveLeads(leads);
  showToast('✅ 対応を承諾しました。クライアント情報が開示されます。','success');
  renderMain();
}
function agPass(leadId){ showToast('⏭ パスしました','info'); }
function agAcceptDirect(leadId){ agAccept(leadId); }
function agDeclineDirect(leadId){
  showToast('辞退しました。HQに通知されます。','info');
  const leads=getLeads();
  const lead=leads.find(l=>l.id===leadId);
  if(lead){ lead.status='unmatched'; lead.method='board'; saveLeads(leads); renderMain(); }
}

  const agents = getAgents();
  const prompt = `あなたはCORETO マッチングアルゴリズムの改善提案AIです。
現在のエージェントデータを分析し、アルゴリズムの改善提案を日本語で簡潔に提示してください。

現在の重み配分（120点満点）:
- 成約力スコア（ELO×成約率）: 30点
- 適合スコア（エリア×タイプ×予算）: 25点
- 信頼性スコア（ベイズ評価×完走率×応答速度）: 20点
- 承諾確率スコア: 20点
- 相性スコア（協調フィルタリング）: 15点
- キャパシティスコア: 10点

エージェントデータ（一部）:
${JSON.stringify(agents.map(a=>({id:a.id,rank:a.rank,elo:a.elo,
  convRate:a.recentConversionRate,activeCases:a.activeCases,
  daysRegistered:a.daysRegistered,avgRating:a.avgRating})),null,1)}

以下を分析してください:
1. 現在の重み配分で見落とされている要素
2. 新人AG（daysRegistered<90）への機会配分の評価
3. ELO分布の健全性
4. 推奨する重み調整案（1〜2点のみ変更）
5. 来週の注目点

250文字程度で簡潔に日本語で回答してください。`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,
        messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    const text = data.content[0].text;
    el.innerHTML=`<div class="ai-panel"><div class="ai-panel-title">🤖 AI週次分析レポート</div>
      <div style="font-size:11px;color:rgba(255,255,255,.8);line-height:1.8;white-space:pre-wrap">${text}</div>
    </div>`;
  } catch(e){
    el.innerHTML=`<div style="color:var(--rd);font-size:11px">AI分析に失敗しました: ${e.message}</div>`;
  }
}

function bindEvents(){ /* イベント委譲は onclick属性で処理済み */ }

function showToast(msg, type='success'){
  const t = document.getElementById('toast');
  const colors = {success:'#059669',error:'#DC2626',info:'#0284C7'};
  t.style.background = colors[type]||colors.success;
  t.style.color = '#fff';
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3500);
}
