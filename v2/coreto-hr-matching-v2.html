<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>人材案件管理 — COREBLDG</title>
<link rel="stylesheet" href="coreto-design-system.css">
<style>
:root{--navy:#0D1A2D;--navy-l:#1E3252;--gold:#C8A951;--gold-dim:rgba(200,169,81,.15);--cream2:#F8F9FA;--white:#FFFFFF;--ink:#202124;--muted:#5F6368;--faint:#80868B;--em:#059669;--em-bg:#ECFDF5;--am:#D97706;--am-bg:#FFFBEB;--rd:#DC2626;--rd-bg:#FEF2F2;--sk:#0284C7;--sk-bg:#F0F9FF;--vt:#7C3AED;--vt-bg:#F5F3FF;--bd:#E8EAED;--bd2:#DADCE0;--sw:240px;--r:10px;--r-sm:7px;--sh:0 1px 2px rgba(60,64,67,.1),0 1px 3px rgba(60,64,67,.06)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:var(--cream2)}
.shell{display:flex;height:100vh}









.sf{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.3);transition:.13s}
.sf:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.6)}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;box-shadow:var(--sh)}
.tb-back{font-size:12px;color:var(--muted);text-decoration:none;transition:.13s}.tb-back:hover{color:var(--am)}
.tb-sep{width:1px;height:20px;background:var(--bd);flex-shrink:0}
.tb-title{font-size:15px;font-weight:600;color:var(--ink)}.tb-crumb{font-size:11px;color:var(--faint)}.tb-crumb a{color:var(--muted);text-decoration:none}
.tb-act{margin-left:auto;display:flex;gap:9px;align-items:center}
.btn{padding:7px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;transition:.15s;font-family:'Outfit',sans-serif;border:none}
.btn-p{background:var(--navy);color:var(--gold)}.btn-p:hover{background:var(--navy-l)}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--bd)}.btn-g:hover{background:var(--cream2)}
.btn-em{background:var(--em-bg);color:var(--em);border:1px solid rgba(5,150,105,.2)}.btn-em:hover{background:var(--em);color:#fff}
.btn-vt{background:var(--vt-bg);color:var(--vt);border:1px solid rgba(124,58,237,.2)}.btn-vt:hover{background:var(--vt);color:#fff}
.btn-am{background:var(--am-bg);color:var(--am);border:1px solid rgba(217,119,6,.2)}.btn-am:hover{background:var(--am);color:#fff}
.btn-rd{background:var(--rd-bg);color:var(--rd);border:1px solid rgba(220,38,38,.2)}.btn-rd:hover{background:var(--rd);color:#fff}
.btn-sm{padding:5px 12px;font-size:11px}
/* PAGE */
.page{flex:1;overflow-y:auto;padding:22px}.page::-webkit-scrollbar{width:5px}.page::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}
.kpi{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.gd::before{background:var(--gold)}.kpi.em::before{background:var(--em)}.kpi.sk::before{background:var(--sk)}.kpi.am::before{background:var(--am)}.kpi.vt::before{background:var(--vt)}
.kpi-lb{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.kpi-vl{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--ink)}
.kpi-sb{font-size:10px;color:var(--faint);margin-top:3px}
/* FILTER */
.fbar{display:flex;gap:10px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--bd);background:var(--white);flex-wrap:wrap;flex-shrink:0}
.fsel{padding:7px 10px;background:var(--cream2);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:12px;color:var(--ink);font-family:'Outfit',sans-serif;outline:none;cursor:pointer}.fsel:focus{border-color:var(--gold)}
.srch{position:relative;flex:1;min-width:180px}
.srch input{width:100%;padding:7px 12px 7px 32px;background:var(--cream2);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:12px;color:var(--ink);font-family:'Outfit',sans-serif;outline:none}
.srch input:focus{border-color:var(--gold);background:var(--white)}
.srch-ic{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:12px;pointer-events:none}
/* CASE LIST */
.case-list{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:16px}
.case-row{display:grid;grid-template-columns:140px 1fr 180px 160px 200px 120px auto;gap:0;border-bottom:1px solid var(--bd);align-items:center;cursor:pointer;transition:.13s}
.case-row:last-child{border-bottom:none}
.case-row:hover{background:rgba(200,169,81,.04)}
.case-row > div{padding:11px 13px;font-size:12px}
.case-head{background:var(--cream2);display:grid;grid-template-columns:140px 1fr 180px 160px 200px 120px auto;border-bottom:2px solid var(--bd)}
.case-head > div{padding:8px 13px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--faint)}
/* STEP PIPELINE (賃貸と同じ構造) */
.pipeline-wrap{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:20px 22px;box-shadow:var(--sh);margin-bottom:16px}
.pipeline-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.pipeline{display:flex;align-items:flex-start;gap:0;overflow-x:auto;padding-bottom:4px}
.step{display:flex;flex-direction:column;align-items:center;flex:1;position:relative;min-width:72px}
.step-connector{position:absolute;top:14px;left:calc(-50% + 14px);right:calc(50% + 14px);height:2px;background:var(--bd)}
.step-connector.done{background:var(--em)}.step-connector.active{background:var(--am)}
.step:first-child .step-connector{display:none}
.step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;z-index:1;position:relative;border:2px solid}
.step-circle.done{background:var(--em);border-color:var(--em);color:#fff}
.step-circle.active{background:var(--white);border-color:var(--gold);color:var(--navy);box-shadow:0 0 0 4px var(--gold-dim)}
.step-circle.todo{background:var(--white);border-color:var(--bd2);color:var(--faint)}
.step-label{font-size:9px;font-weight:600;color:var(--muted);margin-top:5px;text-align:center;white-space:nowrap}
.step.active .step-label{color:var(--navy);font-weight:700}.step.done .step-label{color:var(--em)}
/* DETAIL */
.detail-wrap{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:16px}
.detail-head{padding:13px 18px;border-bottom:1px solid var(--bd);background:var(--cream2);display:flex;align-items:center;justify-content:space-between}
.detail-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink)}
.detail-body{padding:16px 18px}
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.info-cell{padding:9px 11px;background:var(--cream2);border-radius:var(--r-sm)}
.ic-lb{font-size:10px;color:var(--faint);margin-bottom:2px}.ic-vl{font-size:12px;font-weight:600;color:var(--ink)}
/* BADGE */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.b-em{background:var(--em-bg);color:var(--em)}.b-am{background:var(--am-bg);color:var(--am)}.b-sk{background:var(--sk-bg);color:var(--sk)}.b-vt{background:var(--vt-bg);color:var(--vt)}.b-gd{background:var(--gold-dim);color:#92610A}.b-mu{background:var(--cream2);color:var(--faint);border:1px solid var(--bd)}.b-rd{background:var(--rd-bg);color:var(--rd)}
/* PT CHIP */
.pt-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:var(--em-bg);border:1px solid rgba(5,150,105,.15);border-radius:20px;font-size:10px;color:var(--em);font-weight:600}
/* TAG */
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:600;background:var(--cream2);color:var(--muted);border:1px solid var(--bd);margin:2px}
/* TIMELINE */
.tl{display:flex;flex-direction:column;gap:0}
.tl-item{display:flex;gap:10px;position:relative;padding-bottom:12px}
.tl-item:last-child{padding-bottom:0}
.tl-item:not(:last-child)::before{content:'';position:absolute;left:12px;top:26px;bottom:0;width:2px;background:var(--bd)}
.tl-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;z-index:1}
.tl-date{font-size:10px;color:var(--faint);font-family:'DM Mono',monospace}
.tl-text{font-size:12px;color:var(--ink);margin-top:1px;font-weight:500}
.tl-sub{font-size:11px;color:var(--muted);margin-top:2px}
/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-bg.show{display:flex}
.modal{background:var(--white);border-radius:12px;width:580px;max-width:96vw;box-shadow:0 20px 60px rgba(0,0,0,.2);max-height:90vh;display:flex;flex-direction:column}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:14px;font-weight:700;color:var(--ink)}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted)}
.modal-body{padding:18px 20px;overflow-y:auto;flex:1}
.modal-foot{padding:12px 20px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.field{margin-bottom:12px}.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:8px 11px;background:var(--cream2);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:13px;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;outline:none;transition:.15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);background:var(--white)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* AI */

/* UPLOAD */
.upload-zone{border:2px dashed var(--bd2);border-radius:var(--r);padding:16px;text-align:center;cursor:pointer;transition:.2s;background:var(--cream2)}
.upload-zone:hover{border-color:var(--gold);background:rgba(200,169,81,.05)}
.upload-zone.drag{border-color:var(--vt);background:var(--vt-bg)}
.doc-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--cream2);border-radius:var(--r-sm);margin-bottom:6px;border:1px solid var(--bd)}
.doc-status{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── モバイル対応 ─────────────────────────────── */
@media (max-width: 768px) {
  .shell, .app-shell { flex-direction: column; }
  .content, .main, .main-content { overflow-y: auto; }
  .topbar, .top-bar {
    padding: 0 12px;
    gap: 8px;
    height: 52px;
  }
  .tb-title { font-size: 14px; }
  .tb-actions, .top-actions { gap: 6px; }
  .btn-sm { padding: 4px 9px; font-size: 10px; }
  .page { padding: 12px; }
  .kpi-row, .stat-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .kpi-value, .kpi-vl { font-size: 22px !important; }
  table { font-size: 11px; }
  th, td { padding: 7px 8px; }
}
</style>
</head>

<div class="shell">
  <nav class="sb">
  <div class="sb-head">
    <div class="sb-logo">CORE<br>BLDG</div>

  </div>
  <div class="sb-user">

  <div class="content">

        <option value="">全紹介元</option>
        <option value="pt">PT経由</option>

      </select>
      <select class="fsel" id="sel-status" onchange="filterCases()">
        <option value="">全ステータス</option>
        <option value="active">進行中</option>
        <option value="offer">オファー中</option>
        <option value="closed">成約済み</option>

      </select>
    </div>

    <!-- MAIN -->
    <div class="page" id="page">
      <!-- KPI -->
      <div class="kpi-row" id="kpi-area"></div>
      <!-- CASE LIST -->
      <div id="case-list-area"></div>
    </div>
  </div>
</div>

<!-- MODAL: 案件詳細 -->
<div class="modal-bg" id="modal-detail" onclick="if(event.target===this)closeModal('modal-detail')">
  <div class="modal" style="width:700px;max-width:96vw">
    <div class="modal-head"><div class="modal-title" id="detail-title">案件詳細</div><button class="modal-close" onclick="closeModal('modal-detail')">✕</button></div>
    <div class="modal-body" id="detail-body"></div>
    <div class="modal-foot" id="detail-foot"></div>
  </div>

<div class="modal-bg" id="modal-add" onclick="if(event.target===this)closeModal('modal-add')">
  <div class="modal">

      </div>

    </div>
    <div class="modal-foot">
      <button class="btn btn-g" onclick="closeModal('modal-add')">キャンセル</button>
      <button class="btn btn-p" onclick="addCase()">案件を登録する</button>

  </div>
</div>

    <div class="modal-head"><div class="modal-title" id="step-modal-title">進捗を更新</div><button class="modal-close" onclick="closeModal('modal-step')">✕</button></div>
    <div class="modal-body" id="step-modal-body"></div>
    <div class="modal-foot" id="step-modal-foot"></div>
  </div>
</div>

<script>
(function(){
  var _role = sessionStorage.getItem('coreto_role') || '';
  var _allowed = ["hq", "hr_ag"];
  if (_allowed.length && !_allowed.includes(_role)) {
    location.replace('coreto-hub-v2.html?unauthorized=1');
  }
})();

// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════
const HR_STEPS = ['受付','ヒアリング','求人紹介','書類審査','面接','オファー交渉','内定承諾'];
const HR_STEP_ICONS = ['📥','🎤','📋','📄','🤝','💰','✅'];

const STATUS_META = {
  active: {label:'進行中',   cls:'b-sk'},
  offer:  {label:'オファー中',cls:'b-am'},
  closed: {label:'成約済み', cls:'b-em'},
  cancel: {label:'キャンセル',cls:'b-mu'},
};

// ═══════════════════════════════════════════
// DATA（PTが持ち込んだ案件がメイン）
// ═══════════════════════════════════════════
const CASES = []; // ハードコード削除 - 動的生成予定

// ═══════════════════════════════════════════
// RENDER KPI
// ═══════════════════════════════════════════
function renderKPI() {
  const active = CASES.filter(c=>c.status==='active').length;
  const offer  = CASES.filter(c=>c.status==='offer').length;
  const closed = CASES.filter(c=>c.status==='closed').length;
  const ptCases= CASES.filter(c=>c.ptCode).length;
  const closedFee = CASES.filter(c=>c.status==='closed'&&c.finalSalary&&c.feeRate)
    .reduce((s,c)=>s+(c.finalSalary*10000*c.feeRate/100),0);

  document.getElementById('kpi-area').innerHTML = `
    <div class="kpi sk"><div class="kpi-lb">進行中</div><div class="kpi-vl">${active}</div><div class="kpi-sb">うちオファー中 ${offer}件</div></div>
    <div class="kpi am"><div class="kpi-lb">オファー交渉中</div><div class="kpi-vl">${offer}</div></div>
    <div class="kpi em"><div class="kpi-lb">今月成約</div><div class="kpi-vl">${closed}</div></div>
    <div class="kpi gd"><div class="kpi-lb">成功報酬（成約分）</div><div class="kpi-vl">¥${(closedFee/10000).toFixed(0)}万</div></div>
    <div class="kpi vt"><div class="kpi-lb">PT経由</div><div class="kpi-vl">${ptCases}</div><div class="kpi-sb">全${CASES.length}件中</div></div>`;
}

// ═══════════════════════════════════════════
// RENDER CASE LIST
// ═══════════════════════════════════════════
function renderCaseList(list) {
  if (!list.length) {
    document.getElementById('case-list-area').innerHTML = '<div style="text-align:center;padding:40px;color:var(--faint);background:var(--white);border:1px solid var(--bd);border-radius:var(--r)">該当する案件はありません</div>';
    return;
  }
  const rows = list.map(c => {
    const sm = STATUS_META[c.status]||{label:c.status,cls:'b-mu'};
    const stepLabel = HR_STEPS[c.step] || '—';
    const stepIcon  = HR_STEP_ICONS[c.step] || '';
    return `<div class="case-row" onclick="openDetail('${c.id}')">
      <div><div class="mono" style="margin-bottom:2px">${c.id}</div><div style="font-size:10px;color:var(--faint);font-family:'DM Mono',monospace">${c.lastUpdate}</div></div>
      <div><div style="font-weight:600;font-size:13px">${c.name} <span style="font-size:11px;color:var(--muted);font-weight:400">${c.age}歳</span></div>
        <div style="font-size:11px;color:var(--faint);margin-top:1px">${c.currentJob}</div></div>
      <div><div style="font-size:11px;font-weight:600;color:var(--ink)">${c.targetJob}</div>
        <div style="font-size:11px;color:var(--em);margin-top:1px">${c.currentSalary}万 → ${c.targetSalary}万〜</div></div>
      <div>${c.ptCode
        ? `<span class="pt-chip">🤝 ${c.ptCode}</span><div style="font-size:10px;color:var(--faint);margin-top:3px">${c.ptName}</div>`
        : '<span style="font-size:11px;color:var(--faint)">直接登録</span>'}</div>
      <div><div style="font-size:11px;font-weight:700;color:var(--navy)">${stepIcon} ${stepLabel}</div>
        <div style="display:flex;gap:3px;margin-top:5px">${HR_STEPS.map((_,i)=>`<div style="flex:1;height:3px;border-radius:2px;background:${i<c.step?'var(--em)':i===c.step?'var(--am)':'var(--bd)'}"></div>`).join('')}</div></div>
      <div><span class="badge ${sm.cls}">${sm.label}</span></div>
      <div style="display:flex;flex-direction:column;gap:4px">
        <button class="btn btn-sm btn-g" onclick="event.stopPropagation();openDetail('${c.id}')">詳細 ›</button>
        ${getDaysSince(c.lastUpdate)>=5&&(c.status==='active'||c.status==='offer')?`<button id="stag-btn-${c.id}" class="btn btn-sm btn-am" style="font-size:10px" onclick="event.stopPropagation();showStagnationAdvice('${c.id}')">✨ 停滞</button>`:''}
      </div>
    </div>`;
  }).join('');

  document.getElementById('case-list-area').innerHTML = `
    <div class="case-list">
      <div class="case-head">
        <div>案件ID / 更新日</div><div>クライアント</div><div>希望職種 / 年収</div>
        <div>紹介元（PT）</div><div>現在のステップ</div><div>状態</div><div></div>
      </div>
      ${rows}
    </div>`;
}

// ═══════════════════════════════════════════
// FILTER
// ═══════════════════════════════════════════
function filterCases(query) {
  const q     = (query ?? document.querySelector('.srch input')?.value ?? '').toLowerCase();
  const step  = document.getElementById('sel-step')?.value;
  const pt    = document.getElementById('sel-pt')?.value;
  const stat  = document.getElementById('sel-status')?.value;
  const list  = CASES.filter(c =>
    (!q    || c.name.toLowerCase().includes(q) || c.id.toLowerCase().includes(q) || c.skills.join(' ').toLowerCase().includes(q)) &&
    (!step || String(c.step) === step) &&
    (!pt   || (pt==='pt' ? !!c.ptCode : !c.ptCode)) &&
    (!stat || c.status === stat)
  );
  renderCaseList(list);
}

// ═══════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════
function advanceStep(id) {
  const c = CASES.find(x=>x.id===id); if(!c) return;
  const next = HR_STEPS[c.step+1];
  var _c=c,_next=next; coretoConfirm({title:'ステータス更新',message:`「${_c.name}」さんを「${_next}」に進めますか？`,okLabel:'進める',danger:false,onOk:function(){advanceStep(_c,_next);}});return;
  c.step = Math.min(c.step+1, HR_STEPS.length-1);
  c.lastUpdate = today();
  c.timeline.push({date:today(), step:next, note:`${next}に移行。`, type:'em'});
  closeModal('modal-detail');
  render(); toast(`${c.name}さん → ${next} に更新しました`);
}

function setOffer(id) {
  const c = CASES.find(x=>x.id===id); if(!c) return;
  c.status = 'offer'; c.step = 5; c.lastUpdate = today();
  c.timeline.push({date:today(), step:'オファー交渉', note:'オファー交渉ステージに移行。', type:'am'});
  closeModal('modal-detail'); render(); toast('オファー交渉ステータスに更新しました', 'warn');
}

function closeDeal(id) {
  // 🟡-12: prompt()をインラインモーダルに置き換え
  const existing = document.getElementById('close-deal-modal');
  if (existing) existing.remove();
  const m = document.createElement('div');
  m.id = 'close-deal-modal';
  m.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)';
  m.innerHTML = '<div style="background:#fff;border-radius:12px;width:100%;max-width:380px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.22);font-family:Outfit,sans-serif">' +
    '<div style="font-size:15px;font-weight:700;color:#0D1A2D;margin-bottom:16px">🎉 内定承諾・成約</div>' +
    '<div style="margin-bottom:14px"><label style="font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#5F6368;display:block;margin-bottom:6px">入社年収（万円）</label>' +
    '<input id="cd-salary" type="number" placeholder="例: 600" style="width:100%;padding:9px 12px;border:1.5px solid #E8EAED;border-radius:8px;font-size:13px;font-family:Outfit,sans-serif;outline:none" onfocus="this.style.borderColor=\'#C8A951\'" onblur="this.style.borderColor=\'#E8EAED\'"></div>' +
    '<div style="margin-bottom:20px"><label style="font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#5F6368;display:block;margin-bottom:6px">成功報酬率（%）</label>' +
    '<input id="cd-rate" type="number" placeholder="30" value="30" style="width:100%;padding:9px 12px;border:1.5px solid #E8EAED;border-radius:8px;font-size:13px;font-family:Outfit,sans-serif;outline:none" onfocus="this.style.borderColor=\'#C8A951\'" onblur="this.style.borderColor=\'#E8EAED\'"></div>' +
    '<div style="display:flex;gap:10px">' +
    '<button onclick="document.getElementById(\'close-deal-modal\').remove()" style="flex:1;padding:10px;border:1.5px solid #E8EAED;border-radius:8px;background:transparent;cursor:pointer;font-family:Outfit,sans-serif">キャンセル</button>' +
    '<button onclick="closeDealConfirm(\'' + id + '\')" style="flex:2;padding:10px;background:#0D1A2D;color:#C8A951;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-family:Outfit,sans-serif">成約を確定する</button>' +
    '</div></div>';
  m.addEventListener('click', function(e){ if(e.target===m) m.remove(); });
  document.body.appendChild(m);
  setTimeout(function(){ document.getElementById('cd-salary').focus(); }, 100);
}

function closeDealConfirm(id) {
  const salaryEl = document.getElementById('cd-salary');
  const rateEl   = document.getElementById('cd-rate');
  const salary   = salaryEl ? salaryEl.value : '';
  const rate     = rateEl   ? rateEl.value   : '30';
  const modal    = document.getElementById('close-deal-modal');
  if (!salary) { if(salaryEl) salaryEl.style.borderColor='#DC2626'; return; }
  if (modal) modal.remove();
  const _closeDeal = id; // alias to avoid collision
  const c = CASES.find(x=>x.id===id); if(!c) return;
  c.status='closed'; c.step=6; c.finalSalary=Number(salary); c.feeRate=Number(rate); c.lastUpdate=today();
  const fee = (Number(salary)*10000*Number(rate)/100).toLocaleString();
  c.timeline.push({date:today(), step:'内定承諾', note:'承諾完了。入社年収 '+salary+'万円。成功報酬: ¥'+fee+'（'+rate+'%）', type:'em'});

  // D-04: 在籍確認リマインダーを30日後・60日後・90日後で自動登録
  try {
    const reminders = JSON.parse(localStorage.getItem('CORETO_HR_REMINDERS') || '[]');
    const joinDate = new Date();
    [30, 60, 90].forEach(days => {
      const due = new Date(joinDate.getTime() + days * 86400000);
      reminders.push({
        id: 'RMD-' + Date.now() + '-' + days,
        caseId: c.id,
        name: c.name,
        type: 'retention_check',
        label: '在籍確認（' + days + '日）',
        dueDate: due.toLocaleDateString('ja-JP'),
        dueDateISO: due.toISOString().slice(0, 10),
        status: 'pending',
      });
    });
    localStorage.setItem('CORETO_HR_REMINDERS', JSON.stringify(reminders));
  } catch(e) {}

  closeModal('modal-detail'); render();
  // 成約報告ページへの誘導バナーを表示
  setTimeout(function() {
    var b = document.createElement('div');
    b.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9998;background:#0D1A2D;border-radius:12px;padding:14px 20px;display:flex;align-items:center;gap:16px;box-shadow:0 8px 32px rgba(0,0,0,.25);font-family:Outfit,sans-serif;min-width:320px';
    b.innerHTML = '<div><div style="font-size:11px;font-weight:700;letter-spacing:1px;color:rgba(200,169,81,.7);margin-bottom:3px">🏆 次のステップ</div><div style="font-size:13px;font-weight:600;color:#fff">成約報告を提出してください</div></div><a href="coreto-contract-report-v2.html?biz=hr" style="padding:8px 16px;background:#C8A951;color:#0D1A2D;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none;flex-shrink:0">成約報告へ →</a>';
    b.onclick = function(e){ if(e.target===b) b.remove(); };
    document.body.appendChild(b);
    setTimeout(function(){ b.style.opacity='0'; b.style.transition='opacity .4s'; setTimeout(function(){ if(b.parentNode) b.remove(); },400); }, 10000);
  }, 400);
  completeHQTask('HR-HQ-' + (c.id||''));
  toast('成約しました！ 成功報酬 ¥' + fee + '（在籍確認リマインダーを登録しました）');
}

function cancelCase(id) {
  const c = CASES.find(x=>x.id===id); if(!c) return;
  var _cc=c; coretoConfirm({title:'案件キャンセル',message:`「${_cc.name}」の案件をキャンセルしますか？`,okLabel:'キャンセルする',danger:true,onOk:function(){cancelCase(_cc);}});return;
  c.status='cancel'; c.lastUpdate=today();
  closeModal('modal-detail'); render(); toast('キャンセルに更新しました', 'warn');
}

function openStepNote(id) {

}

function saveNote(id) {

// 書類管理 / AI自動解析
// ═══════════════════════════════════════════
const DOCS = {}; // {caseId: [{name, type, status, aiResult, file}]}

const HR_DOC_PROMPT = `この書類（履歴書または職務経歴書）を解析してください。
以下のJSONのみで返答（前置き不要・日本語）:
{
  "docType": "履歴書 or 職務経歴書 or 不明",
  "name": "氏名（読み取れれば）",
  "checks": [
    {"id":"c1","label":"空白期間の有無","result":"OK or 要確認 or 不明","detail":"詳細"},
    {"id":"c2","label":"スキルと希望職種の整合性","result":"OK or 要確認 or 不明","detail":"詳細"},
    {"id":"c3","label":"年収と経験年数の整合性","result":"OK or 要確認 or 不明","detail":"詳細"},
    {"id":"c4","label":"記載内容の矛盾・不整合","result":"OK or 要確認 or 不明","detail":"詳細"},
    {"id":"c5","label":"転職回数（多い場合フラグ）","result":"OK or 要確認 or 不明","detail":"詳細"}
  ],
  "summary": "総合所見（1文）",
  "caution": "特記事項（なければnull）"
}`;

function handleDrop(e, caseId) {
  e.preventDefault();
  document.getElementById('upload-zone-'+caseId)?.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) processDoc(file, caseId);
}
function handleFileSelect(e, caseId) {
  const file = e.target.files[0];
  if (file) processDoc(file, caseId);
}

async function processDoc(file, caseId) {
  if (!DOCS[caseId]) DOCS[caseId] = [];
  const docId = 'doc-' + Date.now();
  const doc = {id:docId, name:file.name, type:file.type, status:'analyzing', aiResult:null, file};
  DOCS[caseId].push(doc);
  renderDocList(caseId);

  // base64変換
  const b64 = await new Promise(res => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.readAsDataURL(file);
  });

  try {
    const mediaType = file.type.startsWith('image') ? file.type : 'application/pdf';
    const contentBlock = mediaType === 'application/pdf'
      ? {type:'document', source:{type:'base64', media_type:'application/pdf', data:b64}}
      : {type:'image', source:{type:'base64', media_type:mediaType, data:b64}};

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:1200,
        messages:[{role:'user', content:[contentBlock, {type:'text', text:HR_DOC_PROMPT}]}]
      })
    });
    const data = await resp.json();
    const text = data.content?.find(b=>b.type==='text')?.text || '{}';
    doc.aiResult = JSON.parse(text.replace(/```json|```/g,'').trim());
    doc.status = 'done';
  } catch(e) {
    doc.status = 'error'; doc.error = e.message;
  }
  renderDocList(caseId);
}

function renderDocList(caseId) {
  const el = document.getElementById('doc-list-'+caseId); if(!el) return;
  const docs = DOCS[caseId] || [];
  if (!docs.length) { el.innerHTML=''; return; }
  el.innerHTML = docs.map(d => {
    if (d.status==='analyzing') return `
      <div class="doc-item">
        <div class="doc-status" style="background:var(--am-bg);color:var(--am)"><span style="animation:spin .8s linear infinite;display:inline-block">⏳</span></div>
        <div style="flex:1"><div style="font-size:12px;font-weight:600">${d.name}</div><div style="font-size:10px;color:var(--am)">AI解析中...</div></div>
      </div>`;
    if (d.status==='error') return `
      <div class="doc-item">
        <div class="doc-status" style="background:var(--rd-bg);color:var(--rd)">✕</div>
        <div style="flex:1"><div style="font-size:12px;font-weight:600">${d.name}</div><div style="font-size:10px;color:var(--rd)">解析失敗: ${d.error||''}</div></div>
      </div>`;
    const r = d.aiResult || {};
    const warns = (r.checks||[]).filter(c=>c.result==='要確認');
    return `
      <div class="doc-item" style="flex-direction:column;align-items:flex-start;gap:6px">
        <div style="display:flex;align-items:center;gap:10px;width:100%">
          <div class="doc-status" style="background:${warns.length?'var(--am-bg)':'var(--em-bg)'};color:${warns.length?'var(--am)':'var(--em)'}">${warns.length?'⚠':'✓'}</div>
          <div style="flex:1">
            <div style="font-size:12px;font-weight:600">${d.name} <span style="font-size:10px;color:var(--faint);font-weight:400">${r.docType||''}</span></div>
            <div style="font-size:10px;color:${warns.length?'var(--am)':'var(--em)'};">${warns.length?warns.length+'件 要確認あり':'全項目OK'} — ${r.summary||''}</div>
          </div>
          <button class="btn btn-sm btn-g" style="font-size:10px" onclick="toggleDocDetail('${d.id}')">詳細</button>
        </div>
        <div id="doc-detail-${d.id}" style="display:none;width:100%;padding:8px 10px;background:var(--cream2);border-radius:6px">
          ${(r.checks||[]).map(c=>`
            <div style="display:flex;align-items:flex-start;gap:7px;padding:4px 0;border-bottom:1px solid var(--bd)">
              <span style="font-size:11px;color:${c.result==='OK'?'var(--em)':c.result==='要確認'?'var(--am)':'var(--faint)'};flex-shrink:0;min-width:56px;font-weight:700">${c.result}</span>
              <div><div style="font-size:11px;font-weight:600;color:var(--ink)">${c.label}</div><div style="font-size:10px;color:var(--muted)">${c.detail||''}</div></div>
            </div>`).join('')}
          ${r.caution?`<div style="margin-top:6px;font-size:10px;color:var(--rd);font-weight:600">⚠️ ${r.caution}</div>`:''}
        </div>
      </div>`;
  }).join('');
}

function toggleDocDetail(docId) {
  const el = document.getElementById('doc-detail-'+docId);
  if (el) el.style.display = el.style.display==='none' ? 'block' : 'none';
}

// AI Phase 1: 案件解析
// ═══════════════════════════════════════════
async function hrAnalyzeLead(lead) {
  const prompt = `あなたはCOREBLDGの人材紹介マッチングAIです。
PTが入力した転職希望者の情報を解析してください。
必ずJSON形式のみで返答（前置き不要）:

【候補者情報】
氏名: ${lead.name} / ${lead.age}歳
現職: ${lead.currentJob} / 年収${lead.currentSalary}万円
希望: ${lead.targetJob} / 年収${lead.targetSalary}万円〜
スキル: ${lead.skills}
経験: ${lead.experience}
備考: ${lead.note||'なし'}

JSON:
{
  "urgencyLevel": 0〜10,
  "clientDifficulty": 0〜10,
  "keySkills": ["主要スキル最大3つ"],
  "targetIndustry": "想定業界",
  "salaryFlex": -1か0か1,
  "optimalAgProfile": "最適なAGの特徴（1文）",
  "summary": "候補者の特徴（2文）",
  "caution": "注意点（なければnull）"
}`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model:'claude-sonnet-4-6', max_tokens:600,
        messages:[{role:'user',content:prompt}]})
    });
    const data = await resp.json();
    return JSON.parse((data.content?.find(b=>b.type==='text')?.text||'{}').replace(/```json|```/g,'').trim());
  } catch(e) {
    return {urgencyLevel:5,clientDifficulty:5,keySkills:[],targetIndustry:'不明',
      salaryFlex:0,optimalAgProfile:'経験豊富なAG',summary:'案件情報を受け付けました。',caution:null};
  }
}

// ═══════════════════════════════════════════
// スコアリング（HR専用）
// ═══════════════════════════════════════════
function hrScoreAgent(ag, lead, aiAnalysis) {
  // [A] 成約力 30点
  const eloNorm = Math.max(0, Math.min(1, (ag.elo-800)/(2400-800)));
  const conv = ag.recentConversionRate || 0.5;
  const closingPower = (eloNorm*0.4 + conv*0.6) * 30;

  // [B] 専門適合 30点（HR専用: スキル・職種マッチ）
  const skills = (lead.skills||'').toLowerCase();
  const specs = ag.specialties || [];
  const specMatch = specs.some(s => skills.includes(s.toLowerCase()) || lead.targetJob.includes(s)) ? 1.0 : 0.4;
  const fitScore = specMatch * 30;

  // [C] 信頼性 20点
  const n = ag.reviewCount || 0;
  const bayesRating = (n*(ag.avgRating||4.0) + 8*4.2) / (n+8);
  const trustScore = (bayesRating/5*0.6 + (ag.completionRate||0.9)*0.4) * 20;

  // [D] キャパシティ 10点
  const caps = {Platinum:99, Gold:12, Silver:8, Bronze:5};
  const load = (ag.activeCases||0) / caps[ag.rank];
  const capScore = load < 0.7 ? 10 : 10 * Math.pow(Math.max(0,1-load),2)/0.09;

  // [E] 緊急度適合 10点
  const urgency = aiAnalysis?.urgencyLevel || 5;
  const respScore = Math.max(0, 1 - (ag.avgResponseMin||30)/60);
  const urgScore = urgency >= 7 ? respScore * 10 : 7;

  const total = closingPower + fitScore + trustScore + capScore + urgScore;

  // Thompson Sampling
  const alpha = (ag.closedCases||0) + 1;
  const beta  = Math.max(1,(ag.totalCases||1)-(ag.closedCases||0)) + 1;
  let ts = 0;
  try {
    const x = gamma(alpha), y = gamma(beta);
    ts = x/(x+y);
  } catch(e) { ts = 0.5; }

  // 新人ボーナス
  let bonus = 0;
  if (ag.daysRegistered < 90 && ag.totalCases < 5) {
    if (Math.random() < Math.max(0, 0.3 - ag.totalCases*0.06)) bonus = 10;
  }

  return {
    ag, total: Math.min(100, total),
    finalScore: Math.min(100, total) + bonus,
    thompson: ts, bonus,
  };
}

function gamma(a) {
  if (a<1) return gamma(1+a)*Math.pow(Math.random(),1/a);
  const d=a-1/3, c=1/Math.sqrt(9*d);
  while(true){
    let x,v;
    do{ x=(Math.random()*2-1)*3.464; v=1+c*x; }while(v<=0);
    v=v*v*v;
    const u=Math.random();
    if(u<1-0.331*(x*x)*(x*x)) return d*v;
    if(Math.log(u)<0.5*x*x+d*(1-v+Math.log(v))) return d*v;
  }
}

// ═══════════════════════════════════════════
// AI Phase 2: 最終AG選定
// ═══════════════════════════════════════════
async function hrFinalRanking(scored, lead, aiAnalysis) {
  const candidates = scored.slice(0,4).map(s=>({
    id: s.ag.id, name: s.ag.name, rank: s.ag.rank,
    algoScore: +s.finalScore.toFixed(1),
    specialties: s.ag.specialties,
    closedCases: s.ag.closedCases, activeCases: s.ag.activeCases,
    avgRating: s.ag.avgRating, convRate: +(s.ag.recentConversionRate*100).toFixed(0)+'%',
  }));

  const prompt = `あなたはCOREBLDGの人材マッチング最終判定AIです。
下記候補者に最適なHR-AGを1名選定してください。

【候補者】
${lead.name} / 希望: ${lead.targetJob} / 年収${lead.targetSalary}万〜
スキル: ${lead.skills}
AI解析: ${aiAnalysis?.summary||''} / 緊急度: ${aiAnalysis?.urgencyLevel||5}/10

【AG候補（スコア順）】
${JSON.stringify(candidates)}

JSONのみ:
{
  "selectedAgId": "HR-XXXX",
  "matchScore": 0〜100の整数,
  "reason": "選定理由（1文）",
  "expectedOutcome": "期待される展開（1文）",
  "hqAlert": true or false,
  "hqAlertReason": "HQ注意事項（不要ならnull）"
}`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model:'claude-sonnet-4-6', max_tokens:400,
        messages:[{role:'user',content:prompt}]})
    });
    const data = await resp.json();
    return JSON.parse((data.content?.find(b=>b.type==='text')?.text||'{}').replace(/```json|```/g,'').trim());
  } catch(e) {
    const top = scored[0];
    return {selectedAgId: top.ag.id, matchScore: Math.round(top.finalScore),
      reason:'アルゴリズム上位のAGを選定しました。', expectedOutcome:'適切な支援が期待されます。',
      hqAlert:false, hqAlertReason:null};
  }
}

// ═══════════════════════════════════════════
// 全自動マッチングパイプライン
// ═══════════════════════════════════════════
async function autoMatchPipeline(leadId) {
  const lead = HR_LEADS.find(l=>l.id===leadId);
  if (!lead) return;

  // Phase 1: AI案件解析
  lead.status = 'analyzing';
  renderLeadStatusBadge(leadId);

  const aiAnalysis = await hrAnalyzeLead(lead);
  lead._aiAnalysis = aiAnalysis;

  // Phase 2: アルゴスコアリング
  lead.status = 'scoring';
  renderLeadStatusBadge(leadId);
  await new Promise(r=>setTimeout(r,300));

  const availableAgs = HR_AGENTS.filter(ag => {
    const caps = {Platinum:99,Gold:12,Silver:8,Bronze:5};
    return ag.status==='active' && (ag.activeCases||0) < caps[ag.rank];
  });
  const scored = availableAgs.map(ag => hrScoreAgent(ag, lead, aiAnalysis))
    .sort((a,b) => (b.finalScore*0.75+b.thompson*30*0.25) - (a.finalScore*0.75+a.thompson*30*0.25));

  // Phase 3: AI最終選定
  lead.status = 'ai_ranking';
  renderLeadStatusBadge(leadId);

  const ranking = await hrFinalRanking(scored, lead, aiAnalysis);
  const matchedAg = HR_AGENTS.find(a=>a.id===ranking.selectedAgId) || scored[0]?.ag;

  // Phase 4: 上位3名に通知 → 先着Uber方式
  if (scored.length > 0) {
    // AI選定結果 + アルゴ上位でTop3に絞る
    const notifyIds = new Set();
    // まずAIが選定したAGを先頭に
    if (ranking.selectedAgId) notifyIds.add(ranking.selectedAgId);
    // アルゴ上位を補完してTop3まで
    for (const s of scored) {
      if (notifyIds.size >= 3) break;
      notifyIds.add(s.ag.id);
    }
    lead._notifiedAgIds   = [...notifyIds];
    lead._notifiedAgNames = [...notifyIds].map(id => HR_AGENTS.find(a=>a.id===id)?.name||id);
    lead._topMatchScore   = ranking.matchScore;
    lead._topMatchReason  = ranking.reason;
    lead._hqAlert         = ranking.hqAlert;
    lead._hqAlertReason   = ranking.hqAlertReason;
    lead.status = 'waiting_ag'; // 掲示板掲載中・AG応答待ち
  } else {
    lead.status = 'needs_hq';
    // HQタスクに追加
    try {
      const tasks = JSON.parse(localStorage.getItem('CORETO_HQ_TASKS')||'[]');
      const exists = tasks.find(t=>t.id==='HR-HQ-'+leadId);
      if (!exists) {
        tasks.unshift({ assignee: null, assigneeName: '未割当', id:'HR-HQ-'+leadId, type:'hr_needs_hq',
          title:'HR案件 HQ対応が必要 — '+lead.name+' 様',
          desc:'担当AGが見つかりませんでした。HQが直接対応してください。',
          createdAt:new Date().toLocaleDateString('ja-JP') });
        localStorage.setItem('CORETO_HQ_TASKS', JSON.stringify(tasks));
      }
    } catch(e) {}
  }

  renderLeadStatusBadge(leadId);
  render();
  const names = lead._notifiedAgNames?.join('・') || '—';
  toast('📢 '+lead.name+'さんの案件を '+names+' に通知しました。先着受付待ち中。');
}

// ═══════════════════════════════════════════
// AG が「対応する」を押した時の処理
// ═══════════════════════════════════════════
function hrAgAccept(leadId) {
  const lead = HR_LEADS.find(l=>l.id===leadId);
  if (!lead || lead.status !== 'waiting_ag') return;

  // デモ: ロールがAGなので現在のAGがアサインされる
  const currentAg = HR_AGENTS[0] || {id: sessionStorage.getItem('coreto_user_id')||'', name: sessionStorage.getItem('coreto_name')||''};
  // 通知済みAGでなければ拒否
  if (lead._notifiedAgIds && !lead._notifiedAgIds.includes(currentAg.id)) {
    toast('この案件の通知を受けていません', 'warn'); return;
  }

  lead.status        = 'matched';
  lead.assignedAgId  = currentAg.id;
  lead.assignedAgName= currentAg.name;
  lead.matchedAt     = today();
  currentAg.activeCases = (currentAg.activeCases||0) + 1;

  // AGの案件管理（CASES）に追加
  CASES.unshift({
    id: leadId, name: lead.name, age: lead.age||0,
    email:'', tel:'',
    currentJob: lead.currentJob, currentSalary: lead.currentSalary||0,
    targetJob: lead.targetJob, targetSalary: lead.targetSalary||0,
    skills: (lead.skills||'').split('、').map(s=>s.trim()).filter(Boolean),
    experience: lead.experience||'',
    step:1, status:'active',
    ptCode: lead.ptCode, ptName: lead.ptName,
    ag: currentAg.name+'（HR-AG）', agId: currentAg.id,
    reg: lead.createdAt, lastUpdate: today(),
    note: lead.note||'',
    companies:[], timeline:[
      {date:lead.createdAt,    step:'受付',         note:`PT: ${lead.ptCode} ${lead.ptName} より紹介。`, type:'em'},
      {date:lead.matchedAt,    step:'AG引受け',      note:`${currentAg.name} が先着で対応を引き受けました。AIスコア: ${lead._topMatchScore||'—'}点。`, type:'vt'},
    ],
  });

  render();
  toast(`✅ 「${lead.name}」の対応を引き受けました！クライアント情報が開示されました。`);
}

          </div>` : ''}
          ${l._aiAnalysis?.summary ? `<div style="margin-top:8px;font-size:10px;color:var(--faint)">🤖 ${l._aiAnalysis.summary}</div>` : ''}
          <div style="margin-top:6px;font-size:10px;color:var(--faint);font-family:'DM Mono',monospace">投稿: ${l.createdAt}</div>
        </div>`;
      }).join('')}
    </div>`;
}

function renderHQView() {
  const alerts = HR_LEADS.filter(l=>l._hqAlert||l.status==='needs_hq');
  if (!alerts.length) return;
  const box = document.getElementById('hq-alert-box') || (() => {
    const d = document.createElement('div');
    d.id = 'hq-alert-box';
    document.getElementById('page').prepend(d);
    return d;
  })();
  box.innerHTML = `<div style="background:var(--rd-bg);border:1px solid rgba(220,38,38,.2);border-radius:var(--r);padding:12px 16px;margin-bottom:14px">
    <div style="font-size:11px;font-weight:700;color:var(--rd);margin-bottom:8px">⚠️ HQ確認が必要な案件（${alerts.length}件）</div>
    ${alerts.map(l=>`<div style="font-size:12px;color:var(--ink);padding:4px 0;border-bottom:1px solid var(--bd)">${l.name} — ${l._hqAlertReason||'AGが見つかりませんでした'}</div>`).join('')}
  </div>`;
}

function renderAGNotifications() {
  // AG視点: 自分に通知されている waiting_ag 案件を掲示板として表示
  const currentAgId = sessionStorage.getItem('coreto_user_id') || '';
  const notified = HR_LEADS.filter(l =>
    l.status === 'waiting_ag' &&
    l._notifiedAgIds?.includes(currentAgId)
  );
  const el = document.getElementById('ag-board-box');
  if (!el) return;
  if (!notified.length) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <div style="background:var(--am-bg);border:1px solid rgba(217,119,6,.25);border-radius:var(--r);padding:12px 16px;margin-bottom:16px">
      <div style="font-size:12px;font-weight:700;color:var(--am);margin-bottom:10px">
        📢 対応待ち案件（${notified.length}件） — 先着順。クライアント詳細は引受け後に開示されます。
      </div>
      ${notified.map(l => {
        const ai = l._aiAnalysis||{};
        return `<div style="background:var(--white);border:1px solid var(--bd);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:8px">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px">
            <div>
              <div style="font-size:13px;font-weight:700;color:var(--navy)">🔒 転職希望者 — ${l.targetJob}</div>
              <div style="font-size:11px;color:var(--muted);margin-top:2px">希望年収: ${l.targetSalary}万円〜 / 経験: ${l.experience||'—'}</div>
            </div>
            <div style="display:flex;gap:6px;flex-shrink:0">
              ${ai.urgencyLevel>=8 ? '<span class="badge b-rd">🔴 急案件</span>' : ''}
              ${l._topMatchScore ? `<span class="badge b-em">適合 ${l._topMatchScore}点</span>` : ''}
            </div>
          </div>
          ${ai.summary ? `<div style="font-size:11px;color:var(--muted);padding:7px 10px;background:var(--cream2);border-radius:6px;margin-bottom:10px">${ai.summary}</div>` : ''}
          <div style="display:flex;gap:8px">
            <button class="btn btn-em btn-sm" onclick="hrAgAccept('${l.id}')">✅ 対応する（先着）</button>
            <button class="btn btn-g btn-sm" onclick="hrAgPass('${l.id}')">⏭ パス</button>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

function toast(msg,type='ok') {
  let t=document.getElementById('_toast');
  if(!t){t=document.createElement('div');t.id='_toast';Object.assign(t.style,{position:'fixed',bottom:'24px',left:'50%',transform:'translateX(-50%) translateY(10px)',padding:'10px 20px',borderRadius:'8px',fontSize:'13px',fontWeight:'600',zIndex:'9999',opacity:'0',transition:'all .25s',fontFamily:"'Outfit',sans-serif",boxShadow:'0 4px 20px rgba(0,0,0,.25)',whiteSpace:'nowrap'});document.body.appendChild(t);}
  t.style.background=type==='warn'?'var(--am)':'#0D1A2D';t.style.color='#fff';
  t.textContent=msg;t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(t._t);t._t=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(10px)';},2800);
}

window.addEventListener('DOMContentLoaded', () => {
  // #8修正: localStorageのCORETO_HR_LEADSから新規案件をCASESに追加
  try {
    const leads = JSON.parse(localStorage.getItem('CORETO_HR_LEADS') || '[]');
    const existIds = new Set(CASES.map(c=>c.id));
    leads.forEach(l => {
      const caseId = 'HR-' + String(l.id||Date.now()).slice(-4);
      if (existIds.has(caseId)) return;
      CASES.push({ id:caseId, name:l.name||'—', status:'active', step:0,
        targetJob:l.job||'—', targetSalary:l.salary||0, companies:[], timeline:[
          { date:l.date||new Date().toLocaleDateString('ja-JP'), step:'受付', note:'PT紹介経由で登録', type:'em' }
        ], source:'PT', ag: sessionStorage.getItem('coreto_user_id')|| '',
        lastUpdate:l.date||new Date().toLocaleDateString('ja-JP') });
      existIds.add(caseId);
    });
    if (leads.length) render();
  } catch(e) {}
  CNAV.init('hr_matching');
  // sessionからROLEを自動設定
  const _s = CNAV.session ? CNAV.session() : null;
  if (_s) {
    if (_s.type === 'hq') setRole('hq');
    else if (_s.type === 'hr_ag') setRole('ag');
    else setRole('pt');
    // HR-AG の場合: 担当案件(agId一致)のみに絞り込む
    if (_s.type === 'hr_ag' && _s.userId) {
      CASES = CASES.filter(c => c.agId === _s.userId);
    }
  }
  render();
});
function showToast(msg, type) {
  var colors = {
    em: ['#ECFDF5','#059669','rgba(5,150,105,.2)'],
    am: ['#FFFBEB','#D97706','rgba(217,119,6,.2)'],
    rd: ['#FEF2F2','#DC2626','rgba(220,38,38,.2)'],
    sk: ['#F0F9FF','#0284C7','rgba(2,132,199,.2)'],
    ok: ['#ECFDF5','#059669','rgba(5,150,105,.2)'],
    warn:['#FFFBEB','#D97706','rgba(217,119,6,.2)'],
    error:['#FEF2F2','#DC2626','rgba(220,38,38,.2)'],
  };
  var c = colors[type] || colors.em;
  var t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:9999;padding:11px 18px;border-radius:9px;font-size:13px;font-weight:600;font-family:Outfit,sans-serif;box-shadow:0 6px 20px rgba(0,0,0,.12);transition:opacity .4s;background:'+c[0]+';color:'+c[1]+';border:1px solid '+c[2];
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.style.opacity='0'; setTimeout(function(){ if(t.parentNode) t.remove(); },400); }, 3200);
}

</script>
