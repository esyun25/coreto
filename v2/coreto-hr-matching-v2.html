<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>人材マッチング — COREBLDG</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#0D1A2D;--navy-l:#1E3252;--gold:#C8A951;--gold-dim:rgba(200,169,81,.15);--cream2:#F8F9FA;--white:#FFFFFF;--ink:#202124;--muted:#5F6368;--faint:#80868B;--em:#059669;--em-bg:#ECFDF5;--am:#D97706;--am-bg:#FFFBEB;--rd:#DC2626;--rd-bg:#FEF2F2;--sk:#0284C7;--sk-bg:#F0F9FF;--vt:#7C3AED;--vt-bg:#F5F3FF;--pi:#DB2777;--pi-bg:#FDF2F8;--bd:#E8EAED;--bd2:#DADCE0;--sw:240px;--r:10px;--r-sm:7px;--sh:0 1px 2px rgba(60,64,67,.1),0 1px 3px rgba(60,64,67,.06)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:var(--cream2)}
.shell{display:flex;height:100vh}
.sb{width:var(--sw);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;position:relative}
.sb::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,rgba(200,169,81,.25) 0%,rgba(200,169,81,.06) 50%,transparent 100%)}
.sb-head{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;letter-spacing:5px;color:var(--gold)}
.sb-ver{font-size:9px;letter-spacing:2px;color:rgba(200,169,81,.3);font-family:'DM Mono',monospace;margin-top:2px}
.sb-user{margin:14px 14px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:9px 11px;display:flex;align-items:center;gap:9px}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--gold-dim);border:1px solid rgba(200,169,81,.25);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gold);flex-shrink:0}
.sb-un{font-size:11px;font-weight:600;color:rgba(255,255,255,.8)}.sb-ur{font-size:9px;color:rgba(255,255,255,.3);font-family:'DM Mono',monospace}
.sb-nav{flex:1;overflow-y:auto;padding:6px 10px}.sb-foot{padding:10px 14px 18px;border-top:1px solid rgba(255,255,255,.05)}
.sf{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.3);transition:.13s}
.sf:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.6)}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;box-shadow:var(--sh)}
.tb-back{font-size:12px;color:var(--muted);text-decoration:none;transition:.13s}.tb-back:hover{color:var(--am)}
.tb-sep{width:1px;height:20px;background:var(--bd);flex-shrink:0}
.tb-title{font-size:15px;font-weight:600;color:var(--ink)}.tb-crumb{font-size:11px;color:var(--faint)}.tb-crumb a{color:var(--muted);text-decoration:none}
.tb-act{margin-left:auto;display:flex;gap:9px;align-items:center}
.btn{padding:7px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;transition:.15s;font-family:'Outfit',sans-serif;border:none}
.btn-p{background:var(--navy);color:var(--gold)}.btn-p:hover{background:var(--navy-l)}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--bd)}.btn-g:hover{background:var(--cream2);color:var(--ink)}
.btn-em{background:var(--em-bg);color:var(--em);border:1px solid rgba(5,150,105,.2)}.btn-em:hover{background:var(--em);color:#fff}
.btn-vt{background:var(--vt-bg);color:var(--vt);border:1px solid rgba(124,58,237,.2)}.btn-vt:hover{background:var(--vt);color:#fff}
.btn-rd{background:var(--rd-bg);color:var(--rd);border:1px solid rgba(220,38,38,.2)}.btn-rd:hover{background:var(--rd);color:#fff}
.btn-sm{padding:5px 12px;font-size:11px}
.tab-bar{display:flex;border-bottom:2px solid var(--bd);background:var(--white);flex-shrink:0;overflow-x:auto}
.tab-bar::-webkit-scrollbar{height:0}
.tab{padding:13px 16px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s;white-space:nowrap}
.tab:hover{color:var(--ink)}.tab.active{color:var(--navy);border-bottom-color:var(--gold)}
.page{flex:1;overflow-y:auto;padding:24px}.page::-webkit-scrollbar{width:5px}.page::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.gd::before{background:var(--gold)}.kpi.em::before{background:var(--em)}.kpi.sk::before{background:var(--sk)}.kpi.am::before{background:var(--am)}.kpi.vt::before{background:var(--vt)}.kpi.pi::before{background:var(--pi)}.kpi.rd::before{background:var(--rd)}
.kpi-lb{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.kpi-vl{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--ink)}
.kpi-sb{font-size:10px;color:var(--faint);margin-top:3px}
.card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:16px}
.card-head{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--cream2)}
.card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink);display:flex;align-items:center;gap:6px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--faint);padding:9px 13px;border-bottom:2px solid var(--bd);text-align:left;background:var(--cream2)}
.tbl td{padding:10px 13px;border-bottom:1px solid var(--bd);color:var(--ink);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}.tbl tr:hover td{background:rgba(200,169,81,.03)}
.mono{font-family:'DM Mono',monospace;font-size:11px;color:var(--faint)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.b-em{background:var(--em-bg);color:var(--em)}.b-am{background:var(--am-bg);color:var(--am)}.b-rd{background:var(--rd-bg);color:var(--rd)}.b-sk{background:var(--sk-bg);color:var(--sk)}.b-vt{background:var(--vt-bg);color:var(--vt)}.b-pi{background:var(--pi-bg);color:var(--pi)}.b-gd{background:var(--gold-dim);color:#92610A}.b-mu{background:var(--cream2);color:var(--faint);border:1px solid var(--bd)}
.fbar{display:flex;gap:10px;align-items:center;padding:10px 13px;border-bottom:1px solid var(--bd);flex-wrap:wrap}
.fsel{padding:7px 10px;background:var(--cream2);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:12px;color:var(--ink);font-family:'Outfit',sans-serif;outline:none;cursor:pointer}.fsel:focus{border-color:var(--gold)}
.srch{position:relative;flex:1;min-width:180px}
.srch input{width:100%;padding:7px 12px 7px 32px;background:var(--cream2);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:12px;color:var(--ink);font-family:'Outfit',sans-serif;outline:none}
.srch input:focus{border-color:var(--gold);background:var(--white)}
.srch-ic{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:12px;pointer-events:none}
.row-act{display:flex;gap:5px;opacity:0;transition:.13s}.tbl tr:hover .row-act{opacity:1}
/* STEP BAR */
.step-bar{display:flex;align-items:center;gap:0;margin:16px 0}
.step{display:flex;flex-direction:column;align-items:center;flex:1;position:relative}
.step:not(:last-child)::after{content:'';position:absolute;top:14px;left:50%;width:100%;height:2px;background:var(--bd);z-index:0}
.step.done:not(:last-child)::after{background:var(--em)}
.step.active:not(:last-child)::after{background:var(--am)}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;z-index:1;position:relative;border:2px solid var(--bd);background:var(--white);color:var(--faint)}
.step.done .step-dot{background:var(--em);border-color:var(--em);color:#fff}
.step.active .step-dot{background:var(--am);border-color:var(--am);color:#fff;box-shadow:0 0 0 4px var(--am-bg)}
.step-label{font-size:9px;font-weight:600;color:var(--faint);margin-top:5px;text-align:center;white-space:nowrap}
.step.done .step-label{color:var(--em)}.step.active .step-label{color:var(--am)}
/* SCORE */
.score-ring{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;border:3px solid var(--bd);flex-shrink:0}
.score-ring.s-high{border-color:var(--em);color:var(--em);background:var(--em-bg)}
.score-ring.s-mid{border-color:var(--am);color:var(--am);background:var(--am-bg)}
.score-ring.s-low{border-color:var(--faint);color:var(--faint);background:var(--cream2)}
/* MATCH CARD */
.match-card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:14px;box-shadow:var(--sh);transition:.15s;cursor:pointer}
.match-card:hover{border-color:var(--gold);box-shadow:0 2px 8px rgba(200,169,81,.12)}
.match-card.selected{border-color:var(--vt);background:var(--vt-bg)}
/* PROGRESS BAR */
.prog{height:5px;background:var(--bd);border-radius:3px;overflow:hidden;margin-top:4px}
.prog-fill{height:100%;border-radius:3px}
/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-bg.show{display:flex}
.modal{background:var(--white);border-radius:12px;width:600px;max-width:96vw;box-shadow:0 20px 60px rgba(0,0,0,.2);max-height:90vh;display:flex;flex-direction:column}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:14px;font-weight:700;color:var(--ink)}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted)}
.modal-body{padding:18px 20px;overflow-y:auto;flex:1}
.modal-foot{padding:12px 20px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.field{margin-bottom:12px}.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:8px 11px;background:var(--cream2);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:13px;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;outline:none;transition:.15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);background:var(--white)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dc{padding:9px 11px;background:var(--cream2);border-radius:var(--r-sm)}
.dc-lb{font-size:10px;color:var(--faint);margin-bottom:2px}.dc-vl{font-size:12px;font-weight:600;color:var(--ink)}
/* TIMELINE */
.timeline{display:flex;flex-direction:column;gap:0}
.tl-item{display:flex;gap:12px;position:relative;padding-bottom:14px}
.tl-item:last-child{padding-bottom:0}
.tl-item:not(:last-child)::before{content:'';position:absolute;left:13px;top:28px;bottom:0;width:2px;background:var(--bd)}
.tl-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;z-index:1}
.tl-content{flex:1;padding-top:4px}
.tl-date{font-size:10px;color:var(--faint);font-family:'DM Mono',monospace}
.tl-text{font-size:12px;color:var(--ink);margin-top:2px;font-weight:500}
.tl-sub{font-size:11px;color:var(--muted);margin-top:2px}
/* OFFER BOX */
.offer-box{background:var(--am-bg);border:1px solid rgba(217,119,6,.25);border-radius:var(--r);padding:14px 16px;margin-bottom:12px}
/* TAG */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:600;background:var(--cream2);color:var(--muted);border:1px solid var(--bd);margin:2px}
/* AG CHIP */
.ag-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;background:var(--sk-bg);border:1px solid rgba(2,132,199,.15);border-radius:20px;font-size:10px;color:var(--sk);font-weight:600}
.pt-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;background:var(--em-bg);border:1px solid rgba(5,150,105,.15);border-radius:20px;font-size:10px;color:var(--em);font-weight:600}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .3s ease}
</style>
</head>
<body>
<div class="shell">
  <nav class="sb">
    <div class="sb-head"><div class="sb-logo">CORETO</div><div class="sb-ver">COREBLDG v2.0</div></div>
    <div class="sb-user">
      <div class="sb-av" id="sb-av">HR</div>
      <div><div class="sb-un" id="sb-name">鈴木 花子</div><div class="sb-ur" id="sb-role">HR-AG / Silver</div></div>
    </div>
    <div class="sb-nav" id="sb-nav"></div>
    <div class="sb-foot">
      <div class="sf" onclick="CNAV.openSettings()">⚙️ &nbsp;設定</div>
      <div class="sf" onclick="CNAV.logout()">🚪 &nbsp;ログアウト</div>
    </div>
  </nav>
  <div class="content">
    <div class="topbar">
      <a href="coreto-hub-v2.html" class="tb-back">← 戻る</a>
      <div class="tb-sep"></div>
      <div><div class="tb-title">人材マッチング</div>
      <div class="tb-crumb"><a href="coreto-hub-v2.html">COREBLDG</a> › 人材マッチング</div></div>
      <div class="tb-act" id="tb-act"></div>
    </div>
    <div class="tab-bar">
      <div class="tab active" id="tab-dash"     onclick="switchTab('dash')">📊 ダッシュボード</div>
      <div class="tab"        id="tab-seekers"  onclick="switchTab('seekers')">👤 求職者管理</div>
      <div class="tab"        id="tab-jobs"     onclick="switchTab('jobs')">🏢 求人管理</div>
      <div class="tab"        id="tab-match"    onclick="switchTab('match')">🤖 AIマッチング</div>
      <div class="tab"        id="tab-process"  onclick="switchTab('process')">📋 選考管理</div>
      <div class="tab"        id="tab-pt"       onclick="switchTab('pt')">🤝 PT紹介履歴</div>
    </div>
    <div class="page" id="page"></div>
  </div>
</div>

<!-- MODAL: 求職者詳細 -->
<div class="modal-bg" id="modal-seeker" onclick="if(event.target===this)closeModal('modal-seeker')">
  <div class="modal" style="width:680px">
    <div class="modal-head"><div class="modal-title" id="seeker-title">求職者詳細</div><button class="modal-close" onclick="closeModal('modal-seeker')">✕</button></div>
    <div class="modal-body" id="seeker-body"></div>
    <div class="modal-foot" id="seeker-foot"></div>
  </div>
</div>
<!-- MODAL: 求人詳細 -->
<div class="modal-bg" id="modal-job" onclick="if(event.target===this)closeModal('modal-job')">
  <div class="modal" style="width:680px">
    <div class="modal-head"><div class="modal-title" id="job-title">求人詳細</div><button class="modal-close" onclick="closeModal('modal-job')">✕</button></div>
    <div class="modal-body" id="job-body"></div>
    <div class="modal-foot"><button class="btn btn-g" onclick="closeModal('modal-job')">閉じる</button><button class="btn btn-vt" onclick="closeModal('modal-job');switchTab('match')">🤖 マッチング候補を見る</button></div>
  </div>
</div>
<!-- MODAL: 選考詳細 -->
<div class="modal-bg" id="modal-proc" onclick="if(event.target===this)closeModal('modal-proc')">
  <div class="modal" style="width:720px">
    <div class="modal-head"><div class="modal-title" id="proc-title">選考詳細</div><button class="modal-close" onclick="closeModal('modal-proc')">✕</button></div>
    <div class="modal-body" id="proc-body"></div>
    <div class="modal-foot" id="proc-foot"></div>
  </div>
</div>
<!-- MODAL: 新規求職者登録 -->
<div class="modal-bg" id="modal-add-seeker" onclick="if(event.target===this)closeModal('modal-add-seeker')">
  <div class="modal">
    <div class="modal-head"><div class="modal-title">＋ 求職者登録</div><button class="modal-close" onclick="closeModal('modal-add-seeker')">✕</button></div>
    <div class="modal-body">
      <div class="field-row">
        <div class="field"><label>氏名（姓）</label><input placeholder="山田"></div>
        <div class="field"><label>氏名（名）</label><input placeholder="太郎"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>メールアドレス</label><input type="email" placeholder="taro@example.com"></div>
        <div class="field"><label>電話番号</label><input type="tel" placeholder="090-0000-0000"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>現職種</label><input placeholder="営業職"></div>
        <div class="field"><label>現在の年収</label><input placeholder="450万円"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>希望職種</label><input placeholder="マネージャー職"></div>
        <div class="field"><label>希望年収</label><input placeholder="600万円〜"></div>
      </div>
      <div class="field"><label>スキル・経験（カンマ区切り）</label><input placeholder="営業, CRM, マネジメント, SaaS"></div>
      <div class="field-row">
        <div class="field"><label>経験年数</label><input placeholder="7年"></div>
        <div class="field"><label>PT紹介コード（任意）</label><input placeholder="PT-0015"></div>
      </div>
      <div class="field"><label>担当AG</label>
        <select><option>鈴木 花子（HR-AG）</option><option>直接登録</option></select>
      </div>
      <div class="field"><label>備考</label><textarea placeholder="転職理由・希望条件など" style="height:60px;resize:none"></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-g" onclick="closeModal('modal-add-seeker')">キャンセル</button>
      <button class="btn btn-p" onclick="alert('求職者を登録しました');closeModal('modal-add-seeker')">登録する</button>
    </div>
  </div>
</div>
<!-- MODAL: 新規求人登録 -->
<div class="modal-bg" id="modal-add-job" onclick="if(event.target===this)closeModal('modal-add-job')">
  <div class="modal">
    <div class="modal-head"><div class="modal-title">＋ 求人票登録</div><button class="modal-close" onclick="closeModal('modal-add-job')">✕</button></div>
    <div class="modal-body">
      <div class="field-row">
        <div class="field"><label>企業名</label><input placeholder="株式会社〇〇"></div>
        <div class="field"><label>求人職種</label><input placeholder="営業マネージャー"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>業種</label>
          <select><option>IT・通信</option><option>不動産</option><option>金融</option><option>医療・介護</option><option>製造</option><option>小売・流通</option><option>その他</option></select>
        </div>
        <div class="field"><label>雇用形態</label>
          <select><option>正社員</option><option>契約社員</option><option>業務委託</option></select>
        </div>
      </div>
      <div class="field-row">
        <div class="field"><label>想定年収（下限）</label><input placeholder="500万円"></div>
        <div class="field"><label>想定年収（上限）</label><input placeholder="800万円"></div>
      </div>
      <div class="field"><label>必須スキル（カンマ区切り）</label><input placeholder="営業経験5年以上, マネジメント, SaaS"></div>
      <div class="field"><label>歓迎スキル</label><input placeholder="英語, CRM経験"></div>

let matchResults = null;
let selectedSeeker = null;

function renderMatch() {
  const seekerOpts = SEEKERS.map(s=>`<option value="${s.id}">${s.name}（${s.targetJob}）</option>`).join('');
  const resultsHtml = matchResults ? renderMatchResults() : '<div style="text-align:center;padding:40px;color:var(--faint);font-size:13px">🤖 上の検索条件を指定して「AIマッチング実行」ボタンを押してください</div>';

      <div style="padding:14px 16px;display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:12px;align-items:end">
        <div class="field" style="margin:0"><label>求職者を選択</label>
          <select id="match-seeker-sel" onchange="selectedSeeker=this.value">
            <option value="">— 求職者を選んでください —</option>
            ${seekerOpts}
          </select>
        </div>
        <div class="field" style="margin:0"><label>業種フィルター（任意）</label>
          <select id="match-industry"><option value="">すべての業種</option><option>IT・通信</option><option>EC・小売</option><option>SaaS</option></select>
        </div>
        <div class="field" style="margin:0"><label>年収（下限）</label>
          <select id="match-salary"><option value="0">指定なし</option><option value="400">400万以上</option><option value="600">600万以上</option><option value="800">800万以上</option></select>
        </div>
        <button class="btn btn-vt" id="ai-match-btn" onclick="runAIMatch()" style="white-space:nowrap">🤖 AI実行</button>
      </div>
    </div>
    <div id="match-results">${resultsHtml}</div>`;
}

async function runAIMatch() {
  const sel = document.getElementById('match-seeker-sel');
  const sid = sel ? sel.value : (selectedSeeker || SEEKERS[0].id);
  if (!sid) { toast('求職者を選択してください','warn'); return; }
  const seeker = SEEKERS.find(s=>s.id===sid);
  if (!seeker) return;

  const btn = document.getElementById('ai-match-btn');
  if (btn) { btn.disabled=true; btn.innerHTML='<span style="animation:spin .8s linear infinite;display:inline-block">🤖</span> 解析中...'; }

  const prompt = `あなたはCOREBLDGの人材マッチングAIです。
求職者情報:
- 氏名: ${seeker.name}、${seeker.age}歳
- 現職: ${seeker.currentJob}
- スキル: ${seeker.skills.join('、')}
- 経験年数: ${seeker.experience}年
- 現年収: ${seeker.currentSalary}万、希望: ${seeker.targetSalary}万
- 希望職種: ${seeker.targetJob}

求人リスト:
${JOBS.map(j=>`[${j.id}] ${j.company} / ${j.position} / ${j.salaryMin}〜${j.salaryMax}万 / 必須: ${j.skills.join('、')}`).join('\n')}

各求人に対して適合スコア（0-100）と理由を分析してください。
JSONのみ返却（前置き不要）:
{"matches":[{"jobId":"JOB-001","score":85,"reasons":["理由1","理由2","理由3"],"concern":"懸念点","recommendation":"推薦文（50字以内）"}]}`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,messages:[{role:'user',content:prompt}]})
    });
    const data = await resp.json();
    const text = data.content?.find(b=>b.type==='text')?.text || '{}';
    const parsed = JSON.parse(text.replace(/```json|```/g,'').trim());
    matchResults = {seekerId:sid,seekerName:seeker.name,matches:parsed.matches||[]};
  } catch(e) {
    // フォールバック
    matchResults = {seekerId:sid,seekerName:seeker.name,matches:JOBS.map(j=>({
      jobId:j.id,score:Math.floor(Math.random()*30)+65,
      reasons:['スキルの親和性が高い','年収レンジが合致','業種経験あり'],
      concern:'勤務地条件の確認が必要',recommendation:'即戦力として高く評価できます。面接を推奨します。'
    }))};
  }
  matchResults.matches.sort((a,b)=>b.score-a.score);

  document.getElementById('match-results').innerHTML = renderMatchResults();
  if (btn) { btn.disabled=false; btn.innerHTML='🤖 AI実行'; }
}

function renderMatchResults() {
  if (!matchResults) return '';
  return `
    <div style="font-size:13px;font-weight:600;color:var(--ink);margin-bottom:12px">
      「${matchResults.seekerName}」さんへの求人マッチング結果 — ${matchResults.matches.length}件
    </div>
    ${matchResults.matches.map(m => {
      const j = JOBS.find(x=>x.id===m.jobId);
      if (!j) return '';
      const cls = m.score>=90?'s-high':m.score>=70?'s-mid':'s-low';
      return `<div class="match-card fade-in">
        <div class="score-ring ${cls}">${m.score}</div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
            <div style="font-weight:700;font-size:13px">${j.company}</div>
            <span class="badge b-vt">${j.position}</span>
            <span style="font-size:11px;color:var(--em);font-weight:600;margin-left:auto">${j.salaryMin}〜${j.salaryMax}万 / 報酬率${j.feeRate}%</span>
          </div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:6px">${m.recommendation}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">
            ${(m.reasons||[]).map(r=>`<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--em)"><span>✓</span><span>${r}</span></div>`).join('')}
          </div>
          ${m.concern?`<div style="font-size:10px;color:var(--am)">⚠️ ${m.concern}</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0">
          <button class="btn btn-sm btn-vt" onclick="openJobModal('${j.id}')">求人詳細</button>
          <button class="btn btn-sm btn-em" onclick="startProcess('${matchResults.seekerId}','${j.id}')">選考開始</button>
        </div>
      </div>`;
    }).join('')}`;
}

function startProcess(seekerId, jobId) {
  const s = SEEKERS.find(x=>x.id===seekerId);
  const j = JOBS.find(x=>x.id===jobId);
  if (!s||!j) return;
  if (!confirm(`「${s.name}」さんを「${j.company} / ${j.position}」の選考に進めますか？`)) return;
  toast('選考を開始しました。選考管理タブで確認できます。');
  setTimeout(()=>switchTab('process'),1200);
}

function stepBar(steps, compact=false) {
  const size = compact ? 22 : 28;
  const lsize = compact ? 8 : 9;
  return `<div style="display:flex;align-items:center;gap:0;${compact?'margin:4px 0':'margin:16px 0'}">
    ${steps.map((s,i) => {
      const isLast = i===steps.length-1;
      const dotBg = s.status==='done'?'var(--em)':s.status==='active'?'var(--am)':'var(--bd)';
      const dotColor = s.status==='pending'?'var(--faint)':'#fff';
      const lineColor = s.status==='done'?'var(--em)':s.status==='active'?'var(--am)':'var(--bd)';
      return `<div style="display:flex;flex-direction:column;align-items:center;flex:1;position:relative">
        ${!isLast?`<div style="position:absolute;top:${size/2}px;left:50%;width:100%;height:2px;background:${lineColor};z-index:0"></div>`:''}
        <div style="width:${size}px;height:${size}px;border-radius:50%;background:${dotBg};display:flex;align-items:center;justify-content:center;font-size:${compact?9:11}px;font-weight:700;color:${dotColor};z-index:1;position:relative;border:2px solid ${dotBg==='var(--bd)'?'var(--bd)':dotBg}">
          ${s.status==='done'?'✓':s.status==='active'?'●':(i+1)}
        </div>
        ${!compact?`<div style="font-size:${lsize}px;font-weight:600;color:${s.status==='done'?'var(--em)':s.status==='active'?'var(--am)':'var(--faint)'};margin-top:4px;text-align:center;white-space:nowrap">${s.label}</div>`:''}
      </div>`;
    }).join('')}
  </div>`;
}

    </div>
    <div style="margin-bottom:14px">
      <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px">選考ステップ</div>
      ${stepBar(p.steps, false)}
    </div>
    ${offerSection}
    <div>
      <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px">タイムライン / フィードバック履歴</div>
      <div class="timeline">${tlItems}</div>
    </div>
    <div style="margin-top:14px;padding:12px 14px;background:var(--cream2);border-radius:var(--r-sm)">
      <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px">進捗メモを追加</div>
      <textarea style="width:100%;padding:7px 10px;background:var(--white);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:12px;font-family:'Outfit','Noto Sans JP',sans-serif;resize:none;outline:none;height:60px" placeholder="面接結果・フィードバック・次のアクション等..." onfocus="this.style.borderColor='var(--gold)';" onblur="this.style.borderColor='var(--bd)'"></textarea>
      <div style="display:flex;justify-content:flex-end;margin-top:6px">
        <button class="btn btn-sm btn-p" onclick="alert('メモを保存しました')">保存</button>
      </div>
    </div>`;

  document.getElementById('proc-foot').innerHTML = `
    <button class="btn btn-g" onclick="closeModal('modal-proc')">閉じる</button>
    <button class="btn btn-sm btn-em" onclick="alert('次のステップに進めました（デモ）')">▶ 次のステップへ</button>`;
  openModal('modal-proc');
}

// ═══════════════════════════════════════════
// ⑥ PT紹介履歴
// ═══════════════════════════════════════════
function renderPT() {
  const grouped = {};
  PT_REFS.forEach(r => {
    if (!grouped[r.ptCode]) grouped[r.ptCode] = {name:r.ptName,code:r.ptCode,refs:[]};
    grouped[r.ptCode].refs.push(r);
  });

  const byPT = Object.values(grouped).map(g => {
    const rows = g.refs.map(r => `<tr>
      <td style="font-weight:600;font-size:12px">${r.seekerName!=='—'?r.seekerName:'—'}</td>
      <td style="font-size:11px;color:var(--muted)">${r.jobName}</td>
      <td><span class="badge b-mu">${r.type}</span></td>
      <td><span class="badge ${r.status==='オファー交渉中'?'b-am':r.status==='書類審査中'?'b-sk':'b-mu'}">${r.status}</span></td>
      <td style="font-weight:700;color:${r.reward>0?'var(--em)':'var(--faint)'};font-variant-numeric:tabular-nums">
        ${r.reward>0?'¥'+r.reward.toLocaleString():'確定待ち'}</td>
      <td class="mono" style="font-size:11px">${r.date}</td>
    </tr>`).join('');

    const totalReward = g.refs.reduce((s,r)=>s+r.reward,0);
    return `<div class="card">
      <div class="card-head">
        <div class="card-title">
          <span class="pt-chip">🤝 ${g.code}</span>
          ${g.name}
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-size:12px;color:var(--muted)">${g.refs.length}件紹介</span>
          <span style="font-size:13px;font-weight:700;color:${totalReward>0?'var(--em)':'var(--faint)'}">${totalReward>0?'¥'+totalReward.toLocaleString():'—'}</span>
        </div>
      </div>
      <table class="tbl">
        <thead><tr><th>求職者</th><th>求人</th><th>種別</th><th>進捗</th><th>確定報酬</th><th>紹介日</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }).join('');

  return `
    <div class="kpi-row" style="grid-template-columns:repeat(4,1fr)">
      <div class="kpi gd"><div class="kpi-lb">紹介PT数</div><div class="kpi-vl">${Object.keys(grouped).length}</div></div>
      <div class="kpi em"><div class="kpi-lb">PT経由紹介総数</div><div class="kpi-vl">${PT_REFS.length}件</div></div>
      <div class="kpi am"><div class="kpi-lb">交渉・選考中</div><div class="kpi-vl">${PT_REFS.filter(r=>r.status!=='入社済み').length}件</div></div>
      <div class="kpi sk"><div class="kpi-lb">今月PT報酬（確定）</div><div class="kpi-vl">¥225k</div></div>
    </div>
    <div style="font-size:12px;color:var(--muted);padding:0 0 12px;display:flex;align-items:center;gap:6px">
      🔒 PTへの報酬支払いはオファー承諾・入社確認後に確定します。アカウント停止は「HQ管理パネル」で行ってください。
    </div>
    ${byPT}`;
}

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function openModal(id)  { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function toast(msg, type='ok') {
  let t=document.getElementById('_toast');
  if(!t){t=document.createElement('div');t.id='_toast';Object.assign(t.style,{position:'fixed',bottom:'24px',left:'50%',transform:'translateX(-50%) translateY(10px)',padding:'10px 20px',borderRadius:'8px',fontSize:'13px',fontWeight:'600',zIndex:'9999',opacity:'0',transition:'all .25s',fontFamily:"'Outfit',sans-serif",boxShadow:'0 4px 20px rgba(0,0,0,.25)',whiteSpace:'nowrap'});document.body.appendChild(t);}
  t.style.background=type==='warn'?'var(--am)':'#0D1A2D';t.style.color='#fff';
  t.textContent=msg;t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(t._t);t._t=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(10px)';},2500);
}

window.addEventListener('DOMContentLoaded', () => {
  CNAV.init('hr_matching');
  switchTab('dash');
});
</script>
