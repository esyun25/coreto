<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>インターン管理 — COREBLDG</title>
<link rel="stylesheet" href="coreto-design-system.css">
<style>

:root{--navy:#0D1A2D;--navy-l:#1E3252;--gold:#C8A951;--gold-l:#DFC06A;--gold-dim:rgba(200,169,81,.15);--cream:#FFFFFF;--cream2:#F8F9FA;--white:#FFFFFF;--ink:#202124;--ink2:#2D3748;--muted:#5F6368;--faint:#80868B;--em:#059669;--em-bg:#ECFDF5;--am:#D97706;--am-bg:#FFFBEB;--rd:#DC2626;--rd-bg:#FEF2F2;--sk:#0284C7;--sk-bg:#F0F9FF;--vt:#7C3AED;--vt-bg:#F5F3FF;--bd:#E8EAED;--bd2:#DADCE0;--sw:240px;--r:10px;--r-sm:7px;--sh:0 1px 2px rgba(60,64,67,.1),0 1px 3px rgba(60,64,67,.06)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:var(--cream)}
.shell{display:flex;height:100vh}
.sb{width:var(--sw);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;position:relative}
.sb::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,rgba(200,169,81,.25) 0%,rgba(200,169,81,.06) 50%,transparent 100%)}
.sb-head{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;letter-spacing:5px;color:var(--gold)}
.sb-ver{font-size:9px;letter-spacing:2px;color:rgba(200,169,81,.3);font-family:'DM Mono',monospace;margin-top:2px}
.sb-user{margin:14px 14px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:9px 11px;display:flex;align-items:center;gap:9px}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--gold-dim);border:1px solid rgba(200,169,81,.25);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gold);flex-shrink:0}
.sb-un{font-size:11px;font-weight:600;color:rgba(255,255,255,.8)}
.sb-ur{font-size:9px;color:rgba(255,255,255,.3);font-family:'DM Mono',monospace}
.sb-nav{flex:1;overflow-y:auto;padding:6px 10px}
.nsl{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.18);padding:10px 8px 4px;font-family:'DM Mono',monospace}
.ni{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;cursor:pointer;transition:all .13s;text-decoration:none;position:relative;margin-bottom:1px}
.ni:hover{background:rgba(255,255,255,.06)}
.ni.active{background:rgba(200,169,81,.1)}
.ni.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:16px;background:var(--gold);border-radius:0 2px 2px 0}
.ni-ic{width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;border-radius:6px;background:rgba(255,255,255,.04);flex-shrink:0}
.ni.active .ni-ic{background:rgba(200,169,81,.12)}
.ni-lb{font-size:11px;font-weight:500;color:rgba(255,255,255,.55);flex:1}
.ni.active .ni-lb,.ni:hover .ni-lb{color:var(--gold)}
.nb{font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;background:var(--rd);color:#fff;font-family:'DM Mono',monospace}
.nb.am{background:var(--am)}
.sf{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.3);transition:.13s}
.sf:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.6)}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;box-shadow:var(--sh)}
.tb-title{font-size:16px;font-weight:600;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;letter-spacing:.2px}
.tb-crumb{font-size:11px;color:var(--faint);margin-top:1px}
.tb-crumb a{color:var(--muted);text-decoration:none}
.tb-act{margin-left:auto;display:flex;gap:9px;align-items:center}
.btn{padding:7px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Outfit',sans-serif;border:none}
.btn-p{background:var(--navy);color:var(--gold)}.btn-p:hover{background:var(--navy-l)}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--bd)}.btn-g:hover{background:var(--cream);color:var(--ink)}
.btn-sm{padding:5px 12px;font-size:11px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;font-family:'Outfit',sans-serif;font-feature-settings:'tnum'}
.b-em{background:var(--em-bg);color:var(--em)}.b-am{background:var(--am-bg);color:var(--am)}.b-rd{background:var(--rd-bg);color:var(--rd)}.b-sk{background:var(--sk-bg);color:var(--sk)}.b-vt{background:var(--vt-bg);color:var(--vt)}.b-gd{background:var(--gold-dim);color:var(--am)}.b-nt{background:var(--cream2);color:var(--muted)}
.tab-bar{padding:0 24px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center}
.tab{padding:12px 18px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.tab:hover{color:var(--ink)}.tab.active{color:var(--navy);border-bottom-color:var(--gold)}
.page{flex:1;overflow-y:auto;padding:24px}
.page::-webkit-scrollbar{width:5px}.page::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.gd::before{background:var(--gold)}.kpi.em::before{background:var(--em)}.kpi.sk::before{background:var(--sk)}.kpi.am::before{background:var(--am)}
.kpi-lb{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.kpi-vl{font-size:24px;font-weight:700;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif}
.kpi-sb{font-size:10px;color:var(--faint);margin-top:4px}
.card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:18px}
.card-head{padding:14px 20px;border-bottom:1px solid var(--bd);background:var(--cream);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:12px;font-weight:700;color:var(--ink);text-transform:uppercase;letter-spacing:.5px}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 14px;text-align:left;font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);background:var(--cream);border-bottom:1px solid var(--bd);white-space:nowrap;font-family:'DM Mono',monospace}
thead th:first-child{padding-left:18px}
tbody tr{border-bottom:1px solid var(--bd);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(200,169,81,.03)}
tbody td{padding:12px 14px;font-size:12px;color:var(--ink2);vertical-align:middle}
tbody td:first-child{padding-left:18px}
.td-name{font-size:13px;font-weight:600;color:var(--ink)}
.td-sub{font-size:10px;color:var(--faint);font-family:'DM Mono',monospace;margin-top:1px}
/* LEADERBOARD */
.lbd{display:flex;flex-direction:column;gap:10px;padding:0 20px 20px}
.lb-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--cream);border-radius:var(--r-sm);border:1px solid var(--bd);cursor:pointer;transition:all .15s}
.lb-item:hover{background:var(--cream2);transform:translateX(2px)}
.lb-item.gold{background:linear-gradient(135deg,rgba(200,169,81,.12) 0%,rgba(200,169,81,.04) 100%);border-color:rgba(200,169,81,.3)}
.lb-rank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;font-family:'Outfit',sans-serif;font-feature-settings:'tnum'}
.lb-rank.r1{background:var(--gold);color:var(--navy)}.lb-rank.r2{background:#C0C0C0;color:var(--ink)}.lb-rank.r3{background:#CD7F32;color:#fff}.lb-rank.rn{background:var(--cream2);color:var(--muted);font-size:11px}
.lb-info{flex:1}
.lb-name{font-size:13px;font-weight:700;color:var(--ink)}
.lb-meta{font-size:11px;color:var(--muted);margin-top:1px}
.lb-stat{text-align:right}
.lb-val{font-size:16px;font-weight:300;font-family:'Outfit','Noto Sans JP',sans-serif;color:var(--navy);font-variant-numeric:tabular-nums}
.lb-sub{font-size:10px;color:var(--faint)}
.lb-bar{height:4px;border-radius:2px;overflow:hidden;background:var(--bd);margin-top:6px}
.lb-fill{height:100%;border-radius:2px;background:var(--gold)}
/* VISIT LOG */
.visit-item{display:flex;align-items:center;gap:10px;padding:11px 20px;border-bottom:1px solid var(--bd)}
.visit-item:last-child{border-bottom:none}
.visit-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.visit-dot.em{background:var(--em)}.visit-dot.am{background:var(--am)}.visit-dot.rd{background:var(--rd)}.visit-dot.nt{background:var(--bd2)}
.visit-addr{font-size:12px;font-weight:600;color:var(--ink);flex:1}
.visit-meta{font-size:10px;color:var(--faint);font-family:'DM Mono',monospace}
.visit-reward{font-size:12px;font-weight:300;font-family:'Outfit','Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums}
/* MOBILE PREVIEW */
.mobile-frame{width:280px;border:3px solid var(--navy);border-radius:28px;overflow:hidden;box-shadow:0 20px 60px rgba(13,26,45,.25);background:var(--cream);flex-shrink:0}
.mf-bar{background:var(--navy);padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.mf-logo{font-family:'Outfit','Noto Sans JP',sans-serif;font-size:14px;font-weight:700;color:var(--gold);letter-spacing:3px}
.mf-body{padding:14px;max-height:480px;overflow-y:auto}
.mf-kpi{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;font-variant-numeric:tabular-nums}
.mf-kpi-c{background:var(--white);border-radius:9px;padding:10px 12px;border:1px solid var(--bd);font-variant-numeric:tabular-nums}
.mf-kpi-lb{font-size:9px;color:var(--muted);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;font-variant-numeric:tabular-nums}
.mf-kpi-vl{font-size:18px;font-weight:300;font-family:'Outfit','Noto Sans JP',sans-serif;color:var(--ink);font-variant-numeric:tabular-nums}
.mf-btn{width:100%;padding:14px;background:var(--navy);color:var(--gold);border:none;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;margin-bottom:10px}
.mf-sect{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px}
.mf-visit{background:var(--white);border-radius:9px;padding:10px 12px;border:1px solid var(--bd);margin-bottom:7px;display:flex;align-items:flex-start;gap:8px}
.mf-visit-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.mf-visit-tx{font-size:11px;color:var(--ink);font-weight:600}
.mf-visit-mt{font-size:10px;color:var(--faint)}
.mf-reward{font-size:11px;font-weight:300;color:var(--em);font-family:'Outfit','Noto Sans JP',sans-serif;margin-left:auto;flex-shrink:0;font-variant-numeric:tabular-nums}

/* ════════════════════════════════════════════
   数値フォント統一 — Outfit + Tabular Nums
   (DM Monoはコード/ID系のみ維持)
   ════════════════════════════════════════════ */

/* バッジ・カウント系 */
.nb, .nav-badge, .cnav-badge,
.tab-count, .kh-count, .kc-count,
.badge, .score-num {
  font-family: 'Outfit', sans-serif !important;
  font-variant-numeric: tabular-nums;
  font-feature-settings: 'tnum';
  letter-spacing: 0 !important;
}

/* KPI大数値 */
.qs-val, .kpi-val, .kpi-value,
.stat-val, .count-val {
  font-variant-numeric: tabular-nums;
  font-feature-settings: 'tnum', 'lnum';
}

/* 日時・タイムスタンプ */
.tl-time, .remit-deadline, .check-meta,
.ic-date, .pipe-date {
  font-family: 'Outfit', sans-serif !important;
  font-variant-numeric: tabular-nums;
  font-feature-settings: 'tnum';
}

/* テーブル金額セル */
td.num, .bc-vl, .slip-meta,
.it-step-num, .pg-btn, .pg-info {
  font-family: 'Outfit', sans-serif !important;
  font-variant-numeric: tabular-nums;
  font-feature-settings: 'tnum';
}

/* 金額入力フィールド（Outfit で統一） */
.amount-input {
  font-family: 'Outfit', sans-serif !important;
  font-variant-numeric: tabular-nums;
}

/* ── Google-style DS ── */
html, body { background:#FFFFFF !important; }
.sb-logo, .brand-logo { font-family:'Cormorant Garamond',serif !important; letter-spacing:5px; }
.kpi-value, .kpi-vl {
  font-family:'Outfit','Noto Sans JP',sans-serif !important;
  font-weight:300 !important; font-variant-numeric:tabular-nums lining-nums !important;
  letter-spacing:-1px !important; color:var(--ink) !important; line-height:1 !important;
}
.kpi-value { font-size:32px !important;font-variant-numeric:tabular-nums}
.kpi-vl   { font-size:28px !important; }
.stat-val { font-weight:400 !important; font-variant-numeric:tabular-nums !important; color:var(--ink) !important; }
.kpi-label,.kpi-sub,.stat-label { font-size:11px !important; font-weight:500 !important; color:var(--muted) !important; }
.section-title { font-size:11px !important; font-weight:600 !important; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); }
.section-title::before { display:none; }
.kpi-card { background:#FFFFFF !important; border:1px solid var(--bd) !important; border-radius:8px !important; box-shadow:none !important; }
.badge { border-radius:4px !important; }
.delta-up,.kpi-delta.up { color:var(--em) !important; }
.delta-dn,.kpi-delta.dn { color:var(--rd) !important; }
/* ── Google-style 数値原則 (DS v2.3) ── */
.kpi-value, .kpi-vl, .kpi-val,
.stat-val, .qs-val, .count-val,
.td-amt, .bc-vl, .bc-total-vl,
.rr-amount, .amount-val, .srv,
.visit-reward, .lb-val,
.mf-kpi-vl, .mf-reward {
  font-family:'Outfit','Noto Sans JP',sans-serif !important;
  font-weight:300 !important;
  font-variant-numeric:tabular-nums !important;
}
.kpi-value { font-size:32px !important; }
.kpi-vl    { font-size:28px !important; }

/* ── モバイル対応 ─────────────────────────────── */
@media (max-width: 768px) {
  .shell, .app-shell { flex-direction: column; }
  .content, .main, .main-content { overflow-y: auto; }
  .topbar, .top-bar {
    padding: 0 12px;
    gap: 8px;
    height: 52px;
  }
  .tb-title { font-size: 14px; }
  .tb-actions, .top-actions { gap: 6px; }
  .btn-sm { padding: 4px 9px; font-size: 10px; }
  .page { padding: 12px; }
  .kpi-row, .stat-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .kpi-value, .kpi-vl { font-size: 22px !important; }
  table { font-size: 11px; }
  th, td { padding: 7px 8px; }
}
</style>
</head>
<body>
<div class="shell">
<nav class="sb">
  <div class="sb-head">
    <div class="sb-logo">CORE<br>BLDG</div>
    <div class="sb-ver">v2.0 — CORETO</div>
  </div>
  <div class="sb-user">
    <div class="sb-av" id="sb-av">--</div>
    <div>
      <div id="sb-name" style="font-size:11px;font-weight:600;color:rgba(255,255,255,.8)">...</div>
      <div id="sb-role" style="font-size:9px;color:rgba(255,255,255,.3);font-family:'Outfit',sans-serif;font-variant-numeric:tabular-nums">...</div>
    </div>
  </div>
  <div class="sb-nav" id="sb-nav"><!-- CNAV --></div>
</nav>

<div class="content">
  <div class="topbar">
    <div>
      <div class="tb-title">インターン管理</div>
      <div class="tb-crumb"><a href="coreto-hub-v2.html">COREBLDG</a> › <span>インターン管理</span></div>
    </div>
    <div class="tb-act">
      <button class="btn btn-g btn-sm">📤 日報エクスポート</button>
      <button class="btn btn-p" onclick="switchTab('mobile',document.querySelectorAll('.tab')[3])">📱 モバイルUI確認</button>
    </div>
  </div>
  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('overview',this)">全体サマリー</div>
    <div class="tab" onclick="switchTab('today',this)">本日の活動</div>
    <div class="tab" onclick="switchTab('board',this)">リーダーボード</div>
    <div class="tab" onclick="switchTab('mobile',this)">📱 インターンUI</div>
  </div>
  <div class="page" id="pg"></div>
</div>
</div>

<script>
(function(){
  var _role = sessionStorage.getItem('coreto_role') || '';
  var _allowed = ["hq", "intern"];
  if (_allowed.length && !_allowed.includes(_role)) {
    location.replace('coreto-hub-v2.html?unauthorized=1');
  }
})();

let tab='overview';
function switchTab(t,el){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  if(el)el.classList.add('active');
  tab=t; renderTab(t);
}
function renderTab(t){
  const pg=document.getElementById('pg');
  if(t==='overview') pg.innerHTML=overviewPage();
  if(t==='today')    pg.innerHTML=todayPage();
  if(t==='board')    pg.innerHTML=boardPage();
  if(t==='mobile')   pg.innerHTML=mobilePage();
}

// ── OVERVIEW ──
function overviewPage(){return`
  <div class="kpi-row">
    <div class="kpi gd"><div class="kpi-lb">インターン在籍数</div><div class="kpi-vl">12名</div><div class="kpi-sb">今週稼働 9名</div></div>
    <div class="kpi em"><div class="kpi-lb">今日の訪問数（計）</div><div class="kpi-vl">284件</div><div class="kpi-sb">目標 300件 / 95%</div></div>
    <div class="kpi am"><div class="kpi-lb">獲得リード（今日）</div><div class="kpi-vl">18件</div><div class="kpi-sb">転換率 6.3%</div></div>
    <div class="kpi sk"><div class="kpi-lb">今月報酬総額</div><div class="kpi-vl">¥284,000</div><div class="kpi-sb">12名合計</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px">
    <div class="card">
      <div class="card-head"><div class="card-title">👥 インターン一覧</div><button class="btn btn-g btn-sm">＋ 新規登録</button></div>
      <table>
        <thead><tr><th>氏名</th><th>今日の訪問</th><th>リード</th><th>今月報酬</th><th>状態</th></tr></thead>
        <tbody>${[
          ['渡辺 大輝','INT-0007',18,2,'¥28,400','em','稼働中'],
          ['山本 千尋','INT-0012',24,3,'¥34,200','em','稼働中'],
          ['加藤 慎也','INT-0005',12,1,'¥19,800','em','稼働中'],
          ['長谷川 舞','INT-0009',0,0,'¥8,100','nt','本日休み'],
          ['田中 亮太','INT-0015',31,4,'¥44,600','em','稼働中（トップ）'],
        ].map(r=>`<tr>
          <td><div class="td-name">${r[0]}</div><div class="td-sub">${r[1]}</div></td>
          <td><span style="font-weight:700;font-family:'Outfit','Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums;font-size:15px">${r[2]}件</span></td>
          <td><span style="font-weight:700;color:${r[3]>0?'var(--em)':'var(--faint)'}">+${r[3]}</span></td>
          <td style="font-weight:700;font-family:'Outfit','Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums;font-size:14px;color:var(--em)">${r[4]}</td>
          <td><span class="badge b-${r[5]}">${r[6]}</span></td>
        </tr>`).join('')}</tbody>
      </table>
    </div>
    <div class="card">
      <div class="card-head"><div class="card-title">📋 訪問単価・報酬設定</div></div>
      <div style="padding:18px">
        <div style="margin-bottom:16px;padding:14px;background:var(--cream);border-radius:var(--r-sm)">
          <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">💴 単価設定（現行）</div>
