<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>案件パイプライン — COREBLDG</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

:root{
  --navy:#0D1A2D;--navy-m:#152238;--navy-l:#1E3252;
  --gold:#C8A951;--gold-dim:rgba(200,169,81,.15);
  --cream:#FFFFFF;--cream2:#F8F9FA;--white:#FFFFFF;
  --ink:#202124;--ink2:#2D3748;--muted:#5F6368;--faint:#80868B;
  --em:#059669;--em-bg:#ECFDF5;--am:#D97706;--am-bg:#FFFBEB;
  --rd:#DC2626;--rd-bg:#FEF2F2;--sk:#0284C7;--sk-bg:#F0F9FF;
  --vt:#7C3AED;--vt-bg:#F5F3FF;--bd:#E8EAED;--bd2:#DADCE0;
  --sw:240px;--r:10px;--r-sm:7px;
  --sh:0 1px 2px rgba(60,64,67,.1),0 1px 3px rgba(60,64,67,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:var(--cream)}
.shell{display:flex;height:100vh}
.sb{width:var(--sw);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;position:relative}
.sb::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,rgba(200,169,81,.25) 0%,rgba(200,169,81,.06) 50%,transparent 100%)}
.sb-head{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;letter-spacing:5px;color:var(--gold)}
.sb-ver{font-size:9px;letter-spacing:2px;color:rgba(200,169,81,.3);font-family:'DM Mono',monospace;margin-top:2px}
.sb-user{margin:14px 14px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:9px 11px;display:flex;align-items:center;gap:9px}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--gold-dim);border:1px solid rgba(200,169,81,.25);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gold);flex-shrink:0}
.sb-uname{font-size:11px;font-weight:600;color:rgba(255,255,255,.8)}
.sb-urole{font-size:9px;color:rgba(255,255,255,.3);font-family:'DM Mono',monospace}
.sb-nav{flex:1;overflow-y:auto;padding:6px 10px}
.sb-nav::-webkit-scrollbar{width:3px}
.sb-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.nav-sec-label{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.18);padding:10px 8px 4px;font-family:'DM Mono',monospace}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;cursor:pointer;transition:all .13s;text-decoration:none;position:relative;margin-bottom:1px}
.nav-item:hover{background:rgba(255,255,255,.06)}
.nav-item.active{background:rgba(200,169,81,.1)}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:16px;background:var(--gold);border-radius:0 2px 2px 0}
.nav-icon{width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;border-radius:6px;background:rgba(255,255,255,.04);flex-shrink:0}
.nav-item.active .nav-icon{background:rgba(200,169,81,.12)}
.nav-label{font-size:11px;font-weight:500;color:rgba(255,255,255,.55);flex:1}
.nav-item.active .nav-label,.nav-item:hover .nav-label{color:var(--gold)}
.nav-item:hover .nav-label{color:rgba(255,255,255,.82)}
.nav-badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;background:var(--rd);color:#fff;font-family:'Outfit',sans-serif}
.nav-badge.amber{background:var(--am)}
.sb-foot{padding:10px 14px 18px;border-top:1px solid rgba(255,255,255,.05)}
.sb-foot-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.3);transition:.13s}
.sb-foot-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.6)}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;box-shadow:var(--sh)}
.tb-title{font-size:16px;font-weight:600;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;letter-spacing:.2px}
.tb-crumb{font-size:11px;color:var(--faint);display:flex;align-items:center;gap:5px;margin-top:1px}
.tb-crumb a{color:var(--muted);text-decoration:none}
.tb-crumb a:hover{color:var(--am)}
.tb-actions{margin-left:auto;display:flex;gap:9px;align-items:center}
.btn{padding:7px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Outfit',sans-serif;border:none}
.btn-primary{background:var(--navy);color:var(--gold)}
.btn-primary:hover{background:var(--navy-l)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--bd)}
.btn-ghost:hover{background:var(--cream);color:var(--ink)}
.btn-sm{padding:5px 12px;font-size:11px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;font-family:'Outfit',sans-serif;font-feature-settings:'tnum'}
.badge-em{background:var(--em-bg);color:var(--em)}
.badge-am{background:var(--am-bg);color:var(--am)}
.badge-rd{background:var(--rd-bg);color:var(--rd)}
.badge-sk{background:var(--sk-bg);color:var(--sk)}
.badge-vt{background:var(--vt-bg);color:var(--vt)}
.badge-gd{background:var(--gold-dim);color:var(--am)}
.badge-nt{background:var(--cream2);color:var(--muted)}

/* TABS */
.tab-bar{padding:0 24px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:0}
.tab{padding:12px 18px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s;white-space:nowrap;display:flex;align-items:center;gap:7px}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--navy);border-bottom-color:var(--gold)}
.tab-count{font-size:10px;padding:1px 6px;border-radius:10px;background:var(--cream2);font-family:'DM Mono',monospace}
.tab.active .tab-count{background:var(--gold-dim);color:var(--am)}
.view-toggle{margin-left:auto;display:flex;gap:4px}
.view-btn{width:30px;height:30px;border:1px solid var(--bd);border-radius:6px;background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:.13s}
.view-btn.active{background:var(--navy);border-color:var(--navy)}
.view-btn:hover:not(.active){background:var(--cream)}

/* FILTER */
.filter-bar{display:flex;align-items:center;gap:10px;padding:14px 24px;background:var(--cream);border-bottom:1px solid var(--bd);flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap input{width:100%;padding:8px 12px 8px 34px;background:var(--white);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:12px;color:var(--ink);outline:none;font-family:'Outfit','Noto Sans JP',sans-serif;transition:.15s}
.search-wrap input:focus{border-color:var(--gold)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--faint)}
.fsel{padding:7px 11px;background:var(--white);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:12px;color:var(--ink);outline:none;cursor:pointer;font-family:'Outfit',sans-serif}

/* LIST VIEW */
.page{flex:1;overflow-y:auto;padding:20px 24px}
.page::-webkit-scrollbar{width:5px}
.page::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.case-list{display:flex;flex-direction:column;gap:8px}
.case-row{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .15s;box-shadow:var(--sh)}
.case-row:hover{border-color:rgba(200,169,81,.4);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.08)}
.case-type-pill{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;font-family:'DM Mono',monospace;flex-shrink:0}
.type-rental{background:var(--sk-bg);color:var(--sk)}
.type-sale{background:var(--em-bg);color:var(--em)}
.type-hr{background:var(--vt-bg);color:var(--vt)}
.type-utility{background:var(--am-bg);color:var(--am)}
.case-id{font-size:10px;font-family:'DM Mono',monospace;color:var(--faint);margin-bottom:2px}
.case-name{font-size:14px;font-weight:600;color:var(--ink)}
.case-sub{font-size:11px;color:var(--muted);margin-top:2px}
.case-info{flex:1;min-width:0}
.case-meta{display:flex;gap:16px;align-items:center;flex-shrink:0}
.case-meta-item{text-align:right}
.case-meta-label{font-size:9px;color:var(--faint);font-family:'DM Mono',monospace;letter-spacing:.5px}
.case-meta-val{font-size:12px;font-weight:600;color:var(--ink);margin-top:1px}
.case-arrow{font-size:16px;color:var(--faint);flex-shrink:0;transition:.15s}
.case-row:hover .case-arrow{color:var(--am);transform:translateX(2px)}

/* KANBAN */
.kanban{display:flex;gap:14px;overflow-x:auto;padding-bottom:16px;height:100%}
.kanban::-webkit-scrollbar{height:5px}
.kanban::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.kanban-col{flex-shrink:0;width:240px;display:flex;flex-direction:column;gap:8px}
.kanban-head{padding:10px 14px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.kh-title{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.kh-count{font-size:10px;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:10px;font-weight:700}
.kanban-card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r-sm);padding:12px 13px;cursor:pointer;transition:all .15s;box-shadow:var(--sh)}
.kanban-card:hover{border-color:rgba(200,169,81,.4);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.kc-id{font-size:9px;font-family:'DM Mono',monospace;color:var(--faint);margin-bottom:4px}
.kc-name{font-size:12px;font-weight:700;color:var(--ink);margin-bottom:3px}
.kc-prop{font-size:11px;color:var(--muted);margin-bottom:8px}
.kc-footer{display:flex;align-items:center;justify-content:space-between}
.kc-ag{font-size:9px;font-family:'DM Mono',monospace;color:var(--faint)}
.kc-flag{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700}

/* ════════════════════════════════════════════
   数値フォント統一 — Outfit + Tabular Nums
   (DM Monoはコード/ID系のみ維持)
   ════════════════════════════════════════════ */

/* バッジ・カウント系 */
.nb, .nav-badge, .cnav-badge,
.tab-count, .kh-count, .kc-count,
.badge, .score-num {
  font-family: 'Outfit', sans-serif !important;
  font-variant-numeric: tabular-nums;
  font-feature-settings: 'tnum';
  letter-spacing: 0 !important;
}

/* KPI大数値 */
.qs-val, .kpi-val, .kpi-value,
.stat-val, .count-val {
  font-variant-numeric: tabular-nums;
  font-feature-settings: 'tnum', 'lnum';
}

/* 日時・タイムスタンプ */
.tl-time, .remit-deadline, .check-meta,
.ic-date, .pipe-date {
  font-family: 'Outfit', sans-serif !important;
  font-variant-numeric: tabular-nums;
  font-feature-settings: 'tnum';
}

/* テーブル金額セル */
td.num, .bc-vl, .slip-meta,
.it-step-num, .pg-btn, .pg-info {
  font-family: 'Outfit', sans-serif !important;
  font-variant-numeric: tabular-nums;
  font-feature-settings: 'tnum';
}

/* 金額入力フィールド（Outfit で統一） */
.amount-input {
  font-family: 'Outfit', sans-serif !important;
  font-variant-numeric: tabular-nums;
}

/* ══ MOBILE RESPONSIVE ══════════════════════════════════════════ */
.mob-ham{display:none;flex-direction:column;align-items:center;justify-content:center;width:36px;height:36px;background:transparent;border:none;cursor:pointer;border-radius:7px;transition:.13s;flex-shrink:0}
.mob-ham:hover{background:rgba(255,255,255,.08)}
.mob-ham span{display:block;width:18px;height:2px;background:rgba(255,255,255,.72);margin:3px 0;border-radius:1px;transition:.2s}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199}
@media(max-width:768px){
  .mob-ham{display:flex}
  .mob-overlay.show{display:block}
  .sb{position:fixed;left:calc(-1 * var(--sw));top:0;height:100vh;z-index:200;transition:left .25s ease;box-shadow:4px 0 24px rgba(0,0,0,.25)}
  .sb.open{left:0}
  .shell{overflow:hidden}
  .content{width:100vw;min-width:0}
  .topbar{padding:0 12px;gap:8px}
  .tb-crumb{display:none}
  .tb-actions{gap:6px}
  .page,.detail-wrap{padding:12px}
  .detail-wrap{flex-direction:column;overflow-y:auto}
  .detail-main{overflow-y:visible;min-height:0}
  .detail-side{width:100%!important;overflow-y:visible}
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;font-size:11px}
  .kpi-row,.qs-row{grid-template-columns:1fr 1fr!important}
  .g2,.form-grid{grid-template-columns:1fr!important}
  .pipeline{padding-bottom:8px}
  .step-label{font-size:9px}
  .tb-title{font-size:14px}
}


/* ── Google-style Design System ── */
html, body { background:#FFFFFF !important; }
.sb-logo, .brand-logo { font-family:'Cormorant Garamond',serif !important; }
body, input, select, textarea, button { font-family:'Outfit','Noto Sans JP',sans-serif; }
.kpi-value, .kpi-vl {
  font-family:'Outfit','Noto Sans JP',sans-serif !important;
  font-weight:300 !important;
  font-variant-numeric:tabular-nums lining-nums !important;
  letter-spacing:-1px !important;
  color:var(--ink) !important;
}
.kpi-value { font-size:32px !important;font-variant-numeric:tabular-nums}
.kpi-vl   { font-size:28px !important; }
.stat-val {
  font-family:'Outfit','Noto Sans JP',sans-serif !important;
  font-weight:400 !important;
  font-variant-numeric:tabular-nums !important;
  color:var(--ink) !important;
}
.kpi-label, .kpi-sub, .stat-label { font-size:11px !important; font-weight:500 !important; color:var(--muted) !important; }
.section-title { font-size:11px !important; font-weight:600 !important; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); }
.section-title::before { display:none; }
.card { background:#FFFFFF; border:1px solid var(--bd); border-radius:8px; box-shadow:var(--sh); }
.kpi-card { background:#FFFFFF !important; border:1px solid var(--bd) !important; border-radius:8px !important; box-shadow:none !important; }
.badge { border-radius:4px !important; font-size:11px !important; font-weight:500 !important; }
.delta-up, .kpi-delta.up { color:var(--em) !important; }
.delta-dn, .kpi-delta.dn { color:var(--rd) !important; }
/* ── Google-style 数値原則 (DS v2.3) ── */
.kpi-value, .kpi-vl, .kpi-val,
.stat-val, .qs-val, .count-val,
.td-amt, .bc-vl, .bc-total-vl,
.rr-amount, .amount-val, .srv,
.visit-reward, .lb-val,
.mf-kpi-vl, .mf-reward {
  font-family:'Outfit','Noto Sans JP',sans-serif !important;
  font-weight:300 !important;
  font-variant-numeric:tabular-nums !important;
}
.kpi-value { font-size:32px !important; }
.kpi-vl    { font-size:28px !important; }

/* ── Pipeline HQ Monitor ── */
.plm-header{padding:20px 24px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:#fff;flex-wrap:wrap;gap:12px}
.plm-filters{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-chip{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:#fff;color:var(--muted);transition:.13s}
.filter-chip.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.filter-chip:hover:not(.active){border-color:var(--navy);color:var(--navy)}
.plm-body{padding:20px 24px;overflow-y:auto;flex:1}

/* KPI bar */
.plm-kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
@media(max-width:900px){.plm-kpi{grid-template-columns:repeat(2,1fr)}}
.pk{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:14px 16px;display:flex;flex-direction:column;gap:4px}
.pk-label{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.5px}
.pk-value{font-size:22px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
.pk-sub{font-size:10px;color:var(--muted)}
.pk.gold{border-left:3px solid var(--gold)}
.pk.red{border-left:3px solid var(--rd)}
.pk.amber{border-left:3px solid var(--am)}
.pk.green{border-left:3px solid var(--em)}

/* Case rows */
.plm-group{margin-bottom:20px}
.plm-group-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.plm-group-title::after{content:'';flex:1;height:1px;background:var(--bd)}
.plm-row{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:14px 16px;margin-bottom:8px;display:grid;grid-template-columns:2fr 3fr 1fr auto;gap:12px;align-items:center;transition:.13s}
.plm-row:hover{border-color:rgba(200,169,81,.35);box-shadow:var(--sh)}
.plm-row.stagnant{border-left:3px solid var(--am);background:var(--am-bg)}
.plm-row.critical{border-left:3px solid var(--rd);background:var(--rd-bg)}
@media(max-width:768px){.plm-row{grid-template-columns:1fr;gap:8px}}
.plm-id{font-family:'DM Mono',monospace;font-size:10px;color:var(--faint)}
.plm-name{font-size:13px;font-weight:600;color:var(--ink)}
.plm-sub{font-size:11px;color:var(--muted);margin-top:1px}
.plm-ag{font-size:10px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:4px}

/* Step progress strip */
.step-strip{display:flex;gap:0;align-items:center}
.step-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;border:2px solid transparent;transition:.13s}
.step-dot.done{background:var(--em);color:#fff;border-color:var(--em)}
.step-dot.active{background:var(--navy);color:var(--gold);border-color:var(--navy)}
.step-dot.todo{background:#fff;color:var(--faint);border-color:var(--bd)}
.step-line{width:10px;height:2px;background:var(--bd);flex-shrink:0}
.step-line.done{background:var(--em)}
.step-label-row{display:flex;align-items:flex-start;gap:0;margin-top:5px}
.step-lbl{width:26px;font-size:8px;color:var(--faint);text-align:center;white-space:nowrap;overflow:hidden;flex-shrink:0}
.step-lbl-gap{width:10px;flex-shrink:0}
.step-lbl.active{color:var(--navy);font-weight:700}
.step-wrapper{overflow-x:auto;max-width:100%}

/* Days badge */
.days-badge{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
.days-ok{background:var(--em-bg);color:var(--em)}
.days-warn{background:var(--am-bg);color:var(--am)}
.days-crit{background:var(--rd-bg);color:var(--rd)}

/* AI advice inline */
.ai-advice{background:rgba(200,169,81,.06);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:10px 14px;margin-top:8px;font-size:11px}
.ai-advice-actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.ai-action-card{background:#fff;border:1px solid var(--bd);border-radius:6px;padding:8px 10px;flex:1;min-width:130px}
.ai-action-title{font-size:10px;font-weight:700;margin-bottom:3px}
.ai-action-detail{font-size:10px;color:var(--muted);line-height:1.6}
.ai-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:10px;font-weight:600;border:1px solid rgba(200,169,81,.4);background:rgba(200,169,81,.08);color:var(--gold);cursor:pointer;transition:.13s}
.ai-btn:hover{background:rgba(200,169,81,.18)}
</style>
</head>
<body>
<div class="shell" id="shell">
<nav class="sb">
  <div class="sb-head">

  <div class="sb-user">

    <div>

<div class="content">
  <div class="topbar">

    <div>
      <div class="tb-title" id="page-title">案件パイプライン</div>
      <div class="tb-crumb"><a href="coreto-hub-v2.html">COREBLDG</a> › <span id="crumb-cur">案件パイプライン</span></div>
    </div>
    <div class="tb-act" style="margin-left:auto;display:flex;gap:8px;align-items:center">
      <button class="btn btn-ghost btn-sm" onclick="exportCSV()">📤 CSVエクスポート</button>
    </div>
  </div>

  <!-- フィルターバー -->
  <div class="plm-header">
    <div style="font-size:12px;color:var(--muted)">全案件の進捗状況を監視します。ステップ操作は各案件詳細ページで行ってください。</div>
    <div class="plm-filters" id="type-filters">
      <span class="filter-chip active" data-type="all" onclick="setFilter('all',this)">すべて</span>
      <span class="filter-chip" data-type="rental" onclick="setFilter('rental',this)">🏠 賃貸</span>
      <span class="filter-chip" data-type="sale" onclick="setFilter('sale',this)">🏢 売買</span>
      <span class="filter-chip" data-type="sannai" onclick="setFilter('sannai',this)">🔄 三為</span>
      <span class="filter-chip" data-type="hr" onclick="setFilter('hr',this)">👤 HR</span>
      <span class="filter-chip" style="border-color:var(--am);color:var(--am)" data-type="stagnant" onclick="setFilter('stagnant',this)">⚠️ 停滞のみ</span>
    </div>

  <div class="page plm-body" id="plm-body"></div>
</div><!-- content -->
</div><!-- shell -->
<div class="mob-overlay" onclick="toggleSb()"></div>
<div id="ip-toast" class="toast"></div>

<script>
function toggleSb(){ document.querySelector('.sb').classList.toggle('open'); document.querySelector('.mob-overlay').classList.toggle('show'); }
function showToast(msg,type){ const t=document.getElementById('ip-toast'); t.textContent=msg; t.className='toast '+(type||''); t.style.opacity='1'; setTimeout(()=>t.style.opacity='0',3200); }

// ── ステップ定義 ─────────────────────────────────────────
const STEPS = {
  rental: [
    {id:'naiken',   label:'内見',     icon:'🏠'},
    {id:'apply',    label:'申込',     icon:'📋'},
    {id:'screening',label:'入居審査', icon:'⏳'},
    {id:'invoice',  label:'請求書',   icon:'🧾'},
    {id:'itsetsu',  label:'IT重説',   icon:'📡'},
    {id:'payment',  label:'入金確認', icon:'💴'},
    {id:'key',      label:'鍵渡し',   icon:'🔑'},
  ],
  sale: [
    {id:'naiken',     label:'内見',    icon:'🏠'},
    {id:'offer',      label:'買付',    icon:'📄'},
    {id:'invoice',    label:'請求書',  icon:'🧾'},
    {id:'contract',   label:'契約締結',icon:'✍️'},
    {id:'settlement', label:'決済',    icon:'💴'},
  ],
  sannai: [
    {id:'naiken',    label:'内見',     icon:'🏠'},
    {id:'verify',    label:'業者確認', icon:'🔍'},
    {id:'offer',     label:'買付',     icon:'📄'},
    {id:'invoice',   label:'請求書',   icon:'🧾'},
    {id:'contract',  label:'契約',     icon:'✍️'},
    {id:'settlement',label:'決済',     icon:'💴'},
  ],
  hr: [
    {id:'screening', label:'書類選考', icon:'📄'},
    {id:'jobcheck',  label:'求人票確認',icon:'🔍'},
    {id:'interview', label:'面接調整', icon:'📅'},
    {id:'offer',     label:'内定',     icon:'🎉'},
    {id:'onboard',   label:'入社',     icon:'🏢'},
    {id:'zaiki',     label:'在籍確認', icon:'✅'},
    {id:'pay2',      label:'第2報酬',  icon:'💰'},
  ],
};

const TYPE_LABEL = { rental:'🏠 賃貸', sale:'🏢 売買', sannai:'🔄 三為', hr:'👤 HR' };
const TYPE_COLOR = { rental:'var(--sk)', sale:'var(--vt)', sannai:'var(--am)', hr:'var(--em)' };

// ── デモデータ ─────────────────────────────────────────────
const CASES = [
  {id:'RENT-0194',type:'rental',name:'田中 優子 様',sub:'港区三田3丁目 2LDK / ¥198,000',ag:'AG-0021 木下',fee:198000,step:3,pt:'',daysOld:4},
  {id:'RENT-0193',type:'rental',name:'鈴木 健太 様',sub:'渋谷区代々木 1LDK / ¥155,000',ag:'AG-0021 木下',fee:155000,step:4,pt:'PT-30007',daysOld:18},
  {id:'RENT-0192',type:'rental',name:'高橋 美咲 様',sub:'新宿区西新宿 2LDK / ¥175,000',ag:'AG-0034 大橋',fee:175000,step:5,pt:'',daysOld:21},
  {id:'RENT-0190',type:'rental',name:'佐藤 一郎 様',sub:'品川区大崎 1R / ¥89,000',ag:'AG-0034 大橋',fee:89000,step:1,pt:'',daysOld:7},
  {id:'SALE-0041',type:'sale',name:'伊藤 誠 様',sub:'品川区大崎 3LDK / ¥62,000,000',ag:'AG-0021 木下',fee:2160000,step:2,pt:'',daysOld:6},
  {id:'SALE-0040',type:'sale',name:'中村 京子 様',sub:'港区南青山 2LDK / ¥98,000,000',ag:'AG-0056 田村',fee:3430000,step:1,pt:'',daysOld:25},
  {id:'SN-0012',type:'sannai',name:'渋谷道玄坂ビル',sub:'渋谷区道玄坂 事務所 / ¥85,000,000',ag:'AG-0021 木下',fee:2550000,step:1,pt:'',daysOld:14},
  {id:'HR-0089',type:'hr',name:'山本 達也 様',sub:'株式会社ABCへ営業職 / 年収450万',ag:'AG-0034 大橋',fee:675000,step:2,pt:'PT-30015',daysOld:11},
  {id:'HR-0088',type:'hr',name:'小林 花子 様',sub:'株式会社XYZへIT職 / 年収520万',ag:'AG-0034 大橋',fee:780000,step:4,pt:'',daysOld:32},
];

let currentFilter = 'all';
let openAdvice = {};  // caseId → true/false

function setFilter(type, el) {
  currentFilter = type;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderAll();
}

// ── KPI計算 ─────────────────────────────────────────────
function calcKPI() {
  const stagnant = CASES.filter(c => c.daysOld >= 14).length;
  const critical = CASES.filter(c => c.daysOld >= 21).length;
  const totalFee = CASES.reduce((s, c) => s + (c.fee || 0), 0);
  const rentalCnt = CASES.filter(c => c.type === 'rental').length;
  return { total: CASES.length, stagnant, critical, totalFee, rentalCnt };
}

// ── ステッププログレスバー ───────────────────────────────
function renderStepStrip(cas) {
  const steps = STEPS[cas.type];
  if (!steps) return '';
  const dots = steps.map((s, i) => {
    const cls = i < cas.step ? 'done' : i === cas.step ? 'active' : 'todo';
    const line = i < steps.length - 1
      ? `<div class="step-line ${i < cas.step ? 'done' : ''}"></div>` : '';
    return `<div class="step-dot ${cls}" title="${s.label}">${i < cas.step ? '✓' : s.icon}</div>${line}`;
  }).join('');
  const labels = steps.map((s, i) => {
    const cls = i === cas.step ? 'active' : '';
    const gap = i < steps.length - 1 ? '<div class="step-lbl-gap"></div>' : '';
    return `<div class="step-lbl ${cls}">${s.label}</div>${gap}`;
  }).join('');
  return `<div class="step-wrapper">
    <div class="step-strip">${dots}</div>
    <div class="step-label-row">${labels}</div>
  </div>`;
}

// ── 案件行描画 ─────────────────────────────────────────────
function renderCaseRow(cas) {
  const isStagnant = cas.daysOld >= 14 && cas.daysOld < 21;
  const isCritical = cas.daysOld >= 21;
  const rowCls = isCritical ? 'critical' : isStagnant ? 'stagnant' : '';
  const daysCls = isCritical ? 'days-crit' : isStagnant ? 'days-warn' : 'days-ok';
  const daysLabel = isCritical ? `🔴 ${cas.daysOld}日停滞` : isStagnant ? `⚠️ ${cas.daysOld}日停滞` : `${cas.daysOld}日経過`;
  const typeColor = TYPE_COLOR[cas.type] || 'var(--muted)';
  const typeLabel = TYPE_LABEL[cas.type] || cas.type;

  const adviceOpen = openAdvice[cas.id];
  const adviceBtn = (isStagnant || isCritical)
    ? `<button class="ai-btn" onclick="toggleAdvice('${cas.id}','${cas.name.replace(/'/g,'＇')}',${cas.daysOld})">✨ AI</button>` : '';

  return `<div class="plm-row ${rowCls}" id="row-${cas.id}">
    <div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
        <span class="plm-id">${cas.id}</span>
        <span style="font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;background:rgba(0,0,0,.04);color:${typeColor}">${typeLabel}</span>
      </div>
      <div class="plm-name">${cas.name}</div>
      <div class="plm-sub">${cas.sub}</div>
      <div class="plm-ag">👤 ${cas.ag}${cas.pt ? ` ／ 🤝 ${cas.pt}` : ''}</div>
    </div>
    <div>${renderStepStrip(cas)}</div>
    <div style="text-align:right">
      <span class="days-badge ${daysCls}">${daysLabel}</span>
      <div style="font-size:11px;font-variant-numeric:tabular-nums;color:var(--muted);margin-top:6px">¥${cas.fee.toLocaleString()}</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:center">
      <a href="${cas.type === 'rental' ? 'coreto-rental-v2.html' : 'coreto-cases-v2.html'}" 
         style="font-size:10px;color:var(--sky,#0284C7);text-decoration:none;font-weight:600">詳細→</a>
      ${adviceBtn}
    </div>
  </div>
  ${adviceOpen ? `<div id="advice-${cas.id}" class="ai-advice" id="advice-${cas.id}"></div>` : ''}`;
}

// ── 全体描画 ─────────────────────────────────────────────
function renderAll() {
  const kpi = calcKPI();
  const fmt = n => '¥' + (n/10000).toFixed(0) + '万';

  // フィルタ
  let filtered = CASES;
  if (currentFilter === 'stagnant') {
    filtered = CASES.filter(c => c.daysOld >= 14);
  } else if (currentFilter !== 'all') {
    filtered = CASES.filter(c => c.type === currentFilter);
  }

  // グルーピング
  const groups = {};
  filtered.forEach(cas => {
    if (!groups[cas.type]) groups[cas.type] = [];
    groups[cas.type].push(cas);
  });

  const kpiHtml = `<div class="plm-kpi">
    <div class="pk gold">
      <div class="pk-label">進行中案件</div>
      <div class="pk-value">${kpi.total}</div>
      <div class="pk-sub">賃貸 ${kpi.rentalCnt} 件含む</div>
    </div>
    <div class="pk red">
      <div class="pk-label">🔴 緊急停滞（21日超）</div>
      <div class="pk-value">${kpi.critical}</div>
      <div class="pk-sub">即アクション必要</div>
    </div>
    <div class="pk amber">
      <div class="pk-label">⚠️ 停滞案件（14日超）</div>
      <div class="pk-value">${kpi.stagnant}</div>
      <div class="pk-sub">AIアドバイス利用可</div>
    </div>
    <div class="pk green">
      <div class="pk-label">報酬合計（進行中）</div>
      <div class="pk-value">${fmt(kpi.totalFee)}</div>
      <div class="pk-sub">成約時見込み</div>
    </div>
  </div>`;

  const typeOrder = ['rental','sale','sannai','hr'];
  let rowsHtml = '';
  typeOrder.forEach(type => {
    if (!groups[type]) return;
    const cases = groups[type].sort((a,b) => b.daysOld - a.daysOld);
    rowsHtml += `<div class="plm-group">
      <div class="plm-group-title">${TYPE_LABEL[type]} — ${cases.length}件</div>
      ${cases.map(renderCaseRow).join('')}
    </div>`;
  });

  if (!rowsHtml) {
    rowsHtml = `<div style="text-align:center;padding:60px;color:var(--faint)">
      <div style="font-size:32px;margin-bottom:12px">✅</div>
      <div>条件に一致する案件はありません</div>
    </div>`;
  }

  document.getElementById('plm-body').innerHTML = kpiHtml + rowsHtml;
}

// ── AIアドバイス（停滞案件のみ）───────────────────────────
function toggleAdvice(caseId, caseName, daysOld) {
  if (openAdvice[caseId]) {
    delete openAdvice[caseId];
    const el = document.getElementById('advice-' + caseId);
    if (el) el.remove();
    return;
  }
  openAdvice[caseId] = true;
  // まず描画してからAI呼び出し
  const row = document.getElementById('row-' + caseId);
  if (!row) return;
  const advDiv = document.createElement('div');
  advDiv.id = 'advice-' + caseId;
  advDiv.className = 'ai-advice';
  advDiv.innerHTML = '<span style="animation:spin .8s linear infinite;display:inline-block">✨</span> AI停滞アドバイスを生成中...';
  row.after(advDiv);
  fetchAIAdvice(caseId, caseName, daysOld, advDiv);
}

async function fetchAIAdvice(caseId, caseName, daysOld, el) {
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 800,
        messages: [{ role: 'user', content:
          '不動産・人材紹介の案件「' + caseName + '」が' + daysOld + '日間停滞しています。担当AGが取るべき具体的な次アクションを3つ、JSONのみで回答（前置き不要）:\n{"actions":[{"title":"①","detail":"具体内容（1〜2文）","priority":"high/medium"},{"title":"②","detail":"...","priority":"..."},{"title":"③","detail":"...","priority":"..."}],"overall":"総合コメント（1文）"}'
        }]
      })
    });
    const data = await resp.json();
    const text = data.content?.find(b => b.type === 'text')?.text || '{}';
    const res = JSON.parse(text.replace(/```json|```/g,'').trim());
    const priColor = p => p==='high' ? 'var(--rd)' : p==='medium' ? 'var(--am)' : 'var(--em)';
    el.innerHTML = `
      <div style="font-size:10px;font-weight:700;color:var(--gold);margin-bottom:8px">✨ AI停滞アドバイス — ${caseName}</div>
      <div class="ai-advice-actions">
        ${(res.actions||[]).map(a => `<div class="ai-action-card">
          <div class="ai-action-title" style="color:${priColor(a.priority)}">${a.title}</div>
          <div class="ai-action-detail">${a.detail}</div>
        </div>`).join('')}
      </div>
      <div style="font-size:10px;color:var(--muted);margin-top:8px">💬 ${res.overall||''}</div>`;
  } catch(e) {
    el.innerHTML = '<div style="color:var(--rd);font-size:11px">AI取得失敗: ' + e.message + '</div>';
  }
}

// ── CSV エクスポート ──────────────────────────────────────
function exportCSV() {
  const header = 'ID,種別,クライアント,担当AG,現ステップ,停滞日数,報酬見込み\n';
  const rows = CASES.map(c => {
    const steps = STEPS[c.type];
    const stepLabel = steps ? (steps[c.step]?.label || '完了') : '-';
    return [c.id, TYPE_LABEL[c.type]||c.type, c.name, c.ag, stepLabel, c.daysOld, c.fee].join(',');
  }).join('\n');
  const blob = new Blob([header + rows], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'pipeline_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  showToast('CSVをエクスポートしました');
}

window.addEventListener('DOMContentLoaded', () => {
  renderAll();
  CNAV.init('pipeline');
});
