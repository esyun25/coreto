<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>内見管理 — COREBLDG</title>
<link rel="stylesheet" href="coreto-design-system.css">
<style>

:root{--navy:#0D1A2D;--navy-l:#1E3252;--gold:#C8A951;--gold-dim:rgba(200,169,81,.15);--cream:#FFFFFF;--cream2:#F8F9FA;--white:#FFFFFF;--ink:#202124;--muted:#5F6368;--faint:#80868B;--em:#059669;--em-bg:#ECFDF5;--am:#D97706;--am-bg:#FFFBEB;--rd:#DC2626;--rd-bg:#FEF2F2;--sk:#0284C7;--sk-bg:#F0F9FF;--vt:#7C3AED;--vt-bg:#F5F3FF;--bd:#E8EAED;--bd2:#DADCE0;--sw:240px;--r:10px;--r-sm:7px;--sh:0 1px 2px rgba(60,64,67,.1),0 1px 3px rgba(60,64,67,.06)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:var(--cream)}
.shell{display:flex;height:100vh}
.sb{width:var(--sw);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;position:relative}
.sb::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,rgba(200,169,81,.25) 0%,rgba(200,169,81,.06) 50%,transparent 100%)}
.sb-head{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;letter-spacing:5px;color:var(--gold)}
.sb-ver{font-size:9px;letter-spacing:2px;color:rgba(200,169,81,.3);font-family:'DM Mono',monospace;margin-top:2px}
.sb-user{margin:14px 14px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:9px 11px;display:flex;align-items:center;gap:9px}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--gold-dim);border:1px solid rgba(200,169,81,.25);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gold);flex-shrink:0}
.sb-un{font-size:11px;font-weight:600;color:rgba(255,255,255,.8)}
.sb-ur{font-size:9px;color:rgba(255,255,255,.3);font-family:'DM Mono',monospace}
.sb-nav{flex:1;overflow-y:auto;padding:6px 10px}
.nsl{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.18);padding:10px 8px 4px;font-family:'DM Mono',monospace}
.ni{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;cursor:pointer;transition:.13s;margin-bottom:1px}
.ni:hover{background:rgba(255,255,255,.06)}.ni.active{background:rgba(200,169,81,.1)}
.ni-ic{width:22px;text-align:center;font-size:14px}
.ni-lb{font-size:11px;font-weight:500;color:rgba(255,255,255,.55)}.ni.active .ni-lb{color:var(--gold)}
.sf{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.3);transition:.13s}
.sf:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.6)}
.sb-foot{padding:10px 14px 18px;border-top:1px solid rgba(255,255,255,.05)}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;box-shadow:var(--sh)}
.tb-title{font-size:16px;font-weight:600;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;letter-spacing:.2px}
.tb-crumb{font-size:11px;color:var(--faint)}
.tb-crumb a{color:var(--muted);text-decoration:none}
.tb-act{margin-left:auto;display:flex;gap:9px;align-items:center}
.btn{padding:7px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;transition:.15s;font-family:'Outfit',sans-serif;border:none}
.btn-p{background:var(--navy);color:var(--gold)}.btn-p:hover{background:var(--navy-l)}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--bd)}.btn-g:hover{background:var(--cream);color:var(--ink)}
.btn-em{background:var(--em-bg);color:var(--em);border:1px solid rgba(5,150,105,.2)}.btn-em:hover{background:var(--em);color:#fff}
.btn-sm{padding:5px 12px;font-size:11px}
.tab-bar{padding:0 24px;background:var(--white);border-bottom:1px solid var(--bd);display:flex}
.tab{padding:12px 18px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.tab:hover{color:var(--ink)}.tab.active{color:var(--navy);border-bottom-color:var(--gold)}
.page{flex:1;overflow-y:auto;padding:24px}
.page::-webkit-scrollbar{width:5px}.page::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;font-family:'Outfit',sans-serif}
.b-em{background:var(--em-bg);color:var(--em)}.b-am{background:var(--am-bg);color:var(--am)}.b-rd{background:var(--rd-bg);color:var(--rd)}.b-sk{background:var(--sk-bg);color:var(--sk)}.b-nt{background:var(--cream2);color:var(--muted)}.b-vt{background:var(--vt-bg);color:var(--vt)}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.gd::before{background:var(--gold)}.kpi.em::before{background:var(--em)}.kpi.sk::before{background:var(--sk)}.kpi.am::before{background:var(--am)}
.kpi-lb{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.kpi-vl{font-size:24px;font-weight:700;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif}
.kpi-sb{font-size:10px;color:var(--faint);margin-top:4px}
.card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:18px}
.card-head{padding:14px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--cream)}
.card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink)}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--faint);padding:9px 14px;border-bottom:2px solid var(--bd);text-align:left;background:var(--cream)}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--bd);color:var(--ink);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(200,169,81,.03)}
/* showing card */
.sh-card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);padding:16px 20px;margin-bottom:12px;display:flex;align-items:flex-start;gap:16px;transition:.13s;cursor:pointer}
.sh-card:hover{border-color:var(--gold);box-shadow:0 4px 16px rgba(200,169,81,.12)}
.sh-date-box{width:52px;height:52px;background:var(--navy);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.sh-date-d{font-size:20px;font-weight:700;color:var(--gold);font-family:'Outfit','Noto Sans JP',sans-serif;line-height:1}
.sh-date-m{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:1px;text-transform:uppercase}
.sh-info{flex:1}
.sh-prop{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:3px}
.sh-meta{font-size:11px;color:var(--muted);line-height:1.7}
.sh-actions{display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0}
/* form */
.form-wrap{max-width:680px}
.form-card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:18px}
.form-head{padding:14px 22px;border-bottom:1px solid var(--bd);background:var(--cream);display:flex;align-items:center;gap:10px}
.form-head-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink)}
.form-body{padding:20px 22px}
.field{margin-bottom:16px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;background:var(--cream);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:13px;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;outline:none;transition:.15s;-webkit-appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);background:var(--white)}
.field textarea{min-height:70px;resize:vertical;line-height:1.6}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.required::after{content:' *';color:var(--rd);font-size:11px}
/* result options */
.result-options{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.result-opt{padding:10px;border:2px solid var(--bd);border-radius:var(--r-sm);text-align:center;cursor:pointer;transition:.15s;font-size:12px;font-weight:600}
.result-opt:hover{border-color:var(--gold)}
.result-opt.selected{border-color:var(--navy);background:var(--navy);color:var(--gold)}
/* MOBILE */
.mob-ham{display:none;flex-direction:column;align-items:center;justify-content:center;width:36px;height:36px;background:transparent;border:none;cursor:pointer;border-radius:7px;flex-shrink:0}
.mob-ham span{display:block;width:18px;height:2px;background:rgba(255,255,255,.72);margin:3px 0;border-radius:1px}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199}
@media(max-width:768px){
  .mob-ham{display:flex}.mob-overlay.show{display:block}
  .sb{position:fixed;left:calc(-1 * var(--sw));top:0;height:100vh;z-index:200;transition:left .25s ease}.sb.open{left:0}
  .shell{overflow:hidden}.content{width:100vw;min-width:0}
  .topbar{padding:0 12px;gap:8px}.tb-crumb{display:none}
  .page{padding:12px}.form-wrap{max-width:100%}
  .field-row{grid-template-columns:1fr}.kpi-row{grid-template-columns:1fr 1fr!important}
  .result-options{grid-template-columns:1fr 1fr}
  .sh-card{flex-wrap:wrap}.sh-actions{flex-direction:row;flex-wrap:wrap}
  table{display:block;overflow-x:auto}
}

/* ── Google-style Design System ── */
html, body { background:#FFFFFF !important; }
.sb-logo, .brand-logo { font-family:'Cormorant Garamond',serif !important; }
body, input, select, textarea, button { font-family:'Outfit','Noto Sans JP',sans-serif; }
.kpi-value, .kpi-vl {
  font-family:'Outfit','Noto Sans JP',sans-serif !important;
  font-weight:300 !important;
  font-variant-numeric:tabular-nums lining-nums !important;
  letter-spacing:-1px !important;
  color:var(--ink) !important;
}
.kpi-value { font-size:32px !important;font-variant-numeric:tabular-nums}
.kpi-vl   { font-size:28px !important; }
.stat-val { font-family:'Outfit','Noto Sans JP',sans-serif !important; font-weight:400 !important; font-variant-numeric:tabular-nums !important; color:var(--ink) !important; }
.kpi-label, .kpi-sub, .stat-label { font-size:11px !important; font-weight:500 !important; color:var(--muted) !important; }
.section-title { font-size:11px !important; font-weight:600 !important; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); }
.section-title::before { display:none; }
.card { background:#FFFFFF; border:1px solid var(--bd); border-radius:8px; box-shadow:var(--sh); }
.kpi-card { background:#FFFFFF !important; border:1px solid var(--bd) !important; border-radius:8px !important; box-shadow:none !important; }
.badge { border-radius:4px !important; font-size:11px !important; font-weight:500 !important; }
.delta-up, .kpi-delta.up { color:var(--em) !important; }
.delta-dn, .kpi-delta.dn { color:var(--rd) !important; }
/* ── Google-style 数値原則 (DS v2.3) ── */
.kpi-value, .kpi-vl, .kpi-val,
.stat-val, .qs-val, .count-val,
.td-amt, .bc-vl, .bc-total-vl,
.rr-amount, .amount-val, .srv,
.visit-reward, .lb-val,
.mf-kpi-vl, .mf-reward {
  font-family:'Outfit','Noto Sans JP',sans-serif !important;
  font-weight:300 !important;
  font-variant-numeric:tabular-nums !important;
}
.kpi-value { font-size:32px !important; }
.kpi-vl    { font-size:28px !important; }
</style>
</head>
<body>
<div class="shell">
<nav class="sb" id="sb">
  <div class="sb-head">
    <div class="sb-logo">CORE<br>BLDG</div>
    <div class="sb-ver">v2.0 — CORETO</div>
  </div>
  <div class="sb-user">
    <div class="sb-av">AG</div>
    <div><div class="sb-un">山田 誠</div><div class="sb-ur">AG-0042 / Gold</div></div>
  </div>
  <div class="sb-nav" id="sb-nav"></div>
  <div class="sb-foot"><div class="sf" onclick="window.location.href='coreto-hub-v2.html'">⬅ ダッシュボードへ</div></div>
</nav>
<div class="content">
  <div class="topbar">
    <button class="mob-ham" onclick="toggleSb()"><span></span><span></span><span></span></button>
    <div>
      <div class="tb-title">内見管理</div>
      <div class="tb-crumb"><a href="coreto-hub-v2.html">COREBLDG</a> › <span>内見管理</span></div>
    </div>
    <div class="tb-act">
      <button class="btn btn-p btn-sm" onclick="switchTab('new',document.getElementById('tab-new'))">＋ 内見を登録</button>
    </div>
  </div>
  <div class="tab-bar">
    <div class="tab active" id="tab-list" onclick="switchTab('list',this)">内見一覧</div>
    <div class="tab" id="tab-new" onclick="switchTab('new',this)">内見登録</div>
    <div class="tab" id="tab-report" onclick="switchTab('report',this)">内見後報告</div>
  </div>
  <div class="page" id="pg"></div>
</div>
</div>
<div class="mob-overlay" onclick="toggleSb()"></div>
<script src="coreto-nav-v2.js"></script>
<script>
// ────────────────────────────────────────────────────
// 内見管理 — データ層
// CORETO_SHOWINGS_{caseId} / CORETO_SHOWINGS_ALL
// ────────────────────────────────────────────────────

var _caseIdParam   = new URLSearchParams(location.search).get('caseId') || '';
var _clientParam   = new URLSearchParams(location.search).get('client') || '';
var _isNew         = new URLSearchParams(location.search).get('new') === '1';
var _SHOWINGS_KEY  = _caseIdParam ? 'CORETO_SHOWINGS_' + _caseIdParam : 'CORETO_SHOWINGS_ALL';

function loadShowings() {
  try {
    var raw = localStorage.getItem(_SHOWINGS_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  // デモデータ（初回のみ）
  return _caseIdParam === 'RENT-0194' || !_caseIdParam ? [
    {id:'SH-001', case:'RENT-0194', client:'田中 優子', prop:'パークタワー三田 302',     addr:'港区三田3丁目',     date:'2026-03-14', time:'14:00', companion:'管理会社 田村様', method:'現地案内（AG同行）', status:'完了',  result:'申込意向あり', rent:165000, movein:'', note:'2LDKを大変気に入っていただいた。収納が多い点が特に好評。'},
    {id:'SH-002', case:'RENT-0194', client:'田中 優子', prop:'グランドメゾン赤坂 805',   addr:'港区赤坂2丁目',     date:'2026-03-14', time:'16:00', companion:'',              method:'現地案内（AG同行）', status:'完了',  result:'見送り',       rent:0,      movein:'', note:'家賃が予算（17万）をオーバーしていたため見送り。'},
    {id:'SH-003', case:'RENT-0194', client:'田中 優子', prop:'リバーサイド麻布 1204',   addr:'港区麻布十番1丁目', date:'2026-03-21', time:'13:00', companion:'管理会社 山田様', method:'現地案内（AG同行）', status:'確定',  result:'',             rent:0,      movein:'', note:'2番手での申込み可能性あり。先行申込がいる。'},
  ] : [];
}

function saveShowings(list) {
  try { localStorage.setItem(_SHOWINGS_KEY, JSON.stringify(list)); } catch(e) {}
}

var SHOWINGS = loadShowings();

// ────────────────────────────────────────────────────
// タブ切り替え
// ────────────────────────────────────────────────────
var currentTab = 'list';
function switchTab(t, el) {
  document.querySelectorAll('.tab').forEach(function(x){ x.classList.remove('active'); });
  if (el) el.classList.add('active');
  currentTab = t;
  if (t === 'list')   renderList();
  if (t === 'new')    renderNew();
  if (t === 'report') renderReport(null);
}

// ────────────────────────────────────────────────────
// 内見一覧
// ────────────────────────────────────────────────────
function renderList() {
  SHOWINGS = loadShowings();
  var upcoming = SHOWINGS.filter(function(s){ return s.status === '確定'; });
  var done     = SHOWINGS.filter(function(s){ return s.status === '完了'; });
  var rateYes  = done.filter(function(s){ return s.result === '申込意向あり' || s.result === '2番手申込'; }).length;
  var rateNo   = done.filter(function(s){ return s.result === '見送り'; }).length;

  var html = '<div class="kpi-row">' +
    '<div class="kpi gd"><div class="kpi-lb">合計内見数</div><div class="kpi-vl">' + SHOWINGS.length + '件</div></div>' +
    '<div class="kpi sk"><div class="kpi-lb">予定</div><div class="kpi-vl">' + upcoming.length + '件</div></div>' +
    '<div class="kpi em"><div class="kpi-lb">申込意向</div><div class="kpi-vl">' + rateYes + '件</div><div class="kpi-sb">完了' + done.length + '件中</div></div>' +
    '<div class="kpi am"><div class="kpi-lb">見送り</div><div class="kpi-vl">' + rateNo + '件</div></div>' +
    '</div>';

  if (upcoming.length) {
    html += '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:10px">予定</div>';
    html += upcoming.map(function(s){ return buildCard(s); }).join('');
  }
  if (done.length) {
    html += '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:16px 0 10px">完了</div>';
    html += done.map(function(s){ return buildCard(s, true); }).join('');
  }
  if (!SHOWINGS.length) {
    html += '<div style="text-align:center;padding:48px;color:var(--muted)">' +
      '<div style="font-size:36px;margin-bottom:12px">📅</div>' +
      '<div style="font-weight:700;margin-bottom:6px">内見がまだ登録されていません</div>' +
      '<div style="font-size:12px">「＋ 内見を登録」から追加してください</div>' +
    '</div>';
  }
  document.getElementById('pg').innerHTML = html;
}

function fmtDate(dateStr) {
  if (!dateStr) return '—';
  var d = new Date(dateStr);
  return (d.getMonth()+1) + '/' + d.getDate() + '（' + ['日','月','火','水','木','金','土'][d.getDay()] + '）';
}

function buildCard(s, isDone) {
  var resultBadge = s.result ? (
    s.result === '申込意向あり' ? '<span class="badge b-em">' + s.result + '</span>' :
    s.result === '2番手申込'   ? '<span class="badge b-am">' + s.result + '</span>' :
    s.result === '見送り'      ? '<span class="badge b-nt">' + s.result + '</span>' :
    s.result === '検討中'      ? '<span class="badge b-sk">' + s.result + '</span>' :
    '<span class="badge b-nt">' + s.result + '</span>'
  ) : '<span class="badge b-sk">確定</span>';

  return '<div class="sh-card" style="' + (isDone ? 'opacity:.8;' : '') + 'cursor:pointer" onclick="openDetail(\'' + s.id + '\')">' +
    '<div class="sh-date-box" style="' + (isDone ? 'background:var(--cream2)' : '') + '">' +
      '<div class="sh-date-d" style="' + (isDone ? 'color:var(--ink)' : '') + '">' + fmtDate(s.date).split('/')[1].split('（')[0] + '</div>' +
      '<div class="sh-date-m" style="' + (isDone ? 'color:var(--faint)' : '') + '">' + fmtDate(s.date).split('/')[0] + '月</div>' +
    '</div>' +
    '<div class="sh-info">' +
      '<div class="sh-prop">' + s.prop + '</div>' +
      '<div class="sh-meta">' + (s.addr||'') + ' ／ ' + s.time + ' ／ クライアント：<strong>' + s.client + '</strong>' +
        '<span style="font-family:\'DM Mono\',monospace;color:var(--faint);margin-left:6px">' + s.case + '</span>' +
      '</div>' +
      (s.note ? '<div style="font-size:11px;color:var(--muted);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:360px">' + s.note + '</div>' : '') +
    '</div>' +
    '<div class="sh-actions">' +
      resultBadge +
      (!isDone ? '<button class="btn btn-p btn-sm" onclick="event.stopPropagation();openDetail(\'' + s.id + '\')">詳細・報告入力</button>' :
                 '<button class="btn btn-g btn-sm" onclick="event.stopPropagation();openDetail(\'' + s.id + '\')">詳細を見る</button>') +

// ────────────────────────────────────────────────────
// 詳細モーダル（クリックで開く）
// ────────────────────────────────────────────────────
function openDetail(id) {
  var s = SHOWINGS.find(function(x){ return x.id === id; });
  if (!s) return;

  var overlay = document.createElement('div');
  overlay.id = 'showing-detail-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  overlay.onclick = function(e){ if(e.target===overlay) overlay.remove(); };

  var isDone = s.status === '完了';
  var resultColor = s.result === '申込意向あり' ? 'var(--em)' : s.result === '見送り' ? 'var(--muted)' : s.result === '2番手申込' ? 'var(--am)' : 'var(--sk)';

  var modal = document.createElement('div');
  modal.style.cssText = 'background:#fff;border-radius:14px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;font-family:Outfit,sans-serif';

  // ヘッダー
  var head = document.createElement('div');
  head.style.cssText = 'padding:16px 22px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff';
  head.innerHTML = '<div>' +
    '<div style="font-size:15px;font-weight:700;color:var(--navy)">' + s.prop + '</div>' +
    '<div style="font-size:11px;color:var(--muted);margin-top:2px;font-family:monospace">' + s.id + ' ／ ' + s.case + '</div>' +
  '</div>' +
  '<button onclick="document.getElementById(\'showing-detail-overlay\').remove()" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted)">✕</button>';

  // ボディ
  var body = document.createElement('div');
  body.style.cssText = 'padding:20px 22px';

  var infoGrid = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">' +
    infoItem('クライアント', s.client) +
    infoItem('内見日', fmtDate(s.date) + ' ' + s.time) +
    infoItem('物件住所', s.addr) +
    infoItem('内見方法', s.method || '—') +
    infoItem('同行者', s.companion || 'なし') +
    infoItem('ステータス', s.status, isDone ? 'var(--muted)' : 'var(--sk)') +
    '</div>';

  if (s.result) {
    infoGrid += '<div style="background:var(--cream2);border-radius:8px;padding:12px 14px;margin-bottom:12px">' +
      '<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">内見結果</div>' +
      '<div style="font-size:16px;font-weight:700;color:' + resultColor + '">' + s.result + '</div>' +
      (s.rent ? '<div style="font-size:12px;color:var(--muted);margin-top:4px">申込家賃: ¥' + Number(s.rent).toLocaleString() + '</div>' : '') +
      (s.movein ? '<div style="font-size:12px;color:var(--muted)">入居希望: ' + fmtDate(s.movein) + '</div>' : '') +
      '</div>';
  }

  if (s.note) {
    infoGrid += '<div style="background:var(--cream2);border-radius:8px;padding:12px 14px;margin-bottom:12px">' +
      '<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">コメント</div>' +
      '<div style="font-size:13px;color:var(--ink);line-height:1.7">' + s.note + '</div>' +
    '</div>';
  }

  body.innerHTML = infoGrid;

  // アクションボタン
  var actions = document.createElement('div');
  actions.style.cssText = 'display:flex;gap:8px;flex-wrap:wrap;margin-top:8px';

  if (!isDone) {
    var reportBtn = document.createElement('button');
    reportBtn.style.cssText = 'flex:2;padding:10px;background:var(--navy);color:var(--gold);border:none;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:Outfit,sans-serif';
    reportBtn.textContent = '📋 報告を入力する';
    reportBtn.onclick = function() { overlay.remove(); renderReport(s.id); document.getElementById('tab-report').click(); };
    actions.appendChild(reportBtn);
  }

  var printBtn = document.createElement('button');
  printBtn.style.cssText = 'padding:10px 14px;background:transparent;border:1.5px solid var(--bd);border-radius:9px;font-size:12px;color:var(--muted);cursor:pointer;font-family:Outfit,sans-serif';
  printBtn.textContent = '🖨️ 内見依頼書';
  printBtn.onclick = function() { printShowingById(s.id); };
  actions.appendChild(printBtn);

  var cancelBtn = document.createElement('button');
  cancelBtn.style.cssText = 'padding:10px 14px;background:transparent;border:1.5px solid var(--bd);border-radius:9px;font-size:12px;color:var(--muted);cursor:pointer;font-family:Outfit,sans-serif';
  cancelBtn.textContent = '✕ 削除';
  cancelBtn.onclick = function() {
    overlay.remove();
    coretoConfirm({title:'内見を削除', message:s.prop + ' の内見を削除しますか？', okLabel:'削除する', danger:true, onOk:function(){
      SHOWINGS = SHOWINGS.filter(function(x){ return x.id !== s.id; });
      saveShowings(SHOWINGS);
      renderList();
    }});
  };
  actions.appendChild(cancelBtn);

  body.appendChild(actions);
  modal.appendChild(head);
  modal.appendChild(body);
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
}

function infoItem(label, val, color) {
  return '<div style="background:var(--cream2);border-radius:8px;padding:10px 14px">' +
    '<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">' + label + '</div>' +
    '<div style="font-size:13px;font-weight:600;color:' + (color||'var(--ink)') + '">' + (val||'—') + '</div>' +
  '</div>';
}

function registerShowing() {
  var caseId    = document.getElementById('sh-case')?.value.trim();
  var client    = document.getElementById('sh-client')?.value.trim();
  var prop      = document.getElementById('sh-prop')?.value.trim();
  var addr      = document.getElementById('sh-addr')?.value.trim();
  var date      = document.getElementById('sh-date')?.value;
  var time      = document.getElementById('sh-time')?.value;
  var companion = document.getElementById('sh-companion')?.value.trim() || '';
  var method    = document.getElementById('sh-method')?.value || '現地案内（AG同行）';
  var note      = document.getElementById('sh-note')?.value.trim() || '';

  if (!caseId || !client || !prop || !date || !time) {
    showToast('案件ID・クライアント・物件名・日時は必須です', 'warn');
    return;
  }

  var newId = 'SH-' + Date.now().toString().slice(-6);
  var newShowing = { id:newId, case:caseId, client:client, prop:prop, addr:addr||'', date:date, time:time, companion:companion, method:method, status:'確定', result:'', rent:0, movein:'', note:note };

  SHOWINGS.unshift(newShowing);
  saveShowings(SHOWINGS);
  showToast('✅ 内見を登録しました。', 'em');
  switchTab('list', document.getElementById('tab-list'));
}

function toggleApplyFields(val) {
  var applyEl   = document.getElementById('apply-fields');
  var secondEl  = document.getElementById('secondhand-fields');
  var compareEl = document.getElementById('compare-fields');
  if (applyEl)   applyEl.style.display   = (val==='申込意向あり'||val==='2番手申込') ? '' : 'none';
  if (secondEl)  secondEl.style.display  = val==='2番手申込' ? '' : 'none';
  if (compareEl) compareEl.style.display = val==='検討中' ? '' : 'none';
}

function submitReport() {
  var showingId = document.getElementById('rp-showing-id')?.value;
  var result    = document.getElementById('rp-result')?.value;
  var note      = document.getElementById('rp-note')?.value || '';
  var rent      = parseInt(document.getElementById('rp-rent')?.value) || 0;
  var movein    = document.getElementById('rp-movein')?.value || '';
  var caseId    = document.getElementById('rp-case')?.value || _caseIdParam;

  if (!result) { showToast('内見結果を選択してください', 'warn'); return; }

  if (showingId) {
    var idx = SHOWINGS.findIndex(function(x){ return x.id === showingId; });
    if (idx >= 0) {
      SHOWINGS[idx].status = '完了';
      SHOWINGS[idx].result = result;
      SHOWINGS[idx].note   = note;
      SHOWINGS[idx].rent   = rent;
      SHOWINGS[idx].movein = movein;
      saveShowings(SHOWINGS);
    }
  }

  var isApply = result === '申込意向あり' || result === '2番手申込';
  if (isApply && caseId) {
    coretoConfirm({title:'報告完了', message:'内見後報告を提出しました。', detail:'申込書の送付へ進みますか？', okLabel:'書類送付管理へ', danger:false, onOk:function(){
      window.location.href = 'coreto-screening-v2.html?caseId=' + encodeURIComponent(caseId);
    }, onCancel:function(){
      switchTab('list', document.getElementById('tab-list'));
    }});
  } else {
    showToast('✅ 内見後報告を提出しました。', 'em');
    if (caseId) {
      window.location.href = 'coreto-rental-v2.html?caseId=' + encodeURIComponent(caseId);
    } else {
      switchTab('list', document.getElementById('tab-list'));
    }
  }
}

function printShowingById(id) {
  var s = SHOWINGS.find(function(x){ return x.id === id; });

  var mgmt = '';
  try {
    var d = JSON.parse(localStorage.getItem('CORETO_CASE_DETAIL_' + s.case) || '{}');
    mgmt = d.mgmtCo || '';

  buildAndPrint({ prop:s.prop, date:s.date, time:s.time, client:s.client, mgmt:mgmt });

function cancelShowing(id){ coretoConfirm({title:'内見キャンセル',message:'この内見をキャンセルしますか？',okLabel:'キャンセルする',danger:true,onOk:function(){
  var idx = SHOWINGS.findIndex(function(x){ return x.id === id; });
  if (idx>=0) { SHOWINGS[idx].status='キャンセル'; saveShowings(SHOWINGS); }
  renderList();
}}); }

window.addEventListener('DOMContentLoaded', function(){
  CNAV.init('showing');
  if (_isNew && _caseIdParam) {
    var newTab = document.getElementById('tab-new');
    if (newTab) { newTab.classList.add('active'); document.getElementById('tab-list').classList.remove('active'); }
    renderNew({ case:_caseIdParam, client:_clientParam ? decodeURIComponent(_clientParam) : '' });
  } else {
    renderList();
  }
});

function showToast(msg, type) {
  var c = {em:['#ECFDF5','#059669','rgba(5,150,105,.2)'],am:['#FFFBEB','#D97706','rgba(217,119,6,.2)'],rd:['#FEF2F2','#DC2626','rgba(220,38,38,.2)'],sk:['#F0F9FF','#0284C7','rgba(2,132,199,.2)'],ok:['#ECFDF5','#059669','rgba(5,150,105,.2)'],warn:['#FFFBEB','#D97706','rgba(217,119,6,.2)'],error:['#FEF2F2','#DC2626','rgba(220,38,38,.2)']}[type]||['#ECFDF5','#059669','rgba(5,150,105,.2)'];
  var t=document.createElement('div'); t.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;padding:11px 18px;border-radius:9px;font-size:13px;font-weight:600;font-family:Outfit,sans-serif;box-shadow:0 6px 20px rgba(0,0,0,.12);transition:opacity .4s;background:'+c[0]+';color:'+c[1]+';border:1px solid '+c[2]; t.textContent=msg; document.body.appendChild(t);
  setTimeout(function(){ t.style.opacity='0'; setTimeout(function(){ if(t.parentNode) t.remove(); },400); },3200);
}
