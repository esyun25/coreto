<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>内見管理 — COREBLDG</title>
<link rel="stylesheet" href="coreto-design-system.css">
<style>

:root{--navy:#0D1A2D;--navy-l:#1E3252;--gold:#C8A951;--gold-dim:rgba(200,169,81,.15);--cream:#FFFFFF;--cream2:#F8F9FA;--white:#FFFFFF;--ink:#202124;--muted:#5F6368;--faint:#80868B;--em:#059669;--em-bg:#ECFDF5;--am:#D97706;--am-bg:#FFFBEB;--rd:#DC2626;--rd-bg:#FEF2F2;--sk:#0284C7;--sk-bg:#F0F9FF;--vt:#7C3AED;--vt-bg:#F5F3FF;--bd:#E8EAED;--bd2:#DADCE0;--sw:240px;--r:10px;--r-sm:7px;--sh:0 1px 2px rgba(60,64,67,.1),0 1px 3px rgba(60,64,67,.06)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:var(--cream)}
.shell{display:flex;height:100vh}










.nsl{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.18);padding:10px 8px 4px;font-family:'DM Mono',monospace}
.ni{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;cursor:pointer;transition:.13s;margin-bottom:1px}
.ni:hover{background:rgba(255,255,255,.06)}.ni.active{background:rgba(200,169,81,.1)}
.ni-ic{width:22px;text-align:center;font-size:14px}
.ni-lb{font-size:11px;font-weight:500;color:rgba(255,255,255,.55)}.ni.active .ni-lb{color:var(--gold)}
.sf{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.3);transition:.13s}
.sf:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.6)}
.sb-foot{padding:10px 14px 18px;border-top:1px solid rgba(255,255,255,.05)}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;box-shadow:var(--sh)}
.tb-title{font-size:16px;font-weight:600;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;letter-spacing:.2px}
.tb-crumb{font-size:11px;color:var(--faint)}
.tb-crumb a{color:var(--muted);text-decoration:none}
.tb-act{margin-left:auto;display:flex;gap:9px;align-items:center}
.btn{padding:7px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;transition:.15s;font-family:'Outfit',sans-serif;border:none}
.btn-p{background:var(--navy);color:var(--gold)}.btn-p:hover{background:var(--navy-l)}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--bd)}.btn-g:hover{background:var(--cream);color:var(--ink)}
.btn-em{background:var(--em-bg);color:var(--em);border:1px solid rgba(5,150,105,.2)}.btn-em:hover{background:var(--em);color:#fff}
.btn-sm{padding:5px 12px;font-size:11px}
.tab-bar{padding:0 24px;background:var(--white);border-bottom:1px solid var(--bd);display:flex}
.tab{padding:12px 18px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.tab:hover{color:var(--ink)}.tab.active{color:var(--navy);border-bottom-color:var(--gold)}
.page{flex:1;overflow-y:auto;padding:24px}
.page::-webkit-scrollbar{width:5px}.page::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;font-family:'Outfit',sans-serif}
.b-em{background:var(--em-bg);color:var(--em)}.b-am{background:var(--am-bg);color:var(--am)}.b-rd{background:var(--rd-bg);color:var(--rd)}.b-sk{background:var(--sk-bg);color:var(--sk)}.b-nt{background:var(--cream2);color:var(--muted)}.b-vt{background:var(--vt-bg);color:var(--vt)}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.gd::before{background:var(--gold)}.kpi.em::before{background:var(--em)}.kpi.sk::before{background:var(--sk)}.kpi.am::before{background:var(--am)}
.kpi-lb{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.kpi-vl{font-size:24px;font-weight:700;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif}
.kpi-sb{font-size:10px;color:var(--faint);margin-top:4px}
.card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:18px}
.card-head{padding:14px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--cream)}
.card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink)}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--faint);padding:9px 14px;border-bottom:2px solid var(--bd);text-align:left;background:var(--cream)}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--bd);color:var(--ink);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(200,169,81,.03)}
/* showing card */
.sh-card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);padding:16px 20px;margin-bottom:12px;display:flex;align-items:flex-start;gap:16px;transition:.13s;cursor:pointer}
.sh-card:hover{border-color:var(--gold);box-shadow:0 4px 16px rgba(200,169,81,.12)}
.sh-date-box{width:52px;height:52px;background:var(--navy);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.sh-date-d{font-size:20px;font-weight:700;color:var(--gold);font-family:'Outfit','Noto Sans JP',sans-serif;line-height:1}
.sh-date-m{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:1px;text-transform:uppercase}
.sh-info{flex:1}
.sh-prop{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:3px}
.sh-meta{font-size:11px;color:var(--muted);line-height:1.7}
.sh-actions{display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0}
/* form */
.form-wrap{max-width:680px}
.form-card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:18px}
.form-head{padding:14px 22px;border-bottom:1px solid var(--bd);background:var(--cream);display:flex;align-items:center;gap:10px}
.form-head-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink)}
.form-body{padding:20px 22px}
.field{margin-bottom:16px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;background:var(--cream);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:13px;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;outline:none;transition:.15s;-webkit-appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);background:var(--white)}
.field textarea{min-height:70px;resize:vertical;line-height:1.6}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.required::after{content:' *';color:var(--rd);font-size:11px}
/* result options */
.result-options{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.result-opt{padding:10px;border:2px solid var(--bd);border-radius:var(--r-sm);text-align:center;cursor:pointer;transition:.15s;font-size:12px;font-weight:600}
.result-opt:hover{border-color:var(--gold)}
.result-opt.selected{border-color:var(--navy);background:var(--navy);color:var(--gold)}
/* MOBILE */
.mob-ham{display:none;flex-direction:column;align-items:center;justify-content:center;width:36px;height:36px;background:transparent;border:none;cursor:pointer;border-radius:7px;flex-shrink:0}
.mob-ham span{display:block;width:18px;height:2px;background:rgba(255,255,255,.72);margin:3px 0;border-radius:1px}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199}
@media(max-width:768px){
  .mob-ham{display:flex}.mob-overlay.show{display:block}
  .sb.open{left:0}
  .shell{overflow:hidden}.content{width:100vw;min-width:0}
  .topbar{padding:0 12px;gap:8px}.tb-crumb{display:none}
  .page{padding:12px}.form-wrap{max-width:100%}
  .field-row{grid-template-columns:1fr}.kpi-row{grid-template-columns:1fr 1fr!important}
  .result-options{grid-template-columns:1fr 1fr}
  .sh-card{flex-wrap:wrap}.sh-actions{flex-direction:row;flex-wrap:wrap}
  table{display:block;overflow-x:auto}
}

/* ── Google-style Design System ── */
html, body { background:#FFFFFF !important; }
.sb-logo, .brand-logo { font-family:'Cormorant Garamond',serif !important; }
body, input, select, textarea, button { font-family:'Outfit','Noto Sans JP',sans-serif; }
.kpi-value, .kpi-vl {
  font-family:'Outfit','Noto Sans JP',sans-serif !important;
  font-weight:300 !important;
  font-variant-numeric:tabular-nums lining-nums !important;
  letter-spacing:-1px !important;
  color:var(--ink) !important;
}
.kpi-value { font-size:32px !important;font-variant-numeric:tabular-nums}
.kpi-vl   { font-size:28px !important; }
.stat-val { font-family:'Outfit','Noto Sans JP',sans-serif !important; font-weight:400 !important; font-variant-numeric:tabular-nums !important; color:var(--ink) !important; }
.kpi-label, .kpi-sub, .stat-label { font-size:11px !important; font-weight:500 !important; color:var(--muted) !important; }
.section-title { font-size:11px !important; font-weight:600 !important; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); }
.section-title::before { display:none; }
.card { background:#FFFFFF; border:1px solid var(--bd); border-radius:8px; box-shadow:var(--sh); }
.kpi-card { background:#FFFFFF !important; border:1px solid var(--bd) !important; border-radius:8px !important; box-shadow:none !important; }
.badge { border-radius:4px !important; font-size:11px !important; font-weight:500 !important; }
.delta-up, .kpi-delta.up { color:var(--em) !important; }
.delta-dn, .kpi-delta.dn { color:var(--rd) !important; }
/* ── Google-style 数値原則 (DS v2.3) ── */
.kpi-value, .kpi-vl, .kpi-val,
.stat-val, .qs-val, .count-val,
.td-amt, .bc-vl, .bc-total-vl,
.rr-amount, .amount-val, .srv,
.visit-reward, .lb-val,
.mf-kpi-vl, .mf-reward {
  font-family:'Outfit','Noto Sans JP',sans-serif !important;
  font-weight:300 !important;
  font-variant-numeric:tabular-nums !important;
}
.kpi-value { font-size:32px !important; }
.kpi-vl    { font-size:28px !important; }
</style>
</head>
<body>
<div class="shell">
<nav class="sb">
  <div class="sb-head">
    <div class="sb-logo">CORE<br>BLDG</div>
    <div class="sb-ver">v2.0 — CORETO</div>
  </div>
  <div class="sb-user">
    <div class="sb-av" id="sb-av">—</div>
    <div style="overflow:hidden">
      <div class="sb-uname" id="sb-name">—</div>
      <div class="sb-ur" id="sb-role">—</div>
    </div>
  </div>
  <div class="sb-nav" id="sb-nav"></div>
</nav>
<div class="content">
  <div class="topbar">
    <button class="mob-ham" onclick="toggleSb()"><span></span><span></span><span></span></button>
    <div>
      <div class="tb-title">内見管理</div>
      <div class="tb-crumb"><a href="coreto-hub-v2.html">COREBLDG</a> › <span>内見管理</span></div>
    </div>
    <div class="tb-act">
      <button class="btn btn-p btn-sm" onclick="switchTab('new',document.getElementById('tab-new'))">＋ 内見を登録</button>
    </div>
  </div>
  <div class="tab-bar">
    <div class="tab active" id="tab-list" onclick="switchTab('list',this)">内見一覧</div>
    <div class="tab" id="tab-new" onclick="switchTab('new',this)">内見登録</div>
    
  </div>
  <div class="page" id="pg"></div>
</div>
</div>
<div class="mob-overlay" onclick="toggleSb()"></div>
<script src="coreto-kv-client.js"></script>
<script src="coreto-nav-v2.js"></script>
<script>
// ─────────────────────────────────────────────
// 内見管理 — データ層
// ─────────────────────────────────────────────
var _p           = new URLSearchParams(location.search);
var _caseIdParam = _p.get('caseId') || '';
var _clientParam = _p.get('client') || '';
var _isNew       = _p.get('new') === '1';
var _SKEY        = 'CORETO_SHOWINGS_' + (_caseIdParam || 'ALL');

function loadShowings() {
  try {
    var raw = localStorage.getItem(_SKEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  // デモデータ削除済み - localStorageのみ使用
  return [];
}
function saveShowings(list) {
  try { localStorage.setItem(_SKEY, JSON.stringify(list)); } catch(e) {}
}
var SHOWINGS = loadShowings();

// ─────────────────────────────────────────────
// タブ切り替え（「一覧」と「登録」の2タブのみ）
// ─────────────────────────────────────────────
function switchTab(t, el) {
  document.querySelectorAll('.tab').forEach(function(x){ x.classList.remove('active'); });
  if (el) el.classList.add('active');
  if (t === 'list') renderList();
  if (t === 'new')  renderNew();
}

// ─────────────────────────────────────────────
// 内見一覧
// ─────────────────────────────────────────────
function renderList() {
  SHOWINGS = loadShowings();
  var upcoming = SHOWINGS.filter(function(s){ return s.status === '確定'; });
  var done     = SHOWINGS.filter(function(s){ return s.status === '完了'; });
  var rateYes  = done.filter(function(s){ return s.result === '申込意向あり' || s.result === '2番手申込'; }).length;
  var rateNo   = done.filter(function(s){ return s.result === '見送り'; }).length;

  var html =
    '<div class="kpi-row">' +
      kpi('gd', '合計内見数', SHOWINGS.length + '件') +
      kpi('sk', '予定', upcoming.length + '件') +
      kpi('em', '申込意向', rateYes + '件', done.length ? '完了' + done.length + '件中' : '') +
      kpi('am', '見送り', rateNo + '件') +
    '</div>';

  if (upcoming.length) {
    html += '<div class="sh-section-label">📅 予定</div>';
    html += upcoming.map(function(s){ return buildCard(s); }).join('');
  }
  if (done.length) {
    html += '<div class="sh-section-label" style="margin-top:20px">✅ 完了</div>';
    html += done.map(function(s){ return buildCard(s, true); }).join('');
  }
  if (!SHOWINGS.length) {
    html += '<div class="sh-empty"><div style="font-size:36px;margin-bottom:12px">📅</div>' +
      '<div style="font-weight:700;margin-bottom:6px">内見がまだ登録されていません</div>' +
      '<div style="font-size:12px">「＋ 内見を登録」から追加してください</div></div>';
  }
  document.getElementById('pg').innerHTML = html;
}

function kpi(cls, label, val, sub) {
  return '<div class="kpi ' + cls + '"><div class="kpi-lb">' + label + '</div><div class="kpi-vl">' + val + '</div>' + (sub ? '<div class="kpi-sb">' + sub + '</div>' : '') + '</div>';
}

function fmtDate(dateStr) {
  if (!dateStr) return '—';
  var d = new Date(dateStr);
  return (d.getMonth()+1) + '/' + d.getDate() + '（' + ['日','月','火','水','木','金','土'][d.getDay()] + '）';
}

function buildCard(s, isDone) {
  var resultBadge =
    !s.result        ? '<span class="badge b-sk">確定</span>' :
    s.result === '申込意向あり' ? '<span class="badge b-em">申込意向あり</span>' :
    s.result === '2番手申込'   ? '<span class="badge b-am">2番手申込</span>' :
    s.result === '検討中'      ? '<span class="badge b-sk">検討中</span>' :
                                 '<span class="badge b-nt">見送り</span>';

  var actionBtn = isDone
    ? '<button class="btn btn-g btn-sm" onclick="event.stopPropagation();openDetail(\'' + s.id + '\')">詳細</button>'
    : '<button class="btn btn-p btn-sm" onclick="event.stopPropagation();openDetail(\'' + s.id + '\')">結果を記録 →</button>';

  return '<div class="sh-card" style="cursor:pointer' + (isDone ? ';opacity:.8' : '') + '" onclick="openDetail(\'' + s.id + '\')">' +
    '<div class="sh-date-box" style="' + (isDone ? 'background:var(--cream2)' : '') + '">' +
      '<div class="sh-date-d" style="' + (isDone ? 'color:var(--ink)' : '') + '">' + (s.date ? new Date(s.date).getDate() : '—') + '</div>' +
      '<div class="sh-date-m" style="' + (isDone ? 'color:var(--faint)' : '') + '">' + (s.date ? (new Date(s.date).getMonth()+1) + '月' : '') + '</div>' +
    '</div>' +
    '<div class="sh-info">' +
      '<div class="sh-prop">' + s.prop + '</div>' +
      '<div class="sh-meta">' + s.time + ' ／ ' + (s.addr||'') + ' ／ <strong>' + s.client + '</strong> <span style="font-family:\'DM Mono\',monospace;color:var(--faint)">' + s.case + '</span></div>' +
      (s.note ? '<div style="font-size:11px;color:var(--muted);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:340px">' + s.note + '</div>' : '') +
    '</div>' +
    '<div class="sh-actions">' + resultBadge + actionBtn + '</div>' +
  '</div>';
}

// ─────────────────────────────────────────────
// 詳細モーダル
// 予定 → 「結果を記録」ボタンで inline 結果記録
// 完了 → 詳細表示のみ
// ─────────────────────────────────────────────
function openDetail(id) {
  var s = SHOWINGS.find(function(x){ return x.id === id; });
  if (!s) return;

  var existing = document.getElementById('sh-overlay');
  if (existing) existing.remove();

  var overlay = document.createElement('div');
  overlay.id = 'sh-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  overlay.onclick = function(e){ if(e.target===overlay) overlay.remove(); };

  var modal = document.createElement('div');
  modal.style.cssText = 'background:#fff;border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;font-family:Outfit,sans-serif';

  // ヘッダー
  var head = document.createElement('div');
  head.style.cssText = 'padding:16px 22px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1';
  var isDone = s.status === '完了';
  head.innerHTML =
    '<div><div style="font-size:15px;font-weight:700;color:var(--navy)">' + s.prop + '</div>' +
    '<div style="font-size:11px;color:var(--muted);margin-top:2px">' + fmtDate(s.date) + '　' + s.time + '　' + s.client + '　<span style="font-family:monospace">' + s.case + '</span></div></div>' +
    '<button onclick="document.getElementById(\'sh-overlay\').remove()" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted)">✕</button>';

  // ボディ
  var body = document.createElement('div');
  body.style.cssText = 'padding:20px 22px';

  // 基本情報グリッド
  var grid = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">' +
    dItem('内見方法', s.method||'現地案内（AG同行）') +
    dItem('同行者', s.companion||'なし') +
    dItem('物件住所', s.addr||'—', '1/-1') +
    '</div>';
  body.innerHTML = grid;

  // 完了済み：結果を表示
  if (isDone && s.result) {
    var rc = s.result==='申込意向あり'?'var(--em)':s.result==='2番手申込'?'var(--am)':s.result==='見送り'?'var(--muted)':'var(--sk)';
    var rbox = document.createElement('div');
    rbox.style.cssText = 'background:var(--cream2);border-radius:9px;padding:14px 16px;margin-bottom:14px';
    rbox.innerHTML = '<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">内見結果</div>' +
      '<div style="font-size:18px;font-weight:700;color:' + rc + '">' + s.result + '</div>';
    body.appendChild(rbox);
  }

  if (s.note) {
    var nbox = document.createElement('div');
    nbox.style.cssText = 'background:var(--cream2);border-radius:9px;padding:14px 16px;margin-bottom:14px';
    nbox.innerHTML = '<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">メモ</div>' +
      '<div style="font-size:13px;color:var(--ink);line-height:1.7">' + s.note + '</div>';
    body.appendChild(nbox);
  }

  // 予定 → 結果記録フォームをインラインで表示
  if (!isDone) {
    var divider = document.createElement('div');
    divider.style.cssText = 'border-top:1px solid var(--bd);margin:16px 0 14px;padding-top:14px';
    divider.innerHTML = '<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px">📋 内見結果を記録</div>';
    body.appendChild(divider);

    // 結果セレクト
    var resultRow = document.createElement('div');
    resultRow.style.marginBottom = '12px';
    resultRow.innerHTML =
      '<select id="modal-result" onchange="onModalResultChange(this.value)" style="width:100%;padding:10px 12px;border:1.5px solid var(--bd);border-radius:8px;font-size:13px;font-family:Outfit,sans-serif;outline:none;background:#fff">' +
        '<option value="">結果を選択してください</option>' +
        '<option value="申込意向あり">✅ 申込意向あり — 申込書を提出する</option>' +
        '<option value="2番手申込">📋 2番手で申込み — 1番手キャンセル待ち</option>' +
        '<option value="検討中">🤔 検討中 — 他物件と比較・追加内見予定</option>' +
        '<option value="見送り">❌ 見送り — この物件には申込しない</option>' +
      '</select>';
    body.appendChild(resultRow);

    // 追加情報エリア（結果によって切り替え）
    var extraArea = document.createElement('div');
    extraArea.id = 'modal-extra';
    extraArea.style.marginBottom = '12px';
    body.appendChild(extraArea);

    // コメント
    var noteRow = document.createElement('div');
    noteRow.style.marginBottom = '14px';
    noteRow.innerHTML = '<textarea id="modal-note" placeholder="クライアントの感想・次のアクションなど（任意）" style="width:100%;padding:10px 12px;border:1.5px solid var(--bd);border-radius:8px;font-size:12px;font-family:Outfit,sans-serif;resize:none;height:68px;outline:none">' + (s.note||'') + '</textarea>';
    body.appendChild(noteRow);

    // 記録ボタン
    var recBtn = document.createElement('button');
    recBtn.style.cssText = 'width:100%;padding:11px;background:var(--navy);color:var(--gold);border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:Outfit,sans-serif';
    recBtn.textContent = '✅ 結果を記録する';
    recBtn.onclick = function(){ recordResult(s.id); };
    body.appendChild(recBtn);
  }

  // フッターボタン（内見依頼書・削除）
  var foot = document.createElement('div');
  foot.style.cssText = 'display:flex;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--bd)';

  var printBtn = document.createElement('button');
  printBtn.style.cssText = 'padding:8px 14px;background:transparent;border:1.5px solid var(--bd);border-radius:8px;font-size:11px;color:var(--muted);cursor:pointer;font-family:Outfit,sans-serif';
  printBtn.textContent = '🖨️ 内見依頼書';
  printBtn.onclick = function(){ printShowingById(s.id); };

  var delBtn = document.createElement('button');
  delBtn.style.cssText = 'padding:8px 14px;background:transparent;border:1.5px solid var(--bd);border-radius:8px;font-size:11px;color:var(--rd);cursor:pointer;font-family:Outfit,sans-serif;margin-left:auto';
  delBtn.textContent = '削除';
  delBtn.onclick = function(){
    overlay.remove();
    coretoConfirm({title:'内見を削除', message:s.prop+'の内見記録を削除しますか？', okLabel:'削除する', danger:true, onOk:function(){
      SHOWINGS = SHOWINGS.filter(function(x){ return x.id !== s.id; });
      saveShowings(SHOWINGS); renderList();
    }});
  };

  foot.appendChild(printBtn);
  foot.appendChild(delBtn);
  body.appendChild(foot);

  modal.appendChild(head);
  modal.appendChild(body);
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
}

function dItem(label, val, col) {
  return '<div style="background:var(--cream2);border-radius:8px;padding:10px 14px' + (col ? ';grid-column:' + col : '') + '">' +
    '<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">' + label + '</div>' +
    '<div style="font-size:13px;font-weight:600;color:var(--ink)">' + (val||'—') + '</div>' +
  '</div>';
}

function onModalResultChange(val) {
  var area = document.getElementById('modal-extra');
  if (!area) return;
  if (val === '申込意向あり' || val === '2番手申込') {
    area.innerHTML =
      '<div style="background:' + (val==='申込意向あり'?'var(--em-bg)':'var(--am-bg)') + ';border-radius:8px;padding:11px 14px;font-size:11px;color:' + (val==='申込意向あり'?'var(--em)':'var(--am)') + ';line-height:1.7">' +
      (val==='申込意向あり' ? '✅ 記録後、<strong>書類送付管理</strong>へ移動して申込書を送付してください。' : '⚠️ 1番手キャンセル待ちで申込書を提出します。HQに連絡してください。') + '</div>';
  } else if (val === '検討中') {
    area.innerHTML =
      '<div style="background:var(--sk-bg);border-radius:8px;padding:11px 14px;font-size:11px;color:var(--sk);line-height:1.7">' +
      'ℹ️ 追加内見が必要な場合は「＋ 内見を登録」から別物件を追加してください。</div>';
  } else {
    area.innerHTML = '';
  }
}

function recordResult(showingId) {
  var result = document.getElementById('modal-result')?.value;
  var note   = document.getElementById('modal-note')?.value || '';
  if (!result) { showToast('結果を選択してください', 'warn'); return; }

  var idx = SHOWINGS.findIndex(function(x){ return x.id === showingId; });
  if (idx >= 0) {
    SHOWINGS[idx].status = '完了';
    SHOWINGS[idx].result = result;
    SHOWINGS[idx].note   = note;
    saveShowings(SHOWINGS);
  }

  var caseId = SHOWINGS[idx]?.case || _caseIdParam;
  document.getElementById('sh-overlay')?.remove();

  if ((result === '申込意向あり' || result === '2番手申込') && caseId) {
    coretoConfirm({
      title:'結果を記録しました',
      message:'申込書の送付へ進みますか？',
      detail:'書類送付管理ページで申込書を送付してください。',
      okLabel:'書類送付管理へ →',
      danger:false,
      onOk: function(){ window.location.href = 'coreto-screening-v2.html?caseId=' + encodeURIComponent(caseId); },
      onCancel: function(){ renderList(); }
    });
  } else {
    showToast('✅ 内見結果を記録しました', 'em');
    renderList();
  }
}

// ─────────────────────────────────────────────
// 内見登録フォーム
// ─────────────────────────────────────────────
function renderNew(prefill) {
  prefill = prefill || {};
  var cid = prefill.case || _caseIdParam;
  var cli = prefill.client || (_clientParam ? decodeURIComponent(_clientParam) : '');

  document.getElementById('pg').innerHTML =
    '<div class="form-wrap">' +
    '<div class="form-card">' +
      '<div class="form-head"><div class="form-head-title">📅 内見登録</div></div>' +
      '<div class="form-body">' +
        '<div class="field-row">' +
          '<div class="field"><label class="required">案件ID</label><input id="sh-case" placeholder="RENT-0000" value="' + cid + '"></div>' +
          '<div class="field"><label class="required">クライアント</label><input id="sh-client" placeholder="田中 優子" value="' + cli + '"></div>' +
        '</div>' +
        '<div class="field"><label class="required">物件名・部屋番号</label><input id="sh-prop" placeholder="パークタワー三田 302"></div>' +
        '<div class="field"><label class="required">物件住所</label><input id="sh-addr" placeholder="港区三田3丁目XX-XX"></div>' +
        '<div class="field-row">' +
          '<div class="field"><label class="required">内見日</label><input id="sh-date" type="date"></div>' +
          '<div class="field"><label class="required">時間</label><input id="sh-time" type="time" value="14:00"></div>' +
        '</div>' +
        '<div class="field-row">' +
          '<div class="field"><label>同行者</label><input id="sh-companion" placeholder="管理会社担当者名など"></div>' +
          '<div class="field"><label>内見方法</label>' +
            '<select id="sh-method"><option>現地案内（AG同行）</option><option>オンライン内見</option></select>' +
          '</div>' +
        '</div>' +
        '<div style="background:var(--am-bg);border:1px solid rgba(217,119,6,.2);border-radius:7px;padding:9px 13px;font-size:11px;color:var(--am);margin-bottom:14px">' +
          '⚠️ <strong>セルフ内見（鍵貸出）は禁止</strong>です。必ずAGが同行してください。' +
        '</div>' +
        '<div class="field"><label>メモ</label><textarea id="sh-note" placeholder="集合場所・駐車場の有無など" rows="2"></textarea></div>' +
      '</div>' +
    '</div>' +
    '<div style="display:flex;justify-content:flex-end;gap:10px">' +
      '<button class="btn btn-g" onclick="switchTab(\'list\',document.getElementById(\'tab-list\'))">キャンセル</button>' +
      '<button class="btn btn-g" onclick="printShowingFromForm()">🖨️ 内見依頼書を出力</button>' +
      '<button class="btn btn-p" onclick="registerShowing()">登録する →</button>' +
    '</div>' +
    '</div>';
}

function registerShowing() {
  var caseId    = document.getElementById('sh-case')?.value.trim();
  var client    = document.getElementById('sh-client')?.value.trim();
  var prop      = document.getElementById('sh-prop')?.value.trim();
  var addr      = document.getElementById('sh-addr')?.value.trim() || '';
  var date      = document.getElementById('sh-date')?.value;
  var time      = document.getElementById('sh-time')?.value;
  var companion = document.getElementById('sh-companion')?.value.trim() || '';
  var method    = document.getElementById('sh-method')?.value || '現地案内（AG同行）';
  var note      = document.getElementById('sh-note')?.value.trim() || '';

  if (!caseId || !client || !prop || !date || !time) {
    showToast('案件ID・クライアント・物件名・日時は必須です', 'warn'); return;
  }
  var id = 'SH-' + Date.now().toString().slice(-6);
  SHOWINGS.unshift({id:id, case:caseId, client:client, prop:prop, addr:addr, date:date, time:time, companion:companion, method:method, status:'確定', result:'', note:note});
  saveShowings(SHOWINGS);
  showToast('✅ 内見を登録しました', 'em');
  switchTab('list', document.getElementById('tab-list'));
}

// ─────────────────────────────────────────────
// 内見依頼書出力（V1フォーマット）
// ─────────────────────────────────────────────
function printShowingById(id) {
  var s = SHOWINGS.find(function(x){ return x.id === id; });
  if (!s) return;
  var mgmt = '';
  try { var d = JSON.parse(localStorage.getItem('CORETO_CASE_DETAIL_'+s.case)||'{}'); mgmt=d.mgmtCo||''; } catch(e){}
  buildAndPrint({prop:s.prop, date:s.date, time:s.time, client:s.client, mgmt:mgmt});
}
function printShowingFromForm() {
  var cid = document.getElementById('sh-case')?.value || _caseIdParam;
  var mgmt = '';
  try { var d = JSON.parse(localStorage.getItem('CORETO_CASE_DETAIL_'+cid)||'{}'); mgmt=d.mgmtCo||''; } catch(e){}
  buildAndPrint({
    prop:   document.getElementById('sh-prop')?.value || '',
    date:   document.getElementById('sh-date')?.value || '',
    time:   document.getElementById('sh-time')?.value || '',
    client: document.getElementById('sh-client')?.value || '',
    mgmt:   mgmt
  });
}
function buildAndPrint(info) {
  var agName='',agId='',agMobile='',agLicense='宅地建物取引士証 第XXXXXX号';
  agName = sessionStorage.getItem('coreto_name')||'担当者名';
  agId   = sessionStorage.getItem('coreto_user_id')||'';
  try { var pr=JSON.parse(localStorage.getItem('CORETO_AG_PROFILE')||'{}'); if(pr.phone) agMobile=pr.phone; if(pr.takkenNo) agLicense='宅地建物取引士証 第'+pr.takkenNo+'号'; } catch(e){}
  // agMobile: 実際の連絡先はCORETO_MY_BANK等から取得
  var mo='　',dy='　',hr='　',mn='　';
  if(info.date){var dO=new Date(info.date);mo=dO.getMonth()+1;dy=dO.getDate();}
  if(info.time){var tp=info.time.split(':');hr=tp[0]||'　';mn=tp[1]||'　';}
  var w=window.open('','_blank','width=800,height=1100');
  w.document.write('<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><style>' +
    '*{box-sizing:border-box;margin:0;padding:0}' +
    "body{font-family:'Noto Sans JP','MS Gothic',sans-serif;background:#fff;color:#000;padding:20mm 18mm}" +
    '.T{font-size:22px;font-weight:700;text-align:center;border:2px solid #000;padding:8px 0;margin-bottom:24px;letter-spacing:4px}' +
    '.H{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}' +
    '.TO{font-size:18px;font-weight:700;border-bottom:2px solid #000;padding-bottom:4px;min-width:220px;display:inline-block}' +
    '.F{font-size:11px;line-height:1.8}' +
    '.R{display:flex;align-items:center;margin-bottom:20px;border-bottom:1.5px solid #555;padding-bottom:14px}' +
    '.RL{font-size:14px;font-weight:700;width:80px}' +
    '.RV{font-size:20px;font-weight:700;flex:1;padding-left:16px}' +
    '.B{font-size:13px;margin-bottom:8px;font-weight:500}' +
    '.N{font-size:13px;font-weight:700;margin-top:16px}' +
    '.C{border:3px solid #1a2744;margin-top:32px;display:flex;width:91mm;height:55mm;overflow:hidden}' +
    '.CL{background:#1a2744;padding:10px 14px;flex:1;display:flex;flex-direction:column;justify-content:center}' +
    '.CN{color:#fff;font-size:18px;font-weight:700;letter-spacing:2px;margin-bottom:6px}' +
    '.CI{color:#d0d8e8;font-size:10px;line-height:1.9}' +
    '.CI .lb{color:#c9a84c;font-size:9px}' +
    '.CR{padding:10px 14px;display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;min-width:130px}' +
    '.CLo{font-size:18px;color:#1a2744;font-weight:700;letter-spacing:2px;font-family:monospace}' +
    '.CM{font-size:12px;font-weight:700;color:#1a2744;font-family:monospace}' +
    '.Li{font-size:9px;color:#666;text-align:right}' +
    '@media print{body{padding:15mm 15mm}}' +
  '</style></head><body>' +
  '<div class="T">内　見　依　頼　書</div>' +
  '<div class="H"><div><div class="TO">'+(info.mgmt||'　　　　　　　　　')+'</div><div style="font-size:13px;font-weight:700;margin-top:4px">御中</div></div>' +
  '<div class="F"><strong>株式会社CORETO</strong><br>〒150-0000　東京都○○区○○ 1-1-1<br><strong>Tel：03-XXXX-XXXX</strong>　<strong>Fax：03-XXXX-XXXX</strong></div></div>' +
  '<div class="R"><div class="RL">物件名</div><div class="RV">'+(info.prop||'　')+'</div></div>' +
  '<div class="R"><div class="RL">日時</div><div class="RV" style="font-size:22px">'+mo+'　月　'+dy+'　日</div></div>' +
  '<div class="R"><div class="RL">時間</div><div class="RV" style="font-size:22px">'+hr+'　時　'+mn+'　分</div></div>' +
  (info.client?'<div class="R"><div class="RL">お客様</div><div class="RV">'+info.client+'　様</div></div>':'') +
  '<p class="B">上記物件を内見させて頂きます。</p><p class="B">宜しくお願い致します。</p><p class="N">※　下記携帯までご連絡下さい</p>' +
  '<div class="C"><div class="CL"><div class="CN">'+agName+'</div><div class="CI">' +

    '<div><span class="lb">Tel：</span>03-XXXX-XXXX</div><div><span class="lb">Fax：</span>03-XXXX-XXXX</div>' +

// ─────────────────────────────────────────────
// 初期化
// ─────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function(){
  CNAV.init('showing');
  if (_isNew && _caseIdParam) {
    var newTab = document.getElementById('tab-new');
    if (newTab) { document.getElementById('tab-list').classList.remove('active'); newTab.classList.add('active'); }
    renderNew({case:_caseIdParam, client:_clientParam ? decodeURIComponent(_clientParam) : ''});
  } else {
    renderList();
  }
});

function showToast(msg, type) {
  var c=({em:['#ECFDF5','#059669','rgba(5,150,105,.2)'],am:['#FFFBEB','#D97706','rgba(217,119,6,.2)'],rd:['#FEF2F2','#DC2626','rgba(220,38,38,.2)'],sk:['#F0F9FF','#0284C7','rgba(2,132,199,.2)'],warn:['#FFFBEB','#D97706','rgba(217,119,6,.2)']})[type]||['#ECFDF5','#059669','rgba(5,150,105,.2)'];
  var t=document.createElement('div'); t.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;padding:11px 18px;border-radius:9px;font-size:13px;font-weight:600;font-family:Outfit,sans-serif;box-shadow:0 6px 20px rgba(0,0,0,.12);transition:opacity .4s;background:'+c[0]+';color:'+c[1]+';border:1px solid '+c[2]; t.textContent=msg; document.body.appendChild(t);
  setTimeout(function(){t.style.opacity='0';setTimeout(function(){if(t.parentNode)t.remove();},400);},3200);
}
