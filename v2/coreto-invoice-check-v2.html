<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>COREBLDG — 初期費用明細チェック</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0D1A2D;--gold:#C8A951;--gold-dim:rgba(200,169,81,.15);
  --ink:#202124;--muted:#5F6368;--faint:#80868B;
  --em:#059669;--em-bg:#ECFDF5;--rd:#DC2626;--rd-bg:#FEF2F2;
  --am:#D97706;--am-bg:#FFFBEB;--sk:#0284C7;--sk-bg:#EFF6FF;
  --vt:#7C3AED;--vt-bg:#F5F3FF;
  --bd:#E8EAED;--bd2:#DADCE0;--cream:#FAFAFA;--white:#fff;
  --sidebar-w:240px;--r:10px;--sh:0 1px 4px rgba(0,0,0,.08);
}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:#F1F3F4;color:var(--ink)}
.shell{display:flex;height:100vh}

/* ── サイドバー ── */
.sb{width:var(--sidebar-w);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0}
.sb-head{padding:22px 20px 14px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;letter-spacing:5px;color:var(--gold)}
.sb-ver{font-size:9px;color:rgba(255,255,255,.25);letter-spacing:1px;margin-top:3px}
.sb-user{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--gold-dim);border:1px solid rgba(200,169,81,.3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gold);flex-shrink:0}
.sb-uname{font-size:11px;font-weight:600;color:#fff}
.sb-urole{font-size:9px;color:rgba(255,255,255,.35);margin-top:1px}
.sb-nav{flex:1;overflow-y:auto;padding:8px 12px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;font-size:11px;color:rgba(255,255,255,.55);text-decoration:none;cursor:pointer;transition:.13s}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.82)}
.nav-item.active{background:rgba(200,169,81,.1);color:var(--gold)}

/* ── メイン ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:54px;background:#fff;border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0;box-shadow:var(--sh)}
.tb-title{font-size:14px;font-weight:700;color:var(--navy);font-family:'Outfit',sans-serif}
.tb-crumb{font-size:10px;color:var(--muted);margin-top:1px}
.tb-crumb a{color:var(--sk);text-decoration:none}
.tb-act{margin-left:auto;display:flex;gap:8px;align-items:center}
.btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;transition:.13s;border:none}
.btn-primary{background:var(--navy);color:var(--gold)}
.btn-ghost{background:transparent;border:1.5px solid var(--bd);color:var(--muted)}
.btn-ghost:hover{border-color:var(--bd2);background:#f8f8f8}
.btn-em{background:var(--em);color:#fff}
.btn-sm{padding:5px 10px;font-size:11px}
.page{flex:1;overflow-y:auto;padding:24px}
.content{max-width:960px;margin:0 auto}

/* ── カード ── */
.card{background:#fff;border:1px solid var(--bd);border-radius:var(--r);margin-bottom:16px}
.card-head{padding:12px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:700;color:var(--navy)}
.card-body{padding:16px 18px}

/* ── ステップバー ── */
.steps{display:flex;align-items:center;gap:0;margin-bottom:20px}
.step{padding:9px 16px;font-size:11px;font-weight:600;color:var(--muted);background:#fff;border:1px solid var(--bd);border-radius:8px;margin-right:4px}
.step.active{background:var(--navy);color:var(--gold);border-color:var(--navy)}
.step.done{background:var(--em-bg);color:var(--em);border-color:rgba(5,150,105,.3)}

/* ── 照合テーブル ── */
.check-table{width:100%;border-collapse:collapse}
.check-table th{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:8px 12px;background:var(--cream);border-bottom:1px solid var(--bd);text-align:left}
.check-table td{padding:10px 12px;border-bottom:1px solid var(--bd);font-size:13px}
.check-table tr:last-child td{border-bottom:none}
.check-table .label-col{font-size:11px;font-weight:700;color:var(--muted);width:130px}
.check-table .ai-col{font-family:'DM Mono',monospace;font-size:12px;color:var(--ink)}
.check-table .correct-col{width:220px}
.check-table .status-col{width:80px;text-align:center}
.badge-ok{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:var(--em-bg);color:var(--em)}
.badge-ng{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:var(--rd-bg);color:var(--rd)}
.badge-edit{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:var(--am-bg);color:var(--am)}

/* 修正入力欄 */
.correct-input{width:100%;padding:6px 10px;border:1.5px solid var(--bd);border-radius:6px;font-size:12px;font-family:'DM Mono',monospace;outline:none;transition:.13s}
.correct-input:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(13,26,45,.08)}
.correct-input.modified{border-color:var(--am);background:var(--am-bg)}

/* スキャン画像プレビュー */
.scan-preview{border:1px solid var(--bd);border-radius:8px;overflow:hidden;background:#f8f9fa;display:flex;align-items:center;justify-content:center;min-height:160px;margin-bottom:12px}
.scan-preview img{max-width:100%;max-height:300px;object-fit:contain}
.scan-placeholder{text-align:center;color:var(--faint);padding:32px}
.scan-placeholder .icon{font-size:36px;margin-bottom:8px}
.scan-placeholder .text{font-size:12px}

/* 照合結果バナー */
.result-banner{border-radius:10px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px;font-size:13px;font-weight:600}
.result-banner.ok{background:var(--em-bg);border:1px solid rgba(5,150,105,.25);color:var(--em)}
.result-banner.ng{background:var(--rd-bg);border:1px solid rgba(220,38,38,.25);color:var(--rd)}
.result-banner.edited{background:var(--am-bg);border:1px solid rgba(217,119,6,.25);color:var(--am)}

/* ノーデータ */
.no-data{text-align:center;padding:48px 24px;color:var(--muted)}
.no-data .icon{font-size:48px;margin-bottom:12px}
.no-data .title{font-size:16px;font-weight:700;margin-bottom:8px;color:var(--ink)}
.no-data .sub{font-size:12px;line-height:1.7}
</style>
</head>
<body>
<div class="shell">

  <!-- サイドバー -->
  <div class="sb">
    <div class="sb-head">
      <div class="sb-logo">CORETO</div>
      <div class="sb-ver">COREBLDG v2.0</div>
    </div>
    <div class="sb-user">
      <div class="sb-av" id="sb-av">HQ</div>
      <div>
        <div class="sb-uname" id="sb-uname">本部 管理者</div>
        <div class="sb-urole" id="sb-role">HQ-00001</div>
      </div>
    </div>
    <div class="sb-nav" id="sb-nav">
      <a class="nav-item" href="coreto-hub-v2.html">🏠 ダッシュボード</a>
      <a class="nav-item" href="coreto-itsetsu-v2.html">🔑 IT重説管理</a>
      <a class="nav-item active" href="coreto-invoice-check-v2.html">🏦 初期費用明細チェック</a>
      <a class="nav-item" href="coreto-remittance-v2.html">💰 入金監視</a>
    </div>
  </div>

  <!-- メイン -->
  <div class="main">
    <div class="topbar">
      <div>
        <div class="tb-title">初期費用明細チェック</div>
        <div class="tb-crumb"><a href="coreto-hub-v2.html">COREBLDG</a> › <span>初期費用明細チェック</span></div>
      </div>
      <div class="tb-act" id="topbar-act"></div>
    </div>

    <div class="page">
      <div class="content" id="main-content">
        <!-- JSで描画 -->
      </div>
    </div>
  </div>
</div>

<script>
// ── アクセス制御（HQ専用）──────────────────────────────
(function(){
  var r = sessionStorage.getItem('coreto_role') || '';
  if (r && r !== 'hq') location.replace('coreto-hub-v2.html?unauthorized=1');
})();

// ── URLパラメータからcaseIdを取得 ─────────────────────
var params  = new URLSearchParams(location.search);
var caseId  = params.get('caseId') || '';

// ── 明細書データを取得（2つのソースに対応）──────────
// ① rental-v2からAGが直接アップロード → CORETO_INVOICE_MEISAI_{caseId}
// ② barcode-scan-v2からスキャン時にアップロード → CORETO_INVOICE_MEISAI_{caseId}
function getScanData(cid) {
  try {
    var raw = localStorage.getItem('CORETO_SCAN_' + cid);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function getMeisaiData(cid) {
  try {
    var raw = localStorage.getItem('CORETO_INVOICE_MEISAI_' + cid);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

// ── AI読み取り結果（スキャンデータから取得 or デモ値）──
function getAiResult(scanData, cid) {
  // 実際のKintone連携後はscanData.aiResultから取得
  // 現在はデモ値（caseIdに紐づく仮データ）
  if (scanData && scanData.aiResult) return scanData.aiResult;
  // デモ用フォールバック
  return {
    bank:   '三菱UFJ銀行',
    branch: '渋谷支店',
    type:   '普通',
    number: '1234567',
    holder: 'ｶﾌﾞｼｷｶﾞｲｼｬ ﾀﾅｶﾌﾄﾞｳｻﾝ',
    amount: 385000,
    confidence: 0.94,
  };
}

// ── フィールド定義 ────────────────────────────────────
var FIELDS = [
  { id:'bank',   label:'銀行名',       type:'text' },
  { id:'branch', label:'支店名',       type:'text' },
  { id:'type',   label:'口座種別',     type:'select', opts:['普通','当座'] },
  { id:'number', label:'口座番号',     type:'text', mono:true },
  { id:'holder', label:'口座名義（カナ）', type:'text', mono:true },
  { id:'amount', label:'送金金額',     type:'number', prefix:'¥' },
];

// ── メインレンダリング ────────────────────────────────
function render() {
  var el = document.getElementById('main-content');

  if (!caseId) {
    // caseId未指定: 案件一覧から選択
    renderSelectCase(el);
    return;
  }

  var scanData = getScanData(caseId);
  var aiResult = getAiResult(scanData, caseId);

  // 明細書画像の取得（優先順位: ① 直接アップロード → ② barcode-scanのメイサイ → ③ 重説書 → ④ 契約書）
  var meisaiData = getMeisaiData(caseId);
  var scanImage  = null;
  var imageSource = '';
  if (meisaiData && meisaiData.dataUrl) {
    scanImage   = meisaiData.dataUrl;
    imageSource = meisaiData.source === 'rental-ag' ? 'AGが直接アップロード' : '書類スキャンから取得';
  } else if (scanData && scanData.meisai && scanData.meisai.dataUrl) {
    scanImage   = scanData.meisai.dataUrl;
    imageSource = '書類スキャンから取得';
  } else if (scanData && scanData.jusetsu && scanData.jusetsu.dataUrl) {
    scanImage   = scanData.jusetsu.dataUrl;
    imageSource = '重説書（明細書未添付）';
  } else if (scanData && scanData.contract && scanData.contract.dataUrl) {
    scanImage   = scanData.contract.dataUrl;
    imageSource = '契約書（明細書未添付）';
  }

  el.innerHTML = '';

  // ステップバー
  var stepsEl = document.createElement('div');
  stepsEl.className = 'steps';
  stepsEl.innerHTML =
    '<div class="step done">① 書類スキャン済み</div>' +
    '<div class="step active">② AIが読み取った内容を確認・修正</div>' +
    '<div class="step" id="step3">③ 送金申請</div>';
  el.appendChild(stepsEl);

  // 案件情報バナー
  var infoBanner = document.createElement('div');
  infoBanner.style.cssText = 'background:#fff;border:1px solid var(--bd);border-radius:10px;padding:12px 18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between';
  infoBanner.innerHTML =
    '<div style="display:flex;align-items:center;gap:12px">' +
      '<span style="font-size:20px">🏠</span>' +
      '<div>' +
        '<div style="font-size:13px;font-weight:700;color:var(--navy)">' + (caseId||'—') + '</div>' +
        '<div style="font-size:11px;color:var(--muted);margin-top:2px">' +
          (scanData ? '書類スキャン: ' + (scanData.confirmedAt||scanData.uploadedAt||'済み') : '書類スキャン状態: 未取得') +
        '</div>' +
      '</div>' +
    '</div>' +
    '<a href="coreto-barcode-scan-v2.html" class="btn btn-ghost btn-sm">📷 スキャン管理</a>';
  el.appendChild(infoBanner);

  // 2カラムレイアウト
  var grid = document.createElement('div');
  grid.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start';

  // 左: スキャン画像
  var leftCol = document.createElement('div');
  var imgCard = document.createElement('div');
  imgCard.className = 'card';
  imgCard.innerHTML =
    '<div class="card-head"><div class="card-title">📄 スキャン済み明細書</div>' +
    (scanImage ? '<span style="font-size:10px;color:var(--em)">✅ ' + imageSource + '</span>' : '<span style="font-size:10px;color:var(--am)">⚠️ 未アップロード — rental-v2またはbarcode-scanからアップロードしてください</span>') +
    '</div>' +
    '<div class="card-body">' +
      '<div class="scan-preview">' +
        (scanImage
          ? '<img src="' + scanImage + '" alt="明細書">'
          : '<div class="scan-placeholder"><div class="icon">📄</div><div class="text">barcode-scan-v2でスキャンした<br>明細書の画像がここに表示されます</div></div>'
        ) +
      '</div>' +
      (aiResult.confidence ? '<div style="font-size:10px;color:var(--muted);text-align:right">AI読み取り信頼度: ' + Math.round(aiResult.confidence * 100) + '%</div>' : '') +
    '</div>';
  leftCol.appendChild(imgCard);
  grid.appendChild(leftCol);

  // 右: AI読み取り結果の確認・修正
  var rightCol = document.createElement('div');
  var checkCard = document.createElement('div');
  checkCard.className = 'card';

  var tableHtml =
    '<div class="card-head">' +
      '<div class="card-title">🤖 AI読み取り結果 — 確認・修正</div>' +
      '<span style="font-size:10px;color:var(--muted)">誤読がある場合のみ修正してください</span>' +
    '</div>' +
    '<div class="card-body">' +
      '<div style="background:var(--sk-bg);border:1px solid rgba(2,132,199,.15);border-radius:8px;padding:10px 13px;margin-bottom:14px;font-size:11px;color:var(--sk);line-height:1.6">' +
        'ℹ️ AIがスキャン明細書から読み取った口座情報・金額を表示しています。<br>誤読がある場合のみ「修正値」欄に正しい値を入力してください。' +
      '</div>' +
    '<table class="check-table">' +
      '<thead><tr>' +
        '<th>項目</th>' +
        '<th>AI読み取り値</th>' +
        '<th>修正値（誤読時のみ）</th>' +
        '<th>状態</th>' +
      '</tr></thead>' +
      '<tbody id="check-tbody">' +
      '</tbody>' +
    '</table>' +
    '<div style="margin-top:16px">' +
      '<label style="font-size:10px;font-weight:700;color:var(--muted);display:block;margin-bottom:5px">確認メモ（任意）</label>' +
      '<textarea id="check-memo" placeholder="照合時の特記事項があれば入力" style="width:100%;padding:9px 12px;border:1.5px solid var(--bd);border-radius:8px;font-size:12px;font-family:\'Noto Sans JP\',sans-serif;resize:none;height:60px;outline:none"></textarea>' +
    '</div>' +
    '</div>';

  checkCard.innerHTML = tableHtml;
  rightCol.appendChild(checkCard);

  // 照合ボタン
  var actionCard = document.createElement('div');
  actionCard.className = 'card';
  actionCard.innerHTML =
    '<div class="card-body" style="display:flex;gap:10px">' +
      '<button class="btn btn-primary" id="btn-confirm" onclick="confirmCheck()" style="flex:1">✅ 確認完了 → 送金申請へ</button>' +
      '<button class="btn btn-ghost" onclick="printResult()">🖨️ 印刷</button>' +
    '</div>';
  rightCol.appendChild(actionCard);

  grid.appendChild(rightCol);
  el.appendChild(grid);

  // テーブル行を描画
  buildCheckTable(aiResult);
}

function buildCheckTable(ai) {
  var tbody = document.getElementById('check-tbody');
  if (!tbody) return;
  tbody.innerHTML = '';
  FIELDS.forEach(function(f) {
    var aiVal = ai[f.id] !== undefined ? String(ai[f.id]) : '—';
    var displayVal = f.id === 'amount' ? '¥' + Number(aiVal).toLocaleString() : aiVal;

    var tr = document.createElement('tr');
    tr.dataset.field = f.id;

    // 項目名
    var tdLabel = document.createElement('td');
    tdLabel.className = 'label-col';
    tdLabel.textContent = f.label;

    // AI値
    var tdAi = document.createElement('td');
    tdAi.className = 'ai-col';
    tdAi.textContent = displayVal;

    // 修正値入力
    var tdCorrect = document.createElement('td');
    tdCorrect.className = 'correct-col';
    var input;
    if (f.type === 'select') {
      input = document.createElement('select');
      input.className = 'correct-input';
      input.style.width = '100%';
      f.opts.forEach(function(o) {
        var opt = document.createElement('option');
        opt.value = o; opt.textContent = o;
        if (o === aiVal) opt.selected = true;
        input.appendChild(opt);
      });
    } else {
      input = document.createElement('input');
      input.type = f.type === 'number' ? 'number' : 'text';
      input.className = 'correct-input';
      input.placeholder = '誤読があれば修正';
      if (f.mono) input.style.fontFamily = "'DM Mono',monospace";
    }
    input.dataset.aiVal = aiVal;
    input.dataset.field = f.id;
    input.addEventListener('input', function() { updateRowStatus(this); });
    tdCorrect.appendChild(input);

    // 状態
    var tdStatus = document.createElement('td');
    tdStatus.className = 'status-col';
    tdStatus.id = 'status-' + f.id;
    tdStatus.innerHTML = '<span class="badge-ok">✓ OK</span>';

    tr.appendChild(tdLabel);
    tr.appendChild(tdAi);
    tr.appendChild(tdCorrect);
    tr.appendChild(tdStatus);
    tbody.appendChild(tr);
  });
}

function updateRowStatus(input) {
  var fieldId = input.dataset.field;
  var aiVal   = input.dataset.aiVal;
  var curVal  = input.value.trim();
  var statusEl = document.getElementById('status-' + fieldId);
  if (!statusEl) return;

  if (!curVal || curVal === aiVal) {
    input.classList.remove('modified');
    statusEl.innerHTML = '<span class="badge-ok">✓ OK</span>';
  } else {
    input.classList.add('modified');
    statusEl.innerHTML = '<span class="badge-edit">✎ 修正</span>';
  }
}

function confirmCheck() {
  // 最終値を収集（修正値があれば修正値、なければAI値）
  var finalValues = {};
  var hasEdit = false;
  FIELDS.forEach(function(f) {
    var row = document.querySelector('tr[data-field="' + f.id + '"]');
    if (!row) return;
    var input = row.querySelector('.correct-input');
    var aiVal = input ? input.dataset.aiVal : '';
    var curVal = input ? input.value.trim() : '';
    finalValues[f.id] = (curVal && curVal !== aiVal) ? curVal : aiVal;
    if (curVal && curVal !== aiVal) hasEdit = true;
  });

  var memo = document.getElementById('check-memo') ? document.getElementById('check-memo').value : '';
  var now  = new Date().toLocaleString('ja-JP');

  // CORETO_INVOICE_CHECKに保存
  try {
    var checks = JSON.parse(localStorage.getItem('CORETO_INVOICE_CHECK') || '{}');
    checks[caseId] = {
      caseId:      caseId,
      finalValues: finalValues,
      hasEdit:     hasEdit,
      memo:        memo,
      checkedAt:   now,
      checkedBy:   sessionStorage.getItem('coreto_name') || 'HQ',
      status:      'ok',
    };
    localStorage.setItem('CORETO_INVOICE_CHECK', JSON.stringify(checks));
  } catch(e) {}

  // 完了バナー表示
  var el = document.getElementById('main-content');
  var banner = document.createElement('div');
  banner.className = 'result-banner ' + (hasEdit ? 'edited' : 'ok');
  banner.innerHTML =
    '<span style="font-size:20px">' + (hasEdit ? '✎' : '✅') + '</span>' +
    '<div>' +
      '<div>' + (hasEdit ? '修正あり・照合完了' : '全項目一致・照合完了') + '</div>' +
      '<div style="font-size:11px;font-weight:400;margin-top:2px">' + now + ' — ' + (sessionStorage.getItem('coreto_name')||'HQ') + '</div>' +
    '</div>' +
    '<button class="btn btn-primary btn-sm" onclick="location.href=\'coreto-remittance-v2.html\'" style="margin-left:auto">💴 送金申請へ進む →</button>';
  el.insertBefore(banner, el.firstChild);

  document.getElementById('btn-confirm').disabled = true;
  document.getElementById('btn-confirm').textContent = '✅ 確認完了';

  showToast('✅ 照合完了。送金申請ページで処理を進めてください。', 'ok');
}

// caseId未指定時: CORETO_INVOICE_CHECKと未処理案件一覧
function renderSelectCase(el) {
  el.innerHTML =
    '<div class="no-data">' +
      '<div class="icon">🏦</div>' +
      '<div class="title">案件を選択してください</div>' +
      '<div class="sub">IT重説完了後、案件IDを指定してアクセスしてください。<br>' +
        'または <a href="coreto-itsetsu-v2.html" style="color:var(--sk)">IT重説管理</a> から「初期費用確認（HQ）→」をクリック</div>' +
    '</div>' +
    '<div id="pending-list"></div>';

  // CORETO_INVOICE_CHECKから確認待ち案件を表示
  try {
    var allChecks = JSON.parse(localStorage.getItem('CORETO_INVOICE_CHECK') || '{}');
    var pending = Object.values(allChecks).filter(function(c){ return c.status === 'ok'; });
    if (pending.length) {
      var listEl = document.getElementById('pending-list');
      var card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = '<div class="card-head"><div class="card-title">✅ 照合完了済み案件</div></div>';
      var rows = pending.map(function(c) {
        return '<tr>' +
          '<td style="padding:10px 14px;font-weight:700;font-family:monospace;color:var(--sk)">' + c.caseId + '</td>' +
          '<td style="padding:10px 14px;font-size:12px;color:var(--muted)">' + c.checkedAt + '</td>' +
          '<td style="padding:10px 14px"><span class="badge-ok">照合完了</span></td>' +
          '<td style="padding:10px 14px"><a href="?caseId=' + encodeURIComponent(c.caseId) + '" class="btn btn-ghost btn-sm">再確認</a></td>' +
        '</tr>';
      }).join('');
      card.innerHTML += '<table style="width:100%;border-collapse:collapse"><tbody>' + rows + '</tbody></table>';
      listEl.appendChild(card);
    }
  } catch(e) {}
}

function printResult() { window.print(); }

function showToast(msg, type) {
  var t = document.getElementById('_toast');
  if (!t) {
    t = document.createElement('div');
    t.id = '_toast';
    Object.assign(t.style, {
      position:'fixed', bottom:'24px', left:'50%', transform:'translateX(-50%) translateY(10px)',
      padding:'10px 20px', borderRadius:'8px', fontSize:'13px', fontWeight:'600',
      zIndex:'9999', opacity:'0', transition:'all .25s', fontFamily:"'Outfit',sans-serif",
      boxShadow:'0 4px 20px rgba(0,0,0,.25)', whiteSpace:'nowrap',
    });
    document.body.appendChild(t);
  }
  t.style.background = type === 'ok' ? '#059669' : type === 'warn' ? '#D97706' : '#0D1A2D';
  t.style.color = '#fff';
  t.textContent = msg;
  t.style.opacity = '1';
  t.style.transform = 'translateX(-50%) translateY(0)';
  setTimeout(function() { t.style.opacity = '0'; t.style.transform = 'translateX(-50%) translateY(10px)'; }, 3200);
}

// ── HQタスクを処理済みにしてCORETO_HQ_TASKSから削除 ──
function completeHQTask(taskId) {
  try {
    var tasks = JSON.parse(localStorage.getItem('CORETO_HQ_TASKS') || '[]');
    localStorage.setItem('CORETO_HQ_TASKS', JSON.stringify(tasks.filter(function(t){ return t.id !== taskId; })));
  } catch(e) {}
}

window.addEventListener('DOMContentLoaded', function() {
  // ロール情報を反映
  var role = sessionStorage.getItem('coreto_role') || '';
  var name = sessionStorage.getItem('coreto_name') || '本部 管理者';
  var uid  = sessionStorage.getItem('coreto_user_id') || 'HQ-00001';
  document.getElementById('sb-av').textContent    = 'HQ';
  document.getElementById('sb-uname').textContent = name;
  document.getElementById('sb-role').textContent  = uid;
  render();
  if (typeof CNAV !== 'undefined') CNAV.init('invoice_check');
});
</script>
