<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>応募者管理 — COREBLDG</title>
<link rel="stylesheet" href="coreto-design-system.css">
<style>
:root{--navy:#0D1A2D;--navy-l:#1E3252;--gold:#C8A951;--gold-dim:rgba(200,169,81,.15);--cream:#FFFFFF;--cream2:#F8F9FA;--ink:#202124;--muted:#5F6368;--faint:#80868B;--em:#059669;--em-bg:#ECFDF5;--am:#D97706;--am-bg:#FFFBEB;--rd:#DC2626;--rd-bg:#FEF2F2;--sk:#0284C7;--sk-bg:#F0F9FF;--vt:#7C3AED;--vt-bg:#F5F3FF;--nt:#374151;--nt-bg:#F3F4F6;--bd:#E8EAED;--sw:240px;--r:10px;--sh:0 1px 2px rgba(60,64,67,.1),0 1px 3px rgba(60,64,67,.06)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:var(--cream)}
.shell{display:flex;height:100vh}
.sb{width:var(--sw);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;position:relative}
.sb::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,transparent,rgba(200,169,81,.2),transparent)}
.sb-head{padding:20px 18px 14px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-logo{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--gold);letter-spacing:2px;line-height:1.2}
.sb-ver{font-size:9px;color:rgba(255,255,255,.25);margin-top:4px}
.sb-user{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-av{width:32px;height:32px;border-radius:50%;background:rgba(200,169,81,.2);border:1.5px solid rgba(200,169,81,.4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--gold);flex-shrink:0}
.sb-nav{flex:1;overflow-y:auto;padding:10px 0}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{display:flex;align-items:center;gap:12px;padding:0 24px;height:56px;border-bottom:1px solid var(--bd);background:#fff;flex-shrink:0}
.mob-ham{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px}
.mob-ham span{display:block;width:20px;height:2px;background:var(--ink);border-radius:2px}
.tb-title{font-size:15px;font-weight:700;color:var(--ink)}
.tb-crumb{font-size:10px;color:var(--muted)}
.tb-crumb a{color:var(--muted);text-decoration:none}
.page{flex:1;overflow-y:auto;padding:24px;background:var(--cream2)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Outfit','Noto Sans JP',sans-serif;transition:.15s;border:none}
.btn-primary{background:var(--navy);color:#fff}
.btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--bd)}
.btn-em{background:var(--em);color:#fff}
.btn-gold{background:var(--gold);color:var(--navy);font-weight:700}
.btn-sm{padding:5px 12px;font-size:11px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;font-family:'Outfit',sans-serif}
.b-em{background:var(--em-bg);color:var(--em)}
.b-rd{background:var(--rd-bg);color:var(--rd)}
.b-am{background:var(--am-bg);color:var(--am)}
.b-sk{background:var(--sk-bg);color:var(--sk)}
.b-vt{background:var(--vt-bg);color:var(--vt)}
.b-nt{background:var(--nt-bg);color:var(--nt)}
.b-gold{background:var(--gold-dim);color:#92610A}
/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.kpi-card{background:#fff;border:1px solid var(--bd);border-radius:var(--r);padding:16px;box-shadow:var(--sh);text-align:center}
.kpi-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.kpi-val{font-size:24px;font-weight:300;color:var(--ink);font-variant-numeric:tabular-nums}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:4px}
/* テーブル */
.sec{background:#fff;border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.sec-head{padding:13px 18px;border-bottom:1px solid var(--bd);background:var(--cream2);display:flex;align-items:center;justify-content:space-between}
.sec-title{font-size:12px;font-weight:700;color:var(--ink);text-transform:uppercase;letter-spacing:.5px}
.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:10px 14px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--bd);text-align:left;background:var(--cream2);white-space:nowrap}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--bd);font-size:12px;color:var(--ink);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(13,26,45,.02)}
.mono{font-family:'DM Mono',monospace;font-size:10px;color:var(--faint)}
/* フィルタバー */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:12px 18px;border-bottom:1px solid var(--bd);background:#fff}
.filter-pill{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--bd);background:#fff;color:var(--muted);transition:.13s}
.filter-pill.active{background:var(--navy);color:#fff;border-color:var(--navy)}
/* ドロワー */
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200}
.drawer-overlay.show{display:block}
.drawer{position:fixed;right:-480px;top:0;bottom:0;width:460px;background:#fff;z-index:201;
  box-shadow:-4px 0 24px rgba(0,0,0,.15);transition:.25s;overflow-y:auto;display:flex;flex-direction:column}
.drawer.open{right:0}
.drawer-head{padding:18px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--cream2)}
.drawer-body{padding:20px;flex:1}
.d-section{margin-bottom:20px}
.d-section-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.d-row{display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px solid var(--bd)}
.d-row:last-child{border-bottom:none}
.d-label{color:var(--muted)}
.d-val{font-weight:600;text-align:right;max-width:60%}
.d-motivation{font-size:12px;color:var(--ink);line-height:1.8;background:var(--cream2);border-radius:8px;padding:12px 14px;border:1px solid var(--bd)}
/* ステータス更新 */
.status-sel{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.status-card{border:1.5px solid var(--bd);border-radius:8px;padding:10px;cursor:pointer;text-align:center;font-size:11px;font-weight:700;transition:.13s}
.status-card:hover{border-color:var(--navy)}
.status-card.sel{border-color:var(--navy);background:rgba(13,26,45,.04)}
/* モバイル */
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
@media(max-width:900px){
  .mob-ham{display:flex}
  .sb{position:fixed;left:-100%;top:0;bottom:0;z-index:100;transition:.25s}
  .sb.open{left:0}
  .mob-overlay.show{display:block}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .drawer{width:100%}
}
</style>
</head>
<body>

  <div class="sb-head">
    <div class="sb-logo">CORE<br>BLDG</div>

  </div>

    <div style="margin-left:auto;display:flex;gap:8px">

        📋 応募フォームを開く
      </button>
    </div>
  </div>

  <div class="page">
    <!-- KPI -->
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">総応募数</div>

        <div class="kpi-sub">累計</div>
      </div>
      <div class="kpi-card" style="border-color:rgba(217,119,6,.2)">
        <div class="kpi-label">新着（未対応）</div>
        <div class="kpi-val" id="kpi-new" style="color:var(--am)">—</div>
        <div class="kpi-sub">要確認</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">面接調整中</div>
        <div class="kpi-val" id="kpi-interview">—</div>
        <div class="kpi-sub"></div>
      </div>
      <div class="kpi-card" style="border-color:rgba(5,150,105,.2)">
        <div class="kpi-label">合格・招待済み</div>
        <div class="kpi-val" id="kpi-passed" style="color:var(--em)">—</div>
        <div class="kpi-sub"></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">不採用</div>
        <div class="kpi-val" id="kpi-ng" style="color:var(--muted)">—</div>
        <div class="kpi-sub"></div>
      </div>
    </div>

    <!-- テーブル -->
    <div class="sec">
      <div class="sec-head">
        <div class="sec-title">📋 応募者リスト</div>
        <div style="display:flex;gap:8px;align-items:center">
          <input id="search-input" placeholder="氏名・電話番号で検索" oninput="filterList()"
            style="font-size:12px;padding:6px 12px;border:1.5px solid var(--bd);border-radius:7px;
              font-family:'Outfit','Noto Sans JP',sans-serif;outline:none;width:180px">
          <button class="btn btn-ghost btn-sm" onclick="exportCsv()">📤 CSV</button>
        </div>
      </div>
      <!-- フィルタ -->
      <div class="filter-bar">
        <span style="font-size:11px;color:var(--muted);font-weight:700">種別:</span>
        <div class="filter-pill active" data-filter="role" data-val="all" onclick="setFilter('role','all',this)">すべて</div>
        <div class="filter-pill" data-filter="role" data-val="ag-re" onclick="setFilter('role','ag-re',this)">不動産AG</div>
        <div class="filter-pill" data-filter="role" data-val="ag-hr" onclick="setFilter('role','ag-hr',this)">人材AG</div>
        
        <div class="filter-pill" data-filter="role" data-val="pt" onclick="setFilter('role','pt',this)">PT</div>
        <span style="font-size:11px;color:var(--muted);font-weight:700;margin-left:8px">ステータス:</span>
        <div class="filter-pill active" data-filter="status" data-val="all" onclick="setFilter('status','all',this)">すべて</div>
        <div class="filter-pill" data-filter="status" data-val="new" onclick="setFilter('status','new',this)">新着</div>
        <div class="filter-pill" data-filter="status" data-val="interview" onclick="setFilter('status','interview',this)">面接中</div>
        <div class="filter-pill" data-filter="status" data-val="passed" onclick="setFilter('status','passed',this)">合格</div>
        <div class="filter-pill" data-filter="status" data-val="ng" onclick="setFilter('status','ng',this)">不採用</div>
      </div>
      <div style="overflow-x:auto">
        <table class="tbl">
          <thead>
            <tr>
              <th>応募ID</th><th>応募日</th><th>氏名</th><th>種別</th>
              <th>宅建</th><th>経験</th><th>居住地</th><th>担当</th><th>ステータス</th><th>操作</th>
            </tr>
          </thead>
          <tbody id="applicant-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

      </div>
      <div style="margin-bottom:14px">
        <label style="font-size:11px;font-weight:700;color:var(--muted);display:block;margin-bottom:6px">

        <textarea id="mail-body" class="form-input" style="min-height:220px;font-size:12px;line-height:1.9"></textarea>
      </div>
      <!-- 入会リンク -->
      <div style="background:var(--cream2);border:1px solid var(--bd);border-radius:8px;
        padding:12px 14px;margin-bottom:18px">
        <div style="font-size:10px;font-weight:700;color:var(--muted);margin-bottom:6px;
          text-transform:uppercase;letter-spacing:.5px">メールに含まれる入会リンク</div>
        <div id="mail-invite-url" style="font-family:'DM Mono',monospace;font-size:11px;color:var(--sk);
          word-break:break-all;line-height:1.6"></div>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost" style="flex:1" onclick="closeMailModal()">キャンセル</button>
        <button class="btn btn-em" style="flex:1" onclick="sendInviteMail()">✅ 送信する（デモ）</button>
      </div>
      <div style="font-size:10px;color:var(--faint);text-align:center;margin-top:10px">
        ※ デモ環境のため実際のメール送信は行いません。本番ではSendGrid / AWS SESと連携します。
      </div>
    </div>
  </div>
</div>

<!-- ドロワー -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="detail-drawer">

      <div id="drawer-name" style="font-size:14px;font-weight:700;color:var(--ink)">—</div>
      <div id="drawer-id" style="font-size:10px;font-family:'DM Mono',monospace;color:var(--muted)">—</div>

</div>

function toggleSb(){ document.querySelector('.sb').classList.toggle('open'); document.querySelector('.mob-overlay')?.classList.toggle('show'); }
function showToast(msg,type){
  const t=document.getElementById('ap-toast');
  t.textContent=msg; t.style.background=type==='err'?'var(--rd)':type==='warn'?'var(--am)':'var(--navy)';
  t.style.opacity='1'; t.style.transform='translateX(-50%) translateY(0)';
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(10px)';},3000);
}

// ── KPI更新 ───────────────────────────────────────────────
function updateKPI() {
  document.getElementById('kpi-total').textContent     = APPLICANTS.length;
  document.getElementById('kpi-new').textContent       = APPLICANTS.filter(a=>a.status==='new').length;
  document.getElementById('kpi-interview').textContent = APPLICANTS.filter(a=>a.status==='interview').length;
  document.getElementById('kpi-passed').textContent    = APPLICANTS.filter(a=>a.status==='passed').length;
  document.getElementById('kpi-ng').textContent        = APPLICANTS.filter(a=>a.status==='ng').length;
}

// ── リスト描画 ────────────────────────────────────────────
function renderList() {
  const list = APPLICANTS.filter(a => {
    if (filters.role   !== 'all' && a.role   !== filters.role)   return false;
    if (filters.status !== 'all' && a.status !== filters.status) return false;
    if (searchQ && !`${a.lastName}${a.firstName}${a.phone}`.includes(searchQ)) return false;
    return true;
  });

  const tbody = document.getElementById('applicant-tbody');
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:28px;color:var(--muted)">
      該当する応募者がいません</td></tr>`;
    return;
  }

  tbody.innerHTML = list.map(a => {
    const st = STATUS_DEF[a.status] || STATUS_DEF.new;
    return `<tr>
      <td class="mono">${a.id}</td>
      <td style="color:var(--muted);font-size:11px">${a.date}</td>
      <td style="font-weight:600">${a.lastName} ${a.firstName}
        <div style="font-size:10px;color:var(--muted);font-family:'DM Mono',monospace">
          ${a.lastKana} ${a.firstKana}</div></td>
      <td><span class="badge b-gold" style="font-size:9px">${ROLE_LABEL[a.role]||a.role}</span></td>
      <td style="text-align:center">${a.takken==='yes'?'<span class="badge b-em" style="font-size:9px">あり</span>':a.takken==='n/a'?'<span style="color:var(--faint);font-size:10px">—</span>':'<span style="color:var(--faint);font-size:10px">なし</span>'}</td>
      <td style="font-size:11px;color:var(--muted)">${a.expRe||'—'}</td>
      <td style="font-size:11px">${a.pref}</td>
      <td style="font-size:11px">${a.mentor?(HQ_MEMBERS.find(m=>m.id===a.mentor)?.name||'—'):'<span style="color:var(--faint)">未割当</span>'}</td>
      <td><span class="badge ${st.cls}">${st.label}</span></td>
      <td><button class="btn btn-ghost btn-sm" onclick="openDrawer('${a.id}')">詳細</button></td>
    </tr>`;
  }).join('');
}

// ── フィルタ操作 ──────────────────────────────────────────
function setFilter(type, val, el) {
  filters[type] = val;
  document.querySelectorAll(`[data-filter="${type}"]`).forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  renderList();
}
function filterList() {
  searchQ = document.getElementById('search-input').value.trim();
  renderList();
}

// ── ドロワー ──────────────────────────────────────────────
function openDrawer(id) {
  const a = APPLICANTS.find(x=>x.id===id);
  if (!a) return;
  document.getElementById('drawer-name').textContent = `${a.lastName} ${a.firstName}`;
  document.getElementById('drawer-id').textContent   = a.id;

  const st = STATUS_DEF[a.status] || STATUS_DEF.new;
  const row = (l,v) => `<div class="d-row"><span class="d-label">${l}</span><span class="d-val">${v}</span></div>`;

  document.getElementById('drawer-body').innerHTML = `
    <div class="d-section">
      <div class="d-section-title">基本情報</div>
      ${row('応募日', a.date)}
      <div class="d-row" style="align-items:center">
        <span class="d-label">担当メンター</span>
        <div style="display:flex;align-items:center;gap:6px">
          <span id="mentor-label-${a.id}" style="font-size:12px;font-weight:600">
            ${a.mentor ? (HQ_MEMBERS.find(m=>m.id===a.mentor)?.name||'—') : '<span style="color:var(--faint)">未割当</span>'}
          </span>
          <select id="mentor-sel-${a.id}" class="form-input" style="font-size:11px;padding:4px 8px;
            border-radius:6px;width:auto;min-width:120px"
            onchange="assignMentor('${a.id}',this.value)">
            <option value="">── 選択 ──</option>
            ${HQ_MEMBERS.map(m=>`<option value="${m.id}"${a.mentor===m.id?' selected':''}>${m.name}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="d-row" style="align-items:center">
        <span class="d-label">応募職種</span>
        <div style="display:flex;align-items:center;gap:6px">
          <span id="role-badge-${a.id}" class="badge b-gold" style="font-size:9px">${ROLE_LABEL[a.role]||a.role}</span>
          <button class="btn btn-ghost btn-sm" style="padding:3px 10px;font-size:10px"
            onclick="toggleRoleEdit('${a.id}')">✏️ 変更</button>
        </div>
      </div>
      <div id="role-edit-${a.id}" style="display:none;padding:10px 0 4px">
        <div style="font-size:10px;color:var(--muted);margin-bottom:8px;font-weight:700">変更後の職種を選択</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">
          ${Object.entries(ROLE_LABEL).map(([k,v])=>`
            <div class="role-choice-card ${a.role===k?'selected':''}" data-role="${k}"
              onclick="selectRoleChange('${a.id}','${k}',this)"
              style="border:1.5px solid ${a.role===k?'var(--navy)':'var(--bd)'};border-radius:8px;
                padding:10px;cursor:pointer;text-align:center;font-size:11px;font-weight:700;
                background:${a.role===k?'rgba(13,26,45,.05)':'#fff'};transition:.13s">
              ${{  'ag-re':'🏠 不動産AG','ag-hr':'👤 人材AG','pt':'🌐 PT' }[k]||v}
            </div>`).join('')}
        </div>
        <div style="display:flex;gap:8px;margin-top:10px">
          <button class="btn btn-ghost btn-sm" style="flex:1" onclick="toggleRoleEdit('${a.id}')">キャンセル</button>
          <button class="btn btn-primary btn-sm" style="flex:1" onclick="applyRoleChange('${a.id}')">変更を保存</button>
        </div>
      </div>
      ${row('電話番号', a.phone)}
      ${row('メール', `<a href="mailto:${a.email}" style="color:var(--sk)">${a.email}</a>`)}
      ${row('居住地', a.pref)}
      ${a.area ? row('希望エリア', a.area) : ''}
      ${a.referral ? row('紹介コード', `<span style="font-family:'DM Mono',monospace">${a.referral}</span>`) : ''}
    </div>

    <div class="d-section">
      <div class="d-section-title">資格・経験</div>
      ${a.takken!=='n/a' ? row('宅建士', a.takken==='yes' ? `あり（${a.takkenPref} ${a.takkenNo}）` : 'なし') : ''}
      ${a.expRe ? row('不動産経験', a.expRe) : ''}
      ${a.expHr ? row('人材経験', a.expHr) : ''}
      ${a.expSales ? row('営業経験', a.expSales) : ''}
      ${a.ptEntity ? row('法人/個人', a.ptEntity==='corporate'?`法人（${a.companyName}）`:'個人') : ''}
    </div>

    <div class="d-section">
      <div class="d-section-title">志望動機</div>
      <div class="d-motivation">${a.motivation.replace(/\n/g,'<br>')}</div>
    </div>

    <div class="d-section">
      <div class="d-section-title">ステータス変更</div>
      <div class="status-sel">
        ${Object.entries(STATUS_DEF).map(([k,v])=>`
          <div class="status-card ${a.status===k?'sel':''}" onclick="changeStatus('${a.id}','${k}',this)">
            <span class="badge ${v.cls}">${v.label}</span>
          </div>`).join('')}
      </div>
      ${a.status==='passed' ? `
        <div style="margin-top:8px">
          ${a.inviteSent
            ? `<div style="background:var(--em-bg);border:1px solid rgba(5,150,105,.2);border-radius:8px;
                padding:10px 14px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--em)">
                ✅ 入会案内メール送信済み
              </div>`
            : `<button class="btn btn-gold" style="width:100%" onclick="openMailModal('${a.id}')">
                📧 入会案内メールを送信する →
              </button>`}
        </div>` : ''}
    </div>`;

  document.getElementById('detail-drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('show');
}

function closeDrawer() {
  document.getElementById('detail-drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('show');
}

function toggleRoleEdit(id) {
  const el = document.getElementById(`role-edit-${id}`);
  if (!el) return;
  el.style.display = el.style.display === 'none' ? '' : 'none';
}

let _pendingRole = {};
function selectRoleChange(id, role, el) {
  _pendingRole[id] = role;
  const wrap = document.getElementById(`role-edit-${id}`);
  wrap.querySelectorAll('.role-choice-card').forEach(c => {
    const isSelected = c.dataset.role === role;
    c.style.borderColor  = isSelected ? 'var(--navy)' : 'var(--bd)';
    c.style.background   = isSelected ? 'rgba(13,26,45,.05)' : '#fff';
  });
}

function applyRoleChange(id) {
  const newRole = _pendingRole[id];
  if (!newRole) { showToast('⚠️ 職種を選択してください','warn'); return; }
  const a = APPLICANTS.find(x => x.id === id);
  if (!a) return;
  const oldLabel = ROLE_LABEL[a.role] || a.role;
  a.role = newRole;
  // バッジ更新
  const badge = document.getElementById(`role-badge-${id}`);
  if (badge) badge.textContent = ROLE_LABEL[newRole] || newRole;
  // 編集UI閉じる
  toggleRoleEdit(id);
  // テーブル再描画
  renderList();
  showToast(`✅ 職種を「${oldLabel}」→「${ROLE_LABEL[newRole]}」に変更しました`);
  delete _pendingRole[id];
}

function changeStatus(id, newStatus, el) {
  const a = APPLICANTS.find(x=>x.id===id);
  if (!a) return;
  a.status = newStatus;
  document.querySelectorAll('.status-card').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
  updateKPI(); renderList();
  showToast(`✅ ステータスを「${STATUS_DEF[newStatus].label}」に変更しました`);

  // 合格に変更したらドロワーを再描画してメール送信ボタンを表示
  if (newStatus === 'passed') {
    openDrawer(id);
  }
}

// ── メンター割当 ──────────────────────────────────────────
function assignMentor(id, mentorId) {
  const a = APPLICANTS.find(x=>x.id===id);
  if (!a) return;
  a.mentor = mentorId;
  const label = document.getElementById(`mentor-label-${id}`);
  if (label) {
    const name = HQ_MEMBERS.find(m=>m.id===mentorId)?.name || '未割当';
    label.innerHTML = mentorId
      ? `<span style="font-weight:600">${name}</span>`
      : `<span style="color:var(--faint)">未割当</span>`;
  }
  renderList();
  if (mentorId) showToast(`✅ 担当を「${HQ_MEMBERS.find(m=>m.id===mentorId)?.name}」に割り当てました`);
}

// ── 入会案内メール送信モーダル ────────────────────────────
let _mailTargetId = null;

function openMailModal(id) {
  const a = APPLICANTS.find(x=>x.id===id);
  if (!a) return;
  _mailTargetId = id;

  const roleLabel = { 'ag-re':'不動産エージェント（RE）','ag-hr':'人材エージェント（HR）','pt':'パートナー（PT）' }[a.role]||a.role;
  const signupFile = a.role==='pt' ? 'coreto-partner-signup-v2.html' : 'coreto-agent-signup-v2.html';
  const token = btoa(JSON.stringify({ id:a.id, role:a.role, name:a.lastName+a.firstName, exp: Date.now()+7*24*60*60*1000 }));
  const inviteUrl = `${location.origin}${location.pathname.replace(/[^/]*$/,'')}${signupFile}?token=${token}`;
  const mentorName = a.mentor ? (HQ_MEMBERS.find(m=>m.id===a.mentor)?.name || 'CORETO担当者') : 'CORETO担当者';

  document.getElementById('mail-modal-sub').textContent = `${a.lastName} ${a.firstName} 様 / ${roleLabel}`;
  document.getElementById('mail-to').textContent = a.email;
  document.getElementById('mail-invite-url').textContent = inviteUrl;
  document.getElementById('mail-subject').value = '【CORETO】入会手続きのご案内';
  document.getElementById('mail-body').value =
`${a.lastName} ${a.firstName} 様

このたびは株式会社CORETOへのご応募いただきありがとうございます。
審査の結果、${roleLabel}として入会をご案内させていただく運びとなりました。

下記のリンクより入会手続きを進めてください。
リンクの有効期限は7日間です。

━━━━━━━━━━━━━━━━━━━━━━
▼ 入会申込フォーム（${roleLabel}）
${inviteUrl}
━━━━━━━━━━━━━━━━━━━━━━

入会手続きでご不明な点がございましたら、
担当の ${mentorName} までお気軽にご連絡ください。

今後ともよろしくお願いいたします。

───────────────
株式会社CORETO
COREBLDG運営事務局
https://coreto.jp
───────────────`;

  const overlay = document.getElementById('mail-modal-overlay');
  overlay.style.display = 'flex';
}

function closeMailModal() {
  document.getElementById('mail-modal-overlay').style.display = 'none';
  _mailTargetId = null;
}

function sendInviteMail() {
  if (!_mailTargetId) return;
  const a = APPLICANTS.find(x=>x.id===_mailTargetId);
  if (!a) return;

  // デモ: コンソールにログ出力（本番: SendGrid / AWS SES API呼び出し）
  console.log('[CORETO] 入会案内メール送信:', {
    to: a.email,
    subject: document.getElementById('mail-subject').value,
    body: document.getElementById('mail-body').value,
  });

  a.inviteSent = true;
  closeMailModal();
  showToast('📧 入会案内メールを送信しました（デモ）');

  // ドロワーを再描画
  openDrawer(_mailTargetId);
  _mailTargetId = null;
}

// ── CSV出力 ───────────────────────────────────────────────
function exportCsv() {
  const header = '応募ID,応募日,姓,名,姓カナ,名カナ,電話,メール,種別,宅建,経験,居住地,担当,ステータス,メール送信\n';
  const rows = APPLICANTS.map(a =>
    [a.id,a.date,a.lastName,a.firstName,a.lastKana,a.firstKana,a.phone,a.email,
     ROLE_LABEL[a.role]||a.role, a.takken==='yes'?'あり':'なし',
     a.expRe||'—',a.pref,
     a.mentor?(HQ_MEMBERS.find(m=>m.id===a.mentor)?.name||'—'):'未割当',
     STATUS_DEF[a.status]?.label||a.status,
     a.inviteSent?'送信済み':'未送信'].join(',')
  ).join('\n');
  const blob = new Blob(['\uFEFF'+header+rows],{type:'text/csv'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `CORETO_applicants_${new Date().toISOString().slice(0,10)}.csv`;
  link.click();
  showToast('📤 CSVをダウンロードしました');
}

function copyApplyUrl() {
  const url = location.href.replace('coreto-applicants-v2.html','coreto-apply-v2.html');
  navigator.clipboard.writeText(url).then(() => showToast('🔗 応募URLをコピーしました'));
}

window.addEventListener('DOMContentLoaded', () => {
  // Fix 2: apply-v2から保存された応募データをlocalStorageから読み込み
  try {
    const saved = JSON.parse(localStorage.getItem('CORETO_APPLICANTS') || '[]');
    if (saved.length > 0) {
      // 既存デモデータのIDと重複しないものだけ追加
      const existingIds = new Set(APPLICANTS.map(a => a.id));
      saved.forEach(a => { if (!existingIds.has(a.id)) APPLICANTS.unshift(a); });
    }
  } catch(e) {}
  updateKPI();
  renderList();
  CNAV.init('applicants');
});
</script>
