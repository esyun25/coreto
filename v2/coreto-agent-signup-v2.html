<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>エージェント入会申込 — CORETO</title>
<link rel="stylesheet" href="coreto-design-system.css">
<link rel="stylesheet" href="design-system.css">
<style>
/* ── リセット ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;-webkit-text-size-adjust:100%}
body{font-family:'Outfit','Noto Sans JP',sans-serif;background:#F0F2F5;color:#202124;min-height:100vh}

/* ── カラー変数 ── */
:root{
  --sh2:0 4px 12px rgba(60,64,67,.12),0 2px 6px rgba(60,64,67,.08);
}

/* ── レイアウト ── */
.wrap{max-width:680px;margin:0 auto;padding:24px 16px 80px}

/* ── ヘッダー ── */
.signup-header{text-align:center;padding:32px 0 28px}
.signup-logo{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;
  letter-spacing:3px;color:var(--navy)}
.signup-subtitle{font-size:11px;font-weight:600;letter-spacing:2px;color:var(--gold);
  text-transform:uppercase;margin-top:4px}
.signup-title{font-size:20px;font-weight:700;color:var(--ink);margin-top:16px}
.signup-desc{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.7}

/* ── ステップバー ── */
.step-bar{display:flex;align-items:center;gap:0;margin-bottom:28px;
  background:#fff;border-radius:12px;padding:16px;box-shadow:var(--sh);overflow-x:auto}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:5px;min-width:56px;flex:1}
.sb-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:700;border:2px solid var(--bd);
  background:#fff;color:var(--faint);transition:.2s;flex-shrink:0}
.sb-num.done{background:var(--em);border-color:var(--em);color:#fff}
.sb-num.active{background:var(--navy);border-color:var(--navy);color:var(--gold);
  box-shadow:0 0 0 4px rgba(13,26,45,.1)}
.sb-lbl{font-size:8px;font-weight:600;color:var(--faint);text-align:center;
  white-space:nowrap;line-height:1.3}
.sb-lbl.active{color:var(--navy);font-weight:700}
.sb-arrow{width:16px;height:2px;background:var(--bd2);flex-shrink:0;margin-bottom:18px}
.sb-arrow.done{background:var(--em)}

/* ── カード ── */
.card{background:#fff;border-radius:12px;padding:24px;box-shadow:var(--sh);margin-bottom:16px}
.card-step{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--gold);
  text-transform:uppercase;margin-bottom:6px}
.card-title{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:4px}
.card-desc{font-size:11px;color:var(--muted);margin-bottom:20px;line-height:1.7}

/* ── フォーム要素 ── */
.field{margin-bottom:16px}
.field:last-child{margin-bottom:0}
label{display:block;font-size:10px;font-weight:700;color:var(--muted);
  letter-spacing:.5px;margin-bottom:5px}
label .req{color:var(--rd);margin-left:2px}
label .opt{color:var(--faint);font-weight:400;margin-left:4px}
input[type=text],input[type=email],input[type=tel],input[type=date],
input[type=password],input[type=number],select,textarea{
  width:100%;padding:10px 12px;border:1.5px solid var(--bd);border-radius:8px;
  font-family:'Outfit','Noto Sans JP',sans-serif;font-size:13px;color:var(--ink);
  background:#fff;transition:.15s;outline:none;
  -webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--navy);
  box-shadow:0 0 0 3px rgba(13,26,45,.08)}
input.error,select.error,textarea.error{border-color:var(--rd)!important}
.field-hint{font-size:10px;color:var(--faint);margin-top:4px;line-height:1.6}
.field-err{font-size:10px;color:var(--rd);margin-top:4px;display:none}
.field-err.show{display:block}
textarea{resize:vertical;min-height:80px;line-height:1.7}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:500px){.row2,.row3{grid-template-columns:1fr}}

/* ── ラジオ・チェック ── */
.radio-group,.check-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.radio-btn{flex:1;min-width:100px}
.radio-btn input{display:none}
.radio-btn label{display:flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 14px;border:1.5px solid var(--bd);border-radius:8px;cursor:pointer;
  font-size:12px;font-weight:500;color:var(--muted);transition:.15s;letter-spacing:0}
.radio-btn input:checked + label{border-color:var(--navy);background:rgba(13,26,45,.04);
  color:var(--navy);font-weight:700}

/* ── ファイルアップロード ── */
.upload-box{border:2px dashed var(--bd2);border-radius:10px;padding:24px;
  text-align:center;cursor:pointer;transition:.15s;background:var(--em-bg,#F9FAFB)}
.upload-box:hover{border-color:var(--gold)}
.upload-box.uploaded{border-color:var(--em);border-style:solid;background:var(--em-bg)}
.upload-box input{display:none}

/* ── OTP入力 ── */
.otp-row{display:flex;gap:8px;justify-content:center;margin:16px 0}
.otp-cell{width:44px;height:52px;border:1.5px solid var(--bd);border-radius:8px;
  text-align:center;font-size:20px;font-weight:700;font-family:'DM Mono',monospace;
  outline:none;transition:.15s;color:var(--navy)}
.otp-cell:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(13,26,45,.08)}
.otp-timer{font-size:11px;color:var(--muted);text-align:center;margin-top:6px}
.otp-timer.urgent{color:var(--rd);font-weight:700}

/* ── バナー ── */
.banner{border-radius:8px;padding:12px 14px;font-size:11px;line-height:1.7;margin-bottom:16px;
  display:flex;gap:10px}
.banner-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.banner.info{background:#EFF6FF;border:1px solid #BFDBFE;color:#1E40AF}
.banner.warn{background:var(--am-bg);border:1px solid rgba(217,119,6,.25);color:var(--am)}
.banner.success{background:var(--em-bg);border:1px solid rgba(5,150,105,.2);color:var(--em)}
.banner.danger{background:var(--rd-bg);border:1px solid rgba(220,38,38,.2);color:var(--rd)}

/* ── ボタン ── */
.btn-row{display:flex;gap:10px;margin-top:24px}
.btn{padding:11px 20px;border-radius:8px;font-family:'Outfit',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;transition:.15s;border:none;outline:none}
.btn-primary{background:var(--navy);color:#fff;flex:1}
.btn-primary:hover{background:var(--navy-l)}
.btn-primary:disabled{opacity:.45;cursor:not-allowed}
.btn-ghost{background:transparent;border:1.5px solid var(--bd);color:var(--muted)}
.btn-ghost:hover{border-color:var(--bd2);color:var(--ink)}

/* ── トークンゲート ── */
.gate-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px;background:linear-gradient(135deg,var(--navy) 0%,var(--navy-l) 100%)}
.gate-card{background:#fff;border-radius:16px;padding:36px;max-width:420px;width:100%;
  text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.gate-logo{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;
  color:var(--navy);letter-spacing:3px;margin-bottom:4px}
.gate-sub{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--gold);
  text-transform:uppercase;margin-bottom:20px}

/* ── 確認ページ ── */
.confirm-row{display:flex;justify-content:space-between;padding:9px 0;
  border-bottom:1px solid var(--bd);font-size:12px}
.confirm-row:last-child{border-bottom:none}
.confirm-key{color:var(--muted);flex-shrink:0;min-width:120px}
.confirm-val{color:var(--ink);font-weight:600;text-align:right}

/* ── 完了ページ ── */
.complete-wrap{text-align:center;padding:40px 20px}
.complete-icon{font-size:60px;margin-bottom:16px}
.complete-title{font-size:22px;font-weight:700;color:var(--navy);margin-bottom:8px}
.complete-msg{font-size:12px;color:var(--muted);line-height:2;max-width:380px;margin:0 auto}

/* ── progress bar ── */
.prog-bar{height:3px;background:var(--bd);border-radius:2px;margin-bottom:24px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--navy),var(--gold));
  border-radius:2px;transition:.4s ease}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-size:12px;
  font-weight:600;opacity:0;transition:.3s;z-index:999;pointer-events:none;white-space:nowrap}

@media(max-width:480px){
  .wrap{padding:16px 12px 60px}
  .card{padding:18px}
  .btn-row{flex-direction:column-reverse}
  .btn{width:100%}
}
</style>
</head>
<body>
<script>
(function(){
  var _role = sessionStorage.getItem('coreto_role') || '';
  var _allowed = ["hq"];
  if (_allowed.length && !_allowed.includes(_role)) {
    location.replace('coreto-hub-v2.html?unauthorized=1');
  }
})();
</script>


<!-- ── トークンゲート ── -->
<div id="gate-screen" class="gate-wrap">
  <div class="gate-card">
    <div class="gate-logo">CORETO</div>
    <div class="gate-sub">Agent Sign Up</div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:20px;line-height:1.8">
      このページは面接合格者向けの招待制ページです。<br>
      SMSで受け取った招待コードを入力してください。
    </p>
    <div class="field" style="text-align:left">
      <label>招待コード <span class="req">*</span></label>
      <input type="text" id="gate-token" placeholder="例：CORETO-XXXX-XXXX"
        style="text-transform:uppercase;font-family:'DM Mono',monospace;letter-spacing:2px"
        oninput="this.value=this.value.toUpperCase()">
      <div class="field-err" id="gate-err">招待コードが正しくありません</div>
    </div>
    <button class="btn btn-primary" onclick="checkToken()" style="width:100%;margin-top:16px">
      入会手続きを始める →
    </button>
    <p style="font-size:10px;color:var(--faint);margin-top:16px">
      招待コードをお持ちでない方は<br>
      <a href="mailto:info@coreto.jp" style="color:var(--navy)">info@coreto.jp</a> までお問い合わせください
    </p>
  </div>
</div>

<!-- ── メインフォーム ── -->
<div id="main-screen" style="display:none">
<div class="wrap">
  <div class="signup-header">
    <div class="signup-logo">CORETO</div>
    <div class="signup-subtitle">Agent Sign Up</div>
    <div class="signup-title">エージェント入会申込</div>
    <div class="signup-desc">
      全8ステップで入会手続きを完了してください。<br>
      途中保存はできません。一度に完了させてください（目安：約10分）
    </div>
  </div>

  <!-- ステップバー -->
  <div class="step-bar" id="step-bar"></div>

  <!-- プログレスバー -->
  <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>

  <!-- コンテンツエリア -->
  <div id="step-content"></div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// DEMO TOKENS (本番はKintone/DB照合)
// ═══════════════════════════════════════════════════════
const VALID_TOKENS = {

  
};

let tokenInfo = null;

function checkToken() {
  const val = document.getElementById('gate-token').value.trim();
  const err = document.getElementById('gate-err');
  // デモ: CORETO-????-???? 形式なら通す
  const valid = VALID_TOKENS[val] || (val.startsWith('CORETO-') && val.length >= 12);
  if (!valid) {
    err.classList.add('show');
    document.getElementById('gate-token').classList.add('error');
    return;
  }
  tokenInfo = VALID_TOKENS[val] || {
    type: val.includes('HIKARI') ? 'hikari' : val.includes('HR') ? 'hr' : 're',
    name: ''
  };
  document.getElementById('gate-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  initForm();
}

// ═══════════════════════════════════════════════════════
// フォーム状態
// ═══════════════════════════════════════════════════════
let STEP = 1;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 残-8: 途中離脱データ自動保存
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const DRAFT_KEY = 'CORETO_SIGNUP_DRAFT';

// 残-11: インラインエラー表示ユーティリティ
function showFieldError(inputId, msg) {
  var el = document.getElementById(inputId);
  if (!el) return;
  el.classList.add('input-error');
  var err = el.nextElementSibling;
  if (!err || !err.classList.contains('field-error')) {
    err = document.createElement('div');
    err.className = 'field-error';
    el.parentNode.insertBefore(err, el.nextSibling);
  }
  err.textContent = msg;
  err.style.display = 'block';
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function clearFieldError(inputId) {
  var el = document.getElementById(inputId);
  if (!el) return;
  el.classList.remove('input-error');
  var err = el.nextElementSibling;
  if (err && err.classList.contains('field-error')) err.style.display = 'none';
}

function clearAllErrors() {
  document.querySelectorAll('.input-error').forEach(function(el) { el.classList.remove('input-error'); });
  document.querySelectorAll('.field-error').forEach(function(el) { el.style.display = 'none'; });
}



function saveDraft() {
  try {
    const draft = Object.assign({}, DATA, { step: STEP, savedAt: new Date().toISOString() });
    localStorage.setItem(DRAFT_KEY, JSON.stringify(draft));
  } catch(e) {}
}

function loadDraft() {
  try {
    const saved = localStorage.getItem(DRAFT_KEY);
    if (!saved) return false;
    const draft = JSON.parse(saved);
    // 24時間以内の下書きのみ復元
    if (new Date() - new Date(draft.savedAt) > 86400000) {
      localStorage.removeItem(DRAFT_KEY);
      return false;
    }
    Object.assign(DATA, draft);
    return draft.step || 1;
  } catch(e) { return false; }
}

function clearDraft() {
  localStorage.removeItem(DRAFT_KEY);
}

let DATA = {
  type: '',           // 're' | 'hr' | 'hikari'
  lastName:'', firstName:'', lastKana:'', firstKana:'',
  dob:'', gender:'',
  postal:'', pref:'', city:'', addr:'', building:'',
  phone:'', email:'', emailConfirm:'',
  experience:'', area:'', motivation:'',
  referralCode:'',
  takken:'',          // 'あり'|'なし'
  takkenType:'',      // '専任'|'一般'
  takkenNo:'', takkenPref:'',
  idType:'', idFront:null, idBack:null, selfie:null,
  kycStatus:'pending',  // 'pending'|'analyzing'|'passed'|'failed'
  kycResult:null,
  bankCode:'', bankName:'', branchCode:'', branchName:'',
  accountType:'普通', accountNo:'', accountName:'',
  stripeCard: false,  // Stripe登録済みフラグ(デモ)
  lineLinked: false,
};

const STEPS = [
  { num:1, label:'基本情報' },
  { num:2, label:'資格確認' },
  { num:3, label:'SMS認証' },
  { num:4, label:'身分証' },
  { num:5, label:'口座登録' },
  { num:6, label:'決済情報' },
  { num:7, label:'LINE' },
  { num:8, label:'契約書確認' },
  { num:9, label:'確認・送信' },
];

function initForm() {
  DATA.type = tokenInfo.type;
  renderStepBar();

  // 残-8: 下書きがあれば復元してそのステップから再開
  const savedStep = loadDraft();
  if (savedStep && savedStep > 1) {
    // 復元バナーを表示
    var banner = document.createElement('div');
    banner.style.cssText = 'background:#FFFBEB;border:1px solid rgba(217,119,6,.25);border-radius:10px;padding:12px 16px;margin:0 0 16px;font-size:12px;font-family:Outfit,sans-serif;display:flex;align-items:center;justify-content:space-between;gap:12px';
    banner.innerHTML =
      '<span>📝 <strong>前回の入力内容</strong>を復元しました（STEP ' + savedStep + ' から再開）</span>' +
      '<div style="display:flex;gap:8px">' +
        '<button onclick="this.closest(\'[style*=FFFBEB]\').remove();renderStep(' + savedStep + ')" style="padding:5px 12px;background:#D97706;color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:Outfit,sans-serif">復元して再開</button>' +
        '<button onclick="clearDraft();this.closest(\'[style*=FFFBEB]\').remove()" style="padding:5px 10px;background:transparent;border:1px solid #E8EAED;border-radius:6px;font-size:11px;cursor:pointer;color:#5F6368;font-family:Outfit,sans-serif">最初から</button>' +
      '</div>';
    var formEl = document.getElementById('form-area') || document.querySelector('.wrap');
    if (formEl) formEl.insertBefore(banner, formEl.firstChild);
  }

  renderStep(1);
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast';
  if (type === 'warn') t.style.background = 'var(--am)';
  else t.style.background = 'var(--navy)';
  t.style.opacity = '1'; t.style.transform = 'translateX(-50%) translateY(0)';
  setTimeout(() => { t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(10px)'; }, 3000);
}

// ═══════════════════════════════════════════════════════
// ステップバー
// ═══════════════════════════════════════════════════════
function renderStepBar() {
  const total = STEPS.length;
  document.getElementById('step-bar').innerHTML = STEPS.map((s,i) => {
    const st = s.num < STEP ? 'done' : s.num === STEP ? 'active' : '';
    const arrow = i < total-1
      ? `<div class="sb-arrow ${s.num < STEP ? 'done' : ''}"></div>` : '';
    const icon = s.num < STEP ? '✓' : s.num;
    return `<div class="sb-item">
      <div class="sb-num ${st}">${icon}</div>
      <div class="sb-lbl ${st === 'active' ? 'active' : ''}">${s.label}</div>
    </div>${arrow}`;
  }).join('');
  // プログレス
  const pct = ((STEP-1) / (total-1) * 100).toFixed(1);
  document.getElementById('prog-fill').style.width = pct + '%';
}

function renderStep(n) {
  STEP = n;
  renderStepBar();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  const renders = [null, s1,s2,s3,s4,s5,s6,s7,s8,s9];
  renders[n]?.();
}

function next(n) { saveDraft(); renderStep(n || STEP+1); }
function back()  { renderStep(STEP-1); }

// ═══════════════════════════════════════════════════════
// STEP 1: 基本情報
// ═══════════════════════════════════════════════════════
function s1() {
  const isRE = DATA.type === 're';
  const isHikari = DATA.type === 'hikari';
  document.getElementById('step-content').innerHTML = `
  <div class="card">
    <div class="card-step">STEP 1 / 8</div>
    <div class="card-title">基本情報</div>
    <div class="card-desc">氏名・連絡先・経歴を入力してください</div>

    <div class="banner info"><div class="banner-icon">ℹ️</div><div>
      入会種別：<strong>${isRE ? '🏠 不動産エージェント（RE）' : isHikari ? '📡 光通信エージェント' : '👤 人材エージェント（HR）'}</strong><br>
      個人申込のみ対応しています（法人での入会はできません）
    </div></div>

    <div class="row2">
      <div class="field">
        <label>姓 <span class="req">*</span></label>
        <input type="text" id="f-lname" value="${DATA.lastName}" placeholder="山田">
      </div>
      <div class="field">
        <label>名 <span class="req">*</span></label>
        <input type="text" id="f-fname" value="${DATA.firstName}" placeholder="誠">
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>セイ <span class="req">*</span></label>
        <input type="text" id="f-lkana" value="${DATA.lastKana}" placeholder="ヤマダ">
      </div>
      <div class="field">
        <label>メイ <span class="req">*</span></label>
        <input type="text" id="f-fkana" value="${DATA.firstKana}" placeholder="マコト">
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>生年月日 <span class="req">*</span></label>
        <input type="date" id="f-dob" value="${DATA.dob}">
        <div class="field-hint">18歳以上の方のみ申込可能です</div>
      </div>
      <div class="field">
        <label>性別 <span class="opt">（任意）</span></label>
        <select id="f-gender">
          <option value="" ${!DATA.gender?'selected':''}>選択してください</option>
          <option value="男性" ${DATA.gender==='男性'?'selected':''}>男性</option>
          <option value="女性" ${DATA.gender==='女性'?'selected':''}>女性</option>

function validateS1() {
  const get = id => document.getElementById(id)?.value.trim() || '';
  const req = ['f-lname','f-fname','f-lkana','f-fkana','f-dob','f-postal','f-pref','f-city','f-phone','f-email','f-email2','f-exp','f-area','f-motivation'];
  let ok = true;
  req.forEach(id => {
    const el = document.getElementById(id);
    if (!el.value.trim()) { el.classList.add('error'); ok = false; }
    else el.classList.remove('error');
  });
  if (!ok) { showToast('⚠️ 必須項目を入力してください','warn'); return; }
  if (get('f-email') !== get('f-email2')) {
    document.getElementById('f-email2').classList.add('error');
    showToast('⚠️ メールアドレスが一致しません','warn'); return;
  }
  if (document.getElementById('f-motivation').value.length < 100) {
    document.getElementById('f-motivation').classList.add('error');
    showToast('⚠️ 志望動機は100文字以上入力してください','warn'); return;
  }
  // 年齢チェック
  const dob = new Date(get('f-dob'));
  const age = (Date.now() - dob) / (365.25*24*3600*1000);
  if (age < 18) { showToast('⚠️ 18歳未満の方はご応募いただけません','warn'); return; }
  // HR経験チェック（hikariは経験不問のためスキップ）
  if (DATA.type === 'hr' && get('f-exp').includes('未経験')) {
    showToast('⚠️ 人材業界経験1年以上が必須です','warn'); return;
  }

  Object.assign(DATA, {
    lastName: get('f-lname'), firstName: get('f-fname'),
    lastKana: get('f-lkana'), firstKana: get('f-fkana'),
    dob: get('f-dob'), gender: get('f-gender'),
    postal: get('f-postal'), pref: get('f-pref'),
    city: get('f-city'), building: get('f-bldg'),
    phone: get('f-phone'), email: get('f-email'), emailConfirm: get('f-email2'),
    experience: get('f-exp'), area: get('f-area'),
    motivation: document.getElementById('f-motivation').value.trim(),
    referralCode: get('f-ref'),
  });
  next();
}

let _otpCode = '', _otpTimer = null, _otpSec = 300;

function s3() {
  _otpCode = String(Math.floor(100000 + Math.random() * 900000));
  document.getElementById('step-content').innerHTML = `

    </div>

      【デモ用コード: <strong style="font-family:'DM Mono',monospace;letter-spacing:2px">${_otpCode}</strong>】<br>
      本番ではSMSで届きます（有効期限5分・最大3回再送可）
    </div></div>
    <div class="otp-row">
      ${[0,1,2,3,4,5].map(i=>`<input class="otp-cell" id="otp${i}" type="text"
        inputmode="numeric" maxlength="1"
        onkeydown="otpKey(event,${i})" oninput="otpIn(this,${i})">`).join('')}
    </div>
    <div class="otp-timer" id="otp-timer">残り 5:00</div>
    <div style="text-align:center;margin-top:12px">
      <button class="btn btn-ghost" id="resend-btn" onclick="resendOtp()"
        style="font-size:11px;padding:7px 16px" disabled>
        コードを再送する（残り3回）
      </button>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-ghost" onclick="back()">← 戻る</button>
    <button class="btn btn-primary" onclick="checkOtp()">認証して次へ</button>
  </div>`;

  startOtpTimer();
  setTimeout(() => document.getElementById('otp0')?.focus(), 100);
}

function startOtpTimer() {
  clearInterval(_otpTimer);
  _otpSec = 300;
  _otpTimer = setInterval(() => {
    _otpSec--;
    const m = Math.floor(_otpSec/60), s = _otpSec % 60;
    const el = document.getElementById('otp-timer');
    if (el) {
      el.textContent = `残り ${m}:${String(s).padStart(2,'0')}`;
      if (_otpSec <= 60) el.classList.add('urgent');
    }
    if (_otpSec <= 0) {
      clearInterval(_otpTimer);
      if (el) el.textContent = '有効期限が切れました。再送してください';
    }
    if (_otpSec === 240) { // 1分後に再送ボタン有効
      const btn = document.getElementById('resend-btn');
      if (btn) btn.disabled = false;
    }
  }, 1000);
}

let _resendCount = 3;
function resendOtp() {
  if (_resendCount <= 0) { showToast('⚠️ 再送上限に達しました','warn'); return; }
  _resendCount--;
  _otpCode = String(Math.floor(100000 + Math.random() * 900000));
  showToast(`📱 再送しました（残り${_resendCount}回）\nデモコード: ${_otpCode}`);
  document.getElementById('resend-btn').textContent = `コードを再送する（残り${_resendCount}回）`;
  if (_resendCount === 0) document.getElementById('resend-btn').disabled = true;
  startOtpTimer();
}

function otpIn(el, idx) {
  el.value = el.value.replace(/\D/g,'');
  el.className = 'otp-cell' + (el.value ? ' filled' : '');
  if (el.value && idx < 5) document.getElementById(`otp${idx+1}`)?.focus();
  if (idx === 5 && el.value) checkOtp();
}
function otpKey(e, idx) {
  if (e.key === 'Backspace' && !e.target.value && idx > 0)
    document.getElementById(`otp${idx-1}`)?.focus();
}
function checkOtp() {
  const entered = [0,1,2,3,4,5].map(i => document.getElementById(`otp${i}`)?.value || '').join('');
  if (entered.length < 6) { showToast('⚠️ 6桁のコードを入力してください','warn'); return; }
  if (entered !== _otpCode) { showToast('⚠️ コードが正しくありません','warn'); return; }
  clearInterval(_otpTimer);
  showToast('✅ SMS認証が完了しました');
  next();
}

function updateIdUploadUI() {
  document.getElementById('id-upload-area').innerHTML = renderIdUpload();
}

function handleIdUpload(side, input) {
  const file = input.files[0];
  if (!file) return;
  if (side === 'front')  DATA.idFront = file;
  else if (side === 'back')   DATA.idBack  = file;
  else if (side === 'selfie') DATA.selfie  = file;
  updateIdUploadUI();
  const labels = {front:'表面', back:'裏面', selfie:'自撮り写真'};
  showToast(`✅ ${labels[side]}をアップロードしました`);

  // 表面と自撮りが揃ったらAI照合を自動実行
  if (DATA.idFront && DATA.selfie && DATA.kycStatus !== 'analyzing') {
    kycSignupAnalyze();
  }
}

function validateS4() {
  if (!DATA.idType)  { showToast('⚠️ 証明書の種類を選択してください','warn'); return; }
  if (!DATA.idFront) { showToast('⚠️ 身分証の表面をアップロードしてください','warn'); return; }
  if (DATA.idType !== 'パスポート' && !DATA.idBack) {
    showToast('⚠️ 身分証の裏面をアップロードしてください','warn'); return;
  }
  if (!DATA.selfie)  { showToast('⚠️ 自撮り写真をアップロードしてください','warn'); return; }
  if (DATA.kycStatus === 'analyzing') {
    showToast('⏳ AI確認中です。しばらくお待ちください','warn'); return;
  }
  if (DATA.kycStatus === 'failed') {
    showToast('⚠️ 書類の読み取りに失敗しました。鮮明な画像で再度アップロードしてください','warn'); return;
  }
  // AI確認が通過済みでないと次へ進めない
  if (DATA.kycStatus !== 'passed') {
    showToast('⚠️ 書類の確認が完了していません。アップロードしてAI確認を通過してください','warn'); return;
  }
  next();
}

// STEP 4 — KYC AI自動照合
// ══════════════════════════════════════════════════════════════
async function kycSignupAnalyze() {
  DATA.kycStatus = 'analyzing';

  // ステータスエリアを表示
  const statusEl = document.getElementById('kyc-ai-status');
  if (statusEl) {
    statusEl.style.display = 'block';
    statusEl.innerHTML = `
      <div style="background:linear-gradient(135deg,#0D1A2D,#1E3252);border-radius:10px;
        padding:13px 16px;display:flex;align-items:center;gap:10px">
        <div style="display:flex;gap:4px">
          <span style="width:6px;height:6px;border-radius:50%;background:#C8A951;
            animation:db 1.4s infinite ease-in-out;display:inline-block"></span>
          <span style="width:6px;height:6px;border-radius:50%;background:#C8A951;
            animation:db 1.4s .2s infinite ease-in-out;display:inline-block"></span>
          <span style="width:6px;height:6px;border-radius:50%;background:#C8A951;
            animation:db 1.4s .4s infinite ease-in-out;display:inline-block"></span>
        </div>
        <div style="color:rgba(255,255,255,.75);font-size:12px">
          🤖 書類を確認中... そのままお待ちください
        </div>
      </div>`;
  }

  try {
    // 画像→base64
    const toB64 = file => new Promise((res,rej)=>{
      const r = new FileReader();
      r.onload = ()=> res({ b64: r.result.split(',')[1], mime: file.type||'image/jpeg' });
      r.onerror = rej;
      r.readAsDataURL(file);
    });

    const front = await toB64(DATA.idFront);

    // 申込者の登録情報
    const regName  = (DATA.lastName  + DATA.firstName).replace(/\s/g,'');
    const regBirth = DATA.dob; // YYYY-MM-DD形式

    const resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:600,
        system:'日本の本人確認書類の読み取り専門AIです。JSONのみで返答してください（前置き不要）。',
        messages:[{ role:'user', content:[
          { type:'image', source:{ type:'base64', media_type:front.mime, data:front.b64 }},
          { type:'text', text:`この${DATA.idType}から以下をJSONで返答:
{
  "name_kanji":"氏名（漢字）",
  "birth":"生年月日 YYYY/MM/DD",
  "expiry":"有効期限 YYYY/MM/DD またはnull",
  "is_expired":有効期限切れならtrue,
  "is_clear":読み取り可能ならtrue,
  "confidence":0から1
}` }
        ]}]
      })
    });

    const data = await resp.json();
    const raw  = data.content?.find(b=>b.type==='text')?.text||'{}';
    const res  = JSON.parse(raw.replace(/```json|```/g,'').trim());

    // 照合
    const normStr = s=> String(s||'').replace(/[ \u3000]/g,'').toUpperCase();
    const normDate = s=> String(s||'').replace(/[年月日\-\/]/g,'/');
    const nameOk  = !regName  || normStr(res.name_kanji).includes(normStr(regName)) ||
                                  normStr(regName).includes(normStr(res.name_kanji));
    const birthOk = !regBirth || normDate(res.birth).startsWith(normDate(regBirth).slice(0,7));
    const expiryOk = !res.is_expired;
    const clearOk  = res.is_clear !== false;
    const conf = Math.round((res.confidence||0.8)*100);

    DATA.kycResult = { nameOk, birthOk, expiryOk, clearOk, conf, raw: res };

    // 読み取り不能判定
    if (conf < 30 || !clearOk) {
      DATA.kycStatus = 'failed';
      if(statusEl) statusEl.innerHTML = `
        <div style="background:#FFFBEB;border:1.5px solid rgba(217,119,6,.25);
          border-radius:10px;padding:14px 16px">
          <div style="font-size:12px;font-weight:700;color:#D97706;margin-bottom:5px">
            📄 書類を再度アップロードしてください</div>
          <div style="font-size:11px;color:#5F6368;line-height:1.7">
            画像が不鮮明で読み取れませんでした。<br>
            文字がはっきり写るよう、明るい場所で撮影してください。
          </div>
        </div>`;
      return;
    }

    // 通過
    DATA.kycStatus = 'passed';
    if(statusEl) statusEl.innerHTML = `
      <div style="background:#ECFDF5;border:1.5px solid rgba(5,150,105,.2);
        border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px">
        <div style="font-size:24px">✅</div>
        <div>
          <div style="font-size:12px;font-weight:700;color:#059669">書類の確認が完了しました</div>
          <div style="font-size:10px;color:#5F6368;margin-top:3px">
            次のステップに進んでください</div>
        </div>
      </div>`;

    showToast('✅ 書類の確認が完了しました');

  } catch(e) {
    DATA.kycStatus = 'pending';
    if(statusEl) statusEl.innerHTML = `
      <div style="background:#FEF2F2;border:1px solid rgba(220,38,38,.2);
        border-radius:10px;padding:12px 14px;font-size:11px;color:#DC2626">
        ❌ 確認に失敗しました。もう一度アップロードしてください。
      </div>`;
    console.error('KYC signup analyze error:', e);
  }
}
