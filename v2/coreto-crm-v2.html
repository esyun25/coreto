<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>クライアント管理 — COREBLDG</title>
<link rel="stylesheet" href="coreto-design-system.css">
<style>

:root{
  --navy:#0D1A2D;--navy-m:#152238;--navy-l:#1E3252;
  --gold:#C8A951;--gold-l:#DFC06A;--gold-dim:rgba(200,169,81,.15);
  --cream:#FFFFFF;--cream2:#F8F9FA;--white:#FFFFFF;
  --ink:#202124;--ink2:#2D3748;--muted:#5F6368;--faint:#80868B;
  --em:#059669;--em-bg:#ECFDF5;--am:#D97706;--am-bg:#FFFBEB;
  --rd:#DC2626;--rd-bg:#FEF2F2;--sk:#0284C7;--sk-bg:#F0F9FF;
  --vt:#7C3AED;--vt-bg:#F5F3FF;
  --bd:#E8EAED;--bd2:#DADCE0;
  --sw:240px;--r:10px;--r-sm:7px;
  --sh:0 1px 2px rgba(60,64,67,.1),0 1px 3px rgba(60,64,67,.06);
  --sh-md:0 4px 16px rgba(0,0,0,.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:var(--cream)}
/* SHELL */
.shell{display:flex;height:100vh}
/* SIDEBAR */
.sb{width:var(--sw);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;position:relative}
.sb::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,rgba(200,169,81,.25) 0%,rgba(200,169,81,.06) 50%,transparent 100%)}
.sb-head{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;letter-spacing:5px;color:var(--gold)}
.sb-ver{font-size:9px;letter-spacing:2px;color:rgba(200,169,81,.3);font-family:'DM Mono',monospace;margin-top:2px}
.sb-user{margin:14px 14px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:9px 11px;display:flex;align-items:center;gap:9px}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--gold-dim);border:1px solid rgba(200,169,81,.25);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gold);flex-shrink:0}
.sb-uname{font-size:11px;font-weight:600;color:rgba(255,255,255,.8)}
.sb-urole{font-size:9px;color:rgba(255,255,255,.3);font-family:'DM Mono',monospace}
.sb-nav{flex:1;overflow-y:auto;padding:6px 10px}
.sb-nav::-webkit-scrollbar{width:3px}
.sb-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.nav-sec-label{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.18);padding:10px 8px 4px;font-family:'DM Mono',monospace}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;cursor:pointer;transition:all .13s;text-decoration:none;position:relative;margin-bottom:1px}
.nav-item:hover{background:rgba(255,255,255,.06)}
.nav-item.active{background:rgba(200,169,81,.1)}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:16px;background:var(--gold);border-radius:0 2px 2px 0}
.nav-icon{width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;border-radius:6px;background:rgba(255,255,255,.04);flex-shrink:0}
.nav-item.active .nav-icon{background:rgba(200,169,81,.12)}
.nav-label{font-size:11px;font-weight:500;color:rgba(255,255,255,.55);flex:1}
.nav-item.active .nav-label{color:var(--gold)}
.nav-item:hover .nav-label{color:rgba(255,255,255,.82)}
.nav-badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;background:var(--rd);color:#fff;font-family:'Outfit',sans-serif}
.nav-badge.amber{background:var(--am)}
.nav-badge.gold{background:var(--gold);color:var(--navy)}
.sb-foot{padding:10px 14px 18px;border-top:1px solid rgba(255,255,255,.05)}
.sb-foot-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.3);transition:.13s}
.sb-foot-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.6)}
/* CONTENT */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--cream)}
.topbar{height:58px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;box-shadow:var(--sh)}
.tb-title{font-size:16px;font-weight:600;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;letter-spacing:.2px}
.tb-crumb{font-size:11px;color:var(--faint);display:flex;align-items:center;gap:5px;margin-top:1px}
.tb-crumb a{color:var(--muted);text-decoration:none}
.tb-crumb a:hover{color:var(--am)}
.tb-actions{margin-left:auto;display:flex;gap:9px;align-items:center}
.btn{padding:7px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Outfit',sans-serif;border:none;letter-spacing:.3px}
.btn-primary{background:var(--navy);color:var(--gold)}
.btn-primary:hover{background:var(--navy-l);transform:translateY(-1px);box-shadow:0 4px 14px rgba(13,26,45,.25)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--bd)}
.btn-ghost:hover{background:var(--cream);color:var(--ink);border-color:var(--bd2)}
.page{flex:1;overflow-y:auto;padding:24px}
.page::-webkit-scrollbar{width:5px}
.page::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}

/* ── FILTER BAR ── */
.filter-bar{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;box-shadow:var(--sh)}
.search-wrap{position:relative;flex:1;min-width:220px}
.search-wrap input{width:100%;padding:9px 12px 9px 36px;background:var(--cream);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:13px;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--gold);background:var(--white)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:14px}
.filter-select{padding:8px 12px;background:var(--cream);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:12px;color:var(--ink);font-family:'Outfit',sans-serif;outline:none;cursor:pointer;transition:border-color .15s}
.filter-select:focus{border-color:var(--gold)}
.filter-divider{width:1px;height:24px;background:var(--bd);flex-shrink:0}
.filter-count{font-size:12px;color:var(--muted);white-space:nowrap;font-family:'Outfit',sans-serif;font-feature-settings:'tnum'}

/* ── TABLE ── */
.card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 14px;text-align:left;font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);background:var(--cream);border-bottom:1px solid var(--bd);white-space:nowrap;font-family:'DM Mono',monospace}
thead th:first-child{padding-left:18px}
thead th.sort{cursor:pointer;user-select:none}
thead th.sort:hover{color:var(--ink)}
thead th .sort-arrow{margin-left:4px;opacity:.4}
tbody tr{border-bottom:1px solid var(--bd);transition:background .1s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(200,169,81,.04)}
tbody td{padding:13px 14px;vertical-align:middle;font-size:12px;color:var(--ink2)}
tbody td:first-child{padding-left:18px}
.td-name{display:flex;align-items:center;gap:10px}
.td-avatar{width:32px;height:32px;border-radius:50%;background:var(--cream2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);flex-shrink:0;font-family:'Outfit',sans-serif;font-feature-settings:'tnum'}
.td-avatar.gold{background:var(--gold-dim);border-color:rgba(200,169,81,.3);color:var(--am)}
.td-main{font-size:13px;font-weight:600;color:var(--ink)}
.td-sub{font-size:10px;color:var(--faint);margin-top:1px;font-family:'DM Mono',monospace}
.td-tag{font-size:10px;color:var(--faint)}
.mono{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;font-family:'Outfit',sans-serif;font-feature-settings:'tnum';white-space:nowrap}
.badge-em{background:var(--em-bg);color:var(--em)}
.badge-am{background:var(--am-bg);color:var(--am)}
.badge-rd{background:var(--rd-bg);color:var(--rd)}
.badge-sk{background:var(--sk-bg);color:var(--sk)}
.badge-vt{background:var(--vt-bg);color:var(--vt)}
.badge-gd{background:var(--gold-dim);color:var(--am)}
.badge-nt{background:var(--cream2);color:var(--muted)}

/* SCORE BAR */
.score-wrap{display:flex;align-items:center;gap:7px}
.score-bar{flex:1;height:5px;background:var(--cream2);border-radius:3px;overflow:hidden;min-width:50px}
.score-fill{height:100%;border-radius:3px;transition:width .4s}
.score-fill.high{background:var(--em)}
.score-fill.mid{background:var(--am)}
.score-fill.low{background:var(--rd)}
.score-num{font-size:10px;font-weight:600;font-family:'Outfit',sans-serif;width:24px;text-align:right}
.score-num.high{color:var(--em)}
.score-num.mid{color:var(--am)}
.score-num.low{color:var(--rd)}

/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-top:1px solid var(--bd);background:var(--white)}
.pg-info{font-size:11px;color:var(--faint);font-family:'Outfit',sans-serif;font-feature-settings:'tnum'}
.pg-btns{display:flex;gap:4px}
.pg-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:6px;border:1px solid var(--bd);background:var(--white);font-size:12px;color:var(--muted);cursor:pointer;transition:all .13s;font-family:'Outfit',sans-serif}
.pg-btn:hover{background:var(--cream);color:var(--ink)}
.pg-btn.active{background:var(--navy);border-color:var(--navy);color:var(--gold);font-weight:700}

/* QUICK STATS */
.qs-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.qs-card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);position:relative;overflow:hidden}
.qs-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.qs-card.c1::before{background:var(--gold)}
.qs-card.c2::before{background:var(--em)}
.qs-card.c3::before{background:var(--sk)}
.qs-card.c4::before{background:var(--am)}
.qs-label{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.qs-val{font-size:24px;font-weight:300;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;letter-spacing:.5px  font-feature-settings:'tnum','lnum';font-variant-numeric:tabular-nums}
.qs-sub{font-size:10px;color:var(--faint);margin-top:4px}

/* CROSSELL BADGE */
.cx-wrap{display:flex;gap:3px;flex-wrap:wrap}
.cx-dot{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;title:''}
.cx-dot.on-rent{background:var(--sk-bg);color:var(--sk)}
.cx-dot.on-sale{background:var(--em-bg);color:var(--em)}
.cx-dot.on-util{background:var(--am-bg);color:var(--am)}
.cx-dot.on-hr{background:var(--vt-bg);color:var(--vt)}
.cx-dot.off{background:var(--cream2);color:var(--bd2)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-bg.open{display:flex}
.modal{background:var(--white);border-radius:14px;padding:28px;width:480px;max-width:90vw;box-shadow:0 24px 64px rgba(0,0,0,.15);border:1px solid var(--bd)}
.modal-title{font-size:18px;font-weight:600;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;margin-bottom:6px}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:22px}
.form-row{margin-bottom:14px}
.form-label{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px}
.form-input{width:100%;padding:9px 12px;background:var(--cream);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:13px;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--gold);background:var(--white)}
.form-select{width:100%;padding:9px 12px;background:var(--cream);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:13px;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;outline:none;cursor:pointer}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:22px;padding-top:18px;border-top:1px solid var(--bd)}

/* ════════════════════════════════════════════
   数値フォント統一 — Outfit + Tabular Nums
   (DM Monoはコード/ID系のみ維持)
   ════════════════════════════════════════════ */

/* バッジ・カウント系 */
.nb, .nav-badge, .cnav-badge,
.tab-count, .kh-count, .kc-count,
.badge, .score-num {
  font-family: 'Outfit', sans-serif !important;
  font-variant-numeric: tabular-nums;
  font-feature-settings: 'tnum';
  letter-spacing: 0 !important;
}

/* KPI大数値 */
.qs-val, .kpi-val, .kpi-value,
.stat-val, .count-val {
  font-variant-numeric: tabular-nums;
  font-feature-settings: 'tnum', 'lnum';
}

/* 日時・タイムスタンプ */
.tl-time, .remit-deadline, .check-meta,
.ic-date, .pipe-date {
  font-family: 'Outfit', sans-serif !important;
  font-variant-numeric: tabular-nums;
  font-feature-settings: 'tnum';
}

/* テーブル金額セル */
td.num, .bc-vl, .slip-meta,
.it-step-num, .pg-btn, .pg-info {
  font-family: 'Outfit', sans-serif !important;
  font-variant-numeric: tabular-nums;
  font-feature-settings: 'tnum';
}

/* 金額入力フィールド（Outfit で統一） */
.amount-input {
  font-family: 'Outfit', sans-serif !important;
  font-variant-numeric: tabular-nums;
}
/* ══ MOBILE RESPONSIVE ══════════════════════════════════════════ */
.mob-ham{display:none;flex-direction:column;align-items:center;justify-content:center;width:36px;height:36px;background:transparent;border:none;cursor:pointer;border-radius:7px;transition:.13s;flex-shrink:0}
.mob-ham:hover{background:rgba(255,255,255,.08)}
.mob-ham span{display:block;width:18px;height:2px;background:rgba(255,255,255,.72);margin:3px 0;border-radius:1px;transition:.2s}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199}
@media(max-width:768px){
  .mob-ham{display:flex}
  .mob-overlay.show{display:block}
  .sb{position:fixed;left:calc(-1 * var(--sw));top:0;height:100vh;z-index:200;transition:left .25s ease;box-shadow:4px 0 24px rgba(0,0,0,.25)}
  .sb.open{left:0}
  .shell{overflow:hidden}
  .content{width:100vw;min-width:0}
  .topbar{padding:0 12px;gap:8px}
  .tb-crumb{display:none}
  .tb-actions{gap:6px}
  .page{padding:12px}
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;font-size:11px}
  .filter-bar{flex-wrap:wrap;gap:6px}
  .qs-row{grid-template-columns:1fr 1fr!important}
}

/* ── Google-style Design System ── */
html, body { background:#FFFFFF !important; }
.sb-logo, .brand-logo { font-family:'Cormorant Garamond',serif !important; }
body, input, select, textarea, button { font-family:'Outfit','Noto Sans JP',sans-serif; }
.kpi-value, .kpi-vl {
  font-family:'Outfit','Noto Sans JP',sans-serif !important;
  font-weight:300 !important;
  font-variant-numeric:tabular-nums lining-nums !important;
  letter-spacing:-1px !important;
  color:var(--ink) !important;
}
.kpi-value { font-size:32px !important;font-variant-numeric:tabular-nums}
.kpi-vl   { font-size:28px !important; }
.stat-val {
  font-family:'Outfit','Noto Sans JP',sans-serif !important;
  font-weight:400 !important;
  font-variant-numeric:tabular-nums !important;
  color:var(--ink) !important;
}
.kpi-label, .kpi-sub, .stat-label { font-size:11px !important; font-weight:500 !important; color:var(--muted) !important; }
.section-title { font-size:11px !important; font-weight:600 !important; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); }
.section-title::before { display:none; }
.card { background:#FFFFFF; border:1px solid var(--bd); border-radius:8px; box-shadow:var(--sh); }
.kpi-card { background:#FFFFFF !important; border:1px solid var(--bd) !important; border-radius:8px !important; box-shadow:none !important; }
.badge { border-radius:4px !important; font-size:11px !important; font-weight:500 !important; }
.delta-up, .kpi-delta.up { color:var(--em) !important; }
.delta-dn, .kpi-delta.dn { color:var(--rd) !important; }
/* ── Google-style 数値原則 (DS v2.3) ── */
.kpi-value, .kpi-vl, .kpi-val,
.stat-val, .qs-val, .count-val,
.td-amt, .bc-vl, .bc-total-vl,
.rr-amount, .amount-val, .srv,
.visit-reward, .lb-val,
.mf-kpi-vl, .mf-reward {
  font-family:'Outfit','Noto Sans JP',sans-serif !important;
  font-weight:300 !important;
  font-variant-numeric:tabular-nums !important;
}
.kpi-value { font-size:32px !important; }
.kpi-vl    { font-size:28px !important; }
</style>
</head>
<body>
<div class="shell">

<!-- SIDEBAR -->
<nav class="sb">
  <div class="sb-head">
    <div class="sb-logo">CORE<br>BLDG</div>
    <div class="sb-ver">v2.0 — CORETO</div>
  </div>
  <div class="sb-user">
    <div class="sb-av" id="sb-av">--</div>
    <div>
      <div id="sb-name" style="font-size:11px;font-weight:600;color:rgba(255,255,255,.8)">...</div>
      <div id="sb-role" style="font-size:9px;color:rgba(255,255,255,.3);font-family:'Outfit',sans-serif;font-variant-numeric:tabular-nums">...</div>
    </div>
  </div>
  <div class="sb-nav" id="sb-nav"><!-- CNAV --></div>
</nav>

<!-- CONTENT -->
<div class="content">
  <div class="topbar">
    <button class="mob-ham" onclick="toggleSb()" aria-label="メニュー"><span></span><span></span><span></span></button>
    <div>
      <div class="tb-title">クライアント管理</div>
      <div class="tb-crumb"><a href="coreto-hub-v2.html">COREBLDG</a> › <span>クライアント管理</span></div>
    </div>
    <div class="tb-actions">
      <button class="btn btn-ghost" onclick="exportCSV()">📤 CSV出力</button>
      <button class="btn btn-ghost" onclick="bulkContactDormant()" title="休眠クライアントに一括LINE催促">😴 休眠一括催促</button>
      <button class="btn btn-primary" onclick="openModal()">＋ 新規登録</button>
    </div>
  </div>

  <div class="page">

    <!-- Quick stats -->
    <div class="qs-row">
      <div class="qs-card c1">
        <div class="qs-label">総クライアント数</div>
        <div class="qs-val">284</div>
        <div class="qs-sub">今月 +18名 登録</div>
      </div>
      <div class="qs-card c2">
        <div class="qs-label">商談中</div>
        <div class="qs-val">47</div>
        <div class="qs-sub">賃貸28 / 売買9 / HR10</div>
      </div>
      <div class="qs-card c3">
        <div class="qs-label">光通信クロスセル対象</div>
        <div class="qs-val">112</div>
        <div class="qs-sub">未案内が 89名</div>
      </div>
      <div class="qs-card c4">
        <div class="qs-label">休眠（90日以上未接触）</div>
        <div class="qs-val">31</div>
        <div class="qs-sub">フォロー推奨</div>
      </div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="名前・電話・メール・案件番号で検索…" id="search-inp" oninput="filterTable()">

const STATUS_BADGE = {
  active:   '<span class="badge badge-sk">商談中</span>',
  won:      '<span class="badge badge-em">成約済み</span>',
  nurturing:'<span class="badge badge-vt">育成中</span>',
  dormant:  '<span class="badge badge-nt">休眠</span>',
};
const TYPE_BADGE = {
  rental:  '<span class="badge badge-sk">賃貸</span>',
  sale:    '<span class="badge badge-em">売買</span>',
  hr:      '<span class="badge badge-vt">HR</span>',
  utility: '<span class="badge badge-am">光通信</span>',
};
const UTIL_ICONS = {elec:'⚡',gas:'🔥',net:'📡'};

function scoreClass(s){ return s>=70?'high':s>=40?'mid':'low'; }

function renderRow(c){
  const utilDots = ['elec','gas','net'].map(u=>
    `<div class="cx-dot ${c.util.includes(u)?'on-'+{elec:'util',gas:'util',net:'util'}[u]:'off'}" title="${{elec:'電力',gas:'ガス',net:'回線'}[u]}">${c.util.includes(u)?UTIL_ICONS[u]:'−'}</div>`
  ).join('');
  const sc = scoreClass(c.score);
  return `<tr onclick="openDetail('${c.id}')">
    <td><div class="td-name">
      <div class="td-avatar ${c.status==='won'?'gold':''}">${c.av}</div>
      <div><div class="td-main">${c.name}</div><div class="td-sub">${c.id}</div></div>
    </div></td>
    <td>${STATUS_BADGE[c.status]}</td>
    <td><span class="mono">${c.ag}</span><br><span class="td-tag">${c.agName}</span></td>
    <td>${TYPE_BADGE[c.type]}</td>
    <td><div class="cx-wrap">${utilDots}</div></td>
    <td><div class="score-wrap">
      <div class="score-bar"><div class="score-fill ${sc}" style="width:${c.score}%"></div></div>
      <div class="score-num ${sc}">${c.score}</div>
    </div></td>
    <td><span class="td-tag">${c.source}</span></td>
    <td><span class="mono">${c.lastContact}</span></td>
    <td><button onclick="event.stopPropagation();openDetail('${c.id}')" style="padding:4px 12px;background:var(--cream);border:1px solid var(--bd);border-radius:6px;font-size:11px;color:var(--muted);cursor:pointer;font-family:'Outfit',sans-serif">詳細 →</button></td>
  </tr>`;
}

let currentData = [...CLIENTS];

function renderTable(data){
  document.getElementById('tbl-body').innerHTML = data.map(renderRow).join('');
  document.getElementById('count-label').textContent = `${data.length}件表示中`;
}

function filterTable(){
  const q = document.getElementById('search-inp').value.toLowerCase();
  const st = document.getElementById('f-status').value;
  const tp = document.getElementById('f-type').value;
  const ag = document.getElementById('f-ag').value;
  currentData = CLIENTS.filter(c=>{
    const matchQ = !q || c.name.includes(q)||c.kana.toLowerCase().includes(q)||c.id.toLowerCase().includes(q)||c.ag.includes(q);
    const matchS = !st || c.status===st;
    const matchT = !tp || c.type===tp;
    const matchA = !ag || c.ag.includes(ag);
    return matchQ&&matchS&&matchT&&matchA;
  });
  renderTable(currentData);
}

function sortTable(col){ renderTable([...currentData]); } // simplified

function openDetail(id){ window.location.href=`coreto-crm-detail-v2.html?id=${id}`; }
function openModal(prefill) {
  // prefill: CRM詳細や案件登録から呼ばれた時のデータ
  if (prefill) {
<!-- removed dummy data -->
    document.querySelector('#modal input[placeholder="タナカ ユウコ"]').value = prefill.kana || '';
    document.querySelector('#modal input[placeholder="090-0000-0000"]').value = prefill.phone || '';
    document.querySelector('#modal input[placeholder="email@example.com"]').value = prefill.email || '';
    document.querySelector('#modal input[placeholder="初回ヒアリング内容・希望条件など"]').value = prefill.memo || '';
    if (prefill.source) {
      const sel = document.querySelectorAll('#modal select')[1];
      [...sel.options].forEach(o => { if (o.textContent.includes(prefill.source)) o.selected = true; });
    }
  }
  document.getElementById('modal').classList.add('open');
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); }

function saveClient(){
  // localStorageにCLIENTSを保存
  try { localStorage.setItem('CORETO_CLIENTS', JSON.stringify(CLIENTS)); } catch(e) {}
  const inputs = document.querySelectorAll('#modal .form-input');
  const selects = document.querySelectorAll('#modal .form-select');
  const name  = inputs[0].value.trim();
  const kana  = inputs[1].value.trim();
  const phone = inputs[2].value.trim();
  const email = inputs[3].value.trim();
  const memo  = inputs[4]?.value?.trim() || '';
  const type  = selects[0]?.value === '賃貸' ? 'rental' : selects[0]?.value === '売買' ? 'sale' : 'rental';
  const source = selects[1]?.value || '自己開拓';
  const agText = selects[2]?.value || '';
<!-- removed dummy data -->

  if (!name) { showToast('氏名を入力してください', 'warn'); return; }

  const av = name.charAt(0);
  const newId = 'CLI-' + String(Date.now()).slice(-4);
  const newClient = {
    id: newId, name, kana: kana||name, av,
    status:'active', statusLabel:'商談中',
    ag, agName: agText.split(' ').slice(1).join('') || ag,
    type, typeLabel: type==='rental'?'賃貸':'売買',
    util:[], score:50, source,
    lastContact:'たった今',
    phone, email, memo,
  };
  CLIENTS.unshift(newClient);
  currentData = [...CLIENTS];

  // フォームリセット
  inputs.forEach(i => i.value = '');
  closeModal();
  renderTable(currentData);
  showToast(`✅ ${name} 様をCRMに登録しました`, 'em');
}
function bulkContactDormant() {
  const dormant = CLIENTS.filter(c => c.status === 'dormant');
  if (!dormant.length) { showToast('休眠クライアントはいません', 'em'); return; }
  coretoConfirm({title:'LINE一括催促',message:'休眠クライアント ' + dormant.length + ' 名にLINEで催促メッセージを送信しますか？',detail:'「物件探しはお済みでしょうか」のテンプレートを送信します',okLabel:'送信する',danger:false,onOk:function(){
  const LINE_TOKEN = (window.LINE_CONFIG && window.LINE_CONFIG.AG_CHANNEL_TOKEN) || '';
  const msg = '【CORETO】\nいつもお世話になっております。株式会社CORETOの担当です。\nお住まいのご検討はいかがでしょうか？\n最新の物件情報をご案内できますので、お気軽にご連絡ください。';
  if (LINE_TOKEN) {
    fetch('https://api.line.me/v2/bot/message/broadcast', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + LINE_TOKEN },
      body: JSON.stringify({ messages: [{ type: 'text', text: msg }] })
    }).catch(function(e) { console.error(e); });
  } else {
    // console.log('[LINE一括催促 — 設定待ち]', ...);
  }}});
  showToast('📲 ' + dormant.length + '名に一括催促LINEを送信しました（LINE設定後有効）', 'em');
}

<script>
function showToast(msg, type) {
  const colors = {em:['#ECFDF5','#059669','rgba(5,150,105,.2)'],am:['#FFFBEB','#D97706','rgba(217,119,6,.2)'],warn:['#FFFBEB','#D97706','rgba(217,119,6,.2)']};
  const [bg,cl,bc] = colors[type]||colors.em;
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:24px;right:24px;z-index:9999;padding:11px 18px;border-radius:9px;font-size:13px;font-weight:600;font-family:'Outfit',sans-serif;box-shadow:0 6px 20px rgba(0,0,0,.12);transition:opacity .4s;background:${bg};color:${cl};border:1px solid ${bc}`;
  t.textContent = msg; document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),400);},3000);
}

window.addEventListener('DOMContentLoaded', function() {
  CNAV.init('crm');
  document.getElementById('modal').addEventListener('click', e => { if(e.target===document.getElementById('modal')) closeModal(); });
  // ── ロール別クライアントフィルタ ──
  const _s = CNAV.session ? CNAV.session() : null;
  const _role = (_s && _s.type) || sessionStorage.getItem('coreto_role') || 'hq';
  if (_role !== 'hq') {
    const _myId = _s ? _s.userId : null;
    if (_myId) { CLIENTS = CLIENTS.filter(c => c.ag === _myId); }
    const agSel = document.getElementById('f-ag');
    if (agSel) agSel.closest('.filter-item, .filter-group, div').style.display = 'none';
    const title = document.querySelector('.top-bar .tb-title, .tb-title');
    if (title) title.textContent = '担当クライアント管理';
  }
  renderTable(CLIENTS);
  filterTable();
});
