<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>COREBLDG — Hub</title>
<link rel="stylesheet" href="coreto-design-system.css">
<style>

/* ═══════════════════════════════════════════
   DESIGN TOKENS — COREBLDG V2
═══════════════════════════════════════════ */
:root {
  /* Brand */
  --navy:        #0D1A2D;
  --navy-mid:    #152238;
  --navy-light:  #1E3252;
  --gold:        #C8A951;
  --gold-light:  #DFC06A;
  --gold-dim:    rgba(200,169,81,.18);
  --gold-glow:   rgba(200,169,81,.08);

  /* Content */
  --cream:       #FFFFFF;
  --cream2:      #F0EDE5;
  --white:       #FFFFFF;
  --ink:         #202124;
  --ink2:        #2D2D45;
  --muted:       #5F6368;
  --faint:       #80868B;

  /* Status */
  --emerald:     #059669;
  --emerald-bg:  #ECFDF5;
  --amber:       #D97706;
  --amber-bg:    #FFFBEB;
  --red:         #DC2626;
  --red-bg:      #FEF2F2;
  --sky:         #0284C7;
  --sky-bg:      #F0F9FF;
  --violet:      #7C3AED;
  --violet-bg:   #F5F3FF;

  /* Structure */
  --border:      #E8EAED;
  --border-mid:  #DADCE0;
  --sidebar-w:   240px;
  --radius:      12px;
  --radius-sm:   8px;
  --shadow-sm:   0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow:      0 4px 16px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);
  --shadow-lg:   0 16px 48px rgba(0,0,0,.12);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

/* ═══════════════════════════════════════════
   LOGIN SCREEN
═══════════════════════════════════════════ */
body {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif;
  background: var(--navy);
  color: var(--ink);
  min-height: 100vh;
}

#login-screen {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  background: #0a1628;
}

.login-wrap {
  display: flex;
  width: 840px;
  height: 500px;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 32px 80px rgba(0,0,0,.55), 0 0 0 1px rgba(200,169,81,.15);
}

/* Left panel — ロゴ・コピーのみ、装飾は最小限 */
.login-left {
  width: 320px;
  flex-shrink: 0;
  background: var(--navy);
  padding: 0;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}
/* 縦の区切り線（ゴールド） */
.login-left::after {
  content: '';
  position: absolute; top: 0; right: 0;
  width: 1px; height: 100%;
  background: linear-gradient(180deg,
    transparent 0%,
    rgba(200,169,81,.3) 30%,
    rgba(200,169,81,.3) 70%,
    transparent 100%);
}
/* 背景の微細グリッド */
.login-left::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(200,169,81,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,169,81,.03) 1px, transparent 1px);
  background-size: 32px 32px;
}

.login-left-inner {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  height: 100%;
  padding: 44px 40px;
}

.brand-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 34px; font-weight: 600;
  letter-spacing: 7px;
  color: var(--gold);
  line-height: 1;
  margin-bottom: 10px;
}
.brand-sub {
  font-size: 9px; font-weight: 400;
  letter-spacing: 3.5px; text-transform: uppercase;
  color: rgba(200,169,81,.4);
  font-family: 'DM Mono', monospace;
}
.login-tagline {
  margin-top: auto;
  margin-bottom: auto;
  padding-top: 32px;
}
.login-tagline-main {
  font-size: 13px;
  font-weight: 300;
  color: rgba(255,255,255,.45);
  line-height: 1.9;
  letter-spacing: .3px;
}
.login-tagline-main em {
  font-style: normal;
  color: rgba(200,169,81,.7);
  font-weight: 400;
}
.login-version {
  font-size: 9px; color: rgba(255,255,255,.14);
  font-family: 'DM Mono', monospace;
  letter-spacing: 1.5px;
  margin-top: auto;
}

/* Right panel */
.login-right {
  flex: 1;
  background: var(--cream);
  padding: 48px 44px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.login-title {
  font-size: 22px; font-weight: 600;
  color: var(--ink);
  margin-bottom: 6px;
  font-family:'Outfit','Noto Sans JP',sans-serif;
  letter-spacing:.2px;
}
.login-title-sub {
  font-size: 13px; color: var(--muted);
  margin-bottom: 32px;
}
.field-label {
  font-size: 11px; font-weight: 600;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 7px;
  display: block;
}
.field-input {
  width: 100%;
  padding: 11px 15px;
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 400;
  color: var(--ink);
  font-family: 'Outfit', 'Noto Sans JP', sans-serif;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
  margin-bottom: 16px;
}
.field-input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(200,169,81,.12);
}
.login-btn {
  width: 100%;
  padding: 13px;
  background: var(--navy);
  color: var(--gold);
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 600;
  letter-spacing: 1px;
  font-family: 'Outfit', sans-serif;
  cursor: pointer;
  transition: all .2s;
  margin-top: 4px;
}
.login-btn:hover {
  background: var(--navy-light);
  transform: translateY(-1px);
  box-shadow: 0 8px 24px rgba(13,26,45,.3);
}
.login-err {
  font-size: 12px; color: var(--red);
  text-align: center; min-height: 18px;
  margin-bottom: 10px;
}
.login-demo {
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px dashed rgba(220,38,38,.3);
  opacity: 0.6;
  filter: grayscale(0.3);
}
.demo-title {
  font-size: 11px; color: var(--faint);
  letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 10px;
}
.demo-roles {
  display: flex; gap: 8px; flex-wrap: wrap;
}
.demo-role {
  padding: 5px 12px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 11px; font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
  font-family: 'DM Mono', monospace;
  letter-spacing: .5px;
}
.demo-role:hover {
  border-color: var(--gold);
  color: var(--amber);
  background: var(--amber-bg);
}

/* ═══════════════════════════════════════════
   MAIN APP SHELL
═══════════════════════════════════════════ */
#app {
  display: none;
  height: 100vh;
  flex-direction: row;
}

/* SIDEBAR */
.sidebar {
  width: var(--sidebar-w);
  background: var(--navy);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.sidebar::after {
  content: '';
  position: absolute; top: 0; right: 0;
  width: 1px; height: 100%;
  background: linear-gradient(180deg, rgba(200,169,81,.3) 0%, rgba(200,169,81,.1) 40%, transparent 100%);
}
.sb-header {
  padding: 28px 24px 20px;
  border-bottom: 1px solid rgba(255,255,255,.06);
}
.sb-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; font-weight: 600;
  letter-spacing: 5px; color: var(--gold);
  margin-bottom: 3px;
}
.sb-version {
  font-size: 9px; font-weight: 400;
  letter-spacing: 2px; text-transform: uppercase;
  color: rgba(200,169,81,.35);
  font-family: 'DM Mono', monospace;
}

/* User pill */
.sb-user {
  margin: 16px 16px 12px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 10px;
  padding: 10px 12px;
  display: flex; align-items: center; gap: 10px;
}
.sb-avatar {
  width: 30px; height: 30px;
  background: var(--gold-dim);
  border: 1px solid rgba(200,169,81,.3);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  color: var(--gold);
  flex-shrink: 0;
}
.sb-user-info { overflow: hidden; }
.sb-user-name {
  font-size: 12px; font-weight: 600;
  color: rgba(255,255,255,.85);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sb-user-role {
  font-size: 10px; color: rgba(255,255,255,.35);
  font-family: 'DM Mono', monospace;
  letter-spacing: .5px;
}

/* Nav */
.sb-nav { flex: 1; overflow-y: auto; padding: 8px 12px; }
.sb-nav::-webkit-scrollbar { width: 3px; }
.sb-nav::-webkit-scrollbar-track { background: transparent; }
.sb-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

.nav-section { margin-bottom: 4px; }
.nav-section-label {
  font-size: 9px; font-weight: 600;
  letter-spacing: 2px; text-transform: uppercase;
  color: rgba(255,255,255,.2);
  padding: 12px 10px 5px;
  font-family: 'DM Mono', monospace;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: all .15s;
  position: relative;
  text-decoration: none;
}
.nav-item:hover { background: rgba(255,255,255,.06); }
.nav-item.active { background: rgba(200,169,81,.1); }
.nav-item.active::before {
  content: '';
  position: absolute; left: 0; top: 50%;
  transform: translateY(-50%);
  width: 3px; height: 18px;
  background: var(--gold);
  border-radius: 0 2px 2px 0;
}
.nav-icon {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  border-radius: 7px;
  background: rgba(255,255,255,.04);
  flex-shrink: 0;
}
.nav-item.active .nav-icon { background: rgba(200,169,81,.15); }
.nav-text { font-size: 12px; font-weight: 500; color: rgba(255,255,255,.6); }
.nav-item.active .nav-text { color: var(--gold); }
.nav-item:hover .nav-text { color: rgba(255,255,255,.85); }
.nav-badge {
  margin-left: auto;
  background: var(--red);
  color: #fff;
  font-size: 9px; font-weight: 700;
  padding: 2px 6px;
  border-radius: 10px;
  font-family: 'Outfit', sans-serif; font-feature-settings: 'tnum';
}
.nav-badge.amber { background: var(--amber); }
.nav-badge.gold { background: var(--gold); color: var(--navy); }

/* Sidebar footer */
.sb-footer {
  padding: 12px 16px 20px;
  border-top: 1px solid rgba(255,255,255,.06);
}
.sb-footer-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 8px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px; color: rgba(255,255,255,.35);
  transition: all .15s;
}
.sb-footer-item:hover { background: rgba(255,255,255,.05); color: rgba(255,255,255,.6); }
.sb-footer-item span:first-child { font-size: 14px; }

/* CONTENT AREA */
.content {
  flex: 1;
  background: var(--cream);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Topbar */
.topbar {
  height: 60px;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 28px;
  gap: 16px;
  flex-shrink: 0;
}
.topbar-title {
  font-size: 16px; font-weight: 600;
  color: var(--ink);
  font-family:'Outfit','Noto Sans JP',sans-serif;
  letter-spacing:.2px;
}
.topbar-breadcrumb {
  font-size: 12px; color: var(--faint);
  display: flex; align-items: center; gap: 6px;
}
.topbar-breadcrumb span { color: var(--muted); }
.topbar-actions { margin-left: auto; display: flex; gap: 10px; align-items: center; }
.topbar-btn {
  padding: 7px 16px;
  border-radius: var(--radius-sm);
  font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all .15s;
  font-family: 'Outfit', sans-serif;
  border: none;
}
.topbar-btn.primary {
  background: var(--navy);
  color: var(--gold);
}
.topbar-btn.primary:hover { background: var(--navy-light); }
.topbar-btn.ghost {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
}
.topbar-btn.ghost:hover { background: var(--cream); color: var(--ink); }

/* Page content */
.page-content {
  flex: 1; overflow-y: auto;
  padding: 28px;
}
.page-content::-webkit-scrollbar { width: 5px; }
.page-content::-webkit-scrollbar-track { background: transparent; }
.page-content::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 3px; }

/* ═══════════════════════════════════════════
   DASHBOARD COMPONENTS
═══════════════════════════════════════════ */

/* KPI cards */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}
.kpi-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
}
.kpi-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--border);
}
.kpi-card.gold::before { background: var(--gold); }
.kpi-card.emerald::before { background: var(--emerald); }
.kpi-card.sky::before { background: var(--sky); }
.kpi-card.amber::before { background: var(--amber); }
.kpi-label {
  font-size: 11px; font-weight: 600;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}
.kpi-value {
  font-size: 28px; font-weight:300;
  color: var(--ink);
  font-family:'Outfit','Noto Sans JP',sans-serif;
  letter-spacing: 1px;
  line-height: 1;
  margin-bottom: 6px;
  font-feature-settings:'tnum','lnum';font-variant-numeric:tabular-nums}
.kpi-sub {
  font-size: 11px; color: var(--faint);
}
.kpi-delta {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 11px; font-weight: 600;
  padding: 2px 7px;
  border-radius: 10px;
}
.kpi-delta.up { background: var(--emerald-bg); color: var(--emerald); }
.kpi-delta.dn { background: var(--red-bg); color: var(--red); }

/* Section */
.section { margin-bottom: 24px; }
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.section-title {
  font-size: 14px; font-weight: 600;
  color: var(--ink);
  display: flex; align-items: center; gap: 8px;
}
.section-title::before {
  content: '';
  width: 3px; height: 14px;
  background: var(--gold);
  border-radius: 2px;
}
.section-more {
  font-size: 12px; color: var(--muted);
  cursor: pointer; font-weight: 500;
  transition: color .15s;
}
.section-more:hover { color: var(--amber); }

/* Cards */
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}

/* Task list */
.task-list { }
.task-item {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 18px;
  border-bottom: 1px solid var(--border);
  transition: background .12s;
}
.task-item:last-child { border-bottom: none; }
.task-item:hover { background: var(--cream); }
.task-prio {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.task-prio.high { background: var(--red); box-shadow: 0 0 6px rgba(220,38,38,.4); }
.task-prio.mid { background: var(--amber); }
.task-prio.low { background: var(--faint); }
.task-main { flex: 1; min-width: 0; }
.task-name {
  font-size: 13px; font-weight: 500; color: var(--ink);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.task-meta { font-size: 11px; color: var(--faint); margin-top: 1px; }
.task-badge { flex-shrink: 0; }

/* Badges */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 10px; font-weight: 600;
  letter-spacing: .5px;
  text-transform: uppercase;
  font-family: 'Outfit', sans-serif; font-feature-settings: 'tnum';
}
.badge.emerald { background: var(--emerald-bg); color: var(--emerald); }
.badge.amber   { background: var(--amber-bg);   color: var(--amber); }
.badge.red     { background: var(--red-bg);     color: var(--red); }
.badge.sky     { background: var(--sky-bg);     color: var(--sky); }
.badge.violet  { background: var(--violet-bg);  color: var(--violet); }
.badge.gold    { background: var(--gold-dim);   color: var(--amber); }
.badge.muted   { background: var(--cream2);     color: var(--muted); }

/* Timeline */
.timeline { padding: 4px 0; }
.tl-item {
  display: flex; gap: 14px;
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
}
.tl-item:last-child { border-bottom: none; }
.tl-dot {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; flex-shrink: 0;
  margin-top: 1px;
}
.tl-dot.gold   { background: var(--gold-dim); }
.tl-dot.sky    { background: var(--sky-bg); }
.tl-dot.emerald { background: var(--emerald-bg); }
.tl-dot.amber  { background: var(--amber-bg); }
.tl-body { flex: 1; }
.tl-text { font-size: 13px; color: var(--ink); line-height: 1.5; }
.tl-time { font-size: 11px; color: var(--faint); margin-top: 2px; font-family: 'Outfit', sans-serif; font-feature-settings: 'tnum'; }

/* Pipe step */
.pipeline { display: flex; flex-direction: column; gap: 2px; padding: 8px 0; }
.pipe-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 18px;
  border-bottom: 1px solid var(--border);
}
.pipe-item:last-child { border-bottom: none; }
.pipe-step {
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700;
  flex-shrink: 0;
  font-family: 'Outfit', sans-serif; font-feature-settings: 'tnum';
}
.pipe-step.done { background: var(--emerald); color: #fff; }
.pipe-step.active { background: var(--navy); color: var(--gold); border: 2px solid var(--gold); font-size: 8px; }
.pipe-step.todo { background: var(--cream2); color: var(--faint); }
.pipe-label { flex: 1; font-size: 12px; color: var(--ink); font-weight: 500; }
.pipe-client { font-size: 11px; color: var(--muted); }
.pipe-ag { 
  font-size: 10px; color: var(--amber);
  background: var(--amber-bg);
  padding: 2px 8px; border-radius: 10px;
  font-family: 'DM Mono', monospace;
}

/* Remittance panel */
.remit-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  transition: background .12s;
}
.remit-item:last-child { border-bottom: none; }
.remit-item:hover { background: var(--cream); }
.remit-deadline {
  font-size: 11px;
  font-family: 'Outfit', sans-serif; font-feature-settings: 'tnum';
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 6px;
  flex-shrink: 0;
}
.remit-deadline.urgent { background: var(--red-bg); color: var(--red); }
.remit-deadline.soon { background: var(--amber-bg); color: var(--amber); }
.remit-deadline.ok { background: var(--emerald-bg); color: var(--emerald); }
.remit-info { flex: 1; min-width: 0; }
.remit-name { font-size: 13px; font-weight: 500; color: var(--ink); }
.remit-meta { font-size: 11px; color: var(--faint); margin-top: 1px; }
.remit-amount {
  font-size: 14px; font-weight:300;
  color: var(--ink);
  font-family:'Outfit','Noto Sans JP',sans-serif;
  letter-spacing: .5px;font-variant-numeric:tabular-nums}
.remit-btn {
  padding: 5px 14px;
  background: var(--navy);
  color: var(--gold);
  border: none; border-radius: var(--radius-sm);
  font-size: 11px; font-weight: 600;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  letter-spacing: .5px;
  transition: all .15s;
  flex-shrink: 0;
}
.remit-btn:hover { background: var(--navy-light); transform: translateY(-1px); }

/* ═══════════════════════════════════════════
   DEMO PAGES PLACEHOLDER
═══════════════════════════════════════════ */
.page-placeholder {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%;

<script>

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let currentRole = 'hq';
let currentPage = 'dashboard';

// ─────────────────────────────────────────
// 権限マトリクス
// ─────────────────────────────────────────
// AG権限: フル操作（案件登録・編集・成約報告）
// PT権限: 紹介投げ・進捗閲覧のみ（編集・操作ボタン非表示）
// ─────────────────────────────────────────
const PERMISSIONS = {
  hq:        { re:'ag', hr:'ag', util:'ag' },  // HQは全事業フル
  re_ag:     { re:'ag', hr:'pt', util:'ag' },  // 不動産AG・光通信AG / 人材はPT扱い
  hr_ag:     { re:'pt', hr:'ag', util:'ag' },  // 人材AG・光通信AG / 不動産はPT扱い
  hikari_ag: { re:'pt', hr:'pt', util:'ag' },  // 光通信AG / 不動産・人材はPT扱い
  pt:        { re:'pt', hr:'pt', util:'pt' },  // 全事業PT扱い（光通信は案件投げのみ可）
  intern:    { re:null, hr:null, util:null },  // 訪問・リード投げのみ
};

const ROLES = {
  hq:        { label:'HQ統括',    av:'HQ', nav: hqNav,        page: renderHQDash },
  re_ag:     { label:'RE-AG',     av:'AG', nav: reAgNav,      page: renderREAgDash },
  hr_ag:     { label:'HR-AG',     av:'AG', nav: hrAgNav,      page: renderHRAgDash },
  hikari_ag: { label:'光通信AG',  av:'AG', nav: hikariAgNav,  page: renderHikariAgDash },
  pt:        { label:'PT',        av:'PT', nav: ptNav,        page: renderPTDash },
  intern:    { label:'インターン', av:'IN', nav: internNav,    page: renderInternDash },
};

// ═══ 簡易ユーザー認証（デモ用。本番はサーバー認証APIに置換）═══
// IDとパスワードのマッピング。本番ではこのオブジェクトをサーバーサイドに移動すること
const USER_CREDENTIALS = {
  // HQ
  'HQ-0001': { pw: 'Coreto2026!', role: 'hq',        name: '田中 誠一（統括）',  userId: 'HQ-0001', rank: null },
  // RE-AG
  'AG-0042':  { pw: 'agent2026',  role: 're_ag',      name: '山田 誠',            userId: 'AG-0042',  rank: 'Gold' },
  'AG-0088':  { pw: 'agent2026',  role: 're_ag',      name: '鈴木 花子',          userId: 'AG-0088',  rank: 'Silver' },
  'AG-0055':  { pw: 'agent2026',  role: 're_ag',      name: '井上 誠',            userId: 'AG-0055',  rank: 'Gold' },
  // HR-AG
  'AG-0103':  { pw: 'agent2026',  role: 'hr_ag',      name: '山田 光太',          userId: 'AG-0103',  rank: 'Bronze' },
  'AG-0112':  { pw: 'agent2026',  role: 'hr_ag',      name: '中村 梓',            userId: 'AG-0112',  rank: 'Bronze' },
  // 光通信AG
  'AG-0071':  { pw: 'agent2026',  role: 'hikari_ag',  name: '中村 陽子',          userId: 'AG-0071',  rank: 'Silver' },
  // PT
  'PT-0015':  { pw: 'partner26',  role: 'pt',         name: '佐藤 健一',          userId: 'PT-0015',  rank: null },
  'PT-0022':  { pw: 'partner26',  role: 'pt',         name: '高橋 美咲',          userId: 'PT-0022',  rank: null },
  // インターン
  'INT-007':  { pw: 'intern26',   role: 'intern',     name: '渡辺 大輝',          userId: 'INT-007',  rank: null },
};


// デモログイン: USER_CREDENTIALSから正規のユーザー情報でloginAsを呼ぶ
function demoLogin(userId) {
  const user = USER_CREDENTIALS[userId];
  if (!user) { alert('デモユーザーが見つかりません: ' + userId); return; }
  sessionStorage.setItem('coreto_role',    user.role);
  sessionStorage.setItem('coreto_user_id', user.userId);
  sessionStorage.setItem('coreto_name',    user.name);
  if (user.rank) sessionStorage.setItem('coreto_rank', user.rank);
  loginAs(user.role, user);
}
function doLogin() {
  const id = document.getElementById('login-id').value.trim();
  const pw = document.getElementById('login-pw').value;
  const errEl = document.getElementById('login-err');
  if (!id || !pw) {
    errEl.textContent = 'ログインIDとパスワードを入力してください';
    return;
  }
  const user = USER_CREDENTIALS[id];
  if (!user || user.pw !== pw) {
    errEl.textContent = 'IDまたはパスワードが正しくありません';
    // ブルートフォース対策（デモ: 3回失敗でボタン3秒ロック）
    const btn = document.getElementById('login-btn');
    if (btn) {
      const fails = parseInt(btn.dataset.fails || '0') + 1;
      btn.dataset.fails = fails;
      if (fails >= 3) {
        btn.disabled = true;
        btn.textContent = '3秒後に再試行できます';
        setTimeout(() => { btn.disabled = false; btn.textContent = 'ログイン'; btn.dataset.fails = '0'; }, 3000);
      }
    }
    return;
  }
  // 認証成功: sessionStorageにロール・ユーザー情報を保存
  sessionStorage.setItem('coreto_role',    user.role);
  sessionStorage.setItem('coreto_user_id', user.userId);
  sessionStorage.setItem('coreto_name',    user.name);
  if (user.rank) sessionStorage.setItem('coreto_rank', user.rank);
  loginAs(user.role, user);
}

function loginAs(role, user) {
  // userが渡されない場合（デモ切替ボタン）はCREDENTIALSから検索
  if (!user) {
    const uid = Object.keys(USER_CREDENTIALS).find(k => USER_CREDENTIALS[k].role === role);
    user = uid ? USER_CREDENTIALS[uid] : { role, name: role, userId: role, rank: null };
    sessionStorage.setItem('coreto_role',    user.role);
    sessionStorage.setItem('coreto_user_id', user.userId);
    sessionStorage.setItem('coreto_name',    user.name);
    if (user.rank) sessionStorage.setItem('coreto_rank', user.rank);
  }
  currentRole = role;

  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  const r = ROLES[role];
  document.getElementById('sb-av').textContent = r.av;
  // sessionStorageから実際のユーザー名を表示
  document.getElementById('sb-name').textContent = user.name || sessionStorage.getItem('coreto_name') || r.label;
  const uid   = user.userId || sessionStorage.getItem('coreto_user_id') || '';
  const rank  = user.rank   || sessionStorage.getItem('coreto_rank')    || '';
  document.getElementById('sb-role').textContent = uid + (rank ? ' / ' + rank : '') || r.label;

  renderNav(r.nav());
  r.page();
}

// ハッシュ遷移はDOMContentLoadedで処理

// ═══════════════════════════════════════════
// NAV DEFINITIONS

// ══════════════════════════════════════════════════════
// NAV 定義（ロール別 — 確定権限マトリクス準拠）
//
// HQ    : 全事業・全管理機能フルアクセス
// RE-AG : 不動産・光通信 = AG権限 ／ 人材 = PT扱い（閲覧のみ）
// HR-AG : 人材・光通信   = AG権限 ／ 不動産 = PT扱い（閲覧のみ）
// PT    : 不動産・人材 = 紹介投げ＋進捗閲覧 ／ 光通信 = 案件投げ可
// インターン : 訪問記録・光通信リード投げのみ
// ══════════════════════════════════════════════════════

// ── HQ ────────────────────────────────────────────────
// 全権限。PT管理・研修コンテンツ管理を含む管理者専用メニュー。
// 「研修・マニュアル」はAG向け閲覧ではなく「コンテンツ管理」として配置。
function hqNav() { return [
  { section: 'ダッシュボード', items: [
    { icon:'🏠', label:'HQダッシュボード',        page:'dashboard',   active: true },

    { icon:'🌐', label:'紹介ネットワーク',         page:'network' },

  { section: 'CRM / 案件', items: [
    { icon:'👥', label:'クライアント管理',         page:'crm' },

    { icon:'👤', label:'人材案件管理',              page:'hr_cases_all',badge:'4' },

    { icon:'🔗', label:'PTマッチング',             page:'matching',    badge:'3', badgeColor:'red' },
  ]},
  { section: 'スタッフ管理', items: [
    { icon:'🏢', label:'AG管理（権限・育成）',    page:'hq_admin' },
    { icon:'🤝', label:'PT管理',                   page:'pt_mgmt' },
    { icon:'🎓', label:'インターン管理',            page:'intern' },

    { icon:'📨', label:'PT招待・新規登録',          page:'pt_invite' },

function generateInvite(targetUrl) {
  const seg = () => Math.random().toString(36).slice(2,6).toUpperCase();
  const typeEl = document.getElementById('invite-type');
  const nameEl = document.getElementById('invite-name');
  const isAG   = targetUrl.includes('agent');
  const prefix = isAG ? 'CORETO' : 'COREPT';
  const token  = `${prefix}-${seg()}-${seg()}`;
  const type   = typeEl?.value || '';
  const name   = nameEl?.value.trim() || '（氏名未入力）';
  const url    = `${location.origin}${location.pathname.split('/').slice(0,-1).join('/')+'/'}${targetUrl}?invite=${token}`;
  const typeLabel = { re:'RE-AG', hr:'HR-AG', individual:'個人PT', corporate:'法人PT' }[type] || type;
  const now    = new Date();
  const expire = new Date(now.getTime() + 72*60*60*1000);
  const fmtDt  = d => `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;

  const list = document.getElementById('invite-list');
  // 空状態メッセージ削除
  const empty = list.querySelector('div[style*="text-align:center"]');
  if (empty) empty.remove();

  const card = document.createElement('div');
  card.style.cssText = 'border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:10px;background:var(--cream2)';
  card.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div>
        <div style="font-size:12px;font-weight:700;color:var(--ink)">${name}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px">
          ${typeLabel} ／ 発行: ${fmtDt(now)} ／ 期限: ${fmtDt(expire)}
        </div>
      </div>
      <span style="background:var(--em-bg);color:var(--em);font-size:10px;font-weight:700;
        padding:2px 8px;border-radius:20px">有効</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <div style="font-family:'DM Mono',monospace;font-size:15px;font-weight:700;
        color:var(--navy);letter-spacing:2px;background:#fff;border:1.5px solid var(--border);
        border-radius:7px;padding:8px 14px;flex:1;text-align:center">
        ${token}
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="topbar-btn ghost" style="flex:1;justify-content:center;font-size:11px"
        onclick="copyToken('${token}')">
        📋 コードをコピー
      </button>
      <button class="topbar-btn ghost" style="flex:1;justify-content:center;font-size:11px"
        onclick="copyInviteUrl('${url}')">
        🔗 URLをコピー
      </button>
      <button class="topbar-btn primary" style="flex:1;justify-content:center;font-size:11px"
        onclick="openSignup('${url}')">
        🚀 申込フォームを開く
      </button>
    </div>`;
  list.insertBefore(card, list.firstChild);

  // 入力欄リセット
  if (document.getElementById('invite-name')) document.getElementById('invite-name').value = '';
  showToastHub('✅ 招待コードを発行しました');
}

function copyToken(token) {
  navigator.clipboard.writeText(token).then(() => showToastHub('📋 招待コードをコピーしました'));
}
function copyInviteUrl(url) {
  navigator.clipboard.writeText(url).then(() => showToastHub('🔗 招待URLをコピーしました'));
}
function openSignup(url) {
  window.open(url, '_blank');
}

function showToastHub(msg) {
  let t = document.getElementById('hub-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'hub-toast';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-size:12px;font-weight:600;opacity:0;transition:.3s;z-index:9999;pointer-events:none;white-space:nowrap';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1'; t.style.transform = 'translateX(-50%) translateY(0)';
  setTimeout(() => { t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(10px)'; }, 3000);
}

function toggleServiceLabel(id) {
  const cb = document.getElementById(id);
  const label = document.getElementById('label-' + id);

    label.style.borderColor = 'var(--gold)';
    label.style.background = 'rgba(200,169,81,.06)';
  } else {
    label.style.borderColor = 'var(--border)';
    label.style.background = '';
  }
}

function submitUtilCase() {
  const name = document.getElementById('uf-name').value;
  const tel  = document.getElementById('uf-tel').value;
  const svcs = ['sv-elec','sv-gas','sv-net'].filter(id => document.getElementById(id).checked);
  if (!name || !tel) { showToast('お客様名と電話番号は必須です', 'warn'); return; }
  if (svcs.length === 0) { showToast('切り替え希望サービスを1つ以上選択してください', 'em'); return; }
  const svcNames = {
    'sv-elec':'電力', 'sv-gas':'ガス', 'sv-net':'光回線'
  };
  const svcStr = svcs.map(s => svcNames[s]).join('・');
  if (confirm(`以下の内容で案件を投げますか？\n\nお客様：${name}\n電話番号：${tel}\nサービス：${svcStr}\n\n担当AGに通知されます。`)) {

function openSettingsModal() {
  if (document.getElementById('s-modal')) return;
  const wrap = document.createElement('div');
  wrap.innerHTML = SETTINGS_MODAL_HTML;
  [...wrap.children].forEach(el => document.body.appendChild(el));
  const names = { hq:'田中 誠一（統括）', re_ag:'山田 誠（RE-AG）', hr_ag:'鈴木 花子（HR-AG）', pt:'佐藤 健一（PT）', intern:'渡辺 大輝（インターン）' };

  if (u) u.textContent = names[currentRole] || '—';

function closeSettingsModal() {
  ['s-overlay','s-modal'].forEach(id => { const el = document.getElementById(id); if(el) el.remove(); });
}

function doLogout() {
  showConfirm('ログアウト', 'COREBLDGからログアウトします。よろしいですか？', function() {
    ['coreto_role','coreto_user_id','coreto_name','coreto_rank','coreto_balance'].forEach(function(k){sessionStorage.removeItem(k);});
    window.location.href = 'coreto-hub-v2.html';
  }); return;
  sessionStorage.removeItem('coreto_role');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  closeSettingsModal();
}

// Auto-login as HQ for demo
window.addEventListener('DOMContentLoaded', () => {
  // 権限不足でリダイレクトされた場合の通知
  if (new URLSearchParams(location.search).get('unauthorized') === '1') {
    const errBanner = document.createElement('div');
    errBanner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#DC2626;color:#fff;text-align:center;padding:10px 16px;font-size:13px;font-weight:700;z-index:10000';
    errBanner.textContent = '🔒 アクセス権限がありません。ログインしてください。';
    document.body.prepend(errBanner);
    setTimeout(() => errBanner.remove(), 4000);
    history.replaceState(null, '', location.pathname);
  }
  // sessionStorageにroleがあれば自動ログイン（外部ページから戻った場合）
  const savedRole = sessionStorage.getItem('coreto_role');
  if (savedRole) {
    // #1修正: sessionStorageの全ユーザー情報を使って復元（再認証不要のセッション継続）
    const savedUser = {
      role:   savedRole,
      name:   sessionStorage.getItem('coreto_name')    || '',
      userId: sessionStorage.getItem('coreto_user_id') || '',
      rank:   sessionStorage.getItem('coreto_rank')    || null,
    };
    loginAs(savedRole, savedUser);
    // ハッシュがあればそのページを開く
    const hash = window.location.hash.replace('#','');
    if (hash) {
      setTimeout(() => {
        navClick(hash, document.querySelector('.nav-item') || { classList:{add:()=>{},remove:()=>{}} });
        routePage(hash);
        window.history.replaceState(null,'',window.location.pathname);
      }, 50);
    }
  }

  // #29修正: HQダッシュのKPIをlocalStorageから動的更新
  setTimeout(function() {
    try {
      var reports = JSON.parse(localStorage.getItem('CORETO_REPORTS') || '[]');
      var tasks   = JSON.parse(localStorage.getItem('CORETO_HQ_TASKS') || '[]');
      var pending = reports.filter(function(r){return r.status==='承認待ち';}).length;
      var monthly = reports.filter(function(r){
        var now = new Date(); var d = new Date(r.date||'');
        return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth();
      }).length;
      // 承認待ち件数バッジを更新
      var kpiEl = document.querySelector('[data-kpi="pending"]');
      if (kpiEl && pending > 0) kpiEl.textContent = pending + '件 承認待ち';
      // 今月成約件数を更新
      var cntEl = document.querySelector('[data-kpi="monthly-contracts"]');
      if (cntEl && monthly > 0) cntEl.textContent = monthly + '件';
    } catch(e) {}
  }, 300);

  // 動的案件タスク: CORETO_REPORTSから自分の進行中案件を表示
  setTimeout(function() {
    var dynEl = document.getElementById('ag-dynamic-cases');
    if (!dynEl) return;
    try {
      var myId = sessionStorage.getItem('coreto_user_id') || '';
      var reports = JSON.parse(localStorage.getItem('CORETO_REPORTS') || '[]');
      var myActive = reports.filter(function(r){
        return (!r.agId || r.agId === myId) && r.status !== '承認済み';
      });
      if (myActive.length === 0) return;
      myActive.slice(0,3).forEach(function(r) {
        var el = document.createElement('div');
        el.className = 'task-item';
        el.style.cursor = 'pointer';
        el.setAttribute('onclick', "location.href='coreto-contract-report-v2.html'");
        el.innerHTML =
          '<div class="task-prio mid"></div>' +
          '<div class="task-main">' +
            '<div class="task-name">' + (r.client||'—') + ' 様</div>' +
            '<div class="task-meta">' + (r.case||'—') + ' ／ ' + (r.type||'—') + ' ／ ' + r.status + '</div>' +
          '</div>' +
          '<span class="badge ' + (r.status==='承認待ち'?'badge-am':'badge-sk') + '">' + r.status + '</span>';
        dynEl.appendChild(el);
      });
    } catch(e) {}
  }, 250);

  // 残-13: HQタスク一覧にlocalStorageの動的タスクを追加
  setTimeout(() => {
    const taskList = document.getElementById('hq-task-list');
    if (!taskList) return;
    try {
      const tasks = JSON.parse(localStorage.getItem('CORETO_HQ_TASKS') || '[]');
      const reminders = JSON.parse(localStorage.getItem('CORETO_HR_REMINDERS') || '[]');
      const allDynamic = [
        ...tasks.map(t => ({ ...t, prio:'mid', badge:'承認待ち', badgeCls:'badge sky' })),
        ...reminders.filter(r=>r.status==='pending').map(r => ({
          id: r.id, title: r.label + ' — ' + r.name,
          createdAt: r.dueDate, prio:'mid', badge:'在籍確認', badgeCls:'badge violet'
        })),
      ].slice(0, 5); // 最大5件追加表示

      allDynamic.forEach(t => {
        const el = document.createElement('div');
        el.className = 'task-item';
        el.style.borderTop = '1px dashed var(--bd)';
        el.innerHTML =
          '<div class="task-prio ' + (t.prio||'mid') + '"></div>' +
          '<div class="task-main">' +
            '<div class="task-name">🔔 ' + (t.title||t.type||'—') + '</div>' +
            '<div class="task-meta">' + (t.createdAt||'') + '</div>' +
          '</div>' +
          '<span class="' + (t.badgeCls||'badge sky') + '">' + (t.badge||'確認待ち') + '</span>';
        taskList.appendChild(el);
      });
    } catch(e) {}
  }, 200);
});

// ── AI月次レポート（HQダッシュボード） ────────────────
async function aiGenerateMonthlyReport() {
  const btn = document.getElementById('ai-report-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span style="animation:spin .8s linear infinite;display:inline-block">✨</span> 生成中...'; }
  const kpi = { sales: 3840000, contracts: 28, agents: 47, pending: 14 };
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6', max_tokens: 1000,
        messages: [{ role: 'user', content:
          `不動産・人材紹介プラットフォームCOREBLDGの経営者向け月次AIレポートを生成してください。
KPI: 売上¥${kpi.sales.toLocaleString()} / 成約${kpi.contracts}件 / 稼働AG${kpi.agents}名 / 対応待ち${kpi.pending}件
JSONのみ（前置き不要）:
{"summary":"総括（2文）","positives":["好調点①","好調点②"],"concerns":["懸念①","懸念②"],"actions":["推奨アクション①","②","③"],"outlook":"来月見通し（1文）"}`
        }]
      })
    });
    const data = await resp.json();
    const res = JSON.parse(data.content[0].text.replace(/\`\`\`json|\`\`\`/g,'').trim());
    // モーダル表示
    const el = document.createElement('div');
    el.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
    el.innerHTML = `<div style="background:#fff;border-radius:14px;max-width:540px;width:100%;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:90vh;overflow-y:auto">
      <div style="font-size:9px;letter-spacing:2px;color:rgba(200,169,81,.8);font-weight:700;margin-bottom:12px">✨ AI月次経営レポート</div>
      <div style="font-size:14px;line-height:1.8;color:#202124;margin-bottom:16px">${res.summary||''}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
        <div style="background:#ECFDF5;border-radius:8px;padding:14px">
          <div style="font-size:10px;font-weight:700;color:#059669;margin-bottom:8px">📈 好調ポイント</div>
          ${(res.positives||[]).map(p=>`<div style="font-size:11px;color:#374151;margin-bottom:4px">✓ ${p}</div>`).join('')}
        </div>
        <div style="background:#FEF2F2;border-radius:8px;padding:14px">
          <div style="font-size:10px;font-weight:700;color:#DC2626;margin-bottom:8px">⚠️ 懸念事項</div>
          ${(res.concerns||[]).map(p=>`<div style="font-size:11px;color:#374151;margin-bottom:4px">• ${p}</div>`).join('')}
        </div>
      </div>
      <div style="background:#F8F9FA;border-radius:8px;padding:14px;margin-bottom:16px">
        <div style="font-size:10px;font-weight:700;color:#5F6368;margin-bottom:8px">🎯 推奨アクション</div>
        ${(res.actions||[]).map((a,i)=>`<div style="font-size:11px;color:#202124;margin-bottom:6px"><strong>${i+1}.</strong> ${a}</div>`).join('')}
      </div>
      <div style="font-size:11px;color:#5F6368;margin-bottom:20px">📅 来月見通し: ${res.outlook||''}</div>
      <button onclick="this.closest('div[style]').remove()" style="width:100%;padding:10px;background:#0D1A2D;color:#C8A951;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600">閉じる</button>
    </div>`;
    document.body.appendChild(el);
    el.onclick = e => { if (e.target === el) el.remove(); };
  } catch(e) { showToast('AI生成失敗: ' + e.message, 'rd'); }
  finally { if (btn) { btn.disabled = false; btn.innerHTML = '✨ AI月次レポート'; } }
}
