<style>
:root{--navy:#0D1A2D;--navy-l:#1E3252;--gold:#C8A951;--gold-dim:rgba(200,169,81,.15);--cream:#FFFFFF;--cream2:#F8F9FA;--white:#FFFFFF;--ink:#202124;--muted:#5F6368;--faint:#80868B;--em:#059669;--em-bg:#ECFDF5;--am:#D97706;--am-bg:#FFFBEB;--rd:#DC2626;--rd-bg:#FEF2F2;--sk:#0284C7;--sk-bg:#F0F9FF;--vt:#7C3AED;--vt-bg:#F5F3FF;--bd:#E8EAED;--bd2:#DADCE0;--sw:240px;--r:10px;--r-sm:7px;--sh:0 1px 2px rgba(60,64,67,.1),0 1px 3px rgba(60,64,67,.06)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:#FFFFFF}
.shell{display:flex;height:100vh}
.sb{width:var(--sw);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;position:relative}
.sb::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,rgba(200,169,81,.25) 0%,rgba(200,169,81,.06) 50%,transparent 100%)}
.sb-head{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-logo{font-family: 'Cormorant Garamond', serif;font-size:20px;font-weight:600;letter-spacing:5px;color:var(--gold)}
.sb-ver{font-size:9px;letter-spacing:2px;color:rgba(200,169,81,.3);font-family:'DM Mono',monospace;margin-top:2px}
.sb-user{margin:14px 14px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:9px 11px;display:flex;align-items:center;gap:9px}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--gold-dim);border:1px solid rgba(200,169,81,.25);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gold);flex-shrink:0}
.sb-un{font-size:11px;font-weight:600;color:rgba(255,255,255,.8)}
.sb-ur{font-size:9px;color:rgba(255,255,255,.3);font-family:'DM Mono',monospace}
.sb-nav{flex:1;overflow-y:auto;padding:6px 10px}
.ni{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;cursor:pointer;transition:.13s;margin-bottom:1px}
.ni:hover{background:rgba(255,255,255,.06)}.ni.active{background:rgba(200,169,81,.1)}
.ni-ic{width:22px;text-align:center;font-size:14px}
.ni-lb{font-size:11px;font-weight:500;color:rgba(255,255,255,.55)}.ni.active .ni-lb{color:var(--gold)}
.sf{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.3);transition:.13s}
.sf:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.6)}
.sb-foot{padding:10px 14px 18px;border-top:1px solid rgba(255,255,255,.05)}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;box-shadow:var(--sh)}
.tb-title{font-size:16px;font-weight:600;color:var(--ink);letter-spacing:.5px}
.tb-crumb{font-size:11px;color:var(--faint)}
.tb-crumb a{color:var(--muted);text-decoration:none}
.btn{padding:7px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;transition:.15s;font-family:'Outfit',sans-serif;border:none}
.btn-p{background:var(--navy);color:var(--gold)}.btn-p:hover{background:var(--navy-l)}
.btn-sm{padding:5px 12px;font-size:11px}
.tab-bar{padding:0 24px;background:var(--white);border-bottom:1px solid var(--bd);display:flex}
.tab{padding:12px 18px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.tab:hover{color:var(--ink)}.tab.active{color:var(--navy);border-bottom-color:var(--gold)}
.page{flex:1;overflow-y:auto;padding:24px}
.page::-webkit-scrollbar{width:5px}.page::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;font-family:'Outfit',sans-serif}
.b-em{background:var(--em-bg);color:var(--em)}.b-am{background:var(--am-bg);color:var(--am)}.b-sk{background:var(--sk-bg);color:var(--sk)}.b-nt{background:var(--cream2);color:var(--muted)}.b-vt{background:var(--vt-bg);color:var(--vt)}
.search-hero{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-l) 100%);border-radius:var(--r);padding:28px 28px 24px;margin-bottom:24px;position:relative;overflow:hidden}
.search-hero::before{content:'?';position:absolute;right:20px;top:-10px;font-size:120px;font-family:'Outfit','Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums;color:rgba(200,169,81,.06);font-weight:700;pointer-events:none}
.sh-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(200,169,81,.6);font-family:'DM Mono',monospace;margin-bottom:8px}
.sh-title{font-family:'Outfit','Noto Sans JP',sans-serif;font-size:22px;font-weight:600;color:var(--white);margin-bottom:16px}
.sh-input{width:100%;padding:11px 16px 11px 40px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:var(--r-sm);font-size:13px;color:var(--white);font-family:'Outfit','Noto Sans JP',sans-serif;outline:none;transition:.15s}
.sh-input::placeholder{color:rgba(255,255,255,.3)}
.sh-input:focus{background:rgba(255,255,255,.13);border-color:rgba(200,169,81,.4)}
.sh-input-wrap{position:relative}
.sh-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}
.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.chip{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;transition:.13s;border:1px solid var(--bd);background:var(--white);color:var(--muted)}
.chip:hover{border-color:var(--gold);color:var(--ink)}.chip.active{background:var(--navy);color:var(--gold);border-color:var(--navy)}
.faq-section{margin-bottom:24px}
.faq-section-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-left:4px}
.faq-item{background:var(--white);border:1px solid var(--bd);border-radius:var(--r-sm);margin-bottom:6px;overflow:hidden;transition:.13s}
.faq-item:hover{border-color:rgba(200,169,81,.3)}
.faq-q{padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:12px;user-select:none}
.faq-q-icon{font-size:16px;flex-shrink:0}
.faq-q-text{font-size:13px;font-weight:600;color:var(--ink);flex:1;line-height:1.5}
.faq-arrow{font-size:11px;color:var(--faint);transition:.2s;flex-shrink:0}
.faq-item.open .faq-arrow{transform:rotate(90deg)}
.faq-a{display:none;padding:0 18px 16px 46px;font-size:13px;color:var(--muted);line-height:1.8}
.faq-item.open .faq-a{display:block}
.faq-a strong{color:var(--ink)}
.faq-a a{color:var(--sk);text-decoration:none}
.manual-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.manual-card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh);cursor:pointer;transition:.15s;position:relative;overflow:hidden}
.manual-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.mc-navy::before{background:var(--navy)}.mc-em::before{background:var(--em)}.mc-sk::before{background:var(--sk)}.mc-vt::before{background:var(--vt)}.mc-am::before{background:var(--am)}.mc-gd::before{background:var(--gold)}
.manual-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 6px 20px rgba(200,169,81,.12)}
.mc-icon{font-size:24px;margin-bottom:10px}
.mc-title{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:4px}
.mc-sub{font-size:11px;color:var(--faint)}
.mc-badge{margin-top:10px}
.contact-card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:18px 20px;display:flex;align-items:center;gap:16px;box-shadow:var(--sh);margin-top:8px}
.mob-ham{display:none;flex-direction:column;align-items:center;justify-content:center;width:36px;height:36px;background:transparent;border:none;cursor:pointer;border-radius:7px;flex-shrink:0}
.mob-ham span{display:block;width:18px;height:2px;background:rgba(255,255,255,.72);margin:3px 0;border-radius:1px}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199}
@media(max-width:768px){
  .mob-ham{display:flex}.mob-overlay.show{display:block}
  .sb{position:fixed;left:calc(-1 * var(--sw));top:0;height:100vh;z-index:200;transition:left .25s ease}.sb.open{left:0}
  .shell{overflow:hidden}.content{width:100vw;min-width:0}
  .topbar{padding:0 12px;gap:8px}.tb-crumb{display:none}.page{padding:12px}
}  .manual-grid{grid-template-columns:1fr 1fr}
  .contact-card{flex-wrap:wrap}

  .tb-title,
.brand-logo,
.sb-logo,
.login-title,
.mod-title,
.page-title        {  font-weight:600; letter-spacing:.3px; }

/* Section headings inside content */
.section-title     {  font-size:12px;
                     font-weight:700; text-transform:uppercase; letter-spacing:1px;
                     color:var(--label); }

/* KPI numbers — large display (24px+): Outfit tabular */
.kpi-value, .kpi-vl, .stat-val { 
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-weight:300;
  font-variant-numeric:tabular-nums lining-nums;
  letter-spacing:-.5px;   /* tight for large numbers */
  color:var(--ink);        /* always maximum contrast */
}

/* Inline amounts in tables/lists */
.amt { font-family:'Outfit','Noto Sans JP',sans-serif;
       font-weight:600; font-variant-numeric:tabular-nums;
       color:var(--ink); }

/* Positive delta only */
.delta-up { color:var(--em); font-weight:600; font-size:.9em; }
.delta-dn { color:var(--rd); font-weight:600; font-size:.9em; }

/* IDs and codes */
.mono, [class*="-id"], [class*="-code"] { font-family:'DM Mono',monospace; font-size:.92em; }

/* Badge system — 4 states only */
.badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:20px;
         font-size:10px; font-weight:600; letter-spacing:.3px;
         font-family:'Outfit',sans-serif; white-space:nowrap; }
.b-em, .badge.emerald, .badge.em { background:var(--em-bg); color:var(--em); }
.b-am, .badge.amber,   .badge.am { background:var(--am-bg); color:var(--am); }
.b-rd, .badge.red,     .badge.rd { background:var(--rd-bg); color:var(--rd); }
.b-nt, .badge.muted,   .badge.nt { background:var(--cream2); color:var(--label); }
/* Legacy aliases → neutral */
.b-sk, .badge.sky    { background:#F0F9FF; color:#0369A1; }
.b-vt, .badge.violet { background:var(--cream2); color:var(--label); }
.b-gd, .badge.gold   { background:var(--gold-dim); color:#92740A; }




/* Brand — Cormorant only here */
.sb-logo, .brand-logo {

body, input, select, textarea, button {

.id-mono, .ag-id, .case-id {

/* ═══════════════════════════════════════════════════════════════
   COREBLDG — Google-style Typography System
   ─────────────────────────────────────────────────────────────
   大きな数値は weight:300 でサイズで存在感を出す
   Bold はラベル・ボタン・UIに使い、数値には使わない
   背景は白。装飾は最小限。余白で呼吸する。
   ═══════════════════════════════════════════════════════════════ */

/* Page background */
html, body { background:#FFFFFF !important; }

/* ── Brand (Cormorant only here) ── */
.sb-logo, .brand-logo {
  font-family: 'Cormorant Garamond', serif !important;
  letter-spacing: 5px;
}

/* ── Base ── */
body, input, select, textarea, button {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif;
}

/* ── KPI / メトリクス数値
   Google Analytics の大型数値と同じアプローチ:
   weight 300、大きなサイズ、tight letter-spacing ── */
.kpi-value, .kpi-vl {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif !important;
  font-weight: 300 !important;
  font-variant-numeric: tabular-nums lining-nums !important;
  letter-spacing: -1px !important;
  color: var(--ink) !important;
  line-height: 1 !important;
}
/* KPIカードのサイズを少し大きく（軽いweightを補う） */
.kpi-value { font-size: 32px !important;font-variant-numeric:tabular-nums}
.kpi-vl   { font-size: 28px !important; }

/* ── 中型数値（stat-val, テーブル内金額） ── */
.stat-val {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif !important;
  font-weight: 400 !important;
  font-variant-numeric: tabular-nums !important;
  color: var(--ink) !important;
}

/* ── ラベル系 ── */
.kpi-label, .kpi-sub, .stat-label {
  font-size: 11px !important;
  font-weight: 500 !important;
  letter-spacing: .5px !important;
  color: var(--label) !important;
  text-transform: none;
}

/* ── Page title ── */
.tb-title {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif;
  font-size: 16px; font-weight: 400; color: var(--ink);
  letter-spacing: 0;
}

/* ── Section title — Google style: small, spaced, gray ── */
.section-title {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif;
  font-size: 11px; font-weight: 500;
  letter-spacing: .8px;
  color: var(--label);
  text-transform: uppercase;
}

/* ── Card: white bg, very light border, minimal shadow ── */
.card {
  background: #FFFFFF;
  border: 1px solid var(--bd);
  border-radius: 8px;
  box-shadow: var(--sh);
}

/* ── KPI Card ── */
.kpi-card {
  background: #FFFFFF !important;
  border: 1px solid var(--bd) !important;
  border-radius: 8px !important;
  box-shadow: none !important;
  padding: 20px 24px !important;
}
.kpi-card.gold   { border-top: 3px solid var(--gold) !important; }
.kpi-card.emerald{ border-top: 3px solid var(--em)   !important; }
.kpi-card.amber  { border-top: 3px solid var(--am)   !important; }
.kpi-card.red    { border-top: 3px solid var(--rd)   !important; }
.kpi-card.sky    { border-top: 3px solid #1A73E8     !important; }

/* ── 入金監視・大型パネル ── */
.kpi { border-radius: 8px; border: 1px solid var(--bd); }

/* ── Badge — flat style ── */
.badge {
  border-radius: 4px !important;
  font-size: 11px !important;
  font-weight: 500 !important;
  padding: 2px 7px !important;
  letter-spacing: 0 !important;
}

/* ── Buttons ── */
.btn-primary {
  background: var(--navy) !important;
  border-radius: 6px !important;
  font-weight: 500 !important;
  letter-spacing: .2px !important;
}
.btn-ghost {
  border-radius: 6px !important;
  font-weight: 500 !important;
}

/* ── Delta (増減のみ色付き) ── */
.delta-up, .kpi-delta.up { color: var(--em) !important; font-weight: 500; font-size: .82em; }
.delta-dn, .kpi-delta.dn { color: var(--rd) !important; font-weight: 500; font-size: .82em; }

/* ── IDs ── */
[class*="-id"], [class*="-code"], .pipe-ag, .task-meta [class*="ag-"],
.id-mono { font-family: 'DM Mono', monospace; font-size: .88em; color: var(--label); }

.form-input, .form-select {

}
.form-input:focus, .form-select:focus {
  border-color: #1A73E8 !important;

}

/* ── Section separator ── */

.section-title::before { display: none; }
/* ── Google-style 数値原則 (DS v2.3) ── */
.kpi-value, .kpi-vl, .kpi-val,
.stat-val, .qs-val, .count-val,

}

var CATS=['すべて','報酬・支払い','案件管理','書類・契約','即時払い','ランク','システム操作'];
var activeCat='すべて';

function toggleFaq(el){
  var item=el.closest('.faq-item');
  var isOpen=item.classList.contains('open');
  document.querySelectorAll('.faq-item.open').forEach(function(x){x.classList.remove('open');});
  if(!isOpen) item.classList.add('open');
}

function filterFaqs(cat,el){
  activeCat=cat;
  document.querySelectorAll('.chip').forEach(function(x){x.classList.remove('active');});
  el.classList.add('active');
  renderFaqList();
}

function renderFaqList(){
  var filtered=activeCat==='すべて'?FAQS:FAQS.filter(function(f){return f.cat===activeCat;});
  var grouped={};
  filtered.forEach(function(f){if(!grouped[f.cat])grouped[f.cat]=[];grouped[f.cat].push(f);});
  var html=Object.keys(grouped).map(function(cat){
    var items=grouped[cat];
    return '<div class="faq-section"><div class="faq-section-title">'+cat+'</div>'+
      items.map(function(f){
        return '<div class="faq-item"><div class="faq-q" onclick="toggleFaq(this)">'+
          '<span class="faq-q-icon">'+f.icon+'</span>'+
          '<span class="faq-q-text">'+f.q+'</span>'+
          '<span class="faq-arrow">▶</span></div>'+
          '<div class="faq-a">'+f.a+'</div></div>';
      }).join('')+'</div>';
  }).join('');
  var c=document.getElementById('faq-list');
  if(c) c.innerHTML=html||'<div style="color:var(--faint);font-size:13px;padding:20px 0">該当する質問が見つかりません</div>';
}

function searchFaq(val){
  var q=val.toLowerCase();
  if(!q){activeCat='すべて';document.querySelectorAll('.chip').forEach(function(x,i){x.classList.toggle('active',i===0);});renderFaqList();return;}
  var matched=FAQS.filter(function(f){return f.q.toLowerCase().indexOf(q)>-1||f.a.toLowerCase().indexOf(q)>-1;});
  var c=document.getElementById('faq-list');
  if(!matched.length){c.innerHTML='<div style="color:var(--faint);font-size:13px;padding:20px 0">「'+val+'」に一致する質問が見つかりません</div>';return;}
  c.innerHTML=matched.map(function(f){
    return '<div class="faq-item"><div class="faq-q" onclick="toggleFaq(this)">'+
      '<span class="faq-q-icon">'+f.icon+'</span>'+
      '<span class="faq-q-text">'+f.q+'</span>'+
      '<span class="faq-arrow">▶</span></div>'+
      '<div class="faq-a">'+f.a+'</div></div>';
  }).join('');
}

function renderFaq(){
  var chips=CATS.map(function(c,i){return '<div class="chip'+(i===0?' active':'')+'" onclick="filterFaqs(\''+c+'\',this)">'+c+'</div>';}).join('');
  document.getElementById('pg').innerHTML=
    '<div class="search-hero">'+
      '<div class="sh-label">Help Center</div>'+
      '<div class="sh-title">何をお探しですか？</div>'+
      '<div class="sh-input-wrap"><span class="sh-icon">🔍</span>'+
      '<input class="sh-input" placeholder="キーワードで検索..." oninput="searchFaq(this.value)"></div></div>'+
    '<div class="chip-row">'+chips+'</div>'+
    '<div id="faq-list"></div>'+
    '<div style="margin-top:24px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:10px">解決しない場合</div>'+
    '<div class="contact-card">'+
      '<div style="font-size:28px">💬</div>'+
      '<div><div style="font-size:13px;font-weight:700;color:var(--ink);margin-bottom:3px">HQサポートに問い合わせる</div>'+
      '<div style="font-size:11px;color:var(--muted)">月〜金 10:00〜19:00 ／ LINE・メール対応</div></div>'+
      '<div style="margin-left:auto"><button class="btn btn-p btn-sm">HQに連絡する</button></div></div>';
  renderFaqList();
}

function switchTab(t,el){
  document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});
  el.classList.add('active');
  if(t==='faq') renderFaq(); else renderManual();
}

window.addEventListener('DOMContentLoaded',function(){
  CNAV.init('faq');
  renderFaq();
