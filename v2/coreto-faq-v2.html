<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FAQ・マニュアル — COREBLDG</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#0D1A2D;--navy-l:#1E3252;--gold:#C8A951;--gold-dim:rgba(200,169,81,.15);--cream:#F7F4EE;--cream2:#EFECE4;--white:#FFFFFF;--ink:#1A1A2E;--muted:#6B7280;--faint:#9CA3AF;--em:#059669;--em-bg:#ECFDF5;--am:#D97706;--am-bg:#FFFBEB;--rd:#DC2626;--rd-bg:#FEF2F2;--sk:#0284C7;--sk-bg:#F0F9FF;--vt:#7C3AED;--vt-bg:#F5F3FF;--bd:#E5E0D5;--bd2:#D4CFC4;--sw:240px;--r:10px;--r-sm:7px;--sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:var(--cream)}
.shell{display:flex;height:100vh}
.sb{width:var(--sw);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;position:relative}
.sb::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,rgba(200,169,81,.25) 0%,rgba(200,169,81,.06) 50%,transparent 100%)}
.sb-head{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;letter-spacing:5px;color:var(--gold)}
.sb-ver{font-size:9px;letter-spacing:2px;color:rgba(200,169,81,.3);font-family:'DM Mono',monospace;margin-top:2px}
.sb-user{margin:14px 14px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:9px 11px;display:flex;align-items:center;gap:9px}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--gold-dim);border:1px solid rgba(200,169,81,.25);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gold);flex-shrink:0}
.sb-un{font-size:11px;font-weight:600;color:rgba(255,255,255,.8)}
.sb-ur{font-size:9px;color:rgba(255,255,255,.3);font-family:'DM Mono',monospace}
.sb-nav{flex:1;overflow-y:auto;padding:6px 10px}
.nsl{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.18);padding:10px 8px 4px;font-family:'DM Mono',monospace}
.ni{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;cursor:pointer;transition:.13s;margin-bottom:1px}
.ni:hover{background:rgba(255,255,255,.06)}.ni.active{background:rgba(200,169,81,.1)}
.ni-ic{width:22px;text-align:center;font-size:14px}
.ni-lb{font-size:11px;font-weight:500;color:rgba(255,255,255,.55)}.ni.active .ni-lb{color:var(--gold)}
.sf{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.3);transition:.13s}
.sf:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.6)}
.sb-foot{padding:10px 14px 18px;border-top:1px solid rgba(255,255,255,.05)}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;box-shadow:var(--sh)}
.tb-title{font-size:16px;font-weight:600;color:var(--ink);font-family:'Cormorant Garamond',serif;letter-spacing:.5px}
.tb-crumb{font-size:11px;color:var(--faint)}
.tb-crumb a{color:var(--muted);text-decoration:none}
.tb-act{margin-left:auto;display:flex;gap:9px;align-items:center}
.btn{padding:7px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;transition:.15s;font-family:'Outfit',sans-serif;border:none}
.btn-p{background:var(--navy);color:var(--gold)}.btn-p:hover{background:var(--navy-l)}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--bd)}.btn-g:hover{background:var(--cream);color:var(--ink)}
.btn-sm{padding:5px 12px;font-size:11px}
.tab-bar{padding:0 24px;background:var(--white);border-bottom:1px solid var(--bd);display:flex}
.tab{padding:12px 18px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.tab:hover{color:var(--ink)}.tab.active{color:var(--navy);border-bottom-color:var(--gold)}
.page{flex:1;overflow-y:auto;padding:24px}
.page::-webkit-scrollbar{width:5px}.page::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.4px;font-family:'Outfit',sans-serif}
.b-em{background:var(--em-bg);color:var(--em)}.b-am{background:var(--am-bg);color:var(--am)}.b-sk{background:var(--sk-bg);color:var(--sk)}.b-nt{background:var(--cream2);color:var(--muted)}.b-vt{background:var(--vt-bg);color:var(--vt)}
/* search */
.search-wrap{position:relative;max-width:560px;margin:0 auto 28px}
.search-input{width:100%;padding:13px 18px 13px 44px;background:var(--white);border:1.5px solid var(--bd);border-radius:28px;font-size:14px;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;outline:none;transition:.15s;box-shadow:var(--sh)}
.search-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,169,81,.12)}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
/* category grid */
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px;max-width:860px;margin-left:auto;margin-right:auto}
.cat-card{background:var(--white);border:1.5px solid var(--bd);border-radius:var(--r);padding:16px;text-align:center;cursor:pointer;transition:.15s;box-shadow:var(--sh)}
.cat-card:hover{border-color:var(--gold);box-shadow:0 4px 16px rgba(200,169,81,.12);transform:translateY(-1px)}
.cat-card.active{border-color:var(--navy);background:var(--navy)}
.cat-icon{font-size:24px;margin-bottom:6px}
.cat-label{font-size:11px;font-weight:700;color:var(--ink);text-transform:uppercase;letter-spacing:.5px}
.cat-card.active .cat-label{color:var(--gold)}
.cat-count{font-size:10px;color:var(--faint);margin-top:2px}
.cat-card.active .cat-count{color:rgba(255,255,255,.3)}
/* FAQ accordion */
.faq-section{max-width:760px;margin:0 auto}
.faq-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.faq-item{background:var(--white);border:1px solid var(--bd);border-radius:var(--r-sm);margin-bottom:6px;overflow:hidden;box-shadow:var(--sh)}
.faq-q{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:.13s;gap:12px}
.faq-q:hover{background:rgba(200,169,81,.04)}
.faq-q-text{font-size:13px;font-weight:600;color:var(--ink);flex:1;line-height:1.4}
.faq-arrow{font-size:12px;color:var(--faint);transition:transform .2s;flex-shrink:0}
.faq-item.open .faq-arrow{transform:rotate(180deg)}
.faq-a{display:none;padding:0 18px 14px;font-size:13px;color:var(--muted);line-height:1.8;border-top:1px solid var(--bd)}
.faq-item.open .faq-a{display:block}
/* manual cards */
.manual-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:860px;margin:0 auto}
.manual-card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh);cursor:pointer;transition:.15s}
.manual-card:hover{border-color:var(--gold);box-shadow:0 4px 16px rgba(200,169,81,.1);transform:translateY(-1px)}
.manual-icon{font-size:28px;margin-bottom:10px}
.manual-title{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:4px}
.manual-desc{font-size:11px;color:var(--muted);line-height:1.6}
.manual-meta{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid var(--bd)}
.manual-updated{font-size:10px;color:var(--faint);font-family:'DM Mono',monospace}
/* MOBILE */
.mob-ham{display:none;flex-direction:column;align-items:center;justify-content:center;width:36px;height:36px;background:transparent;border:none;cursor:pointer;border-radius:7px;flex-shrink:0}
.mob-ham span{display:block;width:18px;height:2px;background:rgba(255,255,255,.72);margin:3px 0;border-radius:1px}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199}
@media(max-width:768px){
  .mob-ham{display:flex}.mob-overlay.show{display:block}
  .sb{position:fixed;left:calc(-1 * var(--sw));top:0;height:100vh;z-index:200;transition:left .25s ease}.sb.open{left:0}
  .shell{overflow:hidden}.content{width:100vw;min-width:0}
  .topbar{padding:0 12px;gap:8px}.tb-crumb{display:none}
  .page{padding:12px}
  .cat-grid{grid-template-columns:repeat(2,1fr)}
  .manual-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:480px){.manual-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="shell">
<nav class="sb" id="sb">
  <div class="sb-head">
    <div class="sb-logo">CORE<br>BLDG</div>
    <div class="sb-ver">v2.0 — CORETO</div>
  </div>
  <div class="sb-user">
    <div class="sb-av">AG</div>
    <div><div class="sb-un">山田 誠</div><div class="sb-ur">AG-0042 / Gold</div></div>
  </div>
  <div class="sb-nav" id="sb-nav"></div>
  <div class="sb-foot"><div class="sf" onclick="window.location.href='coreto-hub-v2.html'">⬅ ダッシュボードへ</div></div>
</nav>
<div class="content">
  <div class="topbar">
    <button class="mob-ham" onclick="toggleSb()"><span></span><span></span><span></span></button>
    <div>
      <div class="tb-title">FAQ・マニュアル</div>
      <div class="tb-crumb"><a href="coreto-hub-v2.html">COREBLDG</a> › <span>FAQ・マニュアル</span></div>
    </div>
  </div>
  <div class="tab-bar">
    <div class="tab active" id="tab-faq" onclick="switchTab('faq',this)">よくある質問</div>
    <div class="tab" id="tab-manual" onclick="switchTab('manual',this)">マニュアル一覧</div>
  </div>
  <div class="page" id="pg"></div>
</div>
</div>
<div class="mob-overlay" onclick="toggleSb()"></div>
<script src="coreto-nav-v2.js"></script>
<script>
function toggleSb(){document.querySelector('.sb').classList.toggle('open');document.querySelector('.mob-overlay').classList.toggle('show');}

const CATEGORIES = [
  {key:'all',  icon:'📋', label:'すべて',   count:24},
  {key:'re',   icon:'🏠', label:'不動産',   count:9},
  {key:'hr',   icon:'👤', label:'人材',     count:4},
  {key:'util', icon:'⚡', label:'光通信',   count:4},
  {key:'pay',  icon:'💴', label:'報酬・支払', count:5},
  {key:'sys',  icon:'🔧', label:'システム', count:2},
];

const FAQS = [
  {cat:'re', q:'IT重説とは何ですか？どのように実施しますか？', a:'IT重説（インターネットを利用した重要事項説明）は、宅建業法第35条に基づき、契約前に宅地建物取引士が行う重要事項説明をオンラインで実施する制度です。COREBLDG上でIT重説チェックリストを使用し、日程調整→ビデオ通話実施→電子署名の流れで進めます。'},
  {cat:'re', q:'収納代行とは何ですか？AGが直接受け取っていいですか？', a:'収納代行とは、敷金・前家賃等をCORETOの口座で一時受領する仕組みです。AGが直接クライアントから現金を受け取ることは禁止されています。必ずCOREBLDGの送金情報入力フォームから管理会社への振込情報を登録してください。'},
  {cat:'re', q:'成約報告はいつまでに提出する必要がありますか？', a:'成約日（契約締結日）から5営業日以内に成約報告を提出してください。期限を超えると報酬の確定・支払いが遅延する場合があります。'},
  {cat:'re', q:'内見をドタキャンされた場合はどうすればいいですか？', a:'内見管理画面から「キャンセル」を選択してください。管理会社への連絡も忘れずに行ってください。当日キャンセルが続く場合はHQに報告してください。'},
  {cat:'re', q:'売買案件で司法書士はどのように手配しますか？', a:'士業連携管理ページから対応可能な司法書士を確認し、HQに案件割当を依頼してください。AGが直接司法書士に連絡することは原則禁止です。'},
  {cat:'re', q:'管理会社から書類の追加を求められた場合はどうしますか？', a:'管理会社ごとに必要書類は異なります。管理会社から指定された書類をクライアントに準備してもらい、案件詳細画面の書類管理セクションからアップロードしてください。'},
  {cat:'re', q:'案件IDの命名ルールを教えてください。', a:'賃貸：RENT-XXXX、売買：SALE-XXXX、人材：HR-XXXX、光通信：UTL-XXXXの形式です。番号はCOREBLDGが自動採番します。'},
  {cat:'re', q:'宅建士の立会いが必要な手続きはどれですか？', a:'重要事項説明（IT重説含む）には必ず宅建士の立会いが必要です。士業連携管理画面から担当宅建士を確認してください。'},
  {cat:'re', q:'引き渡し後に問題が発生した場合の対応は？', a:'まずHQに報告してください。設備不具合は管理会社対応、契約内容に関するトラブルはHQ経由で対応します。クライアントへの返答は必ずHQ確認後に行ってください。'},
  {cat:'hr', q:'人材案件のクライアントとはどこまで連絡を取っていいですか？', a:'HR-AGとしての担当案件のクライアントとは直接連絡可能です。RE-AGは人材案件についてはPT扱いのため、紹介後の進捗確認のみCOREBLDG上で行い、直接連絡は不可です。'},
  {cat:'hr', q:'採用決定後の入社日確認フローを教えてください。', a:'HRクライアント詳細画面から入社予定日を登録し、入社確認後に成約報告を提出してください。採用後3ヶ月間の在籍確認が報酬確定の条件となります。'},
  {cat:'hr', q:'人材紹介の報酬計算方法を教えてください。', a:'内定年収の一定割合（ランクによって異なる）が仲介料となります。報酬計算ページのシミュレーターで事前確認できます。'},
  {cat:'hr', q:'求職者がキャンセルした場合の対応は？', a:'内定承諾後のキャンセルは速やかにHQへ報告してください。入社前キャンセルの場合、報酬は発生しません。'},
  {cat:'util', q:'光通信案件はPTでも登録できますか？', a:'はい。光通信案件に限り、PTも新規案件の投げ込みが可能です。COREBLDGの光通信SFAページから「案件を投げる」を選択してください。'},
  {cat:'util', q:'光通信の開通後に報酬が出るタイミングはいつですか？', a:'回線開通確認後、翌月の支払いサイクルで報酬が確定されます。開通状況はCOREBLDG上の光通信SFAで確認できます。'},
  {cat:'util', q:'光通信の既存回線からの乗り換えは提案していいですか？', a:'はい、乗り換え提案は可能です。ただし虚偽説明や強引な勧誘は厳禁です。クライアントの現在の契約状況を確認した上で提案してください。'},
  {cat:'util', q:'光通信案件でクレームが発生した場合は？', a:'即座にHQへ報告してください。通信会社への連絡はHQ経由で行います。クライアントへの対応はHQの指示に従ってください。'},
  {cat:'pay', q:'報酬はいつ振り込まれますか？', a:'成約報告HQ承認後、翌月末払いが基本です。即時払いを申請した場合は承認後1営業日以内に振り込まれます（手数料2.5%）。'},
  {cat:'pay', q:'報酬率はどのように決まりますか？', a:'ランクによって異なります。Bronze：60%、Silver：70%、Gold：80%、Platinum：90%です。ランクは月次ポイントの累積で決定されます。'},
  {cat:'pay', q:'即時払いの申請条件は何ですか？', a:'成約報告が提出済み・HQ確認中の案件が対象です。申請上限は報酬額の80%までです。同一案件で複数回の申請はできません。'},
  {cat:'pay', q:'PT紹介ボーナスとはなんですか？', a:'PTが紹介した案件が成約した場合、AGにボーナスが支給されます。報酬率は事業種別により異なり、不動産・人材で20〜30%です。'},
  {cat:'pay', q:'振込先口座を変更したい場合はどうしますか？', a:'COREBLDGのKYC・口座登録ページから口座変更申請を行ってください。HQの確認後、翌月払い分から新口座への振込となります。'},
  {cat:'sys', q:'ログインIDを忘れた場合はどうしますか？', a:'ログインページの「IDをお忘れの方」から登録メールアドレスを入力してください。HQからIDをお知らせします。パスワードリセットはアカウント設定ページから行えます。'},
  {cat:'sys', q:'COREBLDGにログインできない場合はどうしますか？', a:'まずパスワードが正しいか確認してください。3回連続で失敗するとアカウントが一時ロックされます。HQまでLINE WORKSでご連絡ください。'},
];

let currentCat = 'all';

function switchTab(t, el){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  if(el) el.classList.add('active');
  if(t==='faq') renderFaq();
  else renderManual();
}

function renderFaq(){
  const pg = document.getElementById('pg');
  pg.innerHTML = `
  <div class="search-wrap">
    <div class="search-icon">🔍</div>
    <input class="search-input" placeholder="質問を検索…" oninput="filterFaq(this.value)" id="faq-search">
  </div>
  <div class="cat-grid" id="cat-grid">${CATEGORIES.map(c=>`
    <div class="cat-card ${c.key===currentCat?'active':''}" onclick="setCat('${c.key}')">
      <div class="cat-icon">${c.icon}</div>
      <div class="cat-label">${c.label}</div>
      <div class="cat-count">${c.count}件</div>
    </div>`).join('')}
  </div>
  <div class="faq-section" id="faq-list">${buildFaqItems()}</div>`;
}

function buildFaqItems(query=''){
  const items = FAQS.filter(f=>(currentCat==='all'||f.cat===currentCat)&&(!query||f.q.includes(query)||f.a.includes(query)));
  if(!items.length) return `<div style="text-align:center;padding:40px;color:var(--faint)">該当するFAQが見つかりませんでした</div>`;
  return items.map((f,i)=>`
    <div class="faq-item" id="faq-${i}">
      <div class="faq-q" onclick="toggleFaq(${i})">
        <div class="faq-q-text">${f.q}</div>
        <div class="faq-arrow">▼</div>
      </div>
      <div class="faq-a" style="padding-top:12px">${f.a}</div>
    </div>`).join('');
}

function toggleFaq(i){
  document.getElementById('faq-'+i)?.classList.toggle('open');
}

function setCat(key){
  currentCat = key;
  renderFaq();
}

function filterFaq(query){
  document.getElementById('faq-list').innerHTML = buildFaqItems(query);
}

const MANUALS = [
  {icon:'🏠', title:'賃貸仲介マニュアル（AG版）', desc:'内見〜成約〜IT重説の全フロー。AGが日常業務で参照するメインマニュアル。', tag:'RE-AG', updated:'2026/03/01'},
  {icon:'🏢', title:'売買仲介マニュアル（基礎編）', desc:'売買案件の進め方、司法書士連携、契約書の読み方。', tag:'RE-AG', updated:'2026/02/15'},
  {icon:'👤', title:'人材紹介マニュアル（AG版）', desc:'求職者対応から入社確認まで。HR-AG向け全工程ガイド。', tag:'HR-AG', updated:'2026/01/20'},
  {icon:'⚡', title:'光通信SFAマニュアル', desc:'光通信案件の登録・進捗管理・報酬確認の操作手順。', tag:'全ロール', updated:'2026/02/01'},
