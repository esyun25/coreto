<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>専任宅建士管理 — COREBLDG</title>
<link rel="stylesheet" href="coreto-design-system.css">
<style>

:root{--navy:#0D1A2D;--navy-l:#1E3252;--gold:#C8A951;--gold-dim:rgba(200,169,81,.15);--cream:#FFFFFF;--cream2:#F8F9FA;--white:#FFFFFF;--ink:#202124;--muted:#5F6368;--faint:#80868B;--em:#059669;--em-bg:#ECFDF5;--am:#D97706;--am-bg:#FFFBEB;--rd:#DC2626;--rd-bg:#FEF2F2;--sk:#0284C7;--sk-bg:#F0F9FF;--vt:#7C3AED;--vt-bg:#F5F3FF;--bd:#E8EAED;--bd2:#DADCE0;--sw:240px;--r:10px;--r-sm:7px;--sh:0 1px 2px rgba(60,64,67,.1),0 1px 3px rgba(60,64,67,.06)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:#FFFFFF}
.shell{display:flex;height:100vh}
.sb{width:var(--sw);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;position:relative}
.sb::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,rgba(200,169,81,.25) 0%,rgba(200,169,81,.06) 50%,transparent 100%)}
.sb-head{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-logo{font-family: 'Cormorant Garamond', serif;font-size:20px;font-weight:600;letter-spacing:5px;color:var(--gold)}
.sb-ver{font-size:9px;letter-spacing:2px;color:rgba(200,169,81,.3);font-family:'DM Mono',monospace;margin-top:2px}
.sb-user{margin:14px 14px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:9px 11px;display:flex;align-items:center;gap:9px}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--gold-dim);border:1px solid rgba(200,169,81,.25);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gold);flex-shrink:0}
.sb-un{font-size:11px;font-weight:600;color:rgba(255,255,255,.8)}
.sb-ur{font-size:9px;color:rgba(255,255,255,.3);font-family:'DM Mono',monospace}
.sb-nav{flex:1;overflow-y:auto;padding:6px 10px}
.nsl{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.18);padding:10px 8px 4px;font-family:'DM Mono',monospace}
.ni{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;cursor:pointer;transition:.13s;margin-bottom:1px}
.ni:hover{background:rgba(255,255,255,.06)}
.ni.active{background:rgba(200,169,81,.1)}
.ni-ic{width:22px;text-align:center;font-size:14px}
.ni-lb{font-size:11px;font-weight:500;color:rgba(255,255,255,.55)}
.ni.active .ni-lb{color:var(--gold)}
.sf{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.3);transition:.13s}
.sf:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.6)}
.sb-foot{padding:10px 14px 18px;border-top:1px solid rgba(255,255,255,.05)}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;box-shadow:var(--sh)}
.tb-title{font-size:16px;font-weight:600;color:var(--ink);letter-spacing:.5px}
.tb-crumb{font-size:11px;color:var(--faint)}
.tb-crumb a{color:var(--muted);text-decoration:none}
.tb-act{margin-left:auto;display:flex;gap:9px;align-items:center}
.btn{padding:7px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;transition:.15s;font-family:'Outfit',sans-serif;border:none}
.btn-p{background:var(--navy);color:var(--gold)}.btn-p:hover{background:var(--navy-l)}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--bd)}.btn-g:hover{background:var(--cream);color:var(--ink)}
.btn-rd{background:var(--rd-bg);color:var(--rd);border:1px solid rgba(220,38,38,.2)}.btn-rd:hover{background:var(--rd);color:#fff}
.btn-sm{padding:5px 12px;font-size:11px}
.tab-bar{padding:0 24px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;gap:0}
.tab{padding:12px 18px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.tab:hover{color:var(--ink)}.tab.active{color:var(--navy);border-bottom-color:var(--gold)}
.page{flex:1;overflow-y:auto;padding:24px}
.page::-webkit-scrollbar{width:5px}.page::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;font-family:'Outfit',sans-serif}
.b-em{background:var(--em-bg);color:var(--em)}.b-am{background:var(--am-bg);color:var(--am)}.b-rd{background:var(--rd-bg);color:var(--rd)}.b-sk{background:var(--sk-bg);color:var(--sk)}.b-vt{background:var(--vt-bg);color:var(--vt)}.b-nt{background:var(--cream2);color:var(--muted)}.b-gd{background:var(--gold-dim);color:var(--am)}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.gd::before{background:var(--gold)}.kpi.em::before{background:var(--em)}.kpi.sk::before{background:var(--sk)}.kpi.am::before{background:var(--am)}
.kpi-lb{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.kpi-vl{font-size:24px;font-weight:700;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums lining-nums;color:var(--ink);margin-top:4px}
.card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:18px}
.card-head{padding:14px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--cream)}
.card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink)}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--faint);padding:9px 14px;border-bottom:2px solid var(--bd);text-align:left;background:var(--cream)}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--bd);color:var(--ink);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(200,169,81,.03)}
/* Settings */
.set-section{margin-bottom:22px}
.set-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--white);border:1px solid var(--bd);border-radius:var(--r-sm);margin-bottom:6px}
.set-info{flex:1}
.set-label{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:2px}
.set-desc{font-size:11px;color:var(--muted)}
.toggle{width:42px;height:24px;background:var(--bd2);border-radius:12px;position:relative;cursor:pointer;transition:.2s;flex-shrink:0}
.toggle.on{background:var(--em)}
.toggle::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:3px;left:3px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{left:21px}
.set-input{padding:7px 12px;background:var(--cream);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:13px;color:var(--ink);font-family:'Outfit',sans-serif;min-width:160px;outline:none}
.set-input:focus{border-color:var(--gold)}
/* modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--white);border-radius:12px;width:520px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:14px;font-weight:700;color:var(--ink)}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted)}
.modal-body{padding:20px 22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field select{width:100%;padding:9px 12px;background:var(--cream);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:13px;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;outline:none;transition:.15s}
.field input:focus,.field select:focus{border-color:var(--gold)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-foot{padding:14px 22px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:8px}
/* permission matrix */
.perm-table{width:100%;border-collapse:collapse;font-size:11px}
.perm-table th{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--faint);padding:8px 10px;border-bottom:2px solid var(--bd);text-align:center;background:var(--cream)}
.perm-table th:first-child{text-align:left}
.perm-table td{padding:10px;border-bottom:1px solid var(--bd);text-align:center;vertical-align:middle}
.perm-table td:first-child{text-align:left;font-size:12px;font-weight:600;color:var(--ink)}
.perm-table tr:last-child td{border-bottom:none}
.perm-check{width:18px;height:18px;border-radius:4px;border:none;cursor:default}
.perm-check.allow{background:var(--em-bg);color:var(--em);display:inline-flex;align-items:center;justify-content:center;font-size:11px}
.perm-check.deny{background:var(--rd-bg);color:var(--rd);display:inline-flex;align-items:center;justify-content:center;font-size:11px}
.perm-check.partial{background:var(--am-bg);color:var(--am);display:inline-flex;align-items:center;justify-content:center;font-size:11px}
/* MOBILE */
.mob-ham{display:none;flex-direction:column;align-items:center;justify-content:center;width:36px;height:36px;background:transparent;border:none;cursor:pointer;border-radius:7px;flex-shrink:0}
.mob-ham span{display:block;width:18px;height:2px;background:rgba(255,255,255,.72);margin:3px 0;border-radius:1px}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199}
@media(max-width:768px){
  .mob-ham{display:flex}
  .mob-overlay.show{display:block}
  .sb{position:fixed;left:calc(-1 * var(--sw));top:0;height:100vh;z-index:200;transition:left .25s ease}
  .sb.open{left:0}
  .shell{overflow:hidden}.content{width:100vw;min-width:0}
  .topbar{padding:0 12px;gap:8px}.tb-crumb{display:none}
  .page{padding:12px}
}  .kpi-row{grid-template-columns:1fr 1fr!important}
  .field-row{grid-template-columns:1fr}
  table,tbl{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}

  .tb-title,
.brand-logo,
.sb-logo,
.login-title,
.mod-title,
.page-title        {  font-weight:600; letter-spacing:.3px; }

/* Section headings inside content */
.section-title     {  font-size:12px;
                     font-weight:700; text-transform:uppercase; letter-spacing:1px;
                     color:var(--label); }

/* KPI numbers — large display (24px+): Outfit tabular */
.kpi-value, .kpi-vl, .stat-val { 
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-weight:300;
  font-variant-numeric:tabular-nums lining-nums;
  letter-spacing:-.5px;   /* tight for large numbers */
  color:var(--ink);        /* always maximum contrast */
}

/* Inline amounts in tables/lists */
.amt { font-family:'Outfit','Noto Sans JP',sans-serif;
       font-weight:600; font-variant-numeric:tabular-nums;
       color:var(--ink); }

/* Positive delta only */
.delta-up { color:var(--em); font-weight:600; font-size:.9em; }
.delta-dn { color:var(--rd); font-weight:600; font-size:.9em; }

/* IDs and codes */
.mono, [class*="-id"], [class*="-code"] { font-family:'DM Mono',monospace; font-size:.92em; }

/* Badge system — 4 states only */
.badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:20px;
         font-size:10px; font-weight:600; letter-spacing:.3px;
         font-family:'Outfit',sans-serif; white-space:nowrap; }
.b-em, .badge.emerald, .badge.em { background:var(--em-bg); color:var(--em); }
.b-am, .badge.amber,   .badge.am { background:var(--am-bg); color:var(--am); }
.b-rd, .badge.red,     .badge.rd { background:var(--rd-bg); color:var(--rd); }
.b-nt, .badge.muted,   .badge.nt { background:var(--cream2); color:var(--label); }
/* Legacy aliases → neutral */
.b-sk, .badge.sky    { background:#F0F9FF; color:#0369A1; }
.b-vt, .badge.violet { background:var(--cream2); color:var(--label); }
.b-gd, .badge.gold   { background:var(--gold-dim); color:#92740A; }




/* Brand — Cormorant only here */
.sb-logo, .brand-logo {
  font-family:'Cormorant Garamond',serif !important;
  letter-spacing:5px;
}
/* Everything else: Outfit */
body, input, select, textarea, button {
  font-family:'Outfit','Noto Sans JP',sans-serif;
}

/* ── Page structure ── */
.tb-title {
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-size:18px; font-weight:600; color:var(--ink);
  letter-spacing:-.2px;
}
.login-title {
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-size:24px; font-weight:600; color:var(--ink);
  letter-spacing:-.3px;
}
.section-title {
  
  font-size:11px; font-weight:700;
  text-transform:uppercase; letter-spacing:1.2px;
  color:var(--label);
}

/* ── Numbers & Amounts — always --ink, always Outfit ── */
.kpi-value, .kpi-vl {
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-weight:300 !important;
  font-variant-numeric:tabular-nums lining-nums !important;
  color:var(--ink);
  letter-spacing:-.5px;
}
.stat-val {
  font-family:'Outfit','Noto Sans JP',sans-serif !important;
  font-weight:300 !important;
  font-variant-numeric:tabular-nums !important;
  color:var(--ink) !important;
}
.kpi-label, .stat-label, .kpi-sub {
  color:var(--label) !important;
  font-weight:500;
}

/* ── Delta (the ONE exception: direction of change) ── */
.delta-up { color:var(--em) !important; }
.delta-dn { color:var(--rd) !important; }

/* ── IDs / codes ── */
.id-mono, .ag-id, .case-id {
  font-family:'DM Mono',monospace;
  font-size:.88em; color:var(--label);
}

/* ── Badge system: 4 states only ── */
.badge {
  display:inline-flex; align-items:center;
  padding:2px 8px; border-radius:20px;
  font-size:10px; font-weight:600; letter-spacing:.3px;
  font-family:'Outfit',sans-serif; white-space:nowrap;
  font-variant-numeric:tabular-nums;
}
.badge.emerald, .badge.em { background:#ECFDF5; color:#059669; }
.badge.amber,   .badge.am { background:#FFFBEB; color:#D97706; }
.badge.red,     .badge.rd { background:#FEF2F2; color:#DC2626; }
.badge.muted,   .badge.nt,
.badge.sky,     .badge.violet,
.badge.gold               { background:var(--cream2); color:var(--label); }


/* ═══════════════════════════════════════════════════════════════
   COREBLDG — Google-style Typography System
   ─────────────────────────────────────────────────────────────
   大きな数値は weight:300 でサイズで存在感を出す
   Bold はラベル・ボタン・UIに使い、数値には使わない
   背景は白。装飾は最小限。余白で呼吸する。
   ═══════════════════════════════════════════════════════════════ */

/* Page background */
html, body { background:#FFFFFF !important; }

/* ── Brand (Cormorant only here) ── */
.sb-logo, .brand-logo {
  font-family: 'Cormorant Garamond', serif !important;
  letter-spacing: 5px;
}

/* ── Base ── */
body, input, select, textarea, button {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif;
}

/* ── KPI / メトリクス数値
   Google Analytics の大型数値と同じアプローチ:
   weight 300、大きなサイズ、tight letter-spacing ── */
.kpi-value, .kpi-vl {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif !important;
  font-weight: 300 !important;
  font-variant-numeric: tabular-nums lining-nums !important;
  letter-spacing: -1px !important;
  color: var(--ink) !important;
  line-height: 1 !important;
}
/* KPIカードのサイズを少し大きく（軽いweightを補う） */
.kpi-value { font-size: 32px !important;font-variant-numeric:tabular-nums}
.kpi-vl   { font-size: 28px !important; }

/* ── 中型数値（stat-val, テーブル内金額） ── */
.stat-val {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif !important;
  font-weight: 400 !important;
  font-variant-numeric: tabular-nums !important;
  color: var(--ink) !important;
}

/* ── ラベル系 ── */
.kpi-label, .kpi-sub, .stat-label {
  font-size: 11px !important;
  font-weight: 500 !important;
  letter-spacing: .5px !important;
  color: var(--label) !important;
  text-transform: none;
}

/* ── Page title ── */
.tb-title {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif;
  font-size: 16px; font-weight: 400; color: var(--ink);
  letter-spacing: 0;
}

/* ── Section title — Google style: small, spaced, gray ── */
.section-title {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif;
  font-size: 11px; font-weight: 500;
  letter-spacing: .8px;
  color: var(--label);
  text-transform: uppercase;
}

/* ── Card: white bg, very light border, minimal shadow ── */
.card {
  background: #FFFFFF;
  border: 1px solid var(--bd);
  border-radius: 8px;
  box-shadow: var(--sh);
}

/* ── KPI Card ── */
.kpi-card {
  background: #FFFFFF !important;
  border: 1px solid var(--bd) !important;
  border-radius: 8px !important;
  box-shadow: none !important;
  padding: 20px 24px !important;
}
.kpi-card.gold   { border-top: 3px solid var(--gold) !important; }
.kpi-card.emerald{ border-top: 3px solid var(--em)   !important; }
.kpi-card.amber  { border-top: 3px solid var(--am)   !important; }
.kpi-card.red    { border-top: 3px solid var(--rd)   !important; }
.kpi-card.sky    { border-top: 3px solid #1A73E8     !important; }

/* ── 入金監視・大型パネル ── */
.kpi { border-radius: 8px; border: 1px solid var(--bd); }

/* ── Badge — flat style ── */
.badge {
  border-radius: 4px !important;
  font-size: 11px !important;
  font-weight: 500 !important;
  padding: 2px 7px !important;
  letter-spacing: 0 !important;
}

/* ── Buttons ── */
.btn-primary {
  background: var(--navy) !important;
  border-radius: 6px !important;
  font-weight: 500 !important;
  letter-spacing: .2px !important;
}
.btn-ghost {
  border-radius: 6px !important;
  font-weight: 500 !important;
}

/* ── Delta (増減のみ色付き) ── */
.delta-up, .kpi-delta.up { color: var(--em) !important; font-weight: 500; font-size: .82em; }
.delta-dn, .kpi-delta.dn { color: var(--rd) !important; font-weight: 500; font-size: .82em; }

/* ── IDs ── */
[class*="-id"], [class*="-code"], .pipe-ag, .task-meta [class*="ag-"],
.id-mono { font-family: 'DM Mono', monospace; font-size: .88em; color: var(--label); }

/* ── Form inputs — Google style ── */
.form-input, .form-select {
  border: 1px solid var(--bd) !important;
  border-radius: 4px !important;
  background: #FFFFFF !important;
  font-family: 'Outfit', 'Noto Sans JP', sans-serif !important;
  font-size: 14px !important;
  color: var(--ink) !important;
  padding: 8px 12px !important;
}
.form-input:focus, .form-select:focus {
  border-color: #1A73E8 !important;
  outline: none !important;
}

/* ── Section separator ── */

.section-title::before { display: none; }
/* ── Google-style 数値原則 (DS v2.3) ── */
.kpi-value, .kpi-vl, .kpi-val,
.stat-val, .qs-val, .count-val,
.td-amt, .bc-vl, .bc-total-vl,
.rr-amount, .amount-val, .srv,
.visit-reward, .lb-val,
.mf-kpi-vl, .mf-reward {
  font-family:'Outfit','Noto Sans JP',sans-serif !important;
  font-weight:300 !important;
  font-variant-numeric:tabular-nums !important;
}
.kpi-value { font-size:32px !important; }
.kpi-vl    { font-size:28px !important; }


/* ── ページ固有 ── */
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--bd);margin-bottom:24px}
.tab-btn{padding:10px 20px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;

/* 宅建士カード */
.tk-card{background:#fff;border:1px solid var(--bd);border-radius:12px;
  padding:18px 20px;margin-bottom:12px;transition:.15s}
.tk-card:hover{box-shadow:var(--sh2)}
.tk-card.expiry-warn{border-color:#FCD34D;background:#FFFBEB}
.tk-card.expiry-danger{border-color:var(--rd);background:var(--rd-bg)}

/* IT重説負荷バー */

/* バッジ */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;

.badge-active{background:var(--em-bg);color:var(--em)}

.badge-itsetsu{background:#EDE9FE;color:#5B21B6}
.badge-db-ok{background:var(--em-bg);color:var(--em)}
.badge-db-ng{background:var(--rd-bg);color:var(--rd)}

.badge-rank-silver{background:#F3F4F6;color:#374151}

.act-primary{background:var(--navy);color:#fff}
.act-primary:hover{background:var(--navy-l)}
.act-warn{background:var(--am-bg);color:var(--am);border:1px solid rgba(217,119,6,.3)}
.act-danger{background:var(--rd-bg);color:var(--rd);border:1px solid rgba(220,38,38,.2)}
.act-ghost{background:transparent;border:1px solid var(--bd);color:var(--muted)}
.act-ghost:hover{color:var(--ink);border-color:var(--bd2)}

/* 統計カード */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
@media(max-width:680px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:14px;text-align:center}

/* 専任解除モーダル */

// ════════════════════════════════════════════════
// デモデータ
// ════════════════════════════════════════════════
const TODAY = new Date('2026-03-10');

const TAKKEN = []; /* 動的生成 */

let _dismissTarget = null;

// ════════════════════════════════════════════════
// ユーティリティ
// ════════════════════════════════════════════════
function toggleSb(){
  document.querySelector('.sb').classList.toggle('open');
  document.querySelector('.mob-overlay').classList.toggle('show');
}
function showToast(msg, type=''){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = {warn:'var(--am)', ok:'var(--em)', danger:'var(--rd)'}[type] || 'var(--navy)';
  t.style.opacity='1'; t.style.transform='translateX(-50%) translateY(0)';
  setTimeout(()=>{t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(10px)';},3000);
}

function daysUntil(dateStr){
  const d = new Date(dateStr);
  return Math.ceil((d - TODAY) / (1000*60*60*24));
}

function expiryStatus(dateStr){
  const days = daysUntil(dateStr);
  if (days < 0)  return {label:`期限切れ（${Math.abs(days)}日超過）`, cls:'danger', dot:'#DC2626'};
  if (days <= 30) return {label:`残${days}日`, cls:'warn', dot:'#D97706'};
  if (days <= 90) return {label:`残${days}日`, cls:'', dot:'#F59E0B'};
  return {label:`残${days}日`, cls:'ok', dot:'#059669'};
}

function rankBadge(rank){
  const m = {gold:'badge-rank-gold',silver:'badge-rank-silver',
             bronze:'badge-rank-bronze',platinum:'badge-rank-platinum'};
  const l = {gold:'Gold',silver:'Silver',bronze:'Bronze',platinum:'Platinum'};
  return `<span class="badge ${m[rank]||''}">${l[rank]||rank}</span>`;
}

function dbBadge(status){
  return {
    verified: '<span class="badge badge-db-ok">✅ DB照合済</span>',
    pending:  '<span class="badge badge-db-pending">⏳ 照合中</span>',
    mismatch: '<span class="badge badge-db-ng">❌ 不一致</span>',
  }[status] || status;
}

// ════════════════════════════════════════════════
// 統計
// ════════════════════════════════════════════════
function renderStats(){
  const active   = TAKKEN.filter(t=>t.active).length;
  const expiring = TAKKEN.filter(t=>t.active && daysUntil(t.certExpiry) <= 90 && daysUntil(t.certExpiry) >= 0).length;
  const expired  = TAKKEN.filter(t=>daysUntil(t.certExpiry) < 0).length;
  const totalIt  = TAKKEN.filter(t=>t.active).reduce((s,t)=>s+t.itsetsuThisMonth,0);
  document.getElementById('stat-grid').innerHTML = [
    {val:active,   lbl:'登録中',           color:'var(--em)'},
    {val:TAKKEN.length - active, lbl:'解除済み', color:'var(--muted)'},
    {val:expiring, lbl:'90日以内に期限切れ', color:'var(--am)'},
    {val:totalIt,  lbl:'今月IT重説件数',    color:'var(--navy)'},
  ].map(s=>`
    <div class="stat-card">
      <div class="stat-val" style="color:${s.color}">${s.val}</div>
      <div class="stat-lbl">${s.lbl}</div>
    </div>`).join('');
}

// ════════════════════════════════════════════════
// タブ切替
// ════════════════════════════════════════════════
function switchTab(tab){
  ['list','expiry','load'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
  const TAB_MAP = {list:renderList, expiry:renderExpiry, load:renderLoad};
  TAB_MAP[tab]?.();
}

// ════════════════════════════════════════════════
// TAB 1: 登録一覧
// ════════════════════════════════════════════════
function renderList(){
  const el = document.getElementById('tab-content');
  const sorted = [...TAKKEN].sort((a,b) => b.active - a.active || a.name.localeCompare(b.name));

  el.innerHTML = sorted.map(tk => {
    const exp   = expiryStatus(tk.certExpiry);
    const cardCls = !tk.active ? 'inactive' : exp.cls === 'danger' ? 'expiry-danger' : exp.cls === 'warn' ? 'expiry-warn' : '';
    const maxLoad = Math.max(...TAKKEN.map(t=>t.itsetsuCount), 1);
    const loadPct = Math.round(tk.itsetsuCount / maxLoad * 100);
    const loadColor = loadPct >= 80 ? 'var(--rd)' : loadPct >= 50 ? 'var(--am)' : 'var(--em)';

    return `
    <div class="tk-card ${cardCls}">
      <div class="tk-head">
        <div class="tk-av">${tk.name.slice(0,1)}</div>
        <div style="flex:1">
          <div class="tk-name">${tk.name}</div>
          <div class="tk-id">${tk.agId} ／ ${tk.kana}</div>
          <div class="tk-badges">
            <span class="badge badge-sennin">専任宅建士</span>
            ${rankBadge(tk.rank)}
            ${tk.active
              ? '<span class="badge badge-active">登録中</span>'
              : '<span class="badge badge-inactive">解除済み</span>'}
            ${dbBadge(tk.dbStatus)}
            ${tk.itsetsuCount > 0 ? `<span class="badge badge-itsetsu">IT重説 ${tk.itsetsuCount}件</span>` : ''}
          </div>
        </div>
        ${tk.active ? `
        <div style="display:flex;gap:6px;flex-shrink:0">
          <button class="act-btn act-ghost" style="font-size:10px"
            onclick="sendTakkenReminder(this)" data-name="${tk.name}">📧</button>
          <button class="act-btn act-danger" onclick="openDismissModal('${tk.agId}')">
            🔓 専任解除
          </button>
        </div>` : ''}
      </div>

      <div class="tk-grid">
        <div class="tk-field">
          <div class="tk-field-lbl">宅建士証番号</div>
          <div class="tk-field-val mono">${tk.takkenNo}</div>
        </div>
        <div class="tk-field">
          <div class="tk-field-lbl">登録都道府県</div>
          <div class="tk-field-val">${tk.takkenPref}</div>
        </div>
        <div class="tk-field">
          <div class="tk-field-lbl">証有効期限</div>
          <div class="tk-field-val ${exp.cls}">${tk.certExpiry}（${exp.label}）</div>
        </div>
        <div class="tk-field">
          <div class="tk-field-lbl">IT重説（今月）</div>
          <div class="tk-field-val">${tk.itsetsuThisMonth} 件</div>
        </div>
        <div class="tk-field">
          <div class="tk-field-lbl">IT重説（累計）</div>
          <div class="tk-field-val">
            ${tk.itsetsuCount} 件
            <div class="load-bar"><div class="load-fill" style="width:${loadPct}%;background:${loadColor}"></div></div>
          </div>
        </div>
        <div class="tk-field">
          <div class="tk-field-lbl">登録日</div>
          <div class="tk-field-val">${tk.joinedAt}</div>
        </div>
      </div>

      <div style="display:flex;align-items:center;gap:8px;font-size:10px;color:var(--muted)">
        📧 <span class="mono">${tk.email}</span>
        <span style="margin-left:8px">📱 ${tk.phone}</span>
      </div>
    </div>`;
  }).join('');
}

// ════════════════════════════════════════════════
// TAB 2: 有効期限管理
// ════════════════════════════════════════════════
function renderExpiry(){
  const el = document.getElementById('tab-content');
  const sorted = [...TAKKEN].filter(t=>t.active).sort((a,b) =>
    new Date(a.certExpiry) - new Date(b.certExpiry)
  );

  const danger  = sorted.filter(t => daysUntil(t.certExpiry) < 0);
  const warn30  = sorted.filter(t => { const d=daysUntil(t.certExpiry); return d>=0 && d<=30; });
  const warn90  = sorted.filter(t => { const d=daysUntil(t.certExpiry); return d>30 && d<=90; });
  const safe    = sorted.filter(t => daysUntil(t.certExpiry) > 90);

  function section(title, items, color){
    if (!items.length) return '';
    return `
      <div style="margin-bottom:20px">
        <div style="font-size:11px;font-weight:700;color:${color};margin-bottom:10px;
          display:flex;align-items:center;gap:8px">
          ${title}
          <span style="background:${color};color:#fff;border-radius:10px;
            padding:1px 8px;font-size:9px">${items.length}</span>
        </div>
        <div class="expire-timeline">
          ${items.map(tk => {
            const exp = expiryStatus(tk.certExpiry);
            return `
            <div class="expire-item ${exp.cls}">
              <div class="expire-dot" style="background:${exp.dot}"></div>
              <div style="flex:1">
                <div style="font-size:12px;font-weight:700">${tk.name}
                  <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--faint);margin-left:6px">${tk.agId}</span>
                </div>
                <div style="font-size:10px;color:var(--muted);margin-top:2px">
                  ${tk.takkenNo} ／ ${tk.takkenPref}
                </div>
              </div>
              <div style="text-align:right;flex-shrink:0">
                <div style="font-size:12px;font-weight:700;color:${exp.dot}">${tk.certExpiry}</div>
                <div style="font-size:10px;color:${exp.dot};font-weight:600">${exp.label}</div>
              </div>
              ${exp.cls === 'danger' || exp.cls === 'warn' ? `
              <button class="act-btn act-ghost" style="font-size:10px;padding:5px 10px"
                onclick="sendTakkenReminder(this)">
                📧 リマインド
              </button>` : ''}
            </div>`;
          }).join('')}
        </div>
      </div>`;
  }

  el.innerHTML =
    (danger.length ? `
      <div style="background:var(--rd-bg);border:1px solid rgba(220,38,38,.3);border-radius:8px;
        padding:12px 16px;font-size:11px;color:var(--rd);margin-bottom:20px;line-height:1.8">
        ❌ <strong>期限切れの宅建士証が ${danger.length} 件あります。</strong>
        速やかに更新確認・専任解除を検討してください。
      </div>` : '') +
    section('❌ 期限切れ', danger, '#DC2626') +
    section('⚠️ 30日以内に期限切れ', warn30, '#D97706') +
    section('🟡 30〜90日以内', warn90, '#F59E0B') +
    section('✅ 90日以上（安全）', safe, '#059669') +
    `<div style="margin-top:24px;background:#F8F9FA;border-radius:8px;padding:14px 16px;
      font-size:10px;color:var(--muted);line-height:2">
      📌 <strong>宅建士証の有効期限について</strong><br>
      宅建士証の有効期限は5年間。都道府県知事への更新申請は期限の3ヶ月前から可能。<br>
      期限切れの宅建士証では法定講習・更新申請が必要。専任宅建士として業務継続不可。
    </div>`;
}

// ════════════════════════════════════════════════
// TAB 3: IT重説負荷
// ════════════════════════════════════════════════
function renderLoad(){
  const el = document.getElementById('tab-content');
  const active = TAKKEN.filter(t=>t.active).sort((a,b) => b.itsetsuCount - a.itsetsuCount);
  const maxCount = Math.max(...active.map(t=>t.itsetsuCount), 1);
  const totalMonth = active.reduce((s,t)=>s+t.itsetsuThisMonth, 0);
  const totalAll   = active.reduce((s,t)=>s+t.itsetsuCount, 0);

  el.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
      <div class="stat-card">
        <div class="stat-val">${totalMonth}</div>
        <div class="stat-lbl">今月の総IT重説件数</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${active.length ? (totalMonth/active.length).toFixed(1) : 0}</div>
        <div class="stat-lbl">1人あたり平均（今月）</div>
      </div>
    </div>

    <div style="background:#fff;border:1px solid var(--bd);border-radius:12px;overflow:hidden">
      <div style="padding:14px 16px;border-bottom:1px solid var(--bd);
        display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:12px;font-weight:700;color:var(--navy)">担当件数（累計）</div>
        <div style="font-size:10px;color:var(--muted)">合計 ${totalAll} 件</div>
      </div>
      ${active.map(tk => {
        const pct = Math.round(tk.itsetsuCount / maxCount * 100);
        const color = pct >= 80 ? 'var(--rd)' : pct >= 50 ? 'var(--am)' : 'var(--em)';
        const monthPct = active.length ? Math.round(tk.itsetsuThisMonth / Math.max(totalMonth,1) * 100) : 0;
        return `
        <div style="padding:12px 16px;border-bottom:1px solid var(--bd)">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
            <div style="width:32px;height:32px;border-radius:8px;background:var(--navy);
              color:var(--gold);display:flex;align-items:center;justify-content:center;
              font-size:12px;font-weight:700;flex-shrink:0">${tk.name.slice(0,1)}</div>
            <div style="flex:1">
              <div style="display:flex;justify-content:space-between;align-items:center">
                <span style="font-size:12px;font-weight:700">${tk.name}</span>
                <span style="font-family:'DM Mono',monospace;font-size:12px;font-weight:700;color:${color}">${tk.itsetsuCount}件</span>
              </div>
              <div style="display:flex;justify-content:space-between;margin-top:1px">
                <span style="font-size:9px;color:var(--muted)">${tk.agId} ／ ${rankBadge(tk.rank)}</span>
                <span style="font-size:9px;color:var(--muted)">今月: ${tk.itsetsuThisMonth}件（${monthPct}%）</span>
              </div>
            </div>
          </div>
          <div class="load-bar" style="height:8px">
            <div class="load-fill" style="width:${pct}%;background:${color}"></div>
          </div>
        </div>`;
      }).join('')}
    </div>

    <div style="margin-top:16px;background:#F8F9FA;border-radius:8px;padding:14px 16px;
      font-size:10px;color:var(--muted);line-height:2">
      📌 <strong>マッチング優先順位</strong>（itsetsu-flow.md 準拠）<br>
      1. 案件の専任宅建士（dedicatedAgent）を最優先<br>
      2. IT重説担当件数が少ない宅建士（負荷分散）<br>
      3. ランクが高い宅建士<br>
      4. スロット登録が早い宅建士
    </div>`;
}

// ════════════════════════════════════════════════
// 専任解除モーダル
// ════════════════════════════════════════════════
function openDismissModal(agId){
  const tk = TAKKEN.find(t=>t.agId===agId);
  if (!tk) return;
  _dismissTarget = tk;
  document.getElementById('dm-desc').innerHTML =
    `<strong>${tk.name}</strong>（${tk.agId}）の専任宅建士登録を解除します。<br>
    宅建士証番号: <span style="font-family:'DM Mono',monospace;font-size:11px">${tk.takkenNo}</span><br>
    <span style="color:var(--rd)">この操作は取り消せません。慎重に確認してください。</span>`;
  document.getElementById('dm-reason').value = '';
  document.getElementById('dm-note').value = '';
  document.getElementById('dismiss-modal').style.display = 'flex';
}

function executeDismiss(){
  const reason = document.getElementById('dm-reason').value;
  if (!reason) { showToast('⚠️ 解除理由を選択してください','warn'); return; }
  if (!_dismissTarget) return;

  _dismissTarget.active = false;
  closeDismissModal();
  showToast(`🔓 ${_dismissTarget.name} の専任登録を解除しました`, 'danger');
  renderStats();
  renderList();
}

function closeDismissModal(e){
  if (e && e.target !== document.getElementById('dismiss-modal')) return;
  document.getElementById('dismiss-modal').style.display = 'none';
  _dismissTarget = null;
}

// ════════════════════════════════════════════════
// 初期化
// ════════════════════════════════════════════════
// #22修正: localStorageのCORETO_TAKKEN_ADDITIONSから追加された宅建士を取り込む
try {
  var additions = JSON.parse(localStorage.getItem('CORETO_TAKKEN_ADDITIONS') || '[]');
  if (additions.length) TAKKEN = TAKKEN.concat(additions);
} catch(e) {}

function sendTakkenReminder(btn) {
  var row = btn.closest('[data-takken-id]') || btn.closest('tr') || btn.parentElement;
  var name = row ? (row.querySelector('[data-name]')?.textContent || '宅建士') : '宅建士';
  var lineToken = (window.LINE_CONFIG && window.LINE_CONFIG.ENABLED && window.LINE_CONFIG.AG_CHANNEL_TOKEN) || '';
  if (lineToken) {
    fetch('https://api.line.me/v2/bot/message/broadcast', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + lineToken },
      body: JSON.stringify({ messages: [{ type: 'text', text: '【CORETO 宅建士証 更新リマインダー】\n' + name + ' 様\n\n宅建士証の更新期限が近づいています。\nお早めに更新手続きをお願いします。\n\n詳細はCOREBLDGシステムをご確認ください。' }] })
    }).then(function(){ showToast('📧 ' + name + 'に更新リマインダーをLINE送信しました', 'em'); })
     .catch(function(e){ showToast('⚠️ LINE送信エラー: ' + e.message, 'warn'); });
  } else {
    showToast('📧 更新リマインダーを送信しました（LINE未設定）', 'em');
  }
}

window.addEventListener('DOMContentLoaded', () => {
  CNAV.init('takken');
  renderStats();
  renderList();
});
</script>
