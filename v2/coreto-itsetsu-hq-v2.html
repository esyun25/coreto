<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>COREBLDG — IT重説 HQマッチング</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0D1A2D;--navy-m:#152238;--gold:#C8A951;--gold-dim:rgba(200,169,81,.15);
  --ink:#202124;--muted:#5F6368;--faint:#80868B;
  --em:#059669;--em-bg:#ECFDF5;--am:#D97706;--am-bg:#FFFBEB;
  --rd:#DC2626;--rd-bg:#FEF2F2;--sk:#0284C7;--sk-bg:#F0F9FF;
  --vt:#7C3AED;--vt-bg:#F5F3FF;
  --cream:#FFFFFF;--cream2:#F8F9FA;--bd:#E8EAED;--bd2:#DADCE0;--sw:240px;
  --sh:0 1px 2px rgba(60,64,67,.1),0 1px 3px rgba(60,64,67,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:var(--cream2)}
.shell{display:flex;height:100vh}
.sb{width:var(--sw);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;position:relative}
.sb::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,rgba(200,169,81,.25) 0%,rgba(200,169,81,.06) 50%,transparent 100%)}
.sb-head{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;letter-spacing:5px;color:var(--gold)}
.sb-ver{font-size:9px;letter-spacing:2px;color:rgba(200,169,81,.3);font-family:'DM Mono',monospace;margin-top:2px}
.sb-nav{flex:1;overflow-y:auto;padding:12px 10px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:8px;cursor:pointer;
  font-size:12px;font-weight:500;color:rgba(255,255,255,.55);transition:.15s;text-decoration:none;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.nav-item.active{background:var(--gold-dim);color:var(--gold)}
.nav-sec{font-size:9px;font-weight:700;letter-spacing:1.5px;color:rgba(255,255,255,.2);padding:14px 11px 5px;text-transform:uppercase}
.sb-foot{padding:14px 12px;border-top:1px solid rgba(255,255,255,.06)}
.sb-user{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:9px 11px;display:flex;align-items:center;gap:9px}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--gold-dim);border:1px solid rgba(200,169,81,.25);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gold);flex-shrink:0}
.sb-uname{font-size:11px;font-weight:600;color:rgba(255,255,255,.8)}
.sb-urole{font-size:9px;color:rgba(255,255,255,.3);font-family:'DM Mono',monospace}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.top-bar{background:#fff;border-bottom:1px solid var(--bd);padding:0 28px;height:52px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.top-title{font-size:15px;font-weight:700;color:var(--navy)}
.top-sub{font-size:10px;color:var(--muted);margin-top:1px}
.content{flex:1;overflow-y:auto;padding:24px 28px}
.card{background:#fff;border:1px solid var(--bd);border-radius:12px;box-shadow:var(--sh);margin-bottom:18px;overflow:hidden}
.card-head{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;gap:12px}
.card-title{font-size:13px;font-weight:700;color:var(--navy)}
.card-body{padding:18px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat-card{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:14px 16px;box-shadow:var(--sh)}
.stat-num{font-size:24px;font-weight:700;color:var(--navy);font-variant-numeric:tabular-nums}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:2px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;
  font-size:12px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;border:none;transition:.15s}
.btn-navy{background:var(--navy);color:var(--gold)}
.btn-navy:hover{background:var(--navy-m)}
.btn-sm{padding:6px 13px;font-size:11px}
.btn-em{background:var(--em-bg);color:var(--em);border:1px solid rgba(5,150,105,.2)}
.btn-am{background:var(--am-bg);color:var(--am);border:1px solid rgba(217,119,6,.2)}
.btn-rd{background:var(--rd-bg);color:var(--rd);border:1px solid rgba(220,38,38,.2)}
.btn-sk{background:var(--sk-bg);color:var(--sk);border:1px solid rgba(2,132,199,.2)}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--bd2)}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700}
.badge-confirmed{background:var(--em-bg);color:var(--em)}
.badge-pending{background:var(--am-bg);color:var(--am)}
.badge-unmatched{background:var(--rd-bg);color:var(--rd)}
.badge-hq{background:var(--vt-bg);color:var(--vt)}
.req-pill{display:inline-flex;padding:2px 8px;background:var(--sk-bg);color:var(--sk);
  border-radius:12px;font-size:10px;margin:2px 3px 2px 0}

/* 未マッチカード */
.unmatch-card{border:1.5px solid rgba(220,38,38,.25);border-radius:10px;
  margin-bottom:12px;overflow:hidden}
.unmatch-head{background:var(--rd-bg);padding:12px 16px;display:flex;
  align-items:center;justify-content:space-between;gap:10px}
.unmatch-body{padding:14px 16px}
.slot-option{border:1.5px solid var(--bd);border-radius:8px;padding:10px 13px;cursor:pointer;
  transition:.15s;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.slot-option:hover{border-color:var(--navy);background:#F0F4FF}
.slot-option.selected{border-color:var(--em);background:var(--em-bg)}

/* 全予約テーブル */
.bk-row{display:grid;grid-template-columns:80px 110px 1fr 100px 100px 110px;
  align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bd);
  font-size:12px;transition:.12s}
.bk-row:last-child{border-bottom:none}
.bk-row:hover{background:var(--cream2)}
.bk-row.header{background:var(--cream2);font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.4px;padding:8px 14px}

/* Meet URL入力 */
.meet-row{display:flex;gap:8px;margin-top:10px;align-items:center}
.meet-input{flex:1;padding:8px 11px;border:1.5px solid var(--bd2);border-radius:8px;
  font-size:12px;font-family:'Outfit',sans-serif}
.meet-input:focus{outline:none;border-color:var(--sk)}

.toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;
  padding:11px 18px;border-radius:9px;font-size:12px;font-weight:600;
  box-shadow:0 4px 20px rgba(0,0,0,.2);opacity:0;transition:.3s;z-index:999;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="shell">
<div class="sb">
  <div class="sb-head"><div class="sb-logo">CORETO</div><div class="sb-ver">COREBLDG v2</div></div>
  <div id="sb-nav" class="sb-nav">
    <div class="nav-sec">IT重説</div>
    <a class="nav-item" href="coreto-itsetsu-schedule-v2.html">📅 シフト登録</a>
    <a class="nav-item" href="coreto-itsetsu-booking-v2.html">📋 予約受付</a>
    <a class="nav-item active" href="coreto-itsetsu-hq-v2.html">🎯 HQマッチング</a>
    <a class="nav-item" href="coreto-itsetsu-v2.html">🔑 IT重説チェック</a>
    <div class="nav-sec">メニュー</div>
    <a class="nav-item" href="coreto-hub-v2.html">🏠 ホーム</a>
  </div>
  <div class="sb-foot">
    <div class="sb-user">
      <div class="sb-av">HQ</div>
      <div><div class="sb-uname">HQ 管理者</div><div class="sb-urole">admin</div></div>
    </div>
  </div>
</div>

<div class="main">
  <div class="top-bar">
    <div>
      <div class="top-title">🎯 IT重説 HQマッチング管理</div>
      <div class="top-sub">未マッチングの対応・手動確定・Meet URL発行</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-am btn-sm" onclick="slackBroadcast()">📢 Slackで全宅建士に呼びかけ</button>
      <button class="btn btn-navy btn-sm" onclick="renderAll()">🔄 更新</button>
    </div>
  </div>

  <div class="content">

    <!-- サマリー -->
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-num" id="st-unmatched" style="color:var(--rd)">—</div>
        <div class="stat-lbl">🔴 未マッチング</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="st-pending" style="color:var(--am)">—</div>
        <div class="stat-lbl">🟡 照合中</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="st-confirmed" style="color:var(--em)">—</div>
        <div class="stat-lbl">✅ 確定済み</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="st-avail-slots" style="color:var(--sk)">—</div>
        <div class="stat-lbl">📅 空き枠</div>
      </div>
    </div>

    <!-- 未マッチング対応 -->
    <div class="card" id="unmatched-section">
      <div class="card-head">
        <div class="card-title">🔴 未マッチング — 手動対応が必要</div>
      </div>
      <div class="card-body" id="unmatched-list"></div>
    </div>

    <!-- 全予約一覧 -->
    <div class="card">
      <div class="card-head">
        <div class="card-title">全予約一覧</div>
        <select id="filter-status" onchange="renderAll()"
          style="font-size:11px;padding:5px 8px;border:1.5px solid var(--bd2);border-radius:7px;
          font-family:'Outfit',sans-serif;color:var(--ink);background:#fff">
          <option value="">全ステータス</option>
          <option value="confirmed">確定済み</option>
          <option value="pending">照合中</option>
          <option value="unmatched">未マッチング</option>
          <option value="hq">HQ実施</option>
        </select>
      </div>
      <div class="bk-row header">
        <span>予約ID</span><span>案件ID</span><span>クライアント</span>
        <span>日程</span><span>ステータス</span><span>宅建士/操作</span>
      </div>
      <div id="all-bk-list"></div>
    </div>

  </div>
</div>
</div>

<!-- 手動マッチングモーダル -->
<div id="match-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;
  align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:14px;width:560px;max-height:80vh;overflow-y:auto;
    padding:24px;box-shadow:0 8px 40px rgba(0,0,0,.25)">
    <div style="font-size:14px;font-weight:700;color:var(--navy);margin-bottom:4px" id="modal-title">手動マッチング</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:18px" id="modal-sub"></div>

    <div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.4px;margin-bottom:8px">
      空き枠から選択
    </div>
    <div id="modal-slot-list" style="margin-bottom:16px;max-height:200px;overflow-y:auto"></div>

    <div style="border-top:1px solid var(--bd);padding-top:14px;margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.4px;margin-bottom:8px">
        または日程を直接指定
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px">
        <div>
          <div style="font-size:10px;color:var(--muted);margin-bottom:4px">日付</div>
          <input type="date" id="manual-date" style="width:100%;padding:8px;border:1.5px solid var(--bd2);border-radius:7px;font-size:12px">
        </div>
        <div>
          <div style="font-size:10px;color:var(--muted);margin-bottom:4px">開始</div>
          <input type="time" id="manual-start" value="10:00" style="width:100%;padding:8px;border:1.5px solid var(--bd2);border-radius:7px;font-size:12px">
        </div>
        <div>
          <div style="font-size:10px;color:var(--muted);margin-bottom:4px">宅建士</div>
          <select id="manual-takk" style="width:100%;padding:8px;border:1.5px solid var(--bd2);border-radius:7px;font-size:12px;background:#fff">
            <option value="TK-001">渡辺 賢一</option>
            <option value="TK-002">佐々木 美穂</option>
            <option value="TK-003">松本 浩二</option>
            <option value="HQ">HQ（自社実施）</option>
          </select>
        </div>
      </div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:4px">Google Meet URL</div>
      <input type="url" id="manual-meet" placeholder="https://meet.google.com/xxx-xxx-xxx"
        style="width:100%;padding:8px 11px;border:1.5px solid var(--bd2);border-radius:7px;font-size:12px">
    </div>

    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-em" onclick="confirmManual()">✅ この内容で確定</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const LS_SLOTS='ITSETSU_SLOTS', LS_BOOKINGS='ITSETSU_BOOKINGS';
const TAKKEN={
  'TK-001':'渡辺 賢一','TK-002':'佐々木 美穂','TK-003':'松本 浩二','HQ':'HQ（自社）'
};
function lsGet(k){try{return JSON.parse(localStorage.getItem(k)||'null');}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function getSlots(){return lsGet(LS_SLOTS)||[];}
function getBookings(){return lsGet(LS_BOOKINGS)||initDemo();}
function saveSlots(v){lsSet(LS_SLOTS,v);}
function saveBookings(v){lsSet(LS_BOOKINGS,v);}

function initDemo(){
  const b=[
    {id:'BK-001',caseId:'RC-10042',caseName:'田中 一郎',agName:'木下 大輔',
     status:'confirmed',slotId:'SL-004',takkId:'TK-002',takkName:'佐々木 美穂',
     date:'2026-03-18',start:'10:00',end:'11:00',meetUrl:'https://meet.google.com/xxx-yyyy-zzz',createdAt:'2026-03-10 14:22'},
    {id:'BK-002',caseId:'RC-10047',caseName:'鈴木 花子',agName:'大橋 幸代',
     status:'pending',slotId:null,takkId:null,takkName:null,
     requests:[{date:'2026-03-17',start:'13:00'},{date:'2026-03-18',start:'15:00'},{date:'2026-03-19',start:'10:00'}],
     createdAt:'2026-03-10 16:05'},
    {id:'BK-003',caseId:'RC-10039',caseName:'高橋 誠',agName:'木下 大輔',
     status:'unmatched',slotId:null,takkId:null,takkName:null,
     requests:[{date:'2026-03-15',start:'09:00'},{date:'2026-03-16',start:'18:00'}],
     createdAt:'2026-03-09 11:30'},
  ];
  saveBookings(b); return b;
}

function fmtDate(d){
  const dt=new Date(d+'T00:00:00');
  return `${dt.getMonth()+1}/${dt.getDate()}（${'日月火水木金土'[dt.getDay()]}）`;
}

const STATUS_MAP={
  confirmed:{label:'確定',cls:'confirmed'},
  pending:{label:'照合中',cls:'pending'},
  unmatched:{label:'未マッチ',cls:'unmatched'},
  hq:{label:'HQ実施',cls:'hq'},
};

let _currentBkId=null, _selectedModalSlotId=null;

function renderAll(){
  const bookings=getBookings();
  const slots=getSlots();
  const filter=document.getElementById('filter-status')?.value||'';

  // サマリー
  document.getElementById('st-unmatched').textContent = bookings.filter(b=>b.status==='unmatched').length;
  document.getElementById('st-pending').textContent   = bookings.filter(b=>b.status==='pending').length;
  document.getElementById('st-confirmed').textContent = bookings.filter(b=>b.status==='confirmed').length;
  document.getElementById('st-avail-slots').textContent = slots.filter(s=>s.status==='open').length;

  // 未マッチング
  const unmatched = bookings.filter(b=>b.status==='unmatched'||b.status==='pending');
  const uEl = document.getElementById('unmatched-list');
  if(!unmatched.length){
    uEl.innerHTML='<div style="padding:20px;text-align:center;font-size:12px;color:var(--em)">✅ 未マッチングはありません</div>';
  } else {
    uEl.innerHTML = unmatched.map(b=>`
      <div class="unmatch-card">
        <div class="unmatch-head">
          <div>
            <span style="font-size:12px;font-weight:700;color:var(--rd)">${b.caseName} 様</span>
            <span style="font-size:10px;color:var(--rd);margin-left:8px;font-family:'DM Mono',monospace">${b.caseId}</span>
            <span style="margin-left:8px"><span class="badge badge-${b.status==='unmatched'?'unmatched':'pending'}">${b.status==='unmatched'?'未マッチ':'照合中'}</span></span>
          </div>
          <div style="display:flex;gap:6px">
            <button class="btn btn-em btn-sm" onclick="openMatchModal('${b.id}')">🎯 手動マッチング</button>
            <button class="btn btn-sk btn-sm" onclick="setHq('${b.id}')">🏢 HQ実施に変更</button>
          </div>
        </div>
        <div class="unmatch-body">
          <div style="font-size:11px;color:var(--muted);margin-bottom:8px">
            担当AG: ${b.agName} ／ 受付: ${b.createdAt}
          </div>
          <div style="font-size:10px;font-weight:700;color:var(--muted);margin-bottom:5px">希望日時:</div>
          <div>${(b.requests||[]).map(r=>`<span class="req-pill">${fmtDate(r.date)} ${r.start}</span>`).join('')||'—'}</div>
        </div>
      </div>`).join('');
  }

  // 全一覧
  const filtered = (filter ? bookings.filter(b=>b.status===filter) : bookings)
    .sort((a,b)=>b.createdAt.localeCompare(a.createdAt));
  const allEl = document.getElementById('all-bk-list');
  allEl.innerHTML = filtered.map(b=>{
    const sm=STATUS_MAP[b.status]||{label:b.status,cls:'pending'};
    const dateInfo = b.date ? `${fmtDate(b.date)} ${b.start}` : '—';
    const meetBtn = b.status==='confirmed' && !b.meetUrl
      ? `<button class="btn btn-sk btn-sm" onclick="openMeetModal('${b.id}')">URL発行</button>`
      : b.meetUrl
        ? `<a href="${b.meetUrl}" target="_blank" style="font-size:10px;color:var(--sk)">Meet ↗</a>`
        : `<button class="btn btn-sm btn-ghost" onclick="openMatchModal('${b.id}')">対応</button>`;
    return `<div class="bk-row">
      <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--faint)">${b.id}</span>
      <span style="font-family:'DM Mono',monospace;font-size:10px">${b.caseId}</span>
      <span style="font-weight:600">${b.caseName}</span>
      <span style="font-size:11px">${dateInfo}</span>
      <span><span class="badge badge-${sm.cls}">${sm.label}</span></span>
      <span>${b.takkName ? `<span style="font-size:11px;color:var(--muted)">${b.takkName}</span>&nbsp;&nbsp;${meetBtn}` : meetBtn}</span>
    </div>`;
  }).join('') || '<div style="padding:24px;text-align:center;font-size:12px;color:var(--faint)">該当なし</div>';
}

function openMatchModal(bkId){
  _currentBkId=bkId; _selectedModalSlotId=null;
  const bk=getBookings().find(b=>b.id===bkId);
  if(!bk) return;
  document.getElementById('modal-title').textContent=`手動マッチング: ${bk.caseName} 様（${bk.caseId}）`;
  document.getElementById('modal-sub').textContent=
    `希望: ${(bk.requests||[]).map(r=>fmtDate(r.date)+' '+r.start).join('、')||'なし'}`;

  const slots=getSlots().filter(s=>s.status==='open')
    .sort((a,b)=>a.date.localeCompare(b.date)||a.start.localeCompare(b.start));
  const slotEl=document.getElementById('modal-slot-list');
  slotEl.innerHTML = slots.length
    ? slots.map(s=>`
      <div class="slot-option" id="mso-${s.id}" onclick="selectModalSlot('${s.id}')">
        <div>
          <span style="font-weight:600;font-size:12px">${fmtDate(s.date)} ${s.start}〜${s.end}</span>
          <span style="font-size:11px;color:var(--muted);margin-left:8px">${s.takkName}</span>
        </div>
        <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--faint)">${s.id}</span>
      </div>`).join('')
    : '<div style="font-size:12px;color:var(--faint);padding:12px 0">空き枠がありません</div>';

  const d=new Date(); d.setDate(d.getDate()+1);
  document.getElementById('manual-date').value=d.toISOString().slice(0,10);
  document.getElementById('match-modal').style.display='flex';
}

function selectModalSlot(id){
  _selectedModalSlotId = _selectedModalSlotId===id ? null : id;
  document.querySelectorAll('.slot-option').forEach(el=>{
    el.classList.toggle('selected', el.id==='mso-'+_selectedModalSlotId);
  });
}

function closeModal(){ document.getElementById('match-modal').style.display='none'; }

function confirmManual(){
  const bkId=_currentBkId;
  const bookings=getBookings(); const slots=getSlots();
  const bk=bookings.find(b=>b.id===bkId); if(!bk) return;
  const meetUrl=document.getElementById('manual-meet').value.trim();

  if(_selectedModalSlotId){
    const sl=slots.find(s=>s.id===_selectedModalSlotId);
    if(!sl){showToast('スロットが見つかりません','err');return;}
    sl.status='booked'; sl.bookingId=bkId;
    bk.status='confirmed'; bk.slotId=sl.id;
    bk.takkId=sl.takkId; bk.takkName=sl.takkName;
    bk.date=sl.date; bk.start=sl.start; bk.end=sl.end;
    bk.meetUrl=meetUrl||'（Meet URL後送）';
    saveSlots(slots);
  } else {
    const date=document.getElementById('manual-date').value;
    const start=document.getElementById('manual-start').value;
    const takkId=document.getElementById('manual-takk').value;
    if(!date||!start){showToast('日付と時刻を入力してください','warn');return;}
    bk.status = takkId==='HQ' ? 'hq' : 'confirmed';
    bk.takkId=takkId; bk.takkName=TAKKEN[takkId]||takkId;
    bk.date=date; bk.start=start; bk.end='';
    bk.meetUrl=meetUrl||'（Meet URL後送）';
  }
  saveBookings(bookings);
  closeModal();
  renderAll();
  showToast(`✅ ${bk.caseName} 様の日程を確定しました`);
}

function setHq(bkId){
  if(!confirm('このケースをHQ自社実施に変更しますか？')) return;
  const bookings=getBookings();
  const bk=bookings.find(b=>b.id===bkId); if(!bk) return;
  bk.status='hq'; bk.takkName='HQ（自社）';
  saveBookings(bookings); renderAll();
  showToast('🏢 HQ実施に変更しました');
}

function slackBroadcast(){
  showToast('📢 Slackで専任宅建士全員に呼びかけを送信しました（デモ）');
}

function showToast(msg,type){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.style.background=type==='warn'?'#D97706':type==='err'?'#DC2626':'#0D1A2D';
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3500);
}

document.addEventListener('DOMContentLoaded',renderAll);
</script>
