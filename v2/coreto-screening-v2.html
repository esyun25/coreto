<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>書類送付管理 — COREBLDG</title>
<link rel="stylesheet" href="coreto-design-system.css">
<style>
:root{
  --navy:#0D1A2D;--navy-m:#152238;--navy-l:#1E3252;
  --gold:#C8A951;--gold-dim:rgba(200,169,81,.15);
  --cream:#FFFFFF;--cream2:#F8F9FA;
  --ink:#202124;--muted:#5F6368;--faint:#80868B;
  --em:#059669;--em-bg:#ECFDF5;--am:#D97706;--am-bg:#FFFBEB;
  --rd:#DC2626;--rd-bg:#FEF2F2;--sk:#0284C7;--sk-bg:#F0F9FF;
  --bd:#E8EAED;--bd2:#DADCE0;
  --sw:240px;--r:10px;--r-sm:7px;
  --sh:0 1px 2px rgba(60,64,67,.1),0 1px 3px rgba(60,64,67,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit',sans-serif;background:var(--cream2)}
.shell{display:flex;height:100vh}
.sb{width:var(--sw);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;position:relative}
.sb::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,rgba(200,169,81,.25),rgba(200,169,81,.06) 50%,transparent)}
.sb-head{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;letter-spacing:5px;color:var(--gold)}
.sb-ver{font-size:9px;letter-spacing:2px;color:rgba(200,169,81,.3);font-family:'DM Mono',monospace;margin-top:2px}
.sb-user{margin:14px 14px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:9px 11px;display:flex;align-items:center;gap:9px}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--gold-dim);border:1px solid rgba(200,169,81,.25);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gold);flex-shrink:0}
.sb-nav{flex:1;overflow-y:auto;padding:6px 10px}
.sb-nav::-webkit-scrollbar{width:3px}
.sb-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;background:var(--cream);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;box-shadow:var(--sh)}
.tb-title{font-size:16px;font-weight:600;color:var(--ink)}
.tb-crumb{font-size:11px;color:var(--faint);display:flex;align-items:center;gap:5px;margin-top:1px}
.tb-crumb a{color:var(--muted);text-decoration:none}.tb-crumb a:hover{color:var(--am)}
.tb-actions{margin-left:auto;display:flex;gap:9px;align-items:center}
.btn{padding:7px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;transition:.15s;font-family:'Outfit',sans-serif;border:none;letter-spacing:.3px}
.btn-primary{background:var(--navy);color:var(--gold)}.btn-primary:hover{background:var(--navy-l)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--bd)}.btn-ghost:hover{background:var(--cream);color:var(--ink)}
.btn-em{background:var(--em-bg);color:var(--em);border:1px solid rgba(5,150,105,.2)}.btn-em:hover{background:#D1FAE5}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-icon{padding:5px 8px;font-size:13px}
.page{flex:1;overflow-y:auto;padding:24px}
.page::-webkit-scrollbar{width:5px}
.page::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi{background:var(--cream);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh)}
.kpi-label{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.kpi-val{font-size:26px;font-weight:300;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1}
.kpi-sub{font-size:10px;color:var(--faint);margin-top:4px}

/* フィルター */
.filter-bar{background:var(--cream);border:1px solid var(--bd);border-radius:var(--r);padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;box-shadow:var(--sh)}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:13px;pointer-events:none}
.search-wrap input{width:100%;padding:8px 12px 8px 32px;background:var(--cream2);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:13px;color:var(--ink);font-family:'Outfit',sans-serif;outline:none;transition:.15s}
.search-wrap input:focus{border-color:var(--gold);background:var(--cream)}
.filter-select{padding:8px 12px;background:var(--cream2);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:12px;color:var(--ink);font-family:'Outfit',sans-serif;outline:none;cursor:pointer}
.filter-count{font-size:12px;color:var(--muted);margin-left:auto;font-variant-numeric:tabular-nums}

/* 案件カード一覧 */
.case-list{display:flex;flex-direction:column;gap:10px}
.case-card{background:var(--cream);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;transition:.15s}
.case-card:hover{border-color:rgba(200,169,81,.35)}
.case-head{padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer}
.case-head-left{flex:1;min-width:0}
.case-name{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:2px}
.case-meta{font-size:11px;color:var(--muted);display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.mono{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap}
.b-em{background:var(--em-bg);color:var(--em)}.b-am{background:var(--am-bg);color:var(--am)}
.b-rd{background:var(--rd-bg);color:var(--rd)}.b-nt{background:var(--cream2);color:var(--muted);border:1px solid var(--bd)}
.b-sk{background:var(--sk-bg);color:var(--sk)}.b-gold{background:var(--gold-dim);color:var(--gold)}

/* 書類進捗バー */
.prog-wrap{display:flex;align-items:center;gap:10px;min-width:180px}
.prog-bar{flex:1;height:5px;background:var(--bd2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .4s}
.prog-lbl{font-size:10px;font-weight:700;font-family:'DM Mono',monospace;white-space:nowrap}

/* 展開パネル */
.case-body{display:none;border-top:1px solid var(--bd);padding:16px 18px;background:var(--cream2)}
.case-card.open .case-body{display:block}
.case-chevron{font-size:12px;color:var(--faint);transition:transform .2s;flex-shrink:0}
.case-card.open .case-chevron{transform:rotate(180deg)}

/* 書類テーブル */
.doc-table{width:100%;border-collapse:collapse;margin-bottom:14px}
.doc-table th{padding:7px 10px;text-align:left;font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);background:var(--cream);border-bottom:1px solid var(--bd);font-family:'DM Mono',monospace}
.doc-table td{padding:9px 10px;border-bottom:1px solid var(--bd);font-size:12px;color:var(--ink);vertical-align:middle}
.doc-table tr:last-child td{border-bottom:none}
.doc-table tr.all-done{background:rgba(5,150,105,.03)}
.doc-name-cell{display:flex;align-items:center;gap:8px}
.doc-name-input{border:none;background:transparent;font-size:12px;font-family:'Outfit',sans-serif;color:var(--ink);width:100%;outline:none;padding:2px 4px;border-radius:4px}
.doc-name-input:focus{background:var(--cream);border:1px solid var(--gold)}
.doc-name-input[readonly]{cursor:default}
.chk-wrap{display:flex;align-items:center;justify-content:center}
input[type=checkbox]{width:16px;height:16px;accent-color:var(--em);cursor:pointer}

/* 新規書類追加 */
.add-doc-row{display:flex;gap:8px;align-items:center}
.add-doc-input{flex:1;padding:8px 12px;background:var(--cream);border:1.5px dashed var(--bd2);border-radius:var(--r-sm);font-size:12px;font-family:'Outfit',sans-serif;color:var(--ink);outline:none;transition:.15s}
.add-doc-input:focus{border-color:var(--gold);border-style:solid;background:var(--cream)}

/* メモ */
.case-memo{width:100%;padding:8px 12px;background:var(--cream);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:12px;font-family:'Outfit',sans-serif;color:var(--ink);outline:none;resize:vertical;min-height:54px;transition:.15s;line-height:1.6}
.case-memo:focus{border-color:var(--gold)}
.case-memo[readonly]{background:var(--cream2);color:var(--muted)}

/* HQ閲覧バナー */
.hq-banner{background:var(--sk-bg);border:1px solid rgba(2,132,199,.2);border-radius:var(--r-sm);padding:10px 14px;margin-bottom:16px;font-size:12px;color:var(--sk);display:flex;align-items:center;gap:8px}

/* 空状態 */
.empty{padding:48px 24px;text-align:center;color:var(--faint)}
.empty-icon{font-size:32px;margin-bottom:10px}
.empty-text{font-size:13px}

/* ── モバイル対応 ─────────────────────────────── */
@media (max-width: 768px) {
  .shell, .app-shell { flex-direction: column; }
  .content, .main, .main-content { overflow-y: auto; }
  .topbar, .top-bar {
    padding: 0 12px;
    gap: 8px;
    height: 52px;
  }
  .tb-title { font-size: 14px; }
  .tb-actions, .top-actions { gap: 6px; }
  .btn-sm { padding: 4px 9px; font-size: 10px; }
  .page { padding: 12px; }
  .kpi-row, .stat-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .kpi-value, .kpi-vl { font-size: 22px !important; }
  table { font-size: 11px; }
  th, td { padding: 7px 8px; }
}
</style>
</head>
<body>
<script>
(function(){
  var _role = sessionStorage.getItem('coreto_role') || '';
  var _allowed = ["hq","re_ag"];
  if (_allowed.length && !_allowed.includes(_role)) {
    location.replace('coreto-hub-v2.html?unauthorized=1');
  }
})();
</script>

<div class="shell">
<nav class="sb">
  <div class="sb-head">
    <div class="sb-logo">CORE<br>BLDG</div>
    <div class="sb-ver">v2.0 — CORETO</div>
  </div>
  <div class="sb-user">
    <div class="sb-av" id="sb-av">--</div>
    <div>
      <div id="sb-name" style="font-size:11px;font-weight:600;color:rgba(255,255,255,.8)">...</div>
      <div id="sb-role" style="font-size:9px;color:rgba(255,255,255,.3)">...</div>
    </div>
  </div>
  <div class="sb-nav" id="sb-nav"></div>
</nav>

<div class="content">
  <div class="topbar">
    <div>
      <div class="tb-title" id="tb-title">書類送付管理</div>
      <div class="tb-crumb">
        <a href="coreto-hub-v2.html">COREBLDG</a> › <span id="tb-crumb-label">書類送付管理</span>
      </div>
    </div>
    <div class="tb-actions" id="tb-actions">
      <!-- ロールによってJS挿入 -->
    </div>
  </div>

  <div class="page">
    <div id="hq-banner" class="hq-banner" style="display:none">
      👁️ HQ閲覧モード — 書類リストの編集はエージェントのみ可能です
    </div>

    <!-- KPI -->
    <div class="kpi-row">
      <div class="kpi">
        <div class="kpi-label">対応中の案件</div>
        <div class="kpi-val" id="kpi-active">—</div>
        <div class="kpi-sub">書類作業あり</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">未受領の書類</div>
        <div class="kpi-val" id="kpi-unreceived" style="color:var(--am)">—</div>
        <div class="kpi-sub">申込者から未回収</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">未送付の書類</div>
        <div class="kpi-val" id="kpi-unsent" style="color:var(--rd)">—</div>
        <div class="kpi-sub">管理会社へ未送付</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">送付完了案件</div>
        <div class="kpi-val" id="kpi-done" style="color:var(--em)">—</div>
        <div class="kpi-sub">全書類送付済み</div>
      </div>
    </div>

    <!-- フィルター -->
    <div class="filter-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="申込者名・案件ID" oninput="applyFilter()">
      </div>
      <select class="filter-select" id="f-status" onchange="applyFilter()">
        <option value="">すべての状態</option>
        <option value="pending">書類収集中</option>
        <option value="partial">一部送付済み</option>
        <option value="done">全件送付済み</option>
      </select>
      <span class="filter-count" id="filter-count">—</span>
    </div>

    <!-- 案件リスト -->
    <div class="case-list" id="case-list">
      <div class="empty"><div class="empty-icon">📁</div><div class="empty-text">案件を読み込んでいます...</div></div>
    </div>
  </div>
</div>
</div>

<script>
// ══ データ（デモ）════════════════════════════════════
// 実運用では案件DBから取得する
let CASES = [
  {
    id:'CASE-2024-0412',
    name:'田中 優子',
    kana:'タナカ ユウコ',
    property:'港区三田3丁目 ライオンズマンション',
    mgmt:'東急住宅リース株式会社',
    ag:'山田 誠（AG-0042）',
    memo:'管理会社担当：鈴木様（03-XXXX-XXXX）',
    docs:[
      { id:'d1', name:'運転免許証（両面）',      received:true,  sent:true  },
      { id:'d2', name:'健康保険証',              received:true,  sent:true  },
      { id:'d3', name:'源泉徴収票（直近1年分）', received:true,  sent:false },
      { id:'d4', name:'入居申込書',              received:false, sent:false },
      { id:'d5', name:'連帯保証人の身分証',      received:false, sent:false },
    ],
  },
  {
    id:'CASE-2024-0389',
    name:'鈴木 健太',
    kana:'スズキ ケンタ',
    property:'新宿区四谷2丁目 プレミアレジデンス',
    mgmt:'三井不動産リアルティ',
    ag:'山田 誠（AG-0042）',
    memo:'在職証明書も必要と言われたため追加',
    docs:[
      { id:'d1', name:'パスポート（顔写真ページ）', received:true,  sent:true  },
      { id:'d2', name:'住民票（3ヶ月以内）',        received:true,  sent:true  },
      { id:'d3', name:'給与明細（直近3ヶ月分）',    received:true,  sent:true  },
      { id:'d4', name:'在職証明書',                 received:true,  sent:true  },
      { id:'d5', name:'入居申込書',                 received:true,  sent:true  },
    ],
  },
  {
    id:'CASE-2024-0401',
    name:'佐藤 明',
    kana:'サトウ アキラ',
    property:'渋谷区恵比寿1丁目 グランドコート',
    mgmt:'野村不動産パートナーズ',
    ag:'山田 誠（AG-0042）',
    memo:'',
    docs:[
      { id:'d1', name:'身分証明書',              received:false, sent:false },
      { id:'d2', name:'収入証明書',              received:false, sent:false },
      { id:'d3', name:'入居申込書',              received:false, sent:false },
    ],
  },
];

let isHQ   = false;
let isAG   = false;
let filtered = [];

// ══ ステータス判定 ════════════════════════════════════
function caseStatus(c) {
  const total = c.docs.length;
  if (total === 0) return 'pending';
  const sent = c.docs.filter(d => d.sent).length;
  if (sent === total) return 'done';
  if (sent > 0) return 'partial';
  return 'pending';
}

function statusBadge(s) {
  if (s === 'done')    return '<span class="badge b-em">✅ 全件送付済み</span>';
  if (s === 'partial') return '<span class="badge b-am">📤 一部送付済み</span>';
  return '<span class="badge b-nt">📋 収集中</span>';
}

function progColor(pct) {
  if (pct === 100) return 'var(--em)';
  if (pct >= 50)   return 'var(--am)';
  return 'var(--rd)';
}

// ══ KPI更新 ══════════════════════════════════════════
function updateKPI() {
  let active = 0, unreceived = 0, unsent = 0, done = 0;
  CASES.forEach(c => {
    const st = caseStatus(c);
    if (st !== 'done') active++;
    if (st === 'done') done++;
    c.docs.forEach(d => {
      if (!d.received) unreceived++;
      if (d.received && !d.sent) unsent++;
    });
  });
  document.getElementById('kpi-active').textContent     = active;
  document.getElementById('kpi-unreceived').textContent = unreceived;
  document.getElementById('kpi-unsent').textContent     = unsent;
  document.getElementById('kpi-done').textContent       = done;
}

// 🟠-12/14: 全書類送付完了時に自動でHQへ通知し、案件ステータス更新を促す
function checkAllSentAndNotify(caseId) {
  if (isHQ) return;
  const c = CASES.find(c => c.id === caseId);
  if (!c || c.docs.length === 0) return;
  const allSent = c.docs.every(d => d.sent);
  if (!allSent || c._notifiedAllSent) return;
  c._notifiedAllSent = true;

  // トーストで案内
  showToast('✅ ' + c.name + ' 様の書類が全件送付済みになりました。', 'em');

  // 残-15: 全書類送付完了後に「IT重説へ進む」バナーを表示
  var existBanner = document.getElementById('screening-next-banner');
  if (existBanner) existBanner.remove();
  var banner = document.createElement('div');
  banner.id = 'screening-next-banner';
  banner.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9998;background:#0D1A2D;border-radius:12px;padding:14px 20px;display:flex;align-items:center;gap:16px;box-shadow:0 8px 32px rgba(0,0,0,.25);font-family:Outfit,sans-serif;min-width:320px';
  banner.innerHTML =
    '<div>' +
      '<div style="font-size:11px;font-weight:700;letter-spacing:1px;color:rgba(200,169,81,.7);margin-bottom:3px">📋 次のステップ</div>' +
      '<div style="font-size:13px;font-weight:600;color:#fff">' + c.name + ' 様 — 書類送付完了</div>' +
    '</div>' +
    '<div style="display:flex;gap:8px;flex-shrink:0">' +
      '<a href="coreto-itsetsu-booking-v2.html" style="padding:8px 16px;background:#C8A951;color:#0D1A2D;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none">IT重説を予約 →</a>' +
      '<button onclick="document.getElementById(\'screening-next-banner\').remove()" style="padding:8px 12px;background:rgba(255,255,255,.1);border:none;border-radius:8px;color:rgba(255,255,255,.6);cursor:pointer;font-size:18px;line-height:1">✕</button>' +
    '</div>';
  document.body.appendChild(banner);
  setTimeout(function() {
    if (banner.parentNode) { banner.style.opacity='0'; banner.style.transition='opacity .4s'; setTimeout(function(){ if(banner.parentNode) banner.remove(); }, 400); }
  }, 8000);

  // HQへLINE通知（設定後有効化）
  const msg = `【COREBLDG】書類送付完了\n案件ID: ${c.id}\nクライアント: ${c.name} 様\n管理会社: ${c.mgmt}\n全書類の送付が完了しました。次ステップへ進めてください。`;
  const LINE_TOKEN = (window.LINE_CONFIG && window.LINE_CONFIG.AG_CHANNEL_TOKEN) || '';
  if (LINE_TOKEN) {
    fetch('https://api.line.me/v2/bot/message/broadcast', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + LINE_TOKEN },
      body: JSON.stringify({ messages: [{ type: 'text', text: msg }] })
    }).catch(e => console.error(e));
  } else {
    // console.log('[LINE通知 — 設定待ち]', msg);
  }
}

// ══ フィルター ════════════════════════════════════════
function applyFilter() {
  const q  = document.getElementById('search-input').value.toLowerCase();
  const st = document.getElementById('f-status').value;
  filtered = CASES.filter(c => {
    const matchQ  = !q || c.name.includes(q) || c.kana.includes(q) || c.id.toLowerCase().includes(q);
    const matchSt = !st || caseStatus(c) === st;
    return matchQ && matchSt;
  });
  document.getElementById('filter-count').textContent = filtered.length + '件';
  renderList();
}

// ══ 案件リストレンダリング ════════════════════════════
function renderList() {
  const el = document.getElementById('case-list');
  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">条件に合う案件が見つかりません</div></div>';
    return;
  }
  el.innerHTML = filtered.map(c => renderCase(c)).join('');
}

function renderCase(c) {
  const st    = caseStatus(c);
  const total = c.docs.length;
  const rcvd  = c.docs.filter(d => d.received).length;
  const sent  = c.docs.filter(d => d.sent).length;
  const pctR  = total ? Math.round(rcvd / total * 100) : 0;
  const pctS  = total ? Math.round(sent / total * 100) : 0;

  const docRows = c.docs.map(d => renderDocRow(c.id, d)).join('');

  const addRow = isAG ? `
    <div class="add-doc-row">
      <input class="add-doc-input" type="text" placeholder="＋ 書類名を入力して Enter"
        id="add-input-${c.id}"
        onkeydown="if(event.key==='Enter')addDoc('${c.id}')">
      <button class="btn btn-ghost btn-sm" onclick="addDoc('${c.id}')">追加</button>
    </div>` : '';

  const memoAttr = isHQ ? 'readonly' : '';
  const memoLabel = isHQ ? 'メモ（閲覧のみ）' : 'メモ（管理会社担当者・連絡先など）';

  return `
<div class="case-card" id="card-${c.id}">
  <div class="case-head" onclick="toggleCard('${c.id}')">
    <div class="case-head-left">
      <div class="case-name">${c.name} <span class="mono" style="font-weight:400;font-size:11px">（${c.kana}）</span></div>
      <div class="case-meta">
        <span class="mono">${c.id}</span>
        <span>🏢 ${c.mgmt}</span>
        <span style="font-size:10px;color:var(--faint)">${c.property}</span>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;min-width:200px">
      <div class="prog-wrap">
        <span style="font-size:9px;color:var(--muted);width:54px;flex-shrink:0">受領</span>
        <div class="prog-bar"><div class="prog-fill" style="width:${pctR}%;background:${progColor(pctR)}"></div></div>
        <span class="prog-lbl" style="color:${progColor(pctR)}">${rcvd}/${total}</span>
      </div>
      <div class="prog-wrap">
        <span style="font-size:9px;color:var(--muted);width:54px;flex-shrink:0">送付</span>
        <div class="prog-bar"><div class="prog-fill" style="width:${pctS}%;background:${progColor(pctS)}"></div></div>
        <span class="prog-lbl" style="color:${progColor(pctS)}">${sent}/${total}</span>
      </div>
    </div>
    <div style="margin-left:12px">${statusBadge(st)}</div>
    <button class="btn btn-ghost btn-sm" style="margin-left:6px;font-size:11px;flex-shrink:0"
      onclick="event.stopPropagation();openChecklist('${c.id}','${c.name}','${c.type||'re'}')">
      📋 審査チェック
    </button>
    <div class="case-chevron">▼</div>
  </div>

  <div class="case-body">
    <table class="doc-table">
      <thead>
        <tr>
          <th style="width:36%">書類名</th>
          <th style="width:14%;text-align:center">申込者から受領</th>
          <th style="width:14%;text-align:center">管理会社へ送付</th>
          <th style="width:12%;text-align:center">状態</th>
          <th style="width:14%;font-size:9px">更新日時</th>
          ${isAG ? '<th style="width:10%"></th>' : ''}
        </tr>
      </thead>
      <tbody id="docs-${c.id}">${docRows}</tbody>
    </table>
    ${addRow}
    <div style="margin-top:14px">
      <div style="font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:6px">${memoLabel}</div>
      <textarea class="case-memo" id="memo-${c.id}" ${memoAttr}
        oninput="saveMemo('${c.id}',this.value)"
        placeholder="管理会社担当者名・連絡先・特記事項など">${c.memo}</textarea>
    </div>
  </div>
</div>`;
}

function renderDocRow(caseId, d) {
  const allOk = d.received && d.sent;
  const doneClass = allOk ? ' class="all-done"' : '';

  let statusBadgeHtml = '';
  if (d.sent)           statusBadgeHtml = '<span class="badge b-em">送付済み</span>';
  else if (d.received)  statusBadgeHtml = '<span class="badge b-am">受領済み</span>';
  else                  statusBadgeHtml = '<span class="badge b-nt">未受領</span>';

  const rcvDisabled  = isHQ ? 'disabled' : '';
  const sentDisabled = isHQ ? 'disabled' : '';
  const delBtn       = isAG
    ? `<button class="btn btn-ghost btn-icon" title="削除" onclick="deleteDoc('${caseId}','${d.id}')">🗑</button>`
    : '<td></td>';

  const ts = d.sentAt
    ? `<span style="color:var(--em);font-size:9px">${d.sentAt}</span>`
    : d.receivedAt
      ? `<span style="color:var(--am);font-size:9px">${d.receivedAt}</span>`
      : '<span style="color:var(--faint);font-size:9px">—</span>';

  return `<tr${doneClass}>
    <td>
      <div class="doc-name-cell">
        <input class="doc-name-input" type="text" value="${d.name}"
          ${isHQ ? 'readonly' : ''}
          onchange="renameDoc('${caseId}','${d.id}',this.value)"
          title="クリックして書類名を編集">
      </div>
    </td>
    <td>
      <div class="chk-wrap">
        <input type="checkbox" ${d.received?'checked':''} ${rcvDisabled}
          onchange="toggleDoc('${caseId}','${d.id}','received',this.checked)">
      </div>
    </td>
    <td>
      <div class="chk-wrap">
        <input type="checkbox" ${d.sent?'checked':''} ${sentDisabled}
          onchange="toggleDoc('${caseId}','${d.id}','sent',this.checked)">
      </div>
    </td>
    <td style="text-align:center">${statusBadgeHtml}</td>
    <td>${ts}</td>
    ${isAG ? `<td style="text-align:center">${delBtn}</td>` : ''}
  </tr>`;
}

// ══ 操作 ═════════════════════════════════════════════
function toggleCard(caseId) {
  const card = document.getElementById('card-'+caseId);
  card.classList.toggle('open');
}

function toggleDoc(caseId, docId, field, val) {
  const c = CASES.find(c => c.id === caseId);
  if (!c || isHQ) return;
  const d = c.docs.find(d => d.id === docId);
  if (!d) return;
  if (field === 'sent' && val) d.received = true;
  if (field === 'received' && !val) d.sent = false;
  d[field] = val;
  // 🟠-7: タイムスタンプ記録
  const now = new Date().toLocaleString('ja-JP', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
  if (val) {
    if (field === 'received') d.receivedAt = now;
    if (field === 'sent')     d.sentAt     = now;
  } else {
    if (field === 'received') d.receivedAt = null;
    if (field === 'sent')     d.sentAt     = null;
  }
  refreshCard(caseId);
  updateKPI();
  checkAllSentAndNotify(caseId);
}

function renameDoc(caseId, docId, newName) {
  if (isHQ) return;
  const c = CASES.find(c => c.id === caseId);
  if (!c) return;
  const d = c.docs.find(d => d.id === docId);
  if (d) d.name = newName.trim() || d.name;
}

function addDoc(caseId) {
  if (isHQ) return;
  const input = document.getElementById('add-input-'+caseId);
  const name  = input.value.trim();
  if (!name) return;
  const c = CASES.find(c => c.id === caseId);
  if (!c) return;
  c.docs.push({ id:'d'+Date.now(), name, received:false, sent:false });
  input.value = '';
  refreshCard(caseId);
  updateKPI();
  showToast('「' + name + '」を追加しました', 'em');
}

function deleteDoc(caseId, docId) {
  if (isHQ) return;
  const c = CASES.find(c => c.id === caseId);
  if (!c) return;
  const d = c.docs.find(d => d.id === docId);
  if (!d) return;
  var _dn=d.name,_dc=caseId,_dd=d; coretoConfirm({title:'書類削除',message:'「'+_dn+'」を削除しますか？',okLabel:'削除する',danger:true,onOk:function(){deleteDoc(_dc,{id:_dd.id});}});return;
  c.docs = c.docs.filter(d => d.id !== docId);
  refreshCard(caseId);
  updateKPI();
}

function saveMemo(caseId, val) {
  const c = CASES.find(c => c.id === caseId);
  if (c) c.memo = val;
}

function refreshCard(caseId) {
  const c = CASES.find(c => c.id === caseId);
  if (!c) return;
  // カードが開いているか記憶
  const isOpen = document.getElementById('card-'+caseId).classList.contains('open');
  const memo   = document.getElementById('memo-'+caseId)?.value || c.memo;
  c.memo = memo;
  // カード丸ごと再描画
  const el = document.getElementById('card-'+caseId);
  el.outerHTML = renderCase(c);
  if (isOpen) document.getElementById('card-'+caseId).classList.add('open');
  applyFilter();
}

// ══ ユーティリティ ════════════════════════════════════
function showToast(msg, type) {
  const colors = {em:['#ECFDF5','#059669','rgba(5,150,105,.2)'],am:['#FFFBEB','#D97706','rgba(217,119,6,.2)'],rd:['#FEF2F2','#DC2626','rgba(220,38,38,.2)']};
  const [bg,cl,bc] = colors[type] || colors.em;
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:999;padding:11px 18px;border-radius:9px;font-size:13px;font-weight:600;font-family:Outfit,sans-serif;box-shadow:0 6px 20px rgba(0,0,0,.12);transition:opacity .4s;background:'+bg+';color:'+cl+';border:1px solid '+bc;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),400);},3000);
}

      { id:'motivation', icon:'📝', title:'志望動機確認',
        items:[
          { id:'mot-len',  label:'志望動機 50文字以上',              desc:'50文字以上で記載されているか確認（冷やかし判定）' },

        ]},
      { id:'referral', icon:'🔗', title:'紹介者確認',
        items:[
          { id:'ref-chk',  label:'紹介コード確認・紹介者ランク確認', desc:'Goldランク以上の紹介者がいる場合は審査を優遇' },

  hikari: {
    label:'光通信AG',
    sections:[
      { id:'basic', icon:'👤', title:'基本情報確認',
        items:[
          { id:'name',   label:'氏名・フリガナの一致確認',          desc:'申請フォームの氏名とフリガナが正確に記載されているか' },
          { id:'age',    label:'年齢確認（18歳以上）',               desc:'生年月日から計算し18歳以上であることを確認' },
          { id:'addr',   label:'住所・連絡先の有効性確認',           desc:'郵便番号・住所・メール・電話が有効な形式か' },
        ]},
      { id:'antisocial', icon:'🔍', title:'反社チェック',
        items:[
          { id:'google',  label:'Google検索チェック',                desc:'氏名・住所で検索し反社・詐欺・犯罪歴等の情報がないか確認' },
          { id:'kintone', label:'Kintone内部DB照合',                 desc:'過去の除名・トラブル事例と照合', fatal:true },
        ]},
      { id:'sales', icon:'📞', title:'営業・光通信業経験確認',

var _clState    = {};   // { itemId: 'ok'|'ng'|'skip' }
var _clCaseId   = null;
var _clTypeName = '';

function openChecklist(caseId, caseName, type) {
  _clCaseId = caseId;
  _clState  = {};
  var cl = SCREENING_CHECKLISTS[type] || SCREENING_CHECKLISTS.re;
  _clTypeName = cl.label;
  document.getElementById('cl-title').textContent = caseName + '　書類審査';
  document.getElementById('cl-meta').textContent  = cl.label + ' ／ 担当: ' + (sessionStorage.getItem('coreto_name') || 'HQ');
  document.getElementById('cl-verdict-banner').style.display = 'none';
  renderChecklistBody(cl);
  updateClProgress(cl);
  document.getElementById('checklist-overlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeChecklist() {
  document.getElementById('checklist-overlay').style.display = 'none';
  document.body.style.overflow = '';
}

function renderChecklistBody(cl) {
  var body = document.getElementById('cl-body');
  body.innerHTML = cl.sections.map(function(sec) {
    var items = sec.items.map(function(item) {
      var st = _clState[item.id] || null;
      return '<div id="cli-' + item.id + '" style="padding:10px 12px;border-radius:10px;border:1.5px solid ' +
        (st==='ok'?'var(--em)':st==='ng'?'var(--rd)':st==='skip'?'var(--bd)':'var(--bd)') +
        ';background:' +
        (st==='ok'?'var(--em-bg)':st==='ng'?'var(--rd-bg)':st==='skip'?'var(--cream2)':'var(--cream)') +
        ';margin-bottom:6px;transition:.15s">' +
        '<div style="display:flex;align-items:center;gap:8px">' +
          '<div style="display:flex;gap:5px;flex-shrink:0">' +
            '<button data-id="' + item.id + '" data-val="ok" onclick="clCheck(this.dataset.id,this.dataset.val)" style="padding:3px 9px;border-radius:6px;border:1.5px solid ' +
              (st==='ok'?'var(--em)':'var(--bd)') + ';background:' + (st==='ok'?'var(--em)':'transparent') +
              ';color:' + (st==='ok'?'#fff':'var(--muted)') + ';font-size:11px;font-weight:700;cursor:pointer">OK</button>' +
            '<button data-id="' + item.id + '" data-val="ng" onclick="clCheck(this.dataset.id,this.dataset.val)" style="padding:3px 9px;border-radius:6px;border:1.5px solid ' +
              (st==='ng'?'var(--rd)':'var(--bd)') + ';background:' + (st==='ng'?'var(--rd)':'transparent') +
              ';color:' + (st==='ng'?'#fff':'var(--muted)') + ';font-size:11px;font-weight:700;cursor:pointer">NG</button>' +
            '<button data-id="' + item.id + '" data-val="skip" onclick="clCheck(this.dataset.id,this.dataset.val)" style="padding:3px 9px;border-radius:6px;border:1.5px solid ' +
              (st==='skip'?'var(--bd2)':'var(--bd)') + ';background:' + (st==='skip'?'var(--bd2)':'transparent') +
              ';color:var(--muted);font-size:11px;cursor:pointer">SK</button>' +
          '</div>' +
          '<div style="flex:1">' +
            '<div style="font-size:12px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:5px">' +
              item.label +
              (item.fatal ? '<span style="font-size:9px;padding:1px 6px;background:var(--rd-bg);color:var(--rd);border-radius:4px;font-weight:700">即不合格</span>' : '') +
              (item.hint  ? '<span style="font-size:9px;color:var(--muted)">' + item.hint + '</span>' : '') +
            '</div>' +
            (item.desc ? '<div style="font-size:10px;color:var(--muted);margin-top:1px">' + item.desc + '</div>' : '') +
            (item.warn  ? '<div style="font-size:10px;color:var(--am);margin-top:2px;font-weight:600">⚠️ ' + item.warn + '</div>' : '') +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');
    return '<div style="margin-bottom:18px">' +
      '<div style="font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:6px;margin-bottom:8px">' +
        sec.icon + ' ' + sec.title +
      '</div>' + items + '</div>';
  }).join('');
}

function clCheck(itemId, val) {
  _clState[itemId] = (_clState[itemId] === val) ? null : val;
  var type = _clCaseId ? (CASES.find(function(c){return c.id===_clCaseId;}) || {}).type || 're' : 're';
  var cl = SCREENING_CHECKLISTS[type] || SCREENING_CHECKLISTS.re;
  // 当該行を更新
  var row = document.getElementById('cli-' + itemId);
  if (row) {
    var st = _clState[itemId] || null;
    row.style.borderColor = st==='ok'?'var(--em)':st==='ng'?'var(--rd)':st==='skip'?'var(--bd)':'var(--bd)';
    row.style.background  = st==='ok'?'var(--em-bg)':st==='ng'?'var(--rd-bg)':st==='skip'?'var(--cream2)':'var(--cream)';
    var btns = row.querySelectorAll('button');
    var vals = ['ok','ng','skip'];
    btns.forEach(function(btn, i) {
      if (i === 0) { btn.style.background=st==='ok'?'var(--em)':'transparent'; btn.style.color=st==='ok'?'#fff':'var(--muted)'; btn.style.borderColor=st==='ok'?'var(--em)':'var(--bd)'; }
      if (i === 1) { btn.style.background=st==='ng'?'var(--rd)':'transparent'; btn.style.color=st==='ng'?'#fff':'var(--muted)'; btn.style.borderColor=st==='ng'?'var(--rd)':'var(--bd)'; }
      if (i === 2) { btn.style.background=st==='skip'?'var(--bd2)':'transparent'; btn.style.borderColor=st==='skip'?'var(--bd2)':'var(--bd)'; }
    });
  }
  updateClProgress(cl);
  // NGが1件でも即不合格チェックに引っかかったら自動バナー
  var fatalNG = false;
  cl.sections.forEach(function(sec) {
    sec.items.forEach(function(item) {
      if (item.fatal && _clState[item.id] === 'ng') fatalNG = true;
    });
  });
  if (fatalNG) showClBanner('ng', '⚠️ 即不合格該当項目があります');
  else document.getElementById('cl-verdict-banner').style.display = 'none';
}

function updateClProgress(cl) {
  var total = 0, done = 0;
  cl.sections.forEach(function(sec) {
    sec.items.forEach(function(item) {
      total++;
      if (_clState[item.id]) done++;
    });
  });
  var pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('cl-progress-pct').textContent = pct + '%';
  document.getElementById('cl-progress-lbl').textContent = done + ' / ' + total + ' 確認済み';
  document.getElementById('cl-progress-pct').style.color = pct === 100 ? 'var(--em)' : pct >= 50 ? 'var(--am)' : 'var(--navy)';
}

function showClBanner(type, msg) {
  var b = document.getElementById('cl-verdict-banner');
  b.style.display = 'block';
  b.style.background = type==='pass' ? 'var(--em-bg)' : type==='ng' ? 'var(--rd-bg)' : 'var(--am-bg)';
  b.style.color = type==='pass' ? 'var(--em)' : type==='ng' ? 'var(--rd)' : 'var(--am)';
  b.style.borderBottom = '1px solid ' + (type==='pass'?'rgba(5,150,105,.15)':type==='ng'?'rgba(220,38,38,.15)':'rgba(217,119,6,.15)');
  b.textContent = msg;
}

function clVerdict(type) {
  var label = { pass:'✅ 合格', ng:'❌ 不合格', hold:'⏸ 保留' }[type];
  var msg = { pass:'合格として記録しました', ng:'不合格として記録しました', hold:'保留として記録しました' }[type];
  showClBanner(type, label + ' — ' + msg);
  // CORETO_HQ_TASKSに審査結果を記録
  try {
    var saved = JSON.parse(localStorage.getItem('CORETO_SCREENING_RESULTS') || '{}');
    saved[_clCaseId] = { verdict:type, checkedAt:new Date().toLocaleDateString('ja-JP'), by:sessionStorage.getItem('coreto_name')||'HQ', state:_clState };
    localStorage.setItem('CORETO_SCREENING_RESULTS', JSON.stringify(saved));
  } catch(e) {}
  showToast(label + ' — ' + _clCaseId, type==='pass'?'em':type==='ng'?'rd':'am');
  setTimeout(function(){ closeChecklist(); }, 1500);
}
</script>
