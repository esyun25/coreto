<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>COREBLDG — IT重説 シフト登録</title>
<link rel="stylesheet" href="coreto-design-system.css">
<style>
:root{
  --navy:#0D1A2D;--navy-m:#152238;--navy-l:#1E3252;
  --gold:#C8A951;--gold-dim:rgba(200,169,81,.15);
  --ink:#202124;--muted:#5F6368;--faint:#80868B;
  --em:#059669;--em-bg:#ECFDF5;--am:#D97706;--am-bg:#FFFBEB;
  --rd:#DC2626;--rd-bg:#FEF2F2;--sk:#0284C7;--sk-bg:#F0F9FF;
  --cream:#FFFFFF;--cream2:#F8F9FA;
  --bd:#E8EAED;--bd2:#DADCE0;--sw:240px;
  --sh:0 1px 2px rgba(60,64,67,.1),0 1px 3px rgba(60,64,67,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:var(--cream2)}
.shell{display:flex;height:100vh}

/* ── サイドバー ── */
















/* ── メイン ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.top-bar{background:#fff;border-bottom:1px solid var(--bd);padding:0 28px;height:52px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.top-title{font-size:15px;font-weight:700;color:var(--navy)}
.top-sub{font-size:10px;color:var(--muted);margin-top:1px}
.content{flex:1;overflow-y:auto;padding:24px 28px}

/* ── カード ── */
.card{background:#fff;border:1px solid var(--bd);border-radius:12px;
  box-shadow:var(--sh);margin-bottom:18px;overflow:hidden}
.card-head{padding:14px 18px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:700;color:var(--navy)}
.card-body{padding:18px}

/* ── 登録フォーム ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.4px}
.form-input{padding:9px 11px;border:1.5px solid var(--bd2);border-radius:8px;
  font-size:13px;font-family:'Outfit',sans-serif;color:var(--ink);
  transition:.15s;background:#fff}
.form-input:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(13,26,45,.06)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;
  font-size:12px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;
  border:none;transition:.15s;letter-spacing:.2px}
.btn-navy{background:var(--navy);color:var(--gold)}
.btn-navy:hover{background:var(--navy-m)}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--bd2)}
.btn-ghost:hover{border-color:var(--navy);color:var(--navy)}
.btn-sm{padding:6px 13px;font-size:11px}
.btn-danger{background:var(--rd-bg);color:var(--rd);border:1px solid rgba(220,38,38,.2)}

/* ── スロット一覧 ── */
.slot-row{display:grid;grid-template-columns:110px 100px 80px 1fr 80px 80px;
  align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--bd);
  font-size:12px;color:var(--ink);transition:.12s}
.slot-row:last-child{border-bottom:none}
.slot-row:hover{background:var(--cream2)}
.slot-row.header{background:var(--cream2);font-size:10px;font-weight:700;
  color:var(--muted);letter-spacing:.4px;padding:8px 14px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;
  font-size:10px;font-weight:700;letter-spacing:.3px}
.badge-open{background:var(--em-bg);color:var(--em)}
.badge-booked{background:var(--am-bg);color:var(--am)}

/* ── サマリー ── */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.stat-card{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:14px 16px;
  box-shadow:var(--sh)}
.stat-num{font-size:24px;font-weight:700;color:var(--navy);font-variant-numeric:tabular-nums}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:2px}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;
  padding:11px 18px;border-radius:9px;font-size:12px;font-weight:600;
  box-shadow:0 4px 20px rgba(0,0,0,.2);opacity:0;transition:.3s;z-index:999;pointer-events:none}
.toast.show{opacity:1}

@media(max-width:768px){
  
  .form-grid{grid-template-columns:1fr 1fr}
  .slot-row{grid-template-columns:1fr 1fr 80px;gap:6px}
  .slot-row .hide-mob{display:none}
}
</style>
</head>
<body>
<div class="shell">

<!-- サイドバー -->
<div class="sb">
  <div class="sb-head">
    <div class="sb-logo">CORETO</div>
    <div class="sb-ver">COREBLDG v2</div>
  </div>
  <div id="sb-nav" class="sb-nav">
    <div class="nav-sec">IT重説</div>
    <a class="nav-item active" href="coreto-itsetsu-schedule-v2.html">📅 シフト登録</a>
    <a class="nav-item" href="coreto-itsetsu-booking-v2.html">📋 予約受付</a>
    <a class="nav-item" href="coreto-itsetsu-v2.html">🔑 IT重説チェック</a>
    <div class="nav-sec">メニュー</div>
    <a class="nav-item" href="coreto-hub-v2.html">🏠 ホーム</a>
  </div>
  <div class="sb-foot">
    <div class="sb-user">
      <div class="sb-av" id="sb-av">渡</div>
      <div>
        <div class="sb-uname" id="sb-uname"><script>document.write(sessionStorage.getItem("coreto_name")||"—")</script></div>
        <div class="sb-urole">専任宅建士</div>
      </div>
    </div>
  </div>
</div>

<!-- メイン -->
<div class="main">
  <div class="top-bar">
    <div>
      <div class="top-title">📅 IT重説 シフト登録</div>
      <div class="top-sub">空きスロットを事前登録してください。クライアントの希望受付前に入力をお願いします。</div>
    </div>
    <button class="btn btn-navy" onclick="openAddModal()">＋ スロット追加</button>
  </div>

  <div class="content">

    <!-- サマリー -->
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-num" id="stat-open">—</div>
        <div class="stat-lbl">空き枠</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-booked">—</div>
        <div class="stat-lbl">予約済み</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-total">—</div>
        <div class="stat-lbl">今月合計</div>
      </div>
    </div>

    <!-- スロット一覧 -->
    <div class="card">
      <div class="card-head">
        <div class="card-title">登録済みスロット</div>
        <div style="display:flex;gap:8px;align-items:center">
          <select id="filter-takk" onchange="renderSlots()"
            style="font-size:11px;padding:5px 8px;border:1.5px solid var(--bd2);border-radius:7px;
            font-family:'Outfit',sans-serif;color:var(--ink);background:#fff">
            <option value="">全宅建士</option>
            <option value="TK-001">渡辺 賢一</option>
            <option value="TK-002">佐々木 美穂</option>
            <option value="TK-003">松本 浩二</option>
          </select>
        </div>
      </div>
      <div class="slot-row header">
        <span>日付</span>
        <span>時間</span>
        <span>宅建士</span>
        <span class="hide-mob">スロットID</span>
        <span>ステータス</span>
        <span>操作</span>
      </div>
      <div id="slot-list"></div>
    </div>

  </div>
</div>
</div>

<!-- 追加モーダル -->
<div id="add-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;
  display:none;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:14px;width:480px;padding:24px;box-shadow:0 8px 40px rgba(0,0,0,.2)">
    <div style="font-size:14px;font-weight:700;color:var(--navy);margin-bottom:18px">＋ スロット追加</div>
    <div class="form-grid" style="grid-template-columns:1fr 1fr">
      <div class="form-group">
        <label class="form-label">宅建士</label>
        <select id="add-takk" class="form-input">
          <option value="TK-001">渡辺 賢一</option>
          <option value="TK-002">佐々木 美穂</option>
          <option value="TK-003">松本 浩二</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">日付</label>
        <input type="date" id="add-date" class="form-input">
      </div>
      <div class="form-group">
        <label class="form-label">開始時刻</label>
        <input type="time" id="add-start" class="form-input" value="10:00">
      </div>
      <div class="form-group">
        <label class="form-label">終了時刻</label>
        <input type="time" id="add-end" class="form-input" value="11:00">
      </div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:6px">
      <button class="btn btn-ghost" onclick="closeAddModal()">キャンセル</button>
      <button class="btn btn-navy" onclick="addSlot()">登録する</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
(function(){
  var _role = sessionStorage.getItem('coreto_role') || '';
  var _allowed = ["hq"];
  if (_allowed.length && !_allowed.includes(_role)) {
    location.replace('coreto-hub-v2.html?unauthorized=1');
  }
})();

const LS_SLOTS = 'CORETO_ITSETSU_SLOTS';
const LS_BOOKINGS = 'CORETO_ITSETSU_BOOKINGS';
function lsGet(k){try{return JSON.parse(localStorage.getItem(k)||'null');}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function getSlots(){return lsGet(LS_SLOTS)||initDemoSlots();}
function saveSlots(v){lsSet(LS_SLOTS,v);}

function initDemoSlots(){
  const s=[
    {id:'SL-001',takkId:'TK-001',takkName:'渡辺 賢一', date:'2026-03-16',start:'10:00',end:'11:00',status:'open'},
    {id:'SL-002',takkId:'TK-001',takkName:'渡辺 賢一', date:'2026-03-17',start:'14:00',end:'15:00',status:'open'},
    {id:'SL-003',takkId:'TK-002',takkName:'佐々木 美穂',date:'2026-03-16',start:'13:00',end:'14:00',status:'open'},
    {id:'SL-004',takkId:'TK-002',takkName:'佐々木 美穂',date:'2026-03-18',start:'10:00',end:'11:00',status:'booked',bookingId:'BK-001'},
    {id:'SL-005',takkId:'TK-003',takkName:'松本 浩二',  date:'2026-03-19',start:'15:00',end:'16:00',status:'open'},
    {id:'SL-006',takkId:'TK-003',takkName:'松本 浩二',  date:'2026-03-20',start:'11:00',end:'12:00',status:'open'},
  ];
  saveSlots(s); return s;
}

function fmtDate(d){
  const dt=new Date(d+'T00:00:00');
  return `${dt.getMonth()+1}/${dt.getDate()}（${'日月火水木金土'[dt.getDay()]}）`;
}

function renderSlots(){
  const slots = getSlots();
  const filter = document.getElementById('filter-takk')?.value||'';
  const list = slots.filter(s=>!filter||s.takkId===filter)
                    .sort((a,b)=>a.date.localeCompare(b.date)||a.start.localeCompare(b.start));

  const open   = slots.filter(s=>s.status==='open').length;
  const booked = slots.filter(s=>s.status==='booked').length;
  document.getElementById('stat-open').textContent   = open;
  document.getElementById('stat-booked').textContent = booked;
  document.getElementById('stat-total').textContent  = slots.length;

  document.getElementById('slot-list').innerHTML = list.length
    ? list.map(s=>`
      <div class="slot-row">
        <span style="font-weight:600">${fmtDate(s.date)}</span>
        <span>${s.start}〜${s.end}</span>
        <span>${s.takkName}</span>
        <span class="hide-mob" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--faint)">${s.id}</span>
        <span><span class="badge badge-${s.status}">${s.status==='open'?'空き':'予約済'}</span></span>
        <span>
          ${s.status==='open'
            ? `<button class="btn btn-sm btn-danger" onclick="deleteSlot('${s.id}')">削除</button>`
            : `<span style="font-size:10px;color:var(--faint)">${s.bookingId||'—'}</span>`
          }
        </span>
      </div>`).join('')
    : '<div style="padding:32px;text-align:center;font-size:12px;color:var(--faint)">スロットがありません</div>';
}

function openAddModal(){
  const d = new Date(); d.setDate(d.getDate()+1);
  document.getElementById('add-date').value = d.toISOString().slice(0,10);
  document.getElementById('add-modal').style.display = 'flex';
}
function closeAddModal(){ document.getElementById('add-modal').style.display='none'; }

function addSlot(){
  const takkId = document.getElementById('add-takk').value;
  const takkNames = {'TK-001':'渡辺 賢一','TK-002':'佐々木 美穂','TK-003':'松本 浩二'};
  const date  = document.getElementById('add-date').value;
  const start = document.getElementById('add-start').value;
  const end   = document.getElementById('add-end').value;
  if(!date||!start||!end){showToast('日付・時刻を入力してください','warn');return;}
  if(start>=end){showToast('終了時刻は開始より後にしてください','warn');return;}
  const slots = getSlots();
  const newSlot = {
    id: 'SL-'+Date.now().toString().slice(-6),
    takkId, takkName: takkNames[takkId]||takkId,
    date, start, end, status:'open',
  };
  slots.push(newSlot);
  saveSlots(slots);
  closeAddModal();
  renderSlots();
  showToast(`✅ ${fmtDate(date)} ${start}〜${end} を登録しました`);
}

function deleteSlot(id){
  var _slotId=id; coretoConfirm({title:'スロット削除',message:'このスロットを削除しますか？',okLabel:'削除する',danger:true,onOk:function(){_doDeleteSlot(_slotId);}});return;
  const slots = getSlots().filter(s=>s.id!==id);
  saveSlots(slots);
  renderSlots();
  showToast('🗑️ スロットを削除しました');
}

function _doDeleteSlot(id) { SLOTS = SLOTS.filter(function(s){return s.id!==id;}); try{localStorage.setItem("CORETO_ITSETSU_SLOTS",JSON.stringify(SLOTS));}catch(e){} render(); showToast("スロットを削除しました","em"); }
function showToast(msg,type){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.style.background = type==='warn'?'#D97706':type==='err'?'#DC2626':'#0D1A2D';
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}

document.addEventListener('DOMContentLoaded', renderSlots);
</script>
<script src="coreto-kv-client.js"></script>
<script src="coreto-nav-v2.js"></script>
<script>window.addEventListener("DOMContentLoaded",function(){CNAV.init("itsetsu");});</script>
</body>
</html>
