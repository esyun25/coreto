<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>オンボーディング — COREBLDG</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0D1A2D;--navy-l:#1E3252;--gold:#C8A951;--gold-dim:rgba(200,169,81,.15);
  --ink:#202124;--muted:#5F6368;--faint:#80868B;
  --em:#059669;--em-bg:#ECFDF5;--am:#D97706;--am-bg:#FFFBEB;
  --rd:#DC2626;--rd-bg:#FEF2F2;--sk:#0284C7;--sk-bg:#F0F9FF;
  --bd:#E8EAED;--bd2:#DADCE0;--cream2:#F8F9FA;
  --sw:240px;--r:10px;--sh:0 1px 2px rgba(60,64,67,.1),0 1px 3px rgba(60,64,67,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:#fff}
.shell{display:flex;height:100vh}
.sb{width:var(--sw);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;position:relative}
.sb::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,transparent,rgba(200,169,81,.2),transparent)}
.sb-head{padding:20px 18px 14px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-logo{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--gold);letter-spacing:2px}
.sb-ver{font-size:9px;color:rgba(255,255,255,.25);margin-top:4px}
.sb-user{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-av{width:32px;height:32px;border-radius:50%;background:rgba(200,169,81,.2);border:1.5px solid rgba(200,169,81,.4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--gold);flex-shrink:0}
.sb-nav{flex:1;overflow-y:auto;padding:10px 0}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{display:flex;align-items:center;gap:12px;padding:0 24px;height:56px;border-bottom:1px solid var(--bd);background:#fff;flex-shrink:0}
.mob-ham{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px}
.mob-ham span{display:block;width:20px;height:2px;background:var(--ink);border-radius:2px}
.tb-title{font-size:15px;font-weight:700;color:var(--ink)}
.tb-crumb{font-size:10px;color:var(--muted)}
.tb-crumb a{color:var(--muted);text-decoration:none}
.page{flex:1;overflow-y:auto;padding:24px;background:var(--cream2)}
/* ボタン */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Outfit','Noto Sans JP',sans-serif;transition:.15s;border:none}
.btn-primary{background:var(--navy);color:#fff}.btn-primary:hover{opacity:.9}
.btn-em{background:var(--em);color:#fff}
.btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--bd)}.btn-ghost:hover{background:var(--cream2)}
.btn-gold{background:var(--gold);color:var(--navy);font-weight:700}
.btn-sm{padding:5px 12px;font-size:11px}
/* バッジ */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.b-em{background:var(--em-bg);color:var(--em)}.b-am{background:var(--am-bg);color:var(--am)}
.b-rd{background:var(--rd-bg);color:var(--rd)}.b-sk{background:var(--sk-bg);color:var(--sk)}
.b-nt{background:#F3F4F6;color:#374151}.b-gold{background:var(--gold-dim);color:#92610A}
/* カード */
.sec{background:#fff;border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:16px}
.sec-head{padding:13px 18px;border-bottom:1px solid var(--bd);background:var(--cream2);display:flex;align-items:center;justify-content:space-between;gap:8px}
.sec-title{font-size:12px;font-weight:700;color:var(--ink);text-transform:uppercase;letter-spacing:.5px}
/* サブナビ */
.subnav{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.subnav-btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--bd);background:#fff;color:var(--muted);transition:.15s;font-family:'Outfit','Noto Sans JP',sans-serif}
.subnav-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
/* 進捗バー */
.prog-bar{height:6px;background:var(--bd);border-radius:3px;overflow:hidden;margin-top:6px}
.prog-fill{height:100%;border-radius:3px;transition:.3s}
/* タスクリスト */
.task-item{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border-bottom:1px solid var(--bd);cursor:pointer;transition:.1s}
.task-item:hover{background:rgba(13,26,45,.02)}
.task-item.done .task-title{color:var(--muted);text-decoration:line-through}
.task-cb{width:20px;height:20px;border-radius:50%;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:.15s;cursor:pointer}
.task-cb.checked{background:var(--em);border-color:var(--em);color:#fff}
.task-title{font-size:13px;font-weight:600;color:var(--ink)}
.task-sub{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.5}
/* 研修カード */
.lesson-card{display:flex;gap:14px;padding:14px 16px;border-bottom:1px solid var(--bd);cursor:pointer;transition:.1s;position:relative}
.lesson-card:hover{background:rgba(13,26,45,.02)}
.lesson-card.done{opacity:.6}
.lesson-card.done::after{content:'✅ 完了';position:absolute;top:12px;right:14px;font-size:10px;font-weight:700;color:var(--em)}
.lesson-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
/* 規約 */
.tos-section{padding:16px;border-bottom:1px solid var(--bd)}
.tos-title{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:8px}
.tos-body{font-size:12px;color:var(--muted);line-height:1.8;max-height:120px;overflow:hidden;position:relative;transition:.3s}
.tos-body.expanded{max-height:none}
.tos-body::after{content:'';position:absolute;bottom:0;left:0;right:0;height:30px;background:linear-gradient(transparent,#fff);pointer-events:none}
.tos-body.expanded::after{display:none}
.tos-agree-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--em);background:var(--em-bg);color:var(--em);margin-top:10px;transition:.15s}
.tos-agree-btn.agreed{background:var(--em);color:#fff;pointer-events:none}
/* HQ管理テーブル */
.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:9px 14px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--bd);text-align:left;background:var(--cream2);white-space:nowrap}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--bd);font-size:12px;color:var(--ink);vertical-align:middle}
.tbl tr:hover td{background:rgba(13,26,45,.02)}
/* レッスン詳細ドロワー */
.drawer{position:fixed;right:-100%;top:0;bottom:0;width:min(600px,96vw);background:#fff;border-left:1px solid var(--bd);z-index:200;transition:.3s;display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(0,0,0,.12)}
.drawer.open{right:0}
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:199;display:none}
.drawer-overlay.show{display:block}
.drawer-head{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--cream2);flex-shrink:0}
.drawer-body{flex:1;overflow-y:auto;padding:24px}
.drawer-body h3{font-size:14px;font-weight:700;color:var(--navy);margin:18px 0 8px;border-bottom:2px solid var(--gold-dim);padding-bottom:6px}
.drawer-body h3:first-child{margin-top:0}
.drawer-body p{font-size:12px;color:var(--ink);line-height:1.8;margin-bottom:10px}
.drawer-body ul,.drawer-body ol{padding-left:18px;margin-bottom:10px}
.drawer-body li{font-size:12px;color:var(--ink);line-height:1.8;margin-bottom:4px}
.drawer-body table{width:100%;border-collapse:collapse;margin-bottom:12px;font-size:12px}
.drawer-body th{background:var(--cream2);padding:7px 10px;border:1px solid var(--bd);font-weight:700;text-align:left}
.drawer-body td{padding:7px 10px;border:1px solid var(--bd)}
.drawer-body strong{color:var(--navy);font-weight:700}
.drawer-footer{padding:14px 20px;border-top:1px solid var(--bd);background:var(--cream2);display:flex;gap:10px;flex-shrink:0}
/* グリッド */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.kpi-card{background:#fff;border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh)}
.kpi-val{font-size:24px;font-weight:300;color:var(--ink);font-variant-numeric:tabular-nums}
.kpi-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
/* モバイル */
.mob-overlay-sb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.grid-2{grid-template-columns:1fr}}
@media(max-width:900px){.mob-ham{display:flex}.sb{position:fixed;left:-100%;top:0;bottom:0;z-index:100;transition:.25s}.sb.open{left:0}.mob-overlay-sb.show{display:block}}
</style>
</head>

<nav class="sb">

</div>

<!-- レッスン詳細ドロワー -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>

  <div class="drawer-head">
    <div>
      <div id="drawer-title" style="font-size:14px;font-weight:700;color:var(--ink)">—</div>
      <div id="drawer-meta" style="font-size:10px;color:var(--muted);margin-top:3px">—</div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
  <div class="drawer-footer">
    <button class="btn btn-em" style="flex:1;justify-content:center" id="drawer-complete-btn" onclick="completeLesson()">
      ✅ 読了・完了マーク
    </button>
    <button class="btn btn-ghost btn-sm" onclick="closeDrawer()">閉じる</button>
  </div>
</div>

<div class="mob-overlay-sb" onclick="toggleSb()"></div>
<div id="ob-toast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-size:12px;font-weight:600;opacity:0;transition:.3s;z-index:999;pointer-events:none;white-space:nowrap"></div>

<script src="coreto-nav-v2.js"></script>
<script>
function toggleSb(){ document.querySelector('.sb').classList.toggle('open'); document.querySelector('.mob-overlay-sb').classList.toggle('show'); }
function showToast(msg,type=''){
  const t=document.getElementById('ob-toast');
  t.textContent=msg; t.style.background=type==='err'?'var(--rd)':type==='warn'?'var(--am)':'var(--navy)';
  t.style.opacity='1'; t.style.transform='translateX(-50%) translateY(0)';
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(10px)';},3000);
}

// ── プログレス管理 ────────────────────────────────────────
const ROLE_KEY = SESSION.type === 're_ag' ? 're' : SESSION.type === 'hr_ag' ? 'hr' : 'pt';
let taskProgress = {};
let lessonProgress = {};
let tosProgress = {};
let _currentLessonId = null;

function getMyTasks() {
  return TASKS[ROLE_KEY] || [];
}

function calcTaskPct() {
  const tasks = getMyTasks();
  const done = tasks.filter(t => taskProgress[t.id]).length;
  return tasks.length ? Math.round(done / tasks.length * 100) : 0;
}

function calcLessonPct() {
  const lessons = LESSONS.filter(l => l.roles.includes(ROLE_KEY));
  const done = lessons.filter(l => lessonProgress[l.id]).length;
  return lessons.length ? Math.round(done / lessons.length * 100) : 0;
}

function calcTotalPct() {
  const t = calcTaskPct();
  const l = calcLessonPct();
  const tosCount = TERMS.filter(t => t.requiredFor.includes(ROLE_KEY)).length;
  const tosAgreed = TERMS.filter(t => t.requiredFor.includes(ROLE_KEY) && tosProgress[t.id]).length;
  const tosPct = tosCount ? Math.round(tosAgreed / tosCount * 100) : 100;
  return Math.round((t + l + tosPct) / 3);
}

function updateTopbarProgress() {
  const pct = calcTotalPct();
  const bar = document.getElementById('topbar-prog');
  const pctEl = document.getElementById('topbar-prog-pct');
  if (bar) bar.style.width = pct + '%';
  if (pctEl) { pctEl.textContent = pct + '%'; pctEl.style.color = pct >= 100 ? 'var(--gold)' : pct >= 50 ? 'var(--em)' : 'var(--am)'; }
}

// ── サブナビ ──────────────────────────────────────────────
const SECTIONS = IS_HQ
  ? [{ key:'hq', label:'📊 HQ管理' }, { key:'hq-settings', label:'⚙️ 設定' }]
  : [{ key:'progress', label:'📋 入会タスク' }, { key:'lessons', label:'📚 研修コンテンツ' }, { key:'terms', label:'📜 利用規約' }];

function buildSubnav() {
  document.getElementById('subnav').innerHTML = SECTIONS.map(s=>`
    <button class="subnav-btn${s.key===currentSection?' active':''}" onclick="showSection('${s.key}')">${s.label}</button>
  `).join('');
}

let currentSection = SECTIONS[0].key;
function showSection(key) {
  currentSection = key;
  buildSubnav();
  renderSection();
}

function renderSection() {
  const el = document.getElementById('main-content');
  switch(currentSection) {
    case 'progress':   el.innerHTML = renderProgress(); bindTaskEvents(); break;
    case 'lessons':    el.innerHTML = renderLessons(); break;
    case 'terms':      el.innerHTML = renderTerms(); break;
    case 'hq':         el.innerHTML = renderHQ(); break;
    case 'hq-settings': el.innerHTML = renderHQSettings(); break;
  }
  updateTopbarProgress();
}

// ── ① 入会タスク ──────────────────────────────────────────
function renderProgress() {
  const tasks = getMyTasks();
  const doneCnt = tasks.filter(t => taskProgress[t.id]).length;
  const pct = calcTaskPct();

  // フェーズごとにグループ化
  const phases = {};
  tasks.forEach(t => {
    if (!phases[t.phase]) phases[t.phase] = [];
    phases[t.phase].push(t);
  });

  const phaseHtml = Object.entries(phases).map(([phase, pts]) => {
    const pDone = pts.filter(t => taskProgress[t.id]).length;
    return `
      <div class="sec" style="margin-bottom:12px">
        <div class="sec-head">
          <div class="sec-title" style="font-size:11px">${phase}</div>
          <span class="badge ${pDone===pts.length?'b-em':'b-nt'}">${pDone}/${pts.length}</span>
        </div>
        <div>
          ${pts.map(t => `
            <div class="task-item${taskProgress[t.id]?' done':''}" id="task-${t.id}">
              <div class="task-cb${taskProgress[t.id]?' checked':''}" onclick="toggleTask('${t.id}')">
                ${taskProgress[t.id] ? '✓' : ''}
              </div>
              <div style="flex:1;min-width:0">
                <div class="task-title">${t.title}</div>
                <div class="task-sub">${t.sub}</div>
                <div style="display:flex;gap:4px;margin-top:6px">
                  ${t.tags.map(tg=>`<span class="badge ${tg==='必須'?'b-rd':tg.includes('法令')?'b-am':'b-nt'}" style="font-size:9px">${tg}</span>`).join('')}
                </div>
              </div>
              <button class="btn btn-ghost btn-sm" style="flex-shrink:0" onclick="openTaskDetail('${t.id}')">詳細</button>
            </div>`).join('')}
        </div>
      </div>`;
  }).join('');

  return `
    <!-- 全体進捗カード -->
    <div class="sec" style="margin-bottom:16px">
      <div style="padding:18px 20px;display:flex;align-items:center;gap:20px">
        <div style="width:64px;height:64px;border-radius:50%;border:4px solid ${pct>=100?'var(--gold)':pct>=50?'var(--em)':'var(--am)'};
          display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <div style="font-size:16px;font-weight:700;color:var(--ink)">${pct}%</div>
        </div>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:700;margin-bottom:4px">入会タスク進捗</div>
          <div style="font-size:12px;color:var(--muted);margin-bottom:8px">${doneCnt}件完了 / ${tasks.length}件中</div>
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${pct>=100?'var(--gold)':pct>=50?'var(--em)':'var(--am)'}"></div></div>
        </div>
        ${pct >= 100 ? '<div style="font-size:24px">🎉</div>' : ''}
      </div>
    </div>
    ${phaseHtml}`;
}

function bindTaskEvents() {}

function toggleTask(id) {
  taskProgress[id] = !taskProgress[id];
  renderSection();
  showToast(taskProgress[id] ? '✅ タスク完了！' : 'タスクを未完了に戻しました');
}

function openTaskDetail(id) {
  const tasks = getMyTasks();
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  document.getElementById('drawer-title').textContent = t.title;
  document.getElementById('drawer-meta').textContent = t.phase;
  document.getElementById('drawer-body').innerHTML = `
    <div style="margin-bottom:16px">
      <div style="font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:12px">${t.sub}</div>
      ${t.detail ? `<div style="background:var(--cream2);border-radius:8px;padding:14px;font-size:12px;line-height:1.8;color:var(--ink);white-space:pre-wrap">${t.detail}</div>` : ''}
    </div>
    <div style="display:flex;gap:6px;margin-bottom:16px">
      ${t.tags.map(tg=>`<span class="badge ${tg==='必須'?'b-rd':tg.includes('法令')?'b-am':'b-nt'}">${tg}</span>`).join('')}
    </div>`;
  document.getElementById('drawer-complete-btn').textContent = taskProgress[id] ? '✅ 完了済み（クリックで取消）' : '✅ このタスクを完了する';
  document.getElementById('drawer-complete-btn').onclick = () => { toggleTask(id); closeDrawer(); };
  openDrawer();
}

// ── ② 研修コンテンツ ─────────────────────────────────────
function renderLessons() {
  const myLessons = LESSONS.filter(l => l.roles.includes(ROLE_KEY));
  const done = myLessons.filter(l => lessonProgress[l.id]).length;
  const pct = calcLessonPct();

  const groups = { '共通（全AG/PT必須）': [], [`${ROLE_KEY.toUpperCase()}専用`]: [] };
  myLessons.forEach(l => {
    if (l.roles.length >= 3) groups['共通（全AG/PT必須）'].push(l);
    else groups[`${ROLE_KEY.toUpperCase()}専用`].push(l);
  });

  let html = `
    <div class="sec" style="margin-bottom:16px">
      <div style="padding:14px 18px;display:flex;align-items:center;gap:16px">
        <div style="flex:1">
          <div style="font-size:13px;font-weight:700;margin-bottom:4px">研修コンテンツ進捗</div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:6px">${done}件完了 / ${myLessons.length}件中</div>
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:var(--em)"></div></div>
        </div>
        <span class="badge ${pct>=100?'b-gold':'b-nt'}" style="font-size:13px;padding:6px 12px">${pct}%</span>
      </div>
    </div>`;

  Object.entries(groups).forEach(([groupName, lessons]) => {
    if (!lessons.length) return;
    html += `
      <div class="sec" style="margin-bottom:12px">
        <div class="sec-head"><div class="sec-title">${groupName}</div></div>
        <div>
          ${lessons.map(l => `
            <div class="lesson-card${lessonProgress[l.id]?' done':''}" onclick="openLesson('${l.id}')">
              <div class="lesson-icon" style="background:${l.iconBg}">${l.icon}</div>
              <div style="flex:1;min-width:0">
                <div style="font-size:13px;font-weight:700;color:var(--ink);margin-bottom:3px">${l.title}</div>
                <div style="font-size:11px;color:var(--muted);margin-bottom:6px">${l.sub}</div>
                <div style="display:flex;gap:4px">
                  <span class="badge b-nt" style="font-size:9px">⏱ 約${l.readMin}分</span>
                  ${l.tags.map(tg=>`<span class="badge ${tg==='必読'?'b-rd':tg.includes('法令')?'b-am':'b-sk'}" style="font-size:9px">${tg}</span>`).join('')}
                </div>
              </div>
            </div>`).join('')}
        </div>
      </div>`;
  });
  return html;
}

function openLesson(id) {
  const l = LESSONS.find(x => x.id === id);
  if (!l) return;
  _currentLessonId = id;
  document.getElementById('drawer-title').textContent = l.title;
  document.getElementById('drawer-meta').textContent = `⏱ 約${l.readMin}分 · ${l.tags.join(' · ')}`;
  document.getElementById('drawer-body').innerHTML = l.body;
  const btn = document.getElementById('drawer-complete-btn');
  if (lessonProgress[id]) {
    btn.textContent = '✅ 読了済み（クリックで取消）';
    btn.style.background = 'var(--muted)';
  } else {
    btn.textContent = '✅ 読了・完了マーク';
    btn.style.background = '';
  }
  openDrawer();
}

function completeLesson() {
  if (!_currentLessonId) return;
  lessonProgress[_currentLessonId] = !lessonProgress[_currentLessonId];
  showToast(lessonProgress[_currentLessonId] ? `✅ 「${LESSONS.find(l=>l.id===_currentLessonId)?.title}」を完了しました！` : '完了を取り消しました');
  closeDrawer();
  renderSection();
}

// ── ③ 利用規約 ───────────────────────────────────────────
function renderTerms() {
  const myTerms = TERMS.filter(t => t.requiredFor.includes(ROLE_KEY));
  const agreed = myTerms.filter(t => tosProgress[t.id]).length;

  let html = `
    <div class="sec" style="margin-bottom:16px">
      <div style="padding:14px 18px;display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-size:13px;font-weight:700;margin-bottom:3px">利用規約への同意</div>
          <div style="font-size:11px;color:var(--muted)">${agreed}/${myTerms.length} 件に同意済み</div>
        </div>
        <span class="badge ${agreed>=myTerms.length?'b-em':'b-am'}">${agreed>=myTerms.length?'全件同意済み ✅':'未同意あり ⚠️'}</span>
      </div>
    </div>`;

  myTerms.forEach(t => {
    html += `
      <div class="sec" style="margin-bottom:12px" id="tos-${t.id}">
        <div class="sec-head">
          <div class="sec-title" style="font-size:11px">${t.title}</div>
          ${tosProgress[t.id] ? '<span class="badge b-em">✅ 同意済み</span>' : '<span class="badge b-am">⚠️ 未同意</span>'}
        </div>
        <div class="tos-section">
          <div class="tos-body${tosProgress[t.id]?' expanded':''}" id="tos-body-${t.id}" style="white-space:pre-wrap;font-size:11px;color:var(--ink);line-height:1.8">${t.body}</div>
          <div style="display:flex;gap:8px;align-items:center;margin-top:10px">
            <button class="btn btn-ghost btn-sm" onclick="toggleTosExpand('${t.id}')">全文を読む ↓</button>
            <button class="tos-agree-btn${tosProgress[t.id]?' agreed':''}" onclick="agreeTos('${t.id}')">
              ${tosProgress[t.id] ? '✅ 同意済み' : '同意して次へ →'}
            </button>
          </div>
        </div>
      </div>`;
  });
  return html;
}

function toggleTosExpand(id) {
  const el = document.getElementById('tos-body-' + id);
  if (el) el.classList.toggle('expanded');
}

function agreeTos(id) {
  if (tosProgress[id]) return;
  tosProgress[id] = true;
  renderSection();
  showToast('✅ 同意を記録しました');
}

  document.getElementById('drawer-overlay').classList.add('show');
}
function closeDrawer() {
  document.getElementById('lesson-drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('show');
  _currentLessonId = null;
}

// ── 初期化 ────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  // ① まずコンテンツ描画（他のv2ページと同じ順序）
  buildSubnav();
  renderSection();
  updateTopbarProgress();
  // ② CNAV（ナビ描画）
  CNAV.init('onboarding');
});
</script>
