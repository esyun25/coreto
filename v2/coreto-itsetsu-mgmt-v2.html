<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IT重説管理 — COREBLDG</title>
<link rel="stylesheet" href="coreto-design-system.css">
<link rel="stylesheet" href="design-system.css">
<style>
/* minimal page-specific styles */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:var(--bg,#fff)}
.shell{display:flex;height:100vh}
.content{flex:1;overflow-y:auto;padding:24px 28px}
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--bd);margin-bottom:20px}
.tab-btn{padding:12px 20px;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit}
.tab-btn.active{border-bottom-color:var(--navy);color:var(--navy);font-weight:700}
.tab-frame{width:100%;border:none;height:calc(100vh - 160px)}
</style>
</head>
<body>
<div class="shell">
  <nav class="sb" id="sidebar"></nav>
  <div class="content">
    <div class="tb-title" id="page-title">IT重説管理</div>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="showMgmtTab('match',this)">🎯 マッチング管理</button>
      <button class="tab-btn" onclick="showMgmtTab('shift',this)">📅 シフト管理</button>
      <button class="tab-btn" onclick="showMgmtTab('exec',this)">✅ 実施管理</button>
    </div>
    <div id="tab-content">
      <iframe class="tab-frame" id="mgmt-frame" src="coreto-itsetsu-hq-v2.html"></iframe>
    </div>
  </div>
</div>
<script src="icons.js"></script>
<script src="coreto-nav-v2.js"></script>
<script>
CNAV.init('itsetsu_mgmt');
var TABS = { match: 'coreto-itsetsu-hq-v2.html', shift: 'coreto-itsetsu-schedule-v2.html', exec: 'coreto-itsetsu-v2.html' };
function showMgmtTab(key, btn) {
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  document.getElementById('mgmt-frame').src = TABS[key] || TABS.match;
}
</script>
</body>
</html>
