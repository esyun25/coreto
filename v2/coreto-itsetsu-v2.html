<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>契約書スキャン管理 — COREBLDG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>


:root{
  --navy:#0D1A2D;--navy-m:#152238;--navy-l:#1E3252;
  --gold:#C8A951;--gold-dim:rgba(200,169,81,.15);
  --cream:#FFFFFF;--cream2:#F8F9FA;--white:#FFFFFF;
  --ink:#202124;--ink2:#2D3748;--muted:#5F6368;--faint:#80868B;
  --em:#059669;--em-bg:#ECFDF5;--am:#D97706;--am-bg:#FFFBEB;
  --rd:#DC2626;--rd-bg:#FEF2F2;--sk:#0284C7;--sk-bg:#F0F9FF;
  --vt:#7C3AED;--vt-bg:#F5F3FF;--bd:#E8EAED;--bd2:#DADCE0;
  --sw:240px;--r:10px;--r-sm:7px;
  --sh:0 1px 2px rgba(60,64,67,.1),0 1px 3px rgba(60,64,67,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:var(--cream)}
.shell{display:flex;height:100vh}
.sb{width:var(--sw);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;position:relative}
.sb::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,rgba(200,169,81,.25) 0%,rgba(200,169,81,.06) 50%,transparent 100%)}
.sb-head{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;letter-spacing:5px;color:var(--gold)}
.sb-ver{font-size:9px;letter-spacing:2px;color:rgba(200,169,81,.3);font-family:'DM Mono',monospace;margin-top:2px}
.sb-user{margin:14px 14px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:9px 11px;display:flex;align-items:center;gap:9px}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--gold-dim);border:1px solid rgba(200,169,81,.25);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gold);flex-shrink:0}
.sb-uname{font-size:11px;font-weight:600;color:rgba(255,255,255,.8)}
.sb-urole{font-size:9px;color:rgba(255,255,255,.3);font-family:'DM Mono',monospace}
.sb-nav{flex:1;overflow-y:auto;padding:6px 10px}
.sb-nav::-webkit-scrollbar{width:3px}
.sb-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.nav-sec-label{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.18);padding:10px 8px 4px;font-family:'DM Mono',monospace}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;cursor:pointer;transition:all .13s;text-decoration:none;position:relative;margin-bottom:1px}
.nav-item:hover{background:rgba(255,255,255,.06)}
.nav-item.active{background:rgba(200,169,81,.1)}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:16px;background:var(--gold);border-radius:0 2px 2px 0}
.nav-icon{width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;border-radius:6px;background:rgba(255,255,255,.04);flex-shrink:0}
.nav-item.active .nav-icon{background:rgba(200,169,81,.12)}
.nav-label{font-size:11px;font-weight:500;color:rgba(255,255,255,.55);flex:1}
.nav-item.active .nav-label,.nav-item:hover .nav-label{color:var(--gold)}
.nav-item:hover .nav-label{color:rgba(255,255,255,.82)}
.nav-badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;background:var(--rd);color:#fff;font-family:'Outfit',sans-serif}
.nav-badge.amber{background:var(--am)}
.sb-foot{padding:10px 14px 18px;border-top:1px solid rgba(255,255,255,.05)}
.sb-foot-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.3);transition:.13s}
.sb-foot-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.6)}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;box-shadow:var(--sh)}
.tb-title{font-size:16px;font-weight:600;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;letter-spacing:.2px}
.tb-crumb{font-size:11px;color:var(--faint);display:flex;align-items:center;gap:5px;margin-top:1px}
.tb-crumb a{color:var(--muted);text-decoration:none}
.tb-crumb a:hover{color:var(--am)}
.tb-actions{margin-left:auto;display:flex;gap:9px;align-items:center}
.btn{padding:7px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Outfit',sans-serif;border:none}
.btn-primary{background:var(--navy);color:var(--gold)}
.btn-primary:hover{background:var(--navy-l)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--bd)}
.btn-ghost:hover{background:var(--cream);color:var(--ink)}
.btn-sm{padding:5px 12px;font-size:11px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;font-family:'Outfit',sans-serif;font-feature-settings:'tnum'}
.badge-em{background:var(--em-bg);color:var(--em)}
.badge-am{background:var(--am-bg);color:var(--am)}
.badge-rd{background:var(--rd-bg);color:var(--rd)}
.badge-sk{background:var(--sk-bg);color:var(--sk)}
.badge-vt{background:var(--vt-bg);color:var(--vt)}
.badge-gd{background:var(--gold-dim);color:var(--am)}
.badge-nt{background:var(--cream2);color:var(--muted)}

/* TABS */
.tab-bar{padding:0 24px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:0}
.tab{padding:12px 18px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s;white-space:nowrap;display:flex;align-items:center;gap:7px}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--navy);border-bottom-color:var(--gold)}
.tab-count{font-size:10px;padding:1px 6px;border-radius:10px;background:var(--cream2);font-family:'DM Mono',monospace}
.tab.active .tab-count{background:var(--gold-dim);color:var(--am)}
.view-toggle{margin-left:auto;display:flex;gap:4px}
.view-btn{width:30px;height:30px;border:1px solid var(--bd);border-radius:6px;background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:.13s}
.view-btn.active{background:var(--navy);border-color:var(--navy)}
.view-btn:hover:not(.active){background:var(--cream)}

/* FILTER */
.filter-bar{display:flex;align-items:center;gap:10px;padding:14px 24px;background:var(--cream);border-bottom:1px solid var(--bd);flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap input{width:100%;padding:8px 12px 8px 34px;background:var(--white);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:12px;color:var(--ink);outline:none;font-family:'Outfit','Noto Sans JP',sans-serif;transition:.15s}
.search-wrap input:focus{border-color:var(--gold)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--faint)}
.fsel{padding:7px 11px;background:var(--white);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:12px;color:var(--ink);outline:none;cursor:pointer;font-family:'Outfit',sans-serif}

/* LIST VIEW */
.page{flex:1;overflow-y:auto;padding:20px 24px}
.page::-webkit-scrollbar{width:5px}
.page::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.case-list{display:flex;flex-direction:column;gap:8px}
.case-row{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .15s;box-shadow:var(--sh)}
.case-row:hover{border-color:rgba(200,169,81,.4);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.08)}
.case-type-pill{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;font-family:'DM Mono',monospace;flex-shrink:0}
.type-rental{background:var(--sk-bg);color:var(--sk)}
.type-sale{background:var(--em-bg);color:var(--em)}
.type-hr{background:var(--vt-bg);color:var(--vt)}
.type-utility{background:var(--am-bg);color:var(--am)}
.case-id{font-size:10px;font-family:'DM Mono',monospace;color:var(--faint);margin-bottom:2px}
.case-name{font-size:14px;font-weight:600;color:var(--ink)}
.case-sub{font-size:11px;color:var(--muted);margin-top:2px}
.case-info{flex:1;min-width:0}
.case-meta{display:flex;gap:16px;align-items:center;flex-shrink:0}
.case-meta-item{text-align:right}
.case-meta-label{font-size:9px;color:var(--faint);font-family:'DM Mono',monospace;letter-spacing:.5px}
.case-meta-val{font-size:12px;font-weight:600;color:var(--ink);margin-top:1px}
.case-arrow{font-size:16px;color:var(--faint);flex-shrink:0;transition:.15s}
.case-row:hover .case-arrow{color:var(--am);transform:translateX(2px)}

/* KANBAN */
.kanban{display:flex;gap:14px;overflow-x:auto;padding-bottom:16px;height:100%}
.kanban::-webkit-scrollbar{height:5px}
.kanban::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.kanban-col{flex-shrink:0;width:240px;display:flex;flex-direction:column;gap:8px}
.kanban-head{padding:10px 14px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.kh-title{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.kh-count{font-size:10px;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:10px;font-weight:700}
.kanban-card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r-sm);padding:12px 13px;cursor:pointer;transition:all .15s;box-shadow:var(--sh)}
.kanban-card:hover{border-color:rgba(200,169,81,.4);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.kc-id{font-size:9px;font-family:'DM Mono',monospace;color:var(--faint);margin-bottom:4px}
.kc-name{font-size:12px;font-weight:700;color:var(--ink);margin-bottom:3px}
.kc-prop{font-size:11px;color:var(--muted);margin-bottom:8px}
.kc-footer{display:flex;align-items:center;justify-content:space-between}
.kc-ag{font-size:9px;font-family:'DM Mono',monospace;color:var(--faint)}
.kc-flag{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700}

/* ════════════════════════════════════════════
   数値フォント統一 — Outfit + Tabular Nums
   (DM Monoはコード/ID系のみ維持)
   ════════════════════════════════════════════ */

/* バッジ・カウント系 */
.nb, .nav-badge, .cnav-badge,
.tab-count, .kh-count, .kc-count,
.badge, .score-num {
  font-family: 'Outfit', sans-serif !important;
  font-variant-numeric: tabular-nums;
  font-feature-settings: 'tnum';
  letter-spacing: 0 !important;
}

/* KPI大数値 */
.qs-val, .kpi-val, .kpi-value,
.stat-val, .count-val {
  font-variant-numeric: tabular-nums;
  font-feature-settings: 'tnum', 'lnum';
}

/* 日時・タイムスタンプ */
.tl-time, .remit-deadline, .check-meta,
.ic-date, .pipe-date {
  font-family: 'Outfit', sans-serif !important;
  font-variant-numeric: tabular-nums;
  font-feature-settings: 'tnum';
}

/* テーブル金額セル */
td.num, .bc-vl, .slip-meta,
.it-step-num, .pg-btn, .pg-info {
  font-family: 'Outfit', sans-serif !important;
  font-variant-numeric: tabular-nums;
  font-feature-settings: 'tnum';
}

/* 金額入力フィールド（Outfit で統一） */
.amount-input {
  font-family: 'Outfit', sans-serif !important;
  font-variant-numeric: tabular-nums;
}

/* ══ MOBILE RESPONSIVE ══════════════════════════════════════════ */
.mob-ham{display:none;flex-direction:column;align-items:center;justify-content:center;width:36px;height:36px;background:transparent;border:none;cursor:pointer;border-radius:7px;transition:.13s;flex-shrink:0}
.mob-ham:hover{background:rgba(255,255,255,.08)}
.mob-ham span{display:block;width:18px;height:2px;background:rgba(255,255,255,.72);margin:3px 0;border-radius:1px;transition:.2s}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199}
@media(max-width:768px){
  .mob-ham{display:flex}
  .mob-overlay.show{display:block}
  .sb{position:fixed;left:calc(-1 * var(--sw));top:0;height:100vh;z-index:200;transition:left .25s ease;box-shadow:4px 0 24px rgba(0,0,0,.25)}
  .sb.open{left:0}
  .shell{overflow:hidden}
  .content{width:100vw;min-width:0}
  .topbar{padding:0 12px;gap:8px}
  .tb-crumb{display:none}
  .tb-actions{gap:6px}
  .page,.detail-wrap{padding:12px}
  .detail-wrap{flex-direction:column;overflow-y:auto}
  .detail-main{overflow-y:visible;min-height:0}
  .detail-side{width:100%!important;overflow-y:visible}
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;font-size:11px}
  .kpi-row,.qs-row{grid-template-columns:1fr 1fr!important}
  .g2,.form-grid{grid-template-columns:1fr!important}
  .pipeline{padding-bottom:8px}
  .step-label{font-size:9px}
  .tb-title{font-size:14px}
}


/* ── Google-style Design System ── */
html, body { background:#FFFFFF !important; }
.sb-logo, .brand-logo { font-family:'Cormorant Garamond',serif !important; }
body, input, select, textarea, button { font-family:'Outfit','Noto Sans JP',sans-serif; }
.kpi-value, .kpi-vl {
  font-family:'Outfit','Noto Sans JP',sans-serif !important;
  font-weight:300 !important;
  font-variant-numeric:tabular-nums lining-nums !important;
  letter-spacing:-1px !important;
  color:var(--ink) !important;
}
.kpi-value { font-size:32px !important;font-variant-numeric:tabular-nums}
.kpi-vl   { font-size:28px !important; }
.stat-val {
  font-family:'Outfit','Noto Sans JP',sans-serif !important;
  font-weight:400 !important;
  font-variant-numeric:tabular-nums !important;
  color:var(--ink) !important;
}
.kpi-label, .kpi-sub, .stat-label { font-size:11px !important; font-weight:500 !important; color:var(--muted) !important; }
.section-title { font-size:11px !important; font-weight:600 !important; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); }
.section-title::before { display:none; }
.card { background:#FFFFFF; border:1px solid var(--bd); border-radius:8px; box-shadow:var(--sh); }
.kpi-card { background:#FFFFFF !important; border:1px solid var(--bd) !important; border-radius:8px !important; box-shadow:none !important; }
.badge { border-radius:4px !important; font-size:11px !important; font-weight:500 !important; }
.delta-up, .kpi-delta.up { color:var(--em) !important; }
.delta-dn, .kpi-delta.dn { color:var(--rd) !important; }
/* ── Google-style 数値原則 (DS v2.3) ── */
.kpi-value, .kpi-vl, .kpi-val,
.stat-val, .qs-val, .count-val,
.td-amt, .bc-vl, .bc-total-vl,
.rr-amount, .amount-val, .srv,
.visit-reward, .lb-val,
.mf-kpi-vl, .mf-reward {
  font-family:'Outfit','Noto Sans JP',sans-serif !important;
  font-weight:300 !important;
  font-variant-numeric:tabular-nums !important;
}
.kpi-value { font-size:32px !important; }
.kpi-vl    { font-size:28px !important; }

/* ═══ Contract Scan System ═══ */
.flow-steps{display:flex;align-items:center;gap:0;padding:20px 24px;background:#fff;border-bottom:1px solid var(--bd);overflow-x:auto}
.fs-item{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:80px;flex-shrink:0}
.fs-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;border:2px solid var(--bd);background:#fff;color:var(--faint);font-weight:700;transition:.2s}
.fs-dot.done{background:var(--em);color:#fff;border-color:var(--em)}
.fs-dot.active{background:var(--navy);color:var(--gold);border-color:var(--navy);box-shadow:0 0 0 4px rgba(13,26,45,.12)}
.fs-dot.todo{background:#fff;color:var(--faint);border-color:var(--bd2)}
.fs-label{font-size:9px;font-weight:600;color:var(--muted);text-align:center;line-height:1.4;white-space:nowrap}
.fs-label.active{color:var(--navy);font-weight:700}
.fs-arrow{width:32px;height:2px;background:var(--bd2);flex-shrink:0;margin-bottom:20px}
.fs-arrow.done{background:var(--em)}

.cs-body{display:grid;grid-template-columns:340px 1fr;gap:0;flex:1;overflow:hidden;min-height:0}
@media(max-width:900px){.cs-body{grid-template-columns:1fr}}
.cs-left{border-right:1px solid var(--bd);overflow-y:auto;padding:20px}
.cs-right{overflow-y:auto;padding:20px}

/* 案件登録パネル */
.case-search-box{background:var(--cream2);border:1px solid var(--bd);border-radius:10px;padding:14px;margin-bottom:14px}
.case-result{background:#fff;border:1px solid var(--bd);border-radius:8px;padding:12px;cursor:pointer;transition:.15s;margin-bottom:8px}
.case-result:hover{border-color:var(--gold);box-shadow:var(--sh)}
.case-result.selected{border-color:var(--navy);background:rgba(13,26,45,.03)}
.cr-id{font-family:'DM Mono',monospace;font-size:10px;color:var(--faint)}
.cr-name{font-size:13px;font-weight:600;color:var(--ink);margin:2px 0}
.cr-sub{font-size:11px;color:var(--muted)}

/* スキャンアップロード */
.scan-drop{border:2px dashed var(--bd2);border-radius:12px;padding:40px 24px;text-align:center;background:var(--cream2);transition:.2s;cursor:pointer}
.scan-drop:hover,.scan-drop.drag{border-color:var(--gold);background:rgba(200,169,81,.04)}
.scan-drop.has-file{border-color:var(--em);border-style:solid;background:var(--em-bg)}

/* AI解析結果 */
.ai-panel{background:#fff;border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:16px}
.ai-panel-head{background:linear-gradient(135deg,var(--navy),var(--navy-l));padding:12px 16px;display:flex;align-items:center;gap:10px}
.ai-panel-body{padding:16px}

/* 署名・捺印マップ */
.stamp-map-wrap{position:relative;display:inline-block;max-width:100%}
.stamp-map-wrap img{max-width:100%;height:auto;display:block;border:1px solid var(--bd);border-radius:6px}
.stamp-marker{position:absolute;border:2px solid;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;font-size:10px;font-weight:700;white-space:nowrap;padding:2px 6px;backdrop-filter:blur(2px)}
.stamp-marker.sign{border-color:var(--rd);background:rgba(220,38,38,.12);color:var(--rd)}
.stamp-marker.hanko{border-color:var(--am);background:rgba(217,119,6,.12);color:var(--am)}
.stamp-marker.chukkai{border-color:var(--em);background:rgba(5,150,105,.12);color:var(--em)}
.stamp-marker.done{opacity:.5;text-decoration:line-through}

/* 捺印チェックリスト */
.stamp-checklist{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.stamp-check-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#fff;border:1px solid var(--bd);border-radius:8px;transition:.15s}
.stamp-check-item.done{background:var(--em-bg);border-color:rgba(5,150,105,.25)}
.sci-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sci-icon.sign{background:rgba(220,38,38,.1)}
.sci-icon.hanko{background:rgba(217,119,6,.1)}
.sci-icon.chukkai{background:rgba(5,150,105,.1)}
.sci-body{flex:1}
.sci-title{font-size:12px;font-weight:600;color:var(--ink)}
.sci-detail{font-size:10px;color:var(--muted);margin-top:2px}
.sci-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--bd);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s}
.sci-check.checked{background:var(--em);border-color:var(--em);color:#fff}

/* ラベルプレビュー */
.label-preview{background:#fff;border:2px solid var(--ink);border-radius:4px;padding:12px 14px;font-size:11px;line-height:2;max-width:300px;font-family:'Outfit','Noto Sans JP',sans-serif}
.label-preview .lp-title{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--muted);margin-bottom:4px}
.label-preview .lp-main{font-size:14px;font-weight:700;color:var(--ink)}
.label-preview .lp-sub{font-size:10px;color:var(--muted)}

</style>
</head>
<body>
<div class="shell">
<nav class="sb">
  <div class="sb-head"><div class="sb-logo">CORE<br>BLDG</div><div class="sb-ver">v2.0 — CORETO</div></div>
  <div class="sb-user">
    <div class="sb-av" id="sb-av">--</div>
    <div>
      <div id="sb-name" style="font-size:11px;font-weight:600;color:rgba(255,255,255,.8)">...</div>
      <div id="sb-role" style="font-size:9px;color:rgba(255,255,255,.3);font-family:'Outfit',sans-serif;font-variant-numeric:tabular-nums">...</div>
    </div>
  </div>
  <div class="sb-nav" id="sb-nav"><!-- CNAV --></div>
</nav>
<div class="content">
  <div class="topbar">
    <button class="mob-ham" onclick="toggleSb()"><span></span><span></span><span></span></button>
    <div>
      <div class="tb-title">契約書スキャン管理</div>
      <div class="tb-crumb"><a href="coreto-hub-v2.html">COREBLDG</a> › 契約書スキャン管理</div>
    </div>
    <div class="tb-act" style="margin-left:auto;display:flex;gap:8px;align-items:center">
      <button class="btn btn-ghost btn-sm" onclick="resetFlow()">🔄 新しい書類を処理</button>
    </div>
  </div>

  <!-- フロー進捗バー -->
  <div class="flow-steps" id="flow-steps"></div>

  <!-- メインレイアウト -->
  <div class="cs-body">
    <div class="cs-left" id="cs-left"></div>
    <div class="cs-right" id="cs-right"></div>
  </div>

</div>
</div>
<div class="mob-overlay" onclick="toggleSb()"></div>
<div id="ip-toast" class="toast"></div>


<script>
function toggleSb(){ document.querySelector('.sb').classList.toggle('open'); document.querySelector('.mob-overlay').classList.toggle('show'); }
function showToast(msg,type=''){const t=document.getElementById('ip-toast');t.textContent=msg;t.className='toast '+type;t.style.opacity='1';setTimeout(()=>t.style.opacity='0',3200);}

// ── フロー定義 ────────────────────────────────────────────
const FLOW_STEPS = [
  {id:'register', label:'案件\n登録',    icon:'📋'},
  {id:'scan',     label:'書類\nスキャン',icon:'📄'},
  {id:'ai',       label:'AI\n解析',      icon:'✨'},
  {id:'stamp',    label:'仲介印\n捺印',  icon:'🔴'},
  {id:'label',    label:'ラベル\n印刷',  icon:'🖨️'},
  {id:'ship',     label:'発送\n完了',    icon:'📮'},
];

// ── アプリ状態 ────────────────────────────────────────────
let STATE = {
  step:         'register',   // 現在のフローステップ
  selectedCase: null,         // 選択した案件
  scannedFile:  null,         // アップロードファイル
  scannedDataUrl: null,       // プレビュー用DataURL
  aiResult:     null,         // AI解析結果
  stampChecks:  {},           // { itemId: true/false }
  trackingNo:   '',
  shippedAt:    null,
};

// ── デモ案件データ ────────────────────────────────────────
const DEMO_CASES = [
  {id:'RENT-0194',name:'田中 優子 様',sub:'港区三田3丁目 2LDK ¥198,000',ag:'AG-0021 木下',type:'rental'},
  {id:'RENT-0193',name:'鈴木 健太 様',sub:'渋谷区代々木 1LDK ¥155,000',ag:'AG-0021 木下',type:'rental'},
  {id:'RENT-0192',name:'高橋 美咲 様',sub:'新宿区西新宿 2LDK ¥175,000',ag:'AG-0034 大橋',type:'rental'},
  {id:'SALE-0041',name:'伊藤 誠 様',  sub:'品川区大崎 3LDK ¥62,000,000',ag:'AG-0021 木下',type:'sale'},
];

// ── フロー進捗バー描画 ─────────────────────────────────────
function renderFlowBar() {
  const stepIds = FLOW_STEPS.map(s=>s.id);
  const cur = stepIds.indexOf(STATE.step);
  document.getElementById('flow-steps').innerHTML = FLOW_STEPS.map((s,i) => {
    const cls = i < cur ? 'done' : i === cur ? 'active' : 'todo';
    const arrow = i < FLOW_STEPS.length-1
      ? `<div class="fs-arrow ${i<cur?'done':''}"></div>` : '';
    const icon = i < cur ? '✓' : s.icon;
    return `<div class="fs-item">
      <div class="fs-dot ${cls}">${icon}</div>
      <div class="fs-label ${cls==='active'?'active':''}">${s.label.replace('\n','<br>')}</div>
    </div>${arrow}`;
  }).join('');
}

// ── STEP 1: 案件登録 ──────────────────────────────────────
function renderRegister() {
  document.getElementById('cs-left').innerHTML = `
    <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:12px;letter-spacing:.5px">📋 STEP 1 — 案件を選択</div>
    <div class="case-search-box">
      <input type="text" id="case-search" placeholder="クライアント名・物件名・案件IDで検索..."
        style="width:100%;padding:8px 12px;border:1px solid var(--bd);border-radius:8px;font-size:12px;box-sizing:border-box"
        oninput="searchCases(this.value)">
    </div>
    <div id="case-results"></div>
  `;
  document.getElementById('cs-right').innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:12px;color:var(--faint)">
      <div style="font-size:36px">📋</div>
      <div style="font-size:13px">左の検索から案件を選択してください</div>
      <div style="font-size:11px">管理会社から届いた書類の対象案件を登録します</div>
    </div>
  `;
  searchCases('');
}

function searchCases(q) {
  const results = DEMO_CASES.filter(c =>
    !q || c.name.includes(q) || c.sub.includes(q) || c.id.includes(q.toUpperCase())
  );
  document.getElementById('case-results').innerHTML = results.length
    ? results.map(c => `
        <div class="case-result ${STATE.selectedCase?.id===c.id?'selected':''}" onclick="selectCase('${c.id}')">
          <div class="cr-id">${c.id}</div>
          <div class="cr-name">${c.name}</div>
          <div class="cr-sub">${c.sub}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:4px">👤 ${c.ag}</div>
        </div>`).join('')
    : '<div style="font-size:12px;color:var(--faint);padding:12px;text-align:center">該当案件なし</div>';

  if (STATE.selectedCase) renderSelectedCase();
}

function selectCase(id) {
  STATE.selectedCase = DEMO_CASES.find(c=>c.id===id);
  searchCases(document.getElementById('case-search')?.value||'');
  renderSelectedCase();
}

function renderSelectedCase() {
  const c = STATE.selectedCase;
  if (!c) return;
  document.getElementById('cs-right').innerHTML = `
    <div style="background:var(--em-bg);border:1px solid rgba(5,150,105,.2);border-radius:10px;padding:16px;margin-bottom:16px">
      <div style="font-size:10px;font-weight:700;color:var(--em);margin-bottom:8px">✅ 選択中の案件</div>
      <div style="font-size:14px;font-weight:700;color:var(--ink)">${c.name}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:3px">${c.sub}</div>
      <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--faint);margin-top:4px">${c.id}</div>
    </div>
    <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:10px">📂 書類種別を選択</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
      ${[['賃貸契約書','📃'],['重要事項説明書','📋'],['売買契約書','🏢'],['その他','📄']].map(([label,icon])=>
        `<div class="case-result" onclick="selectDocType('${label}')" id="dt-${label}"
          style="text-align:center;padding:12px 8px">
          <div style="font-size:20px;margin-bottom:4px">${icon}</div>
          <div style="font-size:11px;font-weight:600">${label}</div>
        </div>`).join('')}
    </div>
    <div id="confirm-register" style="display:none">
      <button class="btn btn-primary" onclick="confirmRegister()" style="width:100%">
        📋 案件登録してスキャンへ進む
      </button>
    </div>
  `;
}

let selectedDocType = '';
function selectDocType(type) {
  selectedDocType = type;
  document.querySelectorAll('[id^="dt-"]').forEach(el=>{
    el.style.borderColor = el.id === 'dt-'+type ? 'var(--navy)' : '';
    el.style.background  = el.id === 'dt-'+type ? 'rgba(13,26,45,.04)' : '';
  });
  document.getElementById('confirm-register').style.display='block';
}

function confirmRegister() {
  if (!STATE.selectedCase || !selectedDocType) return;
  STATE.docType = selectedDocType;
  showToast(`✅ 案件登録完了：${STATE.selectedCase.name} / ${selectedDocType}`);
  goStep('scan');
}

// ── STEP 2: スキャン ─────────────────────────────────────
function renderScan() {
  document.getElementById('cs-left').innerHTML = `
    <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:12px">📄 STEP 2 — 書類をスキャン・アップロード</div>
    <div style="background:var(--cream2);border:1px solid var(--bd);border-radius:8px;padding:12px;margin-bottom:14px;font-size:11px;color:var(--muted);line-height:1.8">
      📌 スキャナーまたはスマートフォンで書類を撮影し、画像またはPDFをアップロードしてください。
      AIが署名・捺印・仲介印が必要な箇所を自動で検出します。
    </div>
    <div class="scan-drop" id="scan-drop" onclick="document.getElementById('scan-file').click()"
      ondragover="event.preventDefault();this.classList.add('drag')"
      ondrop="handleDrop(event)">
      <div style="font-size:32px;margin-bottom:8px">📄</div>
      <div style="font-size:13px;font-weight:600;color:var(--ink);margin-bottom:4px">ファイルをドロップ または クリックして選択</div>
      <div style="font-size:10px;color:var(--muted)">JPEG / PNG / PDF に対応</div>
      <input type="file" id="scan-file" accept="image/*,application/pdf" style="display:none" onchange="handleFileSelect(event)">
    </div>
    <div id="scan-preview-mini" style="margin-top:12px"></div>
  `;
  document.getElementById('cs-right').innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:12px;color:var(--faint)">
      <div style="font-size:36px">🖼️</div>
      <div style="font-size:13px">ファイルをアップロードするとプレビューが表示されます</div>
    </div>
  `;
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('scan-drop').classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) processFile(file);
}
function handleFileSelect(e) {
  const file = e.target.files[0];
  if (file) processFile(file);
}

function processFile(file) {
  STATE.scannedFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    STATE.scannedDataUrl = e.target.result;
    document.getElementById('scan-drop').classList.add('has-file');
    document.getElementById('scan-drop').innerHTML = `
      <div style="font-size:24px;margin-bottom:6px">✅</div>
      <div style="font-size:12px;font-weight:700;color:var(--em)">${file.name}</div>
      <div style="font-size:10px;color:var(--muted);">${(file.size/1024).toFixed(0)}KB</div>
    `;
    // プレビュー
    if (file.type.startsWith('image/')) {
      document.getElementById('cs-right').innerHTML = `
        <div style="margin-bottom:12px;font-size:12px;font-weight:700;color:var(--navy)">プレビュー</div>
        <img src="${STATE.scannedDataUrl}" style="max-width:100%;border:1px solid var(--bd);border-radius:8px">
        <div style="margin-top:16px">
          <button class="btn btn-primary" onclick="goStep('ai')" style="width:100%">
            ✨ AIで署名・捺印箇所を解析する
          </button>
        </div>
      `;
    } else {
      document.getElementById('cs-right').innerHTML = `
        <div style="background:var(--em-bg);border:1px solid rgba(5,150,105,.2);border-radius:8px;padding:16px;text-align:center">
          <div style="font-size:24px">📄</div>
          <div style="font-size:12px;font-weight:600;color:var(--em);margin-top:6px">${file.name} をアップロード済み</div>
        </div>
        <div style="margin-top:16px">
          <button class="btn btn-primary" onclick="goStep('ai')" style="width:100%">
            ✨ AIで署名・捺印箇所を解析する
          </button>
        </div>
      `;
    }
  };
  reader.readAsDataURL(file);
}

// ── STEP 3: AI解析 ───────────────────────────────────────
async function renderAI() {
  document.getElementById('cs-left').innerHTML = `
    <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:12px">✨ STEP 3 — AI解析中</div>
    <div style="text-align:center;padding:40px 0">
      <div style="font-size:40px;animation:spin .8s linear infinite;display:inline-block">✨</div>
      <div style="font-size:13px;font-weight:600;color:var(--ink);margin-top:12px">AIが書類を解析しています...</div>
      <div style="font-size:11px;color:var(--muted);margin-top:6px">署名・捺印・仲介印の必要箇所を検出中</div>
    </div>
  `;
  document.getElementById('cs-right').innerHTML = `<div style="padding:40px;text-align:center;color:var(--faint)">解析結果を待っています...</div>`;

  // AI解析実行
  const isImage = STATE.scannedFile?.type?.startsWith('image/');
  const cas = STATE.selectedCase;
  const docType = STATE.docType || '賃貸契約書';

  try {
    const messages = [{
      role: 'user',
      content: isImage && STATE.scannedDataUrl ? [
        { type: 'image', source: { type: 'base64', media_type: STATE.scannedFile.type, data: STATE.scannedDataUrl.split(',')[1] } },
        { type: 'text', text: buildAIPrompt(cas, docType) }
      ] : [
        { type: 'text', text: buildAIPromptText(cas, docType) }
      ]
    }];

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages })
    });
    const data = await resp.json();
    const text = data.content?.find(b=>b.type==='text')?.text || '{}';
    STATE.aiResult = JSON.parse(text.replace(/```json|```/g,'').trim());
  } catch(e) {
    // フォールバック: デモデータ
    STATE.aiResult = buildDemoAIResult(cas, docType);
  }

  renderAIResult();
}

function buildAIPrompt(cas, docType) {
  return `この${docType}を解析してください。クライアント名：${cas?.name||'不明'}、物件：${cas?.sub||'不明'}。\n以下をJSONのみで回答（前置き不要）：\n{"summary":{"client":"クライアント名","property":"物件名","docType":"書類種別"},"customer_signs":[{"id":"cs1","location":"ページ/箇所の説明","type":"sign/hanko","instruction":"クライアントへの指示（記名・押印の別、確認事項）"}],"chukkai_stamps":[{"id":"ck1","location":"仲介印が必要な箇所","reason":"理由"}],"notes":"全体的な注意点"}`;
}
function buildAIPromptText(cas, docType) {
  return `${docType}の書類処理について。クライアント名：${cas?.name||'不明'}、物件：${cas?.sub||'不明'}。\n一般的な${docType}の署名・捺印・仲介印の必要箇所を想定して回答してください。\nJSONのみ（前置き不要）：\n{"summary":{"client":"クライアント名","property":"物件名","docType":"書類種別"},"customer_signs":[{"id":"cs1","location":"箇所の説明","type":"sign/hanko","instruction":"クライアントへの指示"}],"chukkai_stamps":[{"id":"ck1","location":"仲介印箇所","reason":"理由"}],"notes":"注意点"}`;
}
function buildDemoAIResult(cas, docType) {
  return {
    summary: { client: cas?.name||'田中 優子 様', property: cas?.sub||'港区三田3丁目 2LDK', docType },
    customer_signs: [
      {id:'cs1',location:'1ページ目 — 借主署名欄（右下）',type:'sign',instruction:'【借主】署名欄に自署してください。印鑑登録証明書と同一の印鑑が必要です。'},
      {id:'cs2',location:'1ページ目 — 借主捺印欄',type:'hanko',instruction:'【借主】実印を押印してください（朱肉使用）'},
      {id:'cs3',location:'2ページ目 — 連帯保証人署名欄',type:'sign',instruction:'【連帯保証人】自署が必要です。連帯保証人の印鑑証明書と照合します。'},
      {id:'cs4',location:'2ページ目 — 連帯保証人捺印欄',type:'hanko',instruction:'【連帯保証人】実印を押印してください'},
      {id:'cs5',location:'最終ページ — 受領確認欄',type:'sign',instruction:'【借主】受取日・署名・捺印が必要です'},
    ],
    chukkai_stamps: [
      {id:'ck1',location:'1ページ目 — 仲介業者欄（右下コーナー）',reason:'仲介会社として契約に関与したことの証明'},
      {id:'ck2',location:'重説ページ — 宅地建物取引士記名欄の隣',reason:'宅建士証番号と同一の仲介印が必要'},
    ],
    notes: 'ページ割れ（1枚目と2枚目の間）に割印が必要な場合があります。管理会社のフォーマットを事前に確認してください。'
  };
}

function renderAIResult() {
  const r = STATE.aiResult;
  if (!r) return;

  // 左パネル: サマリー + 仲介印チェックリスト
  const stampsHtml = (r.chukkai_stamps||[]).map(s => {
    const checked = STATE.stampChecks[s.id];
    return `<div class="stamp-check-item ${checked?'done':''}" id="sci-${s.id}">
      <div class="sci-icon chukkai">🔴</div>
      <div class="sci-body">
        <div class="sci-title">${s.location}</div>
        <div class="sci-detail">${s.reason}</div>
      </div>
      <div class="sci-check ${checked?'checked':''}" onclick="toggleStamp('${s.id}')">
        ${checked?'✓':''}
      </div>
    </div>`;
  }).join('');

  const allStampsDone = (r.chukkai_stamps||[]).every(s=>STATE.stampChecks[s.id]);

  document.getElementById('cs-left').innerHTML = `
    <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:12px">🔴 STEP 4 — 仲介印の捺印</div>
    <div style="background:var(--am-bg);border:1px solid rgba(217,119,6,.25);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:11px;color:var(--am);font-weight:600">
      ⚠️ 以下の箇所に仲介印（CORETOの角印）を押印してください
    </div>
    <div class="stamp-checklist" id="stamp-checklist">${stampsHtml}</div>
    ${r.notes ? `<div style="background:var(--cream2);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;font-size:11px;color:var(--muted);line-height:1.7;margin-bottom:14px">
      💬 ${r.notes}</div>` : ''}
    <button class="btn btn-primary" id="stamp-done-btn"
      onclick="confirmStampDone()"
      style="width:100%;${allStampsDone?'':'opacity:.5'}"
      ${allStampsDone?'':'disabled'}>
      ✅ 仲介印 捺印完了 → ラベル印刷へ
    </button>
  `;

  // 右パネル: 顧客への署名指示
  const signsHtml = (r.customer_signs||[]).map((s,i) => {
    const typeIcon = s.type === 'sign' ? '✍️' : '🔴';
    const typeLabel = s.type === 'sign' ? '署名（自署）' : '捺印（実印）';
    const typeCls = s.type === 'sign' ? 'rd' : 'am';
    return `<div style="background:#fff;border:1px solid var(--bd);border-radius:8px;padding:12px 14px;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="background:var(--navy);color:var(--gold);width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0">${i+1}</span>
        <span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--${typeCls}-bg);color:var(--${typeCls})">${typeIcon} ${typeLabel}</span>
        <span style="font-size:10px;color:var(--muted)">${s.location}</span>
      </div>
      <div style="font-size:11px;color:var(--ink);line-height:1.7;padding-left:28px">${s.instruction}</div>
    </div>`;
  }).join('');

  document.getElementById('cs-right').innerHTML = `
    <div class="ai-panel" style="margin-bottom:16px">
      <div class="ai-panel-head">
        <div style="width:28px;height:28px;background:rgba(200,169,81,.2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px">✨</div>
        <div>
          <div style="font-size:11px;font-weight:700;color:var(--gold)">AI解析完了 — 顧客への署名・捺印指示</div>
          <div style="font-size:9px;color:rgba(255,255,255,.4);margin-top:1px">${r.summary?.docType||''} / ${r.summary?.client||''}</div>
        </div>
      </div>
      <div class="ai-panel-body">
        <div style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.8px;margin-bottom:10px">クライアントに伝える署名・捺印箇所（${(r.customer_signs||[]).length}箇所）</div>
        ${signsHtml}
        <button class="btn btn-sm" onclick="printCustomerGuide()"
          style="margin-top:8px;width:100%;background:var(--navy);color:#fff;border:none">
          🖨️ 顧客向け案内を印刷
        </button>
      </div>
    </div>
  `;
}

function toggleStamp(id) {
  STATE.stampChecks[id] = !STATE.stampChecks[id];
  renderAIResult();
  const all = STATE.aiResult?.chukkai_stamps?.every(s=>STATE.stampChecks[s.id]);
  if (all) showToast('✅ 全箇所の捺印が完了しました！');
}

function confirmStampDone() {
  const r = STATE.aiResult;
  if (!r?.chukkai_stamps?.every(s=>STATE.stampChecks[s.id])) {
    showToast('⚠️ 未チェックの仲介印箇所があります','warn'); return;
  }
  STATE.stampedAt = new Date().toISOString();
  showToast('✅ 仲介印 捺印完了を記録しました');
  goStep('label');
}

function printCustomerGuide() {
  const r = STATE.aiResult;
  if (!r) return;
  const cas = STATE.selectedCase;
  const w = window.open('','_blank','width=700,height=900');
  w.document.write(`<html><head><title>署名・捺印のご案内</title>
  <style>body{font-family:'Noto Sans JP',sans-serif;padding:40px;font-size:13px;line-height:2}
  h2{font-size:16px;border-bottom:2px solid #0D1A2D;padding-bottom:8px}
  .item{border:1px solid #ddd;border-radius:6px;padding:12px;margin-bottom:10px}
  .num{display:inline-block;background:#0D1A2D;color:#C8A951;width:22px;height:22px;border-radius:50%;text-align:center;line-height:22px;font-size:11px;font-weight:700;margin-right:8px}
  @media print{button{display:none}}</style></head><body>
  <h2>署名・捺印のご案内</h2>
  <p>【${cas?.name||''}】様<br>以下の箇所にご署名・ご捺印をお願いいたします。</p>
  ${(r.customer_signs||[]).map((s,i)=>`<div class="item">
    <span class="num">${i+1}</span><strong>${s.type==='sign'?'✍️ 署名（自署）':'🔴 捺印（実印）'}</strong>
    — ${s.location}<br>
    <span style="margin-left:30px;font-size:12px;color:#666">${s.instruction}</span>
  </div>`).join('')}
  <p style="margin-top:20px;font-size:12px;color:#666">ご不明な点はCORETOまでお問い合わせください。</p>
  <button onclick="window.print()" style="padding:8px 20px;background:#0D1A2D;color:#fff;border:none;border-radius:6px;cursor:pointer">印刷する</button>
  </body></html>`);
  w.document.close();
}

// ── STEP 5: ラベル印刷 ────────────────────────────────────
function renderLabel() {
  const cas = STATE.selectedCase;
  const now = new Date();
  const dateStr = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;

  document.getElementById('cs-left').innerHTML = `
    <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:12px">🖨️ STEP 5 — ラベル印刷</div>
    <div style="background:var(--em-bg);border:1px solid rgba(5,150,105,.2);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:11px;color:var(--em)">
      ✅ 仲介印捺印完了 — ${STATE.stampedAt ? new Date(STATE.stampedAt).toLocaleString('ja-JP') : dateStr}
    </div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:14px;line-height:1.7">
      レターパックに貼付するラベルを印刷します。<br>
      A4用紙に印刷してラベルを切り取って貼付してください。
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button class="btn btn-primary" onclick="printLabel()" style="width:100%">🖨️ 送付ラベルを印刷</button>
      <button class="btn" onclick="goStep('ship')" style="width:100%;background:var(--navy);color:#fff;border:none">
        📮 印刷完了 → 発送登録へ
      </button>
    </div>
  `;

  document.getElementById('cs-right').innerHTML = `
    <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:12px">ラベルプレビュー</div>
    <div class="label-preview" id="label-preview">
      <div class="lp-title">CORETO 書類送付</div>
      <div class="lp-main">${cas?.name || '—'}</div>
      <div class="lp-sub">${cas?.sub?.split(' ')[0] || '—'}</div>
      <div class="lp-sub">${cas?.id || '—'} / ${STATE.docType||'書類'}</div>
      <div style="margin-top:8px;padding-top:8px;border-top:1px dashed #ccc;font-size:9px;color:#666">
        発行日：${dateStr} ／ 担当：${cas?.ag||'—'}
      </div>
    </div>
  `;
}

function printLabel() {
  const cas = STATE.selectedCase;
  const now = new Date();
  const dateStr = now.toLocaleDateString('ja-JP');
  const w = window.open('','_blank','width=600,height=500');
  w.document.write(`<html><head><title>送付ラベル</title>
  <style>
    body{font-family:'Noto Sans JP',sans-serif;padding:20px}
    .label{border:3px solid #000;padding:16px 20px;width:280px;line-height:2}
    .title{font-size:9px;font-weight:700;letter-spacing:2px;color:#666;margin-bottom:4px}
    .main{font-size:18px;font-weight:700}
    .sub{font-size:11px;color:#555}
    .barcode-area{margin-top:12px;padding-top:12px;border-top:1px dashed #ccc;font-size:10px;font-family:monospace}
    @media print{button{display:none}}
  </style></head><body>
  <div class="label">
    <div class="title">CORETO 書類送付</div>
    <div class="main">${cas?.name||'—'}</div>
    <div class="sub">${cas?.sub?.split(' ')[0]||'—'}</div>
    <div class="sub">${cas?.id||'—'} / ${STATE.docType||'書類'}</div>
    <div class="barcode-area">発行：${dateStr}<br>担当：${cas?.ag||'—'}<br>ID: ${cas?.id||'—'}</div>
  </div>
  <br><button onclick="window.print()" style="padding:8px 20px;background:#0D1A2D;color:#fff;border:none;border-radius:6px;cursor:pointer">印刷する</button>
  </body></html>`);
  w.document.close();
}

// ── STEP 6: 発送完了 ──────────────────────────────────────
function renderShip() {
  const cas = STATE.selectedCase;
  document.getElementById('cs-left').innerHTML = `
    <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:12px">📮 STEP 6 — 発送登録</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:14px;line-height:1.7">
      レターパックに書類を封入し、追跡番号を入力してください。
    </div>
    <div class="field" style="margin-bottom:14px">
      <label style="font-size:10px;font-weight:700;color:var(--muted);display:block;margin-bottom:6px">レターパック追跡番号</label>
      <input type="text" id="tracking-no" placeholder="例：1234-5678-9012" maxlength="20"
        style="width:100%;padding:9px 12px;border:1px solid var(--bd);border-radius:8px;font-size:13px;font-family:'DM Mono',monospace;box-sizing:border-box">
    </div>
    <div class="field" style="margin-bottom:16px">
      <label style="font-size:10px;font-weight:700;color:var(--muted);display:block;margin-bottom:6px">送付先</label>
      <input type="text" id="ship-dest" placeholder="クライアント住所（省略可）"
        style="width:100%;padding:9px 12px;border:1px solid var(--bd);border-radius:8px;font-size:12px;box-sizing:border-box">
    </div>
    <button class="btn btn-primary" onclick="completeShip()" style="width:100%">
      📮 発送完了を登録
    </button>
  `;

  document.getElementById('cs-right').innerHTML = `
    <div style="background:var(--cream2);border:1px solid var(--bd);border-radius:10px;padding:20px;font-size:11px;line-height:2">
      <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:12px">📦 発送前チェックリスト</div>
      ${[
        '契約書一式の枚数を確認した',
        '仲介印の押印箇所をすべて確認した',
        'クライアントへの署名・捺印案内を同封した',
        'レターパックの宛名・差出人を記入した',
        '追跡番号シールをレターパックに貼付した',
      ].map((item,i) => `<div style="display:flex;align-items:center;gap:10px;padding:4px 0">
        <input type="checkbox" id="pre-ship-${i}" style="width:16px;height:16px;cursor:pointer">
        <label for="pre-ship-${i}" style="cursor:pointer;font-size:11px">${item}</label>
      </div>`).join('')}
    </div>
  `;
}

function completeShip() {
  const no = document.getElementById('tracking-no')?.value.trim();
  if (!no) { showToast('⚠️ 追跡番号を入力してください','warn'); return; }
  STATE.trackingNo = no;
  STATE.shippedAt = new Date().toISOString();

  const cas = STATE.selectedCase;
  document.getElementById('cs-left').innerHTML = `
    <div style="text-align:center;padding:32px 0">
      <div style="font-size:48px;margin-bottom:12px">📮</div>
      <div style="font-size:16px;font-weight:700;color:var(--em);margin-bottom:6px">発送完了</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:16px">${cas?.name||''} / ${STATE.docType||''}</div>
      <div style="font-family:'DM Mono',monospace;font-size:13px;background:var(--cream2);border:1px solid var(--bd);border-radius:8px;padding:10px;margin-bottom:16px">
        追跡番号：${no}
      </div>
      <button class="btn btn-primary" onclick="resetFlow()" style="width:100%">
        🔄 次の書類を処理する
      </button>
    </div>
  `;
  document.getElementById('cs-right').innerHTML = `
    <div style="background:var(--em-bg);border:1px solid rgba(5,150,105,.25);border-radius:10px;padding:20px">
      <div style="font-size:12px;font-weight:700;color:var(--em);margin-bottom:12px">✅ 発送記録</div>
      <div style="font-size:11px;line-height:2.2;color:var(--ink)">
        <div>案件ID：<span style="font-family:'DM Mono',monospace">${cas?.id||'—'}</span></div>
        <div>クライアント：${cas?.name||'—'}</div>
        <div>書類種別：${STATE.docType||'—'}</div>
        <div>仲介印捺印：${STATE.stampedAt ? new Date(STATE.stampedAt).toLocaleString('ja-JP') : '—'}</div>
        <div>発送日時：${new Date(STATE.shippedAt).toLocaleString('ja-JP')}</div>
        <div>追跡番号：<span style="font-family:'DM Mono',monospace">${no}</span></div>
      </div>
    </div>
  `;
  showToast('📮 発送完了を登録しました');
  renderFlowBar();
}

// ── フロー制御 ────────────────────────────────────────────
const STEP_RENDERS = {
  register: renderRegister,
  scan:     renderScan,
  ai:       ()=>renderAI(),
  stamp:    renderAIResult,
  label:    renderLabel,
  ship:     renderShip,
};

function goStep(step) {
  // ai→stamp は同じレンダラ（renderAIResultがstampも兼ねる）
  if (step === 'ai') STATE.step = 'ai';
  else if (step === 'stamp') STATE.step = 'stamp';
  else STATE.step = step;
  renderFlowBar();
  const fn = STEP_RENDERS[step] || STEP_RENDERS[STATE.step];
  if (fn) fn();
}

function resetFlow() {
  STATE = { step:'register', selectedCase:null, scannedFile:null, scannedDataUrl:null,
            aiResult:null, stampChecks:{}, trackingNo:'', shippedAt:null };
  renderFlowBar();
  renderRegister();
}

window.addEventListener('DOMContentLoaded', () => {
  CNAV.init('itsetsu');
  renderFlowBar();
  renderRegister();
});
</script>

<script src="coreto-nav-v2.js"></script>
</body>
</html>
