<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>入金監視パネル — COREBLDG</title>
<link rel="stylesheet" href="coreto-design-system.css">
<style>
:root{
  --navy:#0D1A2D;--navy-m:#152238;--navy-l:#1E3252;
  --gold:#C8A951;--gold-dim:rgba(200,169,81,.15);
  --cream:#FFFFFF;--cream2:#F8F9FA;--white:#FFFFFF;
  --ink:#202124;--muted:#5F6368;--faint:#80868B;
  --em:#059669;--em-bg:#ECFDF5;
  --am:#D97706;--am-bg:#FFFBEB;
  --rd:#DC2626;--rd-bg:#FEF2F2;
  --sk:#0284C7;--sk-bg:#F0F9FF;
  --vt:#7C3AED;--vt-bg:#F5F3FF;
  --bd:#E8EAED;--bd2:#DADCE0;
  --sw:240px;--r:10px;--r-sm:7px;
  --sh:0 1px 2px rgba(60,64,67,.1),0 1px 3px rgba(60,64,67,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:var(--cream)}
.shell{display:flex;height:100vh}








.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;box-shadow:var(--sh)}
.tb-title{font-size:16px;font-weight:600;color:var(--ink)}
.tb-crumb{font-size:11px;color:var(--faint);margin-top:1px}
.tb-crumb a{color:var(--muted);text-decoration:none}
.tb-actions{margin-left:auto;display:flex;gap:9px;align-items:center}
.btn{padding:7px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Outfit',sans-serif;border:none}
.btn-primary{background:var(--navy);color:var(--gold)}.btn-primary:hover{background:var(--navy-l)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--bd)}.btn-ghost:hover{background:var(--cream);color:var(--ink)}
.btn-em{background:var(--em-bg);color:var(--em);border:1px solid rgba(5,150,105,.2)}
.btn-am{background:var(--am-bg);color:var(--am);border:1px solid rgba(217,119,6,.2)}
.btn-sm{padding:5px 12px;font-size:11px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;font-family:'Outfit',sans-serif;font-feature-settings:'tnum'}
.badge-em{background:var(--em-bg);color:var(--em)}
.badge-am{background:var(--am-bg);color:var(--am)}
.badge-rd{background:var(--rd-bg);color:var(--rd)}
.badge-sk{background:var(--sk-bg);color:var(--sk)}
.badge-nt{background:var(--cream2);color:var(--muted)}
.badge-vt{background:var(--vt-bg);color:var(--vt)}

/* TAB */
.tab-bar{display:flex;background:var(--white);border-bottom:1px solid var(--bd);padding:0 24px;flex-shrink:0}
.tab-item{padding:14px 18px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.tab-item:hover{color:var(--ink)}
.tab-item.active{color:var(--navy);border-bottom-color:var(--gold)}
.tab-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;background:var(--rd);color:#fff;font-family:'Outfit',sans-serif}
.tab-badge.am{background:var(--am)}
.tab-badge.em{background:var(--em)}

.page{flex:1;overflow-y:auto;padding:24px}
.page::-webkit-scrollbar{width:5px}
.page::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.kpi{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.rd::before{background:var(--rd)}.kpi.am::before{background:var(--am)}
.kpi.em::before{background:var(--em)}.kpi.sk::before{background:var(--sk)}
.kpi-label{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.kpi-val{font-size:26px;font-weight:300;color:var(--ink);font-variant-numeric:tabular-nums}
.kpi-sub{font-size:10px;color:var(--faint);margin-top:4px}

/* PANEL */
.panel{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);margin-bottom:18px}
.panel-head{padding:14px 20px;border-bottom:1px solid var(--bd);background:var(--cream);display:flex;align-items:center;justify-content:space-between}
.panel-title{font-size:12px;font-weight:700;color:var(--ink);text-transform:uppercase;letter-spacing:.5px}
.panel-actions{display:flex;gap:8px}

/* ROWS */
.remit-row{padding:16px 20px;border-bottom:1px solid var(--bd);transition:background .12s}
.remit-row:last-child{border-bottom:none}
.remit-row:hover{background:rgba(200,169,81,.03)}
.rr-top{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.rr-chip{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;font-family:'DM Mono',monospace;flex-shrink:0}
.rr-chip.urgent{background:var(--rd-bg);color:var(--rd);animation:pulse 2s infinite}
.rr-chip.soon{background:var(--am-bg);color:var(--am)}
.rr-chip.ok{background:var(--em-bg);color:var(--em)}
.rr-chip.pending{background:var(--cream2);color:var(--muted)}
.rr-chip.overdue{background:var(--rd-bg);color:var(--rd)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.rr-client{font-size:14px;font-weight:700;color:var(--ink);flex:1}
.rr-amount{font-size:18px;font-weight:300;color:var(--ink);font-variant-numeric:tabular-nums;flex-shrink:0}
.rr-meta{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:10px}
.rr-meta-item{font-size:11px;color:var(--muted)}
.rr-meta-item strong{font-weight:700;color:var(--ink);margin-right:3px}
.mono{font-family:'DM Mono',monospace;font-size:11px}
.rr-breakdown{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.rr-bd-item{background:var(--cream2);padding:4px 10px;border-radius:6px;font-size:10px;color:var(--muted);font-family:'DM Mono',monospace}
.rr-bd-item strong{color:var(--ink)}
.rr-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.rr-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rr-status-dot.rd{background:var(--rd);box-shadow:0 0 6px rgba(220,38,38,.5)}
.rr-status-dot.am{background:var(--am)}
.rr-status-dot.em{background:var(--em)}
.rr-status-dot.sk{background:var(--sk)}
.rr-status-dot.nt{background:var(--faint)}
.action-btn{padding:7px 18px;background:var(--navy);color:var(--gold);border:none;border-radius:var(--r-sm);font-size:12px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s}
.action-btn:hover{background:var(--navy-l);transform:translateY(-1px)}
.action-btn.disabled{background:var(--cream2);color:var(--faint);cursor:not-allowed;transform:none}
.action-btn.done{background:var(--em-bg);color:var(--em);border:1px solid rgba(5,150,105,.3)}
.action-btn.confirm{background:var(--sk-bg);color:var(--sk);border:1px solid rgba(2,132,199,.2)}
.detail-btn{padding:7px 14px;background:transparent;color:var(--muted);border:1px solid var(--bd);border-radius:var(--r-sm);font-size:11px;cursor:pointer;font-family:'Outfit',sans-serif;transition:.15s}
.detail-btn:hover{background:var(--cream);border-color:var(--bd2)}

/* ZENGIN */
.zengin-panel{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:20px;box-shadow:var(--sh);margin-bottom:18px}
.zengin-title{font-size:12px;font-weight:700;color:var(--ink);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.zengin-select-area{background:var(--cream);border:1.5px dashed var(--bd2);border-radius:var(--r-sm);padding:16px;margin-bottom:14px}
.zengin-check-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;cursor:pointer;transition:.12s}
.zengin-check-row:hover{background:rgba(200,169,81,.05)}
.zengin-check-row input[type=checkbox]{accent-color:var(--navy);width:14px;height:14px}
.zengin-label{font-size:12px;font-weight:500;color:var(--ink);flex:1}
.zengin-amt{font-size:12px;font-weight:700;font-family:'DM Mono',monospace;color:var(--ink)}

/* MOBILE */
.mob-ham{display:none;flex-direction:column;justify-content:center;width:36px;height:36px;cursor:pointer;background:transparent;border:none;flex-shrink:0}
.mob-ham span{display:block;width:18px;height:2px;background:rgba(255,255,255,.72);margin:3px 0;border-radius:1px}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:150}
.mob-overlay.show{display:block}
@media(max-width:768px){
  .mob-ham{display:flex}
  
  .sb.open{left:0}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .tab-item{padding:12px 12px;font-size:11px}
  .page{padding:12px}
}

/* 数値フォント統一 */
.kpi-val,.rr-amount,.zengin-amt,.action-btn,
.badge,.tab-badge{font-variant-numeric:tabular-nums;font-feature-settings:'tnum'}
</style>
</head>
<body>
<div class="shell">
<div class="mob-overlay" id="mob-overlay" onclick="closeSb()"></div>
<nav class="sb">
  <div class="sb-head">
    <div class="sb-logo">CORE<br>BLDG</div>
    <div class="sb-ver">v2.0 — CORETO</div>
  </div>
  <div class="sb-user">
    <div class="sb-av" id="sb-av">—</div>
    <div style="overflow:hidden">
      <div class="sb-uname" id="sb-name">—</div>
      <div class="sb-ur" id="sb-role">—</div>
    </div>
  </div>
  <div class="sb-nav" id="sb-nav"></div>
</nav>

<div class="content">
  <div class="topbar">
    <button class="mob-ham" onclick="toggleSb()"><span></span><span></span><span></span></button>
    <div>
      <div class="tb-title">入金監視パネル</div>
      <div class="tb-crumb"><a href="coreto-hub-v2.html">COREBLDG</a> › <span>入金監視</span></div>
    </div>
    <div class="tb-actions">
      <button class="btn btn-ghost btn-sm" onclick="exportCSV()">📊 入金履歴CSV</button>
      <button class="btn btn-ghost btn-sm" id="zengin-btn" onclick="exportZenginAll()">📄 全銀ファイル出力</button>
    </div>
  </div>

  <!-- タブ -->
  <div class="tab-bar">
    <div class="tab-item active" id="tab-income" onclick="switchTab('income')">
      💰 入金監視（クライアント→CORETO）
      <span class="tab-badge am" id="badge-income">3</span>
    </div>
    <div class="tab-item" id="tab-remit" onclick="switchTab('remit')">
      🏦 送金管理（CORETO→管理会社）
      <span class="tab-badge" id="badge-remit">1</span>
    </div>
  </div>

  <!-- ════════════════════════════════════
       タブ1: 入金監視（クライアント→CORETO）
  ════════════════════════════════════ -->
  <div class="page" id="view-income">

    <!-- KPI -->
    <div class="kpi-row">
      <div class="kpi rd">
        <div class="kpi-label">入金期限超過</div>
        <div class="kpi-val">1件</div>
        <div class="kpi-sub">¥195,000 至急確認</div>
      </div>
      <div class="kpi am">
        <div class="kpi-label">本日・明日期限</div>
        <div class="kpi-val">2件</div>
        <div class="kpi-sub">¥543,000 入金待ち</div>
      </div>
      <div class="kpi em">
        <div class="kpi-label">今月 入金確認済み</div>
        <div class="kpi-val">22件</div>
        <div class="kpi-sub">¥6,820,000 受領</div>
      </div>
      <div class="kpi sk">
        <div class="kpi-label">入金確認待ち（全体）</div>
        <div class="kpi-val">3件</div>
        <div class="kpi-sub">¥758,000 未確認</div>
      </div>
    </div>

    <!-- 期限超過 -->
    <!-- 動的コンテンツ: CORETO_REPORTSから生成 -->
    <div id="remit-dynamic-list">
      <div style="padding:48px 20px;text-align:center;color:var(--muted);font-size:13px">
        承認済み案件の送金データが表示されます
      </div>
    </div>

<script src="coreto-kv-client.js"></script>
<script src="coreto-nav-v2.js"></script>
<script>

// CORETO_REPORTSから入金データを補完
function loadReportIncomes() {
  try {
    // AGの初期費用明細チェック完了案件を読み込む
    var invoiceChecks = JSON.parse(localStorage.getItem('CORETO_INVOICE_CHECK') || '{}');
    var checkedCases = Object.keys(invoiceChecks).filter(function(k){ return invoiceChecks[k].status === 'ok'; });
    if (checkedCases.length > 0) {
      var el = document.querySelector('[data-invoice-checked]');
      if (el) el.textContent = checkedCases.length + '件のAGチェック完了案件あり';
      // 通知バナーを表示
      var banner = document.getElementById('invoice-check-banner');
      if (!banner) {
        banner = document.createElement('div');
        banner.id = 'invoice-check-banner';
        banner.style.cssText = 'background:var(--em-bg);border:1px solid rgba(5,150,105,.2);border-radius:8px;padding:10px 14px;font-size:11px;color:var(--em);margin-bottom:16px';
        banner.innerHTML = '✅ <strong>AGチェック完了案件: ' + checkedCases.length + '件</strong> — ' + checkedCases.slice(0,3).join(', ') + (checkedCases.length>3?'...':'') + ' — 送金処理を行ってください';
        var page = document.querySelector('.page');
        if (page) page.insertBefore(banner, page.firstChild);
      }
    }
  } catch(e2) {}
  try {
    var reports = JSON.parse(localStorage.getItem('CORETO_REPORTS') || '[]');
    if (!reports.length) return;
    var totalFee = reports.reduce(function(s,r){ return s+(r.fee||0); },0);
    var totalEl = document.querySelector('[data-income-total]');
    if (totalEl) totalEl.textContent = '¥' + totalFee.toLocaleString();
  } catch(e) {}
}
window.addEventListener('DOMContentLoaded', function() {
  CNAV.init('remit');
  window.toggleSb = () => { document.querySelector('.sb').classList.toggle('open'); document.getElementById('mob-overlay').classList.toggle('show'); };
  window.closeSb  = () => { document.querySelector('.sb').classList.remove('open');  document.getElementById('mob-overlay').classList.remove('show'); };

  const role = sessionStorage.getItem('coreto_role') || 'hq';

  if (role === 'hr_ag' || role === 'pt' || role === 'intern') {
    document.querySelector('.content').innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px">
        <div style="font-size:48px">🔒</div>
        <div style="font-size:20px;font-weight:300;color:var(--ink)">アクセス権限がありません</div>
        <div style="font-size:13px;color:var(--muted)">このページはHQおよび不動産AGのみアクセスできます。</div>
        <a href="coreto-hub-v2.html" style="padding:10px 24px;background:var(--navy);color:var(--gold);border-radius:8px;font-size:13px;font-weight:700;text-decoration:none">ダッシュボードへ戻る</a>
      </div>`;
    return;
  }

  if (role === 're_ag') {
    document.querySelector('.tb-title').textContent = '入金確認（担当案件）';
    // AG: 入金確認タブのみ、送金タブは非表示
    document.getElementById('tab-remit').style.display = 'none';
    document.getElementById('zengin-btn').style.display = 'none';
    // 担当外の行を非表示（data-ag-id属性で判定）
    var myAgId = sessionStorage.getItem('coreto_user_id') || '';
    document.querySelectorAll('.remit-row[data-ag-id]').forEach(function(row) {
      if (row.dataset.agId && row.dataset.agId !== myAgId) {
        row.style.display = 'none';
      }
    });
    // AGバナー
    const page = document.getElementById('view-income');
    const banner = document.createElement('div');
    banner.style.cssText = 'background:var(--sk-bg);border:1px solid rgba(2,132,199,.2);border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:var(--sk);display:flex;align-items:center;gap:8px';
    banner.innerHTML = '<span style="font-size:16px">ℹ️</span><span>担当案件の<strong>入金状況確認</strong>ページです。送金実行はHQが行います。</span>';
    page.insertBefore(banner, page.firstChild);
  }
});
</script>
</body>
</html>
