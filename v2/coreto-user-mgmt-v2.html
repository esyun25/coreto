<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HQ管理パネル — COREBLDG</title>
<link rel="stylesheet" href="coreto-design-system.css">
<style>
:root{--navy:#0D1A2D;--navy-l:#1E3252;--gold:#C8A951;--gold-dim:rgba(200,169,81,.15);--cream2:#F8F9FA;--white:#FFFFFF;--ink:#202124;--muted:#5F6368;--faint:#80868B;--em:#059669;--em-bg:#ECFDF5;--am:#D97706;--am-bg:#FFFBEB;--rd:#DC2626;--rd-bg:#FEF2F2;--sk:#0284C7;--sk-bg:#F0F9FF;--vt:#7C3AED;--vt-bg:#F5F3FF;--bd:#E8EAED;--bd2:#DADCE0;--sw:240px;--r:10px;--r-sm:7px;--sh:0 1px 2px rgba(60,64,67,.1),0 1px 3px rgba(60,64,67,.06)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:var(--cream2)}
.shell{display:flex;height:100vh}











.sf{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.3);transition:.13s}
.sf:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.6)}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;box-shadow:var(--sh)}
.tb-back{font-size:12px;color:var(--muted);text-decoration:none;transition:.13s;flex-shrink:0}.tb-back:hover{color:var(--am)}
.tb-sep{width:1px;height:20px;background:var(--bd);flex-shrink:0}
.tb-title{font-size:15px;font-weight:600;color:var(--ink)}
.tb-crumb{font-size:11px;color:var(--faint)}.tb-crumb a{color:var(--muted);text-decoration:none}
.tb-act{margin-left:auto;display:flex;gap:9px;align-items:center}
.btn{padding:7px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;transition:.15s;font-family:'Outfit',sans-serif;border:none}
.btn-p{background:var(--navy);color:var(--gold)}.btn-p:hover{background:var(--navy-l)}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--bd)}.btn-g:hover{background:var(--cream2);color:var(--ink)}
.btn-rd{background:var(--rd-bg);color:var(--rd);border:1px solid rgba(220,38,38,.2)}.btn-rd:hover{background:var(--rd);color:#fff}
.btn-em{background:var(--em-bg);color:var(--em);border:1px solid rgba(5,150,105,.2)}.btn-em:hover{background:var(--em);color:#fff}
.btn-sm{padding:5px 12px;font-size:11px}
/* HQ ROLE BANNER */
.role-banner{padding:6px 24px;display:flex;align-items:center;gap:10px;font-size:11px;border-bottom:1px solid var(--bd);flex-shrink:0}
.role-banner.exec{background:#0D1A2D;color:rgba(255,255,255,.7)}.role-banner.manager{background:var(--sk-bg);color:var(--sk)}.role-banner.staff{background:var(--cream2);color:var(--muted)}.role-banner.part{background:#FFF7ED;color:var(--am)}
.role-sel{padding:3px 8px;border-radius:5px;font-size:11px;font-family:'Outfit',sans-serif;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:inherit;cursor:pointer;outline:none}
.role-banner.staff .role-sel,.role-banner.part .role-sel{border-color:var(--bd);background:var(--white)}
/* LOCK NOTICE */
.lock-notice{display:flex;align-items:center;gap:10px;padding:14px 18px;background:var(--am-bg);border:1px solid rgba(217,119,6,.2);border-radius:var(--r);margin-bottom:16px;font-size:12px;color:var(--am);font-weight:600}
/* TABS */
.tab-bar{display:flex;border-bottom:2px solid var(--bd);background:var(--white);flex-shrink:0;overflow-x:auto}
.tab-bar::-webkit-scrollbar{height:0}
.tab{padding:13px 16px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.tab:hover{color:var(--ink)}.tab.active{color:var(--navy);border-bottom-color:var(--gold)}
.tab.locked{color:var(--bd2);cursor:not-allowed;pointer-events:none}
.tab-lock-ic{font-size:10px}
/* PAGE */
.page{flex:1;overflow-y:auto;padding:24px}.page::-webkit-scrollbar{width:5px}.page::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi-row-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.gd::before{background:var(--gold)}.kpi.em::before{background:var(--em)}.kpi.sk::before{background:var(--sk)}.kpi.am::before{background:var(--am)}.kpi.rd::before{background:var(--rd)}.kpi.vt::before{background:var(--vt)}
.kpi-lb{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.kpi-vl{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--ink)}
.kpi-sb{font-size:10px;color:var(--faint);margin-top:4px}
/* CARD */
.card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:18px}
.card-head{padding:13px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--cream2)}
.card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink);display:flex;align-items:center;gap:7px}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--faint);padding:9px 14px;border-bottom:2px solid var(--bd);text-align:left;background:var(--cream2)}
.tbl td{padding:10px 14px;border-bottom:1px solid var(--bd);color:var(--ink);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}.tbl tr:hover td{background:rgba(200,169,81,.03)}
.mono{font-family:'DM Mono',monospace;font-size:11px;color:var(--faint)}
/* BADGE */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.b-em{background:var(--em-bg);color:var(--em)}.b-am{background:var(--am-bg);color:var(--am)}.b-rd{background:var(--rd-bg);color:var(--rd)}.b-sk{background:var(--sk-bg);color:var(--sk)}.b-vt{background:var(--vt-bg);color:var(--vt)}.b-gd{background:var(--gold-dim);color:#92610A}.b-mu{background:var(--cream2);color:var(--faint);border:1px solid var(--bd)}
/* FILTER */
.fbar{display:flex;gap:10px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--bd);flex-wrap:wrap}
.fsel{padding:7px 12px;background:var(--cream2);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:12px;color:var(--ink);font-family:'Outfit',sans-serif;outline:none;cursor:pointer}.fsel:focus{border-color:var(--gold)}
.srch{position:relative;flex:1;min-width:200px}
.srch input{width:100%;padding:8px 12px 8px 34px;background:var(--cream2);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:12px;color:var(--ink);font-family:'Outfit',sans-serif;outline:none}
.srch input:focus{border-color:var(--gold);background:var(--white)}
.srch-ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:13px;pointer-events:none}
/* ROLE TABS (sub) */
.rtab-bar{display:flex;border-bottom:1px solid var(--bd);background:var(--white)}
.rtab{padding:9px 15px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s;white-space:nowrap}
.rtab:hover{color:var(--ink)}.rtab.active{color:var(--navy);border-bottom-color:var(--gold)}
/* ROW ACTIONS */
.row-act{display:flex;gap:5px;opacity:0;transition:.13s}
.tbl tr:hover .row-act{opacity:1}
/* AVATAR */
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.av-exec{background:var(--navy);color:var(--gold)}.av-mgr{background:var(--sk-bg);color:var(--sk)}.av-stf{background:var(--cream2);color:var(--muted);border:1px solid var(--bd)}.av-prt{background:#FFF7ED;color:var(--am)}
.av-re{background:var(--sk-bg);color:var(--sk)}.av-hr{background:var(--vt-bg);color:var(--vt)}.av-hk{background:var(--gold-dim);color:#92610A}.av-pt{background:var(--em-bg);color:var(--em)}.av-in{background:var(--am-bg);color:var(--am)}
/* CODE CHIP */
.code-chip{font-family:'DM Mono',monospace;font-size:11px;background:var(--navy);color:var(--gold);padding:3px 9px;border-radius:5px;letter-spacing:1px;cursor:pointer;display:inline-block;margin-top:3px}
.code-chip:hover{background:var(--navy-l)}
/* PERM TABLE */
.perm-table{width:100%;border-collapse:collapse;font-size:11px}
.perm-table th{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--faint);padding:8px 10px;border-bottom:2px solid var(--bd);text-align:center;background:var(--cream2)}
.perm-table th:first-child{text-align:left;min-width:160px}
.perm-table td{padding:10px;border-bottom:1px solid var(--bd);text-align:center;vertical-align:middle}
.perm-table td:first-child{text-align:left;font-size:12px;font-weight:600;color:var(--ink)}
.perm-table tr:last-child td{border-bottom:none}
.pchk{width:20px;height:20px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.pchk.allow{background:var(--em-bg);color:var(--em)}.pchk.deny{background:var(--cream2);color:var(--faint)}.pchk.partial{background:var(--am-bg);color:var(--am)}
/* SETTINGS */
.set-section{margin-bottom:22px}
.set-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--white);border:1px solid var(--bd);border-radius:var(--r-sm);margin-bottom:6px}
.set-label{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:2px}.set-desc{font-size:11px;color:var(--muted)}
.toggle{width:40px;height:22px;background:var(--bd2);border-radius:11px;position:relative;cursor:pointer;transition:.2s;flex-shrink:0}
.toggle.on{background:var(--em)}.toggle::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:3px;left:3px;transition:.2s}.toggle.on::after{left:21px}
.si{padding:7px 10px;background:var(--cream2);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:13px;color:var(--ink);font-family:'Outfit',sans-serif;width:80px;outline:none;text-align:center}.si:focus{border-color:var(--gold)}
/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-bg.show{display:flex}
.modal{background:var(--white);border-radius:12px;width:560px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.2);max-height:90vh;display:flex;flex-direction:column}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:14px;font-weight:700;color:var(--ink)}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted)}
.modal-body{padding:20px 22px;overflow-y:auto}
.modal-foot{padding:14px 22px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;background:var(--cream2);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:13px;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;outline:none;transition:.15s}
.field input:focus,.field select:focus{border-color:var(--gold);background:var(--white)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.dc{padding:10px 12px;background:var(--cream2);border-radius:var(--r-sm)}
.dc-lb{font-size:10px;color:var(--faint);margin-bottom:3px}.dc-vl{font-size:13px;font-weight:600;color:var(--ink)}
/* PROGRESS */
.prog{height:5px;background:var(--bd);border-radius:3px;overflow:hidden;margin-top:5px}
.prog-fill{height:100%;border-radius:3px;transition:.3s}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── モバイル対応 ─────────────────────────────── */
@media (max-width: 768px) {
  .shell, .app-shell { flex-direction: column; }
  .content, .main, .main-content { overflow-y: auto; }
  .topbar, .top-bar {
    padding: 0 12px;
    gap: 8px;
    height: 52px;
  }
  .tb-title { font-size: 14px; }
  .tb-actions, .top-actions { gap: 6px; }
  .btn-sm { padding: 4px 9px; font-size: 10px; }
  .page { padding: 12px; }
  .kpi-row, .stat-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .kpi-value, .kpi-vl { font-size: 22px !important; }
  table { font-size: 11px; }
  th, td { padding: 7px 8px; }
}
</style>
</head>
<body>
<div class="shell">
  <nav class="sb">
  <div class="sb-head">
    <div class="sb-logo">CORE<br>BLDG</div>
    <div class="sb-ver">v2.0 — CORETO</div>
  </div>
  <div class="sb-user">
    <div class="sb-av" id="sb-av">—</div>
    <div style="overflow:hidden">
      <div class="sb-uname" id="sb-name">—</div>
      <div class="sb-ur" id="sb-role">—</div>
    </div>
  </div>
  <div class="sb-nav" id="sb-nav"></div>
</nav>
  <div class="content">
    <!-- TOPBAR -->
    <div class="topbar">
      <a href="coreto-hub-v2.html" class="tb-back">← 戻る</a>
      <div class="tb-sep"></div>
      <div>
        <div id="page-title" class="tb-title">HQ管理パネル</div>
        <div class="tb-crumb"><a href="coreto-hub-v2.html">COREBLDG</a> › HQ管理パネル</div>
      </div>
      <div class="tb-act" id="tb-act"></div>
    </div>

    <!-- HQ ROLE BANNER -->
    <div class="role-banner" id="role-banner">
      <span id="role-icon">👑</span>
      <span id="role-label-text" style="font-weight:700"></span>
      <span id="role-desc" style="opacity:.7"></span>
      <span style="margin-left:auto;opacity:.6;font-size:10px">ロール切替（デモ用）:</span>
      <select class="role-sel" id="hq-role-sel" onchange="setHQRole(this.value)">
        <option value="exec">exec（経営陣）</option>
        <option value="manager">manager（マネージャー）</option>
        <option value="staff">staff（社員）</option>
        <option value="part">part（パート）</option>
      </select>
    </div>

    <!-- TABS -->
    <div class="tab-bar" id="tab-bar">
      <div class="tab active" id="tab-account"  onclick="switchTab('account')">👤 アカウント管理</div>
      <div class="tab"        id="tab-ag"       onclick="switchTab('ag')">🏘️ AG管理</div>
      <div class="tab"        id="tab-pt"       onclick="switchTab('pt')">🤝 PT管理</div>
      <div class="tab"        id="tab-intern"   onclick="switchTab('intern')">🎓 インターン管理</div>
      <div class="tab"        id="tab-perms"    onclick="switchTab('perms')">🔐 権限マトリクス</div>
      <div class="tab"        id="tab-settings" onclick="switchTab('settings')">⚙️ システム設定</div>
      <div class="tab"        id="tab-logs"     onclick="switchTab('logs')">📋 操作ログ</div>
    </div>

    <div class="page" id="page"></div>
  </div>
</div>

<!-- MODAL: アカウント詳細 -->
<div class="modal-bg" id="modal-acct" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal" style="width:600px">
    <div class="modal-head"><div class="modal-title" id="acct-title">アカウント詳細</div><button class="modal-close" onclick="closeModal('modal-acct')">✕</button></div>
    <div class="modal-body" id="acct-body"></div>
    <div class="modal-foot" id="acct-foot"></div>
  </div>
</div>
<!-- MODAL: ユーザー追加 -->
<div class="modal-bg" id="modal-add" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal">
    <div class="modal-head"><div class="modal-title">＋ ユーザー招待</div><button class="modal-close" onclick="closeModal('modal-add')">✕</button></div>
    <div class="modal-body">
      <div class="field-row">
        <div class="field"><label>姓</label><input id="add-last" placeholder="山田"></div>
        <div class="field"><label>名</label><input id="add-first" placeholder="太郎"></div>
      </div>
      <div class="field"><label>メールアドレス</label><input type="email" id="add-email" placeholder="taro@example.com"></div>
      <div class="field-row">
        <div class="field"><label>ロール</label>
          <select id="add-role">
            <option value="re_ag">不動産AG（RE-AG）</option>
            <option value="hr_ag">人材AG（HR-AG）</option>
            <option value="hikari_ag">光通信AG</option>
            <option value="pt">パートナー（PT）</option>
            <option value="intern">インターン</option>
            <option value="hq_staff">HQスタッフ</option>
          </select>
        </div>
        <div class="field"><label>電話番号</label><input type="tel" id="add-tel" placeholder="090-0000-0000"></div>
      </div>
      <div class="field"><label>招待メッセージ（任意）</label><textarea style="height:60px;resize:none" placeholder="よろしくお願いします。"></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-g" onclick="closeModal('modal-add')">キャンセル</button>
      <button class="btn btn-p" onclick="sendInvite()">📨 招待メールを送る</button>
    </div>
  </div>
</div>
<!-- MODAL: PT詳細 -->
<div class="modal-bg" id="modal-pt" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal" style="width:620px">
    <div class="modal-head"><div class="modal-title" id="pt-title">PT詳細</div><button class="modal-close" onclick="closeModal('modal-pt')">✕</button></div>
    <div class="modal-body" id="pt-body"></div>
    <div class="modal-foot"><button class="btn btn-g" onclick="closeModal('modal-pt')">閉じる</button></div>
  </div>
</div>
<!-- MODAL: AG詳細 -->
<div class="modal-bg" id="modal-ag" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal" style="width:640px">
    <div class="modal-head"><div class="modal-title" id="ag-title">AG詳細</div><button class="modal-close" onclick="closeModal('modal-ag')">✕</button></div>
    <div class="modal-body" id="ag-body"></div>
    <div class="modal-foot" id="ag-foot"></div>
  </div>
</div>

<script src="coreto-kv-client.js"></script>
<script src="coreto-nav-v2.js"></script>
<script>
(function(){
  var _role = sessionStorage.getItem('coreto_role') || '';
  var _allowed = ["hq"];
  if (_allowed.length && !_allowed.includes(_role)) {
    location.replace('coreto-hub-v2.html?unauthorized=1');
  }
})();

// ══════════════════════════════════════════════
// HQ ROLE & PERMISSIONS
// ══════════════════════════════════════════════
let HQ_ROLE = 'exec'; // exec / manager / staff / part

const HQ_ROLE_META = {
  exec:    {icon:'👑', label:'経営陣（exec）',    desc:'全機能・全操作',           cls:'exec',   color:'rgba(200,169,81,.9)'},
  manager: {icon:'🏢', label:'マネージャー',       desc:'閲覧+ログ / 停止不可',      cls:'manager',color:'var(--sk)'},
  staff:   {icon:'👔', label:'社員（staff）',      desc:'業績閲覧のみ / 設定不可',   cls:'staff',  color:'var(--muted)'},
  part:    {icon:'🕐', label:'パート（part）',     desc:'AG/PT閲覧のみ（限定）',     cls:'part',   color:'var(--am)'},
};

const CAN = {
  stopUser:      r => r === 'exec',
  changeRole:    r => r === 'exec',
  addUser:       r => r === 'exec' || r === 'manager',
  viewSettings:  r => r === 'exec',
  viewLogs:      r => r === 'exec' || r === 'manager',
  viewAcct:      r => r === 'exec' || r === 'manager',
  viewAG:        r => r !== 'part',
  viewPT:        r => r !== 'part',
  viewIntern:    r => r !== 'part',
  viewPerms:     r => r === 'exec' || r === 'manager',
  viewFullAGDetail: r => r !== 'part',
};

function setHQRole(role) {
  HQ_ROLE = role;
  const m = HQ_ROLE_META[role];
  const banner = document.getElementById('role-banner');

function updateTabLocks() {
  const locks = {
    account: !CAN.viewAcct(HQ_ROLE),
    settings: !CAN.viewSettings(HQ_ROLE),
    logs: !CAN.viewLogs(HQ_ROLE),
    perms: !CAN.viewPerms(HQ_ROLE),
    ag:      !CAN.viewAG(HQ_ROLE),
    pt: !CAN.viewPT(HQ_ROLE),
    intern: !CAN.viewIntern(HQ_ROLE),
  };
  Object.entries(locks).forEach(([id, locked]) => {
    const el = document.getElementById('tab-' + id);
    if (el) el.classList.toggle('locked', locked);
  });
}

// hqRoleはIDの数値範囲から自動決定（getHQRoleFromId関数）
// 実運用ではKintoneのマスターデータから取得
const HQ_USERS_RAW = []; /* CORETO_REPORTSから動的生成 */
function _hqRoleFromId(id) {
  var m = String(id).match(/^HQ-0*(\d+)$/);
  if (!m) return 'staff';
  var n = parseInt(m[1], 10);
  if (n <= 199)  return 'exec';
  if (n <= 999)  return 'manager';
  if (n <= 4999) return 'staff';
  if (n <= 9899) return 'part';
  return 'reserved';
}
function _hqAvCls(role) {
  return {exec:'av-exec',manager:'av-mgr',staff:'av-stf',part:'av-prt'}[role]||'av-stf';
}
function _hqAv(role) {
  return {exec:'E',manager:'M',staff:'S',part:'P'}[role]||'S';
}
const HQ_USERS = HQ_USERS_RAW.map(function(u){
  var r = _hqRoleFromId(u.id);
  return Object.assign({}, u, { hqRole: r, cls: _hqAvCls(r), av: _hqAv(r) });
});

function switchTab(t) {
  if (!CAN['view'+t.charAt(0).toUpperCase()+t.slice(1)]?.(HQ_ROLE) === false) {
    // check lock
    const lockedMap = {ag:!CAN.viewAG(HQ_ROLE),settings:!CAN.viewSettings(HQ_ROLE),logs:!CAN.viewLogs(HQ_ROLE),perms:!CAN.viewPerms(HQ_ROLE),pt:!CAN.viewPT(HQ_ROLE),intern:!CAN.viewIntern(HQ_ROLE),account:!CAN.viewAcct(HQ_ROLE)};
    if (lockedMap[t]) { toast('このロールではアクセスできません','warn'); return; }
  }
  currentTab = t;
  ALL_TABS.forEach(id => document.getElementById('tab-'+id)?.classList.toggle('active', id===t));
  const act = document.getElementById('tb-act');
  act.innerHTML = '';
  if (t==='account' && CAN.addUser(HQ_ROLE))
    act.innerHTML = '<button class="btn btn-p" onclick="openModal(\'modal-add\')">＋ ユーザー招待</button>';
  if (t==='pt')
    act.innerHTML = '<button class="btn btn-g" onclick="exportCSV()">📥 CSVエクスポート</button>';
  if (t==='logs')
    act.innerHTML = '<button class="btn btn-g" onclick="exportCSV()">📥 CSVエクスポート</button>';
  const renders = {account:renderAccount,ag:renderAG,pt:renderPT,intern:renderIntern,perms:renderPerms,settings:renderSettings,logs:renderLogs};
  document.getElementById('page').innerHTML = (renders[t]||renderAccount)();
}

async function aiAGFeedback(id, name, rank, amt) {
  const btn = document.getElementById('ai-btn-'+id);
  const res = document.getElementById('ai-res-'+id);
  const row = document.getElementById('ai-row-'+id);
  if (!btn||!res) return;
  btn.disabled=true; btn.innerHTML='<span style="animation:spin .8s linear infinite;display:inline-block">✨</span>';
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:800,messages:[{role:'user',content:`COREBLDGの育成マネージャーAIです。AG「${name}」（ランク:${rank}、今月報酬:¥${amt?.toLocaleString()||'—'}）への育成FBをJSONのみで: {"strength":"強み","weakness":"改善点","tips":["①","②","③"],"goal":"今月目標","cheer":"励まし"}`}]})});
    const data = await resp.json();
    const fb = JSON.parse((data.content?.find(b=>b.type==='text')?.text||'{}').replace(/```json|```/g,'').trim());
    res.innerHTML = `<div style="background:var(--em-bg);border:1px solid rgba(5,150,105,.2);border-radius:8px;padding:12px">
      <div style="font-size:9px;font-weight:700;color:var(--gold);margin-bottom:8px">✨ AI育成フィードバック — ${name}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <div style="padding:8px 10px;background:var(--white);border-radius:6px"><div style="font-size:9px;color:var(--faint);margin-bottom:3px">強み</div><div style="font-size:11px;color:var(--em)">${fb.strength||''}</div></div>
        <div style="padding:8px 10px;background:var(--white);border-radius:6px"><div style="font-size:9px;color:var(--faint);margin-bottom:3px">改善点</div><div style="font-size:11px;color:var(--am)">${fb.weakness||''}</div></div>
      </div>
      <div style="font-size:10px;font-weight:700;color:var(--muted);margin-bottom:4px">次ランクへのアクション</div>
      ${(fb.tips||[]).map(t=>`<div style="font-size:10px;padding:2px 0;color:var(--ink)">⚡ ${t}</div>`).join('')}
      <div style="font-size:10px;background:var(--am-bg);border-radius:6px;padding:6px 10px;margin-top:8px">🎯 ${fb.goal||''}</div>
      <div style="font-size:10px;color:var(--muted);margin-top:5px;font-style:italic">💬 ${fb.cheer||''}</div>
    </div>`;
    res.style.display='block'; if(row) row.style.display='table-row';
  } catch(e) {
    res.innerHTML=`<div style="font-size:10px;color:var(--rd);padding:8px">取得失敗: ${e.message}</div>`;
    res.style.display='block'; if(row) row.style.display='table-row';
  } finally { btn.disabled=false; btn.innerHTML='✨ AI'; }
}

function openModal(id)  { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

// HQ ID採番定義
var HQ_ID_RANGES = {
  hq_exec:    { min:1,     max:199,   label:'HQ経営者' },
  hq_manager: { min:200,   max:999,   label:'HQマネージャー' },
  hq_staff:   { min:1000,  max:4999,  label:'HQスタッフ' },
  hq_part:    { min:5000,  max:9899,  label:'HQパート' },
};

function getNextHQId(role) {
  var range = HQ_ID_RANGES[role] || HQ_ID_RANGES.hq_staff;
  // 既存のCORETO_HQ_ACCOUNTS + HQ_USERS_RAWからIDを収集
  var used = new Set();
  HQ_USERS_RAW.forEach(function(u) {
    var m = String(u.id).match(/^HQ-0*(\d+)$/);
    if (m) used.add(parseInt(m[1], 10));
  });
  try {
    var accounts = JSON.parse(localStorage.getItem('CORETO_HQ_ACCOUNTS') || '{}');
    Object.keys(accounts).forEach(function(id) {
      var m = String(id).match(/^HQ-0*(\d+)$/);
      if (m) used.add(parseInt(m[1], 10));
    });
    var pending = JSON.parse(localStorage.getItem('CORETO_HQ_PENDING') || '{}');
    Object.keys(pending).forEach(function(id) {
      var m = String(id).match(/^HQ-0*(\d+)$/);
      if (m) used.add(parseInt(m[1], 10));
    });
  } catch(e) {}
  for (var n = range.min; n <= range.max; n++) {
    if (!used.has(n)) {
      return 'HQ-' + String(n).padStart(5, '0');
    }
  }
  return null; // 採番上限
}

function generateTempPw() {
  var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return 'HQ-' + Array.from({length:4}, function(){ return chars[Math.floor(Math.random()*chars.length)]; }).join('') +
         '-' + Array.from({length:4}, function(){ return chars[Math.floor(Math.random()*chars.length)]; }).join('');
}

function sendInvite() {
  var last  = document.getElementById('add-last').value.trim();
  var first = document.getElementById('add-first').value.trim();
  var email = document.getElementById('add-email').value.trim();
  var role  = document.getElementById('add-role').value;

  if (!last || !first || !email) {
    showToast('氏名とメールアドレスを入力してください', 'warn'); return;
  }

  // HQロール以外（AG/PT/intern）は従来の招待
  if (!role.startsWith('hq')) {
    showToast('📨 招待メールを送信しました（' + email + '）', 'em');
    closeModal('modal-add');
    return;
  }

  // HQメンバー招待: ID採番 → 仮PW生成 → CORETO_HQ_PENDINGに保存 → 招待URL表示
  var newId = getNextHQId(role);
  if (!newId) {
    showToast('⚠️ ' + (HQ_ID_RANGES[role]||{label:'このロール'}).label + 'のIDが上限に達しています', 'warn'); return;
  }
  var tempPw  = generateTempPw();
  var inviter = sessionStorage.getItem('coreto_name') || 'HQ';
  var now     = new Date().toLocaleDateString('ja-JP');
  var inviteUrl = location.origin + location.pathname.replace('coreto-user-mgmt-v2.html','') +
                  'coreto-hq-onboarding-v2.html?token=' + encodeURIComponent(newId);

  try {
    var pending = JSON.parse(localStorage.getItem('CORETO_HQ_PENDING') || '{}');
    pending[newId] = {
      id:         newId,
      tempPw:     tempPw,
      name:       last + ' ' + first,
      email:      email,
      hqRole:     role.replace('hq_',''),
      invitedBy:  inviter,
      invitedAt:  now,
      used:       false,
    };
    localStorage.setItem('CORETO_HQ_PENDING', JSON.stringify(pending));
  } catch(e) {
    showToast('⚠️ 保存に失敗しました', 'warn'); return;
  }

  // 招待URLをモーダルに表示
  document.getElementById('modal-add').innerHTML = `
    <div style="background:#fff;border-radius:14px;width:100%;max-width:520px;font-family:'Outfit','Noto Sans JP',sans-serif">
      <div style="padding:18px 24px;border-bottom:1px solid #e8eaed;font-size:15px;font-weight:700;color:#202124">
        ✅ HQ招待情報が発行されました
      </div>
      <div style="padding:20px 24px">
        <div style="background:#0D1A2D;border-radius:10px;padding:16px 20px;margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.1)">
            <span style="font-size:11px;color:rgba(255,255,255,.5)">発行ID</span>
            <span style="font-size:13px;font-weight:700;color:#C8A951;font-family:'DM Mono',monospace">${newId}</span>
          </div>
          <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.1)">
            <span style="font-size:11px;color:rgba(255,255,255,.5)">氏名</span>
            <span style="font-size:13px;font-weight:700;color:#fff">${last + ' ' + first}</span>
          </div>
          <div style="display:flex;justify-content:space-between;padding:6px 0">
            <span style="font-size:11px;color:rgba(255,255,255,.5)">仮パスワード</span>
            <span style="font-size:13px;font-weight:700;color:#fff;font-family:'DM Mono',monospace">${tempPw}</span>
          </div>
        </div>
        <div style="font-size:11px;font-weight:700;color:#5F6368;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">招待URL</div>
        <div style="background:#F8F9FA;border:1.5px solid #E8EAED;border-radius:8px;padding:10px 12px;font-size:11px;font-family:'DM Mono',monospace;word-break:break-all;margin-bottom:16px;color:#202124">${inviteUrl}</div>
        <div style="background:#FFFBEB;border:1px solid rgba(217,119,6,.2);border-radius:8px;padding:10px 14px;font-size:11px;color:#D97706;line-height:1.7;margin-bottom:16px">
          ⚠️ 上記のHQ IDと仮パスワードをこの画面でメモしてください。<br>招待URLを${last + ' ' + first}さんに別途共有してください。
        </div>
        <div style="display:flex;gap:10px">
          <button onclick="navigator.clipboard&&navigator.clipboard.writeText('${inviteUrl}');showToast('URLをコピーしました','em')"
            style="flex:1;padding:10px;background:#0D1A2D;color:#C8A951;border:none;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif">
            📋 URLをコピー
          </button>
          <button onclick="this.closest('.modal-bg').classList.remove('show')"
            style="flex:1;padding:10px;background:transparent;color:#5F6368;border:1.5px solid #E8EAED;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif">
            閉じる
          </button>
        </div>
      </div>
    </div>`;
}
function toast(msg, type='ok') {
  let t=document.getElementById('_toast');
  if(!t){t=document.createElement('div');t.id='_toast';Object.assign(t.style,{position:'fixed',bottom:'24px',left:'50%',transform:'translateX(-50%) translateY(10px)',padding:'10px 20px',borderRadius:'8px',fontSize:'13px',fontWeight:'600',zIndex:'9999',opacity:'0',transition:'all .25s',fontFamily:"'Outfit',sans-serif",boxShadow:'0 4px 20px rgba(0,0,0,.25)',whiteSpace:'nowrap'});document.body.appendChild(t);}
  t.style.background=type==='warn'?'var(--am)':'#0D1A2D'; t.style.color='#fff';
  t.textContent=msg;t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(t._t);t._t=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(10px)';},2500);
}

window.addEventListener('DOMContentLoaded', () => {
  CNAV.init('hq_mgmt');
  setHQRole('exec');
  switchTab('account');
});
function showToast(msg, type) {
  var colors = {
    em: ['#ECFDF5','#059669','rgba(5,150,105,.2)'],
    am: ['#FFFBEB','#D97706','rgba(217,119,6,.2)'],
    rd: ['#FEF2F2','#DC2626','rgba(220,38,38,.2)'],
    sk: ['#F0F9FF','#0284C7','rgba(2,132,199,.2)'],
    ok: ['#ECFDF5','#059669','rgba(5,150,105,.2)'],
    warn:['#FFFBEB','#D97706','rgba(217,119,6,.2)'],
    error:['#FEF2F2','#DC2626','rgba(220,38,38,.2)'],
  };
  var c = colors[type] || colors.em;
  var t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:9999;padding:11px 18px;border-radius:9px;font-size:13px;font-weight:600;font-family:Outfit,sans-serif;box-shadow:0 6px 20px rgba(0,0,0,.12);transition:opacity .4s;background:'+c[0]+';color:'+c[1]+';border:1px solid '+c[2];
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.style.opacity='0'; setTimeout(function(){ if(t.parentNode) t.remove(); },400); }, 3200);
}
