<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HQ管理パネル — COREBLDG</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#0D1A2D;--navy-l:#1E3252;--gold:#C8A951;--gold-dim:rgba(200,169,81,.15);--cream:#FFFFFF;--cream2:#F8F9FA;--white:#FFFFFF;--ink:#202124;--muted:#5F6368;--faint:#80868B;--em:#059669;--em-bg:#ECFDF5;--am:#D97706;--am-bg:#FFFBEB;--rd:#DC2626;--rd-bg:#FEF2F2;--sk:#0284C7;--sk-bg:#F0F9FF;--vt:#7C3AED;--vt-bg:#F5F3FF;--bd:#E8EAED;--bd2:#DADCE0;--sw:240px;--r:10px;--r-sm:7px;--sh:0 1px 2px rgba(60,64,67,.1),0 1px 3px rgba(60,64,67,.06)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:var(--cream2)}
.shell{display:flex;height:100vh}
.sb{width:var(--sw);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;position:relative}
.sb::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,rgba(200,169,81,.25) 0%,rgba(200,169,81,.06) 50%,transparent 100%)}
.sb-head{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;letter-spacing:5px;color:var(--gold)}
.sb-ver{font-size:9px;letter-spacing:2px;color:rgba(200,169,81,.3);font-family:'DM Mono',monospace;margin-top:2px}
.sb-user{margin:14px 14px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:9px 11px;display:flex;align-items:center;gap:9px}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--gold-dim);border:1px solid rgba(200,169,81,.25);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gold);flex-shrink:0}
.sb-un{font-size:11px;font-weight:600;color:rgba(255,255,255,.8)}.sb-ur{font-size:9px;color:rgba(255,255,255,.3);font-family:'DM Mono',monospace}
.sb-nav{flex:1;overflow-y:auto;padding:6px 10px}
.sb-nav::-webkit-scrollbar{width:3px}.sb-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.sb-foot{padding:10px 14px 18px;border-top:1px solid rgba(255,255,255,.05)}
.sf{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.3);transition:.13s}
.sf:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.6)}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;box-shadow:var(--sh)}
.tb-back{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);cursor:pointer;text-decoration:none;transition:.13s;flex-shrink:0}.tb-back:hover{color:var(--am)}
.tb-sep{width:1px;height:20px;background:var(--bd);flex-shrink:0}
.tb-title{font-size:15px;font-weight:600;color:var(--ink)}
.tb-crumb{font-size:11px;color:var(--faint)}.tb-crumb a{color:var(--muted);text-decoration:none}.tb-crumb a:hover{color:var(--am)}
.tb-act{margin-left:auto;display:flex;gap:9px;align-items:center}
.btn{padding:7px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;transition:.15s;font-family:'Outfit',sans-serif;border:none;letter-spacing:.3px}
.btn-p{background:var(--navy);color:var(--gold)}.btn-p:hover{background:var(--navy-l)}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--bd)}.btn-g:hover{background:var(--cream2);color:var(--ink)}
.btn-rd{background:var(--rd-bg);color:var(--rd);border:1px solid rgba(220,38,38,.2)}.btn-rd:hover{background:var(--rd);color:#fff}
.btn-sm{padding:5px 12px;font-size:11px}
/* TABS */
.tab-bar{display:flex;border-bottom:2px solid var(--bd);background:var(--white);padding:0 24px;flex-shrink:0;box-shadow:var(--sh)}
.tab{padding:13px 18px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s;white-space:nowrap}
.tab:hover{color:var(--ink)}.tab.active{color:var(--navy);border-bottom-color:var(--gold)}
/* PAGE */
.page{flex:1;overflow-y:auto;padding:24px}.page::-webkit-scrollbar{width:5px}.page::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.gd::before{background:var(--gold)}.kpi.em::before{background:var(--em)}.kpi.sk::before{background:var(--sk)}.kpi.am::before{background:var(--am)}.kpi.rd::before{background:var(--rd)}
.kpi-lb{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.kpi-vl{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--ink)}
.kpi-sb{font-size:10px;color:var(--faint);margin-top:4px}
/* CARD / TABLE */
.card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:18px}
.card-head{padding:13px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--cream2)}
.card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink);display:flex;align-items:center;gap:7px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--faint);padding:9px 14px;border-bottom:2px solid var(--bd);text-align:left;background:var(--cream2)}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--bd);color:var(--ink);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}.tbl tr:hover td{background:rgba(200,169,81,.03)}
.mono{font-family:'DM Mono',monospace;font-size:11px;color:var(--faint)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.3px;white-space:nowrap}
.b-em{background:var(--em-bg);color:var(--em)}.b-am{background:var(--am-bg);color:var(--am)}.b-rd{background:var(--rd-bg);color:var(--rd)}.b-sk{background:var(--sk-bg);color:var(--sk)}.b-vt{background:var(--vt-bg);color:var(--vt)}.b-gd{background:var(--gold-dim);color:#92610A}.b-mu{background:var(--cream2);color:var(--faint);border:1px solid var(--bd)}.b-nt{background:var(--cream2);color:var(--muted)}
/* FILTER */
.filter-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:0}
.fsel{padding:7px 12px;background:var(--cream2);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:12px;color:var(--ink);font-family:'Outfit',sans-serif;outline:none;cursor:pointer}.fsel:focus{border-color:var(--gold)}
.srch{position:relative;flex:1;min-width:200px}
.srch input{width:100%;padding:8px 12px 8px 34px;background:var(--cream2);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:12px;color:var(--ink);font-family:'Outfit',sans-serif;outline:none}
.srch input:focus{border-color:var(--gold);background:var(--white)}
.srch-ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:13px;pointer-events:none}
/* ROLE TABS */
.role-tabs{display:flex;border-bottom:1px solid var(--bd);background:var(--white)}
.rtab{padding:10px 16px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s;white-space:nowrap}
.rtab:hover{color:var(--ink)}.rtab.active{color:var(--navy);border-bottom-color:var(--gold)}
/* ROW ACTIONS */
.row-act{display:flex;gap:5px;opacity:0;transition:.15s}
.tbl tr:hover .row-act{opacity:1}
/* AVATAR */
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.av-hq{background:var(--navy);color:var(--gold)}.av-re{background:var(--sk-bg);color:var(--sk)}.av-hr{background:var(--vt-bg);color:var(--vt)}.av-hk{background:var(--gold-dim);color:#92610A}.av-pt{background:var(--em-bg);color:var(--em)}.av-in{background:var(--am-bg);color:var(--am)}
/* PT code chip */
.code-chip{font-family:'DM Mono',monospace;font-size:11px;background:var(--navy);color:var(--gold);padding:3px 9px;border-radius:5px;letter-spacing:1px;cursor:pointer;transition:.15s;display:inline-block;margin-top:3px}
.code-chip:hover{background:var(--navy-l)}
/* PERMISSIONS */
.perm-table{width:100%;border-collapse:collapse;font-size:11px}
.perm-table th{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--faint);padding:8px 10px;border-bottom:2px solid var(--bd);text-align:center;background:var(--cream2)}
.perm-table th:first-child{text-align:left;min-width:160px}
.perm-table td{padding:10px;border-bottom:1px solid var(--bd);text-align:center;vertical-align:middle}
.perm-table td:first-child{text-align:left;font-size:12px;font-weight:600;color:var(--ink)}
.perm-table tr:last-child td{border-bottom:none}
.pchk{width:20px;height:20px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.pchk.allow{background:var(--em-bg);color:var(--em)}.pchk.deny{background:var(--cream2);color:var(--faint)}.pchk.partial{background:var(--am-bg);color:var(--am)}
/* SETTINGS */
.set-section{margin-bottom:22px}
.set-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--white);border:1px solid var(--bd);border-radius:var(--r-sm);margin-bottom:6px}
.set-label{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:2px}
.set-desc{font-size:11px;color:var(--muted)}
.toggle{width:40px;height:22px;background:var(--bd2);border-radius:11px;position:relative;cursor:pointer;transition:.2s;flex-shrink:0}
.toggle.on{background:var(--em)}.toggle::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:3px;left:3px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}.toggle.on::after{left:21px}
.set-input{padding:7px 12px;background:var(--cream2);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:13px;color:var(--ink);font-family:'Outfit',sans-serif;min-width:70px;outline:none;text-align:center}.set-input:focus{border-color:var(--gold)}
/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-bg.show{display:flex}
.modal{background:var(--white);border-radius:12px;width:540px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:14px;font-weight:700;color:var(--ink)}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted)}
.modal-body{padding:20px 22px}
.modal-foot{padding:14px 22px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:8px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;letter-spacing:.3px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;background:var(--cream2);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:13px;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;outline:none;transition:.15s}
.field input:focus,.field select:focus{border-color:var(--gold);background:var(--white)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.detail-cell{padding:10px 12px;background:var(--cream2);border-radius:var(--r-sm)}
.dc-lb{font-size:10px;color:var(--faint);margin-bottom:3px}.dc-vl{font-size:13px;font-weight:600;color:var(--ink)}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

        <div class="tb-title">HQ管理パネル</div>

    <!-- TABS -->

    </div>

    <div class="page" id="page-content"></div>
  </div>
</div>

  </div>
</div>

    <div class="modal-foot">

    </div>
  </div>
</div>
<div class="modal-bg" id="modal-pt" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal" style="width:600px">
    <div class="modal-head"><div class="modal-title" id="modal-pt-title">PT詳細</div><button class="modal-close" onclick="document.getElementById('modal-pt').classList.remove('show')">✕</button></div>
    <div class="modal-body" id="modal-pt-body"></div>
    <div class="modal-foot" id="modal-pt-foot"></div>
  </div>
</div>

// AI育成フィードバック
async function aiAgentFeedback(agentId, agentName, rank, monthlyAmt) {
  const btn = document.getElementById('ai-fb-btn-'+agentId);
  const resultEl = document.getElementById('ai-fb-'+agentId);
  const fbRow = document.getElementById('ai-fb-row-'+agentId);
  if (!btn||!resultEl) return;
  btn.disabled=true; btn.innerHTML='<span style="animation:spin .8s linear infinite;display:inline-block">✨</span>';
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:`あなたはCOREBLDGの育成マネージャーAIです。エージェント「${agentName}」（現ランク:${rank}、今月報酬:¥${monthlyAmt?.toLocaleString()||'—'}）に対して具体的な育成フィードバックをJSONのみで返してください:\n{"strength":"強み（1文）","weakness":"改善点（1文）","next_rank_tips":["アクション①","②","③"],"monthly_goal":"今月の目標","encouragement":"励まし（1文）"}`}]})});
    const data = await resp.json();
    const res = JSON.parse((data.content?.find(b=>b.type==='text')?.text||'{}').replace(/```json|```/g,'').trim());
    resultEl.innerHTML = `<div style="background:var(--em-bg);border:1px solid rgba(5,150,105,.2);border-radius:8px;padding:12px;margin-top:0">
      <div style="font-size:9px;font-weight:700;color:var(--gold);margin-bottom:8px">✨ AI育成フィードバック</div>
      <div style="font-size:11px;color:var(--em);margin-bottom:4px">💪 ${res.strength||''}</div>
      <div style="font-size:11px;color:var(--am);margin-bottom:8px">📌 ${res.weakness||''}</div>
      <div style="font-size:10px;font-weight:700;color:var(--muted);margin-bottom:4px">次ランクへのアクション</div>
      ${(res.next_rank_tips||[]).map(t=>`<div style="font-size:10px;padding:2px 0">⚡ ${t}</div>`).join('')}
      <div style="font-size:10px;background:var(--am-bg);border-radius:6px;padding:6px 10px;margin-top:8px">🎯 ${res.monthly_goal||''}</div>
      <div style="font-size:10px;color:var(--muted);margin-top:6px;font-style:italic">💬 ${res.encouragement||''}</div>
    </div>`;
    resultEl.style.display='block'; if(fbRow) fbRow.style.display='table-row';
  } catch(e) {
    resultEl.innerHTML=`<div style="font-size:10px;color:var(--rd)">取得失敗: ${e.message}</div>`;
    resultEl.style.display='block'; if(fbRow) fbRow.style.display='table-row';
  } finally { btn.disabled=false; btn.innerHTML='✨ AI育成FB'; }
}

      <div class="detail-cell"><div class="dc-lb">今月紹介件数</div><div class="dc-vl">${p.refMonth}件</div></div>
      <div class="detail-cell"><div class="dc-lb">累計紹介件数</div><div class="dc-vl">${p.refTotal}件</div></div>
      <div class="detail-cell"><div class="dc-lb">累計確定報酬</div><div class="dc-vl" style="color:var(--em)">¥${p.reward.toLocaleString()}</div></div>
    </div>
    <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px">紹介案件履歴（${refs.length}件）</div>
    <div style="max-height:180px;overflow-y:auto;display:flex;flex-direction:column;gap:8px">
      ${refs.length?refs.map(r=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--cream2);border-radius:var(--r-sm)">
        <div style="width:7px;height:7px;border-radius:50%;background:${r.status==='done'?'var(--em)':r.status==='cancel'?'var(--faint)':'var(--am)'};flex-shrink:0"></div>
        <div style="flex:1"><div style="font-size:12px;font-weight:600">${r.id} — ${r.client}</div><div style="font-size:11px;color:var(--muted)">${r.bizLabel} / ${r.statusLabel}</div></div>
        <div style="font-size:12px;font-weight:700;color:${r.reward>0?'var(--em)':'var(--faint)'}">${r.reward>0?'¥'+r.reward.toLocaleString():'—'}</div>
      </div>`).join(''):'<div style="text-align:center;padding:16px;color:var(--faint);font-size:12px">紹介案件なし</div>'}
    </div>`;
  document.getElementById('modal-pt-foot').innerHTML=`
    <button class="btn btn-g" onclick="document.getElementById('modal-pt').classList.remove('show')">閉じる</button>
    <button class="btn btn-rd btn-sm" onclick="togglePTStatus('${id}');document.getElementById('modal-pt').classList.remove('show')">${p.status==='active'?'停止':'有効化'}</button>
    <button class="btn btn-p">変更を保存</button>`;
  document.getElementById('modal-pt').classList.add('show');
}

function openPTInvite() {
  document.getElementById('add-role').value='pt';
  document.getElementById('modal-add').classList.add('show');
}
function copyCode(code) {
  navigator.clipboard?.writeText(code).then(()=>showToast('紹介コードをコピーしました: '+code)).catch(()=>showToast('コード: '+code));
}

}

function exportCSV() { alert('CSVエクスポート（本番環境で実装）'); }
function showToast(msg) {
  let t=document.getElementById('_toast');
  if(!t){t=document.createElement('div');t.id='_toast';Object.assign(t.style,{position:'fixed',bottom:'24px',left:'50%',transform:'translateX(-50%) translateY(10px)',background:'#0D1A2D',color:'#fff',padding:'10px 20px',borderRadius:'8px',fontSize:'13px',fontWeight:'600',zIndex:'9999',opacity:'0',transition:'all .25s',fontFamily:"'Outfit',sans-serif",boxShadow:'0 4px 20px rgba(0,0,0,.25)',whiteSpace:'nowrap'});document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(t._t);t._t=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(10px)';},2500);
}
