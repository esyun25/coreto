<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>成約報告 — COREBLDG</title>
<link rel="stylesheet" href="coreto-design-system.css">
<style>
:root{--navy:#0D1A2D;--navy-l:#1E3252;--gold:#C8A951;--gold-dim:rgba(200,169,81,.15);--cream:#FFFFFF;--cream2:#F8F9FA;--white:#FFFFFF;--ink:#202124;--muted:#5F6368;--faint:#80868B;--em:#059669;--em-bg:#ECFDF5;--am:#D97706;--am-bg:#FFFBEB;--rd:#DC2626;--rd-bg:#FEF2F2;--sk:#0284C7;--sk-bg:#F0F9FF;--vt:#7C3AED;--vt-bg:#F5F3FF;--bd:#E8EAED;--bd2:#DADCE0;--sw:240px;--r:10px;--r-sm:7px;--sh:0 1px 2px rgba(60,64,67,.1),0 1px 3px rgba(60,64,67,.06)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:#FFFFFF}
.shell{display:flex;height:100vh}
.sb{width:var(--sw);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;position:relative}
.sb::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,rgba(200,169,81,.25) 0%,rgba(200,169,81,.06) 50%,transparent 100%)}
.sb-head{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-logo{font-family: 'Cormorant Garamond', serif;font-size:20px;font-weight:600;letter-spacing:5px;color:var(--gold)}
.sb-ver{font-size:9px;letter-spacing:2px;color:rgba(200,169,81,.3);font-family:'DM Mono',monospace;margin-top:2px}
.sb-user{margin:14px 14px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:9px 11px;display:flex;align-items:center;gap:9px}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--gold-dim);border:1px solid rgba(200,169,81,.25);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gold);flex-shrink:0}
.sb-un{font-size:11px;font-weight:600;color:rgba(255,255,255,.8)}
.sb-ur{font-size:9px;color:rgba(255,255,255,.3);font-family:'DM Mono',monospace}
.sb-nav{flex:1;overflow-y:auto;padding:6px 10px}
.nsl{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.18);padding:10px 8px 4px;font-family:'DM Mono',monospace}
.ni{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;cursor:pointer;transition:.13s;margin-bottom:1px}
.ni:hover{background:rgba(255,255,255,.06)}
.ni.active{background:rgba(200,169,81,.1)}
.ni-ic{width:22px;text-align:center;font-size:14px}
.ni-lb{font-size:11px;font-weight:500;color:rgba(255,255,255,.55)}
.ni.active .ni-lb{color:var(--gold)}
.sf{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.3);transition:.13s}
.sf:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.6)}
.sb-foot{padding:10px 14px 18px;border-top:1px solid rgba(255,255,255,.05)}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;box-shadow:var(--sh)}
.tb-title{font-size:16px;font-weight:600;color:var(--ink);letter-spacing:.5px}
.tb-crumb{font-size:11px;color:var(--faint)}
.tb-crumb a{color:var(--muted);text-decoration:none}
.tb-act{margin-left:auto;display:flex;gap:9px;align-items:center}
.btn{padding:7px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;transition:.15s;font-family:'Outfit',sans-serif;border:none}
.btn-p{background:var(--navy);color:var(--gold)}.btn-p:hover{background:var(--navy-l)}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--bd)}.btn-g:hover{background:var(--cream);color:var(--ink)}
.btn-sm{padding:5px 12px;font-size:11px}
.tab-bar{padding:0 24px;background:var(--white);border-bottom:1px solid var(--bd);display:flex}
.tab{padding:12px 18px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.tab:hover{color:var(--ink)}.tab.active{color:var(--navy);border-bottom-color:var(--gold)}
.page{flex:1;overflow-y:auto;padding:24px}
.page::-webkit-scrollbar{width:5px}.page::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;font-family:'Outfit',sans-serif}
.b-em{background:var(--em-bg);color:var(--em)}.b-am{background:var(--am-bg);color:var(--am)}.b-rd{background:var(--rd-bg);color:var(--rd)}.b-sk{background:var(--sk-bg);color:var(--sk)}.b-nt{background:var(--cream2);color:var(--muted)}.b-gd{background:var(--gold-dim);color:var(--am)}
/* Form */
.form-wrap{max-width:720px}
.form-card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:18px}
.form-head{padding:14px 22px;border-bottom:1px solid var(--bd);background:var(--cream);display:flex;align-items:center;gap:10px}
.form-head-icon{font-size:16px}
.form-head-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink)}
.form-body{padding:20px 22px}
.field{margin-bottom:16px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;background:var(--cream);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:13px;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;outline:none;transition:.15s;-webkit-appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);background:var(--white)}
.field textarea{min-height:80px;resize:vertical;line-height:1.6}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.required::after{content:' *';color:var(--rd);font-size:11px}
.hint{font-size:11px;color:var(--faint);margin-top:4px}
/* Step indicator */
.step-bar{display:flex;align-items:center;gap:0;margin-bottom:24px}
.step{display:flex;align-items:center;gap:8px;flex:1}
.step-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;border:2px solid var(--bd);color:var(--faint);background:var(--white)}
.step.done .step-num{background:var(--em);border-color:var(--em);color:#fff}
.step.active .step-num{background:var(--navy);border-color:var(--navy);color:var(--gold)}
.step-label{font-size:11px;color:var(--faint)}
.step.done .step-label,.step.active .step-label{color:var(--ink);font-weight:600}
.step-line{flex:1;height:1px;background:var(--bd);margin:0 8px}
.step.done .step-line{background:var(--em)}
/* reward preview */
.reward-preview{background:var(--cream);border:1px solid var(--bd);border-radius:var(--r-sm);padding:14px 16px;margin-top:10px}
.rp-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:4px 0}
.rp-label{color:var(--muted)}
.rp-val{font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums}
.rp-total{border-top:1px solid var(--bd);margin-top:8px;padding-top:8px}
.rp-total .rp-label{font-weight:700;color:var(--ink)}
.rp-total .rp-val{font-size:18px;font-family:'Outfit','Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums;color:var(--em)}
/* list */
.card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:18px}
.card-head{padding:14px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--cream)}
.card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink)}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--faint);padding:9px 14px;border-bottom:2px solid var(--bd);text-align:left;background:var(--cream)}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--bd);color:var(--ink);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(200,169,81,.03)}
/* MOBILE */
.mob-ham{display:none;flex-direction:column;align-items:center;justify-content:center;width:36px;height:36px;background:transparent;border:none;cursor:pointer;border-radius:7px;flex-shrink:0}
.mob-ham span{display:block;width:18px;height:2px;background:rgba(255,255,255,.72);margin:3px 0;border-radius:1px}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199}
@media(max-width:768px){
  .mob-ham{display:flex}
  .mob-overlay.show{display:block}
  .sb{position:fixed;left:calc(-1 * var(--sw));top:0;height:100vh;z-index:200;transition:left .25s ease}
  .sb.open{left:0}
  .shell{overflow:hidden}.content{width:100vw;min-width:0}
  .topbar{padding:0 12px;gap:8px}.tb-crumb{display:none}
  .page{padding:12px}
  .form-wrap{max-width:100%}
  .field-row,.field-row-3{grid-template-columns:1fr}
  table{display:block;overflow-x:auto}
  .step-label{display:none}

}  .tb-title,
.brand-logo,
.sb-logo,
.login-title,
.mod-title,
.page-title        {  font-weight:600; letter-spacing:.3px; }

/* Section headings inside content */
.section-title     {  font-size:12px;
                     font-weight:700; text-transform:uppercase; letter-spacing:1px;
                     color:var(--label); }

/* KPI numbers — large display (24px+): Outfit tabular */
.kpi-value, .kpi-vl, .stat-val { 
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-weight:300;
  font-variant-numeric:tabular-nums lining-nums;
  letter-spacing:-.5px;   /* tight for large numbers */
  color:var(--ink);        /* always maximum contrast */
}

/* Inline amounts in tables/lists */
.amt { font-family:'Outfit','Noto Sans JP',sans-serif;
       font-weight:600; font-variant-numeric:tabular-nums;
       color:var(--ink); }

/* Positive delta only */
.delta-up { color:var(--em); font-weight:600; font-size:.9em; }
.delta-dn { color:var(--rd); font-weight:600; font-size:.9em; }

/* IDs and codes */
.mono, [class*="-id"], [class*="-code"] { font-family:'DM Mono',monospace; font-size:.92em; }

/* Badge system — 4 states only */
.badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:20px;
         font-size:10px; font-weight:600; letter-spacing:.3px;
         font-family:'Outfit',sans-serif; white-space:nowrap; }
.b-em, .badge.emerald, .badge.em { background:var(--em-bg); color:var(--em); }
.b-am, .badge.amber,   .badge.am { background:var(--am-bg); color:var(--am); }
.b-rd, .badge.red,     .badge.rd { background:var(--rd-bg); color:var(--rd); }
.b-nt, .badge.muted,   .badge.nt { background:var(--cream2); color:var(--label); }
/* Legacy aliases → neutral */
.b-sk, .badge.sky    { background:#F0F9FF; color:#0369A1; }
.b-vt, .badge.violet { background:var(--cream2); color:var(--label); }
.b-gd, .badge.gold   { background:var(--gold-dim); color:#92740A; }




/* Brand — Cormorant only here */
.sb-logo, .brand-logo {
  font-family:'Cormorant Garamond',serif !important;
  letter-spacing:5px;
}
/* Everything else: Outfit */
body, input, select, textarea, button {
  font-family:'Outfit','Noto Sans JP',sans-serif;
}

/* ── Page structure ── */
.tb-title {
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-size:18px; font-weight:600; color:var(--ink);
  letter-spacing:-.2px;
}
.login-title {
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-size:24px; font-weight:600; color:var(--ink);
  letter-spacing:-.3px;
}
.section-title {
  
  font-size:11px; font-weight:700;
  text-transform:uppercase; letter-spacing:1.2px;
  color:var(--label);
}

/* ── Numbers & Amounts — always --ink, always Outfit ── */
.kpi-value, .kpi-vl {
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-weight:300 !important;
  font-variant-numeric:tabular-nums lining-nums !important;
  color:var(--ink);
  letter-spacing:-.5px;
}
.stat-val {
  font-family:'Outfit','Noto Sans JP',sans-serif !important;
  font-weight:300 !important;
  font-variant-numeric:tabular-nums !important;
  color:var(--ink) !important;
}
.kpi-label, .stat-label, .kpi-sub {
  color:var(--label) !important;
  font-weight:500;
}

/* ── Delta (the ONE exception: direction of change) ── */
.delta-up { color:var(--em) !important; }
.delta-dn { color:var(--rd) !important; }

/* ── IDs / codes ── */
.id-mono, .ag-id, .case-id {
  font-family:'DM Mono',monospace;
  font-size:.88em; color:var(--label);
}

/* ── Badge system: 4 states only ── */
.badge {
  display:inline-flex; align-items:center;
  padding:2px 8px; border-radius:20px;
  font-size:10px; font-weight:600; letter-spacing:.3px;
  font-family:'Outfit',sans-serif; white-space:nowrap;
  font-variant-numeric:tabular-nums;
}
.badge.emerald, .badge.em { background:#ECFDF5; color:#059669; }
.badge.amber,   .badge.am { background:#FFFBEB; color:#D97706; }
.badge.red,     .badge.rd { background:#FEF2F2; color:#DC2626; }
.badge.muted,   .badge.nt,
.badge.sky,     .badge.violet,
.badge.gold               { background:var(--cream2); color:var(--label); }


/* ═══════════════════════════════════════════════════════════════
   COREBLDG — Google-style Typography System
   ─────────────────────────────────────────────────────────────
   大きな数値は weight:300 でサイズで存在感を出す
   Bold はラベル・ボタン・UIに使い、数値には使わない
   背景は白。装飾は最小限。余白で呼吸する。
   ═══════════════════════════════════════════════════════════════ */

/* Page background */
html, body { background:#FFFFFF !important; }

/* ── Brand (Cormorant only here) ── */
.sb-logo, .brand-logo {
  font-family: 'Cormorant Garamond', serif !important;
  letter-spacing: 5px;
}

/* ── Base ── */
body, input, select, textarea, button {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif;
}

/* ── KPI / メトリクス数値
   Google Analytics の大型数値と同じアプローチ:
   weight 300、大きなサイズ、tight letter-spacing ── */
.kpi-value, .kpi-vl {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif !important;
  font-weight: 300 !important;
  font-variant-numeric: tabular-nums lining-nums !important;
  letter-spacing: -1px !important;
  color: var(--ink) !important;
  line-height: 1 !important;
}
/* KPIカードのサイズを少し大きく（軽いweightを補う） */
.kpi-value { font-size: 32px !important;font-variant-numeric:tabular-nums}
.kpi-vl   { font-size: 28px !important; }

/* ── 中型数値（stat-val, テーブル内金額） ── */
.stat-val {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif !important;
  font-weight: 400 !important;
  font-variant-numeric: tabular-nums !important;
  color: var(--ink) !important;
}

/* ── ラベル系 ── */
.kpi-label, .kpi-sub, .stat-label {
  font-size: 11px !important;
  font-weight: 500 !important;
  letter-spacing: .5px !important;
  color: var(--label) !important;
  text-transform: none;
}

/* ── Page title ── */
.tb-title {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif;
  font-size: 16px; font-weight: 400; color: var(--ink);
  letter-spacing: 0;
}

/* ── Section title — Google style: small, spaced, gray ── */
.section-title {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif;
  font-size: 11px; font-weight: 500;
  letter-spacing: .8px;
  color: var(--label);
  text-transform: uppercase;
}

/* ── Card: white bg, very light border, minimal shadow ── */
.card {
  background: #FFFFFF;
  border: 1px solid var(--bd);
  border-radius: 8px;
  box-shadow: var(--sh);
}

/* ── KPI Card ── */
.kpi-card {
  background: #FFFFFF !important;
  border: 1px solid var(--bd) !important;
  border-radius: 8px !important;
  box-shadow: none !important;
  padding: 20px 24px !important;
}
.kpi-card.gold   { border-top: 3px solid var(--gold) !important; }
.kpi-card.emerald{ border-top: 3px solid var(--em)   !important; }
.kpi-card.amber  { border-top: 3px solid var(--am)   !important; }
.kpi-card.red    { border-top: 3px solid var(--rd)   !important; }
.kpi-card.sky    { border-top: 3px solid #1A73E8     !important; }

/* ── 入金監視・大型パネル ── */
.kpi { border-radius: 8px; border: 1px solid var(--bd); }

/* ── Badge — flat style ── */
.badge {
  border-radius: 4px !important;
  font-size: 11px !important;
  font-weight: 500 !important;
  padding: 2px 7px !important;
  letter-spacing: 0 !important;
}

/* ── Buttons ── */
.btn-primary {
  background: var(--navy) !important;
  border-radius: 6px !important;
  font-weight: 500 !important;
  letter-spacing: .2px !important;
}
.btn-ghost {
  border-radius: 6px !important;
  font-weight: 500 !important;
}

/* ── Delta (増減のみ色付き) ── */
.delta-up, .kpi-delta.up { color: var(--em) !important; font-weight: 500; font-size: .82em; }
.delta-dn, .kpi-delta.dn { color: var(--rd) !important; font-weight: 500; font-size: .82em; }

/* ── IDs ── */
[class*="-id"], [class*="-code"], .pipe-ag, .task-meta [class*="ag-"],
.id-mono { font-family: 'DM Mono', monospace; font-size: .88em; color: var(--label); }

/* ── Form inputs — Google style ── */
.form-input, .form-select {
  border: 1px solid var(--bd) !important;
  border-radius: 4px !important;
  background: #FFFFFF !important;
  font-family: 'Outfit', 'Noto Sans JP', sans-serif !important;
  font-size: 14px !important;
  color: var(--ink) !important;
  padding: 8px 12px !important;
}
.form-input:focus, .form-select:focus {
  border-color: #1A73E8 !important;
  outline: none !important;
}

/* ── Section separator ── */

.section-title::before { display: none; }
/* ── Google-style 数値原則 (DS v2.3) ── */
.kpi-value, .kpi-vl, .kpi-val,
.stat-val, .qs-val, .count-val,
.td-amt, .bc-vl, .bc-total-vl,
.rr-amount, .amount-val, .srv,
.visit-reward, .lb-val,
.mf-kpi-vl, .mf-reward {
  font-family:'Outfit','Noto Sans JP',sans-serif !important;
  font-weight:300 !important;
  font-variant-numeric:tabular-nums !important;
}
.kpi-value { font-size:32px !important; }
.kpi-vl    { font-size:28px !important; }
</style>
</head>
<body>
<div class="shell">
<nav class="sb" id="sb">
  <div class="sb-head">
    <div class="sb-logo">CORE<br>BLDG</div>
    <div class="sb-ver">v2.0 — CORETO</div>
  </div>
  <div class="sb-user">
    <div class="sb-av">AG</div>
    <div>
      <div class="sb-un">山田 誠</div>
      <div class="sb-ur">AG-0042 / Gold</div>
    </div>
  </div>
  <div class="sb-nav" id="sb-nav"></div>
  <div class="sb-foot">
    <div class="sf" onclick="window.location.href='coreto-hub-v2.html'">⬅ ダッシュボードへ</div>
  </div>
</nav>

<div class="content">
  <div class="topbar">
    <button class="mob-ham" onclick="toggleSb()"><span></span><span></span><span></span></button>
    <a class="tb-back" href="#" onclick="event.preventDefault();history.back()" style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);cursor:pointer;text-decoration:none;transition:.13s;flex-shrink:0">← 戻る</a>
    <div style="width:1px;height:20px;background:var(--bd);flex-shrink:0"></div>
    <div>
      <div class="tb-title">成約報告</div>
      <div class="tb-crumb"><a href="coreto-hub-v2.html">COREBLDG</a> › <span>成約報告</span></div>
    </div>
  </div>
  <div class="tab-bar">
    <div class="tab active" id="tab-new" onclick="showTab('new',this)">新規成約報告</div>
    <div class="tab" id="tab-history" onclick="showTab('history',this)">報告履歴</div>

// ロール別コミッション率（確定値）
const COMMISSION_RATE = {
  re_ag:     { Bronze:65,  Silver:67.5, Gold:70,  Platinum:75  },
  hr_ag:     { Bronze:45,  Silver:47.5, Gold:50,  Platinum:55  },
  hikari_ag: { Bronze:80,  Silver:83,   Gold:87,  Platinum:90  },
  hq:        { Bronze:75,  Silver:75,   Gold:75,  Platinum:75  },
};

function getMyRate(bizType) {
  const role = sessionStorage.getItem('coreto_role') || 're_ag';
  const rateKey = bizType === 'hr' ? 'hr_ag' : bizType === 'util' ? 'hikari_ag' : (role === 'hq' ? 'hq' : role);
  const rates = COMMISSION_RATE[rateKey] || COMMISSION_RATE.re_ag;
  // 🔴-4修正: sessionStorageから実際のランクを取得（RANK_MAPの固定IDを廃止）
  const rank = sessionStorage.getItem('coreto_rank') || 'Gold';
  const validRanks = ['Bronze','Silver','Gold','Platinum'];
  const safeRank = validRanks.includes(rank) ? rank : 'Gold';
  return { rate: rates[safeRank] || 70, rank: safeRank };
}

function calcReward(){
  const fee = parseInt(document.getElementById('fee-input')?.value?.replace(/[^0-9]/g,''))||0;
  const ad  = parseInt(document.getElementById('ad-input')?.value?.replace(/[^0-9]/g,''))||0;
  const preview = document.getElementById('reward-preview');
  if(!preview) return;
  const biz = document.getElementById('biz-select')?.value || 'rental';
  const closedAt = document.getElementById('closed-at')?.value || new Date().toLocaleDateString('ja-JP');
  const { rate, rank } = getMyRate(biz);
  const rewardFromFee = Math.round(fee * rate / 100);
  const rewardFromAd  = Math.round(ad  * rate / 100);
  const totalReward   = rewardFromFee + rewardFromAd;
  const totalIncome   = fee + ad;
  preview.innerHTML = `
    <div class="rp-row"><span class="rp-label">仲介料</span><span class="rp-val">¥${fee.toLocaleString()}</span></div>
    ${ad > 0 ? `<div class="rp-row"><span class="rp-label">AD（広告料）</span><span class="rp-val" style="color:var(--sk)">¥${ad.toLocaleString()}</span></div>` : ''}
    ${ad > 0 ? `<div class="rp-row"><span class="rp-label">合計収入</span><span class="rp-val">¥${totalIncome.toLocaleString()}</span></div>` : ''}
    <div class="rp-row"><span class="rp-label">報酬率（${rank}）</span><span class="rp-val" style="color:var(--gold);font-weight:700">${rate}%</span></div>
    <div class="rp-row rp-total"><span class="rp-label">想定報酬額</span><span class="rp-val">¥${totalReward.toLocaleString()}</span></div>`;
}

function submitReport(){
  // 残-3: フォームから値を取得してlocalStorageに成約報告を保存
  const feeInput = document.getElementById('fee-input');
  const fee = feeInput ? (parseInt(feeInput.value.replace(/[^0-9]/g,''))||495000) : 495000;
  const adFeeSubmit = parseInt((document.getElementById('ad-input')?.value || '0').replace(/[^0-9]/g,'')) || 0;
  const biz = document.getElementById('biz-select')?.value || 'rental';
  const closedAt = document.getElementById('closed-at')?.value || new Date().toLocaleDateString('ja-JP');
  const { rate, rank } = getMyRate(biz);
  const reward = Math.round((fee + adFeeSubmit) * rate / 100);
  const rptId  = 'RPT-' + new Date().getFullYear() + String(Date.now()).slice(-8);
  const now    = new Date().toLocaleDateString('ja-JP');
  const agName = sessionStorage.getItem('coreto_name') || '担当AG';

  try {
    const reports = JSON.parse(localStorage.getItem('CORETO_REPORTS') || '[]');
    const adFee       = parseInt((document.getElementById('ad-input')?.value || '0').replace(/[^0-9]/g,'')) || 0;
    const monthlyRent = parseInt((document.getElementById('monthly-rent')?.value || '0').replace(/[^0-9]/g,'')) || 0;
    const mgmtFee    = parseInt((document.getElementById('mgmt-fee')?.value || '0').replace(/[^0-9]/g,'')) || 0;
    const shikikin   = parseFloat(document.getElementById('shikikin')?.value || '0') || 0;
    const reikin     = parseFloat(document.getElementById('reikin')?.value || '0') || 0;
    const hosho      = document.getElementById('hosho-company')?.value || '';
    const propAddr   = document.getElementById('prop-addr')?.value || '';
    const propName   = document.getElementById('prop-name')?.value || '';
    const mgmtCo     = document.getElementById('mgmt-company')?.value || '';
    reports.unshift({
      id: rptId,
      case: 'RENT-' + String(Date.now()).slice(-4),
      client: document.getElementById('client-name')?.value || '—',
      type: biz === 'rental' ? '賃貸' : biz === 'sale' ? '売買' : biz === 'hr' ? '人材' : '光通信',
      fee, adFee: adFeeSubmit, reward, date: closedAt || now, ag: agName, status: '承認待ち',
      monthlyRent, mgmtFee, shikikin, reikin, hosho, propAddr, propName, mgmtCo,
    });
    localStorage.setItem('CORETO_REPORTS', JSON.stringify(reports));
  } catch(e) {}

  // 見込み報酬を残高に加算（HQ承認後に確定するため仮計上）
  try {
    const cur = parseInt(sessionStorage.getItem('coreto_balance') || '726163');
    sessionStorage.setItem('coreto_balance', String(cur + reward));
  } catch(e) {}

  // 入金確認済みチェック: rental-v2で入金確認が取れているかを確認
  // CORETO_PAYMENT_{caseId} に {status:'paid'} があれば入金確認済みとみなす
  const caseIdForReport = 'RENT-' + String(Date.now()).slice(-4);
  try {
    const payRec = JSON.parse(localStorage.getItem('CORETO_PAYMENT_' + caseIdForReport) || 'null');

    // 今回の報告に入金確認済みフラグを付与
    try {
      const reps = JSON.parse(localStorage.getItem('CORETO_REPORTS') || '[]');
      if (reps.length > 0) {
        reps[0].paymentConfirmed = isPaymentConfirmed;
        reps[0].caseId = caseIdForReport;
        window.KV.set('CORETO_REPORTS', reps); localStorage.setItem('CORETO_REPORTS', JSON.stringify(reps));
      }
    } catch(e) {}
  } catch(e) {}

  // HQ用タスクを追加
  try {
    const tasks = (function(){try{return JSON.parse(localStorage.getItem('CORETO_HQ_TASKS')||'[]');}catch(e){return [];}}());
    tasks.unshift({ assignee: null, assigneeName: '未割当', id: rptId, type:'contract_report', title:'成約報告承認 — ' + agName + ' / ' + rptId, createdAt: now });
    window.KV.set('CORETO_HQ_TASKS', tasks);
  } catch(e) {}

  document.getElementById('pg').innerHTML = `

    <div style="text-align:center;padding:60px 20px">

      <div style="font-family:'Outfit','Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums;font-size:28px;font-weight:300;color:var(--ink);margin-bottom:8px">成約報告を提出しました</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:28px">HQが確認後、報酬額が確定されます。通常1〜2営業日以内に通知されます。</div>
      <div style="background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:20px 28px;display:inline-block;text-align:left;min-width:320px;margin-bottom:28px">
        <div style="font-size:11px;color:var(--faint);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px">報告サマリー</div>
        <div style="display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid var(--bd)"><span style="color:var(--muted)">報告ID</span><span style="font-family:'DM Mono',monospace">${rptId}</span></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid var(--bd)"><span style="color:var(--muted)">担当AG</span><span>${agName}</span></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid var(--bd)"><span style="color:var(--ink)">仲介料</span><span>¥${fee.toLocaleString()}</span></div>
        <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;padding:8px 0"><span style="color:var(--ink)">想定報酬（${rank} ${rate}%）</span><span style="color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums;font-size:20px">¥${reward.toLocaleString()}</span></div>
      </div>
      <!-- 即時払いへの導線 -->
      <div style="background:var(--am-bg);border:1px solid rgba(217,119,6,.2);border-radius:var(--r);padding:14px 20px;margin-bottom:20px;font-size:12px;color:var(--am)">

  const thAg    = isHQ ? '<th>担当AG</th>' : '';

  document.getElementById('pg').innerHTML = `

    <tbody>${rows}</tbody></table>
  </div>`;
}

function saveForceEdit(id, original) {
  var reason = document.getElementById('fe-reason')?.value.trim();
  if (!reason) { showToast('⚠️ 修正理由を入力してください', 'warn'); return; }

  var updated = {
    id:       id,
    client:   document.getElementById('fe-client')?.value.trim() || original.client,
    case:     document.getElementById('fe-case')?.value.trim()   || original.case,
    type:     document.getElementById('fe-type')?.value          || original.type,
    fee:      parseInt(document.getElementById('fe-fee')?.value) || original.fee,
    date:     document.getElementById('fe-date')?.value          || original.date,
    status:   document.getElementById('fe-status')?.value        || original.status,
    ag:       original.ag,
    agId:     original.agId,
    hqEditedAt: new Date().toLocaleString('ja-JP'),
    hqEditedBy: sessionStorage.getItem('coreto_name') || 'HQ',
    hqEditReason: reason,
  };
  // 報酬額を再計算（簡易: 70%で計算。実際はランクに応じて変動）
  updated.reward = Math.floor(updated.fee * 0.7);

  // CORETO_REPORTSに保存
  try {
    var reps = JSON.parse(localStorage.getItem('CORETO_REPORTS') || '[]');
    var idx = reps.findIndex(function(r){ return r.id === id; });
    if (idx >= 0) { reps[idx] = Object.assign(reps[idx], updated); }
    else { reps.push(updated); }
    window.KV.set('CORETO_REPORTS', reps); localStorage.setItem('CORETO_REPORTS', JSON.stringify(reps));
  } catch(e) {}

  document.getElementById('force-edit-overlay').remove();
  showToast('✅ ' + id + ' をHQが強制修正しました（理由: ' + reason.slice(0,20) + '）', 'em');

  // Slack通知
  if (typeof window.slackNotifyContractApprove === 'function') {
    slackNotifyContractApprove({ caseId: id, clientName: updated.client, fee: updated.fee, agName: updated.ag, reviewer: sessionStorage.getItem('coreto_name') || 'HQ（強制修正）' });
  }

  // 一覧を再描画
  setTimeout(function() { renderHistory(); }, 200);
}


function approveReport(id, client, ag, reward, btn) {
  coretoConfirm({title:'成約報告 承認',message:'以下の成約報告を承認しますか？',detail:'報告ID: '+id+'<br>クライアント: '+client+'<br>報酬額: ¥'+reward.toLocaleString()+'<br>承認後、報酬が確定されAGにLINEで通知されます。',okLabel:'承認する',onOk:function(){
    const cell = btn.closest('td');
    cell.innerHTML = '<span class="badge b-em">承認済み</span>';
    // CORETO_REPORTSのstatusを「承認済み」に更新
    // Kintone連携: KINTONE.approveReport() が localStorage/Kintone両対応で処理
    // デモ: localStorage更新 / 本番: Kintoneステータス更新 + 確定残高加算
    let approvedReport = null;
    try {
      const reps = JSON.parse(localStorage.getItem('CORETO_REPORTS') || '[]');
      const idx = reps.findIndex(r => r.id === id);
      if (idx >= 0) approvedReport = reps[idx];
    } catch(e) {}

    if (typeof window.KINTONE !== 'undefined') {
      // KINTONE.approveReport: localStorage更新 + 確定残高加算 + Kintone更新（設定済み時）
      KINTONE.approveReport(id, ag, reward);
    } else {
      // フォールバック（kintone-config未読み込み時）
      try {
        const reps = JSON.parse(localStorage.getItem('CORETO_REPORTS') || '[]');
        const idx = reps.findIndex(r => r.id === id);
        if (idx >= 0) { reps[idx].status = '承認済み'; reps[idx].approvedAt = new Date().toISOString(); }
        window.KV.set('CORETO_REPORTS', reps); localStorage.setItem('CORETO_REPORTS', JSON.stringify(reps));
        const tasks = (function(){try{return JSON.parse(localStorage.getItem('CORETO_HQ_TASKS')||'[]');}catch(e){return [];}}());
        window.KV.set('CORETO_HQ_TASKS', tasks.filter(t => t.id !== id));
      } catch(e) {}
    }
    // HQタスクから削除（KINTONE.approveReportと重複しないよう別管理）
    try {
      const tasks = (function(){try{return JSON.parse(localStorage.getItem('CORETO_HQ_TASKS')||'[]');}catch(e){return [];}}());
      window.KV.set('CORETO_HQ_TASKS', tasks.filter(t => t.id !== id));
    } catch(e) {}

    showToast('✅ ' + id + ' を承認しました。' + ag + ' にLINEで通知します。', 'em');
    // LINE通知（設定後有効化）
    const LINE_TOKEN = (window.LINE_CONFIG && window.LINE_CONFIG.AG_CHANNEL_TOKEN) || '';
    const msg = `【COREBLDG】成約報告が承認されました\n報告ID: ${id}\n報酬額: ¥${reward.toLocaleString()}\n月次締めで振り込まれます。`;
    if (LINE_TOKEN) {
      fetch('https://api.line.me/v2/bot/message/broadcast', {
        method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+LINE_TOKEN},
        body: JSON.stringify({ messages:[{ type:'text', text: msg }] })
      }).catch(e => console.error(e));
    } else {
      // console.log('[LINE通知 — 設定待ち]', msg);
    }
  }});
}

// 残-11: インラインエラー表示ユーティリティ
function showFieldError(inputId, msg) {
  var el = document.getElementById(inputId);
  if (!el) return;
  el.classList.add('error');
  var err = el.nextElementSibling;
  if (!err || !err.classList.contains('field-error')) {
    err = document.createElement('div');
    err.className = 'field-error';
    el.parentNode.insertBefore(err, el.nextSibling);
  }
  err.textContent = msg;
  err.style.display = 'block';
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}
function clearFieldError(inputId) {
  var el = document.getElementById(inputId);
  if (!el) return;
  el.classList.remove('error');
  var err = el.nextElementSibling;
  if (err && err.classList.contains('field-error')) err.style.display = 'none';
}
function clearAllErrors() {
  document.querySelectorAll('.error, .input-error').forEach(function(el) {
    el.classList.remove('error'); el.classList.remove('input-error');
  });
  document.querySelectorAll('.field-error').forEach(function(el) { el.style.display = 'none'; });
}
function showToast(msg, type) {
  const colors = {em:['#ECFDF5','#059669','rgba(5,150,105,.2)'],am:['#FFFBEB','#D97706','rgba(217,119,6,.2)'],rd:['#FEF2F2','#DC2626','rgba(220,38,38,.2)']};
  const [bg,cl,bc] = colors[type] || colors.em;
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:24px;right:24px;z-index:9999;padding:11px 18px;border-radius:9px;font-size:13px;font-weight:600;font-family:'Outfit',sans-serif;box-shadow:0 6px 20px rgba(0,0,0,.12);transition:opacity .4s;background:${bg};color:${cl};border:1px solid ${bc}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; setTimeout(()=>t.remove(),400); }, 3500);
}

    if (caseDetail.hosho) {
      const hEl = document.getElementById('hosho-company');
      if (hEl) hEl.value = caseDetail.hosho;
    }
    if (caseDetail.mgmtCo) {
      const mcEl = document.getElementById('mgmt-company');
      if (mcEl) mcEl.value = caseDetail.mgmtCo;
    }

    // 仲介手数料・ADを自動入力
    // 優先: CORETO_INVOICE_CHECK（HQ照合済み）→ なければCORETO_CASE_DETAIL
    let feeFromInvoice = 0;
    let adFromDetail   = caseDetail.adFee || 0;
    try {
      const checks = JSON.parse(localStorage.getItem('CORETO_INVOICE_CHECK') || '{}');
      const check = checks[_cid];
      if (check && check.finalValues && check.finalValues.amount) {
        feeFromInvoice = parseInt(check.finalValues.amount) || 0;
      }
    } catch(e) {}

    const feeEl = document.getElementById('fee-input');
    if (feeEl) feeEl.value = feeFromInvoice || caseDetail.fee || '';
    const adEl = document.getElementById('ad-input');
    if (adEl) adEl.value = adFromDetail;
    if (typeof calcReward === 'function') calcReward();

    // 自動入力完了のトースト
    if (Object.keys(caseDetail).length > 0) {
      setTimeout(function() {
        if (typeof showToast === 'function') showToast('✅ 案件 ' + _cid + ' の情報を自動入力しました。内容を確認して提出してください。', 'em');
      }, 300);
    }
  } else if (p.get('clientName')) {
    const el = document.getElementById('client-name');
    if (el) el.value = decodeURIComponent(p.get('clientName'));
  }
  if (!p.get('caseId')) {
    const dateEl = document.getElementById('closed-at');
    if (dateEl && !dateEl.value) dateEl.value = new Date().toISOString().slice(0, 10);
  }
  renderNew();
});
</script>
</body>
</html>
