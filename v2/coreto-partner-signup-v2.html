<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>パートナー入会申込 — CORETO</title>
<link rel="stylesheet" href="coreto-design-system.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;-webkit-text-size-adjust:100%}
body{font-family:'Outfit','Noto Sans JP',sans-serif;background:#F0F2F5;color:#202124;min-height:100vh}
:root{
  --navy:#0D1A2D;--navy-m:#152238;--navy-l:#1E3252;
  --gold:#C8A951;--gold-dim:rgba(200,169,81,.15);
  --ink:#202124;--muted:#5F6368;--faint:#9AA0A6;
  --bd:#E8EAED;--bd2:#DADCE0;
  --em:#059669;--em-bg:#ECFDF5;
  --am:#D97706;--am-bg:#FFFBEB;
  --rd:#DC2626;--rd-bg:#FEF2F2;
  --sh:0 1px 3px rgba(60,64,67,.12),0 1px 2px rgba(60,64,67,.08);
}
.wrap{max-width:680px;margin:0 auto;padding:24px 16px 80px}

/* ヘッダー */
.signup-header{text-align:center;padding:32px 0 28px}
.signup-logo{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;letter-spacing:3px;color:var(--navy)}
.signup-subtitle{font-size:11px;font-weight:600;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-top:4px}
.signup-title{font-size:20px;font-weight:700;color:var(--ink);margin-top:16px}
.signup-desc{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.7}

/* ステップバー */
.step-bar{display:flex;align-items:center;gap:0;margin-bottom:28px;
  background:#fff;border-radius:12px;padding:16px;box-shadow:var(--sh);overflow-x:auto}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:5px;min-width:60px;flex:1}
.sb-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:700;border:2px solid var(--bd);
  background:#fff;color:var(--faint);transition:.2s;flex-shrink:0}
.sb-num.done{background:var(--em);border-color:var(--em);color:#fff}
.sb-num.active{background:var(--navy);border-color:var(--navy);color:var(--gold);box-shadow:0 0 0 4px rgba(13,26,45,.1)}
.sb-lbl{font-size:9px;font-weight:600;color:var(--faint);text-align:center;white-space:nowrap;line-height:1.3}
.sb-lbl.active{color:var(--navy);font-weight:700}
.sb-arrow{width:16px;height:2px;background:var(--bd2);flex-shrink:0;margin-bottom:18px}
.sb-arrow.done{background:var(--em)}

/* カード */
.card{background:#fff;border-radius:12px;padding:24px;box-shadow:var(--sh);margin-bottom:16px}
.card-step{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
.card-title{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:4px}
.card-desc{font-size:11px;color:var(--muted);margin-bottom:20px;line-height:1.7}

/* フォーム */
.field{margin-bottom:16px}
.field:last-child{margin-bottom:0}
label{display:block;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.5px;margin-bottom:5px}
label .req{color:var(--rd);margin-left:2px}
label .opt{color:var(--faint);font-weight:400;margin-left:4px}
input[type=text],input[type=email],input[type=tel],input[type=date],
input[type=number],select,textarea{
  width:100%;padding:10px 12px;border:1.5px solid var(--bd);border-radius:8px;
  font-family:'Outfit','Noto Sans JP',sans-serif;font-size:13px;color:var(--ink);
  background:#fff;transition:.15s;outline:none;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(13,26,45,.08)}
input.error,select.error,textarea.error{border-color:var(--rd)!important}
.field-hint{font-size:10px;color:var(--faint);margin-top:4px;line-height:1.6}
textarea{resize:vertical;min-height:80px;line-height:1.7}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.row2{grid-template-columns:1fr}}

/* ラジオボタン */
.radio-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.radio-btn{flex:1;min-width:120px}
.radio-btn input{display:none}
.radio-btn label{display:flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 14px;border:1.5px solid var(--bd);border-radius:8px;cursor:pointer;
  font-size:12px;font-weight:500;color:var(--muted);transition:.15s;letter-spacing:0}
.radio-btn input:checked + label{border-color:var(--navy);background:rgba(13,26,45,.04);color:var(--navy);font-weight:700}

/* 種別セレクター（個人/法人）大きめ */
.entity-card{flex:1;border:2px solid var(--bd);border-radius:12px;padding:18px;cursor:pointer;transition:.2s;text-align:center}
.entity-card:hover{border-color:var(--bd2)}
.entity-card.selected{border-color:var(--navy);background:rgba(13,26,45,.03)}
.entity-icon{font-size:32px;margin-bottom:8px}
.entity-label{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:4px}
.entity-desc{font-size:10px;color:var(--muted);line-height:1.6}

/* アップロード */
.upload-box{border:2px dashed var(--bd2);border-radius:10px;padding:20px;
  text-align:center;cursor:pointer;transition:.15s}
.upload-box:hover{border-color:var(--gold)}
.upload-box.uploaded{border-color:var(--em);border-style:solid;background:var(--em-bg)}
.upload-box input{display:none}

/* OTP */
.otp-row{display:flex;gap:8px;justify-content:center;margin:16px 0}
.otp-cell{width:44px;height:52px;border:1.5px solid var(--bd);border-radius:8px;
  text-align:center;font-size:20px;font-weight:700;font-family:'DM Mono',monospace;
  outline:none;transition:.15s;color:var(--navy)}
.otp-cell:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(13,26,45,.08)}
.otp-timer{font-size:11px;color:var(--muted);text-align:center;margin-top:6px}
.otp-timer.urgent{color:var(--rd);font-weight:700}

/* バナー */
.banner{border-radius:8px;padding:12px 14px;font-size:11px;line-height:1.7;margin-bottom:16px;display:flex;gap:10px}
.banner-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.banner.info{background:#EFF6FF;border:1px solid #BFDBFE;color:#1E40AF}
.banner.warn{background:var(--am-bg);border:1px solid rgba(217,119,6,.25);color:var(--am)}
.banner.success{background:var(--em-bg);border:1px solid rgba(5,150,105,.2);color:var(--em)}

/* ボタン */
.btn-row{display:flex;gap:10px;margin-top:24px}
.btn{padding:11px 20px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;border:none;outline:none}
.btn-primary{background:var(--navy);color:#fff;flex:1}
.btn-primary:hover{background:var(--navy-l)}
.btn-ghost{background:transparent;border:1.5px solid var(--bd);color:var(--muted)}
.btn-ghost:hover{border-color:var(--bd2);color:var(--ink)}

/* ゲート */
.gate-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px;background:linear-gradient(135deg,var(--navy) 0%,var(--navy-l) 100%)}
.gate-card{background:#fff;border-radius:16px;padding:36px;max-width:420px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.gate-logo{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;color:var(--navy);letter-spacing:3px;margin-bottom:4px}
.gate-sub{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:20px}

/* 確認 */
.confirm-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--bd);font-size:12px}
.confirm-row:last-child{border-bottom:none}
.confirm-key{color:var(--muted);flex-shrink:0;min-width:130px}
.confirm-val{color:var(--ink);font-weight:600;text-align:right}

/* 完了 */
.complete-wrap{text-align:center;padding:40px 20px}
.complete-icon{font-size:60px;margin-bottom:16px}
.complete-title{font-size:22px;font-weight:700;color:var(--navy);margin-bottom:8px}
.complete-msg{font-size:12px;color:var(--muted);line-height:2;max-width:380px;margin:0 auto}

/* プログレス */
.prog-bar{height:3px;background:var(--bd);border-radius:2px;margin-bottom:24px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--navy),var(--gold));border-radius:2px;transition:.4s ease}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-size:12px;
  font-weight:600;opacity:0;transition:.3s;z-index:999;pointer-events:none;white-space:nowrap}

@media(max-width:480px){
  .wrap{padding:16px 12px 60px}
  .card{padding:18px}
  .btn-row{flex-direction:column-reverse}
  .btn{width:100%}
}
</style>
</head>
<body>
<script>
(function(){
  var _role = sessionStorage.getItem('coreto_role') || '';
  // #8修正: partner-signup は公開ページ（PTが自己申込できる）
  // ログイン済みのHQがアクセスする場合もOK
})();
</script>


<!-- ── トークンゲート ── -->
<div id="gate-screen" class="gate-wrap">
  <div class="gate-card">
    <div class="gate-logo">CORETO</div>
    <div class="gate-sub">Partner Sign Up</div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:20px;line-height:1.8">
      このページは面接合格者向けの招待制ページです。<br>
      SMSで受け取った招待コードを入力してください。
    </p>
    <div class="field" style="text-align:left">
      <label>招待コード <span class="req">*</span></label>
      <input type="text" id="gate-token" placeholder="例：CORETO-PT-XXXX-XXXX"
        style="text-transform:uppercase;font-family:'DM Mono',monospace;letter-spacing:2px"
        oninput="this.value=this.value.toUpperCase()">
      <div style="font-size:10px;color:var(--rd);margin-top:4px;display:none" id="gate-err">招待コードが正しくありません</div>
    </div>
    <button class="btn btn-primary" onclick="checkToken()" style="width:100%;margin-top:16px">
      入会手続きを始める →
    </button>
    <p style="font-size:10px;color:var(--faint);margin-top:16px">
      招待コードをお持ちでない方は<br>
      <a href="mailto:info@coreto.jp" style="color:var(--navy)">info@coreto.jp</a> までお問い合わせください
    </p>
  </div>
</div>

<!-- ── メインフォーム ── -->
<div id="main-screen" style="display:none">
<div class="wrap">
  <div class="signup-header">
    <div class="signup-logo">CORETO</div>
    <div class="signup-subtitle">Partner Sign Up</div>
    <div class="signup-title">パートナー入会申込</div>
    <div class="signup-desc">
      全5ステップで入会手続きを完了してください（目安：約5分）<br>
      途中保存はできません。一度に完了させてください。
    </div>
  </div>
  <div class="step-bar" id="step-bar"></div>
  <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
  <div id="step-content"></div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════
// トークンゲート
// ════════════════════════════════════════════════
const VALID_TOKENS = {
  'CORETO-PT-DEMO-IND': {entity:'individual'},
  'CORETO-PT-DEMO-CRP': {entity:'corporate'},
};

function checkToken() {
  const val = document.getElementById('gate-token').value.trim();
  const err = document.getElementById('gate-err');
  const valid = VALID_TOKENS[val] || (val.startsWith('CORETO-PT-') && val.length >= 14);
  if (!valid) {
    err.style.display = 'block';
    document.getElementById('gate-token').classList.add('error');
    return;
  }
  const info = VALID_TOKENS[val] || {entity: val.includes('CRP') ? 'corporate' : 'individual'};
  DATA.entity = info.entity;
  document.getElementById('gate-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  renderStepBar();
  renderStep(1);
}

// ════════════════════════════════════════════════
// 状態
// ════════════════════════════════════════════════
let STEP = 1;
let DATA = {
  entity: '',            // 'individual' | 'corporate'
  // 個人
  lastName:'', firstName:'', lastKana:'', firstKana:'',
  dob:'', gender:'',
  // 法人
  corpName:'', corpKana:'', corpNo:'', repLastName:'', repFirstName:'',
  // 共通
  postal:'', pref:'', city:'', building:'',
  phone:'', email:'', emailConfirm:'',
  occupation:'', network:'', motivation:'',
  referralCode:'',
  // 書類
  idType:'', idFront:null, idBack:null,
  corpDoc:null, repIdFront:null, repIdBack:null,
  // LINE
  lineLinked: false,
};

const STEPS = [
  {num:1, label:'基本情報'},
  {num:2, label:'SMS認証'},
  {num:3, label:'書類提出'},
  {num:4, label:'LINE'},
  {num:5, label:'契約書確認'},
  {num:6, label:'確認・送信'},
];

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = type === 'warn' ? 'var(--am)' : 'var(--navy)';
  t.style.opacity = '1'; t.style.transform = 'translateX(-50%) translateY(0)';
  setTimeout(() => { t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(10px)'; }, 3000);
}

function renderStepBar() {
  document.getElementById('step-bar').innerHTML = STEPS.map((s,i) => {
    const st = s.num < STEP ? 'done' : s.num === STEP ? 'active' : '';
    const arrow = i < STEPS.length-1
      ? `<div class="sb-arrow ${s.num < STEP ? 'done' : ''}"></div>` : '';
    return `<div class="sb-item">
      <div class="sb-num ${st}">${s.num < STEP ? '✓' : s.num}</div>
      <div class="sb-lbl ${st==='active'?'active':''}">${s.label}</div>
    </div>${arrow}`;
  }).join('');
  const pct = ((STEP-1) / (STEPS.length-1) * 100).toFixed(1);
  document.getElementById('prog-fill').style.width = pct + '%';
}

function renderStep(n) {
  STEP = n;
  renderStepBar();
  window.scrollTo({top:0, behavior:'smooth'});
  [null,s1,s2,s3,s4,s5,s6][n]?.();
}
function next() { renderStep(STEP+1); }
function back() { renderStep(STEP-1); }

// ════════════════════════════════════════════════
// STEP 1: 基本情報
// ════════════════════════════════════════════════
function s1() {
  const isInd = DATA.entity === 'individual';

  document.getElementById('step-content').innerHTML = `
  <div class="card">
    <div class="card-step">STEP 1 / 5</div>
    <div class="card-title">基本情報</div>
    <div class="card-desc">登録種別と基本情報を入力してください</div>

    <!-- 個人/法人セレクター -->
    <div class="field" style="margin-bottom:20px">
      <label>登録種別 <span class="req">*</span></label>
      <div style="display:flex;gap:12px;margin-top:6px">
        <div class="entity-card ${isInd?'selected':''}" id="ec-ind" onclick="selectEntity('individual')">
          <div class="entity-icon">👤</div>
          <div class="entity-label">個人パートナー</div>
          <div class="entity-desc">源泉徴収あり（10.21%）<br>月会費なし・紹介報酬25%</div>
        </div>
        <div class="entity-card ${!isInd?'selected':''}" id="ec-crp" onclick="selectEntity('corporate')">
          <div class="entity-icon">🏢</div>
          <div class="entity-label">法人パートナー</div>
          <div class="entity-desc">源泉徴収なし<br>月会費なし・紹介報酬25%</div>
        </div>
      </div>
    </div>

    <div id="individual-fields" style="display:${isInd?'block':'none'}">
      <div class="row2">
        <div class="field"><label>姓 <span class="req">*</span></label><input type="text" id="f-lname" value="${DATA.lastName}" placeholder="山田"></div>
        <div class="field"><label>名 <span class="req">*</span></label><input type="text" id="f-fname" value="${DATA.firstName}" placeholder="花子"></div>
      </div>
      <div class="row2">
        <div class="field"><label>セイ <span class="req">*</span></label><input type="text" id="f-lkana" value="${DATA.lastKana}" placeholder="ヤマダ"></div>
        <div class="field"><label>メイ <span class="req">*</span></label><input type="text" id="f-fkana" value="${DATA.firstKana}" placeholder="ハナコ"></div>
      </div>
      <div class="row2">
        <div class="field">
          <label>生年月日 <span class="req">*</span></label>
          <input type="date" id="f-dob" value="${DATA.dob}">
          <div class="field-hint">18歳以上の方のみ申込可能です</div>
        </div>
        <div class="field">
          <label>性別 <span class="opt">（任意）</span></label>
          <select id="f-gender">
            <option value="">選択</option>
            ${['男性','女性','その他'].map(v=>`<option value="${v}" ${DATA.gender===v?'selected':''}>${v}</option>`).join('')}
          </select>
        </div>
      </div>
    </div>

    <div id="corporate-fields" style="display:${isInd?'none':'block'}">
      <div class="banner info"><div class="banner-icon">ℹ️</div><div>
        法人パートナーは源泉徴収の対象外です。<br>
        報酬は全額振込となります（法人として自社で確定申告・納税してください）。
      </div></div>
      <div class="row2">
        <div class="field"><label>法人名 <span class="req">*</span></label><input type="text" id="f-corp" value="${DATA.corpName}" placeholder="株式会社〇〇"></div>
        <div class="field"><label>法人名（カナ） <span class="req">*</span></label><input type="text" id="f-corpkana" value="${DATA.corpKana}" placeholder="カブシキガイシャ〇〇"></div>
      </div>
      <div class="field">
        <label>法人番号 <span class="req">*</span></label>
        <input type="text" id="f-corpno" value="${DATA.corpNo}" placeholder="13桁の法人番号"
          style="font-family:'DM Mono',monospace;letter-spacing:1px" maxlength="13">
        <div class="field-hint">国税庁法人番号公表サイトで確認できます</div>
      </div>
      <div class="row2">
        <div class="field"><label>代表者 姓 <span class="req">*</span></label><input type="text" id="f-replname" value="${DATA.repLastName}" placeholder="田中"></div>
        <div class="field"><label>代表者 名 <span class="req">*</span></label><input type="text" id="f-repfname" value="${DATA.repFirstName}" placeholder="誠"></div>
      </div>
    </div>

    <!-- 共通 -->
    <hr style="border:none;border-top:1px solid var(--bd);margin:20px 0">
    <div class="row2">
      <div class="field"><label>郵便番号 <span class="req">*</span></label><input type="text" id="f-postal" value="${DATA.postal}" placeholder="107-0062" maxlength="8"></div>
      <div class="field">
        <label>都道府県 <span class="req">*</span></label>
        <select id="f-pref">${PREFS.map(p=>`<option value="${p}" ${DATA.pref===p?'selected':''}>${p}</option>`).join('')}</select>
      </div>
    </div>
    <div class="field"><label>市区町村・番地 <span class="req">*</span></label><input type="text" id="f-city" value="${DATA.city}" placeholder="港区南青山2丁目1-1"></div>
    <div class="field"><label>建物名・部屋番号 <span class="opt">（任意）</span></label><input type="text" id="f-bldg" value="${DATA.building}" placeholder="〇〇ビル 3F"></div>
    <div class="row2">
      <div class="field">
        <label>電話番号（SMS受信可） <span class="req">*</span></label>
        <input type="tel" id="f-phone" value="${DATA.phone}" placeholder="090-1234-5678">
        <div class="field-hint">次のステップでSMS認証を行います</div>
      </div>
      <div class="field"><label>メールアドレス <span class="req">*</span></label><input type="email" id="f-email" value="${DATA.email}" placeholder="you@example.com"></div>
    </div>
    <div class="field"><label>メールアドレス（確認） <span class="req">*</span></label><input type="email" id="f-email2" value="${DATA.emailConfirm}" placeholder="同じアドレスを再入力"></div>

    <hr style="border:none;border-top:1px solid var(--bd);margin:20px 0">
    <div class="field">
      <label>職業・所属 <span class="req">*</span></label>
      <input type="text" id="f-occ" value="${DATA.occupation}" placeholder="例：不動産会社勤務、士業、保険代理店、個人事業主 など">
    </div>
    <div class="field">
      <label>紹介ネットワーク・強み <span class="req">*</span></label>
      <textarea id="f-network" placeholder="どのようなお客様をご紹介できるか、ご自身のネットワークや強みをご記入ください">${DATA.network}</textarea>
    </div>
    <div class="field">
      <label>志望動機 <span class="req">*</span></label>
      <textarea id="f-motivation" placeholder="50文字以上でご記入ください">${DATA.motivation}</textarea>
      <div class="field-hint" id="motiv-count">0 / 50文字以上</div>
    </div>
    <div class="field">

function validateS1() {
  const get = id => document.getElementById(id)?.value?.trim() || '';
  const isInd = DATA.entity === 'individual';

  // 共通必須
  const commonReqs = ['f-postal','f-pref','f-city','f-phone','f-email','f-email2','f-occ','f-network','f-motivation'];
  // 種別別必須
  const typeReqs = isInd
    ? ['f-lname','f-fname','f-lkana','f-fkana','f-dob']
    : ['f-corp','f-corpkana','f-corpno','f-replname','f-repfname'];

  let ok = true;
  [...commonReqs, ...typeReqs].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    if (!el.value.trim()) { el.classList.add('error'); ok = false; }
    else el.classList.remove('error');
  });
  if (!ok) { showToast('⚠️ 必須項目を入力してください','warn'); return; }

  if (get('f-email') !== get('f-email2')) {
    document.getElementById('f-email2').classList.add('error');
    showToast('⚠️ メールアドレスが一致しません','warn'); return;
  }
  if (document.getElementById('f-motivation').value.trim().length < 50) {
    document.getElementById('f-motivation').classList.add('error');
    showToast('⚠️ 志望動機は50文字以上入力してください','warn'); return;
  }
  if (isInd) {
    const dob = new Date(get('f-dob'));
    if ((Date.now() - dob) / (365.25*24*3600*1000) < 18) {
      showToast('⚠️ 18歳未満の方はご応募いただけません','warn'); return;
    }
    if (isInd && !get('f-pref').match(/^(選択|)$/) === false && get('f-pref') === '選択してください') {
      showToast('⚠️ 都道府県を選択してください','warn'); return;
    }
  }
  if (!isInd && !/^\d{13}$/.test(get('f-corpno').replace(/-/g,''))) {
    showToast('⚠️ 法人番号は13桁の数字です','warn'); return;
  }

  Object.assign(DATA, {
    lastName: get('f-lname'), firstName: get('f-fname'),
    lastKana: get('f-lkana'), firstKana: get('f-fkana'),
    dob: get('f-dob'), gender: get('f-gender'),
    corpName: get('f-corp'), corpKana: get('f-corpkana'),
    corpNo: get('f-corpno'),
    repLastName: get('f-replname'), repFirstName: get('f-repfname'),
    postal: get('f-postal'), pref: get('f-pref'),
    city: get('f-city'), building: get('f-bldg'),
    phone: get('f-phone'), email: get('f-email'), emailConfirm: get('f-email2'),
    occupation: get('f-occ'), network: document.getElementById('f-network').value.trim(),
    motivation: document.getElementById('f-motivation').value.trim(),
    referralCode: get('f-ref'),
  });
  next();
}

let _otpCode = '', _otpTimer = null, _otpSec = 300, _resendCount = 3;

function s2() {
  _otpCode = String(Math.floor(100000 + Math.random() * 900000));
  document.getElementById('step-content').innerHTML = `
  <div class="card">
    <div class="card-step">STEP 2 / 5</div>
    <div class="card-title">SMS認証</div>
    <div class="card-desc"><strong>${DATA.phone}</strong> に6桁の確認コードを送信しました</div>
    <div class="banner success"><div class="banner-icon">📱</div><div>
      【デモ用コード: <strong style="font-family:'DM Mono',monospace;letter-spacing:2px">${_otpCode}</strong>】<br>
      本番ではSMSで届きます（有効期限5分・最大3回再送可）
    </div></div>
    <div class="otp-row">
      ${[0,1,2,3,4,5].map(i=>`<input class="otp-cell" id="otp${i}" type="text"
        inputmode="numeric" maxlength="1"
        onkeydown="otpKey(event,${i})" oninput="otpIn(this,${i})">`).join('')}
    </div>
    <div class="otp-timer" id="otp-timer">残り 5:00</div>
    <div style="text-align:center;margin-top:12px">
      <button class="btn btn-ghost" id="resend-btn" onclick="resendOtp()"
        style="font-size:11px;padding:7px 16px" disabled>再送する（残り3回）</button>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-ghost" onclick="back()">← 戻る</button>
    <button class="btn btn-primary" onclick="checkOtp()">認証して次へ</button>
  </div>`;
  startTimer();
  setTimeout(() => document.getElementById('otp0')?.focus(), 100);
}

function startTimer() {
  clearInterval(_otpTimer);
  _otpSec = 300;
  _otpTimer = setInterval(() => {
    _otpSec--;
    const m = Math.floor(_otpSec/60), s = _otpSec%60;
    const el = document.getElementById('otp-timer');
    if (el) { el.textContent = `残り ${m}:${String(s).padStart(2,'0')}`; if (_otpSec<=60) el.classList.add('urgent'); }
    if (_otpSec <= 0) { clearInterval(_otpTimer); if (el) el.textContent = '有効期限切れ。再送してください'; }
    if (_otpSec === 240) { const b = document.getElementById('resend-btn'); if (b) b.disabled = false; }
  }, 1000);
}

function resendOtp() {
  if (_resendCount <= 0) { showToast('⚠️ 再送上限に達しました','warn'); return; }
  _resendCount--;
  _otpCode = String(Math.floor(100000 + Math.random() * 900000));
  showToast(`📱 再送しました（残り${_resendCount}回）`);
  const b = document.getElementById('resend-btn');
  if (b) { b.textContent = `再送する（残り${_resendCount}回）`; if (_resendCount===0) b.disabled=true; }
  startTimer();
}

function otpIn(el, idx) {
  el.value = el.value.replace(/\D/g,'');
  if (el.value && idx < 5) document.getElementById(`otp${idx+1}`)?.focus();
  if (idx === 5 && el.value) checkOtp();
}
function otpKey(e, idx) {
  if (e.key === 'Backspace' && !e.target.value && idx > 0) document.getElementById(`otp${idx-1}`)?.focus();
}
function checkOtp() {
  const entered = [0,1,2,3,4,5].map(i => document.getElementById(`otp${i}`)?.value||'').join('');
  if (entered.length < 6) { showToast('⚠️ 6桁のコードを入力してください','warn'); return; }
  if (entered !== _otpCode) { showToast('⚠️ コードが正しくありません','warn'); return; }
  clearInterval(_otpTimer);
  showToast('✅ SMS認証が完了しました');
  next();
}

          <div style="font-size:10px;color:var(--muted)">収集情報・利用目的・第三者提供</div>

        <a href="#" onclick="showToast('本番環境では正式なPDF文書URLが設定されます','am');return false;" style="display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:7px;background:var(--navy);color:#fff;font-size:11px;font-weight:600;text-decoration:none">全文を読む ↗</a>
      </div>
      <div style="padding:12px 16px;display:flex;align-items:flex-start;gap:10px">

    <!-- システム利用規約 -->
    <div style="border:1.5px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:20px">

        <span style="font-size:20px">💻</span>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:700">COREBLDGシステム利用規約</div>

        </div>
        <a href="#" onclick="showToast('本番環境では正式なPDF文書URLが設定されます','am');return false;" style="display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:7px;border:1.5px solid var(--bd);color:var(--ink);font-size:11px;font-weight:600;text-decoration:none">全文を読む ↗</a>
      </div>
      <div style="padding:12px 16px;display:flex;align-items:flex-start;gap:10px">
        <input type="checkbox" id="pt-cb-tos" style="width:16px;height:16px;margin-top:2px;accent-color:var(--navy);flex-shrink:0" onchange="ptCheckAll()">

        申込送信後、本部より<strong>クラウドサイン</strong>を通じてパートナー契約書・個人情報同意書の署名依頼メールをお送りします。メールのリンクから署名いただくことで正式にパートナー登録が完了します。

      <button class="btn btn-primary" id="pt-btn-next" onclick="next()" disabled style="opacity:.4;cursor:not-allowed">
        確認へ進む →

}

function ptCheckAll() {
  const allChecked = ['pt-cb-contract','pt-cb-privacy','pt-cb-tos'].every(id => document.getElementById(id)?.checked);
  const btn = document.getElementById('pt-btn-next');
  if (btn) { btn.disabled = !allChecked; btn.style.opacity = allChecked ? '1' : '.4'; btn.style.cursor = allChecked ? 'pointer' : 'not-allowed'; }
}

// ════════════════════════════════════════════════
function s6() {
  const isInd = DATA.entity === 'individual';
  const rows = [
    ['登録種別', isInd ? '👤 個人パートナー' : '🏢 法人パートナー'],
    isInd
      ? ['氏名', `${DATA.lastName} ${DATA.firstName}（${DATA.lastKana} ${DATA.firstKana}）`]
      : ['法人名', `${DATA.corpName}（${DATA.corpKana}）`],
    isInd
      ? ['生年月日', DATA.dob]
      : ['法人番号', DATA.corpNo],
    !isInd
      ? ['代表者', `${DATA.repLastName} ${DATA.repFirstName}`]
      : null,
    ['住所', `〒${DATA.postal} ${DATA.pref}${DATA.city} ${DATA.building}`],
    ['電話番号', DATA.phone],
    ['メール', DATA.email],
    ['職業・所属', DATA.occupation],
    ['源泉徴収', isInd ? 'あり（10.21%）' : 'なし（法人）'],
    ['書類', isInd
      ? `${DATA.idType}（表${DATA.idFront?'✅':'❌'} / 裏${DATA.idType==='パスポート'?'—':DATA.idBack?'✅':'❌'}）`
      : `登記簿謄本${DATA.corpDoc?'✅':'❌'} / 代表者身分証${DATA.repIdFront&&DATA.repIdBack?'✅':'❌'}`],
    ['LINE', DATA.lineLinked ? '✅ 連携済み' : '⚠️ 未連携'],
    DATA.referralCode ? ['紹介コード', DATA.referralCode] : null,
  ].filter(Boolean);

  document.getElementById('step-content').innerHTML = `
  <div class="card">
    <div class="card-step">STEP 5 / 5</div>
    <div class="card-title">入力内容の確認</div>
    <div class="card-desc">以下の内容で申込します。確認してください。</div>
    ${rows.map(([k,v]) => `
      <div class="confirm-row">
        <span class="confirm-key">${k}</span>
        <span class="confirm-val">${v}</span>
      </div>`).join('')}
    <div style="margin-top:16px;padding:14px;background:#F8F9FA;border-radius:8px;font-size:11px;color:var(--muted);line-height:2">
      <strong>紹介報酬率：25%（固定）</strong><br>
      月会費：なし（ランク問わず永久無料）<br>
      紹介案件のシステム利用料：AG とのシェア（折半）
    </div>
  </div>
  <div class="card" style="margin-top:0">
    <div class="banner warn"><div class="banner-icon">⚠️</div><div>
      申込後の内容変更はできません。<br>
      送信後、AIが書類を自動解析し本部が最終確認を行い、<br>
      IDとパスワードをメールでお送りします。
    </div></div>
    <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer">
      <input type="checkbox" id="agree-cb" style="width:16px;height:16px;margin-top:2px;accent-color:var(--navy)">
      <span style="font-size:11px;color:var(--ink);font-weight:400;letter-spacing:0">
        <a href="#" onclick="showToast('本番環境では正式な文書URLが設定されます','am');return false;" style="color:var(--navy)">業務委託契約書</a>・
        <a href="#" onclick="showToast('本番環境では正式な文書URLが設定されます','am');return false;" style="color:var(--navy)">個人情報取扱方針</a>・
        <a href="#" style="color:var(--navy)">利用規約</a> に同意します
      </span>
    </label>
  </div>
  <div class="btn-row">
    <button class="btn btn-ghost" onclick="back()">← 戻る</button>
    <button class="btn btn-primary" onclick="submitForm()">✅ 申込を送信する</button>
  </div>`;
}

          ℹ️ アカウントが発行されるまでの間
        </div>
        <div style="font-size:11px;color:#5F6368;line-height:1.8">
          • システムへのログインはできません<br>
          • 承認メールが届いてから業務を開始してください<br>
          • ご不明な点はSlackでHQまでご連絡ください
        </div>
      </div>
    </div>
  </div>`;

  // A-09: PTポータルへの誘導ボタン
  const completeWrap = document.querySelector('.complete-wrap');
  if (completeWrap) {
    const btnGroup = document.createElement('div');
    btnGroup.style.cssText = 'display:flex;gap:10px;justify-content:center;margin-top:24px;flex-wrap:wrap';
    btnGroup.innerHTML =
      '<a href="coreto-hub-v2.html" style="padding:10px 20px;background:transparent;border:1.5px solid #E8EAED;border-radius:8px;font-size:13px;font-weight:600;color:#5F6368;text-decoration:none;font-family:Outfit,sans-serif">ダッシュボードへ</a>' +
      '<a href="coreto-pt-portal-v2.html" style="padding:10px 22px;background:#0D1A2D;color:#C8A951;border-radius:8px;font-size:13px;font-weight:700;text-decoration:none;font-family:Outfit,sans-serif">🤝 PTポータルへ →</a>';

  if(pf) pf.style.width = '100%';
