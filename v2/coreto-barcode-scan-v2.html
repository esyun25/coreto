<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>書類郵送フロー管理 — COREBLDG</title>
<link rel="stylesheet" href="coreto-design-system.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>
<style>

:root{--navy:#0D1A2D;--navy-l:#1E3252;--gold:#C8A951;--gold-dim:rgba(200,169,81,.15);--cream:#FFFFFF;--cream2:#F8F9FA;--white:#FFFFFF;--ink:#202124;--muted:#5F6368;--faint:#80868B;--em:#059669;--em-bg:#ECFDF5;--am:#D97706;--am-bg:#FFFBEB;--rd:#DC2626;--rd-bg:#FEF2F2;--sk:#0284C7;--sk-bg:#F0F9FF;--vt:#7C3AED;--vt-bg:#F5F3FF;--bd:#E8EAED;--bd2:#DADCE0;--sw:240px;--r:10px;--r-sm:7px;--sh:0 1px 2px rgba(60,64,67,.1),0 1px 3px rgba(60,64,67,.06)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:var(--cream)}
.shell{display:flex;height:100vh}
.sb{width:var(--sw);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;position:relative}
.sb::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,rgba(200,169,81,.25) 0%,rgba(200,169,81,.06) 50%,transparent 100%)}
.sb-head{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-logo{font-family: 'Cormorant Garamond', serif;font-size:20px;font-weight:600;letter-spacing:5px;color:var(--gold)}
.sb-ver{font-size:9px;letter-spacing:2px;color:rgba(200,169,81,.3);font-family:'DM Mono',monospace;margin-top:2px}
.sb-user{margin:14px 14px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:9px 11px;display:flex;align-items:center;gap:9px}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--gold-dim);border:1px solid rgba(200,169,81,.25);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gold);flex-shrink:0}
.sb-un{font-size:11px;font-weight:600;color:rgba(255,255,255,.8)}
.sb-ur{font-size:9px;color:rgba(255,255,255,.3);font-family:'DM Mono',monospace}
.sb-nav{flex:1;overflow-y:auto;padding:6px 10px}
.nsl{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.18);padding:10px 8px 4px;font-family:'DM Mono',monospace}
.ni{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;cursor:pointer;transition:.13s;margin-bottom:1px}
.ni:hover{background:rgba(255,255,255,.06)}
.ni.active{background:rgba(200,169,81,.1)}
.ni-ic{width:22px;text-align:center;font-size:14px}
.ni-lb{font-size:11px;font-weight:500;color:rgba(255,255,255,.55)}
.ni.active .ni-lb{color:var(--gold)}
.sf{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.3);transition:.13s}
.sf:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.6)}
.sb-foot{padding:10px 14px 18px;border-top:1px solid rgba(255,255,255,.05)}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;box-shadow:var(--sh)}
.tb-title{font-size:16px;font-weight:600;color:var(--ink);letter-spacing:.5px}
.tb-crumb{font-size:11px;color:var(--faint)}
.tb-crumb a{color:var(--muted);text-decoration:none}
.tb-act{margin-left:auto;display:flex;gap:9px;align-items:center}
.btn{padding:7px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;transition:.15s;font-family:'Outfit',sans-serif;border:none}
.btn-p{background:var(--navy);color:var(--gold)}.btn-p:hover{background:var(--navy-l)}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--bd)}.btn-g:hover{background:var(--cream);color:var(--ink)}
.btn-rd{background:var(--rd-bg);color:var(--rd);border:1px solid rgba(220,38,38,.2)}.btn-rd:hover{background:var(--rd);color:#fff}
.btn-sm{padding:5px 12px;font-size:11px}
.tab-bar{padding:0 24px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;gap:0}
.tab{padding:12px 18px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.tab:hover{color:var(--ink)}.tab.active{color:var(--navy);border-bottom-color:var(--gold)}
.page{flex:1;overflow-y:auto;padding:24px}
.page::-webkit-scrollbar{width:5px}.page::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;font-family:'Outfit',sans-serif}
.b-em{background:var(--em-bg);color:var(--em)}.b-am{background:var(--am-bg);color:var(--am)}.b-rd{background:var(--rd-bg);color:var(--rd)}.b-sk{background:var(--sk-bg);color:var(--sk)}.b-vt{background:var(--vt-bg);color:var(--vt)}.b-nt{background:var(--cream2);color:var(--muted)}.b-gd{background:var(--gold-dim);color:var(--am)}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.gd::before{background:var(--gold)}.kpi.em::before{background:var(--em)}.kpi.sk::before{background:var(--sk)}.kpi.am::before{background:var(--am)}
.kpi-lb{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.kpi-vl{font-size:24px;font-weight:700;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums lining-nums;color:var(--ink);margin-top:4px}
.card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:18px}
.card-head{padding:14px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--cream)}
.card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink)}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--faint);padding:9px 14px;border-bottom:2px solid var(--bd);text-align:left;background:var(--cream)}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--bd);color:var(--ink);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(200,169,81,.03)}
/* Settings */
.set-section{margin-bottom:22px}
.set-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--white);border:1px solid var(--bd);border-radius:var(--r-sm);margin-bottom:6px}
.set-info{flex:1}
.set-label{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:2px}
.set-desc{font-size:11px;color:var(--muted)}
.toggle{width:42px;height:24px;background:var(--bd2);border-radius:12px;position:relative;cursor:pointer;transition:.2s;flex-shrink:0}
.toggle.on{background:var(--em)}
.toggle::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:3px;left:3px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{left:21px}
.set-input{padding:7px 12px;background:var(--cream);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:13px;color:var(--ink);font-family:'Outfit',sans-serif;min-width:160px;outline:none}
.set-input:focus{border-color:var(--gold)}
/* modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--white);border-radius:12px;width:520px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:14px;font-weight:700;color:var(--ink)}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted)}
.modal-body{padding:20px 22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field select{width:100%;padding:9px 12px;background:var(--cream);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:13px;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;outline:none;transition:.15s}
.field input:focus,.field select:focus{border-color:var(--gold)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-foot{padding:14px 22px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:8px}
/* permission matrix */
.perm-table{width:100%;border-collapse:collapse;font-size:11px}
.perm-table th{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--faint);padding:8px 10px;border-bottom:2px solid var(--bd);text-align:center;background:var(--cream)}
.perm-table th:first-child{text-align:left}
.perm-table td{padding:10px;border-bottom:1px solid var(--bd);text-align:center;vertical-align:middle}
.perm-table td:first-child{text-align:left;font-size:12px;font-weight:600;color:var(--ink)}
.perm-table tr:last-child td{border-bottom:none}
.perm-check{width:18px;height:18px;border-radius:4px;border:none;cursor:default}
.perm-check.allow{background:var(--em-bg);color:var(--em);display:inline-flex;align-items:center;justify-content:center;font-size:11px}
.perm-check.deny{background:var(--rd-bg);color:var(--rd);display:inline-flex;align-items:center;justify-content:center;font-size:11px}
.perm-check.partial{background:var(--am-bg);color:var(--am);display:inline-flex;align-items:center;justify-content:center;font-size:11px}
/* MOBILE */
.mob-ham{display:none;flex-direction:column;align-items:center;justify-content:center;width:36px;height:36px;background:transparent;border:none;cursor:pointer;border-radius:7px;flex-shrink:0}
.mob-ham span{display:block;width:18px;height:2px;background:rgba(255,255,255,.72);margin:3px 0;border-radius:1px}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199}
@media(max-width:768px){
  .mob-ham{display:flex}
  .mob-overlay.show{display:block}
  .sb{position:fixed;left:calc(-1 * var(--sw));top:0;height:100vh;z-index:200;transition:left .25s ease}
  .sb.open{left:0}
  .shell{overflow:hidden}.content{width:100vw;min-width:0}
  .topbar{padding:0 12px;gap:8px}.tb-crumb{display:none}
  .page{padding:12px}
}  .kpi-row{grid-template-columns:1fr 1fr!important}
  .field-row{grid-template-columns:1fr}
  table,tbl{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}

  .tb-title,
.brand-logo,
.sb-logo,
.login-title,
.mod-title,
.page-title        {  font-weight:600; letter-spacing:.3px; }

/* Section headings inside content */
.section-title     {  font-size:12px;
                     font-weight:700; text-transform:uppercase; letter-spacing:1px;
                     color:var(--label); }

/* KPI numbers — large display (24px+): Outfit tabular */
.kpi-value, .kpi-vl, .stat-val { 
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-weight:300;
  font-variant-numeric:tabular-nums lining-nums;
  letter-spacing:-.5px;   /* tight for large numbers */
  color:var(--ink);        /* always maximum contrast */
}

/* Inline amounts in tables/lists */
.amt { font-family:'Outfit','Noto Sans JP',sans-serif;
       font-weight:600; font-variant-numeric:tabular-nums;
       color:var(--ink); }

/* Positive delta only */
.delta-up { color:var(--em); font-weight:600; font-size:.9em; }
.delta-dn { color:var(--rd); font-weight:600; font-size:.9em; }

/* IDs and codes */
.mono, [class*="-id"], [class*="-code"] { font-family:'DM Mono',monospace; font-size:.92em; }

/* Badge system — 4 states only */
.badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:20px;
         font-size:10px; font-weight:600; letter-spacing:.3px;
         font-family:'Outfit',sans-serif; white-space:nowrap; }
.b-em, .badge.emerald, .badge.em { background:var(--em-bg); color:var(--em); }
.b-am, .badge.amber,   .badge.am { background:var(--am-bg); color:var(--am); }
.b-rd, .badge.red,     .badge.rd { background:var(--rd-bg); color:var(--rd); }
.b-nt, .badge.muted,   .badge.nt { background:var(--cream2); color:var(--label); }
/* Legacy aliases → neutral */
.b-sk, .badge.sky    { background:#F0F9FF; color:#0369A1; }
.b-vt, .badge.violet { background:var(--cream2); color:var(--label); }
.b-gd, .badge.gold   { background:var(--gold-dim); color:#92740A; }




/* Brand — Cormorant only here */
.sb-logo, .brand-logo {
  font-family:'Cormorant Garamond',serif !important;
  letter-spacing:5px;
}
/* Everything else: Outfit */
body, input, select, textarea, button {
  font-family:'Outfit','Noto Sans JP',sans-serif;
}

/* ── Page structure ── */
.tb-title {
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-size:18px; font-weight:600; color:var(--ink);
  letter-spacing:-.2px;
}
.login-title {
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-size:24px; font-weight:600; color:var(--ink);
  letter-spacing:-.3px;
}
.section-title {
  
  font-size:11px; font-weight:700;
  text-transform:uppercase; letter-spacing:1.2px;
  color:var(--label);
}

/* ── Numbers & Amounts — always --ink, always Outfit ── */
.kpi-value, .kpi-vl {
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-weight:300 !important;
  font-variant-numeric:tabular-nums lining-nums !important;
  color:var(--ink);
  letter-spacing:-.5px;
}
.stat-val {
  font-family:'Outfit','Noto Sans JP',sans-serif !important;
  font-weight:300 !important;
  font-variant-numeric:tabular-nums !important;
  color:var(--ink) !important;
}
.kpi-label, .stat-label, .kpi-sub {
  color:var(--label) !important;
  font-weight:500;
}

/* ── Delta (the ONE exception: direction of change) ── */
.delta-up { color:var(--em) !important; }
.delta-dn { color:var(--rd) !important; }

/* ── IDs / codes ── */
.id-mono, .ag-id, .case-id {
  font-family:'DM Mono',monospace;
  font-size:.88em; color:var(--label);
}

/* ── Badge system: 4 states only ── */
.badge {
  display:inline-flex; align-items:center;
  padding:2px 8px; border-radius:20px;
  font-size:10px; font-weight:600; letter-spacing:.3px;
  font-family:'Outfit',sans-serif; white-space:nowrap;
  font-variant-numeric:tabular-nums;
}
.badge.emerald, .badge.em { background:#ECFDF5; color:#059669; }
.badge.amber,   .badge.am { background:#FFFBEB; color:#D97706; }
.badge.red,     .badge.rd { background:#FEF2F2; color:#DC2626; }
.badge.muted,   .badge.nt,
.badge.sky,     .badge.violet,
.badge.gold               { background:var(--cream2); color:var(--label); }


/* ═══════════════════════════════════════════════════════════════
   COREBLDG — Google-style Typography System
   ─────────────────────────────────────────────────────────────
   大きな数値は weight:300 でサイズで存在感を出す
   Bold はラベル・ボタン・UIに使い、数値には使わない
   背景は白。装飾は最小限。余白で呼吸する。
   ═══════════════════════════════════════════════════════════════ */

/* Page background */
html, body { background:#FFFFFF !important; }

/* ── Brand (Cormorant only here) ── */
.sb-logo, .brand-logo {
  font-family: 'Cormorant Garamond', serif !important;
  letter-spacing: 5px;
}

/* ── Base ── */
body, input, select, textarea, button {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif;
}

/* ── KPI / メトリクス数値
   Google Analytics の大型数値と同じアプローチ:
   weight 300、大きなサイズ、tight letter-spacing ── */
.kpi-value, .kpi-vl {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif !important;
  font-weight: 300 !important;
  font-variant-numeric: tabular-nums lining-nums !important;
  letter-spacing: -1px !important;
  color: var(--ink) !important;
  line-height: 1 !important;
}
/* KPIカードのサイズを少し大きく（軽いweightを補う） */
.kpi-value { font-size: 32px !important;font-variant-numeric:tabular-nums}
.kpi-vl   { font-size: 28px !important; }

/* ── 中型数値（stat-val, テーブル内金額） ── */
.stat-val {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif !important;
  font-weight: 400 !important;
  font-variant-numeric: tabular-nums !important;
  color: var(--ink) !important;
}

/* ── ラベル系 ── */
.kpi-label, .kpi-sub, .stat-label {
  font-size: 11px !important;
  font-weight: 500 !important;
  letter-spacing: .5px !important;
  color: var(--label) !important;
  text-transform: none;
}

/* ── Page title ── */
.tb-title {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif;
  font-size: 16px; font-weight: 400; color: var(--ink);
  letter-spacing: 0;
}

/* ── Section title — Google style: small, spaced, gray ── */
.section-title {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif;
  font-size: 11px; font-weight: 500;
  letter-spacing: .8px;
  color: var(--label);
  text-transform: uppercase;
}

/* ── Card: white bg, very light border, minimal shadow ── */
.card {
  background: #FFFFFF;
  border: 1px solid var(--bd);
  border-radius: 8px;
  box-shadow: var(--sh);
}

/* ── KPI Card ── */
.kpi-card {
  background: #FFFFFF !important;
  border: 1px solid var(--bd) !important;
  border-radius: 8px !important;
  box-shadow: none !important;
  padding: 20px 24px !important;
}
.kpi-card.gold   { border-top: 3px solid var(--gold) !important; }
.kpi-card.emerald{ border-top: 3px solid var(--em)   !important; }
.kpi-card.amber  { border-top: 3px solid var(--am)   !important; }
.kpi-card.red    { border-top: 3px solid var(--rd)   !important; }
.kpi-card.sky    { border-top: 3px solid #1A73E8     !important; }

/* ── 入金監視・大型パネル ── */
.kpi { border-radius: 8px; border: 1px solid var(--bd); }

/* ── Badge — flat style ── */
.badge {
  border-radius: 4px !important;
  font-size: 11px !important;
  font-weight: 500 !important;
  padding: 2px 7px !important;
  letter-spacing: 0 !important;
}

/* ── Buttons ── */
.btn-primary {
  background: var(--navy) !important;
  border-radius: 6px !important;
  font-weight: 500 !important;
  letter-spacing: .2px !important;
}
.btn-ghost {
  border-radius: 6px !important;
  font-weight: 500 !important;
}

/* ── Delta (増減のみ色付き) ── */
.delta-up, .kpi-delta.up { color: var(--em) !important; font-weight: 500; font-size: .82em; }
.delta-dn, .kpi-delta.dn { color: var(--rd) !important; font-weight: 500; font-size: .82em; }

/* ── IDs ── */
[class*="-id"], [class*="-code"], .pipe-ag, .task-meta [class*="ag-"],
.id-mono { font-family: 'DM Mono', monospace; font-size: .88em; color: var(--label); }

/* ── Form inputs — Google style ── */
.form-input, .form-select {
  border: 1px solid var(--bd) !important;
  border-radius: 4px !important;
  background: #FFFFFF !important;
  font-family: 'Outfit', 'Noto Sans JP', sans-serif !important;
  font-size: 14px !important;
  color: var(--ink) !important;
  padding: 8px 12px !important;
}
.form-input:focus, .form-select:focus {
  border-color: #1A73E8 !important;
  outline: none !important;
}

/* ── Section separator ── */

.section-title::before { display: none; }
/* ── Google-style 数値原則 (DS v2.3) ── */
.kpi-value, .kpi-vl, .kpi-val,
.stat-val, .qs-val, .count-val,
.td-amt, .bc-vl, .bc-total-vl,
.rr-amount, .amount-val, .srv,
.visit-reward, .lb-val,
.mf-kpi-vl, .mf-reward {
  font-family:'Outfit','Noto Sans JP',sans-serif !important;
  font-weight:300 !important;
  font-variant-numeric:tabular-nums !important;
}
.kpi-value { font-size:32px !important; }
.kpi-vl    { font-size:28px !important; }


/* ── ページ固有 ── */
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--bd);margin-bottom:24px;overflow-x:auto}
.tab-btn{padding:10px 18px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;
  border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-2px;
  transition:.15s;white-space:nowrap}
.tab-btn.active{color:var(--navy);border-bottom-color:var(--navy)}

/* フローステップ */
.flow-steps{display:flex;align-items:flex-start;gap:0;overflow-x:auto;
  padding:16px 0 12px;margin-bottom:16px}
.flow-step{display:flex;flex-direction:column;align-items:center;min-width:80px;flex-shrink:0}
.flow-step-dot{width:32px;height:32px;border-radius:50%;border:2px solid var(--bd2);
  background:#fff;display:flex;align-items:center;justify-content:center;
  font-size:13px;position:relative;z-index:1;flex-shrink:0;transition:.2s}
.flow-step-dot.done{background:var(--em);border-color:var(--em);color:#fff}
.flow-step-dot.active{background:var(--navy);border-color:var(--navy);color:var(--gold)}
.flow-step-dot.warn{background:var(--am);border-color:var(--am);color:#fff}
.flow-step-dot.ai{background:#6D28D9;border-color:#6D28D9;color:#fff}
.flow-step-lbl{font-size:8px;color:var(--muted);margin-top:5px;text-align:center;
  line-height:1.4;font-weight:600;max-width:72px}
.flow-step-lbl.active{color:var(--navy);font-weight:700}
.flow-step-lbl.done{color:var(--em)}
.flow-step-ts{font-size:7px;color:var(--faint);margin-top:2px;text-align:center}
.flow-line{flex:1;height:2px;background:var(--bd2);min-width:16px;
  margin-bottom:28px;transition:.3s}
.flow-line.done{background:var(--em)}

/* 書類カード */
.doc-card{background:#fff;border:1.5px solid var(--bd);border-radius:12px;
  margin-bottom:12px;overflow:hidden;transition:.15s}
.doc-card:hover{box-shadow:var(--sh2)}
.doc-card.flow-a{border-left:4px solid var(--navy)}
.doc-card.flow-b{border-left:4px solid #6D28D9}
.doc-card.flow-c{border-left:4px solid var(--em)}
.doc-card.flow-d{border-left:4px solid var(--rd)}
.doc-card.complete{opacity:.55;border-left-color:var(--bd2)}

.doc-card-head{padding:14px 16px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--bd)}
.doc-case-id{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:var(--navy)}
.doc-meta{font-size:10px;color:var(--muted);margin-top:2px}
.doc-card-body{padding:14px 16px}

/* バッジ */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;
  font-size:9px;font-weight:700;letter-spacing:.4px}
.badge-flowA{background:rgba(13,26,45,.1);color:var(--navy)}
.badge-flowB{background:#EDE9FE;color:#5B21B6}
.badge-flowC{background:var(--em-bg);color:var(--em)}
.badge-flowD{background:var(--rd-bg);color:var(--rd)}
.badge-pending{background:var(--am-bg);color:var(--am)}
.badge-ok{background:var(--em-bg);color:var(--em)}
.badge-ai{background:#EDE9FE;color:#5B21B6}
.badge-waiting{background:#F3F4F6;color:#6B7280}
.badge-done{background:var(--em-bg);color:var(--em)}

/* アクションボタン */
.act-btn{padding:7px 14px;border-radius:8px;font-size:11px;font-weight:700;
  cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px;transition:.15s}
.act-primary{background:var(--navy);color:#fff}
.act-primary:hover{background:var(--navy-l)}
.act-em{background:var(--em);color:#fff}
.act-em:hover{opacity:.85}
.act-warn{background:var(--am);color:#fff}
.act-danger{background:var(--rd);color:#fff}
.act-ghost{background:transparent;border:1px solid var(--bd);color:var(--muted)}
.act-ghost:hover{color:var(--ink)}
.act-ai{background:#6D28D9;color:#fff}
.act-print{background:#0F766E;color:#fff}

/* AIパネル */
.ai-panel{background:linear-gradient(135deg,#1a0f40,#2d1b69);border-radius:10px;
  padding:16px;margin:12px 0}
.ai-result{background:rgba(255,255,255,.08);border-radius:8px;padding:12px;margin-top:10px}
.ai-label{font-size:9px;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:.5px;margin-bottom:4px}
.ai-val{font-size:13px;font-weight:700;color:#C4B5FD}
.ai-conf{font-size:10px;color:rgba(255,255,255,.6);margin-top:4px}

/* スキャン入力 */
.scan-area{background:var(--navy);border-radius:12px;padding:20px;text-align:center;
  cursor:pointer;transition:.15s;border:2px dashed rgba(200,169,81,.4)}
.scan-area:hover{border-color:var(--gold);background:var(--navy-m)}
.scan-icon{font-size:32px;margin-bottom:8px}
.scan-text{font-size:12px;color:rgba(255,255,255,.7);font-weight:600}
.scan-sub{font-size:10px;color:rgba(255,255,255,.4);margin-top:4px}

/* スキャン入力フォーム */
.scan-input-row{display:flex;gap:8px;margin-top:12px}
.scan-input{flex:1;padding:10px 14px;border-radius:8px;border:none;
  font-family:'DM Mono',monospace;font-size:13px;outline:none;
  background:rgba(255,255,255,.1);color:#fff;letter-spacing:1px}
.scan-input::placeholder{color:rgba(255,255,255,.3)}

/* 印刷プレビュー */
.print-preview{background:#fff;border:1px solid var(--bd);border-radius:10px;
  padding:16px;margin:12px 0}
.print-preview-title{font-size:10px;font-weight:700;color:var(--muted);
  margin-bottom:12px;letter-spacing:.5px}
.print-item{border:1px solid var(--bd2);border-radius:8px;padding:12px;
  margin-bottom:8px;display:flex;align-items:center;gap:12px}
.print-item-icon{font-size:20px;flex-shrink:0}
.print-item-name{font-size:11px;font-weight:700;color:var(--ink)}
.print-item-desc{font-size:10px;color:var(--muted);margin-top:2px}

/* 捺印確認 */
.hanko-check{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.hanko-item{background:#F8F9FA;border-radius:8px;padding:10px 12px;
  display:flex;align-items:center;gap:8px;font-size:11px;cursor:pointer}
.hanko-item input{width:15px;height:15px;accent-color:var(--navy);cursor:pointer}

/* 統計カード */
.stat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
@media(max-width:700px){.stat-grid{grid-template-columns:repeat(3,1fr)}}
.stat-card{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:12px;text-align:center}
.stat-val{font-size:22px;font-weight:700;color:var(--navy)}
.stat-lbl{font-size:9px;color:var(--muted);margin-top:2px;font-weight:600;letter-spacing:.4px}

/* モーダル */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;
  display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:14px;padding:24px;max-width:460px;width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,.25);max-height:90vh;overflow-y:auto}
.modal-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:14px;
  display:flex;align-items:center;gap:8px}

/* フロー選択カード */
.flow-select-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
@media(max-width:500px){.flow-select-grid{grid-template-columns:1fr}}
.flow-select-card{border-radius:12px;padding:16px;cursor:pointer;transition:.15s;
  border:2px solid transparent}
.flow-select-card:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.flow-select-card.selected{border-color:var(--navy)}
.flow-select-icon{font-size:24px;margin-bottom:8px}
.flow-select-title{font-size:12px;font-weight:700;margin-bottom:4px}
.flow-select-desc{font-size:10px;opacity:.7;line-height:1.5}
</style>

// localStorage から読み込み、なければデモデータを使用
function loadDocs() {
  try {
    const saved = localStorage.getItem(LS_DOCS_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DOCS_DEMO)); // deep copy
}
function saveDocs() {
  try { localStorage.setItem(LS_DOCS_KEY, JSON.stringify(DOCS)); } catch(e) {}

function toggleSb(){

  document.querySelector('.mob-overlay').classList.toggle('show');

function showToast(msg, type=''){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = {warn:'var(--am)',ok:'var(--em)',danger:'var(--rd)'}[type]||'var(--navy)';
  t.style.opacity='1'; t.style.transform='translateX(-50%) translateY(0)';
  setTimeout(()=>{t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(10px)';},3200);
}

function renderStats(){
  const flowCounts = {A:0, B:0, C:0, D:0};
  DOCS.forEach(d => flowCounts[d.flow]++);
  const pending_confirm = DOCS.filter(d =>
    (d.flow==='A' && d.stepIdx===3) || (d.flow==='C' && d.stepIdx===1)
  ).length;
  document.getElementById('stat-grid').innerHTML = [
    {val:DOCS.length,        lbl:'処理中',             color:'var(--navy)'},
    {val:flowCounts.A,       lbl:'A: HQ→クライアント', color:'var(--navy)'},
    {val:flowCounts.B,       lbl:'B: クライアント→管',  color:'#6D28D9'},
    {val:pending_confirm,    lbl:'⏳ AI承認待ち',       color:'var(--am)'},
    {val:flowCounts.D,       lbl:'⚠️ 追加捺印',         color:'var(--rd)'},
  ].map(s=>`
    <div class="stat-card">
      <div class="stat-val" style="color:${s.color}">${s.val}</div>
      <div class="stat-lbl">${s.lbl}</div>
    </div>`).join('');
}

function switchTab(tab){

    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
  const MAP = {
    dashboard: renderDashboard,
    flowA: ()=>renderFlowList('A'),
    flowB: ()=>renderFlowList('B'),
    flowC: ()=>renderFlowList('C'),
    flowD: ()=>renderFlowList('D'),
  };

function renderDashboard(){

  // 新規受付ボタン
  el.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">

        background:#EDE9FE;color:#5B21B6;border:none;border-radius:8px;font-weight:700;font-size:11px"
        onclick="startFlowB()">
        🔄 Bフロー開始（案件検索）
      </button>
    </div>

    <!-- AI承認待ち -->
    ${renderAiPending()}

    <div style="font-size:12px;font-weight:700;color:var(--navy);margin:20px 0 10px">
      処理中の書類（${DOCS.length}件）
    </div>
    ${DOCS.map(d => renderDocCard(d)).join('')}`;
}

function renderAiPending(){
  const pending = DOCS.filter(d =>
    (d.flow==='A' && d.stepIdx===0) ||   // AI判定中（新フロー）
    (d.flow==='A' && d.stepIdx===3) ||   // 旧: HQ承認待ち
    (d.flow==='C' && d.stepIdx===1)
  );
  if (!pending.length) return '';

  const cardHtml = pending.map(d => {
    const status = d.aiStatus || (d.aiResult ? 'done' : 'pending');
    const hasDefects = d.aiResult?.defects?.length > 0;
    const confColor = (c) => c >= 90 ? 'var(--em)' : c >= 70 ? 'var(--am)' : 'var(--rd)';

    if (status === 'running') {
      return `
        <div class="ai-result" style="margin-bottom:8px">
          <div style="display:flex;align-items:center;gap:10px;padding:4px 0">
            <span style="animation:spin .8s linear infinite;display:inline-block;font-size:16px">🤖</span>
            <div>
              <div class="ai-label">${d.id} — AI判定中…</div>
              <div style="font-size:10px;color:#a78bfa">書類データをClaudeが分析しています</div>
            </div>
          </div>
        </div>`;
    }
    if (status === 'error') {
      return `
        <div class="ai-result" style="margin-bottom:8px;border:1px solid rgba(220,38,38,.4)">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div>
              <div class="ai-label" style="color:#f87171">⚠️ AI判定エラー — ${d.id}</div>
              <div style="font-size:10px;color:#f87171">${d.aiError || '接続エラー'}</div>
            </div>
            <button class="act-btn act-em" style="font-size:10px" onclick="runAiJudge('${d.id}')">🔄 再試行</button>
          </div>
        </div>`;
    }
    // done / pending（既存サンプルデータ）
    return `
      <div class="ai-result" style="margin-bottom:8px${hasDefects ? ';border:1px solid rgba(220,38,38,.4)' : ''}">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
              <div class="ai-label">判定結果</div>
              <span style="font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,.3)">${d.id}</span>
            </div>
            <div class="ai-val">${d.aiResult?.caseId} ／ ${d.aiResult?.caseName}</div>
            <div class="ai-conf" style="color:${confColor(d.aiResult?.confidence||0)}">
              信頼度 ${d.aiResult?.confidence}%
            </div>
            ${d.aiResult?.reasoning ? `<div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:4px">💬 ${d.aiResult.reasoning}</div>` : ''}
            ${hasDefects ? `
              <div style="margin-top:8px;background:rgba(220,38,38,.15);border-radius:6px;padding:7px 10px">
                <div style="font-size:10px;font-weight:700;color:#f87171;margin-bottom:4px">⚠️ 不備検出</div>
                ${(d.aiResult.defects||[]).map(df=>`<div style="font-size:10px;color:#fca5a5">• ${df}</div>`).join('')}
              </div>` : `
              <div style="margin-top:6px;font-size:10px;color:rgba(167,243,208,.8)">✅ ${d.aiResult?.defectSummary||'不備なし'}</div>`}
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0;margin-left:12px">
            <button class="act-btn act-em" style="font-size:10px"
              onclick="approveAi('${d.id}')">✅ 承認</button>
            <button class="act-btn" style="font-size:10px;background:var(--rd-bg);
              color:var(--rd);border:none;border-radius:7px;font-weight:700"
              onclick="rejectAi('${d.id}')">❌ 却下</button>
          </div>
        </div>
      </div>`;
  }).join('');

  const runningCount = pending.filter(d => d.aiStatus === 'running').length;
  const defectCount  = pending.filter(d => d.aiResult?.defects?.length > 0).length;
  const headerSub = runningCount > 0
    ? `<span style="font-size:9px;color:#a78bfa;margin-left:6px">判定中 ${runningCount}件</span>`
    : defectCount > 0
    ? `<span style="background:var(--rd);color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;margin-left:6px">不備 ${defectCount}件</span>`
    : '';

  return `
    <div style="background:linear-gradient(135deg,#1a0f40,#2d1b69);border-radius:12px;
      padding:16px;margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;color:#C4B5FD;margin-bottom:10px;
        display:flex;align-items:center">
        🤖 AI判定 — HQ承認待ち（${pending.length}件）${headerSub}
      </div>
      ${cardHtml}
    </div>`;
}

// ══════════════════════════════════════════════════════════
// 書類カード（汎用）
// ══════════════════════════════════════════════════════════
function renderDocCard(doc){
  const flowDef = FLOW_DEFS[doc.flow];
  const steps   = flowDef.steps;
  const cur     = doc.stepIdx;
  const isDone  = cur >= steps.length;

  // ステップUI
  const stepsHtml = steps.map((s,i)=>{
    const done   = i < cur;
    const active = i === cur;
    const dotCls = done ? 'done' : active ? (s.aiStep?'ai':s.scanStep?'active':'active') : '';
    const lblCls = done ? 'done' : active ? 'active' : '';
    return `
      <div class="flow-step">
        <div class="flow-step-dot ${dotCls}">${done?'✓':s.icon}</div>
        <div class="flow-step-lbl ${lblCls}">${s.label.replace('\n','<br>')}</div>
      </div>
      ${i<steps.length-1 ? `<div class="flow-line ${done||i<cur?'done':''}"></div>` : ''}`;
  }).join('');

  // 現在ステップのアクション
  const action = renderStepAction(doc);

  return `
  <div class="doc-card flow-${doc.flow.toLowerCase()} ${isDone?'complete':''}">
    <div class="doc-card-head">
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
          <div class="doc-case-id">${doc.caseId || '案件特定中...'}</div>
          ${flowBadge(doc.flow)}
          ${doc.flow==='D'?'<span class="badge badge-flowD">⚠️ 追加捺印</span>':''}
        </div>
        <div class="doc-meta">
          ${doc.caseName || '—'} ／ 到着: ${doc.arrivedAt} ／ 更新: ${doc.lastUpdated}
        </div>
      </div>
      <div style="font-size:10px;color:var(--muted);font-weight:600;flex-shrink:0">
        ${steps[Math.min(cur,steps.length-1)]?.label.replace('\n',' ') || '完了'}
        <span style="color:var(--faint)"> (${Math.min(cur,steps.length-1)+1}/${steps.length})</span>
      </div>
    </div>
    <div class="doc-card-body">
      <div class="flow-steps">${stepsHtml}</div>
      ${action ? `<div style="margin-top:8px">${action}</div>` : ''}
    </div>
  </div>`;
}

function renderStepAction(doc){
  const step = FLOW_DEFS[doc.flow].steps[doc.stepIdx];
  if (!step) return '<span class="badge badge-done">✅ 完了</span>';

  // Flow A
  if (doc.flow==='A'){
    if (doc.stepIdx===0) return '<span class="badge badge-ai">🤖 AI判定中...</span>';
    if (doc.stepIdx===1) return `
      <div>
        <div class="ai-panel">
          <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.5);margin-bottom:8px">
            🤖 AI判定結果
          </div>
          <div class="ai-result">
            <div class="ai-label">判定案件</div>
            <div class="ai-val">${doc.aiResult?.caseId} ／ ${doc.aiResult?.caseName}</div>
            <div class="ai-conf">信頼度 ${doc.aiResult?.confidence}%</div>
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
          <button class="act-btn act-em" style="flex:1;justify-content:center"
            onclick="approveAi('${doc.id}')">
            ✅ 承認（自動印刷）
          </button>
          <button class="act-btn act-ghost" onclick="openCaseSearch('${doc.id}')">
            🔍 案件を検索して修正
          </button>
        </div>
      </div>`;
    if (doc.stepIdx===2) return `
      <button class="act-btn act-primary" onclick="openScanSend('${doc.id}','A')">
        📷 バーコードリーダーで読み取り・発送登録
      </button>`;
    if (doc.stepIdx===3) return '<span class="badge badge-done">📮 発送済み</span>';
  }

  // Flow B
  if (doc.flow==='B'){
    if (doc.stepIdx===0) return `
      <div>
        <div style="font-size:10px;font-weight:700;color:var(--muted);margin-bottom:8px">
          🔍 案件を検索して特定
        </div>
        <div style="display:flex;gap:8px">
          <input type="text" id="b-search-${doc.id}"
            placeholder="案件ID（例: RC-10042）または顧客名"
            style="flex:1;padding:9px 12px;border:1.5px solid var(--bd);border-radius:8px;
            font-family:'Outfit',sans-serif;font-size:12px;outline:none"
            oninput="searchCaseB('${doc.id}',this.value)"
            onkeydown="if(event.key==='Enter')confirmCaseB('${doc.id}')">
          <button class="act-btn act-primary" onclick="confirmCaseB('${doc.id}')">
            🔍 特定
          </button>
        </div>
        <div id="b-search-result-${doc.id}" style="margin-top:8px"></div>
      </div>`;
    if (doc.stepIdx===1) return `
      <button class="act-btn act-print" onclick="printFlowB('${doc.id}')">
        🖨️ 管理会社ラベル 印刷
      </button>`;
    if (doc.stepIdx===2) return `
      <div>
        <div style="font-size:10px;font-weight:700;color:var(--muted);margin-bottom:8px">
          捺印確認チェック
        </div>
        <div class="hanko-check">
          <label class="hanko-item">
            <input type="checkbox" id="hk-${doc.id}-1"> 署名欄 すべて捺印あり
          </label>
          <label class="hanko-item">
            <input type="checkbox" id="hk-${doc.id}-2"> 日付欄 正確
          </label>
          <label class="hanko-item">
            <input type="checkbox" id="hk-${doc.id}-3"> 訂正箇所 問題なし
          </label>
          <label class="hanko-item">
            <input type="checkbox" id="hk-${doc.id}-4"> 添付書類 揃っている
          </label>
        </div>
        <div style="display:flex;gap:8px;margin-top:4px">
          <button class="act-btn act-em" onclick="hankoOk('${doc.id}')">✅ 問題なし → 次へ</button>
          <button class="act-btn act-danger" onclick="hankoNg('${doc.id}')">❌ 追加捺印が必要</button>
        </div>
      </div>`;
    if (doc.stepIdx===3) return `
      <button class="act-btn act-primary" onclick="advance('${doc.id}')">
        📋 ラベル貼付完了
      </button>`;
    if (doc.stepIdx===4) return `
      <button class="act-btn act-primary" onclick="openScanSend('${doc.id}','B')">
        📷 BC＋追跡コードをスキャン
      </button>`;
    if (doc.stepIdx===5) return '<span class="badge badge-done">📮 管理会社へ発送済み</span>';
  }

  // Flow C
  if (doc.flow==='C'){
    if (doc.stepIdx===0) return `
      <div>
        <div style="font-size:10px;font-weight:700;color:var(--muted);margin-bottom:8px">
          🔑 鍵受取書をアップロード
        </div>
        <label style="display:block;border:2px dashed var(--bd2);border-radius:10px;
          padding:16px;text-align:center;cursor:pointer;transition:.15s;background:#F8F9FA"
          onmouseenter="this.style.borderColor='var(--em)'"
          onmouseleave="this.style.borderColor='var(--bd2)'">
          <input type="file" accept="application/pdf" style="display:none"
            onchange="handleKeyPdfUpload(event,'${doc.id}')">
          <div id="key-upload-status-${doc.id}" style="font-size:12px;color:var(--muted)">
            📁 鍵受取書PDFを選択<br>
            <span style="font-size:10px;color:var(--faint)">鍵受取書.pdf</span>
          </div>
        </label>
        <button class="act-btn act-ai" style="margin-top:10px;width:100%;justify-content:center"
          id="key-ai-btn-${doc.id}" disabled
          onclick="runKeyAiScan('${doc.id}')">
          🤖 AIで案件を特定する
        </button>
      </div>`;
    if (doc.stepIdx===1) return `
      <div style="display:flex;gap:8px">
        <button class="act-btn act-em" onclick="approveAi('${doc.id}')">✅ AI結果を承認</button>
        <button class="act-btn act-ghost" onclick="rejectAi('${doc.id}')">❌ 却下</button>
      </div>`;
    if (doc.stepIdx===2) return `
      <button class="act-btn act-print" onclick="printFlowC('${doc.id}')">
        🖨️ ラベル印刷
      </button>`;
    if (doc.stepIdx===3) return `
      <button class="act-btn act-primary" onclick="openScanSend('${doc.id}','C')">
        📷 BC＋追跡コードをスキャン
      </button>`;
    if (doc.stepIdx===4) return '<span class="badge badge-done">📮 発送済み</span>';
  }

  // Flow D
  if (doc.flow==='D'){
    if (doc.stepIdx===0) return `
      <button class="act-btn act-print" onclick="printFlowD('${doc.id}')">
        🖨️ 再捺印書類＋ラベル印刷
      </button>`;
    if (doc.stepIdx===1) return `
      <button class="act-btn act-primary" onclick="openScanSend('${doc.id}','D')">

      </button>`;
    if (doc.stepIdx===2) return '<span class="badge badge-done">📮 発送済み</span>';
  }
  return '';
}

// 操作関数

function advance(docId){
  const doc = DOCS.find(d=>d.id===docId);
  if (!doc) return;
  doc.stepIdx++;
  doc.lastUpdated = new Date().toLocaleString('ja-JP').slice(5,-3);
  // Flow A: stepIdx=0（AI判定中）に到達したらAI自動判定を発火
  if (doc.flow === 'A' && doc.stepIdx === 0) {
    showToast('🤖 AI案件判定を開始します…', 'ok');
    runAiJudge(docId);
  } else {
    showToast('✅ ステップを更新しました', 'ok');
  }
  saveDocs();
  refreshCurrentTab();
}

// ── AI書類不備検出・案件特定 ────────────────────────────
async function runAiJudge(docId) {
  const doc = DOCS.find(d => d.id === docId);
  if (!doc) return;

  // AI判定中バッジを更新
  doc.aiStatus = 'running';
  refreshCurrentTab();

  // CASE_DB から候補リストを作成してAIに渡す
  const candidates = CASE_DB.map(c => ({
    caseId: c.caseId,
    caseName: c.caseName,
    propertyName: c.propertyName,
    agId: c.agent.agId,
    agName: c.agent.name,
  }));

  const prompt = `あなたはCORETO（不動産仲介）のAI書類判定システムです。
スキャンされた書類の情報と案件データベースを照合し、最も一致する案件を特定してください。

【スキャン書類情報】
書類ID: ${doc.id}
バーコード登録日時: ${doc.arrivedAt}
フロー種別: ${doc.flow}（HQ→クライアント送付書類）
捺印状態: ${doc.hankoOk ? '確認済み' : '未確認'}
既存caseId（手動入力済みがあれば）: ${doc.caseId || 'なし'}

【案件候補（データベース全件）】
${JSON.stringify(candidates, null, 2)}

【判定タスク】
1. スキャン書類に最も対応する案件を1件特定してください
2. 書類の不備（捺印漏れ・ページ不足など）があれば検出してください
3. 信頼度（%）を算出してください

JSONのみで回答（前置き・コードブロック不要）:
{"caseId":"RC-XXXXX","caseName":"○○ 様 ／ ○○","confidence":97,"defects":[],"defectSummary":"不備なし","reasoning":"判定根拠（1文）"}

defectsの例: ["捺印漏れの可能性", "重説書類のページ数が不足している可能性"]
defectsが空の場合は [] とし、defectSummaryは "不備なし" としてください。`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 600,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await resp.json();
    const text = data.content?.find(b => b.type === 'text')?.text || '{}';
    const res = JSON.parse(text.replace(/```json|```/g, '').trim());

    doc.aiResult = {
      caseId:       res.caseId || doc.caseId,
      caseName:     res.caseName || doc.caseName,
      confidence:   res.confidence || 0,
      defects:      res.defects || [],
      defectSummary: res.defectSummary || '—',
      reasoning:    res.reasoning || '',
    };
    doc.aiStatus = 'done';

    // 不備が検出された場合はアラート
    if (doc.aiResult.defects.length > 0) {
      showToast(`⚠️ 不備検出: ${doc.aiResult.defects[0]}`, 'warn');
    } else {
      showToast(`✅ AI判定完了: ${doc.aiResult.caseId} (信頼度${doc.aiResult.confidence}%)`, 'ok');
    }
  } catch (e) {
    doc.aiResult = doc.aiResult || { caseId: doc.caseId, caseName: doc.caseName, confidence: 0 };
    doc.aiStatus = 'error';
    doc.aiError = e.message;
    showToast('⚠️ AI判定エラー: ' + e.message);
  }

  doc.lastUpdated = new Date().toLocaleString('ja-JP').slice(5, -3);
  refreshCurrentTab();
}

// PDF アップロードハンドラ（Flow A: 契約書＋重説）
function handlePdfUpload(event, docId){
  const files = Array.from(event.target.files);
  if (!files.length) return;
  const names = files.map(f=>f.name).join('、');
  const statusEl = document.getElementById('upload-status-'+docId);
  const btnEl    = document.getElementById('ai-scan-btn-'+docId);
  if (statusEl) statusEl.innerHTML = `✅ アップロード完了<br>
    <span style="font-size:10px;color:var(--em);font-weight:600">${names}</span>`;
  if (btnEl) { btnEl.disabled = false; btnEl.style.opacity = '1'; }
  // ラベルのボーダー色を緑に
  const label = document.getElementById('upload-label-'+docId);
  if (label) label.style.borderColor = 'var(--em)';
  showToast(`📄 ${files.length}件のPDFを受信しました`);
}

// PDF アップロードハンドラ（Flow C: 鍵受取書）
function handleKeyPdfUpload(event, docId){
  const files = Array.from(event.target.files);
  if (!files.length) return;
  const statusEl = document.getElementById('key-upload-status-'+docId);
  const btnEl    = document.getElementById('key-ai-btn-'+docId);
  if (statusEl) statusEl.innerHTML = `✅ アップロード完了<br>
    <span style="font-size:10px;color:var(--em);font-weight:600">${files[0].name}</span>`;
  if (btnEl) { btnEl.disabled = false; btnEl.style.opacity = '1'; }
  showToast(`🔑 鍵受取書PDFを受信しました`);
}

// AI判定実行（Flow C）
function runKeyAiScan(docId){
  const doc = DOCS.find(d=>d.id===docId);
  if (!doc) return;
  doc.stepIdx = 0;
  doc.lastUpdated = new Date().toLocaleString('ja-JP').slice(5,-3);
  showToast('📷 スキャン完了。AI案件特定中...');
  refreshCurrentTab();
  setTimeout(()=>{
    doc.aiResult = {caseId: doc.caseId||'RC-XXXX', caseName: doc.caseName||'特定中', confidence:89};
    doc.stepIdx = 1;
    doc.lastUpdated = new Date().toLocaleString('ja-JP').slice(5,-3);

function runAiScanById(docId){
  const doc = DOCS.find(d=>d.id===docId);
  if (!doc) return;
  doc.stepIdx = 0; // AI判定中
  doc.lastUpdated = new Date().toLocaleString('ja-JP').slice(5,-3);
  showToast('🤖 AI判定中...');
  renderStats(); refreshCurrentTab();
  setTimeout(()=>{
    const SAMPLE = [
      {caseId:'RC-10055', caseName:'中村 様 ／ 世田谷区三軒茶屋アパート', confidence:93},
      {caseId:'RC-10060', caseName:'小林 様 ／ 江東区豊洲マンション',     confidence:87},
      {caseId:'RC-10065', caseName:'加藤 様 ／ 杉並区荻窪アパート',       confidence:96},
    ];
    doc.aiResult = SAMPLE[Math.floor(Math.random()*SAMPLE.length)];
    doc.stepIdx  = 1; // AI判定完了 → HQ承認待ち
    doc.lastUpdated = new Date().toLocaleString('ja-JP').slice(5,-3);
    showToast('🤖 AI判定完了 — HQ承認をお願いします', 'ok');
    renderStats(); refreshCurrentTab();
  }, 1800);
}

function approveAi(docId){
  const doc = DOCS.find(d=>d.id===docId);
  if (!doc) return;
  if (doc.aiResult) {
    doc.caseId   = doc.aiResult.caseId;
    doc.caseName = doc.aiResult.caseName;
  }
  doc.stepIdx++;
  doc.lastUpdated = new Date().toLocaleString('ja-JP').slice(5,-3);
  // Aフロー: 承認時にlocalStorageをcaseIdキーに移行 + 自動印刷
  if (doc.flow === 'A') {
    // pending → caseId キーに移行
    try {
      const pendingKey = 'CORETO_SCAN_PENDING_'+doc.id;
      const raw = localStorage.getItem(pendingKey);
      if (raw) {
        const data = JSON.parse(raw);
        data.caseId = doc.caseId;
        data.confirmedAt = new Date().toLocaleString('ja-JP').slice(0,-3);
        localStorage.setItem('CORETO_SCAN_'+doc.caseId, JSON.stringify(data));
        localStorage.removeItem(pendingKey);
        // 初期費用明細書がある場合は CORETO_INVOICE_MEISAI_{caseId} にも保存
        if (data.meisai && data.meisai.dataUrl) {
          localStorage.setItem('CORETO_INVOICE_MEISAI_'+doc.caseId, JSON.stringify({
            dataUrl: data.meisai.dataUrl,
            name:    data.meisai.name,
            source:  'barcode-scan',
            savedAt: new Date().toLocaleString('ja-JP'),
          }));
        }
      }
    } catch(e){}
    const bc = doc.caseId.replace('-','') + Date.now().toString().slice(-6);
    doc.outboundTracking = bc;
    showToast(`✅ 承認: ${doc.caseId} — 書類を保存・印刷を開始します`, 'ok');
    saveDocs(); renderStats(); refreshCurrentTab();
    setTimeout(()=>{ printApprovalDocs(doc, bc); }, 400);
  } else {
    showToast(`✅ 承認しました: ${doc.caseId}`, 'ok');
    saveDocs(); renderStats(); refreshCurrentTab();
  }
}

function confirmSend(docId){
  const doc = DOCS.find(d=>d.id===docId);

  const code = document.getElementById('scan-code-inp')?.value.trim();

  showToast('📮 発送登録が完了しました', 'ok');
  renderStats(); refreshCurrentTab();

  const matched = DOCS.find(d=>d.flow==='A' && d.stepIdx===6) ||
    {caseId:'RENT-0042', caseName:'田中 様 ／ 渋谷区代々木アパート'};
  const newDoc = {
    id:'DOC-B-'+Date.now(),

    flow:'B', stepIdx:1,

  const wLabel  = printLabels(cas, trackingCode);
  const wLetter = printWelcomeLetter(cas, trackingCode, doc.returnDocs || null);
  setTimeout(() => {
    try { wLetter && wLetter.print(); } catch(e) {}
  }, 1200);

  // returnDocsが未取得の場合は担当AGに返送書類の連絡を依頼する通知を送る

// 担当AGへの返送書類確認依頼通知（公式LINE① AG・PT向けチャンネル経由）
function notifyAgReturnDocs(cas) {
  const msgText =
    `【COREBLDG】返送書類のご連絡をお願いします\n\n` +
    `案件ID: ${cas.caseId}\n` +
    `クライアント: ${cas.caseName} 様\n\n` +
    `Welcome letterを発送しました。\n` +
    `返送必要書類リストが未取得のため、クライアントへ直接ご連絡いただき、返送が必要な書類をご案内ください。`;

  // LINE Messaging API — チャンネルアクセストークン設定後に有効化
  const LINE_TOKEN = (window.LINE_CONFIG && window.LINE_CONFIG.AG_CHANNEL_TOKEN) || '';
  const LINE_USER_ID = cas.agent.lineUserId || ''; // エージェントのLINEユーザーID

  if (LINE_TOKEN && LINE_USER_ID) {
    // LINE Push Message API
    fetch('https://api.line.me/v2/bot/message/push', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + LINE_TOKEN,
      },
      body: JSON.stringify({
        to: LINE_USER_ID,
        messages: [{ type: 'text', text: msgText }]
      })
    }).catch(e => console.error('[LINE通知エラー]', e));
  } else {
    // 未設定時はコンソールログ（公式LINE開設後に自動で有効化される）
    // console.log('[LINE通知 — 設定待ち]', msgText);
  }

  showToast(`📲 ${cas.agent.name} にLINEで返送書類の連絡依頼を送信しました`, 'ok');
}

// ── ファイルアップロード管理 ────────────────────────────
let _uploadFiles = {contract: null, jusetsu: null, returnlist: null, meisai: null};
let _uploadDataUrls = {contract: null, jusetsu: null, returnlist: null, meisai: null};

function handleFileSelect(event, type){
  const file = event.target.files[0];
  if (!file) return;
  _uploadFiles[type] = file;

  const statusEl = document.getElementById('upload-status-'+type);
  const labelEl  = document.getElementById('upload-label-'+type);
  if (statusEl) statusEl.innerHTML =
    `<div style="font-size:18px;margin-bottom:3px">✅</div>
     <div style="font-size:10px;font-weight:700;color:var(--em)">${file.name}</div>
     <div style="font-size:9px;color:var(--faint)">${(file.size/1024).toFixed(0)}KB</div>`;
  if (labelEl) labelEl.style.borderColor = 'var(--em)';

  // 契約書・重説の両方が揃ったらボタン有効化（returnlistは任意）
  const btnEl = document.getElementById('new-upload-submit');
  if (_uploadFiles.contract && _uploadFiles.jusetsu){
    if (btnEl){ btnEl.disabled=false; btnEl.style.opacity='1'; }
  }

  // base64変換（localStorage保存用 / AI送信用）
  const reader = new FileReader();
  reader.onload = e => { _uploadDataUrls[type] = e.target.result; };
  reader.readAsDataURL(file);
}

function submitNewUpload(){
  if (!_uploadFiles.contract || !_uploadFiles.jusetsu){
    showToast('⚠️ 契約書と重説の両方を選択してください','warn');
    return;
  }
  closeScanModal();
  const newDoc = {
    id:'DOC-'+String(Date.now()).slice(-5),
    caseId:'', caseName:'',
    flow:'A', stepIdx:0,
    aiResult:null,
    returnDocs: null,   // 返送必要書類リスト（AI抽出後にセット）
    outboundTracking:'', returnTracking:'',
    arrivedAt:new Date().toLocaleString('ja-JP').slice(5,-3),
    lastUpdated:new Date().toLocaleString('ja-JP').slice(5,-3),
    hankoOk:false, extraStamp:false,
  };
  DOCS.unshift(newDoc);
  saveDocs();

  // localStorage に pending として保存
  const pendingData = {
    docId: newDoc.id,
    caseId: null,
    uploadedAt: newDoc.arrivedAt,
    contract: _uploadDataUrls.contract ? {
      name: _uploadFiles.contract.name,
      dataUrl: _uploadDataUrls.contract,
      size: _uploadFiles.contract.size,
    } : null,
    jusetsu: _uploadDataUrls.jusetsu ? {
      name: _uploadFiles.jusetsu.name,
      dataUrl: _uploadDataUrls.jusetsu,
      size: _uploadFiles.jusetsu.size,
    } : null,
    meisai: _uploadDataUrls.meisai ? {
      name: _uploadFiles.meisai.name,
      dataUrl: _uploadDataUrls.meisai,
      size: _uploadFiles.meisai.size,
    } : null,
  };
  try {
    localStorage.setItem('CORETO_SCAN_PENDING_'+newDoc.id, JSON.stringify(pendingData));
  } catch(e){ showToast('⚠️ ローカルストレージ保存失敗（容量不足の可能性）','warn'); }

  // 返送必要書類リストが添付されていればAIで読み取る
  const returnlistDataUrl = _uploadDataUrls.returnlist;
  const returnlistFile    = _uploadFiles.returnlist;

  renderStats();
  _uploadFiles    = {contract:null, jusetsu:null, returnlist:null, meisai:null};
  _uploadDataUrls = {contract:null, jusetsu:null, returnlist:null, meisai:null};
  refreshCurrentTab();

  if (returnlistDataUrl) {
    showToast('📬 返送必要書類リストをAIで読み取り中...');
    runReturnListAi(newDoc.id, returnlistDataUrl, returnlistFile)
      .then(() => {
        showToast('📦 受付登録完了 — AI案件判定を開始します');
        setTimeout(() => runAiScanById(newDoc.id), 800);
      });
  } else {
    showToast('📦 受付登録完了 — AI判定を開始します');
    setTimeout(() => runAiScanById(newDoc.id), 1500);
  }
}

// ── 返送必要書類リストのAI読み取り ─────────────────────────
async function runReturnListAi(docId, dataUrl, file) {
  const doc = DOCS.find(d => d.id === docId);
  if (!doc) return;

  // base64部分のみ取り出す
  const base64 = dataUrl.split(',')[1];
  const isPdf  = file && file.type === 'application/pdf';
  const mediaType = isPdf ? 'application/pdf' : (file ? file.type : 'image/jpeg');

  const contentBlock = isPdf
    ? { type:'document', source:{ type:'base64', media_type:'application/pdf', data: base64 } }
    : { type:'image',    source:{ type:'base64', media_type: mediaType,         data: base64 } };

  const prompt = `この書類は不動産管理会社が作成した「返送必要書類一覧」です。
書類に記載されている返送が必要な書類の名前を全て抽出し、以下のJSON形式のみで返答してください（前置き・説明不要）:

{"docs":[{"name":"書類名1","note":"備考（押印必要など）"},{"name":"書類名2","note":""}]}

備考が書かれていない場合は note を空文字にしてください。
書類が読み取れない場合は {"docs":[]} を返してください。`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 800,
        messages: [{ role: 'user', content: [contentBlock, { type:'text', text: prompt }] }]
      })
    });
    const data = await resp.json();
    const text = data.content?.find(b => b.type === 'text')?.text || '{"docs":[]}';
    const res  = JSON.parse(text.replace(/```json|```/g, '').trim());
    doc.returnDocs = res.docs && res.docs.length > 0 ? res.docs : null;
    if (doc.returnDocs) {
      showToast(`✅ 返送書類 ${doc.returnDocs.length}件 を読み取りました`, 'ok');
    }
  } catch(e) {
    doc.returnDocs = null;
    console.warn('返送書類AI読み取りエラー:', e.message);
  }
}

          format:'CODE128', width:1.5, height:36, fontSize:9,
          margin:4, lineColor:'#0D1A2D', background:'#ffffff',

function execPrint(){
  const doc = DOCS.find(d=>d.id===_printDocId);
  // 印刷完了 → 次ステップへ
  if (doc) {
    doc.stepIdx++;
    doc.lastUpdated = new Date().toLocaleString('ja-JP').slice(5,-3);
  }
  closeBcModal();
  showToast('🖨️ 印刷しました。次のステップへ進んでください', 'ok');
  renderStats(); refreshCurrentTab();
}

function closeBcModal(e){
  if (e && e.target!==document.getElementById('bc-modal')) return;
  document.getElementById('bc-modal').style.display='none';
