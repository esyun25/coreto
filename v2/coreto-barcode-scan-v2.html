<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>書類バーコード追跡 — COREBLDG</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>
<style>

:root{--navy:#0D1A2D;--navy-l:#1E3252;--gold:#C8A951;--gold-dim:rgba(200,169,81,.15);--cream:#FFFFFF;--cream2:#F8F9FA;--white:#FFFFFF;--ink:#202124;--muted:#5F6368;--faint:#80868B;--em:#059669;--em-bg:#ECFDF5;--am:#D97706;--am-bg:#FFFBEB;--rd:#DC2626;--rd-bg:#FEF2F2;--sk:#0284C7;--sk-bg:#F0F9FF;--vt:#7C3AED;--vt-bg:#F5F3FF;--bd:#E8EAED;--bd2:#DADCE0;--sw:240px;--r:10px;--r-sm:7px;--sh:0 1px 2px rgba(60,64,67,.1),0 1px 3px rgba(60,64,67,.06)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit','Noto Sans JP',sans-serif;background:#FFFFFF}
.shell{display:flex;height:100vh}
.sb{width:var(--sw);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;position:relative}
.sb::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,rgba(200,169,81,.25) 0%,rgba(200,169,81,.06) 50%,transparent 100%)}
.sb-head{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-logo{font-family: 'Cormorant Garamond', serif;font-size:20px;font-weight:600;letter-spacing:5px;color:var(--gold)}
.sb-ver{font-size:9px;letter-spacing:2px;color:rgba(200,169,81,.3);font-family:'DM Mono',monospace;margin-top:2px}
.sb-user{margin:14px 14px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:9px 11px;display:flex;align-items:center;gap:9px}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--gold-dim);border:1px solid rgba(200,169,81,.25);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gold);flex-shrink:0}
.sb-un{font-size:11px;font-weight:600;color:rgba(255,255,255,.8)}
.sb-ur{font-size:9px;color:rgba(255,255,255,.3);font-family:'DM Mono',monospace}
.sb-nav{flex:1;overflow-y:auto;padding:6px 10px}
.nsl{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.18);padding:10px 8px 4px;font-family:'DM Mono',monospace}
.ni{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;cursor:pointer;transition:.13s;margin-bottom:1px}
.ni:hover{background:rgba(255,255,255,.06)}
.ni.active{background:rgba(200,169,81,.1)}
.ni-ic{width:22px;text-align:center;font-size:14px}
.ni-lb{font-size:11px;font-weight:500;color:rgba(255,255,255,.55)}
.ni.active .ni-lb{color:var(--gold)}
.sf{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.3);transition:.13s}
.sf:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.6)}
.sb-foot{padding:10px 14px 18px;border-top:1px solid rgba(255,255,255,.05)}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;box-shadow:var(--sh)}
.tb-title{font-size:16px;font-weight:600;color:var(--ink);letter-spacing:.5px}
.tb-crumb{font-size:11px;color:var(--faint)}
.tb-crumb a{color:var(--muted);text-decoration:none}
.tb-act{margin-left:auto;display:flex;gap:9px;align-items:center}
.btn{padding:7px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;transition:.15s;font-family:'Outfit',sans-serif;border:none}
.btn-p{background:var(--navy);color:var(--gold)}.btn-p:hover{background:var(--navy-l)}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--bd)}.btn-g:hover{background:var(--cream);color:var(--ink)}
.btn-rd{background:var(--rd-bg);color:var(--rd);border:1px solid rgba(220,38,38,.2)}.btn-rd:hover{background:var(--rd);color:#fff}
.btn-sm{padding:5px 12px;font-size:11px}
.tab-bar{padding:0 24px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;gap:0}
.tab{padding:12px 18px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.tab:hover{color:var(--ink)}.tab.active{color:var(--navy);border-bottom-color:var(--gold)}
.page{flex:1;overflow-y:auto;padding:24px}
.page::-webkit-scrollbar{width:5px}.page::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;font-family:'Outfit',sans-serif}
.b-em{background:var(--em-bg);color:var(--em)}.b-am{background:var(--am-bg);color:var(--am)}.b-rd{background:var(--rd-bg);color:var(--rd)}.b-sk{background:var(--sk-bg);color:var(--sk)}.b-vt{background:var(--vt-bg);color:var(--vt)}.b-nt{background:var(--cream2);color:var(--muted)}.b-gd{background:var(--gold-dim);color:var(--am)}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.gd::before{background:var(--gold)}.kpi.em::before{background:var(--em)}.kpi.sk::before{background:var(--sk)}.kpi.am::before{background:var(--am)}
.kpi-lb{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.kpi-vl{font-size:24px;font-weight:700;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums lining-nums;color:var(--ink);margin-top:4px}
.card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:18px}
.card-head{padding:14px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--cream)}
.card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink)}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--faint);padding:9px 14px;border-bottom:2px solid var(--bd);text-align:left;background:var(--cream)}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--bd);color:var(--ink);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(200,169,81,.03)}
/* Settings */
.set-section{margin-bottom:22px}
.set-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--white);border:1px solid var(--bd);border-radius:var(--r-sm);margin-bottom:6px}
.set-info{flex:1}
.set-label{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:2px}
.set-desc{font-size:11px;color:var(--muted)}
.toggle{width:42px;height:24px;background:var(--bd2);border-radius:12px;position:relative;cursor:pointer;transition:.2s;flex-shrink:0}
.toggle.on{background:var(--em)}
.toggle::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:3px;left:3px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{left:21px}
.set-input{padding:7px 12px;background:var(--cream);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:13px;color:var(--ink);font-family:'Outfit',sans-serif;min-width:160px;outline:none}
.set-input:focus{border-color:var(--gold)}
/* modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--white);border-radius:12px;width:520px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:14px;font-weight:700;color:var(--ink)}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted)}
.modal-body{padding:20px 22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field select{width:100%;padding:9px 12px;background:var(--cream);border:1.5px solid var(--bd);border-radius:var(--r-sm);font-size:13px;color:var(--ink);font-family:'Outfit','Noto Sans JP',sans-serif;outline:none;transition:.15s}
.field input:focus,.field select:focus{border-color:var(--gold)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-foot{padding:14px 22px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:8px}
/* permission matrix */
.perm-table{width:100%;border-collapse:collapse;font-size:11px}
.perm-table th{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--faint);padding:8px 10px;border-bottom:2px solid var(--bd);text-align:center;background:var(--cream)}
.perm-table th:first-child{text-align:left}
.perm-table td{padding:10px;border-bottom:1px solid var(--bd);text-align:center;vertical-align:middle}
.perm-table td:first-child{text-align:left;font-size:12px;font-weight:600;color:var(--ink)}
.perm-table tr:last-child td{border-bottom:none}
.perm-check{width:18px;height:18px;border-radius:4px;border:none;cursor:default}
.perm-check.allow{background:var(--em-bg);color:var(--em);display:inline-flex;align-items:center;justify-content:center;font-size:11px}
.perm-check.deny{background:var(--rd-bg);color:var(--rd);display:inline-flex;align-items:center;justify-content:center;font-size:11px}
.perm-check.partial{background:var(--am-bg);color:var(--am);display:inline-flex;align-items:center;justify-content:center;font-size:11px}
/* MOBILE */
.mob-ham{display:none;flex-direction:column;align-items:center;justify-content:center;width:36px;height:36px;background:transparent;border:none;cursor:pointer;border-radius:7px;flex-shrink:0}
.mob-ham span{display:block;width:18px;height:2px;background:rgba(255,255,255,.72);margin:3px 0;border-radius:1px}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199}
@media(max-width:768px){
  .mob-ham{display:flex}
  .mob-overlay.show{display:block}
  .sb{position:fixed;left:calc(-1 * var(--sw));top:0;height:100vh;z-index:200;transition:left .25s ease}
  .sb.open{left:0}
  .shell{overflow:hidden}.content{width:100vw;min-width:0}
  .topbar{padding:0 12px;gap:8px}.tb-crumb{display:none}
  .page{padding:12px}
}  .kpi-row{grid-template-columns:1fr 1fr!important}
  .field-row{grid-template-columns:1fr}
  table,tbl{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}

  .tb-title,
.brand-logo,
.sb-logo,
.login-title,
.mod-title,
.page-title        {  font-weight:600; letter-spacing:.3px; }

/* Section headings inside content */
.section-title     {  font-size:12px;
                     font-weight:700; text-transform:uppercase; letter-spacing:1px;
                     color:var(--label); }

/* KPI numbers — large display (24px+): Outfit tabular */
.kpi-value, .kpi-vl, .stat-val { 
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-weight:300;
  font-variant-numeric:tabular-nums lining-nums;
  letter-spacing:-.5px;   /* tight for large numbers */
  color:var(--ink);        /* always maximum contrast */
}

/* Inline amounts in tables/lists */
.amt { font-family:'Outfit','Noto Sans JP',sans-serif;
       font-weight:600; font-variant-numeric:tabular-nums;
       color:var(--ink); }

/* Positive delta only */
.delta-up { color:var(--em); font-weight:600; font-size:.9em; }
.delta-dn { color:var(--rd); font-weight:600; font-size:.9em; }

/* IDs and codes */
.mono, [class*="-id"], [class*="-code"] { font-family:'DM Mono',monospace; font-size:.92em; }

/* Badge system — 4 states only */
.badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:20px;
         font-size:10px; font-weight:600; letter-spacing:.3px;
         font-family:'Outfit',sans-serif; white-space:nowrap; }
.b-em, .badge.emerald, .badge.em { background:var(--em-bg); color:var(--em); }
.b-am, .badge.amber,   .badge.am { background:var(--am-bg); color:var(--am); }
.b-rd, .badge.red,     .badge.rd { background:var(--rd-bg); color:var(--rd); }
.b-nt, .badge.muted,   .badge.nt { background:var(--cream2); color:var(--label); }
/* Legacy aliases → neutral */
.b-sk, .badge.sky    { background:#F0F9FF; color:#0369A1; }
.b-vt, .badge.violet { background:var(--cream2); color:var(--label); }
.b-gd, .badge.gold   { background:var(--gold-dim); color:#92740A; }




/* Brand — Cormorant only here */
.sb-logo, .brand-logo {
  font-family:'Cormorant Garamond',serif !important;
  letter-spacing:5px;
}
/* Everything else: Outfit */
body, input, select, textarea, button {
  font-family:'Outfit','Noto Sans JP',sans-serif;
}

/* ── Page structure ── */
.tb-title {
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-size:18px; font-weight:600; color:var(--ink);
  letter-spacing:-.2px;
}
.login-title {
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-size:24px; font-weight:600; color:var(--ink);
  letter-spacing:-.3px;
}
.section-title {
  
  font-size:11px; font-weight:700;
  text-transform:uppercase; letter-spacing:1.2px;
  color:var(--label);
}

/* ── Numbers & Amounts — always --ink, always Outfit ── */
.kpi-value, .kpi-vl {
  font-family:'Outfit','Noto Sans JP',sans-serif;
  font-weight:300 !important;
  font-variant-numeric:tabular-nums lining-nums !important;
  color:var(--ink);
  letter-spacing:-.5px;
}
.stat-val {
  font-family:'Outfit','Noto Sans JP',sans-serif !important;
  font-weight:300 !important;
  font-variant-numeric:tabular-nums !important;
  color:var(--ink) !important;
}
.kpi-label, .stat-label, .kpi-sub {
  color:var(--label) !important;
  font-weight:500;
}

/* ── Delta (the ONE exception: direction of change) ── */
.delta-up { color:var(--em) !important; }
.delta-dn { color:var(--rd) !important; }

/* ── IDs / codes ── */
.id-mono, .ag-id, .case-id {
  font-family:'DM Mono',monospace;
  font-size:.88em; color:var(--label);
}

/* ── Badge system: 4 states only ── */
.badge {
  display:inline-flex; align-items:center;
  padding:2px 8px; border-radius:20px;
  font-size:10px; font-weight:600; letter-spacing:.3px;
  font-family:'Outfit',sans-serif; white-space:nowrap;
  font-variant-numeric:tabular-nums;
}
.badge.emerald, .badge.em { background:#ECFDF5; color:#059669; }
.badge.amber,   .badge.am { background:#FFFBEB; color:#D97706; }
.badge.red,     .badge.rd { background:#FEF2F2; color:#DC2626; }
.badge.muted,   .badge.nt,
.badge.sky,     .badge.violet,
.badge.gold               { background:var(--cream2); color:var(--label); }


/* ═══════════════════════════════════════════════════════════════
   COREBLDG — Google-style Typography System
   ─────────────────────────────────────────────────────────────
   大きな数値は weight:300 でサイズで存在感を出す
   Bold はラベル・ボタン・UIに使い、数値には使わない
   背景は白。装飾は最小限。余白で呼吸する。
   ═══════════════════════════════════════════════════════════════ */

/* Page background */
html, body { background:#FFFFFF !important; }

/* ── Brand (Cormorant only here) ── */
.sb-logo, .brand-logo {
  font-family: 'Cormorant Garamond', serif !important;
  letter-spacing: 5px;
}

/* ── Base ── */
body, input, select, textarea, button {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif;
}

/* ── KPI / メトリクス数値
   Google Analytics の大型数値と同じアプローチ:
   weight 300、大きなサイズ、tight letter-spacing ── */
.kpi-value, .kpi-vl {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif !important;
  font-weight: 300 !important;
  font-variant-numeric: tabular-nums lining-nums !important;
  letter-spacing: -1px !important;
  color: var(--ink) !important;
  line-height: 1 !important;
}
/* KPIカードのサイズを少し大きく（軽いweightを補う） */
.kpi-value { font-size: 32px !important;font-variant-numeric:tabular-nums}
.kpi-vl   { font-size: 28px !important; }

/* ── 中型数値（stat-val, テーブル内金額） ── */
.stat-val {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif !important;
  font-weight: 400 !important;
  font-variant-numeric: tabular-nums !important;
  color: var(--ink) !important;
}

/* ── ラベル系 ── */
.kpi-label, .kpi-sub, .stat-label {
  font-size: 11px !important;
  font-weight: 500 !important;
  letter-spacing: .5px !important;
  color: var(--label) !important;
  text-transform: none;
}

/* ── Page title ── */
.tb-title {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif;
  font-size: 16px; font-weight: 400; color: var(--ink);
  letter-spacing: 0;
}

/* ── Section title — Google style: small, spaced, gray ── */
.section-title {
  font-family: 'Outfit', 'Noto Sans JP', sans-serif;
  font-size: 11px; font-weight: 500;
  letter-spacing: .8px;
  color: var(--label);
  text-transform: uppercase;
}

/* ── Card: white bg, very light border, minimal shadow ── */
.card {
  background: #FFFFFF;
  border: 1px solid var(--bd);
  border-radius: 8px;
  box-shadow: var(--sh);
}

/* ── KPI Card ── */
.kpi-card {
  background: #FFFFFF !important;
  border: 1px solid var(--bd) !important;
  border-radius: 8px !important;
  box-shadow: none !important;
  padding: 20px 24px !important;
}
.kpi-card.gold   { border-top: 3px solid var(--gold) !important; }
.kpi-card.emerald{ border-top: 3px solid var(--em)   !important; }
.kpi-card.amber  { border-top: 3px solid var(--am)   !important; }
.kpi-card.red    { border-top: 3px solid var(--rd)   !important; }
.kpi-card.sky    { border-top: 3px solid #1A73E8     !important; }

/* ── 入金監視・大型パネル ── */
.kpi { border-radius: 8px; border: 1px solid var(--bd); }

/* ── Badge — flat style ── */
.badge {
  border-radius: 4px !important;
  font-size: 11px !important;
  font-weight: 500 !important;
  padding: 2px 7px !important;
  letter-spacing: 0 !important;
}

/* ── Buttons ── */
.btn-primary {
  background: var(--navy) !important;
  border-radius: 6px !important;
  font-weight: 500 !important;
  letter-spacing: .2px !important;
}
.btn-ghost {
  border-radius: 6px !important;
  font-weight: 500 !important;
}

/* ── Delta (増減のみ色付き) ── */
.delta-up, .kpi-delta.up { color: var(--em) !important; font-weight: 500; font-size: .82em; }
.delta-dn, .kpi-delta.dn { color: var(--rd) !important; font-weight: 500; font-size: .82em; }

/* ── IDs ── */
[class*="-id"], [class*="-code"], .pipe-ag, .task-meta [class*="ag-"],
.id-mono { font-family: 'DM Mono', monospace; font-size: .88em; color: var(--label); }

/* ── Form inputs — Google style ── */
.form-input, .form-select {
  border: 1px solid var(--bd) !important;
  border-radius: 4px !important;
  background: #FFFFFF !important;
  font-family: 'Outfit', 'Noto Sans JP', sans-serif !important;
  font-size: 14px !important;
  color: var(--ink) !important;
  padding: 8px 12px !important;
}
.form-input:focus, .form-select:focus {
  border-color: #1A73E8 !important;
  outline: none !important;
}

/* ── Section separator ── */

.section-title::before { display: none; }
/* ── Google-style 数値原則 (DS v2.3) ── */
.kpi-value, .kpi-vl, .kpi-val,
.stat-val, .qs-val, .count-val,
.td-amt, .bc-vl, .bc-total-vl,
.rr-amount, .amount-val, .srv,

}

.kpi-vl    { font-size:28px !important; }


/* ── ページ固有 ── */
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--bd);margin-bottom:24px}
.tab-btn{padding:10px 20px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;
  border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s}
.tab-btn.active{color:var(--navy);border-bottom-color:var(--navy)}

/* 書類カード */
.doc-card{background:#fff;border:1px solid var(--bd);border-radius:12px;
  padding:18px 20px;margin-bottom:12px;transition:.15s}
.doc-card:hover{box-shadow:var(--sh2)}
.doc-card.done{opacity:.6;border-color:var(--bd2)}

.doc-head{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px}
.doc-icon{width:42px;height:42px;border-radius:10px;background:var(--navy);
  color:var(--gold);display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0}
.doc-case-id{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:var(--navy)}
.doc-name{font-size:11px;color:var(--muted);margin-top:2px}
.doc-registered{font-size:10px;color:var(--faint);margin-top:1px}

/* バッジ */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;
  font-size:9px;font-weight:700;letter-spacing:.4px}
.badge-transit{background:#EFF6FF;color:#1D4ED8}
.badge-delivered{background:var(--em-bg);color:var(--em)}
.badge-returned{background:#EDE9FE;color:#5B21B6}
.badge-completed{background:var(--em-bg);color:var(--em)}
.badge-pending{background:var(--am-bg);color:var(--am)}
.badge-waiting{background:#F3F4F6;color:#6B7280}
.badge-type{background:rgba(13,26,45,.08);color:var(--navy)}

/* 追跡ステップ */
.track-steps{display:flex;align-items:center;gap:0;margin:12px 0;overflow-x:auto;padding-bottom:4px}
.track-step{display:flex;flex-direction:column;align-items:center;min-width:72px}
.track-step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:12px;border:2px solid var(--bd2);background:#fff;
  position:relative;z-index:1;flex-shrink:0}
.track-step-dot.done{background:var(--em);border-color:var(--em);color:#fff}
.track-step-dot.active{background:var(--navy);border-color:var(--navy);color:var(--gold)}
.track-step-dot.error{background:var(--rd);border-color:var(--rd);color:#fff}
.track-step-label{font-size:9px;color:var(--muted);margin-top:4px;text-align:center;
  white-space:nowrap;font-weight:600}
.track-step-label.done{color:var(--em)}
.track-step-label.active{color:var(--navy);font-weight:700}
.track-line{flex:1;height:2px;background:var(--bd2);min-width:20px;margin:0 -1px;
  margin-bottom:18px}
.track-line.done{background:var(--em)}

/* 追跡番号フィールド */
.track-no-field{display:flex;align-items:center;gap:8px;padding:10px 12px;
  background:#F8F9FA;border-radius:8px;margin-bottom:8px}
.track-no-label{font-size:9px;font-weight:700;color:var(--muted);white-space:nowrap}
.track-no-val{font-family:'DM Mono',monospace;font-size:12px;font-weight:700;color:var(--navy);flex:1}
.track-no-status{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px}

/* アクションボタン */
.act-btn{padding:7px 14px;border-radius:8px;font-size:11px;font-weight:700;
  cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px;transition:.15s}
.act-primary{background:var(--navy);color:#fff}
.act-primary:hover{background:var(--navy-l)}
.act-em{background:var(--em);color:#fff}
.act-em:hover{opacity:.85}
.act-ghost{background:transparent;border:1px solid var(--bd);color:var(--muted)}
.act-ghost:hover{color:var(--ink);border-color:var(--bd2)}
.act-print{background:#6D28D9;color:#fff}

/* 登録フォーム */
.form-card{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:24px;margin-bottom:20px}
.form-card-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:18px;
  display:flex;align-items:center;gap:8px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px}
@media(max-width:600px){.form-row{grid-template-columns:1fr}}
.form-field{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.4px}
.form-inp{padding:9px 12px;border:1.5px solid var(--bd);border-radius:8px;
  font-family:'Outfit',sans-serif;font-size:12px;color:var(--ink);outline:none;transition:.15s}
.form-inp:focus{border-color:var(--navy)}
.form-select{padding:9px 12px;border:1.5px solid var(--bd);border-radius:8px;
  font-family:'Outfit',sans-serif;font-size:12px;color:var(--ink);
  background:#fff;outline:none;cursor:pointer;transition:.15s}
.form-select:focus{border-color:var(--navy)}
.req{color:var(--rd)}

/* バーコード印刷エリア */
.bc-print-area{background:var(--navy);border-radius:12px;padding:20px;text-align:center;
  margin:16px 0}
.bc-title-text{font-size:10px;color:rgba(255,255,255,.6);margin-bottom:12px;font-weight:600;letter-spacing:.5px}
.bc-svg-wrap{background:#fff;border-radius:8px;padding:16px;display:inline-block;margin-bottom:12px}

/* 統計カード */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
@media(max-width:680px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:14px;text-align:center}
.stat-val{font-size:26px;font-weight:700;color:var(--navy)}
.stat-lbl{font-size:9px;color:var(--muted);margin-top:3px;font-weight:600;letter-spacing:.5px}

/* 印刷モーダル */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;
  display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:14px;padding:28px;max-width:480px;width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:4px}
.modal-desc{font-size:11px;color:var(--muted);margin-bottom:20px;line-height:1.8}

// ユーティリティ
// ════════════════════════════════════════════════
function toggleSb(){
  document.querySelector('.sb').classList.toggle('open');
  document.querySelector('.mob-overlay').classList.toggle('show');
}
function showToast(msg, type=''){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = {warn:'var(--am)', ok:'var(--em)', danger:'var(--rd)'}[type] || 'var(--navy)';
  t.style.opacity='1'; t.style.transform='translateX(-50%) translateY(0)';
  setTimeout(()=>{t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(10px)';}, 3000);
}

function statusLabel(s){
  return {
    pending_send:'⏳ 発送前',
    transit:'🚚 配送中',
    delivered:'📬 受取済み',
    signed_returned:'📝 返送中',
    complete:'✅ 完了',
  }[s] || s;
}
function statusBadgeCls(s){
  return {
    pending_send:'badge-pending',
    transit:'badge-transit',
    delivered:'badge-delivered',
    signed_returned:'badge-returned',
    complete:'badge-completed',
  }[s] || '';
}

// バーコード生成（JsBarcode）
function genBarcode(svgId, code, opts={}){
  try {
    JsBarcode('#'+svgId, code, {
      format:'CODE128', width:opts.width||2, height:opts.height||50,
      displayValue:true, fontSize:opts.fontSize||12,
      margin:opts.margin||8, lineColor:'#0D1A2D', background:'#ffffff',
    });
  } catch(e){ console.warn('BC生成エラー:', e); }
}

// ════════════════════════════════════════════════
function renderStats(){
  const transit   = DOCS.filter(d=>['pending_send','transit','delivered','signed_returned'].includes(d.status)).length;
  const delivered = DOCS.filter(d=>d.status==='delivered').length;
  const complete  = DOCS.filter(d=>d.status==='complete').length;
  const total     = DOCS.length;

  document.getElementById('stat-grid').innerHTML = [
    {val:transit,   lbl:'追跡中',     color:'var(--am)'},
    {val:delivered, lbl:'受取確認待ち', color:'#1D4ED8'},
    {val:complete,  lbl:'完了済み',    color:'var(--em)'},
    {val:total,     lbl:'登録総数',    color:'var(--navy)'},
  ].map(s=>`
    <div class="stat-card">
      <div class="stat-val" style="color:${s.color}">${s.val}</div>
      <div class="stat-lbl">${s.lbl}</div>
    </div>`).join('');

  const trackingBadge = document.getElementById('tracking-badge');
  if (trackingBadge) trackingBadge.textContent = transit || '';
}

  ['receive','tracking','history'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
  const TAB_MAP = {receive:renderReceive, tracking:renderTracking, history:renderHistory};
  TAB_MAP[tab]?.();
}

function autoFillCase(val){

function clearForm(){

function registerDoc(){
  const caseId   = document.getElementById('f-case-id')?.value.trim();

  const client   = document.getElementById('f-client')?.value.trim();

  const ret      = document.getElementById('f-return')?.value.trim();

  if (!caseId)  { showToast('⚠️ 案件IDを入力してください','warn'); return; }
  if (!docType) { showToast('⚠️ 書類種別を選択してください','warn'); return; }
  if (!agency)  { showToast('⚠️ 管理会社を入力してください','warn'); return; }

  const newDoc = {
    id:'DOC-2026-' + String(DOCS.length+1).padStart(3,'0'),
    caseId, caseName: client || caseId, docType, agency,
    agentId:'AG-10001', registeredAt: new Date().toLocaleString('ja-JP').slice(0,-3),
    outboundTracking: outbound, returnTracking: ret,
    steps:[
      {key:'received',  label:'書類\n受取',    done:true,  ts:new Date().toLocaleString('ja-JP').slice(5,-3)},
      {key:'scanned',   label:'スキャン\n完了', done:false, ts:''},
      {key:'sent',      label:'発送\n済み',     done:!!outbound, ts: outbound ? '—' : ''},
      {key:'delivered', label:'クライアント\n受取', done:false, ts:''},
      {key:'signed',    label:'署名済み\n返送', done:false, ts:''},
      {key:'complete',  label:'管理会社\n返送', done:false, ts:''},
    ],
    status: outbound ? 'transit' : 'pending_send',
    slackNotified: false,
  };
  DOCS.unshift(newDoc);
  clearForm();
  renderStats();
  showToast('✅ 受取登録完了。バーコードを発行します', 'ok');
  setTimeout(() => openBcModal(newDoc.id, newDoc.caseId, '案件バーコード'), 600);
  renderReceive();
}

// ════════════════════════════════════════════════
// TAB 2: 追跡中
// ════════════════════════════════════════════════
function renderTracking(){
  const el = document.getElementById('tab-content');
  const active = DOCS.filter(d=>d.status !== 'complete');

  if (!active.length){
    el.innerHTML='<div style="text-align:center;padding:48px;color:var(--faint);font-size:13px">追跡中の書類はありません</div>';
    return;
  }
  el.innerHTML = active.map(d => renderDocRow(d)).join('');
}

// ════════════════════════════════════════════════
// TAB 3: 完了履歴
// ════════════════════════════════════════════════
function renderHistory(){
  const el = document.getElementById('tab-content');
  const done = DOCS.filter(d=>d.status==='complete');

  el.innerHTML = done.length
    ? done.map(d => renderDocRow(d, true)).join('')
    : '<div style="text-align:center;padding:48px;color:var(--faint);font-size:13px">完了履歴はありません</div>';
}

// ════════════════════════════════════════════════
// 共通：書類行のレンダリング
// ════════════════════════════════════════════════
function renderDocRow(doc, isDone=false){
  const doneCount = doc.steps.filter(s=>s.done).length;
  const progress  = Math.round(doneCount / doc.steps.length * 100);

  // 追跡ステップUI
  const stepsHtml = doc.steps.map((s,i) => {
    const isLast  = i === doc.steps.length-1;
    const dotCls  = s.done ? 'done' : (i===doneCount ? 'active' : '');
    const lineCls = s.done ? 'done' : '';
    return `
      <div class="track-step">
        <div class="track-step-dot ${dotCls}">${s.done ? '✓' : i+1}</div>
        <div class="track-step-label ${dotCls}">${s.label.replace('\n','<br>')}</div>
        ${s.ts ? `<div style="font-size:8px;color:var(--faint);margin-top:2px">${s.ts}</div>` : ''}
      </div>
      ${!isLast ? `<div class="track-line ${lineCls}"></div>` : ''}`;
  }).join('');

  return `
  <div class="doc-card ${isDone?'done':''}">
    <div class="doc-head">
      <div class="doc-icon">${
        {契約書:'📄', '署名済み書類':'✍️', 重要事項説明書:'📋', その他:'📦'}[doc.docType] || '📄'
      }</div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
          <div class="doc-case-id">${doc.caseId}</div>
          <span class="badge badge-type">${doc.docType}</span>
          <span class="badge ${statusBadgeCls(doc.status)}">${statusLabel(doc.status)}</span>
          ${doc.slackNotified ? '<span class="badge" style="background:#E0F2FE;color:#0369A1">📢 Slack通知済み</span>' : ''}
        </div>
        <div class="doc-name">${doc.caseName} ／ ${doc.agency}</div>
        <div class="doc-registered">登録: ${doc.registeredAt} ／ ${doc.id}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0">
        <button class="act-btn act-ghost" style="font-size:10px"
          onclick="openBcModal('${doc.id}','${doc.caseId}','案件バーコード')">
          🏷️ BC印刷
        </button>
        ${!isDone ? `<button class="act-btn act-em" style="font-size:10px"
          onclick="advanceStep('${doc.id}')">
          ▶ 次のステップへ
        </button>` : ''}
      </div>
    </div>

    <!-- 追跡ステップ -->
    <div class="track-steps">${stepsHtml}</div>

    <!-- 進捗バー -->
    <div style="background:var(--bd2);border-radius:3px;height:4px;margin-bottom:12px">
      <div style="background:${progress===100?'var(--em)':'var(--navy)'};
        height:100%;border-radius:3px;width:${progress}%;transition:.3s"></div>
    </div>

    <!-- 追跡番号 -->
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px">
      ${doc.outboundTracking ? `
        <div class="track-no-field">
          <span class="track-no-label">往路追跡</span>
          <span class="track-no-val">${doc.outboundTracking}</span>
          <span class="track-no-status" style="background:${doc.steps[2].done?'var(--em-bg)':'var(--am-bg)'};
            color:${doc.steps[2].done?'var(--em)':'var(--am)'}">
            ${doc.steps[3].done ? '配達完了' : doc.steps[2].done ? '配送中' : '未発送'}
          </span>
          <button class="act-btn act-ghost" style="font-size:9px;padding:4px 8px"
            onclick="openBcModal('${doc.id}','${doc.outboundTracking}','往路追跡バーコード')">
            BC
          </button>
        </div>` : ''}
      ${doc.returnTracking ? `
        <div class="track-no-field">
          <span class="track-no-label">返送追跡</span>
          <span class="track-no-val">${doc.returnTracking}</span>
          <span class="track-no-status" style="background:${doc.steps[5].done?'var(--em-bg)':'var(--bd2)'};
            color:${doc.steps[5].done?'var(--em)':'var(--muted)'}">
            ${doc.steps[5].done ? '返送完了' : '返送待ち'}
          </span>
          <button class="act-btn act-ghost" style="font-size:9px;padding:4px 8px"
            onclick="openBcModal('${doc.id}','${doc.returnTracking}','返送追跡バーコード')">
            BC
          </button>
        </div>` : ''}
    </div>

    ${!isDone ? `
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${!doc.slackNotified ? `
        <button class="act-btn act-ghost" onclick="sendSlack('${doc.id}')">
          📢 Slack通知
        </button>` : ''}
      ${doc.status === 'delivered' ? `
        <button class="act-btn act-em" onclick="markSigned('${doc.id}')">
          ✍️ 署名済み受取を記録
        </button>` : ''}
      ${doc.status === 'signed_returned' ? `
        <button class="act-btn act-em" onclick="markComplete('${doc.id}')">
          ✅ 管理会社返送完了
        </button>` : ''}
    </div>` : ''}
  </div>`;
}

// ════════════════════════════════════════════════
// ステップ操作
// ════════════════════════════════════════════════
function advanceStep(docId){
  const doc = DOCS.find(d=>d.id===docId);
  if (!doc) return;
  const nextIdx = doc.steps.findIndex(s=>!s.done);
  if (nextIdx < 0) return;
  const now = new Date().toLocaleString('ja-JP').slice(5,-3);
  doc.steps[nextIdx].done = true;
  doc.steps[nextIdx].ts   = now;

  // ステータス更新
  const doneKeys = doc.steps.filter(s=>s.done).map(s=>s.key);
  if (doneKeys.includes('complete'))        doc.status = 'complete';
  else if (doneKeys.includes('signed'))     doc.status = 'signed_returned';
  else if (doneKeys.includes('delivered'))  doc.status = 'delivered';
  else if (doneKeys.includes('sent'))       doc.status = 'transit';
  else                                      doc.status = 'pending_send';

  const labels = {
    scanned:'スキャン完了', sent:'発送登録', delivered:'クライアント受取確認',
    signed:'署名済み返送記録', complete:'管理会社返送完了',
  };
  showToast(`✅ ${labels[doc.steps[nextIdx].key] || 'ステップ更新'}: ${doc.caseId}`, 'ok');
  renderStats();
  const activeTab = document.querySelector('.tab-btn.active')?.id?.replace('tab-','');
  if (activeTab === 'tracking') renderTracking();
  else renderReceive();
}

function sendSlack(docId){
  const doc = DOCS.find(d=>d.id===docId);
  if (!doc) return;
  doc.slackNotified = true;
  showToast(`📢 Slack通知を送信しました（${doc.caseId}）`);
  const activeTab = document.querySelector('.tab-btn.active')?.id?.replace('tab-','');
  if (activeTab === 'tracking') renderTracking();
  else renderReceive();
}

function markSigned(docId){
  const doc = DOCS.find(d=>d.id===docId);
  if (!doc) return;
  const signedStep = doc.steps.find(s=>s.key==='signed');
  if (signedStep) { signedStep.done=true; signedStep.ts=new Date().toLocaleString('ja-JP').slice(5,-3); }
  doc.status = 'signed_returned';
  showToast(`✍️ 署名済み書類の受取を記録しました: ${doc.caseId}`, 'ok');
  renderStats(); renderTracking();
}

function markComplete(docId){
  const doc = DOCS.find(d=>d.id===docId);
  if (!doc) return;
  const completeStep = doc.steps.find(s=>s.key==='complete');
  if (completeStep) { completeStep.done=true; completeStep.ts=new Date().toLocaleString('ja-JP').slice(5,-3); }
  doc.status = 'complete';
  showToast(`✅ 管理会社への返送が完了しました: ${doc.caseId}`, 'ok');
  renderStats(); renderTracking();
}

// ════════════════════════════════════════════════
// バーコードモーダル
// ════════════════════════════════════════════════
function openBcModal(docId, code, title){
  document.getElementById('bc-label-title').textContent = title;
  document.getElementById('bc-code-text').textContent = code;
  const doc = DOCS.find(d=>d.id===docId);
  document.getElementById('bc-modal-desc').innerHTML = doc
    ? `案件: <strong>${doc.caseId}</strong> ／ ${doc.caseName}<br>書類種別: ${doc.docType}`
    : `コード: ${code}`;
  document.getElementById('bc-modal').style.display = 'flex';
  // バーコード描画（少し遅延して確実にDOM表示後に実行）
  setTimeout(()=>{
    genBarcode('bc-svg-main', code, {width:2, height:60, fontSize:12});
  }, 80);
}

function printBarcode(){
  const svg = document.getElementById('bc-svg-main');
  const code = document.getElementById('bc-code-text').textContent;
  const w = window.open('','_blank','width=400,height=300');
  w.document.write(`
    <html><head><title>バーコード印刷</title>
    <style>body{text-align:center;padding:20px;font-family:sans-serif}
    @media print{button{display:none}}</style></head>
    <body>
      <p style="font-size:12px;margin-bottom:8px">${code}</p>
      ${svg.outerHTML}
      <br><button onclick="window.print()">🖨️ 印刷</button>
    </body></html>`);
  w.document.close();
}

function closeBcModal(e){
  if (e && e.target !== document.getElementById('bc-modal')) return;
  document.getElementById('bc-modal').style.display = 'none';
}

// ════════════════════════════════════════════════
// 初期化
// ════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  CNAV.init('barcode_scan');
  renderStats();
  renderReceive();
});
</script>
